body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述升須彌山頂品第十三初來意者先辨會來前信此解義次第故又答十住問總有二𫨻前信是住之方便此明正位故次來也二品來前品説信究竟此品趣後説住故次來也前信此解者即疏本意以信會答第二會初所脫信問故次住有二假即古德意二釋名亦先辨會名約處名忉利天會約人名法慧菩薩會約法名十住會皆依主釋二品名須彌正云蘇迷盧此云妙高如來以自在力不起覺樹應機現彼故云升也表位漸增不處人間顯位清淨故居天也若天表淨何獨妙高妙有十義如於法故一者體妙謂四寶所成二者相妙謂八方四級三者色妙謂四正色北金東銀南吠琉璃西頗胝迦一切草木鳥獸等物隨所至處則同其色自常不變四者德妙謂八方猛風不能令動五眷屬妙謂七金山七重圍繞及七香海海印旋流六依持妙唯天依住得通者居七作業妙不離本處而鎮四洲映蔽日月而成晝夜八生果妙謂波利質多能益天衆九為首妙於四洲地最在先成十堅固妙於輪圍中最在後壞高者高八萬四千由旬入水亦爾下據金剛上鄰空界頂上縱廣量亦如之獨出九山故稱高也謂七金山者俱含世間品偈云蘇迷盧處中蘇即妙也迷盧高也次踰健達羅此云持雙以山頂有二道春山能持此故以為名也伊沙馱羅山此云持軸山峯上聳猶如車軸山頂持故竭地洛迦山俱舍疏云此即西方樹名大疏但依狀翻不出其名頌疏云此方亦有名簷木山山上寶樹形似彼故蘇達梨舍那此云善見見者稱善頞濕縛羯拿此云馬耳山形似彼故毗那怛迦山此云象鼻山形似故尼民達羅山俱舍疏云魚名其魚觜尖山形似故華嚴音義釋云此云持邊山於大洲等外有鐵輪圍山前七金所成蘇迷盧四寶入水皆八萬妙高出亦然餘八半半減廣皆等高量釋曰上來所引正證七金餘因便來下疏方要及七香海者俱舍頌云山間有八海前七名為內最初廣八萬四邊各三倍餘六半半狹第八名為外三洛叉二萬二千踰𮜖那釋曰前七名內七金內故第八名外七金外故外在鐵圍之內亦名山間最初八萬即持雙之內海也七金內海皆八功德水故云香水旋流外海鐵圍因便故來唯天依住者俱舍頌云妙高層有四相去各十千傍出十六千八四二千量堅手及持鬘恆憍天王衆如次居四級亦住餘七山釋曰謂始從水際𥁞第一層相去十千傍出十六千上三層級向上相去數同傍出漸減一半第二層八千三即四千四即二千向上漸狹此四層級直上方𥁞妙高下半四萬踰𮜖那第一級有藥叉神名為堅首乃至第四是四天王餘皆四王管故云唯天依住妙高頂八方復三十三天居故皆天住謂波利者波利此云遍也亦曰周匝質多羅此云間錯莊嚴謂此樹衆雜色華周匝莊嚴或云圓妙莊嚴即俱舍園生樹也故俱舍云東北園生樹西南善法堂論釋云其園生樹槃根深廣五十踰𮜖那聳幹上升枝條傍布高廣量等百踰𮜖那葉開華妙香芬馥順風熏滿百踰𮜖那若逆風熏猶遍五十是諸大衆遊樂之所餘文可知十住之行亦復如是聞思修解而為妙體四德八聖以為妙相四辨為色令物解同雖同衆音自智不變八法不動而為妙德七支奉戒金山圍繞七識流轉而為海印第一義天依持而住可以神會非情能升不離本處遍應十方映蔽佛日及菩薩月而成涅槃生死晝夜生教行果而為妙樹世界初成菩薩先出為衆生現種種資具世界將壞菩薩後沒為説上定令免三災高者具成八萬四千諸度法門自在障外為衆生故入生死海亦具八萬四千諸度法門據金剛性鄰勝義空又智入佛慧必窮其底德超方便逈出羣峰為顯十住功德妙高是故須升妙高山頂四王處半旁而非正表住不退異信輕毛故越彼天居妙高頂善財童子於妙峰山頂見德雲者亦表斯位彌顯有由四王處半下通伏難謂有難言若以妙高為表四王亦處妙高復為次第何不處此故為此通然上所釋皆圓教意故下發心品云應知此人即與三世諸佛同等與三世佛功德平等得如來一身無量身才發心時即為十方一切諸佛共所稱歎不可同於方便教説若約觀心妙高者謂三昧須彌寂然不動無思無心不𭣣不攝任性而定稱本心地入佛智海湛然不遷是妙法樂觸境自在合本性淨是四德寶而自莊嚴斯則本覺如來升法須彌之頂三宗趣者先約會以十住行德為宗攝位德果為趣二品以嚴處請佛赴感為宗根緣契合説法為趣爾時如來威神力故十方一切世界一一四天下閻浮提中悉見如來坐於樹下各有菩薩承佛神力而演説法靡不自謂恆對於佛四釋文者此會六品分為二分初二品方便發起後四品當會正説前中初之一品唯是由致偈讚一品義有兩兼一是方便謂前品化主赴機後品助化讚佛主伴圓備方演法故二是所依謂三天説法各有偈讚欲顯三賢皆依佛智有差別故離如來智無自體故獨為方便甚抑讚詞行向二會同此科判偈讚一品者前是古意後是新意可知今初一品長分十𫨻一本會齊現二不離齊升三各見佛來四各嚴殿座五皆來請佛六俱時入殿七樂音並止八各念昔因九同讚如來十殿皆廣博嚴淨也十假科中皆有皆俱齊等言者以約結通周法界故言爾時者即前二會時主伴齊遍演前二會之法也今此明遍即十重説處中第一重也何須舉此欲明前會不散成後會故後必帶前合成法界無礙會故一一諸會無休息故後後諸會皆同時故若散前會即無後故所以唯約覺樹會者此為本故得佛處故理實第二亦同此遍若同時遍何有九會前後若有前後何名同時應云即用之體同時頓遍即體之用不壞前後猶如印文今此明遍者即第一疏説經緣中初此閻浮是也所以唯約覺樹下通妨難此通二難一有難云既不散前應舉二會何以唯言不起覺樹故此通云初會為本又第二會近初會故二若同時下復通一妨文中先難後應云下通釋可知爾時世尊不離一切菩提樹下而上升須彌向帝釋殿第二爾時下明不離覺樹各升釋天問動靜相違去住懸隔既云不離何得言升古有多釋一云本釋迦身不起道樹別起應化以升天上一云不起是報升天是化一云不起是化身升天是化用並非文意以此文中俱是毗盧遮那十身雲故古有多釋下次序昔順遣昔有五義而文三節初併序三師二序第四三序第五以初三師並約三身義類大同欲併破故先序於昔並非文意下二辨違通有二違一違現文去住皆是遮那佛故二違經宗十身非三身故彼即是後二會此即今文也一云以去即非去故名不起非去即去是以升天如不來相而來等若爾但是升相離故非是樹下別有不起之身故不可也一云以去者二序第四師以不分三身但就一身論性相故即是事理無礙宗中之意不違本體不順今文如不來相下即是古人引例證成此是淨名經問疾品中淨名之言經云時維摩詰謂文殊師利言善來文殊師利不來相而來不見相而見文殊師利言如是居士若來已更不來若去已更不去所以者何來者無所從來去者無所至所可見者更不可見今但引淨名之言餘略不引睿公釋云文殊心棲實相形貫法身內外𡨋寂都無來相都無來相能以之來此明心𡨋至理體絶去來應物隨緣不壞來去而下文殊答者即得意相領印成其言則以三時門領其不來相而來以合不合門成其不見相而見前中三時略舉其一以相顯故言三時者即中論去來品偈云已去無有去未去亦無去去時亦無去翻此則云已來無有來未來亦無來來時亦無來謂已來已滅不可言來未來未有何得言來來時不住已未分之故亦無來無去亦然故下經云若過去生過去生已滅若未來生未來生未至若現在生現在生無住而淨名所見文殊自菴園而來菴園衆會謂文殊為去故文殊言非唯居士見我不來而來從菴園見我為去我亦不去而去也所以者何下文殊自徵釋上義謂若先有法從彼而來既非先有緣會而來故於三時無有來矣無去亦然來必有從去必有至故三句釋別又有來去不出三時今三時無來故無所從三時無去故無所至言所可見者更不可見者即以合不合門成上不見相而見謂見必有三謂能見所見及以見者方成於見所見因於二成故無所見所見無故餘二寧有故中論云見及所見者是三各異方如是三法異終無有合時異法不可合非異無可合又論云見不能有見非見亦不見若已破於見則為破見者故正見時即無見矣若爾但是下二辨違但是升即非升似去即非去何有樹下不動之身若菴園有文殊毗耶更見妙德可以證此彼此義異何得援引有云此佛神通同體業用即住是去去即是住住是體遍去是用應應是體應雖升後而不離前體是應體雖不離前而升後若爾何殊第三師不起是法又以住釋於不起而言住是體遍何得獨住菩提樹耶升天何得非體遍耶菩提樹下寧非用耶有云此佛神通者三別序第五師即刊定記主以體遍為不動以用應而為升若爾何殊等者第二辨違也此有二破一指同前義破前義不立此義自破二又以住下直就所立破唯住覺樹非有體遍遍於去處何得去非體遍然覺樹亦用獨言是體升天有體但言是用故有所遣非責本立同體業用故下正義亦是即體業用今顯正義然佛得菩提智無不周體無不在無依無住無去無來然以自在即體之應應隨體遍緣感前後有住有升閻浮有感見在道樹天宮有感見升天上非移覺樹之佛而升天宮故云不離覺樹而升釋殿法慧偈云佛子汝應觀如來自在力一切閻浮提皆言佛在中此不離也我等今見佛住於須彌頂此而升也文理有據更以喻顯譬猶朗月流影遍應且澄江一月三舟共觀一舟停住二舟南北南者見月千里隨南北者見月千里隨北停舟之者見月不移是為此月不離中流而往南北設百千共觀八方各去則百千月各隨其去諸有識者曉斯旨焉古德釋此略有十義一約處相入門以一處中有一切處故是故此天宮等本在樹下故不須起然是用彼故説升也二亦約相入門以一處入一切處故樹遍天中亦不須起欲用天宮表法升進故云升也三由一切即一故天在樹下四由一即一切樹在天上不起等凖前五約佛身謂此樹下身即滿法界遍一切處則本來在彼不待起也機熟令見故云升也是故如來以法界身常在此即是在彼六約佛自在不思議解脫謂坐即是行住等在此即在彼皆非下位測量故也七約緣起相由門八約法性融通門九約表示顯法門十約成法界大會門然此十解前五玄門次四所以後一總意欲成十義相參而立雖似雜亂不違經宗並可用也然此十解下文含二意初即總明然此中相望有四對法相即無礙一此處彼處二此身彼身三若去若住四若一若多約處此處彼處相即無礙應如十中前四約身相即無礙應如五六及前正顯又十中後四通於身處約處唯有此彼約身更加去住謂此身即是彼身去身即是住身若身若處俱通一多上來諸法同在一時無前後也一多相望應成四句一不離一切樹下升一天宮即如今文二不離一樹升一切天三不離一切樹而升一切天經云十方世界悉如是故四不離一樹而升一天經中欲顯一多相即故舉初句升釋天既爾升餘天亦然如後二會升天既爾往餘處亦然復應樹樹相望而成二句謂不離一樹下常在一切樹不離一切樹而常在一樹復應以不起餘處類不起樹下展轉相望皆悉周遍不壞前後自在難思又既一處有一切處亦有微細義所用不同有隱顯義若加前時後時有十世義唯見説住及於餘法有純雜義後後帶於前前有帝網義此天望餘成主伴義十玄具矣然此中下正明義類經中欲顯等者顯經中不盡之由若云不離一樹而升一天難思之相不顯若言不起一樹而升一切忉利天者則不能顯本會圓遍若言不離一切樹而升一切天則無一多無礙之相故唯出初句下法慧例云十方悉亦然方有升一切句即俱多句又既一處下例釋十玄以古德玄文與意相參但有四玄前五但二九為託事十為同時故今加六十玄具矣問帶前起後事理應齊何故三賢獨有斯旨答顯異義故謂初二會相鄰接故不假帶前此三人天隔越故須連帶又此三會同詮賢位六已入證不假帶前第七即位中普賢居然不假第八頓彰五位體用已融第九唯明證入體用一味故並皆不假時天帝釋在妙勝殿前遙見佛來第三時天帝下明各見佛來約佛則用從體起約機則境從心現鄰而未即故云遙見即以神力莊嚴此殿置普光明藏師子之座其座悉以妙寶所成十千層級逈極莊嚴十千金網彌覆其上十千種帳十千種蓋周回間列十千繒𦂶以為垂帶十千珠瓔周遍交絡十千衣服敷布座上十千天子十千梵王前後圍繞十千光明而為照曜第四即以下各嚴殿座表嚴根欲之殿為法器故置師子座表十住之法門故文有十句初總餘別總云普光明藏者此是解位智照法空含衆德故從信始入故有置言別中初句約體餘並顯嚴皆云十千者萬行因感故言層級者萬行熏成故金網防護慈悲帳蓋以育以覆四攝繒𦂶以為周垂圓融行願交絡萬善柔忍慚愧以覆法空第一義天清淨梵行繞斯法體一一智照故日光明於生死中遣長夜暗舉斯果德令物行因下行向中約位漸增表法無異爾時帝釋奉為如來敷置座已曲躬合掌恭敬向佛而作是言善來世尊善來善逝善來如來應正等覺唯願哀愍處此宮殿第五爾時帝釋下請佛居殿於中三業崇敬以為請儀言善來者應機來故不來相而來故帶法界會來故三稱善者喜之至故舉三號者略歎德故願哀處者希仗勝田生大福故爾時世尊即受其請入妙勝殿十方一切諸世界中悉亦如是第六爾時下俱時入殿謂根緣契合成益不虛十方如是通上六𫨻入殿事訖故一結通下四𫨻文殿中之事爾時帝釋以佛神力諸宮殿中所有樂音自然止息第七爾時下樂音止息謂攝散歸靜得定益故即自憶念過去佛所種諸善根而説頌言第八即自下各念昔因獲智益也散緣既止勝德現前寂然無思發宿住智種善根者即下十佛曾入此殿聞法供養故亦表見自心性同昔佛故迦葉如來具大悲諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥第九迦葉下同讚如來然三世諸佛皆於此處説十住法獨讚十者表説十住及無盡故所以讚者義乃有四一十佛曾處則殿勝可居二互舉一德例讚本師三敘昔善根慶遇堪受四昔佛同説表法常恆文中先明此界後辨結通今初十頌各上半標名讚德上句別下句通下半以人結處唯初一句諸佛不同然佛別名多因德立讚者取德以釋上名初迦葉者此云飲光若從姓立示生彼族若就佛德一者身光蔽餘光故二者悲光飲蔽邪光故九同讚如來者此中疏以別德釋其別名於中數佛當若疏家以文就義觀下二會義更昭然拘那牟尼見無礙諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥拘那牟尼舊曰金仙亦云金寂寂故無礙金故明見迦羅鳩馱如金山諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥迦羅鳩馱者具云迦羅鳩村馱此云所應斷已斷如金已淨如山不動亦可見無礙者是此佛德如金山者是前佛德毗舍浮佛無三垢諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥毗舍浮者亦云毗溼婆部毗溼婆者此云遍一切也部者自在也亦云遍勝無三垢故無不自在而超勝也三垢者現種及習尸棄如來離分別諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥尸棄亦云式棄那此云持髻亦云有髻無分別智最為尊上處心頂也又髻中明珠即無分別也毗婆尸佛如滿月諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥毗婆尸者此翻有四謂淨觀勝觀勝見遍見如月圓智滿是遍見也魄盡惑亡是淨觀也既圓且淨是勝觀勝見也弗沙明達第一義諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥弗沙亦云勃沙此云增盛明達勝義是增盛也提舍如來辨無礙諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥提舍亦云底沙西域訓字底邏那此云度也沙是皤沙此云説也謂説法度人或但云説辨才無礙者即能説也波頭摩佛淨無垢諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥波頭摩者此云赤蓮華身心如蓮華淨無塵垢然燈如來大光明諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥然燈者智論云此佛從初現生乃至成佛舉身常光如然燈故身智光明普周稱大然十中後七乃過去劫佛如何賢劫曾入殿耶古釋有二一約時劫相即入故二約其處有粗細故粗隨劫壞細者常存如法華天人見燒我土不毀又梵王見淨身子見穢今此天帝是大菩薩同梵王見亦沸加故如此世界中忉利天王以如來神力故偈讚十佛所有功德十方世界諸釋天王悉亦如是讚佛功德二如此下結通十方爾時世尊入妙勝殿結跏趺坐此殿忽然廣博寬容如其天衆諸所住處十方世界悉亦如是第十爾時世尊下殿皆廣博即示如意相廣殿同處以遣局情亦表廓大慈悲等衆生界又如來入殿即覺智現前忽然廣博則身心無際十方已下結通無盡唯結後四前已結故音釋頗胝迦頗滂禾切胝旨而切梵語頗胝迦此云永生溼失入切拏女加切
