body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述爾時喜見善慧王與三萬七千夫人婇女俱福吉祥為上首五百王子俱大威光為上首六萬大臣俱慧力為上首如是等七十七百千億那由他衆前後圍繞從焰光明大城出以王力故一切大衆乘空而往諸供養具遍滿虛空至於佛所頂禮佛足却坐一面第六俱行詣佛初導從持供後至而設敬復有妙華城善化幢天王與十億那由他眷屬俱復有究竟大城淨光龍王與二十五億眷屬俱復有金剛勝幢城猛健夜叉王與七十七億眷屬俱復有無垢城喜見乾闥婆王與九十七億眷屬俱復有妙輪城淨色思惟阿修羅王與五十八億眷屬俱復有妙莊嚴城十力行迦樓羅王與九十九千眷屬俱復有遊戲快樂城金剛德緊那羅王與十八億眷屬俱復有金剛幢城寶稱幢摩睺羅伽王與三億百千那由他眷屬俱復有淨妙莊嚴城最勝梵王與十八億眷屬俱如是等百萬億那由他大城中所有諸王并其眷屬悉共往詣一切功德須彌勝雲如來所頂禮佛足却坐一面第二復有妙華下略列諸王文易可知時彼如來為欲調伏諸衆生故於衆會道場海中說普集一切三世佛自在法修多羅世界微塵數修多羅而為眷屬隨衆生心悉令獲益第六時彼如來下廣演法門文分為五一佛轉法輪二威光獲益三以偈讚述四傳化衆生五佛加讚勵今初也佛解脫用主教宣示剎塵眷屬隨機益殊是時大威光菩薩聞是法已即獲一切功德須彌勝雲佛宿世所集法海光明第二是時大威下得益中初總後別總中上說三世佛法即佛昔所集也既見佛得益轉受菩薩之名所謂得一切法聚平等三昧智光明所謂下別智即是體光明語用所照境殊故分十一一深定智明一切法聚略有三義一正定等三二善惡等三三總收一切不出有為無為二種法聚二位相收一味性現故云平等定中證此名彼三昧智即是體者智體如日用如日光日體雖一能放千光智體不殊能照萬境又日光無二所照物殊智光無差隨境分照一正定等三者謂等取邪定不定聚故善惡等者等取無記三總𭣣為二四二位下融而為一一切法悉入最初菩提心中住智光明二大心智明謂後後因果皆入初心略有三義一後因初得故言一切悉入若修塗至在初步學者祿在其中二菩提直心正念真如真如門內攝一切法三者三德開顯前後圓融初發心時便成正覺故謂後後因界等者總釋也六位相望故成後後五位為因妙覺為果又位位之中亦有因果如十地中調柔果等若修途者即肇公不遷論也論云是以如來功流萬世而常存道通百劫而彌固成山假就於始簣修途託至於初步者果以功業不可朽故也彼論意云物各性住故無往來今雖引文用意少別此言本出莊子千里之途在於足下其猶滔滔之水本於濫觴合抱之木生自毫末後由初得故曰在初學者祿在其中意亦同上即論語子張學干祿子曰多聞闕疑慎言其餘則寡尤多見闕殆慎行其餘則寡悔言寡尤行寡悔祿在其中矣注曰千求也祿位也雖未得祿得祿之道也故得祿在後由學而能故居學中此上一義通諸經論二菩提直心等者即起信論法性宗中實教之意然菩提心總有三心今但直心中攝以直心正念真如真如即起信生滅真如二門之一故云真如門內然此二門皆各總攝一切法唯取真如謂一切法及後後諸德皆依真如真如無二通為諸法之體今菩提心正念真如故能攝也三者三德開顯下即別教一乘圓融義也不同餘宗言三德開者即法心功德品初發心時得如來一身無量身則法身開顯得究竟智慧得一切智慧光明則般若開顯不於諸法少有所得即解脫開顯以心離妄取寂然雙流故此心中無德不攝因該果海並在初心初發心時便成正覺即梵行品文言初後圓融者以初是即後之初後是即初之後以緣起法離初無後離後無初故舉初攝後若約法性融通一切因果不離心性契同心性無德不收以一切法隨所依性皆於初心頓圓滿故故梵行品云若諸菩薩皆與如是觀行相應於諸法中不生二解一切佛法疾得現前初發心時即得阿耨多羅三藐三菩提知一切法即心自性成就慧身不由他悟如玄文已明下當更說十方法界普光明藏清淨眼智光明三大智智明法界者所照之體大也普光明者即相大也智慧光明遍照法界義故蘊恆沙性德故名為藏妄惑本空故云清淨明見稱眼見性肉眼即同佛眼三大智智明者經中清淨眼是總相此眼何見見心三大疏中囑經唯配二大略無用大用即智攝故從智慧光明遍照法界義故者即暗引起信證普光明為相大義此即起信釋生滅門中所顯義大雙明體相之文論云復次真如自體相者一切凡夫聲聞緣覺菩薩諸佛無有差別非前際生非後際滅舉竟常住釋曰上釋體大今不引之以法界為體義易知故論云從本已來性自滿足一切功德所謂自體有大智慧光明義故遍照法界義故真實識知義故自性清淨心義故常樂我淨義故清涼不變自在義故釋曰上之六句皆是相大一本覺智明義二本覺顯照諸法義三照時無倒義四體離惑染義五性德圓備義六性德無遷義今不引後四而引前二有智遍照證以普光明為相大義恐人以法界為所照普光明為能照故引此文相大本有則皆所照以淨眼智明為能照耳從蘊恆沙下釋經藏字具二藏義蘊恆沙德即不空藏妄惑本空即是空藏故清淨言向上屬所觀之藏向下屬能見之眼無障蓋故言見性肉眼即名佛眼者即涅槃第六經云善男子聲聞之人雖有天眼故名肉眼學大乘者雖有肉眼乃名佛眼何以故是大乘經名為佛乘如此佛乘最上最勝諸佛見性故觀察一切佛法大願海智光明四大願智明知諸佛法願為本故入無邊功德海清淨行智光明五大行智明無邊果德此行入故趣向不退轉大力速疾藏智光明六速疾智明謂趣入無生功用不退無功大力一行含多受斯稱也無功大力者由八地得無功用如乘船入海故云大力速疾言一行含多者先以一身起行至此入地以無量身起行一一行中起一切行故法界中無量變化力出離輪智光明七神通智明三輪幹事出離不能决定入無量功德圓滿海智光明八大福智明照福嚴故了知一切佛决定解莊嚴成就海智光明九大解智明謂佛勝解力成莊嚴海了知法界無邊佛現一切衆生前神通海智光明十佛用智明普周法界了知一切佛力無所畏法智光明十一佛德智明降魔制外後三佛境故但了知餘可證知故云得入餘可證知者智論三十一云通徹名入入亦證也得者獲之在己也爾時大威光菩薩得如是無量智光明已承佛威力而說頌言第三以偈讚述文分二別先因後偈我聞佛妙法而得智光明以是見世尊往昔所行事偈中分三初一標益體用一切所生處名號身差別及供養於佛如是我咸見往昔諸佛所一切皆承事無量劫修行嚴淨諸剎海捨施於自身廣大無涯際修治最勝行嚴淨諸剎海耳鼻頭手足及以諸宮殿捨之無有量嚴淨諸剎海能於一切剎億劫不思議修習菩提行嚴淨諸剎海普賢大願力一切佛海中修行無量行嚴淨諸剎海如因日光照還見於日輪我以佛智光見佛所行道次八顯用所見於中前七見因我觀佛剎海清淨大光明寂靜證菩提法界悉周遍後一見果我當如世尊廣淨諸剎海以佛威神力修習菩提行三一偈發願思齊即前品初修治大願也諸佛子時大威光菩薩以見一切功德山須彌勝雲佛承事供養故於如來所心得悟了第四傳化衆生文分為三初明自悟為一切世間顯示如來往昔行海顯示往昔菩薩行方便顯示一切佛功德海顯示普入一切法界清淨智顯示一切道場中成佛自在力顯示佛力無畏無差別智顯示普示現如來身顯示不可思議佛神變顯示莊嚴無量清淨佛土顯示普賢菩薩所有行願二為一切下明轉悟他顯示十法與前自得十一有同有異文並可知令如須彌山微塵數衆生發菩提心佛剎微塵數衆生成就如來清淨國土三令如須彌山下利他之益爾時一切功德山須彌勝雲佛為大威光菩薩而說頌言善哉大威光福藏廣名稱為利衆生故發趣菩提道汝獲智光明法界悉充遍福慧咸廣大當得深智海一剎中修行經於剎塵劫如汝見於我當獲如是智第五如來讚勵中偈有十一初三讚發心得法大果當成非諸劣行者能知此方便獲大精進力乃能淨剎海一一微塵中無量劫修行彼人乃能得莊嚴諸佛剎為一一衆生輪回經劫海其心不疲懈當成世導師供養一一佛悉盡未來際心無暫疲厭當成無上道次四對劣顯勝進者圓德三世一切佛當共滿汝願一切佛會中汝身安住彼一切諸如來誓願無有邊大智通達者能知此方便次二外加內智决證無疑大光供養我故獲大威力令塵數衆生成熟向菩提諸修普賢行大名稱菩薩莊嚴佛剎海法界普周遍後二舉一例餘行者即得初逢一切功德山佛已竟諸佛子汝等應知彼大莊嚴劫中有恆河沙數小劫人壽命二小劫諸佛子彼一切功德須彌勝雲佛壽命五十億嵗第二遇第二佛文分為二先結前生後二正顯佛興今初謂將說後佛故總論劫壽明多小劫者欲顯多佛現故說人壽佛壽者由佛壽促而人壽長故得威光一生歷事三佛彼佛滅度後有佛出世名波羅蜜善眼莊嚴王亦於彼摩尼華枝輪大林中而成正覺二彼佛滅下正顯佛興文分為五一明滅後佛興二覩相獲益三讚德勸詣四眷屬同歸五聞經悟入今初也此中佛名謂智導萬行皆到彼岸見性了了故名善眼果由因飾是曰莊嚴爾時大威光童子見彼如來成等正覺現神通力二爾時下威光覩相獲益中二先覩相即獲益之由也即得念佛三昧名無邊海藏門二即得下正獲益也先列後結列有十種一念佛三昧者菩薩之父故首明之乃至十地不離念佛菩薩之父者即智論文論云菩薩以般若波羅蜜為母般舟三昧為父般舟即念佛此翻為佛立三昧良以念佛即真涉事與方便同故得稱父又念佛成佛是親種故言乃至十地不離念佛者十地之中皆云一切所作不離念佛念法念僧等無邊海藏門者蘊積名藏深廣稱海然略有三義一由此定中見多佛故下文云以佛為境界專念而不捨是人得見佛其量與心等由念能見所以稱門二一一佛德是無邊海藏由念能知所以稱門云何無邊海劫海所修有行願海成就色身有相好海成就智身有辨才海建立念處有名號海修諸助道有功德海安立衆生有淨剎海如是諸海一一無邊各各出生蘊積名藏三無邊勝德由念佛生故此一門深廣蘊積何者念佛性身則契如理念功德身成無邊德念相好身證無邊相障無不滅德無不生一言蔽諸總由念佛從此通悟所以稱門即此一門說不可盡障無不滅下結歎故賢護經中廣列諸德以徵其因佛答皆從念而生一言蔽諸者即論語子曰詩三百一言以蔽之曰思無邪謂歸於正也念一佛號亦名一言直取一言只一佛字故自四祖禪要唯稱佛言耳即得陀羅尼名大智力法淵二總持大智能達深法即得大慈名普隨衆生調伏度脫三無緣普應即得大悲名遍覆一切境界雲四等除熱惱即得大喜名一切佛功德海威力藏五佛深德海蘊積力用菩薩緣此喜遍身心即得大捨名法性虛空平等清淨六悲則心戚喜便浮動深契法性則曠若虛空悲喜兩亡為平等清淨即得般若波羅蜜名自性離垢法界清淨身七般若者覺法實性離分別也有可離者非真離也知自性離不復離也無離之離即真法界真法界者本來清淨法界清淨即般若清淨般若清淨則萬法本淨萬法淨者無淨無不淨為真淨也實相般若為萬法之體觀照冥此衆德攸依故云身也覺法實性離分別也者此總釋一門亦當別釋自性離垢之言即大般若曼殊室利分中慈氏菩薩云若諸菩薩聞是甚深般若心不沉沒已近無上正等菩提何以故是諸菩薩現覺法性離一切分別如大菩提故今此般若亦覺法自性名自性離離字兩向向上屬自性離向下屬離垢即離分別之垢也從有可離下別釋經文成上總釋有可離者非真離也反釋初句成上性離知自性離不復離也者順釋初句成上離分別言不知性離謂有可離即是分別今知性離知相即寂故無分別無離之離者即躡上釋下法界言也正同起信所言覺者謂心體離念離念相者等虛空界無所不遍法界一相即是如來平等法身法身即真法界本來清淨者躡上法界釋清淨言既自性離是真法界則本自淨非觀令淨非去垢淨是故經云法界清淨法界清淨者即以上義成此般若得清淨名此有二意一由體法界方成般若故此般若受法界清淨之名二者性無二故故大般若難信解分云復次善現般若波羅蜜多清淨故色清淨色清淨故一切智智清淨何以故若般若波羅蜜多清淨若色清淨若一切智智清淨無二無二分無別無斷故名無二性從般若清淨者亦有二義一以般若照一切法知本淨故二者亦是性無二故義同上引般若清淨則色清淨遍歷諸法略舉八十餘科謂五蘊十二入十八界四諦十二緣六波羅蜜乃至菩提涅槃皆如色說故萬法本淨萬法淨者下拂其淨相夫言淨者顯法本無生性寂諸相故名為淨豈待蕩蕩無物方稱淨耶非但事無非為真淨見真本淨事為非淨亦是相待能所未忘安得稱淨故真善知識令看淨門云性本清淨淨無淨相方見我心即斯義矣故淨名云垢淨為二見垢實性則無淨相離於見相是為入不二法門也下經云若有見正覺解脫離諸漏不著一切世彼非證道眼若有知如來體相無所有修習得明了是人疾作佛實相般若下釋經身字身有三義謂體依聚義今實相般若則法身之體觀照般若同報身之依化身名聚淺故不說則眷屬般若亦得名身同聚義故即得神通名無礙光普隨現八通用智俱故無礙隨現即得辨才名善入離垢淵九入法之深離說之垢即得智光名一切佛法清淨藏十智照佛法淨所知障含藏衆德如是等十千法門皆得通達二如是下結中明歷事增進故云十千通達之言釋前即得爾時大威光童子承佛威力為諸眷屬而說頌言不可思議億劫中導世明師難一遇此土衆生多善利而今得見第二佛第三爾時下讚德勸詣文分為二初說偈後偈益偈中分三初一偈歎希慶遇佛身普放大光明色相無邊極清淨如雲充滿一切土處處稱揚佛功德光明所照咸歡喜衆生有苦悉除滅各令恭敬起慈心此是如來自在用出不思議變化雲放無量色光明網十方國土皆充滿此佛神通之所現二有七偈歎佛勝德於中三初三身業一一毛孔現光雲普遍虛空發大音所有幽冥靡不照地獄衆苦咸令滅如來妙音遍十方一切言音咸具演隨諸衆生宿善力此是大師神變用無量無邊大衆海佛於其中皆出現普轉無盡妙法輪調伏一切諸衆生次三語業佛神通力無有邊一切剎中皆出現善逝如是智無礙為利衆生成正覺後一意業汝等應生歡喜心踊躍愛樂極尊重我當與汝同詣彼若見如來衆苦滅發心回向趣菩提慈念一切諸衆生悉住普賢廣大願當如法王得自在三有二偈勸衆同歸諸佛子大威光童子說此頌時以佛神力其聲無礙一切世界皆悉得聞無量衆生發菩提心後諸佛子下偈益可知時大威光王子與其父母并諸眷屬及無量百千億那由他衆生前後圍繞寶蓋如雲遍覆虛空共詣波羅蜜善眼莊嚴王如來所第四時大威光下眷屬同歸其佛為說法界體性清淨莊嚴修多羅世界海微塵等修多羅而為眷屬第五其佛下聞經悟入文分為三初佛為說經二當機獲益三如來讚述今初主經法界體性大方廣也清淨佛也莊嚴即華嚴也有多眷屬者顯此教圓彼諸大衆聞此經已得清淨智名入一切淨方便得於地名離垢光明得波羅蜜輪名示現一切世間愛樂莊嚴得增廣行輪名普入一切剎土無邊光明清淨見得趣向行輪名離垢福德雲光明幢得隨入證輪名一切法海廣大光明得轉深發趣行名大智莊嚴得灌頂智慧海名無功用修極妙見得顯了大光明名如來功德海相光影遍照得出生願力清淨智名無量願力信解藏二彼諸下當機獲益亦有十益既云大衆或一人得一或二三四或具十者威光先證故略不標大衆之言亦已含矣故下佛讚然此十事略為二釋一者如次配於十地十度或取地義或取度義一者達一切法本來清淨名清淨智不取淨相是名方便即初地入證之智也二則二地離破戒垢是所除障照諸善品即戒光明三即忍度忍為上嚴一切愛樂四無剎不入無法不照無見不淨是為精進增廣衆行約地義釋以諸道品燒無盡惑成無邊光五趣向諸行能入俗也禪度增故性能離垢涉俗化物成福德雲不迷實理為光明幢六般若現前名隨入證照深緣起名法海光七功用已遠將入無功為深發趣權實無礙為大莊嚴八見法實性無功而修為極妙見由此智慧復得灌頂故仁王經云後之三地同遣無明同無功用故非灌頂地是灌頂智九顯了藥病是功德海相辨才遍應若月影流光十智圓離障方於佛願而生信解故曰出生故仁王者即教化品中第八名等觀菩薩偈云等觀菩薩二禪王變化法身無量光等九地云慧光開士三禪王十地云灌頂菩薩四禪王後都頌上三地云等慧灌頂三品七除前餘習無明緣無明習相故煩惱二諦理窮一切盡釋曰既牒三地除無明習是故疏云同遣無明非灌頂地下義釋彼經灌頂地者自當第十故云非灌頂地然十地亦用遣無明習無功用智而得灌頂故云是灌頂智二者此上十門隨一一事以立其名未必全將配於地位或通配諸位或復不次以人無量隨詮不同普賢巧說故文含多義時彼佛為大威光菩薩而說頌言善哉功德智慧海發心趣向大菩提汝當得佛不思議普為衆生作依處汝已出生大智海悉能遍了一切法當以難思妙方便入佛無盡所行境已見諸佛功德雲已入無盡智慧地諸波羅蜜方便海大名稱者當滿足已得方便總持門及以無盡辨才門種種行願皆修習當成無等大智慧汝已出生諸願海汝已入於三昧海當具種種大神通不可思議諸佛法究竟法界不思議廣大深心已清淨普見十方一切佛離垢莊嚴衆剎海第三時彼下如來讚述十頌分二前六讚其已具勝德當成極果皆前半已獲後半當證獨第四偈三句是因汝已入我菩提行昔時本事方便海如我修行所淨治如是妙行汝皆悟我於無量一一剎種種供養諸佛海如彼修行所得果如是莊嚴汝咸見廣大劫海無有盡一切剎中修淨行堅固誓願不可思當得如來此神力諸佛供養盡無餘國土莊嚴悉清淨一切劫中修妙行汝當成佛大功德後四偈行齊佛因當如佛證皆三句舉佛行後一句齊佛德然此中述讚望前遇光得益及向大衆所得多有相同義必述上可以意消息之諸佛子波羅蜜善眼莊嚴王如來入涅槃已喜見善慧王尋亦去世大威光童子受轉輪王位遇第三佛文分為六一如來出時前佛滅後等時也彼摩尼華枝輪大林中第三如來出現於世名最勝功德海二彼摩尼下正明現世立斯號者功德海滿無加過也時大威光轉輪聖王見彼如來成佛之相與其眷屬及四兵衆城邑聚落一切人民并持七寶俱往佛所以一切香摩尼莊嚴大樓閣奉上於佛三時大威光下威光往供時彼如來於其林中說菩薩普眼光明行修多羅世界微塵數修多羅而為眷屬四時彼如來下佛為說經見普法故名為普眼以慧為性故曰光明况一眼即十眼融無障礙眼外無法方真普眼以諸緣發見即緣名為根因沒果中緣皆號眼故全色為眼恆見色而無緣全眼為色恆稱見而非我矣見普法者此釋經名而有三義一約所見稱普言普法者一具一切一一稱性同時具足等斯即十眼之內一眼之能經云一切智眼見普門法界故二況一眼者約能見稱普如五眼中佛眼四眼入佛眼皆名佛眼如四河入海無復河名而具海味故金剛經云如來有肉眼不如是世尊如來有肉眼乃至云如來有佛眼不如是世尊如來有佛眼今十眼亦耳隨一具十而諸教唯佛眼具五餘四則無今因果之人皆許一眼即具十眼不唯後勝具於前劣若一不具十則非普眼言十眼者離世間品說謂一肉眼二天眼三慧眼四法五佛六智七光明八出生死九無礙十一切智其融無礙則有二義一者成上十眼無礙二者成下即能所無礙三眼外無法下約心境互放方稱普眼此上標也諸緣下別釋所以如大乘法師以九緣發識眼根名眼餘不名眼今則例之眼根能發識眼根得名眼空明能發識亦得同名眼餘六例然以緣起之法各有有力無力相成立故次云因沒果中緣皆號眼者九緣並是因見色得名眼九緣皆見色沒果同名眼以皆全有力故言全色為眼恆見色者色是所緣之境眼是能緣之根今即是眼故無緣也全眼為色者眼是我能見今全為色正見之時即非我也此即賢首之意下更有言云非我唯於情想無緣絶於貪求收萬像於目前全十方於眼際是以緣義無盡隨見見而不窮物性叵思應法法而難凖法普即眼普義通乃見通體之自隱隱照之遂重重然後窮十方於眼際鏡空有而皎明收萬像以成身顯事理而通徹也爾時大威光菩薩聞此法已得三昧名大福德普光明得此三昧故悉能了知一切菩薩一切衆生過現未來福非福海五爾時下威光得益五度皆福定為最大寂無不照名普光明得此已下彰其定用福非福言略有二意一福即是善非福是罪二福即是相非福即性雙了性相故經云福德即非福德性此即深也了一切者廣也故有海言遇於初佛但得十者自力未勝故次佛十千者道轉深故今唯一者道已滿故五度皆福者然六波羅蜜攝成二嚴總有兩意一前五為福後一為智二者前三唯福後一唯智進定通二成前為福成後屬智今以經中云得三昧名大福德故用前門福即是善者即百論相攝罪福品意故論引金剛福尚應捨何况非福以善捨惡以無相智捨福則善惡兩忘今云了者一了其相二了體空三了無礙二福即是相下即以世諦說福諦一義中福亦不存故引金剛如來說福德相隨俗說也即非福德相當體空寂是名福德相結正義也若福即非福方名真福若以福為福非真福也有人以第三句亦約俗諦非得經意時彼佛為大威光菩薩而說頌言善哉福德大威光汝等今來至我所愍念一切衆生海發勝菩提大願心汝為一切苦衆生起大悲心令解脫當作群迷所依怙是名菩薩方便行若有菩薩能堅固修諸勝行無厭怠最勝最上無礙解如是妙智彼當得福德光者福幢者福德處者福海者普賢菩薩所有願是汝大光能趣入第六時彼佛下如來記別十一偈分四初四顯具菩提心謂初有願次偈有悲四有智光三兼精進通䇿三心故菩提心圓當成妙智汝能以此廣大願入不思議諸佛海諸佛福海無有邊汝以妙解皆能見汝於十方國土中悉見無量無邊佛彼佛往昔諸行海如是一切汝咸見若有住此方便海必得入於智地中此是隨順諸佛學决定當成一切智汝於一切剎海中微塵劫海修諸行一切如來諸行海汝皆學已當成佛次四上入佛境如汝所見十方中一切剎海極嚴淨汝剎嚴淨亦如是無邊願者所當得三有一偈示其果相得同諸佛今此道場衆會海聞汝願已生欣樂皆入普賢廣大乘發心回向趣菩提無邊國土一一中悉入修行經劫海以諸願力能圓滿普賢菩薩一切行四有二偈讚其現能利他住普賢行諸佛子彼摩尼華枝輪大林中復有佛出號名稱普聞蓮華眼幢遇第四佛文分為四一佛出人中二天王就供三如來說法四得益還歸今初約相目類青蓮約德心無所染相德高顯名稱外彰摧邪衆歸故曰幢也是時大威光於此命終生須彌山上寂靜寶宮天城中為大天王名離垢福德幢二是時下天王就供中二先明菩薩行進報處天宮此城即是品初所列之一共諸天衆俱詣佛所雨寶華雲以為供養後知佛可歸持華往供時彼如來為說廣大方便普門遍照修多羅世界海微塵數修多羅而為眷屬三時彼下說經方便之言略有三種一無實權施曲巧方便也二理本無言假言而言大方便也三權實無滯亦大方便事理皆照方曰普門一無實者如無三乘說有三乘虗指三車出門不獲是也二理本無言者亦法華云諸法寂滅相不可以言宣以方便力故為五比丘說是也三權實無滯者即涉有未始迷空觀空不遺於事即如來方便知見波羅蜜皆已具足時天王衆聞此經已得三昧名普門歡喜藏以三昧力能入一切法實相海獲是益已從道場出還歸本處四時天王下得益還歸中聞上普門正受安住法喜無盡故名曰藏由此證達諸實相海此劫之中十須彌塵數如來今但云四又無結會古今現證得益等者經來未盡故也若結會者應云爾時威光菩薩者毗盧遮那是等所信因果會竟音釋簣求位切土籠也幹古汗切干去聲能事也劣力輟切音埒鄙也戚七迹切音戚憂也踊躍踊尹竦切音勇躍弋灼切音藥跳也怙侯古切胡去聲依也
