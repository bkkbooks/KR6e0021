body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述爾時海慧自在神通王菩薩摩訶薩承佛威力普觀一切道場眾海即說頌言十爾時下說偈讚佛中十菩薩各別說偈即為十𫨻就初海慧頌中歎佛身座諸佛所悟悉已知如空無礙皆明照光徧十方無量土處於眾會普嚴潔初五歎佛身具德一讚智慧如來功德不可量十方法界悉充滿普坐一切樹王下諸大自在共雲集二讚功德佛有如是神通力一念現於無盡相如來境界無有邊各隨解脫能觀見三讚神通如來往昔經劫海在於諸有勤修行種種方便化眾生令彼受行諸佛法四讚因深毘盧遮那具嚴好坐蓮華藏師子座一切眾會皆清淨寂然而住同瞻仰五讚果勝摩尼寶藏放光明普發無邊香𦦨雲無量華纓共垂布如是座上如來坐種種嚴飾吉祥門恒放燈光寶𦦨雲廣大熾然無不照牟尼處上增嚴好種種摩尼𦂶麗牕妙寶蓮華所垂飾恒出妙音聞者悅佛坐其上特明顯寶輪承座半月形金剛為臺色𦦨明持髻菩薩常圍繞佛在其中最光耀種種變化滿十方演說如來廣大願一切影像於中現如是座上佛安坐後五歎所坐嚴麗此眾既從座現故多歎座文並可知爾時雷音普震菩薩摩訶薩承佛威力普觀一切道場眾海即說頌言世尊往集菩提行供養十方無量佛善逝威力所加持如來座中無不覩香𦦨摩尼如意王填飾妙華師子座種種莊嚴皆影現一切眾會悉明矚佛座普現莊嚴相念念色類各差別隨諸眾生解不同各見佛坐於其上寶枝垂布蓮華網華開踊現諸菩薩各出微妙悅意聲稱讚如來坐於座第二雷音菩薩十頌歎座及地文分三別初四直歎座可知佛功德量如虛空一切莊嚴從此生一一地中嚴飾事一切眾生不能了金剛為地無能壞廣博清淨極夷坦摩尼為網垂布空菩提樹下皆周徧其地無邊色相殊真金為末布其中普散名華及眾寶悉以光瑩如來座次三歎於場地即轉顯座嚴於中初總顯因深德廣故嚴事難思金剛下別顯末後一句結瑩寶座地神歡喜而踊躍剎那示現無有盡普興一切莊嚴雲恒在佛前瞻仰住寶燈廣大極熾然香𦦨流光無斷絕隨時示現各差別地神以此為供養十方一切剎土中彼地所有諸莊嚴今此道場無不現以佛威神故能爾後三偈歎地上之嚴於中前二地神興供嚴後一佛力展轉嚴爾時眾寶光明髻菩薩摩訶薩承佛威力普觀一切道場眾海即說頌言世尊往昔修行時見諸佛土皆圓滿如是所見地無盡此道場中皆顯現世尊廣大神通力舒光普雨摩尼寶如是寶藏散道場其地周迴悉嚴麗如來福德神通力摩尼妙寶普莊嚴其地及以菩提樹遞發光音而演說寶燈無量從空雨寶王間錯為嚴飾悉吐微妙演法音如是地神之所現寶地普現妙光雲寶炬𦦨明如電發寶網遐張覆其上寶枝雜布為嚴好第三眾寶光髻菩薩讚中獨讚場地殊異德十頌分二前五德用圓備汝等普觀於此地種種妙寶所莊嚴顯示眾生諸業海令彼了知真法性普徧十方一切佛所有圓滿菩提樹莫不皆現道場中演說如來清淨法隨諸眾生心所樂其地普出妙音聲如佛座上所應演一一法門咸具說其地恒出妙香光光中普演清淨音若有眾生堪受法悉使得聞煩惱滅一一莊嚴悉圓滿假使億劫無能說如來神力靡不周是故其地皆嚴淨後五法化流通言如佛座上所應演者九會五周之文一化隨宜之說已具演於場地之中九會五周之文等者指此上一經一化隨宜則始從鹿苑終至雙林一乘三乘場地頓演何况如來言說之耶爾時大智日勇猛慧菩薩摩訶薩承佛威力普觀一切道場眾海即說頌言世尊凝睟處法堂炳然照耀宮殿中隨諸眾生心所樂其身普現十方土第四大智日頌歎佛所處宮殿十頌分二初一總明次𫨻讚處彰人故此偈標人顯處凝者嚴整之貌晬者視也謂肅然而視如來宮殿不思議摩尼寶藏為嚴飾諸莊嚴具咸光耀佛坐其中特明顯摩尼為柱種種色真金鈴鐸如雲布寶階四面列成行門闥隨方咸洞啟妙華繒𦂶莊嚴帳寶樹枝條共嚴飾摩尼瓔珞四面垂智海於中湛然坐摩尼為網妙香幢光𦦨燈明若雲布覆以種種莊嚴具超世正知於此坐後九別明於中二前四明宮殿體攝眾德即廣其前半後五明妙用自在即廣其後半今初初一宮殿雖耀佛坐增明即廣前炳然照耀宮殿中也次二頌略辯七嚴結以智海廣上凝睟處法堂也謂內持寶柱簷垂金鈴外列門階上羅華帳寶樹交暎寶瓔周垂為七嚴也闥小門也洞達也如雲布者重重無量次次相承也上云凝睟則目視不瞬特由內無識浪故云智海湛然次一頌羅以寶網列以香幢布以熖明覆以嚴具結云超世即廣上世尊處法堂也光如雲布者若彩雲向日上下齊明也十方普現變化雲其雲演說徧世間一切眾生悉調伏如是皆從佛宮現後五中一羅身雲以調生正顯前文現十方土摩尼為樹發妙華十方所有無能匹三世國土莊嚴事莫不於中現其影二寶樹現三世之嚴處處皆有摩尼聚光𦦨熾然無量種門牖隨方相間開棟宇莊嚴極殊麗三略舉多嚴如來宮殿不思議清淨光明具眾相一切宮殿於中現一一皆有如來坐四即上諸嚴卷攝多嚴重重佛坐如來宮殿無有邊自然覺者處其中十方一切諸眾會莫不向佛而來集五結歎無盡主伴雲會爾時不思議功德寶智印菩薩摩訶薩承佛威力普觀一切道場眾海即說頌言佛昔修治眾福海一切剎土微塵數神通願力所出生道場嚴淨無諸垢第五不思議菩薩通讚場樹自在德十頌分二初一總顯謂宿因願力深廣難思神通現緣生果嚴淨如意珠王作樹根金剛摩尼以為身寶網遐施覆其上妙香氛氳共旋繞樹枝嚴飾備眾寶摩尼為榦爭聳擢枝條密布如重雲佛於其下坐道場道場廣大不思議其樹周迴盡彌覆密葉繁華相庇映華中悉結摩尼果一切枝間發妙光其光徧照道場中清淨熾然無有盡以佛願力如斯現摩尼寶藏以為華布影騰暉若𦂶雲帀樹垂芳無不徧於道場中普嚴飾後九別顯分三初五歎樹具德嚴場於中初二身榦森聳次二枝葉蔭暎後一華果芬輝汝觀善逝道場中蓮華寶網俱清淨光𦦨成輪從此現鈴音鐸響雲間發二有一偈歎場地蓮網謂蓮華布地則下轉光輪寶網羅空則雲間響發十方一切國土中所有妙色莊嚴樹菩提樹中無不現佛於其下離眾垢道場廣大福所成樹枝雨寶恒無盡寶中出現諸菩薩悉往十方供事佛諸佛境界不思議普令其樹出樂音如昔所集菩提道眾會聞音咸得見三有三偈歎樹自在初一收入後二出生爾時百目蓮華髻菩薩摩訶薩承佛威力普觀一切道場眾海即說頌言一切摩尼出妙音稱揚三世諸佛名彼佛無量神通事此道場中皆現覩眾華競發如纓布光雲流演徧十方菩提樹神持向佛一心瞻仰為供養摩尼光𦦨悉成幢幢中熾然發妙香其香普熏一切眾是故其處皆嚴潔蓮華垂布金色光其光演佛妙聲雲普蔭十方諸剎土永息眾生煩惱熱菩提樹王自在力常放光明極清淨十方眾會無有邊莫不影現道場中寶枝光𦦨若明燈其光演音宣大願如佛往昔於諸有本所修行皆具說樹下諸神剎塵數悉共依於此道場各各如來道樹前念念宣揚解脫門世尊往昔修諸行供養一切諸如來本所修行及名聞摩尼寶中皆悉現道場一切出妙音其音廣大徧十方若有眾生堪受法莫不調伏令清淨第六百目菩薩頌中雙歎場樹備德自在法化宣流前九偈各一門如來往昔普修治一切無量莊嚴事十方一切菩提樹一一莊嚴無量種後一結嚴周遍並顯可知第七金熖頌歎佛十力功德一頌一力下諸經文屢明十力是佛不共之德佛佛等有菩薩緣此發心梵行品云復應修習一一力中有無量義悉應諮問故不可不知下諸經文屢明十力下䟽文分三初立章所由即七門中初門也恐當宗責其名相故總出斯意文有五意一經文多故解斯一節餘處例然二是不共德三佛佛等有此二是瑜伽二門四菩薩緣此𤼵心即十住品不識十力如何𤼵心五梵行令觀不了十力非真梵行然大般若五十三顯揚第四對法第十四廣辯今略以七門分別一立意二釋名三自性四作業五次第六差別七釋文然了其名則知作業對文料揀差別易見故將作業差別并釋別名並於釋文中顯今初立意者智論意云顯佛大人有真實力令外道心伏二乘希向菩薩倣之能成辦大事終獲其果故須辯之如來唯一諸法實相智力此力有十種用故說為十謂於十境皆委悉正知故由時品類相續分別有無量力度人因緣故但說十足辯其事謂以初力知可度不可度次業力知有障無障以定力知味著不味著以根力知智多少以欲力知所樂以性力知深心所趣以至處力籌量眾生解脫門以宿命力分別先所從來以生死力分別生處好醜以漏盡力知眾生得湼槃佛以此十度生審諦故但說十由時下三成多所以即瑜伽中分別門然瑜伽亦說七門與此小異一自性二分別三不共四平等五作業六次第七差別前有二門今有分別云何分別瑜伽云由三分別當知無量一由時分分別謂墮三世一切所知隨悟入故二由品類分別一切有為自相共相一切行相隨悟入故三由相續分別謂諸有情各各差別一切相續一切事義隨悟入故第二釋名初總後別今初總名力者能摧怨敵義不可屈伏義故說名力瑜伽云與一切種饒益一切有情功能具相應故畢竟勝伏一切魔怨大威力故說名為力對法云善除眾魔善記問論故十名力十者是數帶數釋也別名至文當釋三自性者瑜伽五十七云佛具知根慧根為體對法論云若定若慧及彼相應諸心心所為性菩薩地總以五根為性統其文義應具六種一最勝體故決擇分中慧根為性二引生體對法兼定三剋實體菩薩地云五根為性由慧勝故且說十力慧為自性所以但言處非處等智力不言信進等力四相應體對法兼取相應心法四蘊為性五眷屬體五蘊為體定共道共無漏色等助為體故此雖無文理必應爾遮犯戒垢助摧怨故六依此經融一切法以為其性無礙法界理應爾故四作業者即是辯相至文當顯五次第者諸文或有前却各有所由此文所列次第與十住全同淨行品則界在解前梵行品禪定解脫當其第三宿命居天眼之後餘同此次瑜伽四十九及智論二十七亦禪居第三餘同此次且依論明次第者智論云初力為總餘九為別於初力中分別有九故初一力通知萬法下九展轉開之謂初令知因緣果報故起業力次業煩惱故縛淨禪定解脫故解令去縛就解次根有利鈍鈍者為有造業利者為不生故集業由善惡二欲成上下根此二種欲由二種性以有種種性因緣故行二種道謂善道惡道次知其過去審彼未來次以方便壞其因緣果報相續故說漏盡瑜伽有多門次第廣如第五十說上來依論次第而今禪居第七者二論梵行為對自業有離欲不離欲故禪居第三此經十住為對遍趣行有清淨不清淨故居第七若習欲成性即界居欲後若由性起欲則界居欲前若執常者先說宿住若為執斷先辯其天眼餘無別理故經論皆定瑜伽有下指廣在餘言多門者論云如來初成正覺即頓證得十力後方次第現前謂初起處非處力觀察諸法建立一切無倒因果既觀察已次起自業智力謂有希求欲界勝果方便為說令離不善故若有希求世間離欲之道教授令趣禪定功德故起定力若諸有情希求出世離欲法者為說出世之道謂於此中先起根力觀根勝劣次觀彼根為先所有意樂次觀意樂為先所有隨眠既知根欲及隨眠已次令於所緣中而得趣入次由於所緣趣入門加行攝住心已淨修行已為說中道今離斷常謂宿命除常天眼除斷次令永斷一切煩惱及諸習氣起漏盡力更有異門次第恐繁不引六差別者謂此十力展轉相望亦有差別亦無差別至文當明七釋文然此經宗異義皆融攝故一一力中具攝十力乃至包盡法界是以宿命乃云智包三世天眼則見盡法界非唯見盡佛眼如空即是法界非唯智包亦能毛孔頓現業力即觀法性豈唯但是有為約門有殊故他宗不壞爾時金𦦨圓滿光菩薩摩訶薩承佛威力普觀一切道場眾海即說頌言佛昔修習菩提行於諸境界解明了處與非處淨無疑此是如來初智力第一偈即處非處智力謂善因樂果斯有是處善因苦果無有是處惡因苦果等例上可知處者建立義依義起義能建立果與果為依能起果法故立處名於此正知故名智力第一偈下一釋名即因果相當名之為處若不相當名為非處其作業者即如實知因之與果及能降伏無因惡因種種諍論既遍知已可度者度不可度者為作因緣文中上半往因下半顯智力於諸境界正解明了即辯此力通知一切法也如昔等觀諸法性一切業海皆明徹如是今於光網中普徧十方能具演第二偈即過未現在業報智力瑜伽名自業智力今言一切業者謂於三世中善等三業及順現等皆名自業於自所作受用果業如實知故與初何別若正了知所造善等業感愛等果此由初力若了能造善惡等業感愛等果是自業力文中上半往因下半現果與初何別下次辯差別也初力約所造自業約能造此猶未了云何能所謂以人望業已殺等竟此教等業必招於果名為所造此人若行於殺必墮地獄此名能造即上自業各隨善惡而感果故即是作業往劫修治大方便隨眾生根而化誘普使眾會心清淨故佛能成根智力第三偈即根勝劣智力謂信等五根此輭中上名為勝劣於此正知及能於彼如應如宜為說正法即是作業偈中三句往因一句今果及能於彼下二明作業其於此正知向上釋智力字向下釋能作業下皆凖之如諸眾生解不同欲樂諸行各差別隨其所應為說法佛以智力能如是四即種種解智力亦名勝解謂若從他起信以為其先或觀諸法以為其先成輭中上愛樂名種種勝解亦名為欲欲謂信喜好樂如或貪財利或好名聞好定好慧種種不同如來正知令捨不淨增長於淨此與前根何異根約宿成智有多少解約現起好樂不同論云若照諸根為先彼彼法中種種意樂是根智力若正分別意樂差別是解智力在文可見此與前根下三辯差別此有二解一約宿現起別故智論云以二種欲作上下根因緣故十地論中別歎根欲如有根無欲能解不樂有欲無根雖聞不解二論云下即瑜伽揀依根起樂即是根力正分別欲樂即名解力普盡十方諸剎海所有一切眾生界佛智平等如虛空悉能顯現毛孔中五即種種界智力界即性也謂或一二三四五乘性等或貪瞋癡等分行等乃至八萬四千行名種種性性即種子解即現行故智論云性名積集相又九十云性內欲外用性作業必受果報欲或不爾瑜伽云若照勝解所起相似種子此由解力若照即彼種子差別由界智力瑜伽云下應有問言勝解力中亦知彼解當成此種與此界性有何別耶故䟽答云照解起種即是解力但照種子即是界力然智度論即明種現內外之殊瑜伽即解兼種現性唯種子若習欲成性復云何別欲唯大地一數性通諸數即寬陿不同也智論云習欲成性性名深心事欲名隨緣起若習欲成性下二解妨此對智論若依性起欲義如前說若習欲成性則欲前性後復云何別故以寬狹通之則欲狹性寬欲唯大地一者即俱舍頌通大地十法云受想思觸欲慧念與作意勝解三摩地遍於一切心今即十中第五欲也性通諸者既有貪等八萬四千心所則廣即心所次引智論帖成若性即種子與根何異根唯信等優劣性通善惡不同以信等望果寬長能生人天三乘聖道為道之根三善根但是翻對不望果義尚不名根況性通於惡豈得同耶若性即種子下對根辯異於中有二先約寬狹正通以信等下通於伏難難云性既寬通何不名根答云特由寬故不得名根以信等望果三乘聖道有勝用增上可得名根性無此能安得名根三善根下舉况以成三善根是善尚不得名根性兼貪嗔等何得名根三善根者但翻三不善根立三善根不同信等體相昭著故不立為根且依一義若二十二根則所望不同耳根約勝用增上性約不改偈云悉能顯現毛孔中者謂非唯佛智如空包納眾生之性毛孔內空亦現眾生之界耳謂非唯佛智者此有二種超勝之相尋常界力但以佛智能知能所不同今云佛智平等如虛空則眾生之界皆是如來智中之物此為一勝二者智能包納猶是智類今毛孔頓現則細色能𭣣良以色性智性融無礙故以性融相為華嚴宗之界力也一切處行佛盡知一念三世畢無餘十方剎劫眾生時悉能開示令現了六即一切至處道智力論名遍趣行智力遍即一切趣即至也行即道也謂諸眾生種種所行若出離行不出離行各能至果如行有漏行生五道中行無漏行至涅槃果名遍趣行若出離行不出離行標也如行有漏下別顯瑜伽又云如貪行者修不淨觀等名遍趣行又趣一切五趣之門或諸外道沙門婆羅門各各異見品類諸行或此世他世無罪趣行名遍趣行名下之事即為作業若知如是種類行跡趣入此由界智若知即彼行跡一切品類如是行跡能令雜染如是行跡能令清淨此由遍趣智力若知如是下次辯差別先對界辯異意云從性趣行即屬性攝但觀其行即屬趣行初力處對非處此中但明至處又初力指因為得果之處此約果是酬因之處故不同也初力下對初力辯異有二義可知然對他辯自自亦作業經中初句總標次一念即能知迅速下十二字所知時處後一句委悉開示禪定解脫力無邊三昧方便亦復然佛為示現令歡喜普使滌除煩惱暗七即禪定解脫三昧智力淨行品中加於染淨通漏無漏故佛皆善知及知依此所得諸果故名智力七禪定下初釋名瑜伽名為淨慮解脫等持等至智力佛皆善知下結成智力即為作業此與自業智力何別若了諸有能修諸定即彼能入而非所餘名自業力若了依如是靜慮等定現三神變無倒教授所化有情此由靜慮智力此與下二辯差別此有問云自業有三一罪二福三不動不動業即是禪定與此何別亦應答言業通定散今唯約定居然不同今䟽所通是瑜伽意若唯知定體即是自業知定體用便是禪力偈中上半所知下半善用言佛為示現者示其諸定現三神變令有情喜使滌煩惱即令去染而得清淨佛智無礙包三世剎那悉現毛孔中佛法國土及眾生所現皆由隨念力八即宿住隨念智力謂過去境本生本事住宿世故名為宿住於此宿住而起隨念念俱行智名宿住智力瑜伽云若知前際隨念一切趣因是遍趣力若知前際名姓苦樂等事名宿住力八宿住力中初釋名兼顯作業瑜伽云下辯差別謂有問言宿住智中知彼修因則與遍趣何異答中有三初依瑜伽正答謂唯知因是遍趣行兼能知果即宿住攝名姓苦樂者瑜伽知過去所有自體有八言說句一如是名二生類三種姓四飲食五受苦樂六長時七久住八壽量邊際今但列三等取餘五此與智論云何會釋謂彼論云但知宿命所經不知諸業因緣相續但名為通凡夫亦得若兼知業因緣相續則名為明二乘能得若知上二無量無邊則名為力斯則力亦知因矣故應通云若但知因是遍趣力若雙知者即宿住力瑜伽為對遍趣之因故但云果耳瑜伽為對下出瑜伽宿住無有因意若以等字𠬧之於理可也文中初句標能念智包三世者三世全在佛智之中況於隨念不知三世從門別故但云宿住剎那悉現即包現之時極促現毛孔中即能現之處至微第三句即所現所念之事廣第四句結歸智力非唯能念亦能現也佛眼廣大如虛空普見法界盡無餘無礙地中無等用彼眼無量佛能演九天眼智力獨此從所依以立名也若從境者瑜伽名生死智力謂死此生彼墮善惡趣大小好醜皆能正知知前際生死名為宿住要知後際得此力名今文乃云佛眼者若約五眼餘眼在佛皆佛眼故此非經宗今依十眼佛眼能見如來十力故故此一力即攝十力舉一為例餘九皆然五眼十眼如離世間品文中初句體大次句用廣次句用勝以無等故後句結其甚深故唯佛能演既言普見法界非局未來約宗別故於未來門普見法界也一切眾生具諸結所有隨眠與習氣如來出現徧世間悉以方便令除滅十漏盡智力於自解脫無惑無疑亦知眾生漏盡涅槃於此正知名為智力文中初二句所斷諸結即現行隨眠即種子習氣即餘習二乘不能盡習亦不能盡他漏故不名力後半顯佛能滅文中下一釋文以漏盡無濫故不辯差別餘習有四謂貪嗔癡慢貪習如迦留陀夷嗔習如身子癡習如周利槃特慢習如畢陵伽婆蹉曾無教說見疑習疑見有習不見理故通說或有耳然上十力智即是體力即是用然智即力更無別性然上十力下三重以諸門料揀先總名但云智力即持業釋若云十力即帶數釋此中宿住隨念相應智力是鄰近釋自餘從境皆依主釋設天眼從所依亦依主釋若宿住是境隨念相應智力亦依主釋此中宿住下會別名宿住名鄰近者智近於念故言宿住亦依主者宿住境之隨念故然此十力望於自事各於自事中大如水能淨如火能燒各有自力若約總攝初力為大若約辦得湼槃漏盡為大若以無礙解脫而為根本則平等平等然此十力下辯功能可知十力畧義亦已釋周更欲廣引恐翳玄理音釋毘盧遮那此云徧一切處𦂶麗𦂶音起繒𦂶也麗郎計切美麗也填飾填音田填塞也飾音式粧飾也凝睟睟雖遂切凝睟嚴整潤澤貌炳然炳補永切明也繒慈陵切帛也棟多貢切屋脊木也氛氳氛敷文切氳於云切氛氳香氣也
