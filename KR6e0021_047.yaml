鎧胄車輿非一種隨其所有相差別莫不皆於水中現而水本自無分別菩薩三昧亦如是三有二頌水現四兵喻喻菩薩海印現像德海中有神名善音其音普順海衆生所有語言皆辨了令彼一切悉歡悅彼神具有貪恚癡猶能善解一切音況復總持自在力而不能令衆歡喜四有二頌善音巧辨喻喻菩薩總持巧說德有一婦人名辨才父母求天而得生若有離惡樂真實入彼身中生妙辨彼有貪欲瞋恚癡猶能隨行與辨才何況菩薩具智慧而不能與衆生益五二頌女授辨才喻喻授法益生德譬如幻師知幻法能現種種無量事須示作日月歲城邑豐饒大安樂幻師具有貪恚癡猶能幻力悅世間況復禪定解脫力而不能令衆歡喜六譬如幻師下二頌幻師巧術喻喻不思議解脫德天阿修羅𩰖戰時修羅敗衄而退走兵仗車輿及徒旅一時竄匿莫得見彼有貪欲瞋恚癡尚能變化不思議況住神通無畏法云何不能現自在七二頌修羅隱形喻喻勝通隱顯德釋提桓因有象王彼知天主欲行時自化作頭三十二一一六牙皆具足一一牙上七池水清淨香潔湛然滿一一清淨池水中各七蓮華妙嚴飾彼諸嚴飾蓮華上各各有七天玉女悉善技藝奏衆樂而與帝釋相娛樂彼象或復捨本形自化其身同諸天威儀進止悉齊等有此變現神通力彼有貪欲瞋恚癡尚能現此諸神通何況具足方便智而於諸定不自在八五頌象王隨變喻喻定用自在德如阿修羅變化身蹈金剛際海中立海水至深僅其半首共須彌正齊等彼有貪欲瞋恚癡尚能現此大神通況伏魔怨照世燈而無自在威神力九二頌修羅大身喻喻法界身雲德同於上文主伴嚴麗天阿修羅共戰時帝釋神力難思議隨阿修羅軍衆數現身等彼而與敵諸阿修羅發是念釋提桓因來向我必取我身五種縛由是彼衆悉憂悴帝釋現身有千眼手持金剛出火焰被甲持仗極威嚴修羅望見咸退伏彼以微小福德力猶能摧破大怨敵何況救度一切者具足功德不自在十有四頌帝釋破怨喻喻降伏衆魔德忉利天中有天鼓從天業報而生得知諸天衆放逸時空中自然出此音一切五欲悉無常如水聚沫性虛僞諸有如夢如陽焰亦如浮雲水中月放逸為怨為苦惱非甘露道生死徑若有作諸放逸行入於死滅大魚口世間所有衆苦本一切聖人皆厭患五欲功德滅壞性汝應愛樂真實法三十三天聞此音悉共來升善法堂帝釋為說微妙法咸令順寂除貪愛彼音無形不可見猶能利益諸天衆況隨心樂現色身而不濟度諸羣生十一忉利天下六頌天鼓說法喻況菩薩以無功用現身說法德天阿修羅共𩰖時諸天福德殊勝力天鼓出音告其衆汝等宜應勿憂怖諸天聞此所告音悉除憂畏增益力時阿修羅心震懼所將兵衆咸退走甘露妙定如天鼓恆出降魔寂靜音大悲哀愍救一切普使衆生滅煩惱十二有三頌天鼓安慰喻況菩薩慈音除惱德帝釋普應諸天女九十有二那由他令彼各各心自謂天王獨與我娛樂如天女中身普應善法堂內亦如是能於一念現神通悉至其前為說法帝釋具有貪恚癡能令眷屬悉歡喜況大方便神通力而不能令一切悅十三有三頌天王普應喻喻普應悅機德他化自在六天王於欲界中得自在以業惑苦為網繫縛一切諸凡夫彼有貪欲瞋恚癡猶於衆生得自在況具十種自在力而不能令衆同行十四二頌魔繫愚夫喻喻攝生同行德三千世界大梵王一切梵天所住處悉能現身於彼坐演暢微妙梵音聲彼住世間梵道中禪定神通尚如意況出世間無有上於禪解脫不自在十五二頌梵王殊現喻況菩薩解脫自在德摩醯首羅智自在大海龍王降雨時悉能分別數其滴於一念中皆辨了無量億劫勤修學得是無上菩提智云何不於一念中普知一切衆生心十六魔醯下二頌自在數滴喻況菩薩一念普知德衆生業報不思議以大風力起世間巨海諸山天宮殿衆寶光明萬物種亦能興雲降大雨亦能散滅諸雲氣亦能成熟一切穀亦能安樂諸羣生風不能學波羅蜜亦不學佛諸功德猶成不可思議事何況具足諸願者十七三頌大風成事喻喻大願宿成德男子女人種種聲一切鳥獸諸音聲大海川流雷震聲皆能稱悅衆生意況復知聲性如響逮得無礙妙辨才普應衆生而說法而不能令世間喜十八二頌衆聲悅意喻喻四辨悅機德海有希奇殊特法能為一切平等印衆生寶物及川流普悉包容無所拒無盡禪定解脫者為平等印亦如是福德智慧諸妙行一切普修無厭足十九二頌大海包含喻喻禪慧普修德大海龍王遊戲時普於諸處得自在二十大海龍王下二十四頌半龍王游戲喻喻菩薩游戲神變德文分為二初二十二頌半明龍王大用不同後二頌正明舉劣顯勝前中初半偈總標興雲充遍四天下其雲種種莊嚴色第六他化自在天於彼雲色如真金化樂天上赤珠色兜率陀天霜雪色夜摩天上琉璃色三十三天碼瑙色四王天上玻瓈色大海水上金剛色緊那羅中妙香色諸龍住處蓮華色夜叉住處白鵝色阿修羅中山石色單越處金焰色閻浮提中青寶色餘二天下雜莊嚴隨衆所樂而應之餘頌別顯於中四初四偈半雲色不同喻菩薩身雲各異又復他化自在天雲中電曜如日光化樂天上如月光兜率天上閻浮金夜摩天上珂雪色三十三天金焰色四王天上衆寶色大海之中赤珠色緊那羅界琉璃色龍王住處寶藏色夜叉所住玻瓈色阿修羅中碼瑙色單越境火珠色閻浮提中帝青色餘二天下雜莊嚴如雲色相電亦然次有四頌電光差別喻菩薩光明等殊第三偈云寶藏色者梵云室利揭娑此云勝藏勝藏即寶名也閻浮提中帝青色者梵云天帝火焰摩尼色亦珠寶名也他化雷震如梵音化樂天中大鼓音兜率天上歌唱音夜摩天上天女音於彼三十三天上如緊那羅種種音護世四王諸天所如乾闥婆所出音海中兩山相擊聲緊那羅中簫笛聲諸龍城中頻伽聲夜叉住處龍女聲阿修羅中天鼓聲於人道中海潮聲三有三頌半雷聲不等喻菩薩三昧多種他化自在雨妙香種種雜華為莊嚴化樂天雨多羅華曼陀羅華及澤香兜率天上雨摩尼具足種種寶莊嚴髻中寶珠如月光上妙衣服真金色夜摩中雨幢幡蓋華鬘塗香妙嚴具赤真珠色上妙衣及以種種衆妓樂三十三天如意珠堅黑沉水栴檀香金雞羅多摩等妙華香水相雜雨護世城中雨美膳色香味具增長力亦雨難思衆妙寶悉是龍王之所作又復於彼大海中霔雨不斷如車軸復雨無盡大寶藏亦雨種種莊嚴寶緊那羅界雨瓔珞衆色蓮華衣及寶婆利師迦末利香種種樂音皆具足諸龍城中雨赤珠夜叉城內光摩尼阿修羅中雨兵仗摧伏一切諸怨敵單越中雨瓔珞亦雨無量上妙華弗婆瞿耶二天下悉雨種種莊嚴具閻浮提雨清淨水微細悅澤常應時長養衆華及果藥成熟一切諸苗稼四有十頌所雨不一喻菩薩說法多門言曼陀羅者此云悅意澤香即塗香也雞羅多摩者雞羅此云華蘂多摩此云天上華謂此香是天華蘂所作故也婆利師迦者此云雨時生華末利香即華名其色猶黃金如是無量妙莊嚴種種雲電及雷雨龍王自在悉能作而身不動無分別彼於世界海中住尚能現此難思力況入法海具功德而不能為大神變第二如是無量下二頌正舉劣顯勝謂娑竭羅龍於六欲天等總十五處現斯作用而身不動搖心無分別但由業報之力現斯自在菩薩亦爾住無功用不動不思於十方界應現多種亦以菩薩功德之力隨機現殊此就喻意顯勝可知彼諸菩薩解脫門一切譬喻無能顯我今以此諸譬喻略說於其自在力第三彼諸一頌結說難思前半非喻能喻後半結上略說引諸喻者略有二意一顯菩薩自在不同二貴令衆生起信且江南之人不信千人氊帳河北之者多疑萬斛之舟皆耳目不暨故耳所以或舉目擊或據具縛之人自在若斯菩薩之用固當無惑今猶疑者豈不傷哉且江南之人者即顏之推家訓歸心篇中之語也第一智慧廣大慧真實智慧無邊慧勝慧及以殊勝慧如是法門今已說大文第三第一智慧下九頌校量勸持分此廣大用人皆有分見而不習誠為自欺故中人可勸而進也於中分二初一頌結前所說略就六慧結之第一者上無加故二廣大者語其分量超二乘故三真實者明其體性內證無虛故四無邊者有二義一量智普知故二離種種二邊故即中道慧也五勝者超地位故六殊勝者同普賢故此法希有甚奇特若人聞已能忍可能信能受能讚說如是所作甚為難二此法下八頌明信受難得於中初一總顯餘七別明前中希有者佛出懸遠已難可遇唯初成頓說故希有也奇謂初能具後特謂逈出諸乘此句讚也下文勸耳聞謂遇經忍可謂信因信則心淨受謂領文領義讚乃通言通筆說唯約言上皆所作總說皆難世間一切諸凡夫信是法者甚難得若有勤修清淨福以昔因力乃能信後別明中三初二偈半明難信次半偈況出餘行後四偈舉事校量前中初一偈明人天之器信為甚難若爾今或能信何耶由二力故一現修淨福稱所求故二昔因聞熏今發種故今不信者願少聽聞為毒塗鼓終成堅種為毒塗鼓者即涅槃第九如來性品云復次善男子譬如有人以雜毒藥用塗大鼓於衆人中擊之發聲雖無心欲聞聞之皆死唯除一人不橫死者鼓合涅槃死喻滅惑不橫死者喻一闡提終成堅種者即出現品如上頻引一切世界諸羣生少有欲求聲聞乘求獨覺者轉復少趣大乘者甚難遇趣大乘者猶為易能信此法倍更難後一偈半舉三乘之信展轉難得況於一乘明文昭然權實有據況復持誦為人說如法修行真實解第二半偈況出餘行中信忍尚難況具餘行難中之難也真實解者亦有說行而不信圓融之旨非真實解也願諸學者善擇知見有以三千大千界頂戴一劫身不動彼之所作未為難信是法者乃為難有以手擎十佛剎盡於一劫空中住彼之所作未為難能信此法乃為難十剎塵數衆生所悉施樂具經一劫彼之福德未為勝信此法者為最勝第三四頌舉事校量初三校量難信初二舉二難以況信難後一舉福勝以彰信勝十剎塵數如來所悉皆承事盡一劫若於此品能誦持其福最勝過於彼後一校量餘行之難唯明誦持餘略不說亦顯修行真解非可校量也此之四事後後過於前前巧辨深勝時賢首菩薩說此偈已十方世界六反震動魔宮隱蔽惡道休息十方諸佛普現其前各以右手而摩其頂同聲讚言善哉善哉快說此法我等一切悉皆隨喜大𫨻第三時賢首下顯實證成分於中有四一動世界大機發故二蔽魔宮唯佛境故三息惡道利樂深故四佛現證契佛心故於中摩頂讚善隨喜即三業皆證勸物信行第二會竟音釋矚朱欲切視之甚也弧音胡弓也衄女六切敗北也竄匿竄取亂切匿昵力切竄匿謂藏竄隱匿也僅渠遴切才也悴秦醉切憔悴也古縣切網也霔之成切霖霔也躁則到切輕疾也挫祖臥切摧也褒博毛切揚美也氊諸廷切撚毛席也暨巨至切及也隼聳允切辛上聲鷂屬墉以中切音容城也
