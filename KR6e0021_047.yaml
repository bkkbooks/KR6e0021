body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述於眼根中入正定於色塵中從定出示現色性不思議一切天人莫能知於色塵中入正定於眼起定心不亂說眼無生無有起性空寂滅無所作於耳根中入正定於聲塵中從定出分別一切語言音諸天世人莫能知於聲塵中入正定於耳起定心不亂說耳無生無有起性空寂滅無所作於鼻根中入正定於香塵中從定出普得一切上妙香諸天世人莫能知於香塵中入正定於鼻起定心不亂說鼻無生無有起性空寂滅無所作於舌根中入正定於味塵中從定出普得一切諸上味諸天世人莫能知於味塵中入正定於舌起定心不亂說舌無生無有起性空寂滅無所作於身根中入正定於觸塵中從定出善能分別一切觸諸天世人莫能知於觸塵中入正定於身起定心不亂說身無生無有起性空寂滅無所作於意根中入正定於法塵中從定出分別一切諸法相諸天世人莫能知於法塵中入正定從意起定心不亂說意無生無有起性空寂滅無所作三於眼下通顯於三世間自在文分為四一明根境相對以辨自在二童子下明於他身自在三鬼神下微細自在四一切塵下器界事中以辨自在今初十二頌六對一一對中有十義五對無礙之相欲辨無礙先須明識定慧此中云三昧起者觀也入正受者定也定慧雖多不出二種一事二理制之一處無事不辦事定門也能觀心性契理不動理定門也明達法相事觀也善了無生理觀也諸經論中或單說事定或但明理定二觀亦然或敵體事理止觀相對或以事觀對於理定如起信論止一切相乃至心不可得為止而觀因緣生滅為觀或以理觀對於事定下經云一心不動入諸禪了境無生名般若是也或俱通二如下云禪定持心常一緣智慧了境同三昧是也或二俱泯非定非散或即觀之定但名為定如觀心性名上定是也或即定之觀但名為觀如以無分別智觀名般若是也或說雙運謂即寂之照是也所以局見之者隨矚一文互相非撥偏修之者隨入一門皆有剋證然非圓暢今此經文巧顯無礙制之一處者即遺教經文然亦可通以其先後類例多約事故即是彼經八大人覺中第二明精進初云汝等比丘已能住戒當制五根勿令放逸乃至云此五根者心為其主是故汝等當好制心心之可畏甚於毒蛇惡獸怨賊大火越逸未足喻也喻如有人手執蜜器動轉輕躁但觀於蜜不見深坑譬如狂象無鉤猿猴得樹騰躍跳擲難可禁制當急挫之無令放逸縱此心者喪人善事制之一處無事不辦是故比丘當勤精進折伏汝心能觀心性等者上句即涅槃經意彼第二十七師子吼品云以彼立三品定故經云善男子一切衆生具三種定謂上中下上者謂佛性也以是故言一切衆生悉有佛性中者一切衆生具足初禪等下者十大地中心數定也今但義引耳從契理不動即義說也觀其心性即是觀門而云定者心性是理觀即契理與理相應湛然不動故名為定明達法相事觀者如起信等善了無生者即七地經云了法無生名般若是也如起信者論云云何修行止觀門所言止者謂止一切境界之相隨順奢摩他觀義也所言觀者謂分別因緣生滅之相隨順毗鉢舍那觀義故云何隨順以此二義漸漸修習不相捨離雙現前故次論云若行若住若臥若起皆應止觀俱行所謂雖念諸法自性不生而復即念因緣和合善惡之業苦樂等報不失不壞雖念因緣善惡業報而亦即念性不可得釋曰此中先止不礙觀後觀不礙止皆止約入理觀約觀事第一經中已廣引文兼辨大意以疏對論文相可知或以理觀者即七地偈文然今經云於道不動即修禪忍受無生名般若蓋其義引小有不同禪定持心者即第二十三經彼具明十度云如其回向行布施亦復堅持於禁戒精進長時無退怯忍辱柔和心不動禪定下同今此但取定慧文耳言五對者第一對根境無礙謂觀根入定應從根出而從境出者為顯根境唯是一心緣起無二理性融通是故根入境出耳境入根出亦然言五對者即為五別然其五對皆約經文取文不同第一對取根境如初偈將上於眼根中對下於色塵中作義於中有三初明根入境出為顯下二出所以所以無礙者略有三義一唯心現故二緣起相由故三法性融通故廣如玄中以是最初故具出所以下多總略二境入下即例釋後偈第二對理事二定無礙謂分別事相應入事定而入理定欲觀性空應入理定而入事定以契即事之理而不動故入理即是入事制心即理之事而一緣故入事即是入理而經文但云入正定不言理事及乎出觀境中即云分別色相斯事觀也根中即云性空寂者即理觀也亦合將根事對於境理以辨無礙第二對者即於入正定中作義於中文四一正明分別事相等者緣從色塵中出明知眼根中入是其理定欲親性空等者緣於眼起等是理起明知於色塵中入是事入以契即事之理下一明所以唯約事理無礙明所以於中又二先成上分別事相應入事定而入理定後制心即理之事下二成上欲觀性空應入理定而入事定而經文下三出二定得名所以顯上入正定所對之文由對觀故亦合將根事者四結例謂合有偈云於眼根中入正定於色起定心不亂了色無生無有起性空寂滅無所作於色塵中入正定於眼根中三昧起分別眼性不思議諸天世人莫能知第三對事理二觀無礙謂欲分別事相應從事觀起而反從理觀起者以所觀之境既真俗雙融法界不二故分別事智即是無生之智二觀唯是一心故亦應將境事理對根事理以辨無礙第三對者即約經文從定起對於後半以作義疏文有三初正明中疏文但作初偈不作後偈若具應云欲了真理應從理觀起而及從事觀起謂前偈示現色性是事則色塵中三昧起義當理觀也後偈說眼無生無有起是理性則前眼根起定心不亂義當事觀也亦應將境者三反例此意稍隱先應問言上辨二定但云亦合將根事對於境理今何雙言將境事理對根理事故應答言以上二定不能自別要因起觀方知事理如眼入定未知何定以見塵上了色差別是其事觀欲令無礙故說根定是其理定境入根起既了根性空故說境中入於事定則經文中已辨根理對於境事故但合例以將根事定對於境理今此二觀不應定別根上境上各有二觀謂根入定即於境上從理觀起而分別事於色入定即於根上從事觀起分別於理經文已有此二未於境上從事觀起分別於理及與根上從理觀起分別於事若作偈者應云於眼根中入正定於色塵中事觀起說色無生無有起性空寂滅無所作及於色塵中入正定於眼根中理觀起分別一切上妙眼諸天世人莫能知斯則境上事起觀理以對根上理起觀事故云亦應以境事理對根理事以辨無礙也第四對出入無礙以起定即是入定故起定而心不亂若以事理相望應成四句謂事入事起事入理起等若以根境相望又成四句謂根事入境事起等一一思之皆有所由第四對者即於經入正定對從定起言及起定不亂作義若以事理相望下句數料揀事理四句但出其二等取餘二謂三理入事起四理入理起上且單說有其四句若單復相望應成九句於前四上更加五句謂事入事理起理入事理起事理入事起事理入理起事理入事理起故為九句又成四句者即根境出入成四但舉其一若具應云二境事入根事起三根理入境理起四境理入根理起若更交絡乃成十句謂根事入境理起境事入根理起根理入境事起境理入根事起根事理入境事理起境事理入根事理起以其事理相望屬前事理四句故但云四耳第五對二利體用無礙謂於眼根起定心不亂是體也自利也而不礙現於廣境是用也人天不能知利他也良以體用無二故自利即是利他第五對者此有兩重無礙一體用無礙二二利無礙下雙牒釋言心不亂是體者全用根起三句以對境起中後二句作義則根起三句為體亦為自利謂於眼起定心不亂說眼無生無有起性空寂滅無所作而言不礙現於廣境者即取前示現色性不思議諸天世人莫能知為廣境亦全用此二句為利他良以下以體用無礙釋二利無礙然上疏但約眼色根境以為體例後五根境可知此上十義同為一聚法界緣起相即自在菩薩善達作用無礙思之思之又經且約根境相對亦應境境相對謂色塵入正受聲香三昧起等此如下童子身中入正定等中明復應根根相對謂眼根入正受耳根三昧起等一塵入正受多根三昧起等並略不說又經且約根境下例顯若境境相對即下於自他身自在中攝故此不明根根相對等但略無耳例亦合有若具說者應云於眼根中入正定於耳根中從定起示現耳性不思議諸天世人莫能知於耳根中入正定從眼起定心不亂說眼無生無有起性空寂滅無所作等成六根互用一塵入正受等者亦略無耳若具應云於色塵中入正定於六根中從定起示現六根不思議諸天世人莫能知於六根中入正定於色起定心不亂說色無生無有起性空寂滅無所作等復應有一根入多塵起故云等也等字等於兩重一等多根入一塵起二等一根入多塵起若具應云於眼根中入正定於六塵中三昧起分別六境不思議諸天世人真能知於六境中入正定於眼根起心不亂說眼無生無有起性空寂滅無所作餘根對塵亦然故云並略不說上來無礙深妙難思始學之流如何趣入今當總結但能知事理無礙根境一如念慮不生自當趣入上來無礙下第四總示入門先問後今當下正示知事理無礙根境亦如總觀也念慮不生總止也即禪門大意又向云色性難思等即色等總持是色陀羅尼自在佛等亦應云分別眼性難思有眼陀羅尼自在佛等又眼中云性空寂滅即眼之度門眼等本淨亦應云色等度門色等本淨不唯取相為染無心為淨而已也又有智論三觀束之分別色相等是假名觀也性空寂滅是空觀也此二不二色性難思中道觀也三無前後皆是一心對此三觀應辨三止謂方便隨緣止體真止離二邊分別止既止觀雙運亦名一心三止也即一而三即三而一雙照三一雙遮三一是無礙也一一釋文準思可見又向云下第五彰其含攝於中又二先收總持等會佛名經然十二入約其含攝並稱總持約其性空究竟並稱波羅蜜約其性本清淨皆解脫門約其覺性圓明並得稱佛故佛名經云眼陀羅尼自在佛乃至意陀羅尼自在佛色陀羅尼自在佛乃至法陀羅尼自在佛等不唯取相為染等者結彈北宗禪門但得一分之義謂彼云眼見色意同知染法界意不同知淨法界不同知即眼陀羅尼自在佛眼總持度門等今謂亦是一義但得不起心之一義耳不同上來十重五對無礙自在等又有智論下第二以三觀會智論於中有三初明三觀先明次第三觀後三無前後即一心三觀言此二不二色性難思中道觀也此有二種中道一但合上二以為中道此之中道大乘初門二色性難思即佛性中道斯為圓妙欲辨包含故雙出耳對此三觀下辨三止一方便隨緣止即假觀家止謂方便涉有隨一一緣住一境故二體真止即空觀家止體達真理與理冥故三離二邊分別止即中道家止不取有無等二相也以上對經文之次故以假觀為初今對上觀亦以方便居首若凖智論先空次假後中義如前辨既止觀雙運下雙結上二於中又二先結止觀諸處多明一心三觀既有雙運則亦合言一心三止若具亦可言一心三止觀也即一而三下二結三一通於止觀即一而三體隨相用故即三而一相用即體故雙照三一體用顯然雙遮三一互奪雙泯謂即體同用故非一即用同體故非三一一釋者今將三觀以對經文二止遮照等亦然謂色相難