body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述毗盧遮那品第六初來意者前明此因之果今辨前果之因答前因問故次來也因是果因故標果稱又不以人取法知是誰因前品初言毗盧遮那曠劫修因之所嚴淨今方顯其事二釋名者略云光明遍照廣如前釋三宗趣者明因廣大為宗證成前果為趣爾時普賢菩薩復告大衆言諸佛子乃往古世過世界微塵數劫復倍是數四釋文一品分三初總明本事之時二有世界下別顯本事之處三彼勝音世界最初劫中下別顯時中本事今初即二佛剎塵數劫也有世界海名普門淨光明二辨處中亦三第一總明剎海此世界海中有世界名勝音依摩尼華網海住須彌山微塵數世界而為眷屬其形正圓其地具有無量莊嚴三百重衆寶樹輪圍山所共圍繞一切寶雲而覆其上清淨無垢光明照耀城邑宮殿如須彌山衣服飲食隨念而至其劫名曰種種莊嚴第二此世界海下別明一剎略無剎種剎名勝音者多佛出世説法音故次彰其相後説劫名可知諸佛子彼勝音世界中有香水海名清淨光明第三諸佛子彼勝音下的指一方如今娑婆中別説一四天下也於中亦三初總明感應之處第二諸佛子此林東下別明能感居人第三諸佛子彼大林中下別顯道場嚴事今初有三初明香海者非持種之海即如今四洲之海耳其海中有大蓮華須彌山出現名華焰普莊嚴幢十寶欄楯周匝圍繞二其海下海出華山於其山上有一大林名摩尼華枝輪無量華樓閣無量寶臺觀周回布列無量妙香幢無量寶山幢逈極莊嚴無量寶芬陀利華處處敷榮無量香摩尼蓮華網周匝垂布樂音和悅香雲照曜數各無量不可紀極有百萬億那由他城周匝圍繞種種衆生於中止住三於其山下明山頂之林先標舉後顯嚴説此林者佛於中現也説城居人者總舉所化也諸佛子此林東有一大城名焰光明人王所都百萬億那由他城周匝圍繞第二別明能感居人中亦三初標主伴二城二釋主城三釋伴城今初雖有天城以佛出故人城為主清淨妙寶所共成立縱廣各有七千由旬七寶為郭樓櫓却敵悉皆崇麗七重寶塹香水盈滿優鉢羅華波頭摩華拘物頭華芬陀利華悉是衆寶處處分布以為嚴飾寶多羅樹七重圍繞宮殿樓閣悉寶莊嚴種種妙網張施其上塗香散華芬瑩其中有百萬億那由他門悉寶莊嚴一一門前各有四十九寶尸羅幢次第行列復有百萬億園林周匝圍繞其中皆有種種雜香摩尼樹香周流普熏衆鳥和鳴聽者歡悅二清淨下廣釋主城於中先顯處嚴城上守禦曰櫓繞城別築土臺曰却敵優鉢羅等即青赤黃白四色蓮華此大城中所有居人靡不成就業報神足乘空往來行同諸天心有所欲應念皆至後此大城下彰其人勝其城次南有一天城名樹華莊嚴其次右旋有大龍城名曰究竟次有夜叉城名金剛勝妙幢次有乾闥婆城名曰妙宮次有阿修羅城名曰寶輪次有迦樓羅城名妙寶莊嚴次有緊那羅城名遊戲快樂次有摩睺羅城名金剛幢次有梵天王城名種種妙莊嚴如是等百萬億那有他數三其城次南下略釋伴城於中二先辨城名居類此一一城各有百萬億那由他樓閣所共圍繞一一皆有無量莊嚴後此一一下顯圍繞莊嚴世界不同安立少異不可例此也諸佛子此寶華枝輪大林之中有一道場名寶華遍照以衆大寶分布莊嚴摩尼華輪遍滿開敷然以香燈具衆寶色焰雲彌覆光網普照諸莊嚴具常出妙寶一切樂中恆奏雅音摩尼寶王現菩薩身種種妙華周遍十方第三明道場中先辨場嚴其道場前有一大海名香摩尼金剛出大蓮華名華蘂焰輪其華廣大百億由旬莖葉鬚臺皆是妙寶十不可説百千億那由他蓮華所共圍繞常放光明恆出妙音周遍十方二其道場前下明蓮華香海為佛現故諸佛子彼勝音世界最初劫中有十須彌山微塵數如來出興於世大文第三別顯時中本事文分為二先總舉劫中多佛後其第一下一一別顯正彰本事經來不盡故無總結今初將欲説別先舉其總言最初劫者即種種莊嚴劫也既云最初即此後更有大劫於理無違此後更有大劫者此遮破也謂靜法云凖下文大劫有恆河沙小劫人壽二小劫初佛壽五十億嵗威光歷事三佛轉報生天今云最初劫中有十須彌山塵數佛者為彼剎中更有多箇大劫此初大耶為諸小劫中取小初耶釋曰上引文案定雙開二關次云若就小劫初不應威光一報但遇三佛若就大劫一初剎之中寧有多大釋曰雙程二關謂人壽二小劫一小劫中有須彌山塵數佛故不應一報但遇三佛言寧有多大者如一賢劫則無多大次云故知此文最初劫之三字應回云劫最初仍移此三字於後行出興於世其字之下即無過也釋曰此立正理具足回文合云彼勝音世界中有十須彌山微塵數如來出興於世其劫最初第一佛號一切功德山須彌勝雲也此正甚善今不欲繁舉出經之過強以理通最初劫言耳云更有大者義當中劫順靜法意言更有大耳如大賢劫有二十增減為中劫第十五劫有九百九十四佛出世則一劫中容多佛矣但彼淨劫時長故一劫中有十須彌山塵數佛矣然不欲斥經不急修行故存略理通非斥靜法正不當也其第一佛號一切功德山須彌勝雲第二正顯本事中歷事四佛即為四別第一逢一切功德山須彌勝雲佛第二波羅蜜善眼莊嚴佛第三最勝功德海佛第四名稱普聞蓮華眼幢佛各有諸佛子言就初佛中文分為六第一總標佛號第二先瑞熟機第三正顯佛興第四毫光警召第五當機雲集第六廣演法門今初也一切功德山者福德崇峻不可仰也復言須彌者定慧高妙難傾動也言勝雲者慈覆智潤廣無邊也諸佛子應知彼佛將出現時一百年前第二諸佛子下先瑞熟機分二初現瑞熟機二其世界中下覩瑞機熟前中三初標現時謂百年前此摩尼華枝輪大林中一切莊嚴周遍清淨所謂出不思議寶焰雲發歎佛功德音演無數佛音聲舒光布網彌覆十方宮殿樓閣互相照曜寶華光明騰聚成雲復出妙音説一切衆生前世所行廣大善根説三世一切諸佛名號説諸菩薩所修願行究竟之道説諸如來轉妙法輪種種言辭此摩尼下正顯瑞相有其十種於中説前世所行者示其種子將成熟故説佛名號令憶念故説大行願使修發故説轉法輪使當聽習生法眼故現如是等莊嚴之相顯示如來當出於世後現如是下結瑞意也其世界中一切諸王見此相故善根成熟悉欲見佛而來道場二機熟可知爾時一切功德山須彌勝雲佛於其道場大蓮華中忽然出現第三爾時下正顯佛興於中分二初一處道成二如於下結通廣遍初中先總其身周普等真法界一切佛剎皆示出生一切道場悉詣其所無邊妙色具足清淨一切世間無能映奪具衆寶相一一分明一切宮殿悉現其像一切衆生咸得目見無邊化佛從其身出種種色光充滿法界後其身下別別顯勝德略有十相一示身相法無不在本自普周智與理冥故等彼真界能令色相隨彼融通法界塵毛重重全遍略有十相者結云大同經初即教主難思十身相也初一即法身經以身智無礙而為法身便融色相等為一法身以初身為總故法無不在本自普周即釋經其身周普是法性身智與理冥者釋經等真法界此是報身亦如智也故金光明云唯如如及如如智獨存為法身故能令色相下以真身周故令應用亦周吾今此身即是常身法身故也則以三身圓融為一真法身矣下九別説二悲相不捨因行無所不生二悲相即意生身三成相理行時處為一切道場身智俱遊名為普詣三成相即菩提身理行時處為道場並如經初四色相湛然常住稱為妙色色色無邊故云具足並無質纍是謂清淨四色相即福德身故上經云三世所行衆福大海悉以清淨是故妙色為福之果上經又云不可思議大劫海供養一切諸如來普以功德施羣生是故端嚴最無比五勝相色容蔽於大衆威德懾於羣魔力無畏圓何能映奪五勝相即威勢身六貴相無邊寶相圓明可貴超過聖帝故曰分明六貴相即相好莊嚴身且順三乘云過聖帝俱舍頌云相不正圓明故與佛非等此釋輪王相今是世尊故云分明實具十蓮華藏微塵數相也七應相不住普現如鏡中像七應相即力持身如為龍留影力持不滅八無礙相有感斯見無隔山河八無礙相即願身上經云毗盧遮那佛願力周法界一切國土中常轉無上輪故咸目覩九者化相化從真流源無有異九化相即化身十吉祥相身智光照普稱世間此上大同經初十吉祥相即智身正在智光傍兼身光耳是知此經引昔因緣亦皆圓妙如於此清淨光明香水海華焰莊嚴幢須彌頂上摩尼華枝輪大林中出現其身而坐於座其勝音世界有六十八千億須彌山頂悉亦於彼現身而坐二結通中且結同類一界餘皆略也爾時彼佛即於眉間放大光明第四爾時下毫光警召文分為五一放光處顯中道故其光名發起一切善根音二主光名發動宿種生起新善故善根有三一者生福及不動業以施忍智三而為善根二厭苦求滅以信等為根三求無上慧以四等不放逸五法為根一者生福者業有三種一惡業即三不善根所生今所不明疏列三業即三善根所生三善根者即無貪無瞋無癡今非但不著有境兼能惠施成無貪根非唯於苦無恚兼行忍辱故成無瞋根非唯於境明了增修慧解是無癡根有此三根唯生欲色無色故為福不動根然其三根依唯識論各別有性善十一攝無貪以於有有具無著為性無瞋以於苦苦具無恚為性無癡以於諸理事明解為性通唯善惠各別有性今依集論第一以惠為無癡性唯識意會以惠為無癡之果耳故施忍二亦從果名由無貪瞋故成施忍所以疏云以施忍惠以為其根二信等根下當廣説三求無上者涅槃經云皆歎慈悲為菩薩根謂有慈悲心必須喜捨不放逸者即是精進無貪等三於所斷修防非為性假立為一故涅槃説不放逸根根深難拔由不放逸䇿前四等得一切智故為根也通説善根以依聖教發心為性故云音也四通説善根下即上三類之通性也十佛剎微塵數光明而為眷屬三眷屬數無𥁞法故充滿一切十方國土四照分齊充滿十方通方教故若有衆生應可調伏其光照觸即自開悟息諸惑熱裂諸蓋網摧諸障山淨諸垢濁發大信解生勝善根永離一切諸難恐怖滅除一切身心苦惱起見佛心趣一切智五若有下明光勝益文有十句一無明重者自覺智開二煩惱深者息現行惑三勤修難出裂五蓋網四三障重者摧諸障山五未解脫者淨心垢種六未信大者發起入住七闕資糧者生其勝善八未入地者除五怖畏九色纍功用滅身心苦十滯無生者見佛趣果無明下先別釋初四離障五令解脫通益三乘六未信令信七令入三賢八令得初地九令二地已上得於八地下已在八地已證無生諸佛勸起令得九十二地此約差別對治以釋若約橫配生善見理可以準思此約差別下二結釋差別結上明是豎釋對治結上非三悉檀若約橫配下更結異門橫對前豎位位通用此十句故生善見理對上對治生善即是為人悉檀謂發大信解生勝善根起見佛心皆生善也見理即第一義悉檀如自覺智開趣一切智皆見理也亦應合有隨俗令喜世界悉檀以益近故此中不説橫豎無礙是此中意四悉檀義問明當辨時一切世間主并其眷屬無量百千蒙佛光明所開覺故悉詣佛所頭靣禮足第五當機雲集中文二先通顯諸王雲集致敬諸諸佛子彼焰光明大城中有王名喜見善慧統領百萬億那由他城後諸佛子下別障諸王雲集儀式於中分二先廣明喜見後略列諸王今初即正出本事之緣文分為六第一標名辨統二總辨眷屬三威光得益四偈讚如來五父王宣誥六俱行詣佛初文可知夫人婇女三萬七千人福吉祥為上首王子五百人大威光為上首大威光太子有十千夫人妙見為上首第二夫人下總顯眷屬者有德曰夫人有色曰采女王子別本云二萬五千者別梵本也案瓔珞本業經上卷云十住銅輪寶瓔珞百福子為眷屬生一佛土受佛學行教化二天下銀輪寶瓔珞五百子金輪一千子初地四天王萬子二地忉利天王二萬子三地已上乃至淨居天王但云眷屬亦如是故知無過二萬子者若三界王即當等覺又以一切菩薩為眷屬案喜見所統但以城言又見佛興至第三佛方云去世五百銀輪斯為正也或約教異理亦可通上首云大威光者有大威德其道光明故按纓絡等下引經釋成五百為正二萬五千為非於中先奪破言上卷即第三賢聖觀品彼中敬首菩薩問云何菩薩學觀名字義相及心所行法復當云何佛先答名字即列三賢十聖等妙之名次答心所行法云佛子汝先言云何心所行法者所謂十心一發心住等廣釋三賢十聖等妙之相次敬首菩薩復問世尊從初地至後一地有果報神變二種法身一法性法身二應化法身為何色相為何心相佛答中先答出世間果報者從初地至佛地各有二種法身於第一義諦法流水中從實性生故實智為法身法名自體集藏為身等兼説淨土次云佛子世間果報者所謂十住銅寶瓔珞銅輪王百福子為眷屬生一佛土受佛學行教化二天下銀寶瓔珞銀輪王五百福子為眷屬生二佛土受佛教行化三天下金剛寶瓔珞金輪王千福子為眷屬入十方佛土化一切衆生處四天下歡喜地百寶瓔珞七寶相輪四天王萬子為眷屬現百法身百佛土教十方天子千寶瓔珞八寶相輪忉利王二萬子為眷屬萬寶相瓔珞九寶相輪炎摩天王眷屬亦然不可稱數億寶瓔珞十寶相輪兜率陀天王眷屬亦然不可稱數天光寶瓔珞十一寶相輪化樂天王眷屬亦然摩尼寶光瓔珞十二寶相輪他化天王眷屬亦然千色龍寶光慧瓔珞十三寶相輪梵天王眷屬亦然梵師子寶光瓔珞大應寶相輪光光天王眷屬亦然不可思議寶光瓔珞白雲寶相輪淨天王眷屬亦然百萬神通寶光瓔珞無畏珠寶相輪淨居天王眷屬亦然千萬天色寶光瓔珞覺德寶光相輪三界王一切菩薩為眷屬無量功德藏寶光瓔珞千福相輪法界王一生補處菩薩為眷屬佛子是上瓔珞相輪一切佛及菩薩動止俱遊常隨其身亦化一切衆生故有如是果報之數法釋曰已上俱引經文於疏易了明知無過二萬子者按喜見下以二義證唯合五百一所統但統於城不統四天下故非金輪二既遇三佛佛出減劫輪王出增劫故知非也爾時大威光太子見佛光明已以昔所修善根力故即時證得十種法門第三爾時下威光得益文分為二先舉因總標何謂為十所謂證得一切諸佛功德輪三昧後何謂下列益明體皆從勝用標名一佛德圓滿摧障稱輪定中能知故受斯稱證得一切佛法普門陀羅尼二此總持能持諸佛普法證得廣大方便藏般若波羅蜜三即空涉有名為方便斯則權實雙行為不共般若稱體用之廣大證得調伏一切衆生大莊嚴大慈四以二嚴調伏真實慈也證得普雲音大悲五法雲震音能苦本證得生無邊功德最勝心大喜六稱理法喜故德無邊自他俱慶心為最勝證得如實覺悟一切法大捨七知離名法法亦應捨如實捨也知離名法即思益經第一思益梵天問言世尊云何名為菩薩遍行佛言能淨身口意業爾時世尊而説偈云若身淨無惡口淨常實語心淨常行慈是菩薩遍行行慈不貪著觀不淨無恚行捨而不癡是菩薩遍行在聚落空野及與處大衆威儀終不轉是菩薩遍行知法名為佛知離名為法知無名為僧是菩薩遍行釋曰此當第四偈因便故來欲釋此偈令知起盡故以此一偈人多解釋今觀經意三箇知字皆是觀行之人若能如是知是菩薩遍行知法名為佛者即是真佛法身如來佛即是法法即是佛亦猶如來者即諸法如義次應問言法即是佛於義已解何者是法故次句云知離即是法以一切法本性離故心體離念即是覺故次應問云法本自離則無所修何等有僧故次解云知無名為僧無為即法法本自離由知無為故得成僧故大品云由知諸法空分別有須菩提等金剛經云一切聖賢皆以無為法而有差別謂俱學無為有淺有深乃成差別非無為法而有差別也今疏正取知離名法若不捨法非知離也故云法亦應捨即金剛意法尚應捨何况非法因法得悟如祇渡人若不捨法如住舟內要捨於舟方至彼岸要忘所捨方為如實覺悟諸法為真捨也故大般若云般若甚深知一切法本性離故又文殊釋云如佛世尊堪受供養以於一切法覺實性故是故經云如實覺一切法大捨證得廣大方便平等藏大神通八善巧起用平等無思通從此生故名為藏證得增長信解力大願九𥁞衆生界荷負無疲要令信解為大願也證得普入一切智光明辨才門十所有辨才皆入佛智自他俱照是曰光明此上十法初三功德法次四熏修法後三起化法多言大者境界無邊稱性廣大智契貫達並受證名爾時大威光太子獲得如是法光明已承佛威力普觀大衆而説頌言第四偈讚如來文分為二先説偈之由世尊坐道場清淨大光明譬如千日出普照虛空界無量億千劫導師時乃現佛今出世間一切所瞻奉後正陳偈讚十偈分三初二示佛出現既滅暗難遇不可失時汝觀佛光明化佛難思議一切宮殿中寂然而正受汝觀佛神通毛孔出焰雲照耀於世間光明無有𥁞汝應觀佛身光網極清淨現形等一切遍滿於十方妙音遍世間聞者皆欣樂隨諸衆生語讚歎佛功德世尊光所照衆生悉安樂有苦皆滅除心生大歡喜次五令觀佛德有德有慈真可歸也觀諸菩薩衆十方來萃止悉放摩尼雲現前稱讚佛道場出妙音其音極深遠能滅衆生苦此是佛神力一切咸恭敬心生大歡喜共在世尊前瞻仰於法王後三引例勸歸無遠不歸固宜往見諸佛子彼大威光太子説此頌時以佛神力其聲普遍勝音世界時喜見善慧王聞此頌已心大歡喜觀諸眷屬而説頌言第五父王宣誥文分為二初宣誥所因以聞讚故太子道深親承佛益王機猶淺轉假他聞汝應速召集一切諸王衆王子及大臣城邑宰官等普告諸城內疾應擊大鼓共集所有人俱行往見佛一切四衢道悉應鳴寶鐸妻子眷屬俱共往觀如來二正以偈誥偈有十一分之為三初三集衆勸觀一切諸城郭宜令悉清淨普建勝妙幢摩尼以嚴飾寶帳羅衆網妓樂如雲布嚴備在虛空處處令充滿道路皆嚴淨普雨妙衣服巾馭汝寶乘與我同觀佛各各隨自力普雨莊嚴具一切如雲布遍滿虛空中香焰蓮華蓋半月寶瓔珞及無數妙衣汝等皆應雨須彌香水海上妙摩尼輪及清淨栴檀悉應雨滿空衆寶華瓔珞莊嚴淨無垢及以摩尼燈皆令在空住次七勑令辦供鄭注禮云巾猶衣也謂以繒綵衣帶縛於車廣雅云馭駕也餘並可知一切持向佛心生大歡喜妻子眷屬俱往見世所尊後一偈勸賫供佛音釋欄楯攔音闌勾欄也楯食尹切檻也匝作合切遍也逈極逈戶茗切寥遠也縱廣縱將容切南北曰縱廣古曠切東西曰廣樓櫓櫓音魯塹七豔切坑也蘂如壘切花也莖戶耕切也警召警舉影切鐸達各切鈴屬萃秦醉切馭牛居切御馬也
