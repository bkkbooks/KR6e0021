body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述爾時功德慧菩薩承佛威力普觀十方而說頌言諸法無真實妄取真實相是故諸凡夫輪迴生死獄第四北方功德慧者生在佛家善解佛德故此頌意顯於三世中心得平等了知自心窮法空故十頌分四初四明凡小妄覺次四示其真覺三有一偈佛覺雙圓後一偈推功有本今初分二初一偈說凡迷緣起之無性執著相而輪迴言詞所說法小智妄分別是故生障礙不了於自心不能了自心云何知正道彼由顛倒慧增長一切惡不見諸法空恒受生死苦斯人未能有清淨法眼故後三頌通凡小初一辨迷執隨言作解可謂小智心外取法為妄分別餘二偈明過失初二句曲徑趣寂迷一直道次半有常等倒長世間惡有無常等長無明惡次半不見二空受二死苦後半無實諦觀何有法眼三乘縱有亦不名諦初二句等者迷一直道凡小俱迷曲徑趣寂唯是小乘若超卓大方不歷二乘速成正覺名為直道若先證二乘後方入大名為曲徑曲徑謂其迂迴趣寂明其沉滯入無餘依權教不迴若實教中終竟𤼵意但動經八萬明三昧酒故次半有常等者以上言通凡小故此說凡惡下說小乘之惡三來縱有者二乘不見法空居然不淨權教大乘謂事理不融亦未為淨我昔受眾苦由我不見佛故當淨法眼觀其所應見若得見於佛其心無所取此人則能見如佛所知法若見佛真法則名大智者斯人有淨眼能觀察世間無見即是見能見一切法於法若有見此則無所見次四示其真覺中初偈引己之損勸物成益次偈教其真見謂見佛無取即是見如如即佛所知也次偈教其了俗上半躡前證真下半方能了俗後偈拂前二見以成真見謂上半取真俗之見忘方見真俗之正理下半反釋謂有真俗之可見不能見真俗之真源故智論云若人見般若是則為被縛下半意也若不見般若是則得解脫上半意也故智論云下引論通釋印第二十論彼論偈云若人見般若是則為被縛若不見般若是亦為被縛若人見般若是則得解脫若不見般若是亦得解脫脫之與縛俱通見不見今䟽隨經之次便以論偈隨義解釋初言下半意者謂下半真俗之見不忘此是取著之見故被縛也言上半意者是論第三句是忘見之見同無分別智故得解脫若人見般若是則為解脫即第六七偈意也若不見般若是則為被縛即第四偈意也唯忘言者可究斯旨即第六七等者以第六偈見佛無取即無取而見是見般若得解脫義第七偈證真了俗亦真見般若故得解脫即第四偈者第四不見諸法空是無真見故不見般若豈不縛耶唯忘言等者見與不見俱通縛解豈得隨於見不見言須領見等下意若言見而被縛即知是取著之見苦言見得解脫即須知是無分別見故什公云唯忘言者可與道合虛懷者可與理通𡨋心者可與真一遺智者可與聖同矣一切諸法性無生亦無滅奇哉大導師自覺能覺他第三一偈顯佛二覺雙圓不可覺中而自覺故是曰奇哉知無眾生而能覺他大導師也勝慧先已說如來所悟法我等從彼聞能知佛真性第四可知爾時精進慧菩薩承佛威力觀察十方而說頌言若住於分別則壞清淨眼愚癡邪見增永不見諸佛第五東北方精進慧以勤觀真理集無量善俱無住故頌意為顯欲令其心轉復精進無所染著文中由離分別如實見故十頌分二前九觀法後一推功前中三初三所執無相觀於中初一舉分別過初三所執無相觀者然此中明於三性上修三無性觀言三性者一徧計所執性二依他起性三圓成實性三無性者一相無自性性二生無自性性三勝義無自性性三性之義已見上文今䟽科文名中一一含二今言所執無相觀者所執即徧計所執無相即相無自性性觀次三緣起無生者緣起即依他起性古經論中亦名緣起性今䟽文從簡故云緣起言無生者即生無自性性觀後三圓成無性者圓成即圓成實性言無性者即勝義無自性性偏言無性者向真性上說無性故亦是古名並從簡耳又皆雙明者以其三性即三無性故故唯識云即依此三性說彼二無性初則相無性次無自然性後由遠離前所執我法性故二種三性不相去離然法相宗三性即有性三無性則無性有無義殊故彼偈云故佛密意說一切法無性意云既言密意說三無性則不礙於三有性也若法性宗此二三性有無無礙互奪雙亡皆悉自在初舉分別過者分別即徧計所執也古謂為分別性今䟽從簡亦欲辨起心動念皆成分別故並成過故云以心分別一切法邪不以心分別一切法正故信心銘云大道無難唯嫌揀擇但不憎愛洞然明白若能了邪法如實不顛倒知妄本自真見佛則清淨有見則為垢此則未為見遠離於諸見如是乃見佛後二顯無相觀一離所取上半知於情有下半知於理無如迷木見鬼知鬼是迷有名如實知鬼知鬼本無舉體是木名為見木二顯無相觀者正修三無性中初無性也一離所取者謂一偈中初一偈所取即徧計所執也上半知於情有者即徧計中二義謂情有理無今知情有即是理無則知此性即無相也如迷木者舉喻以明如人夜行雲月朦朧見一杌木以無月光情懷怖畏而生鬼想眾生亦爾行生死夜妄想浮雲蔽於慧月覩緣生法不了性空謂有定性如生鬼想鬼喻徧計木喻依圓若了知鬼是因迷有則知所執定性之法皆由妄情是人名為妄識所執故名悟人如實知鬼此釋上半知鬼本無者釋下半也約法云知妄所執理本是無但是依圓為舉體是木則見依圓故名見木故知妄本自真則鬼是木見佛則清淨名為見木二離能取以所取空故上半舉失如若見鬼即不見木下半顯得離於鬼見方為見木如若見鬼者有妄執之見如若見鬼故則為垢不見依圓名不見木執有定性不見依圓之實名未為見下半離於鬼見者謂離於定性執見則見圓成之實方名為見木世間言語法眾生妄分別知世皆無生乃是見世間次三明緣起無生觀一遣所緣然依他二義一者幻有從分別生即是上半二者無性即是下半然依他二義者三性各二義依他二者一幻有二無性從分別生釋依他義依他因緣而得有故分別即他故唯識云依他起自性分別緣所生今言世間語言法即所起之法眾生妄分別即是能生且順三性義釋亦可諸世間法各無定性但是眾生妄心分別謂有實耳二者無性者知世皆無生無生即無性也若見見世間見則世間相如實等無異此名真見者二泯能緣上半牒前生過有無生見同世非實下半見等無生名真見者有無生見者由上云知世皆無生今牒此言云若見見世間謂見世無生既有此見見即是生故同世間非真實也故古人云無生終不住萬象徒流布若作無生解還被無生顧即其義也下半見等者以經文言若見等無異謂見等所見同無生故能所兩忘名真見者若見等無異於物不分別是見離諸惑無漏得自在三辨觀益諸佛所開示一切分別法是悉不可得彼性清淨故後三明圓成無性觀一牒前二無謂能所分別皆不可得者即圓成性淨故法性本清淨如空無有相一切無能說智者如是觀一正顯真性初句體有次句相無此二融即故無能說初句體有者圓成有二義一體有二相無法性本清淨故是體有如空無相故是相無體有即是相無相無即是體有本自相融何能說之欲言其有即相無故欲言其無即性有故遠離於法想不樂一切法此亦無所修能見大牟尼三觀成利益如德慧所說此名見佛者所有一切行體性皆寂滅第二推功文並可知爾時善慧菩薩承佛威力普觀十方而說頌言希有大勇健無量諸如來離垢心解脫自度能度彼我見世間燈如實不顛倒如於無量劫積智者所見第六東南方善慧菩薩成就般若慧鑑不動可謂善矣此頌為顯欲令其心轉復增進得不退轉無生法忍文中離垢解脫無體性故十頌分四初二見佛次三見法次三觀成利益後二推見有依今初前偈讚所見上半標讚下半釋成智離所知心脫煩惱兼二利故二障難除眾生難度自強不息為希有勇健智離所知者下半初句明離二障言離垢者離所知障是慧解脫故言智離所知言心解脫者是離煩惱障是心解脫故云心脫煩惱解脫之義通二解脫言兼二利者即第四句自度能度彼以自度二障亦令他人脫二障故則俱度苦海也二障難除下總舉下半釋成初句二障難除則難斷能斷今難度能度為自強不息是希有勇健義也然自強不息即周易乾卦大象象曰天行健君子以自強不息謂乾者剛健之象君子當法天剛健故自強進德而不休息今借用之明佛勇猛自勵䇿修練磨其心得成正覺為勇健耳後偈中能見謂我如實見如大菩薩見如大菩薩見者大菩薩即於無量劫積智之者一切凡夫行莫不速歸盡其性如虛空故說無有盡智者說無盡此亦無所說自性無盡故得有難思盡所說無盡中無眾生可得知眾生性爾則見大名稱次三見法中約眾生說初偈正顯盡即有為諸行無常速起滅故有為之性湛若虛空便是無為體常徧故盡即有為者淨名第三香積世界諸菩薩欲還本土以求少法當念如來佛告諸菩薩有盡無盡法門汝等當學何謂有盡謂有為法何謂無盡謂無為法如菩薩者不盡有為不住無為何謂不盡有為謂不離大慈不捨大悲等何謂不住無為謂修學空不以空為證修學無相無作不以無相無作為證等諸行無常者釋成盡是有為之義故涅槃云諸行無常是生滅法速起滅者剎那不住故有為之性者釋其性如虛空故說無有盡其性即上有為性故其性之言畧有二義一但約無性之性以有為法緣生性空緣生性空即同無為豎窮三際曰常橫無不周曰徧故是無為則上淨名但明不盡有為不住無為二相猶別未能顯為即無為矣今明即性之相是名有為即相之性便是無為故是玄矣二者其性如虛空即如來藏性體離斷常故如虛空故勝鬘云邊見者凡夫於五受陰我見妄想計著生二見是名邊見所謂常見斷見見諸行無常是斷見非正見見涅槃常是常見非正見妄想見故作如是見於身諸根分別思惟現法見壞於有相續不見起於斷見妄想見故於心相續愚暗不解不知剎那間意識境界起於常見妄想見故又云死者諸根壞生者諸根起非如來藏有生有死如來藏離有為相如來藏常住不變是故如來藏是依是持是建立釋曰據上經文以盡即無盡是故雙非常無常見故次文云智者說無盡此亦無所說次二偈拂迹入玄上半拂前無為謂既如虛空何有無為之相次四句拂前有為謂既約自性論無盡則不壞於盡故曰難思盡即無盡故無眾生也後二句觀成利益見法身也謂既如虛空者體無可盡故如虛空非謂有於一物若高山之出雲用之無盡也故云智者說無盡此亦無所說由盡即無盡即非盡非無常矣無盡既如虛空則非無盡非是常矣是為雙非常無常雙離盡不盡亦雙非為無為故中論云若有有為法則有無為法既無有為法何得有無為則不壞於盡者此有二意一者拂上有為二者上來雙遣今則雙存自性無盡則有無盡有難思盡則有盡矣以泯不礙存故存亡無二方曰難思而向言拂上有為者謂盡則無盡故非盡矣上來盡即無盡意雖暗拂而以其性如空別示無為故今方說拂有為耳無見說為見無生說眾生若見若眾生了知無體性能見及所見見者悉除遣不壞於真法此人了知佛若人了知佛及佛所說法則能照世間如佛盧舍那次三觀成中初偈顯法空由下半了能所見緣成無性故上半能所之見自亡次二句顯我空能所之法尚空誰為能見之者後二句顯實但除上病不除真法二空之體及所顯圓成即真佛也但除上病者即側用淨名第二但除其病而不除法二空之體者以法性宗一空即真如及所顯圓成者以法相宗二空非真如二空所顯為真如故真如即是圓成然空有無礙故變存兩宗二一偈雙結知佛法益文顯可知正覺善開示一法清淨道精進慧大士演說無量法若有若無有彼想皆除滅如是能見佛安住於實際四有二偈推見有依者謂佛說一道清淨故能遣有進慧演無量門復能遣無想滅理現方知如來乃住無有無之際也又智論云法性為實證實為際凡夫有實未能證也爾時智慧菩薩承佛威力普觀十方而說頌言我聞最勝教即生智慧光普照十方界悉見一切佛第七西南方智慧者決斷不動所以名智頌意為顯於一切法皆能出離文中生死涅槃皆善離故十頌分二初一引己勵眾此中無少物但有假名字若計有我人則為入險道餘偈希眾同己於中亦二前六示迷後三啟悟前中亦二初一人執理實無人橫計成險諸取著凡夫計身為實有如來非所取彼終不得見此人無慧眼不能得見佛於無量劫中流轉生死海餘皆法執於中初二執世法後三雙執世出世今初初二句明執謂計蘊為實不能觀身實相餘皆明過初二句執實乖理不見佛次二句無慧不見佛後二句但益流轉有諍說生死無諍即涅槃生死及涅槃二俱不可得若逐假名字取著此二法此人不如實不知聖妙道後三雙執中亦分為二初二執法後一執佛前中亦二一立理二起執初中上半假立謂待前流轉生死以立涅槃煩惱名諍觸動善品損害自他故名為諍此有漏法諍隨增故名為有諍有彼諍故故生死者有漏為體無彼煩惱故稱涅槃下半雙非謂生死涅槃俱因煩惱假立其名何有真實又二互相待故俱空二互相奪故皆寂煩惱名諍者即俱舍界品頌云有漏名取蘊亦說為有諍及苦集世間見處三有等今用第二句從煩惱名諍下至有彼諍故全是彼文從故生死者有漏為體即是前叚後義彼䟽後云猶如前說有彼漏故名為有漏釋曰此證成有彼諍故下文結云如是等類是有漏法差別眾名故今結云故生死者有漏為體所以論初名有漏無漏法也又二互相等者謂上約因緣因他立稱故無真實不融二體今明雙融此有三意一相待二相即三相奪今初相待俱空即相待門謂因涅槃方說生死要因生死方說涅槃若高下相形若無有高則無有下若離涅槃則生死不存若離生死則涅槃不立故俱空也次言二互相奪故皆寂者此有二意一者相即門生死實性即是涅槃則涅槃之相假說生死如波與水舉一全𭣣故生死即涅槃涅槃即生死二由相即故便互相奪生死即涅槃即無生死涅槃即生死則無涅槃故涅槃非寂靜生死亦無喧故皆寂也後偈起執上半執下半損若生如是想此佛此最勝顛倒非實義不能見正覺後一執佛中亦上半執下半損執有三義一佛佛相望二三身等相望三心佛相望一佛佛相望者如云阿彌陀佛有四十八願能攝眾生餘則不能禮於此佛滅罪則多禮於餘佛滅罪即少不知諸佛行願功德無不平等隨根隨緣說有優劣故為顛倒二三身等相望者謂念化身功德則少乃至法身功德則勝等而言三身等者等取四身五身十身無量身故以不知三身體融十身無礙謂有優劣故為顛倒三心佛相望者謂佛已成道功德難思我心妄惑則名為劣雖無叨濫不了真源心佛眾生三無差別故為顛倒能知此實體寂滅真如相則見正覺尊超出語言道言語說諸法不能顯實相平等乃能見如法佛亦然後三啟悟中亦二初二順理之得後一舉佛釋成前中亦二半偈明順理而知餘顯順知之益益中亦二半偈標一偈釋云何超言若取知能知寂未免於言有所緣故知自知知亦非無緣故須能所平等等不失照故無知之知不同木石故云能見若取知能知寂者此即用於禪宗知識之偈偈中具云若以知知寂此非無緣知如手執如意非無如意手若以自知知亦非無緣知如手自作拳非是不拳手亦不知知寂亦不自知知不可謂無知自性了然故不同於木石手不執如意亦不自作拳不可謂無手以手安然故不同於木石斯為禪宗之妙故今用之而復小異以彼但顯無緣真智以為高道若奪之者但顯本心不隨妄心未有智慧照了心源故云故須能所平等等不失照為無知之知此知知於空寂無生如來藏性方為妙耳正覺過去世永斷分別根未來及現在是故說名佛後偈舉佛釋者上云佛然佛云何然釋云覺於三世離分別故種習斯亡為斷根也又亦無心捨於分別名為斷根爾時真實慧菩薩承佛威力普觀十方而說頌言寧受地獄苦得聞諸佛名不受無量樂而不聞佛名所以於徃昔無數劫受苦流轉生死中不聞佛名故第八西北方真實慧菩薩心不顛倒是真實慧頌意為顯欲令增進於一切法皆得善巧文言於法不顛倒如實覺了是善巧義十頌分二前二明依實立名名能益物後八顯名下之實辨益所由今初前頌明損益受苦聞名速解脫故受樂不聞反沉淪故後頌敘昔以成今說後頌敘昔等者偈中但是敘昔偈意乃成今說既執我受苦明昔說無我為正說也於法不顛倒如實而現證離諸和合相是名無上覺現在非和合去來亦復然一切法無相是則佛真體若能如是觀諸法甚深義則見一切佛法身真實相後八中分三初三覺妄證實是覺察義次一雙覺二諦是覺照義後四非覺而覺是妙覺義初覺妄等者顯其三覺一覺察者如睡夢覺亦如人覺賊賊無能為妄即賊也二覺照者即照理事也亦如蓮華開照見自心一真法界恒沙性德如其勝義覺諸法故三妙覺者即上二覺離覺所覺故為妙耳非更別覺故楞伽云一切無涅槃無有涅槃佛無有佛涅槃遠離覺所覺若有若無有故為妙覺故起信云又心起者無有初相可知而言知初相者即謂無念此明非覺而覺也今初也初偈證實立名初句揀似比量無常計常常計無常等是顛倒法名似比量次句證真現量如眼見故次句揀似現量顯真現量謂男女天地等見一合相名似現量一合相相不可得故故名為離非唯所覺離合亦無如外之智與如合也下句結名初句揀似比量者然凖因明總有八義今此有四故論云能立與能破及似唯悟他現量與比量及似唯自悟謂能立能破現量比量此之四義各有真似故成八耳言八義者一對敵申量三分圓明開曉於賔故名能立二斥量非圓彈支有謬示悟於主故名能破三對敵申量三支謬非曉於敵故名似立四妄斥非圓彈支有謬不悟於主故名似破五於色等義有正智生自相處轉故名現量六謂籍眾相而觀於義相應智起故名比量七有分別智於義異轉了衣等名似現量八以似因智於似所比相違解起名似比量廣如彼說今䟽云無常計常即是第八如色是無常知從緣生剎那滅故故是無常此籍因緣相應智起是真比量今以相續覆故即似因智起訂之為常即相違解起名似比量故為顏倒今云於法不顛倒故是揀似比量謂男女天地此即第七一合相者眾緣和合故如攬眾微以成於色合五陰等以成於人名一合相如是見者是有分別智於義異轉故名似現一合相下顯真現量不可得者即金剛經云如來說一合相即非一合相以從緣合即無性故無性之性是所證理如是知者是正智生是自相處轉名真現量上來離於所覺和合之相已為現量非唯已下又拂能所證跡為真現量謂若有如外之智與如合者猶有所得非真實證能所兩亡方為真現故唯識云若時於所緣智都無所得爾時住唯識離二取相故故下經云無有智外如為智所入亦無如外智能證於如如是方為真現量也是故經云離諸和合相次偈例去來後偈成現觀後偈成現觀者即前真現量也現觀有六十地當釋今通前三於實見真實非實見不實如是究竟解是故名為佛次一覺照者真諦名實無和合故俗諦非實假和合故互融無雜名究竟解夫實見者尚不見實何况非實見非實者知其即實故中論云一切法真實一切法非實亦實亦非實非實非非實是名諸佛法夫實見者即淨名經入不二法門品樂實菩薩曰實不實為二實見者尚不見實何况非實所以者何非肉眼所見慧眼乃能見而此慧眼無見無不見是為入不二法門此明實者真實之理非實者緣生假合今尚不得所證之如豈况如外假有之法見非實者即諸經意云若見非實即真名見非實下引中論即是法品前光明覺品已廣引竟然實有二意且就一相理實為實事相非實即真俗二諦俗則一切皆俗佛亦隨俗立名真則一切皆真知妄本自真故雙照為俱存互奪即雙寂佛法不可覺了此名覺法諸佛如是修一法不可得後四非覺而覺者初偈正顯如智相離名不可覺寂無遺照故名了此要不可得方是真修知以一故眾知以眾故一諸法無所依但從和合起無能作所作唯從業想生云何知如是異此無有故次二偈展轉釋成初偈釋無一之義上半相待而有通同異體下半緣生故空則一多相盡矣後偈上半釋前偈下半無能所作故無所依從業想生故是和合下半釋成上半云何知無能所異業想外無我所故一切法無住定處不可得諸佛住於此究竟不動搖後有一偈結成妙義上半所住下半能住由無住故無所不住謂不住有以即空故故能住有契有實故亦不住無無即有故不住俱有無無二體故不住雙非不壞二相故由無住者即般若中意彼前更反釋云若有所住則有所不住謂不住有下䟽釋上文由無住故無不住義能住例知既以無住為住則心絕動搖方契本覺湛然常住能住例知者上辦四句唯住有句具住不住義下三皆畧若具住無應云亦不住無無即有故故能住無契無實故俱句云故能住有無契二實故俱非句云故能住非有無契非有無實故既以無住下釋第四畢竟不動搖句即大般若曼殊室利分亦前已引從方契以下是䟽釋義結歸諸佛住於此義爾時無上慧菩薩承佛威力普觀十方而說頌言無上摩訶薩遠離眾生想無有能過者故號為無上第九下方無上慧名如初頌又從法王教生當紹佛位故名無上頌意為顯欲令增進心無障礙文云無著無念不住法故十頌分三初一釋己名義次八顯佛勝德後一推功結益諸佛所得處無作無分別麤者無所有微細亦復然次八中分二前六內證德後二外化德前中亦二前偈正明證入後五照境顯理今初即菩提涅槃以無所得得菩提故處即涅槃本覺自然故非造作悟亦㝠符則智無分別三細已盡六麤居然又不可以識識故無麤者不可以智知故無細者又有能所證名之為麤無能所證目之為細皆言語道斷故並無之菩提涅槃絕心行故本覺自然者即將第二句無作字釋初句處字悟亦𡨋符下將第二句無分別字囑初句所得字三細已下釋三四二句即起信論然由無明為因生三細境界為緣生六麤故彼論云復次依不覺故生三種相與彼本覺相應不離云何為三一者無明業相以依不覺故心動說名為業覺則不動動則有苦果不離因故二能見相以依動故能見不動則無見三者境界相以依能見故境界妄現離見則無境界以有境界緣故復生六種麤相云何為六一者智相依於境界心起分別愛與不愛故二者相續相依於智故生其苦樂不覺起念相續不斷故三者執取相依於相續緣念境界住持苦樂心起著故四者計名字相依於妄執分別虛假名言相故五者起業相依於名字尋名取著造種種業故六者業繫苦相依業受果不自在故當知無明能生一切染法以一切染法皆是不覺相故釋曰據此則六麤遠亦從無明生就顯著說境界耳故楞伽云境界風所動起信亦云因無明風動又不可以識識等者即取淨名見阿閦佛品釋此麤細又有能所下此中三重釋此麤細此當第三初約迷真起妄說後二約反本還源說而二約識智對論三者理智對辨諸佛所行境於中無有數正覺遠離數此是佛真法後五中初偈正明照境境即俗境有能所故即俗而真故云無數心同無為故云遠離是佛真法雙結能所如來光普照滅除眾暗冥是光非有照亦復非無照後四遣相顯理皆躡迹遣滯初偈雙非顯中照理滅障菩提涅槃離有無故於法無所著無念亦無染無住無處所不壞於法性此中無有二亦復無有一大智善見者如理巧安住次二偈釋前雙非一偈半釋非照義初句是總次句能照無著故云無念亦不染此無念次句所照無著以無處所為所住故次句不壞能所次二句雙遣性相次二句釋非無照稱理照故次二句雙遣性相者二即是相相差別故一即是性性不並真故今云無二即遣相也亦復無一即遣性也無中無有二無二亦復無三界一切空是則諸佛見後偈拂前無二之迹言無二者但言無有二非謂有無二若存無二之見則還成二以無二必對二故遣之又遣之以至於無遣故云三界一切空空謂第一義空諸佛同見三拂前無二者即無中無有二偈初句牒前無二之跡次句遣之言無二者牒初句也非謂有無二下正釋第二句而是反釋若謂有無二即執藥成病若存無二下出謂有無二之過遣之又遣之下拂跡若不得意于重遣之未免於二何者謂有人聞無二亦復無謂無無二為是亦有所著故中論云諸佛說空法為離諸有見若復見有空諸佛所不化以楔出楔以賊逐賊無有已時心無所著當法即絕故故至於無遣若以無遣為是亦有著矣此亦借老子損之又損之以至於無為之言凡夫無覺解佛令住正法諸法無所住悟此見自身非身而說身非起而現起無身亦無見是佛無上身後二外化德中前偈正顯令住無住之覺後偈釋成身即非身故無可悟悟身見起此見如身身見兩亡真法身也觀身實相觀佛亦然故就佛結悟身見起者前釋非身而說身此釋非起而現起由悟非身又生非身之見此見若有執復隨生身既非身見亦非見故云此見如身身見兩亡下釋下半身見兩亡則法界一相為真法身也觀身實相下通妨妨云向來觀身是菩薩觀那言是佛無一身耶通意可知即是淨名阿閦佛品如是實慧說諸佛妙法性若聞此法者當得清淨眼推功可知爾時堅固慧菩薩承佛威力普觀十方而說頌言偉哉大光明勇健無上士為利群迷故而興於世間第十上方堅固慧者智力成就不可壞故頌意為顯欲令增長一切種智文云得淨慧眼了佛境故十頌分四初偈總歎為物興世智光徧照大悲勇健第十菩薩智力成就者智力成就即十住中第十住智慧增故得佛十種智故不可壞即成今文堅固之名頌意已下即彼勝進經文文云已下即今偈意佛以大悲心普觀諸眾生見在三有中輪廻受眾苦唯除正等覺具德遵導師一切諸天人無能救護者若佛菩薩等不出於世間無有一眾生而能得安樂如來等正覺及諸賢聖眾出現於世間能與眾生樂次四別示悲相初偈觀機次二反以釋成後一正明兼顯僧寶若見如來者為得大善利聞佛名生信則是世間塔我等見世尊為得大利益聞如是妙法悉當成佛道諸菩薩過去以佛威神力得清淨慧眼了諸佛境界今見盧舍那重增清淨信次三頌半見聞利益佛智無邊際演說不可盡勝慧等菩薩及我堅固慧無數億劫中說亦不能盡後一頌半結德無盡此為終極故總舉前十音釋名稱稱昌孕切遠離並去聲偉哉偉羽鬼切大也
