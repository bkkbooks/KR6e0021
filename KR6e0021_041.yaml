body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述爾時文殊師利菩薩問智首菩薩言第八助道甚深問智首者以顯智為正道之體統其助故佛子於佛法中智為上首二正顯問端中三初舉法按定謂斷惑證理導行得果唯是大智彼此同許謂斷惑等者謂以智慧劒殺煩惱賊故無分別智方證如故言導行者智論云五度如盲人般若為有目故能明見夷途開導萬行御心中道至一切智城故餘行得智皆成彼岸般若究竟成菩提果如來何故或為衆生讚歎布施或讚持戒或讚堪忍或讚精進或讚禪定或讚智慧或復讚歎慈悲喜捨二如來下正設疑難謂既智為上首應唯讚智那亦讚餘此是正助相違難而終無有唯以一法而得出離成阿耨多羅三藐三菩提者三而終下結成前難前難云智為上首已應不合讚餘況非以一法成佛固當不合偏讚結成前難者此下亦有三重問意初言前難云智為上首及今非唯一法成佛不合偏讚今有偏讚其故何耶此直問所以也為要假多為唯用智為隨一行皆得佛耶二為要假多下帶疑問也若隨一得成亦違智為上首進退皆妨三若隨一得成者結成相違難也下答意中印其初後釋其中間謂智為上首誠如所言智如明王衆之御故大品云般若如目五度如盲故印後義云終無唯以一法實如來歎三世諸佛皆具說故以餘萬行資於智故釋其中間別讚乃有多意謂隨心令喜故隨時生善故所治蔽殊故入門不同故衆生不能盡受故下當屬文又智論云般若必具一切行是故讚一即是讚餘讚餘即是讚智釋其中間下釋中間總有五意前四即四隨後一統攝今初隨心令喜即下隨樂亦世界悉檀二隨時生善即下隨宜亦為人悉檀三所治蔽殊故即下隨治亦名對治悉檀四入門不同即下隨義亦名第一義悉檀悉檀此云義宗即智論中意諸佛說法不離此四故又智論下即第五意般若統攝諸行今讚一般若即是讚餘餘是般若中餘故但讚餘已讚般若時智首菩薩以頌答曰佛子甚希有能知衆生心如仁所問義諦聽我今說十頌分二初一歎問許說過去未來世現在諸導師無有說一法而得於道者餘九正答所難略分為二先二頌開二章門後七雙釋二章今初初偈標衆行成果章謂正助相假必萬行齊修故諸佛同說言無有說一者必具說也佛知衆生心性分各不同隨其所應受如是而說法後偈標隨機別讚章文具禪經四隨謂初句即隨樂也將護彼意稱恱其心故性不同者即隨宜也附先世習令易受行習以成性故分不同者即隨治也觀病輕重設藥多少謂貪分多者教不淨等隨其所應度者即隨義也道機時熟聞即悟故稱恱其心者謂前人樂行布施即勸布施樂行持戒即勸持戒等隨順世界順意樂故附先世習者心未必樂但夙世曾作勸則易成如昔曾坐禪今勸坐禪則易得定樂約現欲宜約有根亦猶鍛金之子宜令數息等隨治可知隨義謂隨以何法得入第一義故有人因禪悟道有人因慧悟道六度萬行皆為入理之門戶故慳者為讚施毀禁者讚戒多瞋為讚忍好懈讚精進亂意讚禪定愚癡讚智慧不仁讚慈愍怒害讚大悲憂戚為讚喜曲心讚歎捨下別釋中二初三釋隨器別讚章後四釋衆行成果章前中二初兩偈半別釋隨治後兩句結前生後今初然六度成其行四等曠其心四等多約利他六度多明自利六度如初會四等如下說然並通四隨略舉一治耳涅槃云慳者之前不讚布施者即隨樂意也然並通四隨者會經文也摽章具四釋但有一者蓋是略耳故引涅槃以證有四之義謂如一布施有樂施者勸之即隨樂也昔曾修行能生度善即隨宜也因施見理解財如夢心事俱捨即隨義也涅槃云慳者等即三十四經迦葉菩薩品佛告迦葉我於餘經中說五種衆生不應還為說五種法為不信者不讚正信為毀禁者不讚持戒為慳貪者不讚布施為懈怠者不讚多聞為愚癡者不讚智慧何以故智者若為是五種人說是五事當知說者不得名為具足知諸根力不得名為憐愍衆生何以故是五種人聞是事已生不信心惡心嗔心以是因緣於無量劫受苦果報今疏引之以成今文應具四義言是隨樂者彼不樂故亦是不宜讚故如是次第修漸具諸佛法二結前生後中上句結前下句生後後四偈釋衆行成果中各上半喻下半合然有二意一仍前漸具之義便得釋成智為上首二正明所用不同故須兼具然攝論第九明立六度通有三意一為除惑故二為生起佛法故三為成熟衆生故前段具初意此段通具三謂二二合者對治別故先基後室等即漸具故皆為利他即成熟故一仍前等者即前如是次第修漸具諸佛法由仍此言顯智得為上首二正明等者行本防護與樂別故故須兼具前意釋印初義此意釋印後義然攝論下引論成經通於前後如先立基堵而後造宮室施戒亦復然菩薩衆行本文中初偈二度為治不發行因故合云行本謂著財不發施著家不發戒故基堵有二義一基即是堵即施為進善之首戒為防惡之初並稱基也二堵為環牆即檀為萬行首基也戒防未非堵也宮室者解脫譬如建城郭為護諸人衆忍進亦如是防護諸菩薩次偈二度已發修行心為治退弱心因故謂不能忍生死苦事長時修助善品有疲怠故今忍城防外惱之敵進郭長內行之衆通說則此二皆能防外養內通說則此二皆能防外養內者諦察法理養內德也進防懈怠衆魔不入防外敵也譬如大力王率土咸戴仰定慧亦如是菩薩所依賴次偈二度治壞失心因故謂散亂壞靜慮邪智壞正解故今菩薩定靜惑亂慧鑑萬法動寂自在故菩薩依之以發通慧賴之以證理果其由有力之王澄清四海明鑑萬機故率土戴恩天下仰則澄清四海喻上定也明鑒萬機喻上慧也戴恩仰則喻依賴也亦如轉輪王能與一切樂四等亦如是與諸菩薩樂後一偈四等為因自他安樂招果無盡故招果無盡如慈一定得十五果三地當明爾時文殊師利菩薩問賢首菩薩言第九一道甚深亦名一乘問中標問賢首者至道柔順故又賢猶直善佛佛皆同一直道故佛子諸佛世尊唯以一道而得出離二正顯問端中三初標宗按定謂佛佛所乘同觀心性萬行齊修自始至終更無異徑故云一道此理共許同觀心性者即正道之一是唯一之一法性不並真故萬行齊修者義兼正助千佛同轍今古不易之一道也則明流類相同為一非一二三四數之一也云何今見一切佛土所有衆事種種不同二云何下正設疑難先總後別前中謂因道既一果應不別云何現見佛剎等殊為果異故因非一耶為因一故無異果耶若雙存者即因果相違謂因道既一等者疏中有二先釋文初釋總句亦有三重問意一直問所以故云云何現見二為果故下帶疑三若雙存下辨相違所謂世界衆生界說法調伏壽量光明神通衆會教儀法住各有差別下別辨十事所謂下經文在文易見今當略示異相一界有染淨等殊一染淨等者略有十義等字等於餘九二大小三所依四形狀五體性六莊嚴七清淨八佛出九劫住十劫轉變此即世界成就品十門中八不取起具因緣以將因同難果異故不等無差別門今難差別門也為欲滿十故加染淨及與大小大小即分量故亦形狀開出染淨即對清淨開出通餘八門如娑婆為染安樂為淨等小如娑婆一三千界大如法華富樓那國如一恆河沙三千界量等下之九門多如世界成就品二居人善惡等異二居人者等取或唯地上或唯地前或通此二或三乘一乘等也三諸乘等別廣略等殊三諸乘等別或有國土說一乘或二或三或四五如是乃至無有量或廣略者如釋迦如來廣制戒學迦葉即略乃至有佛夢中說法四或三學調伏或強軟折伏四或三學調攝即用前乘教等調攝衆生或戒調練或定以柔伏或慧以攝御言強軟者即勝鬘意已如上引淨名亦云此土衆生剛強難化故佛為說剛強之語以調伏之言是地獄是畜生是餓鬼是愚人行是身邪行是身邪行報等譬如象馬𢤱戾不調加諸楚毒乃至徹骨然後調伏五壽有修短五或壽有修短者如佛名經第七說梵聲佛壽十億嵗月面佛壽一日一夜智度論說須扇多佛朝見暮寂阿彌陀佛壽命無量無邊阿僧祇劫釋迦壽命不滿百年等六光明或色相不同或常放具闕或照有遠近六光明或色相不同者如十定品或見如來放黃金色光或見如來放白銀色光等言或常放具闕者釋迦則具謂常光一尋放眉間光照萬八千等若普明佛常放光明無別常光故七隨染淨土居人異故現通亦殊七隨染淨等者謂隨見勝劣多少不同故如普現如來國土其中衆生皆悉成就自然神足等則佛為彼現必異此方八衆會異者此有三種一多少二會數三凡聖大小一多少者或菩薩多聲聞少或反此或俱多俱少故世界成就品明佛出云或化多衆生或調伏少衆生等佛名經說彌留勝玉佛初會聲聞八十億百千那由他等斯即多也二會數者如佛名經第七云彌留勝王佛四會說法華勝佛一會說法聲德佛三會說法放焰佛十會說法或一經多會說如華嚴般若或一會說多經如無量義法華彌勒世尊龍華三會七佛說法會數不同三凡聖大小或集聲聞等或唯菩薩或三乘同會等九教儀者如此土以音聲為教香積以衆香教化等九教儀如教體中而言等者有二一瞪視等二化儀前後或先小後大先大後小或顯密不同頓漸等異並如教攝中說十法住者有久近故各有差別者通上十位十法住久近者如法華說華光佛正法住世三十二小劫像法住世亦三十二小劫若光明佛正像各二十小劫山海慧自在通王佛壽無量千萬億阿僧祇劫正法住世亦倍壽命像法住世復倍正法則正法二無量千萬億阿僧祗劫像法亦爾然若約一佛十事各不同者德首已明今問諸佛十事互望不同耳然若約一佛下二揀濫也恐人誤謂一佛一門西有多果故為此揀明此是多佛同修一因何以見果種種差別一佛證一而果異者如前已明謂文殊問德首云如來所悟唯是一法云何乃說無量諸法現無量剎化無量衆等故云德首已明無有不具一切佛法而成阿耨多羅三藐三菩提者第三無有下結成前難謂若諸佛於因行法有具不具可有剎等不同今皆同具剎等那別同具即是一道第二答中意云非唯因同果德亦同而見異者隨機感耳非佛自位而有差別何者諸佛因果具同異故謂同滿行海是同因也將此同因隨所調伏種種回向應機之果是異因也由此異因感差別果由上同因同感真應身土等果第二答中下疏文有二先略敘答意印其因同釋其果異異自在物同是佛同何者諸佛下二廣徵釋於中有二初徵文殊向以因同難於果異今明果亦有同何以不知因亦有異故互為不說故云俱有同異是則以佛就機因果俱異廢機說佛因果俱同然果同因異相隱因同果異相顯故文殊以顯難其所隱使物齊明成乎一道謂同滿行海下二釋有四初通釋四義一同滿行海者二利行也二將此同因下辨異因相亦用上來二利行也然法相宗自受用身及受用土自利行成若他受用變化身土利他行招然則利他亦能隨機而取異果諸佛皆爾亦得言同若法性宗二利皆成同因異因利他不圓安得真報自利不足豈能利他故隨二行並成自果俱能利他但隨所宜化類差別故取異果是則約佛即同能隨異約機同處而見異以生就佛雖異而常同以佛就生雖同而見異以佛望佛能異之必同其猶錦窠常同常異是則約佛下第二結成同異上直指因果同異之相今此融通會釋然有五句此句唯約佛既將同因回成異因故即同果能為異果二約機者唯約生說心自異故三以生就佛者猶如四心同觀一境一境不差成本同義四以佛就生者如雖一境令四心見殊成能異義五以佛望佛者佛佛皆能隨機見異即是同義結云猶如錦窠常同常異者融上五句不離同異無礙瑜伽三十八諸佛平等唯除四法一壽量二名號三族姓四身相意明隨機故除此四事餘皆等也瑜伽三十八下三引證同異除意明隨機故一句是疏釋論餘皆論文就果同中自性身土一向體同自受用者平等無二相似名同餘二身土亦相似名同而隨機見異故成唯識云自性身土一切如來同所證故體無差別自受用身及所依土雖一切佛各變不同而皆無邊不相障礙餘二身土隨諸如來所化有情有共不共所化共者同處同時諸佛各變為身為土形狀相似不相障礙展轉相雜為增上緣令所化生自識變現謂於一土有一佛身為現神通說法饒益於不共者唯一佛變諸有情類屬佛異故故成唯識下引證即第十論於中四種身土分之為三初釋自性身土既同所證明是體同如一室之空二自受用如千燈光同照室內三餘二身土即他受用及變化者正證於前亦相似名同而隨機見異有共不共者共為異故名共非是同義不共隨化別故上二皆異然共不共亦相似名同今其各見共不共差即隨機見異所化共者下第二釋也於中三初釋共義佛各變者如今釋迦化身若一類衆生昔與隔閦彌陀藥師寶集皆悉有緣應受其化所化之者身不可分在賢劫時閻浮之處則阿閦如來化一佛身為釋迦文阿彌陀佛亦化一身為釋迦文藥師琉璃光亦化一身為釋迦文寶集如來亦化一身為釋迦文同在迦毗菩提樹下一時成佛令諸衆生但謂是一釋迦文佛如五盞燈同照一物共發一影實有多光各發一影而相雜故謂之為一如其一人屬於五佛如上所明若百千人同屬五佛亦如是見五佛為一於不共者二釋不共設見十方百千化佛亦是一佛化現諸身耳諸有情類者第三雙結釋成就上來共不共義上來皆是論文唯屬佛異故一句是義引彼論具云諸有情類無始時來種性法爾更相繫屬或多屬一或一屬多故所化生有共不共不爾多佛久住世間各事劬勞實為無益一佛能益一切生故釋曰不爾已下即彼論文彈餘師義然應更有或多屬多或一屬一文無者略又彼論云無始時來種性法爾今雖取彼共不共義但約結緣不必法爾然攝論中有三師義一云共一一皆度一切等故二云不共以類本來相屬別故如慈氏釋迦同事底沙佛佛見釋迦所化先熟為之入定令其七日忘下一足一偈讚佛超於彌勒九劫先成豈非別耶三云有共不共若一向共何用多佛若一向不共不應歷事多佛願度一切不應以己所化衆生付囑後佛今唯識論即第三正義略彈共家不彈不共時賢首菩薩以頌答曰文殊法常爾法王唯一法一切無礙人一道出生死一切諸佛身唯是一法身一心一智慧力無畏亦然偈中義理多含故文勢非一且分為二初二偈印其立宗明真身無二餘偈答其疑難辨應有異同今初初句總印先標文殊者警其聽受法常爾者明因果無異法爾常規餘顯一相略明四一初句法一以法常故諸佛亦常次句人一次句因一後偈果一略舉其五一者身一此有二義謂若約所證法界為身則體同為一若兼能證無𦊱礙智為身即相似名一下既別明心智則正當初意然體同義異二心一八識心王俱不可知故三智慧一四智三智二智一智皆無別故四十力一五無畏一此五亦略攝諸德略明四一者上以因一難於果異今此且明因果一相然體同義異者通妨恐有難云既取初義體同為一則一佛證時一切皆證若約出現實如所難佛見衆生皆以證竟今約現事故為此通以體就能有證未證千燈一室所照同空以燈就空空體無二以空就燈有照未照隨燈各取各屬本燈佛義亦爾八識心王等者以非佛無心但深妙玄奧難知相耳故出現品云如來心意識俱不可得但以智無量故知如來心既云知如來心則非無心矣彼有十相一一皆云是為如來心第一相等諸菩薩摩訶薩應如是知今取佛佛之心皆不可知故名一耳如本趣菩提所有回向心得如是剎土衆會及說法二答疑難中分二初二偈總明隨機見異於中前偈約佛後偈約機前中即隨本異因為物回向各得差別故云如是如是即差別之義也略舉十中三事耳即隨所化衆生而取佛土即隨本等者如衆生宜以直心土化菩薩即將直心因取直心土等即隨諸衆生應以何國起菩薩根而取佛土等故云得如是佛土謂染淨等土相不一故一切諸佛剎莊嚴悉圓滿隨衆生行異如是見不同後偈約機者約佛則剎等皆圓約機隨行見別如直心為行則見不諂之國故衆生之類是菩薩佛土佛剎與佛身衆會及言說如是諸佛法衆生莫能見餘六偈展轉釋疑分四初一偈有疑云若皆圓滿何以不見答意云衆生不見豈得云無然有三義一約他受用則地前凡小衆生不見二約自受用則等覺衆生亦皆不見若約即應同真權教菩薩不見答意云衆生不見者即同淨名經云爾時舍利弗承佛威神作是念若菩薩心淨則佛土淨者我世尊本行菩薩道時意豈不淨而是佛土不淨若是佛知其意即告舍利弗日月豈不淨耶而盲者不見對曰不也世尊是盲者過非日月咎舍利弗衆生罪故不見如來佛國嚴淨非如來咎舍利弗我此土淨而汝不見即其義也其心已清淨諸願皆具足如是明達人於此乃能覩次偈有疑云若皆不見何以知有釋云有見者故亦有三義初則淨意樂地已去由願自在力故見他受用二淨無塵習普賢願滿方見自受用三圓解之人則名心淨即應見真意在初後義兼中間亦有三義初則淨意樂地者此中三義對前三義由初他受用身地前不見此辨登地則見下二例知隨衆生心樂及以業果力如是見差別此佛威神故三有一偈疑云若應由物見何名佛土釋云佛威神故則知生佛共成既攬同成異亦稱體成益既攬同成異等者既是如來將其同因以取異果故令圓機即應見真故云稱體成益佛剎無分別無憎無有愛但隨衆生心如是見有殊四有三偈釋疑云上云衆生不見淨剎又云佛神力令異為剎體處別佛有分別耶故釋云剎實同處佛亦無心物自見異耳於中初半顯實云剎無分別佛無憎愛分別即差別義故𣈆經云佛剎無異相如來無憎愛若順今經亦可此二通佛及剎次半偈明異自在物若順今經者上取𣈆經意無分別是無差別故但屬剎無憎愛約心故但屬佛今直案文佛具無分別無憎愛以無分別智心平等故剎亦無分別無憎愛以境但無心即無分別何有憎愛是則佛字兩用佛無分別佛剎無分別等以是於世界所見各差別非一切如來大仙之過咎次半偈明正見剎異次半偈彰非佛咎次半偈等者此明見異之因因心及業故下半正明見異一切諸世界所應受化者常見人中雄諸佛法如是次三句釋佛無憎愛有感便現非佛有愛無感不見非佛有憎末後一句總結一切諸佛法皆如是隨機隱顯真體常存亦通結一段爾時諸菩薩謂文殊師利菩薩言第十佛境界甚深十信觀圓便造佛境於中亦先問後答問中分二初標能所問人大衆同問者攝別歸總故總別無礙六相圓融問文殊者佛境甚深除般若妙德無能達故始信終智皆託佛境故無按定結難者表尊敬故若人若法難致詰故十信觀圓等者此明來意亦辨在後之義始信終智等者文殊主二法門一主信故善財初見便發信心二主智故善財後見便見普賢始入之信亦信佛境能度之智亦證佛境故文殊說佛子我等所解各自說已唯願仁者以妙辨才演暢如來所有境界二佛子我等下正申請問又分為二初結前標後如讚妙辨者敬上首故何等是佛境界何等是佛境界因何等是佛境界度何等是佛境界入何等是佛境界智何等是佛境界法何等是佛境界說何等是佛境界知何等是佛境界證何等是佛境界現何等是佛境界廣二何等下別顯問端句有十一初總餘別初境界有二一分齊境界謂從十地因後果位之法是佛所有二所緣境界謂佛所知之境並非餘測總為佛境二請問佛境以何為因三請佛境度生儀式四應機普入世間五能知之智六所知之法七圓音起說八明知體相九內證平等十顯現何法十一量之大小並非因位作用所及亦非下位能知故云佛境若約能知能度等即是分齊約所知等名曰所緣能所雙融異即非異言思道斷是佛境也並非因位等者結也此結分齊境亦非下位所知者通結二境時文殊師利菩薩以頌答曰答中十頌次第而答唯廣一義獨在於初與總合辨欲顯分量遍於總故即深而廣故如來深境界其量等虛空一切衆生入而實無所入初句總標體深次句分量廣大故佛地論引經釋云諸佛境界唯除虛空無能為喻次句釋上廣後句釋上深然有三義一約一切衆生即如來藏更何所入翻迷之悟故云證入二約理非即非異故云入無所入三約心境心冥真境故說為入若有所入境智未亡豈得稱入實無所入方名真入即廣之深本超言念即深之廣安測其涯然有三義者五釋第四句而實無所入言仍取第三句釋之故皆有證入之言此三別者初一以理對悟說二以理對事說謂生是事與理非即故有入言與理非異故無所入三正約心境契合說謂正冥境時不作入解故即廣之深下總結一偈意如來深境界所有勝妙因億劫常宣說亦復不能盡二答因問謂此因無限略示三義一殊勝以行超絶無等等故二微妙以證理深玄盡法源故三廣大以多劫說少亦不盡故一殊勝等者三義並在偈中隨其心智慧誘進咸令益如是度衆生諸佛之境界三答度問謂隨其心器意樂不同隨其智力解悟差別誘引進修令各獲益以遍法界委悉無謬差別難知故云佛境世間諸國土一切皆隨入智身無有色非彼所能見四答入問謂世間即是衆生世間國土即器世間一切者遍法界故入有二義一以智身潛入密益衆生故二以色身現入顯益衆生智身難知文中偏顯諸佛智自在三世無所礙如是慧境界平等如虛空五答智問上半權智橫無不知故云自在豎達三際故無所礙下半實智故云慧境平等如空無若干也虛空之言亦兼喻上無𦊱礙也權實無礙方為佛境無若干者即淨名第三其無礙慧無若干也法界衆生界究竟無差別一切悉了知此是如來境六答法問法界是理生界是事攬理成事理徹事表故云無別是故事則不待壞而恆真理則不待隱而恆俗非直廣大無限亦乃甚深無際究盡了知故稱佛境答法問疏有二釋前釋但融二境後釋境智雙融前中攬理成事者是依理成事門理徹事表者是真理即事門但用此二即顯無別此影略明耳亦應云理依事顯即事能顯理門事徹理源即事法即理門是故事則不待壞者成上二句此成前句以事全攬理非色滅空色性自空故下句成下理徹事表故不待隱而恆俗也非直廣大下結謂生生稱真則一一廣大理非事外是謂甚深又理遍於生故云廣大即生即理故曰甚深此則結歸初總偈中深廣義也又法界是所證生界是所化了知是能證能化究尋其本亦無差別是難知之佛境也又法界下第二釋融境智也則究竟無差別有其兩向向上融二界通向下融能所了故云究尋其本亦無差別即能所契合同法界也一切世界中所有諸音聲佛智皆隨了亦無有分別七答說問一切言音隨性隨相皆悉了知未曾起念故無分別以一切差別言音即是如來法輪聲攝故以斯答說音聲實相即法輪故以一切下通妨謂有問云上問說法今答智了豈得同耶故今答云所了之聲是佛法輪聲攝故隨其類音為說法故出現品云音聲實相即法輪故賢首品亦云能令三界所有聲聞者皆是如來音故上疏云隨性隨相皆悉了知了相差別隨宜之用了性體融一攝一切非識所能識亦非心境界其性本清淨開示諸羣生八答知即心體知即心體者此句摽示上智即對所證之法明能證之智今直語靈知真心異乎木石者通能所證也了別即非真知故非識所識了別下雙會南北宗禪以通經意此句即遣南宗病也謂識以了別為義了見心性亦非真知淨名云依智不依識謂分別名識無分別名智今有了別之識故非真知真知唯無念方見瞥起亦非真知故非心境界瞥起亦非者此釋第二句遣北宗之病北宗以不起心為玄妙故以集起名心起心看心是即妄想故非真知是以真知必忘心遺照言思道斷故勝天王般若問云云何菩薩修學甚深般若通達法界佛告勝天王言大王即是如實世尊云何如實大王即不變異世尊云何不變異大王所謂如如世尊云何如如大王此可智知非言能說離相無相遠離思量過覺觀境是謂菩薩修行甚深般若了達甚深法界釋曰但以無念心稱此而知即同佛知見經云如實即無念是用無念心見聞覺知一切事法心常寂靜即如來藏心體離念即非有念可無故云性本清淨心體離念者雙會二宗釋第三句以北宗宗於離念南宗破云離念則有念可離無念則本自無之離念如拂鏡無念如本淨今為會之起信既云心體離念亦本自離非有念可離亦同無念可無即性淨也非看竟方淨若無看之看亦猶無念念者則念真如衆生等有或翳不知故佛開示皆令悟入衆生等有下釋第四句即用法華開示悟入佛知見意謂開除惑障顯示真理令悟體空證入心體也大意然矣此有多釋已如前引今更略舉禪門釋之北宗云智用是知慧用是見見心不起名智智能知五根不動名慧慧能見是佛知見心不動是開開者開方便門色不動是示示者示真實相悟即妄念不生入即萬境常寂南宗云衆生佛智妄隔不見但得無念即本來自性寂靜為開寂靜體上自有本智以本智能見本來自性寂靜名示既得指示即見本性佛與衆生本來無異為悟悟後於一切有為無為有佛無佛常見本性自知妄想無性自覺聖智故是菩薩前聖所知轉相傳授即是入義上二各是一理前之略釋是疏本意餘如別說即體之用故問之以知即用之體故答以性淨知之一字衆妙之門若能虛己而會便契佛境即體之用下會違謂前問問知今答性淨都無知言何以會通故為此會故水南知識云即體之用名知即用之體為寂如即燈之時即是光即光之時即是燈燈為體光為用無二而二也知之一字衆妙之門亦是水南之言若能虛已下勸修即可以神會矣難以事求也能如是會非唯空識而已於我有分也非業非煩惱無物無住處無照無所行平等行世間九答證問即證大涅槃三德圓也非業繫故解脫也非煩惱者轉煩惱即菩提是般若也無物者虛相盡故法身顯也非業繫下釋相於中有三初經中七字示三德體無住處者成上法身無所在也無照者成上般若能證相寂也無所行者成上解脫無業行之用也二無住處下八字拂三德相三以第四句辨三德功能由無用故用彌法界由無照故無所不知由無在故無所不在故結句云平等行世間也由無用下釋第四句合上體相不二故功用普同也是謂三德祕藏佛之境也是謂三德下結三德廣義已見玄中下出現品復重解釋此但撮略對文耳一切衆生心普在三世中如來於一念一切悉明達十答現分上半所現初句橫盡十方次句豎窮三際下半能現並於如來圓鏡智中無念頓現故出現品云菩薩普現諸心行即斯義也上來辨十甚深即問答竟爾時此娑婆世界中一切衆生所有法差別業差別世間差別身差別根差別受生差別持戒果差別犯戒果差別國土果差別以佛神力悉皆明現自下第二現事結通於中二先現事後結通今初因何而現上來十首法光開曉衆生身心故佛力暫現示相而答令其自驗而欣厭故因何而現下疏文有三初來意可知二所現有十下釋文所現有十第一法即所行之法謂三學等殊二業謂正行漏無漏等三集因苦果四身類不同五根機差別六四生非一七持戒則人天勝劣八犯戒則三塗重輕九國土則依處染淨十說法則近報淨居聰明利智速具佛法此經文闕𣈆本具之七持戒者如第二地中說法者皆智論文論第十三引育王經云育王常供養衆僧有一比丘口內馨香育王懷疑試而驗之方知本有問其所因比丘答云迦葉佛時說法之果復聞說法果唯爾耶答此是華報問云果報云何因說偈云大名聞端正得樂及恭敬威光如日月為一切所愛辨才有大名能盡一切結苦滅得涅槃如是名為十又此亦可配十甚深以是示相答故一法首正教甚深二寶首業果三勤首懈怠難出四財首觀內身等五德首佛法一味隨根異說等六覺首往善惡趣七智首六度順行通為持戒之果八目首佛田平等但犯戒布施得果差別九賢首隨心世界有差別等十𣈆經既有說法即是說佛境界法也又此亦可者重會前文不為此釋則現事無由理必合耳但文影略故致亦可之言如是東方百千億那由他無數無量無邊無等不可數不可稱不可思不可量不可說盡法界虛空界一切世界中所有衆生法差別乃至國土果差別悉以佛神力故分明顯現第二如是下結通廣遍於中二初結東方南西北方四維上下亦復如是後南西下類餘九方亦現十事以此處說法則現事通於十方餘處說法亦應類此總為一法界大會思之問明品辨信中解竟音釋𢤱戾𢤱力董切音隴戾力霽切音例𢤱戾不調也瞪除庚切直視貌窠苦禾切諂丑剡切諛也瞥匹蔑切過目暫見也
