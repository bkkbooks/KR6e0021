body:
  text: 唐于闐國三藏沙門實义難陀譯唐清涼山大華嚴寺沙門澄觀撰述世主妙嚴品第一上來十例各顯一理然亦無盡若依常用應依三分謂初品為序現相品下正宗法界品內爾時文殊師利從善住樓閣出下明流通序中就文分二初此土序二結通十方無盡世界序初中復二初證信序後爾時如來道場下發起序二結通者文在第五卷末彼文有三初結此界次結華藏內後結華藏外然此二序廣如常解今但略陳初證信者若原其所由則阿難請問如來令置如智度論及大悲經說阿難請問者智論第二云佛涅槃時於拘尸那國娑羅雙𣗳間北首而臥一心欲入涅槃阿難親屬愛心未除未離欲心心沒憂海不能自出爾時長老阿泥樓豆語阿難言汝是守佛法藏人不應如凡人自沒憂海一切有為法是無常相汝莫憂愁又佛首付汝法汝今愁悶失所付事汝當問佛佛涅槃後我等云何行道誰當作師惡性車匿云何共住佛經之首作何等語如是種種未來要事應當問佛阿難聞是事已心悶小醒得念道力助於佛末後所臥牀邊以是事問佛佛告阿難若今現在若我過去依止念處莫依止餘乃至廣說身受心法除世間貪愛又云從今日後解脫戒經是汝大師如解脫戒經說身口意業應如是行又車匿比丘如梵天法治若心輭後應教迦旃延經即可得道復次是我三阿僧祇劫所集法寶藏是藏初首應作如是說言如是我聞一時佛在某方某國土某處𣗳林中是我法門初首應作如是說何以故三世諸佛法經首皆稱是語今我經初亦應稱此如是我聞一時等語及大悲經說者案大悲經第五云佛告阿難我今以是正法寶藏付囑於汝勿令毀滅阿難白佛言我今云何修行法眼乃至復云云何結集法眼佛告阿難我滅度後有諸大德比丘僧眾集法毗尼時彼諸大德摩訶迦葉最為上首阿難彼諸大德諸比丘眾應如是問世尊何處說大阿波陀那何處說摩訶尼陀那乃至云何處說聲聞藏緣覺藏菩薩藏阿難時諸比丘如是問已汝應答言如是我聞一時佛在摩伽陀國菩提樹下初成正覺如是我聞一時佛在伽耶城如是乃至云如是我聞一時佛在拘尸那城力士生地阿利羅跋提河邊娑羅雙樹間乃至云佛說經已一切大眾皆大歡喜頂戴奉行阿難汝應如是結集法眼餘可例知若覈其所以意有六焉一為異外道故外道經首皆立阿優以為吉故此約如是二為息諍論故智度論云若不推從佛聞言自制作則諍論起故今廢我從聞聞從佛來故經傳歷代妙軌不輟此局我聞今廢我從聞下上智論文此下生公意成上論義三為離增減過故佛地論云應知說此如是我聞意避增減異分過失謂如是法我親從佛聞文義決定非謂傳聞有增減失四為斷眾疑故真諦引律云結集法時阿難昇座變身如佛眾起三疑一疑大師涅槃重起二疑他方佛來三疑阿難轉身成佛說此如是我聞三疑頓斷既言我聞即非佛明矣上二義通約信聞五為生信故智論云說時方人令生信故此局後四六為順同三世佛故此通六種若凖佛地論科為五事一總顯已聞二教起時分三別顯教主四彰教起處五顯所被機今依智論開初總顯已聞作信聞二種為六成就一信二聞三時四主五處六眾然信聞二事文局初首義通九會時主二種文義俱通處眾二事文義俱局隨相則爾約實互融然信聞二事下料揀通局謂如是我聞唯經初有而九會經如是法義我皆得聞時主俱通者會會之初皆云爾時世尊等處眾俱局者摩竭非忉利天等處局十佛剎菩薩列名異故新舊菩薩亦不同故隨相則爾等者一會即一切會何有眾等而不通耶上來略依三分二序然此經體勢少異故依五分釋文而合後二名依人證入補為今四分者初舉果勸樂生信分二修因契果生解分三託法進修成行分四依人證入成德分此四科見玄談品會釋義等文此處藏無係後人所補因下就第一舉果分科無根且信觧行證是作疏之本理宜從補就第一舉果分中或科為十一教起因緣分即初一品二大眾同請分三面光集眾分四毫光示法分五眉間出眾分已上在第二品內六普賢三昧分七諸佛同加分八法主起定分九大眾重請分已上在第三品內十正陳法海分在後三品內若以義從文且分為三一教起因緣分二現相下說法儀式分三世界成就下正陳所說分就初分中亦分為十一總顯已聞二一時下標主時處三始成正覺別明時分四其地下別顯處嚴五爾時世尊下教主難思六有十佛世界下眾海雲集七從爾時如來道場下稱揚讚德八爾時如來師子座下座內眾流九爾時華藏下天地徵祥十如此世界下結通無盡如是我聞今即初也如是我聞者謂如是一部經義我昔親從佛聞故佛地論云謂傳佛教者言如是之事我昔曾聞如是總言依四義轉一依譬喻二依教誨三依問答四依許可具如彼論餘更有釋意不殊前此上總合信聞一依譬喻者如有說言富貴如毗沙門如是所傳所聞之法如佛所說此則以佛所說如毗沙門我今所傳如富貴人則以佛說為喻也亦有說言如是文句如我昔聞此以昔聞喻今聞也故云譬喻故有釋如是云兩法相似謂之如一法無非謂之是相似即譬喻耳二依教誨者如是當聽我昔所聞此即傳法者之教誨也亦有云即佛教誨謂如是法是我佛說應當諦聽如有人言汝當如是讀誦經論三依問答者謂眾聞言汝當所說昔定聞耶故此答言如是我聞四依許可者謂結集時諸菩薩眾咸共請言如汝所聞當如是說傳法菩薩便許可言如是當說如我所聞如是說言我當為汝如是而思如是而作如是而說等又許可者或信可言是事如是謂如是法我昔所聞此事如是齊此當說定無有異由四義故經初皆置如是我聞然上總意遍此四義非別理也餘更有釋者刊定記別開有九意一以總釋為一義次用上四別成五義六以許可中第二釋云又許可者或信可言為第六意此是大乘法師重釋第四許可非別義也設有異釋大同許可又引功德施論為第七釋云如是我聞者顯示此經是佛世尊現覺而演非自所作亦同佛地總意耳八引長耳三藏依三寶釋若大乘法師用之乃是離釋下文當引九引梁朝雲法師云如是我聞者將傳所聞之法先當標舉一部經教我於佛所聞者此亦全同佛地總意故云餘更有釋意不殊前若離釋者先釋如是信成就也智論云佛法大海信為能入智為能度信者言是事如是不信者言是事不如是故肇公云如是者即信順之辭也信則所言之理順順則師資之道成經無豐約非信不階故稱如是若離釋者下第二離釋信聞於中總明先依智論合如是二字通釋是信順之辭然論具云佛法大海信為能入智為能度如是者即是信也若人心中有清淨信是人能入佛法若無淨信當知是人不入佛法不信者言是事不如是是不信相信者言是事如是是信相故肇公云者此下肇公釋但是用智論意非是別理是以疏言故肇公云也復有人於肇上加云信為入法之初基智為究竟之玄術信則所言之理順順則師資之道成由信故所說之法皆可順從由順從故說聽二途師資建立此亦後人傍於智論肇公後加言則雖多亦非異理故疏收其異義立為別釋意同言異並畧不存後人不知重重因循皆列為異解有云聖人說法但為顯如唯如為是故稱如是此唯約所詮之理次真諦三藏云真不違俗名之為如俗順於真稱之為是真俗無二故稱如是此約所詮理事有云聖人下此下自狹之寬以釋此第一最局唯取如故即劉虬注無量義經若云如斯之言是佛所說則唯約能詮有云如者當理之言言理相順謂之如也是者無非之稱若云如斯下即梁武帝釋此約能詮通詮事理有云如者當理之言者通能所詮含於事理理者道理非唯真如即生公釋法華經此明說事如事說理如理明能詮之教稱於事理也融云如是者感應之端也如以順機受名是以無非為稱眾生以無非為感如來以順機為應此明說事下此即於生公釋中傍出遠公約法以釋意明生公即遠公意然彼具云一約法解阿難道彼如來所說如於諸法故名為如說理如理說事如事說因如因說果如果如法之言是當道理故曰如是良以乖法名為非故如法之言得稱為是其言雖多但是道理之言耳故不異生公融云如是者謂以如字為佛應是字為機感故漸寬前經以言教出於感應故云如是此兼對機經以言教下後通妨難恐有難云如即是應是即為感何不名為感應我聞故為此通有引此為注法華釋云注是劉公用融公義耳上來諸釋各是一途更有諸釋言異意同更有諸釋者謂長耳三藏就三寶釋云一就佛三世諸佛共說不異故名為如以同說故稱之為是此大同梁帝二約法云諸法實相古今不異故名為如如來為說故稱為是此同劉云聖人說法但為顯如三約僧釋云以阿難聞望佛所教所傳不異故名為如永離過非故名為是此同佛地總意故云言異意同又寶公約離五謗釋云第一句如是此經離執有增益謗故云如是第二句如是此經離第二執無損減謗第三句如是此經離第三執亦有亦無相違謗第四句如是此經離第四執非有非無愚癡謗第五句如是此經離第五執非非有非非無戲論謗此上五謗當理之言即皆攝盡又真諦三藏約二諦釋既離有無則離俱及俱非等故亦不異前釋故云言異意同若依生物之信應如智論及佛地論合釋若取敵對阿優應如真諦所釋今當廣之外謂阿之言無優之言有萬法雖眾不出有無此即斷常之計今云如即真空是即妙有既無俗外之真故空而非斷無真外之俗故有而非常即對破邪宗以彰中道一代時教不出於斯故云如是若取敵對者百論云外道立阿優為吉智論云梵王昔有七十二字以訓於世教化眾生後時眾生福德轉薄梵王因茲吞噉在口兩角各留一字是其阿優亦云阿嘔梵語輕重耳若華嚴宗以無障礙法界曰如唯此無非為是應隨教門深淺以顯如是不同若華嚴宗下第二以宗揀定即約教以釋上通諸教今先舉圓宗後應隨教門下依五教以釋既如是為當理之言明於二諦則小乘人法為俗生空為真始教之中四重真俗終教之中事理真俗二相交徹如真諦所解頓教則真俗兩亡亡言絕慮方稱當理如無常經應以生老病死定可猒等稱為當理之言異此所明不得稱是二我聞者聞成就也將欲傳之於未聞若有言而不傳便是徒設不在能說貴在能傳故次明我聞我即阿難聞謂親自聽聞云何稱我即諸蘊假者云何稱下先徵釋我我諸蘊假者通於諸教此用何聞若依大小乘法相各有三說一耳聞非識二識聞非耳三緣合方聞然或具四緣八緣等此用何聞下徵聞重釋通於我聞若依大小乘下約教別釋於中三叚初法相中含前小乘及與始教於中初正釋言小乘三者初薩婆多宗自有三義一法救論師耳聞非識謂雖自分識依根方聞然聞體是根非是於識如聞既爾見等亦然故雜心云自分眼見色非彼眼識見非慧非和合不見障外色故二妙音師識聞非耳根無覺故三成實師和合能聞上三並如俱舍界品及婆沙第十三說大乘三者一耳聞非識如雜集第二云耳界有何相謂能聞聲瑜伽三十五云於聲作意至能聞故二識聞非耳梁攝論云聞有三義一聞體謂耳識二聞資糧謂音聲三聞果謂即聞慧唯此耳識以為正聞三和合能聞佛地論云聞謂耳根𤼵識領受聲塵瑜伽論云聞謂聽聞即是耳根𤼵生耳識聞受教故然或具四緣八緣等者通釋大小乘和合聞義上言和合但合根識今取具緣故云四八然其四八是生識緣若取能聞兼所𤼵識則或五或九故疏云等言或四者即是小乘一空二根三境四作意故智論云爾時耳根不壞聲在可聞處作意欲聞情塵意合即耳識生隨耳識生即意識生方能分別種種因緣方得聞聲釋曰聲在可聞處即空二即作意情即是根故中論內詺六根品為六情品古云根含識義目之為情塵即是境意即是根加此為五𤼵生耳識言隨耳識生即意識生即同時意識分別非是緣也若約分別聲塵則同時意識亦是緣也種種因緣得聞聲總結也言八緣者於前四上復加於四謂一空二根三境四作意五根本依即頼耶識六染淨依第七識七分別依第六識八種子種子為因緣依諸有為法皆託此依離此因緣必不生故分別依者即第六識染淨依者即第七識根本依者即第八識根即同境依故唯識第四云由此五識俱有所依定有四種謂五色根六七八識隨闕一種必不轉故同境分別染淨根本所依別故如有偈云眼識九緣生耳識唯從八鼻舌身三七後三五三四若加等無間於前各加一釋曰眼九緣者復加於明闇中無見故耳已除明七更除空此三合中知故後三即六七八也六識五緣更除染淨及與分別分別即所𤼵識染淨即所依根第七識或三或四四謂除染淨染淨即所𤼵識故前六識中約為根故除此第七中約為識故除復除第八第八即總故或三者更除於境境即根故言三者即第八但有種子作意及根或四即更加境此上諸釋因便故來雖因耳處廢別從總故稱我聞法雖無我言語便故隨順世聞故稱我聞非邪慢心而有所說雖因耳處下第二解妨此有二妨一有問言現是耳聞云何言我聞故為此通明我為總總該眼耳等諸根故即佛地論文二有問言一切佛教詮於無我阿難已是入理聖人那同凡夫而稱我聞故此通云法雖無我是牒問意後言語便下即是通釋於中先顯正後非邪慢下揀非此中通是二論之意謂智論第一有三復次以釋無我說我一云復次世間法中說我非第一義中說以是之故諸法空無我世間法故雖說於我無實體故二云復次世間語言有三根本一邪二慢三名字前二不淨後一是淨一切凡夫具三種語見道學人具二種語謂慢名字諸聖人一種語謂名字內心不計實法隨世間人共傳是語佛弟子順俗故說我無咎三云復次若人著無我相諸法是實餘皆妄語是人應難此一切法實相無我云何言如是我聞今諸佛弟子知一切法空無所有是中心不著亦不著諸法實相何况無我中心有所著以是義故不應難言何以說我釋曰上三復次一隨世間故二破邪見故三不著無我故二者依瑜伽論第六云畧由四義故稱我聞一為世間語便易故二為隨順世間故三為斷除決定無我怖畏故四謂宣說自他得失令生決定信解心故顯揚第九雜集第十三皆同此說釋曰此與智論大同瑜伽第一智論畧無易故不出二即智論第一三即智論第三謂著無我即無我怖者謂若定無我為誰修學故不說無我著即令怖不著故不說無我此怖自除四即第二謂隨世流布即能令他生決定信解之心已知二論言異意同故今疏明舍於二論取其言同言語便易即瑜伽第一意隨順世間即瑜伽第二智論第一非邪慢心而有所說即智論第二意中所揀二語大乘法師傍智論意立三種我一妄執我即此邪我二者假施設我謂大涅槃樂淨常我除二乘倒強施設故此亦即是智論名字中𠬧而智論於世間假名此依出世法假名三世流布我正同智論三語之中名字我耳然此中更有問言為佛說法而言我聞為不說法而言我聞即本質影像之義已見教體中故疏不問若依無相我既無我聞亦無聞從緣空故而不壞假名即不聞聞耳若依無相下第二無相宗含於三教謂始教頓教實教謂若但云我既無我聞亦無聞即大乘初門為始教意若云能所雙寂無聞不聞亦無我不我離念頓顯即頓教意其從緣空故有三者向上成前二教無我所以二者向下不壞假名即不聞之聞為實教意謂事理無礙故聞即不聞無二義故故智論云聞者云何聞用耳根聞耶用耳識聞耶用意識聞耶若耳根聞耳根無覺知故不應聞若耳識聞耳識一念不能分別故不應聞若意識聞意識亦不能聞何以故先五識識五塵然後意識識意識不能識現在五塵唯識過去未來五塵若意識能識現在五塵者盲聾人亦應識色聲何以故意識不破故答曰非耳根能聞亦非耳識亦非意識是聞聲事從多因緣和合故得聞聲不得言一法能聞聲何以故耳根無覺故不應聞聲識亦無色無對無處故亦不應聞聲聲無覺亦無根故不能知聲釋曰此上皆明相離不能聞下云爾時耳根不壞等即辯和合能聞已如前法相宗中引今明和合而聞聞即無聞皆實教意若劉公注法華經云陰入非主為我聽受非情曰聞深照緣起悟解法空若斯人也顧命之所因然後傳而無執物我同致釋曰此初亦始教意從深照緣起下即實教意然皆屬無相宗攝又言不聞聞者即涅槃十九十地品中當引大意但明事不礙理故不聞約理不礙事故為聞若約法性此經旨趣傳法菩薩以我無我不二之真我根境非一異之妙耳聞無礙法界之法門也若約法性下第三約法性宗辯而但明圓教中意言以我無我不二之真我者含兩經意一者淨名云於我無我而不二是無我義二者涅槃云無我法中有真我是故敬禮無上尊正當今意即口順世間心造真境真自在我根境非一異之妙耳者以根與境共為緣起因根說境因境說根互相融即故曰非異兩相歷然故曰非一斯為妙耳何所不聞然阿難所不聞經或云展轉傳聞或云如來重說或云得深三昧或自然能通然阿難所不聞經下第二釋不聞難謂有問言阿難是佛得道夜生年滿二十方始出家年至三十如來方命以為侍者自三十年前如來所說阿難不聞何以經初皆言我聞故為此答答有四意大為兩節前三帶權後一顯實一或展轉聞者自有說一報恩第六云阿難所不聞經從諸比丘邊聞或有諸天向阿難說二依涅槃四十云我涅槃後阿難比丘所未聞者弘廣菩薩當廣流布阿難所聞自能宣通三智論第二云迦葉阿難於王舍城結集三藏是時長老大迦葉謂阿難言佛囑累汝令持法藏汝應報佛恩佛在何處最初說法諸大弟子能守護法藏者皆已滅度唯汝一人在汝今應隨佛心憐愍眾生故集佛法藏時阿難禮眾僧已坐師子牀時大迦葉說偈言佛聖師子王阿難是佛子師子座處坐觀眾無有佛如是大德眾無佛失威神如夜無月時虛空不清淨如大智人說汝佛子當演何處最初說今汝當布現是時長老阿難一心合掌向佛涅槃方如是說言佛初說法時爾時我不見如是展轉聞佛在波羅柰佛為五比丘初開甘露門說四聖諦法苦集滅道諦阿若憍陳如最初得見道及八萬諸天聞是得見道以是等文明是傳聞故云或展轉傳聞或云如來重說者報恩經第六明阿難佛命為侍者阿難從佛請求三願一者不受佛故衣二者不受佛別請三者所未聞法更請重說如來將入涅槃前更為阿難重說或云得深三昧自然通達者金剛華經云阿難得法性覺自在王三昧故如來前所說經皆能憶持與親聞無異涅槃亦云阿難多聞士若在若不在自然能解了常與無常義法華得受記竟云世尊甚希有令我念過去無量諸佛法如今日所聞我今無復疑安住於佛道方便為侍者護持諸佛法既云得記竟方悟亦帶方便據方便為侍者即密顯實矣上皆就跡而說實是大權菩薩影響弘傳如不思議境界經斯為良證但隨機教別故見聞不同上皆就迹下顯實於中上一句是結前此下正顯實義如不思議者彼經云爾時復有千億菩薩現聲聞形亦來會坐其名曰舍利弗目犍連乃至云阿難提婆達多跋難陀等而為上首皆已久修六波羅蜜近佛菩提為化眾生於雜染土現聲聞形釋曰是大菩薩方為顯本故為實說如法華五百弟子品云諸比丘諦聽佛子所行道善學方便故不可得思議知眾樂小法而畏於大智是故諸菩薩作聲聞緣覺即阿難章中云方便為侍者護持諸佛法即大權明矣但隨機教別者亦含多義一成上諸說但隨機教二者即約三種阿難受持三藏故云隨機教別見聞不同三種阿難即大乘集法經說玄中已引金剛仙論及真諦般若疏引闍王懺悔經等並同此說上來總顯已聞科竟一時佛在摩竭提國阿蘭若法菩提場中第二標主時處者即三成就言一時者時成就也時者亦隨世假立時分一者揀異餘時如來說經時有無量不能別舉一言略周故云一時如涅槃云一時佛在恒河岸等即法王啟運嘉會之時也亦隨世假立者謂佛法中時不可得中論云因物故有時離物何有時物尚無所有何况當有時今隨世俗說有一時智論意同揀異餘時者謂趣舉一時耳即法王啟運者即肇公語意亦可知啟者開也嘉者善也易云元者善之長也亨者嘉之會也謂佛開大運演說真乘即嘉善之會也亦可機教一時謂上言如是言雖當理若不會時亦為虛唱今明物機感聖聖能垂應凡聖道交不失良機故云一時亦可機教下二感應合釋即生公意佛者主成就也具云勃陀此云覺者謂自他覺滿之者雖具十號佛義包含故偏明之義見題中佛者下若言菩提但稱為覺若云佛陀此云覺者然覺有三一自覺謂雙覺事理如睡夢覺如蓮華開此揀凡夫二者覺他揀異二乘三者覺滿揀異菩薩故云自他覺滿之者若禪觀說亦云離心名自覺離色名覺他色心俱離為覺滿以依起信心體離念名本覺故題中總有此義釋之在摩竭下處成就也真身無在而無不在故次辯之真身無在下總顯大意言無在者體相寂寥離能所故無不在者體圓遍故故下經云譬如虛空遍至一切色非色處非至非不至何以故虛空無身故如來亦爾遍一切法遍一切眾生遍一切國土非至非不至何以故如來身無身故為眾生故示現其身又無在即體無不在即用體用無礙故為真身此亦淨名身子答天女意女身色相無在無不在也摩竭提國者通舉說處此云無毒害以國法無刑戮故表能化法或云遍聰慧聰慧之人遍其國故表所化機阿蘭若法者別舉說場也阿蘭若者此云無諠諍即事靜也法者所證真理二障業苦諠雜斯盡也事理俱寂故加法言菩提場者菩提云覺即能證大智圓明究竟也場者證菩提之處也然事處即天地之中王舍城之西二百里金剛座上約法則萬行皆是道場理智相會之所故為表所說如所證故不移其處說之若圓融時處等並如前說為表所說下釋處所以表自心中所證非是隨宜故不移證處始成正覺第三別明時分者前標一時未知何時故今別顯是初成佛時亦彰大師出現時也此教勝故眾教本故在於初時三別明時分中分二先躡前生起雙標二時謂說法時及成佛時初言尚總幾日之初九會之文同此初不初言尚總下次假問徵起此有二徵一徵初遠近二徵初通局略為三解一約不壞前後相說纔成初七說前五會第二七日說十地等第九一會乃在後時以祇園身子皆後時故畧為三解下第三解釋此上總標三義即為三別三解之中初之一解徵初遠近近在一念答初通局局初五會第二解在二七之後而通九會第三解取前師即一念之初取後第二師通於九會初正明時分中明九會分為三時非總初也以祗園身子等者出後時所以祗園在後者佛成道後在王舍城因長者為子娶妻至於此城聞佛𤼵心方造精舍故知在後身子等在後者案報恩經初度五人次度耶舍門徒五十人次度優樓頻螺門徒五百次度伽耶門人三百次度那提門人二百次度鶖子門徒一百次度目連門徒一百合有一千二百五十五人十二遊經初成道第一年度五比丘第二年化迦葉兄弟三人第五年度身子目連五人者一拘隣二頞鞞亦云馬星跋提三摩訶男四十力迦葉五拘利太子二是母親三是父親釋曰既身子等在後今第九會有此等五百及祗園則在後矣常恒之說不妨後時雖能頓說有所表故初五信解行願最在初故故皆云不離道樹第六會因地證位居其次深故無不起菩提樹言法界極證最在於後故亦顯二乘絕見聞故雖異處別時亦不相離為寄穢土以顯淨故須前後耳常恒之說下第二遮伏難總有四難一云華嚴教旨時處圓融要歷三時豈通玄趣故此釋云常恒之說說無息時後時不談豈名常說二有難云如來圓音頓演何要三節方盡幽微故此通云雖能頓演表法淺深故須三節三有難云若表三節三七日中一七一節足得成表何要後時故此答云三七未有聲聞不得顯於不共之教故須後時故疏云亦顯二乘絕見聞故四有難云處歷穢土時不相融豈順華嚴圓融之旨故此答云正為融於異時及與穢土即一剎那即是淨故故疏云雖異處別時亦不相離等若爾世親那云初七不說但思惟行因緣行耶世親纔見十地即為論釋或則未窮廣文或則知見有異未全剋定菩提流支意大同此若爾世親下即第三會論文言思惟行因緣行者因謂自所得法緣謂所化之噐欲將己所證法為眾生說名為行因緣行故法華經云我所得智慧微妙最第一眾生諸根鈍著樂癡所言如斯之等類云何而可度等是也彼思不得一乘機今思即得一乘機為異耳二順論釋九會皆在二七日後二七非久亦名始成三約實圓融釋皆在初成一念之中一音頓演七處九會無盡之文海印定中一時印現三約實圓融即賢首國師意以應機出世機感即應應即有時無非時失以應機出現下次立理謂若機熟不應便為失人未熟而應虛心有待二俱失時故祇園身子蓋是九世相收重會之言亦猶燈光涉入故祗園身子下三通妨難謂有問言若初成頓說初成未度身子等眾何處得有五百羅漢故今答云九世相𭣣次有難云祗園身子等縱許九世相融一念一時何有重會前時後時方有重故故今通云重會之言亦猶燈光涉入如點燈盞似有後有前𤼵光之後光無前後而相涉入今重會義但似燈光一時之中不妨兩會法則有重時不重也故法界放光亦見菩薩遍坐道場成正覺故故法界下四引文為證有三初引法界品文證是初成法界品內見坐道塲初成正覺明知法界同初會時此經十地之初無二七之言二七之言順別機故此經十地下次引十地經證無二七故故諸經論顯初說時有多差別謂普耀密迹二經第二七日即說三乘法華過三七日方云說小四分律中六七興顯行經七七五分八七智論五十箇七日有云與十二游經一年大同時既不定說亦不同皆根器所宜見聞有異故談經論下後會諸教時明二七言非為楷定並隨機故謂密跡三乘玄中已說普曜說十二因緣而三乘俱益十二因緣通三乘故三乘既益明通說三法華過三七日者經云我始坐道塲觀𣗳亦經行於三七日中思惟如是事等初欲說一而無一機次念說權諸佛皆讚乃至云舍利弗當知我聞聖師子深淨微妙音稱南無諸佛復作如是念我出濁惡世如諸佛所說我亦隨順行思惟是事已即趣波羅奈諸法寂滅相不可以言宣以方便力故為五比丘說是名轉法輪便有涅槃音等時既不定下即成隨宜約佛赴機無時不說望器無感未曾有說登地恒見常說一味之經就佛而言無說不說若攝方便皆一乘之印現差別耳無涯之說不應局執故應總攝以為十重如前已辯約佛就機下會於權實勸令善知上顯時分次釋成正覺義約教不同小乘三十四心斷結五分法身初圓名成正覺是實非化小乘已下別明五教一小乘三十四心者如婆沙八十二說俱舍根品云傳說菩薩三十四心便成佛故言三十四心者見道一十六心謂八忍八智離有頂貪有十八念謂斷有頂惑有九無間九解脫道如是十八足前十六成三十四一切菩薩决定先於無所有處已得離貪方入見道不復湏斷下地煩惱唯斷有頂一地之惑但三十四心一坐成佛五分法身初圓者即戒定慧解脫解脫知見如十藏品是實非化者揀異大乘大乘之中約化八相示成約報十地行滿四智創圓名曰始成正覺大乘之中下第二始教也據實即古今情亡心無初相名之曰始無念而照目之為正見心常住稱之曰覺始本無二目之為成據實下第三終教古今情亡即觀行意但當無念為始成故心無初相即起信論云菩薩地盡覺心初起心無初相以遠離微細念故得見心性心即常住名究竟覺今䟽離其語用無念而照名之為正者若唯無念寂而失照若但照體照而失寂並稱不正正在雙行見心常住稱之曰覺即上所引起信論文得見心性心即常住名究竟覺始本無二目之為成者起信云謂始覺同本覺無復始本之異名究竟覺即是成義約法身自覺聖智無成無不成約法身下第四頓教意言無成無不成者經云譬如世界有成壞而其虛空不增減一切諸佛成菩提成與不成無差別既無有成何有不成又體湛寂故曰無成不礙隨緣故無不成即成頓教意若依此經以十佛法界之身雲遍因陀羅網無盡之時處念念初初為物而現具足主伴攝三世間此初即攝無量劫之初無際之初一成一切成無成無不成一覺一切覺無覺無不覺言窮慮寂不壞假名故云始成正覺如出現品及不思議法品廣顯攝前諸說皆一乘之所現也若依此經下第五圓教言以十佛法界之身雲者即成正覺等十佛義並如前言念念初初為物而現者即體之應應無盡時生成即成念念機感念念成矣成既不已故曰初初一成一切成者事事無礙故故出現品云如來成正覺時於其身中普見一切眾生成正覺故如來成即眾生成矣况佛佛平等一切成佛又於一處成即一切處成故十地中第十願云願於一切世界成阿耨多羅三藐三菩提不離一毛端處於一切毛端處皆悉示現等又云如於此處見佛坐一切塵中亦如是佛身無去亦無來所有國土皆明現等無成不成義不異前一覺一切覺者若覺一法一法之中一切具足無覺者遠離覺所覺故無不覺者朗鑑在懷亦不存於不覺相故第四別顯處嚴者然此下處主及眾即三世間嚴三中前二即如來依正眾即淨土輔翼不空第四別顯處嚴中即如來依正者別顯處嚴是依教主難思是正眾海雲集是眾而言輔翼不空者菩薩即十八圓滿中輔翼圓滿不空即眷屬圓滿謂淨土中無有四趣龍鬼等眾是佛欲示淨土不空故今初器界嚴者即廣於前場之嚴顯成前覺之妙異於餘經之處於中四事各十種嚴明即染顯淨即為四別第一地嚴第二樹嚴第三宮殿嚴第四師子座嚴然此諸嚴各具三釋一約事可知二表法謂地表心地法身樹表菩提宮殿表無住涅槃座表法空等三就因行謂一以窮心地法身之因報得增上金剛之地二以般若為因三以悲智相導為因四亦以法空為因然或一因行成一切嚴或一切行成一嚴或一行成一嚴或一切行成一切嚴以通融別純雜無礙今但明一行一嚴顯所表故然或一因下通難謂有問言因果圓融何以就因各別所表故今釋云實具四句為約所表故別屬因耳然通別無礙然各攝無盡之德故四事皆有十句初總後別今且就文各分為四其地堅固金剛所成今初心地十句分四者初一總顯地體二四地相具德三四地上具嚴四一舉因結用今初標以堅固釋以金剛諸教或云木樹草座多云座是金剛今全地金剛則權實斯顯徹華藏故廣如彼品徹華藏者以華藏世界海大蓮華地金剛所成故此依本經若依觀佛三昧海經第二亦異常說而未盡源彼云爾時菩提塲地化以金剛滿八十里其色正白不可具見此相現時菩薩眉間白毫相光端潔正直矗然東向長一丈五尺有十楞現釋曰既有里又言化以故非極說上妙寶輪及眾寶華清淨摩尼以為嚴飾諸色相海無邊顯現次上妙下地相具德約因釋者一寶輪者一攝一切圓行致故二及眾寶華開覺恱他故三清淨摩尼圓淨明徹故以上三行用嚴心地故結云以為嚴飾上皆形色四即顯色謂青黃等殊名諸色相種種重疊深廣如海互相暎發等彼波瀾或諸色俱生或更相攝入含虛瑩徹現勢多端名無邊顯現此由隱顯自在定散無礙隨機利行之所致也摩尼為幢常放光明恒出妙音眾寶羅網妙香華纓周帀垂布摩尼寶王變現自在雨無盡寶及眾妙華分散於地寶樹行列枝葉光茂三摩尼下明地上嚴者一寶幢曲有五句一摩尼為體二三光音明用四五網纓辯飾就因行者降魔伏外為幢智光常照慈音外恱願行交羅戒香芬馥四攝周垂故二摩尼雨寶表神通如意隨機變現雨法寶故三妙華散地亦多因行遍嚴心故四寶樹行列者德行建立故佛神力故令此道場一切莊嚴於中影現四佛神力下舉因結用佛力者出所因也嚴具多門別說難盡故總云一切悉現或於樹中現或於上諸嚴具及地中現明一一行中皆道場故或於樹中現者以上別中第四寶樹行列故言或諸嚴具及地中現者以是歎地尊勝故初地嚴竟其菩提樹高顯殊特第二覺樹嚴者即大智因感有十一句分四初一總顯高勝長聳逈露圓妙獨出故約因即智超數表為高本性不昧為顯成物具德曰殊更無二真為特約果樹即菩提長聳等者謂長聳為高逈露釋顯圓妙釋殊獨出為特然案西域記長一百尺即畢鉢羅樹金剛為身瑠璃為榦眾雜妙寶以為枝條寶葉扶踈垂蔭如雲寶華雜色分枝布影復以摩尼而為其果含暉發燄與華間列二金剛下六句明體攝眾德一身是金剛金剛三昧本智因故正行成立為樹身也二榦是瑠璃本智發解內外明徹故三雜寶枝條解隨境差故四條假葉以為嚴智資定而深照寶葉雖異共成一蔭百千定門同歸一寂自蔭蔭他也五寶華異色在樹分枝承光則色同於地布影表神通等法依定有差俱承智光影現心地表神通等法者即淨行品若見華開當願眾生神通等法如華開敷六華雖不同果皆如意無邊行海同趣菩提若自利果成內則含輝若身心湛寂外便發焰若觸境斯明若利他果立未熟則含輝解生佛相已熟則發焰還流教光體如之行所成果無異因之果故與華間列故下經云菩薩妙法樹生於直心地等故下經云菩薩妙法樹等者等取下文云信種慈悲根智慧以為身方便為枝榦五度為繁密定葉神通華一切智為果最上力為鳥垂陰覆三界釋曰此五十九經所以引者意明表法皆有文據非是臆說其樹周圓咸放光明於光明中雨摩尼寶摩尼寶內有諸菩薩其眾如雲俱時出現三其樹下三句明妙用自在展轉成益初依菩提智放教智光次依智光雨圓明法寶後教成悲智即菩薩現前無心行成故如雲出依菩提智等者菩提即是證智教謂差別之用乃至言教即教證二道十地廣明無心成行者陶隱君云雲無心而出岫鳥倦飛以知還凡舉雲義雖有多種多明無心又以如來威神力故其菩提樹恒出妙音說種種法無有盡極四又以下一句舉因結用謂佛力為因流音演法以如如力則智演法音音還如性故無盡極廣多故無盡豎長故無窮無間故稱恒也如來所處宮殿樓閣廣博嚴麗充徧十方第三如來所處下明佛宮殿嚴十句分四初一總明分量宮可覆育即是慈悲殿可朝宗所謂圓寂悲智相導若樓閣相依廣者無邊法無外故博者不隘法內空故嚴者莊飾具眾相故麗者華美法義備故充十方者稱法性故眾色摩尼之所集成種種寶華以為莊校二眾色下二句體相圓備一體是摩尼積德鎔融之所成故二相嚴多種神通等法悲寂用故諸莊嚴具流光如雲從宮殿間萃影成幢無邊菩薩道場眾會咸集其所以能出現諸佛光明不思議音摩尼寶王而為其網如來自在神通之力所有境界皆從中出一切眾生居處屋宅皆於此中現其影像三諸莊嚴下六句妙用自在一眾行發光灑法如雲雲更多義至下當辯二光幢獨出萃者聚也即承光聚影而成謂悲寂交際承智起應降魔超出故三內容眾海無邊菩薩即道場外者亦在其中即依中有正亦果中有因即明涅槃眾聖冥會即明涅槃等者無有一聖不證涅槃猶如百川皆歸大海故肇公云恬焉而夷怕焉而忝九流於是乎交歸眾聖於是乎冥會矣四聲光寶網網者為防禽穢以益殿嚴猶大教網外防惡見內益悲寂教皆圓妙以寶而成故能出佛智光圓音妙說言不思議音略有四義一音聲繁廣二所說難量三聲即無聲四一具一切五出生果用即正報大用在此依中依正混融參而不雜明依大涅槃能建大義故曰出生六無染現染眾生是正居處是依染違性淨不言出生妄無自體還依真現染違性淨等者即通外難謂有問言涅槃既無不包染淨同在其內何以果用即言出生居處屋宅不言出生故今釋云染浮之法涅槃實包淨則順體染則違體證會涅槃方有大用故曰出生染既違淨非此出矣而體不離故云依現耳又以諸佛神力所加一念之間悉包法界四又以下舉因顯廣謂德廣難陳故今總結由佛力故一念頓包事理染淨一切法界況多念耶然上充遍十方即通局無礙集菩薩眾出佛神通即攝入無礙現生舍宅即染淨無礙悉包法界廣陿無礙一念即能延促無礙又集菩薩因果無礙出佛神通依正無礙十種宮殿此應說之然上充遍者上直消經文此下會成無礙十種宮殿者亦約表法之宮殿耳亦同上文妙法樹矣即五十四經經云佛子菩薩有十種宮殿何等為十所謂菩提心是菩薩宮殿恒不忘失故十善業道福德智慧是菩薩宮殿教化欲界眾生故四梵住是菩薩宮殿教化色界眾生故生淨居天是菩薩宮殿一切煩惱不能染故生無色界是菩薩宮殿令諸眾生離難處故生雜染世界是菩薩宮殿令諸眾生斷煩惱故現處內宮妻子眷屬是菩薩宮殿成就徃昔同行眾生故現居輪王護世釋梵是菩薩宮殿為調伏自在心眾生故一切菩薩行遊戲神通皆得自在是菩薩宮殿善遊戲諸禪定解脫三昧智慧故一切佛所授無上自在一切智王灌頂記是菩薩宮殿住十力莊嚴作一切法自在故是為十若諸菩薩安住其中則得灌頂一切世間神力自在其師子座高廣妙好第四其師子下師子座嚴十句分四初一總顯形勝師子座者人中師子處之又說無畏之法故得法空者何所畏哉空乃高而無上深不可測廣而無外邊不可窮妙乃即事而真好謂具德無空乃高而無上者䟽有三義釋師子座令唯約表法釋高廣妙好事則可知下多就表摩尼為臺蓮華為網清淨妙寶以為其輪眾色雜華而作瓔珞堂榭樓閣階砌戶牖凡諸物像備體莊嚴寶樹枝果周迴間列二摩尼下六句體德圓備一座臺摩尼即處正中正可依處摩尼隨暎有差法空隨緣成異中道妙理正是可依二周座華網即外相無染交暎本空三淨寶為輪輪謂臺之處中周帀輪圍即具德周遍四華纓周垂諸覺諸通垂化周攝諸覺諸通者淨名云覺意淨妙華淨行品云神通等法如華開敷五寶嚴填飾堂等略舉凡諸總包無處不嚴故云備體顯於法空全收萬像無事非理故六寶樹間飾間上物像也即菩薩妙法樹隨化分枝隨因感果並依無相義曰周迴凡聖相資名為間列即菩薩等者釋寶樹枝果周廻間列菩薩妙法樹即前文所引前云方便為枝榦今以權實為枝隨樹不同分枝差別隨枝有華各各成果隨因有異感果不同並依無相不離法空之座摩尼光雲互相照耀十方諸佛化現珠王一切菩薩髻中妙寶悉放光明而來瑩燭三摩尼光下二句妙用廣大一淨寶出光如雲涉入法空亦爾一一智中知一切法一一法體顯一切智為互照也一一智中者如一實智知遍法界理一權權智窮事無邊法界別事無不知也一一法體者如於一塵能顯實智權智道中智證智教智無邊智門二主伴寶用互相發揮謂佛化摩尼能作佛事智論云輪王寶珠但隨人意能雨寶物天寶堪能隨天使令佛寶十方能作佛事菩薩寶珠亦能分作智度論者即第十二論說寶有三種人寶天寶菩薩寶人寶力少唯有清淨光色除毒除鬼除闇亦除饑渴寒熱種種苦事天寶亦大亦勝常隨逐天身可使令可共語輕而不重菩薩寶勝於天寶兼能有人天寶用又能令一切眾生知死此生彼因緣本末譬如明鏡見其靣像如文殊師利冠中毗楞伽寶珠十方諸佛於中顯現今菩薩髻珠即是其類下文雲集菩薩髻珠亦爾如文殊師利者即文殊般泥洹經說文殊身如紫金山等其文殊冠毗楞伽寶之所嚴飾有五百種色一一色中日月星辰諸天龍宮世間眾生所希見事皆於中現用此嚴座者凡初成佛皆一切諸佛現形灌頂一切菩薩親授敬養故因果寶珠俱來瑩燭如來從果起用故云化現理圓解滿義曰珠王菩薩心頂智照圓淨故曰髻中妙寶寂照照寂皆瑩淨照燭用此嚴座下出嚴所以言寂照照寂者凖瓔珞經妙覺方稱寂照等覺照寂今菩薩寶義同照寂如來寶珠即當寂照復以諸佛威神所持演說如來廣大境界妙音遐暢無處不及四復以下一句佛加廣演佛境如空故云廣大有感斯至為無不及顯教皆從法空所流是故所流還周法界非智不顯故云佛力佛境如空者即問明品云如來深境界其量等虛空一切眾生入而實無所入顯教皆從下上就事說此下約表無有一法不從法界流無有一法不歸於法界故從座流還周法界顯處嚴竟音釋阿蘭若梵語也此云閑靜處若音惹匿女力切凝入聲輭乳演切然上聲柔也覈胡得切音劾刊倉甸切切也虬音求數數生角切音朔頻也諠許元切譁也躡尼輙切音捻矗昌六切音觸高起也聳荀勇切榦居案切與幹同木旁生者為枝正出為幹䕃於禁切芘也萃影萃秦醉切聚也榭詞夜切臺上有屋曰榭砌七計切階甃也髻音計綰髮也牗因九切音有瑩縈定切潔也遐暢遐何加切遠也暢尺亮切通也
