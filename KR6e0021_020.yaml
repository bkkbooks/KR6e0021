body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述即於衆中承佛威神觀察十方而説頌曰今初勝音文分二先説偈儀後正説偈下十例然偈中總相讚佛亦含諸問思之可知亦含諸問者文含四十句且收十海初偈即佛海次偈演説海三一偈變化海一毛示現故四一偈衆生海五一偈世界海六一偈法界安立海七一偈波羅蜜海八一偈佛壽量海已證佛地必有壽故九一偈解脫海普賢開覺已離障故已獲神通作用解脫故十一偈名號海身雲普遍隨物立名故十海既爾攝餘句問例然故人忠之佛身充滿於法界普現一切衆生前隨緣赴感靡不周而恆處此菩提座十頌分三初三直就佛歎次六約衆歎佛三有一偈雙結主伴初中三偈皆歎如來體用無礙於中初一不動本而周遍則十身圓融遍四法界十身圓融者以但言佛身故通十身但云法界故通四界以體即理用即是事體用無礙即事理無礙即一即遍即事事無礙又初句體遍次句明用第三句明用遍第四句不動本也本有二種一真身為本本體自遍以用如體故不動本而普遍二應用之中自有本末菩提座身即本周十方即末故下不起樹王而升四天正明不動本而周遍今明雖遍法界而處此座明不壞末而歸本此二不相離故疏以不動本而周遍釋不壞末而歸本如來一一毛孔中一切剎塵諸佛坐菩薩衆會共圍繞演説普賢之勝行如來安處菩提座一毛示現多剎海一一毛現悉亦然如是普周於法界後二不壞小相而廣容上則事如理故此則事含理故於中前一偈半一毛攝三世間後半類餘謂遍法界內皆有佛身無有一毛不含剎海又一毛表解脫門諸佛菩薩智所住故現多剎海者門門皆是淨土因故上則事如理故者菩提座身是事以如理故周遍此則事含理者一毛是事無不包故由理有二義一無處不遍二無法不包猶如虛空具包遍義今事如理故具上二義即事事無礙中事理融通門也又一毛者約觀心釋一毛內空能容受故一一剎中悉安坐一切剎土皆周遍十方菩薩如雲集莫不咸來詣道場一切剎土微塵數功德光明菩薩海普在如來衆會中乃至法界咸充遍次六偈約衆歎者聖賢輔翼顯主勝故六偈總明主伴皆遍於中初二總身總相遍法界微塵諸剎土一切衆中皆出現如是分身智境界普賢行中能建立一切諸佛衆會中勝智菩薩僉然坐各各聽法生歡喜處處修行無量劫已入普賢廣大願各各出生衆佛法毗盧遮那法海中修行克證如來地普賢菩薩所開覺一切如來同讚喜已獲諸佛大神通法界周流無不遍後四總身遍別中既微細難思故唯普智方知普行方立初二總身者然有四句謂一總遍總中二總遍別中三別遍別中四別遍總中然所遍通依正正約能遍為正所遍為依依正各有總別正總即全身別即眼耳乃至一毛依總即全一國土別即若樹若石乃至一塵初但言剎中安坐故是總身總相遍後明身遍塵中之土總遍別中一切剎土微塵數常現身雲悉充滿普為衆生放大光各雨法雨稱其心三雙結可知爾時衆中復有菩薩摩訶薩名觀察一切勝法蓮華光慧王承佛威力觀察十方而説頌曰第二十方菩薩讚德十方即為十𫨻今初東方言衆中者大衆海中前列名處名觀察勝法蓮華幢幢相高出三是超勝此喻相似光慧即是所喻幢體言衆中者為揀昔解以為勝音眷屬讚故則是勝音衆中菩薩故今明是新舊大衆海中如來甚深智普入於法界能隨三世轉與世為明導偈中讚佛真應二身密答佛地如來智等攝佛地故十頌分二初三讚真後七讚應讚真必體用雙美讚應唯約用明欲顯門差實非體外今初也於中初一讚智身次一讚法身後一雙結智含四智法即法界五法具矣智中上半正體證真下半後起隨俗又句各一智初句大圓鏡智行相深細故次句平等性智自他平等即法界故次頌妙觀察智於自共相無礙轉故末句成所作智成就利他導世事故又句各一智者上約二智此約四智四智之相已見第一經今但取其與今經文相應之處引之耳諸佛同法身無依無差別隨諸衆生意令見佛色形二讚法身中上半體相皆同同有二義一本性法身體同言無依者無住本故無差別者體無二故一已證法身相同力無畏等皆無異故此則無礙慧身不依一切離諸分別是無差別力無畏等者即問明品文經云文殊法常爾法王唯一法一切無礙人一道出生死一切諸佛身同共一法身一心一智慧力無畏亦然言相同者即相似名同非謂共也疏此即無礙者上以無住本釋無依無依是理故無住即實相之異名今以智慧釋無依故出現品云一切佛法依慈悲慈悲復依方便立方便依智智依慧無礙慧身無所依離諸分別者上釋無差別約理無二今釋無差但心無分別耳故無差別與無分別有通有局局則無差別是理無分別約智通則理亦得名無分別故問明品云佛剎無分別無憎亦無愛智亦得名無有差別謂無差智為能證故今用通義以無分別釋無差別下半用同能現能生身土智影皆無二故即法身無色應物現形能現能生身土智影皆無二故者即唯識釋大圓鏡智之能亦如上引即法身者引證此語正是肇論論云法身無色應物現形般若無知對緣而照若取其本據即是經云佛真法身猶若虛空應物現形如水中月下經亦云佛以法為身清淨如虛空所現衆色形令入此法中具足一切智遍知一切法一切國土中一切無不現三雙結者上半結智上句根本下句後得下半結法但舉其用體通上下以智契如故金光明説如如及如如智為法身故以智契如下會上二身今無障礙是真法身引金光明已如上引即三身品佛身及光明色相不思議衆生信樂者隨應悉令見後七讚應分三初一隨樂現應不思議者隨緣無邊故光明覺云億那由劫共思量色相威德轉無邊等於一佛身上化為無量佛當音遍衆剎演法深如海次四身光演法初一化身演法望前應身即重化也望前應身者應身對法報應是化身今於應身上起化故云重化如釋迦是應身涅槃受供於其毛端現多化佛即重化也一一毛孔中光網遍十方演佛妙音聲調彼難調者如來光明中常出深妙音讚佛功德海及菩薩所行次二毛光演法佛轉正法輪無量無有邊所説法無等淺智不能測後一結歎難量法輪義如別説一切世界中現身成正覺各各起神變法界悉充滿如來一一身現佛等衆生一切微塵剎普現神通力後二偈成道起通上皆圓融亦有十身且從一義耳爾時衆中復有菩薩摩訶薩名法喜慧光明承佛威神觀察十方而説頌曰第二南方法喜菩薩前雲集中名普照法海慧會義亦同光明即照法故十頌歎佛寂用應機德答前境界法身顯現即分齊境無生無體即所觀境衆生國土皆所化境佛身常顯現法界悉充滿恆演廣大音普震十方國於中分三初四依真起應於中分二先一偈顯真佛身常者第一義常出三世故智符於理湛然常照顯者離二障故現者常在前故不同衆生自體常也先一偈顯真者此約法報無礙之身為真佛也第一義常者本有常也智符於理湛然常照者修成合本有也若依法相後常是相續常今依法性宗義符於理同理常也故生公涅槃疏云夫真理自然悟亦冥符真則無差悟豈容易不易之體為湛然常照即其義也顯者離二障者亦有二意若別説者離煩惱障故法身顯離所知障故智身成合則二障俱障二身離於二障俱顯二身智性本有非照今有法界悉充滿者諸根相好一一無邊無限福智所莊嚴故諸根相好一一無邊者即自受用身果無限福智所莊嚴者即自受用因故唯識云二受用身有此二種一自受用謂諸如來三無劫修習無量福慧資糧所起無邊真實功德及極圓淨常遍色身相續湛然盡未來際恆自受用廣大法樂釋曰以論對疏居然可知次二句音恆用普恆自受用廣大法樂故如來普現身遍入於世間隨衆生樂欲顯示神通力佛隨衆生心普現於其前衆生所見者皆是佛神力光明無有邊説法亦無量佛子隨其智能入能觀察下三偈起用初一普隨物樂次一感應道交後一法光無際初一普隨物樂下三義皆通他受用身及變化身故唯識云二他受用謂諸如來由平等智示現微妙淨功德身居純淨土為住十地諸菩薩衆現大神通轉正法輪決衆疑網令彼受用大乘法樂佛身無有生而能示出生法性如虛空諸佛於中住無住亦無去處處皆見佛光明靡不周名稱悉遠聞無體無住處亦無生可得無相亦無形所現皆如影二有三偈體用無礙於中初二句約相無生現生次二句約性無住而住次一偈約用無去住而普周後偈體用雙拂謂無體拂上無生無生為佛法體故今體即非體無生為佛法體者諸經論中皆詮無生之理故淨名不二發始明之楞伽經説一切不生中論不生為論宗體傅大士亦云佛法以無生為體無著為宗妄想為因涅槃為果諸文非一無住處者拂約性二句亦無生可得拂示生句下半拂前第二偈約用用如影故無住處者拂約性二句者以約性云法性如虛空諸佛於中住似有住處今謂法性如空則無所住况體無生安有能住不住諸法方住法性故上文云諸佛於中住金剛經云應無所住而生其心若心有住則為非住大品云若住一切法不住般若波羅蜜不住一切法方住般若波羅蜜故大般若會會之初皆先明無住佛隨衆生心為興大法雲種種方便門示悟而調伏一切世界中見佛坐道場大衆所圍繞照耀十方國一切諸佛身皆有無盡相示現雖無量色相終不盡三有三偈明真應無盡一法雲無盡二衆會無盡三身相無盡無盡相言兼真身故終不盡者全同體故無盡相言兼真身故者一應用無盡若鏡對萬形二真體無盡此復二種一十蓮華藏之色相故二一一色相體無窮盡湛然不變故經云如來妙色常安隱不為時節劫遷大聖曠劫行慈悲獲得金剛不壞體勝鬘云如來色無盡智慧亦復然爾時衆中復有菩薩摩訶薩名香焰光普明慧承佛威神觀察十方而説頌曰第三西方香焰菩薩前名月光香焰普莊嚴此中光即月光明慧即是智慧莊嚴十頌讚佛身含衆海即答加持問由加能入故此會諸菩薩入佛難思地一一皆能見一切佛神力於中前九讚衆海則佛德可知後一結德歸佛前中初一總餘八別智身能遍入一切剎微塵見身在彼中普見於諸佛如影現衆剎一切如來所於彼一切中悉現神通事普賢諸行願修治已明潔能於一切剎普見佛神變身住一切處一切皆平等智能如是行入佛之境界別中二前四平遍一切於中初一智身入剎塵次一色身普現用後二釋成前義一普賢行圓故二身心平等故已證如來智等照於法界普入佛毛孔一切諸剎海一切佛國土皆現神通力示現種種身及種種名號能於一念頃普現諸神變道場成正覺及轉妙法輪一切廣大剎億劫不思議菩薩三時中一念皆能現後有四偈明微細入於毛孔剎中而作用故一切諸佛土一一諸菩薩普入於佛身無邊亦無盡後一結中非唯一會一切菩薩皆入佛身方為讚佛爾時衆中復有菩薩摩訶薩名師子奮迅慧光明承佛威神遍觀十方而説頌曰第四北方菩薩此同本名但加慧字然此十頌歎佛依體起用轉大法輪答前佛行佛以轉法化生為其行故毗盧遮那佛能轉正法輪法界諸國土如雲悉周遍文中分三初二句總次半偈并後八偈共八偈半別後一偈結十方中所有諸大世界海佛神通願力處處轉法輪一切諸剎土廣大衆會中名號各不同隨應演妙法如來大威力普賢願所成一切國土中妙音無不至佛身等剎塵普雨於法雨無生無差別現一切世間無數諸億劫一切塵剎中往昔所行事妙音咸具演十方塵國土光網悉周遍光中悉有佛普化諸羣生佛身無差別充滿於法界能令見色身隨機善調伏三世一切剎所有衆導師種種名號殊為説皆令見別中讚佛十化前法界諸國土二句現受生化處處受生身雲遍故今十方中所有等一偈讚神通化末句雖云轉法意在通用三有三句讚業果化一切諸剎名號不同者示同趣類業報名字故上三依身四隨應演妙法者即辨揚化隨應則能斷彼疑故五一偈勸讚勵化妙音讚勵故六一偈慶𢠢化普雨法雨令彼進修無生法故上三語業七有一偈領受意化領問受取演昔行故八有一偈決擇意化決擇有情心行差別及揀諸法性相不同方能普化故九一偈發起意化發起宿善及三乘大行為善調故十有一偈造作意化建立佛法事義種種皆令見故依實起用即是化身故説化身無別心色此之十化與佛地經次第無違但令相融不違經旨十化者即佛地經説佛身有十化初依身輪起三種化一受生化謂受最後身二神通化謂諸變等三業果化謂受金鏘等又依語輪起三種化一辨揚化謂轉法輪斷疑答難二讚勵化謂讚勝勸學三慶慰化謂有進修或能斷證隨喜慶慰意化有四一領受意化謂領問受取等二決擇意化謂觀有情心行差別揀擇諸法性相不同三發起意化謂能發起宿世善根及令二乘發大行等四造作意化謂能建立諸法事義是故當知依實起用即是化身故説化身無別心色釋曰上即論文疏文具用欲會釋經少有添減但觀向引自分疏中主客之言過未及現在一切諸如來所轉妙法輪此會皆得聞末後一偈結歸斯會可知爾時衆中復有菩薩摩訶薩名法海慧功德藏承佛威神觀察十方而説頌曰第五東北方法海菩薩前衆集中名最勝光明燈無盡功德藏法海可當最勝光明義與慧同功德藏名前後無別無盡二字前有後無十頌讚佛攝勝眷屬答佛力問寄讚菩薩實由佛力故結云住力地中此會諸佛子善修衆智慧斯人已能入如是方便門文中初一智滿得法即為總相如是方便門者此有二意一指前謂具前三輪之化故能周遍一一國土二即下九別為如是方便也一一國土中普演廣大音説佛所行處周聞十方剎餘九別相共讚七事一讚普演大音有三種大一者處大一一國故二者義大説佛行故三者體大周聞十方故一一心念中普觀一切法安住真如地了達諸法海二讚時無空過念念觀法證真實故一一佛身中億劫不思議修習波羅蜜及嚴淨國土三能入勝處諸佛身中修淨國故一一微塵中能證一切法如是無所礙周行十方國四於染無礙塵中證法而周行故一一佛剎中往詣悉無餘見佛神通力入佛所行處五能入佛境見佛神力入行處故行處有二一智行處謂十力境二佛化處謂器及衆生諸佛廣大音法界靡不聞菩薩能了知善入音聲海六有三頌善入音聲初入大音劫海演妙音其音等無別智周三世者入彼音聲地次入妙音衆生所有音及佛自在聲獲得音聲智一切皆能了後入一切音從地而得地住於力地中億劫勤修行所獲法如是七一頌善知諸地言從地者即出心也而得地者即住入也力地中者即佛地也所獲法者結上方便也爾時衆中復有菩薩摩訶薩名慧燈普明承佛威神觀察十方而説頌曰第六東南方慧燈菩薩名全同前十頌讚諸菩薩悟入深廣由三昧力見佛三昧即答三昧問也一切諸如來遠離於衆相若能知是法乃見世導師菩薩三昧中慧光普明了能知一切佛自在之體性於中分四初二歎見佛真體一見佛離相二見佛自在言離衆相者般若云離一切諸相則名諸佛慈氏論云但離四相即離一切謂名義自性及差別也言自在者由菩薩定慧雙運故見佛自在也離一切諸相即名諸佛者復有文云若見諸相非相即見如來慈氏論云引此釋上離一切言故四加行位菩薩但觀此四四者一名二義三名義自性四名義差別名即能詮義為所詮名中有句名詮自性句詮差別則名中有自性差別義中亦有自性差別能詮所詮此二異相故二別觀若名義自性名義差別二二相同故合觀察謂觀於名必詮自性若觀於句必詮差別故自性名與自性義此二相同名義差別相同亦爾見佛真實體則悟甚深法普觀於法界隨願而受身從於福海生安住於智地觀察一切法修行最勝道一切佛剎中一切如來所如是遍法界悉見真實體十方廣大剎億劫勤修行能遊止遍知一切諸法海次四頌明悟法一證深理法願力而現二悟多行法福智成形三達果法體無不遍四了教法深廣難知唯一堅密身一切塵中見無生亦無相普現於諸國隨諸衆生心普現於其前種種示調伏速令向佛道三有二頌歎身業普應一深二廣云堅密者齊佛體用堅即金剛之身密謂三密之一即一而多故遍一切即大而小故現塵中無功之應故無相而現若約法門此身即如來藏性也不可破壞故堅深而難見故密衆生塵心無不皆具本自有之故曰無生體絶百非故曰無相衆生六根是謂諸國以佛威神故出現諸菩薩佛力所加持普見諸如來一切衆導師無量威神力開悟諸菩薩法界悉周遍四後二頌歎得佛加持一此佛力二餘佛力爾時衆中復有菩薩摩訶薩名華焰髻普明智承佛威神觀察十方而説頌曰第七西南方前列名處云普華光焰髻少同多異十頌歎佛攝生自在德答前自在問一切國土中普演微妙音稱揚佛功德法界悉充滿佛以法為身清淨如虛空所現衆色形令入此法中文分為三初六攝生無遺次二寂用無礙後二大用無涯今初文二初二能攝謂身語深廣前偈語後偈身身中上半體客塵不染故下半用隨物見異故亦是釋疑為物現相不乖如空亦是釋疑者疑云既以法為佛身清淨如虛空何緣現金色等云何令人悟於虛空答有三意一體雖無相為物現相物宜見故隨他意耳二若不現相云何令人悟於無相如不因言豈顯無言之理上二意即為物現相句中通之三如虛空言取其清淨無相非離相求相即無相故不乖空故下經云佛住甚深真法性寂滅無相同虛空而於第一實義中示現種種所行事所作利益衆生事皆依法性而得有相與無相無差別入於究竟皆無相故相不乖無相相即無相耳若有深信喜及為佛攝受當知如是人能生了佛智後四偈所攝初偈何人能了內信外攝者諸有少智者不能知此法慧眼清淨人於此乃能見次偈以何眼見唯勝非劣以佛威神力觀察一切法入住及出時所見皆明了次偈了見何法謂一切法地地三心地地三心者即入住出下當廣説一切諸法中法門無有邊成就一切智入於深法海後偈何位究竟菩薩地盡至入佛海安住佛國土出興一切處無去亦無來諸佛法如是一切衆生海佛身如影現隨其解差別如是見導師次二寂用無礙中初偈用遍出興體無來往後偈即用恆寂隨解自差一切毛孔中各各現神通修行普賢願清淨者能見佛以一一身處處轉法輪法界悉周遍思議莫能及後二大用無涯者初一一毛皆普現通後一一身各遍轉法爾時衆中復有菩薩摩訶薩名威德慧無盡光承佛威神觀察十方而説頌曰第八西北方菩薩前名無盡光摩尼王此云威德慧即摩尼王法喻異耳十頌歎佛出現説法皆周遍德答無畏問説法無畏故一一佛剎中處處坐道場衆會共圍繞魔軍悉摧伏佛身放光明遍滿於十方隨應而示現色相非一種於中分三初二總顯身光遍應次七辨其所作後一結用歸本一一微塵內光明悉充滿普見十方土種種各差別十方諸剎海種種無量剎悉平坦清淨帝青寶所成或覆或傍住或似蓮華合或圓或四方種種衆形相辨所作中分二初三明光照無遺法界諸剎土周行無所礙一切衆會中常轉妙法輪佛身不思議國土悉在中於其一切處導世演真法所轉妙法輪法性無差別依於一實理演説諸法相佛以圓滿音闡明真實理隨其解差別現無盡法門後四演法周遍一遍塵內外法界剎中二遍佛身中一切剎內三明所轉性相四明能轉圓音一切剎土中見佛坐道場佛身如影現生滅不可得後一結用歸本不可得故爾時衆中復有菩薩摩訶薩名法界普明慧承佛威神觀察十方而説頌曰第九下方菩薩前名法界光焰慧此云普明即前光焰十頌讚佛境勝用菩薩能入答神通問文云各各現故如來微妙身色相不思議見者生歡喜恭敬信樂法佛身一切相悉現無量佛普入十方界一一微塵中十方國土海無量無邊佛咸於念念中各各現神通於中二前三顯佛境勝用先半偈標其體謂妙身色相後二頌半辨其用大智諸菩薩深入於法海佛力所加持能知此方便若有已安住普賢諸行願見彼衆國土一切佛神力後七菩薩能入謂入佛境界於中三初二具德故知見若人有信解及以諸大願具足深智慧通達一切法能於諸佛身一一而觀察色聲無所礙了達於諸境能於諸佛身安住智所行速入如來地普攝於法界次三知見成益佛剎微塵數如是諸國土能令一念中一一塵中現一切諸國土及以神通事悉現一剎中菩薩力如是後二結用速疾並可知爾時衆中復有菩薩摩訶薩名精進力無礙慧承佛威神觀察十方而説頌曰第十上方菩薩此與前名顛倒而已十頌讚佛圓音現身神變自在答無能攝取問謂此願力普周無能令不取故佛演一妙音於中分三初三頌歎佛圓音雨法德然具十義一唯一妙音一梵音故一梵音故者唯取五天梵音意在一故周聞十方剎二遍聞一切稱法性故二即此一梵音稱性故遍衆音悉具足三此一即多事理融故三此一梵音中即具一切音故疏釋云事理融故一梵音是事事為理融故一具一切法雨皆充遍四彼一一音雨多法雨四多法雨者隨前一音即説四諦十二因緣六波羅蜜因果等法一切言詞海五彼法各具一切文詞五隨説一法具多文辭如四諦品説四諦法遍周法界主伴無盡一切隨類音六各同一切衆生之音六隨前一音一法各同一切衆生之音如百道風各吹多竅競發異響前第三一音具多是佛音自具今一具多是隨一音外同物類一切佛剎中七此音各各遍一切處七隨一類音各遍一切處多類皆爾轉於淨法輪八所説各顯性淨之理八唯宣稱性融差別故一切諸國土悉見佛神變聽佛説法音九各令一切普得見聞九能令萬類皆得見聞上之性淨聞已趣菩提十各各皆得究竟之益十隨聞大小益皆究竟上之十義從一妙音展轉開之具十無盡方曰圓音文處可見文處可見者上之八義句各一義唯第九義具於三句十亦一句故十二句而有十義法界諸國土一一微塵中如來解脫力於彼普現身法身同虛空無礙無差別色形如影像種種衆相現影像無方所如空無體性智慧廣大人了達其平等佛身不可取無生無起作應物普現前平等如虛空次四歎佛現身無礙德初偈解脫力故現處周細次偈法身力故現相即虛後二偈以般若德發揮前偈初偈釋下半言影像者顯無方所故謂光東則影西光西則影東質對像生來無所從質謝像亡去無所至故此影像即空無體言影像者此句摽下別釋之離其影像以為二喻影取光影喻故云光東影西等然光影喻自有二意一以若身若樹等以喻物機日月之光以喻佛智所見之影喻佛色形如瞿師羅之短質佛智對之為三尺之影無邊身之長質佛智對之為窮上界而有餘之影今不取此義二質喻法身無二相故光喻機感隨其東西所感異故影喻色形隨機感光而東西故今取此義云無方所二以像一種為鏡像喻故云質對像生無從無去即無方所故此影像下雙結二喻無方所言意明空耳後偈釋上半言如空者不可取等故故雖現形猶如水月平等如空言如空者等取四義謂此偈中五義如空一不可取無物可取智覽無性故二無生非從無之有故三無起作非新成故四應物現前無有一物不對空故隨器大小孔隙之異故五平等十方虛空皆不可量三際虛空同一相故如來五義者一離相故二真常故三湛寂故上三寂然不動四即感而遂通五體相用等佛佛相望平等無二故雖現形者經云佛真法身猶若虛空應物現形如水中月此義佛佛平等是故經云平等如空十方所有佛盡入一毛孔各各現神通智眼能觀見毗盧遮那佛願力周法界一切國土中恆轉無上輪一毛現神變一切佛同説經於無量劫不得其邊際後三歎佛神變自在德一則毛孔廣容二則願能普遍三舉少況多又上略配十句其中具有四十句意不能繁指如此四天下道場中以佛神力十方各有一億世界海微塵數諸菩薩衆而來集會第六大𫨻結通無窮分中分二初舉此應知一切世界海一一四天下諸道場中悉亦如是二應知下類彼言四天下者意在閻浮言總意別既以結通菩薩雲集尤顯上歎是彼十方遠方便竟既以結通者謂若是勝音眷屬何以歎後結云如此四天下道場中以佛神力十方各有一億世界海微塵諸菩薩等而來集會耶明知上是十方菩薩歎佛德耳音釋僉千亷切音籤皆也竅苦弔切穴也鏘千羊切與搶同勵力制切勸勉也
