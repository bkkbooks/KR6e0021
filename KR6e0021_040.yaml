body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述爾時文殊師利菩薩問寶首菩薩言第三業果甚深問中亦二初標能所問人以事中顯理是可貴故問寶首也佛子一切衆生等有四大無我無我所二佛子一切下正顯問端中三初舉法按定謂諸衆生身但四大假名四大無主身亦無我安有我所彼此同許以為按定四大無主等者即淨名第二云四大合故假名為身四大無主身亦無我又此病起皆由著我是故於我不應生著今取彼文以釋今經云何而有受苦受樂端正醜陋內好外好少受多受或受現報或受後報二云何下正設疑難能造能受是謂為我所造所受即是我所以無我故無能造受誰令苦樂無我所故無所造受能造能受者我在因中即為能造業為所造我在果中即為能受報為所受此中且順我我所言故淨名云無我無造無受者若僧伽師能造但是𡨋性我是受者而非造者若衛世師我為能造亦為能受何以現見而有苦等十事五對一苦樂者約粗相說三塗為苦人天為樂二就苦中各有妍三於其樂中有內身外境四通於苦樂受中若時若事皆有多少此上皆約生報前生作故五現作現受名現報隔一生去受名為後報然法界中無美無惡三然法界下結難謂二無我理即真法界中定無善惡未知苦樂從何而生此問所以也為無我故無我所耶為有所受亦有我耶此致疑也以聖言量及正理量違於現量如何可通結成難也此問所以者此中取前緣起甚深三重問意以釋今文第二答意云達體業亡迷真業起報因業起何須我耶業報攬緣虛無自體故無我所業報攬緣下上以業遣我此下以緣遣於我所由法無我非斷滅故業果不亡斯乃正理聖教所明不違現事由法無我下上明二我事空止下明不壞業果之知空自無礙二諦雙存是正理量聖教所明即聖言量故淨名云說法不有亦不無以因緣故諸法生無我無造無受者善惡之業亦不亡中論云難空而不斷雖有而不常罪福亦不失是名佛所說言不違現事者即是現量以現見苦樂等報舉體即空不壞事也法若定有不可造受便違正理法若定有下反以釋成故中論云若無空義者一切則不成時寶首菩薩以頌答曰隨其所行業如是果報生作者無所有諸佛之所說在文分二初一法說餘九喻況今初上半約俗諦緣生即業報相屬答前現見次句勝義即空印其按定此二不二故不相違無所有言該上業果則亦無我所後句是聖教量智論第二云有業亦有果無作業果者此第一甚深是諸佛所說無所有者案文但云作者無所有以偈文窄故實乃作者所作皆無所有譬如淨明鏡隨其所對質現像各不同業性亦如是下九喻顯通相而明喻於業果從緣無性不壞事相別彰喻意喻各不同初三頌喻業報無性不壞虛相次一偈喻無造受者三一偈喻性一相殊後四喻體無來處初中初偈雙喻業果皆真心現雖無實體而相不同次偈喻能生因緣相虛後偈喻所生業果無實今初若法相宗唯以本識為鏡今依法性宗亦以如來藏性而為明鏡亦以藏性為鏡者初辨定鏡體言亦以者非揀本識識亦喻鏡故楞伽云譬如明鏡現衆色像現識處現亦復如是但法相宗不用如來藏為鏡今雙用一義故致亦言言如來藏為鏡者起信論釋本覺內體相合明中云復次覺體相者有四種大義與虛空等猶如淨鏡云何為四一者如實空鏡遠離一切心境界相無法可現非覺照義故二者因熏習鏡謂如實不空一切世間境界悉於中現不出不入不失不壞常住一心以一切法即真實性又一切染法所不能染智體不動其足無漏熏衆生故三者法出離鏡謂不空法出煩惱礙智礙離和合相淳淨明故四者緣熏習鏡謂依法出離故遍照衆生之心令修善根隨念示現故釋曰四鏡之名者一空鏡謂離一切外物之體二不空鏡謂體不無能現萬像故三淨鏡謂已磨治離塵垢故四受用鏡置之高臺須者受用四中前二自性淨後二離垢淨又初二就因隱時說後二就果顯時說又前二約空不空為二後二約體用為二又前二體後二相故云覺體相者今約衆生即前二鏡合而用之以第二為能現以第一顯本淨故後之二鏡既在果位約佛為鏡故於福田甚深中用然有二義一隨境界質現業緣影故合云業性亦如是二隨業緣質現果影像故前偈云隨其所行業如是果報生二文影略共顯業果似有無體然有二義下第二顯喻相喻有三事一鏡二本質三影像以喻就法鏡則無二質影各二謂一是因影境界為質故合云業性二是果影業緣為質故法說云果報生也淨名云是身如影從業緣現是故結云二文影略下引中論重化之義正顯因果俱從緣空合云業者謂善惡等三性者通性及相謂此業體以無性之法而為其性不失業果之相而為其性合云業者下第三出業體等取無記及等不動各成三類言不失業果者上是理性此即事性如大熱性等由無性故能成業果由不壞相方顯真空故中論云雖空亦不斷雖有而不常業果亦不失是名佛所說不失業果方顯中道又如鏡現穢像非直不汙鏡淨亦乃由此顯鏡喻淨如來藏現生死業果亦然非直不損真性平等亦乃由此知如來藏自性恆淨也此有四位一能現位復有二義一由真淨故現染二由真淨故不為汙二所現位亦有二義一由相虛故不能汙二由虛故虛相現三相對位亦有二義一由分明現染方顯性淨二由性本恆淨令染妄現四真淨虛染鎔融一味無礙圓融思之此約染淨門以但有所現即為染故由無性故下第二顯義於中有二先顯中道即融上理事二性交徹無礙以成中道又如鏡現穢像下第二約染淨初略明上及此假俱證由不壞相方顯真空此假亦中道義此有四位下廣釋亦二先正顯染淨然但知以鏡喻如來藏影喻生死業果則法喻昭然一由真淨故能現者即四鏡中第二鏡義由真淨故不為汙即第一鏡義亦前即不染而染二即染而不染又前即能隨緣二即體不變然二皆是能現之德如玉之性雖染不汙若第三相對方顯正在泥中染而不染二所現二義者一依他無性義二無性緣成義三相對二義者一即真如隨緣能成萬法方是真如二即真如不變方能現染若變性淨不能現染若不現染無隨緣德四真淨等者以如來藏舉體成生死如來藏外無生死故生死即空是如來藏離生死外無如來藏如波與水一味無差此約染淨下結成上義謂真如現他時設有淨分亦名為染如鏡現像不揀淨穢皆非鏡體故唯能現得名為淨所現皆染更約喻中以一異門釋謂一鏡是定一門二所現染淨妍等殊是定異門染淨雖虛不能相攝故是異也鏡現染處不異現淨故是一也三像不異鏡是非異義鏡外無像故鏡不異像是非一義正現像時去像亦失鏡故上二即非一非異門四像雖即鏡而不壞像鏡雖即像而不礙鏡是亦一亦異門也更約喻中下二約一異門釋言鏡是定一者謂如來藏唯一味故所現定異者生死緣差故染淨雖虛下通難釋成先通異難謂有問言染淨皆虛豈非一耶此約喻難生死涅槃二俱虛寂豈非一耶此約法難故此釋云不相攝故此通法喻如所現像男不攝女故生死不能攝涅槃以相就性故說生死及與涅槃二俱空寂一際無差以性就相有染有淨以有諍故說於生死以無諍故說於涅槃有煩惱時非無煩惱故就虛相而說異耳欲令一者要如來藏而以統之是第三義鏡現染處下二通一難謂有問言鏡中既能現染現淨豈非異耶如來藏能成生死能成涅槃豈非異耶故今答云現染淨處無異體故生死涅槃一性現故三像不異鏡者謂像本是異鏡本是一今像同鏡故非異也故次釋云鏡外無像故同鏡一異相便無生死本異如來藏本一今生死即如來藏故生死非異以如來藏外無生死鏡不異像者鏡本是一像本非一今鏡同像故非一也正現像時去像亦失鏡者釋成上義謂去像失鏡明鏡同像言同像者同像非一非約鏡與像一也如來藏性本來是一生死非一今如來藏全體為生死故同生死之萬差正成生死時若去生死即無如來藏此明如來藏同生死之差非約與生死一故是非一義也四亦一亦異門者但約不壞性相則一異歷然四門一揆則一異無礙染淨相融方為事事無礙之鏡像也亦如田種子各各不相知自然能出生業性亦如是二田種生芽喻能生者田喻業緣也種子喻於識種因也此二相待無性故不相知由不相知方能生於後有苦芽故云自然能出生也亦本識為田名言為種田喻業緣者即六地經云業為田識為種無明所覆愛水為潤見綱增長我慢溉灌生名色芽謂若不造業識不成種如穀不入田終不生故亦本識為田者上約因緣合辨故以業為田今約本識含於種子能起現行故以本識為田若初地中亦云於三界田中復生苦芽則約當果生處亦得名田顯義無方也成不相知類前可解又如巧幻師在彼四衢道示現衆色相業性亦如是三幻師現幻喻喻所生者若幻色喻報則幻師喻業若幻色喻業則幻師喻業因以業亦緣生同報無體而幻相不亡故中論內以化復現化喻業果俱空若幻唯喻報業則不空四衢以喻四識住造業處故幻師現幻者所生通因果若幻色喻報下別釋先明果為所生後若幻色喻業下辨業為所生業亦緣生者如受五戒為人業必假戒師言教三業之具方成業故業亦緣生故中論下義引論文證業果俱空彼論偈云譬如幻化人復作幻化人如初幻化人是則名為業幻化人所作則名為業果既業果皆幻故知並空若幻喻報下反成上義四衢喻四識住者瑜伽八十四云謂色受想行此之四蘊是識蘊所住如機關木人能出種種聲彼無我非我業性亦如是二機關出聲喻無造受者機關緣造體虛無人喻業從緣故無造者從機出聲尤更非實喻報因業起安有受人夫無我者因對我無既無有我何有非我著無我者亦是倒故亦如衆鳥類從而得出音聲各不同業性亦如是三出音別喻性一相殊者如鳥在含聲未吐喻業同一性出聲別猶感報無差然雞子之中終無鳳響業雖無性善惡冥熏如鳥在殼者殼為鳥卵為母所附者含聲未吐者𢈔信云團團竹上禽白五裹黃金裏有思晨鳥含聲未吐音借其言用譬如胎臟中諸根悉成就體相無來處業性亦如是四有四偈喻體無來處皆從緣來即無來故然亦不同初一喻因含於果故無來處又如在地獄種種諸苦事彼悉無所從業性亦如是次偈果酬於因故無所從此二喻內異熟業果也譬如轉輪王成就勝七寶來處不可得業性亦如是次偈轉輪王七寶喻外增上業果也輪王七寶者非在身內故言無來處者輪王登位從空忽來言七寶者一輪寶大如一由旬或云四俱盧舍三輪各滅一俱盧舍二珠寶其狀八楞大如人䏶三象寶即金脅山八千象中之最下者四馬寶即帝釋既中者五兵寶即是夜叉六主藏臣寶即是地神七女寶上者帝釋賜下者人間或乾闥婆女輪即北方天王令四夜叉持之歸則在門之上一由旬住帝釋所賜若依此說若有才處多是約教有殊故小乘中說輪王歿後𭣣在鐵圍山間又有相似七寶謂一劒寶二皮寶三殿寶四牀寶五林寶六衣寶七履寶如智論及薩遮尼乾經第三說又如諸世界大火所燒然此火無來處業性亦如是後偈喻無漏業果無漏智火焚蕩有漏智因漏發故亦無來業果寂然方依幻住爾時文殊師利菩薩問德首菩薩言第四說法甚深亦可名應現甚深問及答中通三業故以說法化勝故從此立名先問中初總標告問德首者顯佛德故佛子如來所悟唯是一法二正顯問端中三初舉法按定謂佛證一味法界彼此共許云何乃說無量諸法現無量剎化無量衆演無量音示無量身知無量心現無量神通普能震動無量世界示現無量殊勝莊嚴顯示無邊種種境界一云何下正設疑難謂證悟既一說現乃多為一耶多耶究定一耶下若二重問意此上亦直問所以偏取互妨二云偏取互妨者是第二帶疑問由滯一多二途不知何據並立相違就法即體用相違約佛是證教相違三云並立相違者即第三成難問也證一乖於說多說多違於證一下辨十種相違前九是別後一總結而法性中此差別相皆不可得三而法性下釋成前難謂非唯佛悟於一我觀法界亦不有多能證所證既並不殊以何因緣而現多種將無如來乖法界耶能證所證等者能證即前案定所證即釋成中法性答有二意一云所證雖一隨機現多多在物情佛常無念二者所悟一法即無礙法界即事之理全在多中所現乃即理之事全居一內以即多之一是所悟即一之多是所說既無障礙何有相違二者所悟等者上之一意以法就機許其有一有多出多所以是答直耳問意也此下唯就法體常一常多遣其第二懷疑及第三難上疑意云為是一耶為是多耶今云亦一亦多上第三難云並立相違今云相即故不相違又不壞相故有一多豈唯不違亦由得一方能廣現由多現故方令悟一豈唯不違下重成第三答難之意尚能相成豈相違耶時德首菩薩以頌答曰佛子所問義甚深難可了智者能知此常樂佛功德偈中分二初一歎問利益上半歎深但言一理深而非甚今即多是一故曰甚深即一之多尤更難了不可但以一多知故下半知益知此甚深方知愛樂後九喻答皆三句喻況下句法合喻中皆上二句即體之用二三兩句即用之寂又初二句以一成多次句不礙常一故不相違然此九喻別答九種無量總顯境界無量然此九喻等下上總顯偈意此下別釋偈文古但直釋今將配問總答境界古下之九事皆佛分齊之境故境界為總句故譬如地性一衆生各別住地無一異念諸佛法如是初地一持多喻答現無量剎依住勝劣地無異故亦如火性一能燒一切物火焰無分別諸佛法如是二火一燒多答化無量衆物從火化不擇薪故亦如大海一波濤千萬異水無種種殊諸佛法如是三海一波異答說無量法義海波濤無窮盡故亦如風性一能吹一切物風無一異念諸佛法如是四風一吹異答震無量界隨物輕重動有異故亦如大雲雷普雨一切地雨滴無差別諸佛法如是五雲雷普雨答無量音圓音普震法雨無差故亦如地界一能生種種芽非地有殊異諸佛法如是六地一芽異答無量莊嚴芽莖華實為藻飾故如日無雲曀普照於十方光明無異性諸佛法如是七廓日普照答知無量心無私普照窮皂白故亦如空中月世間靡不見非月往其處諸佛法如是八淨月遍見答無量神通不往而至隨器現故譬如大梵王應現滿三千其身無別異諸佛法如是九梵王普應答現無量身不分而遍彌法界故不分而遍等者即出現品意彼身業中云譬如梵王住自宮普現三千諸梵處一切天人成得見實不分身向於彼諸佛現身亦如是一切十方無不遍其身無數不可稱亦不分身不分別略引一文餘可例取故將頌文別對前問文理分明爾時文殊師利菩薩問目首菩薩言第五福田甚深問中初標告以福田是照導引生又施為諸度之前導故問目首也佛子如來福田等一無異二顯問端分三初舉法按定佛為生福之田名為福田田德無二名為等一此理共許云何而見衆生布施果報不同所謂種種色種種形種種家種種根種種財種種主種種眷屬種種官位種種功德種種智慧云何下正顯疑難謂田既是一植福應齊施報有差由何而起前等此異即緣果相違別顯十事文並可知而佛於彼其心平等無異思惟三釋成前難云田雖齊等心有高下容可有殊既心無異思報云何異答有數意一約衆生由器有大小心有輕重故得報有差非如來咎一約衆生等者然俱舍等說由主財田異故施果差別前難約田今答約財主然第一意正約主異含於財異謂多財重心少財輕心等故然器約觀解淺深心之輕重復通深淺二約佛遍稱差別之機方稱平等即一之多差不乖等即多之一等不礙差由心平等無私方能隨現多果終令解脫一味曾何異哉約佛可知時目首菩薩以頌答曰譬如大地一隨種各生芽於彼無怨親佛福田亦然十頌舉十喻喻上諸義初一總喻印成後九別顯所以前中初句等是緣等彼此共許次句異乃因異答別之由次句無異思惟誠如所見下句總合又如水一味因器有差別佛福田亦然衆生心故異後九別中皆上半喻下半合一水喻器有大小方圓任器故亦如巧幻師能令衆歡喜佛福田如是令衆生敬恱二幻喻體外方便貴且恱心體外方便者無而假設如無三說三等如有才智王能令大衆喜佛福田如是令衆悉安樂三王喻體內方便終得實樂上二喻佛巧稱物機體內方便者即佛權智鑒事差別即體上大用為體內方便譬如淨明鏡隨色而現像佛福田如是隨心獲衆報四鏡喻約衆生謂隨妍而影殊心高下而報別與前鏡喻因緣不同餘義無異後五皆約佛明與前鏡喻者前業果中喻如來藏約其自心故是因也今將喻佛是喻緣故起信論云真如內熏為因善友外熏為緣約四鏡中即後二鏡已出纏故正取緣熏習鏡義兼法出離鏡以法出離是緣熏習鏡之體故義如前引餘義無別者亦有一異染淨等義則以佛為淨以生為染自他相望而論一異謂心佛衆生三無差別如阿揭陀藥能療一切毒佛福田如是滅諸煩惱患五藥喻即多之一具百味故普去一切煩惱毒故普去一切者阿伽陀此云普去故亦如日出時照耀於世間佛福田如是滅除諸黑暗六日喻即一之多無幽不燭大小之暗並除亦如淨滿月普照於大地佛福田亦然一切處平等七月光普照喻佛平等拂上諸迹雖隨機現要且無私譬如毗藍風普震於大地佛福田如是動三有衆生八大風普震喻遍動羣機譬如大火起能燒一切物佛福田如是燒一切有為九大火普燒喻終歸寂滅又此五喻喻滅惑智二障至平等智地普動諸有皆證無為前四即善巧隨機此五則終令造極豈不等耶又此五喻下覆躡重釋於中有二先正釋五偈阿伽陀喻喻滅惑障日破暗喻喻滅智障月光普照喻喻至平等智地平等智地即法華意故彼經云究竟至於一切智地風喻普動諸有火喻皆證無為至於智地即是菩提是滅智障果證無為是證涅槃是滅惑障果二因無礙二果亦融普動諸有者即所化生普令衆生滅二障之病證菩提涅槃之果是此意也前四已下總彰答意爾時文殊師利菩薩問勤首菩薩言第六正教甚深問中初標問人以破懈怠故問勤首佛子佛教是一二正顯問端中四初佛教是一者舉法按定一有二義一謂斷煩惱集證出離滅此義不殊彼此共許二謂多人同見所見不異衆生得見云何不即悉斷一切諸煩惱縛而得出離二衆生下正設疑難難亦有二一對初義見教之後何以久而不脫故云云何不即斷惑出離一對初義者謂約一人豎論教能斷惑亦見即合斷惑何以久而不斷二對後義多人同見何以有脫不脫故言云何不悉斷惑而出二對後義約多人橫說同見斷惑之教何以一斷一不斷耶悉者俱合斷故然其色蘊受蘊想蘊行蘊識蘊欲界色界無色界無明貪愛無有差別三然其下釋成前難正釋後義多人苦集皆不殊故五蘊是正三界通依此苦果也癡愛發潤為集因也兼顯初義前後苦集亦不殊故是則佛教於諸衆生或有利益或無利益四是則下結成相違出者有益不出無益佛教是一其義安在答意云修有勤惰障有深淺機有生熟緣有具闕智有明昧功有厚薄故成有遲速答初難也修與不修故見同益答後難也上之別義不出勤惰二門故修有勤惰等者先答初意總有六對略收下喻勤惰是總意障有淺深是樵濕喻機有生熟亦是上喻及鑽火喻未熱數息是機生故緣有具闕即闕緣求火下三喻功有厚薄即毛滴下三喻修與不修下對後難意雖多人同見不修不益修則有益時勤首菩薩以頌答曰佛子善諦聽我今如實答或有速解脫或有難出離十頌分二初一開章許說謂上半許稱實而說下半開二章門若欲求除滅無量諸過惡當於佛法中勇猛常精進餘九別釋初一釋速解脫後八釋難出離今初上半牒疑下半為釋勤則通䇿萬行離身心相故能速出然有五相一有勢力由被甲精進故謂於佛法中發大誓願二勇捍謂於廣大法中無怯劣精進故三堅猛由寒熱蚊虻等所不能動精進故四常不捨善軛由於無下劣無喜足精進故五精進由加行精進故由斯五相發勤精進速證通慧滅障解脫下八以喻釋難出障總相翻前皆名懈怠然有五相等者即瑜伽論八十五說彼云又有五相發勤精進速證通慧謂有勢力者由被甲精進故有精進者由加行精進故有勇捍者由廣大法中無怯劣精進故有堅猛者由寒熱蚊虻等所不能動精進故有不捨善軛者由於無下劣無喜足精進故今但次不同耳譬如微少火樵濕速令滅於佛教法中懈怠者亦然一火微樵濕喻喻善根生及三障重暫聞教才少修行而業惑內侵令所聞速失所行速廢故成懈怠難出離也如鑽燧求火未出而數息火勢隨止滅懈怠者亦然二鑽火數息喻喻修有懈退然此下喻多通三慧以辨懈怠此喻約聞即聽習數息明解不生約思即決擇數息真智不生約修即定慧數息聖道不生聖道如火能燒惑薪暖頂已前皆名未熱已熱而息火尚不生未熱數息雖經年劫終無得理故遺教對此明小水長流則能穿石聖道如火者二約修消經即俱舍論文謂聖道如火能燒惑薪道火前相故名為燸燸頂已前者謂七方便中前三方便即五停心觀別相念觀總相念觀也以燸法為熱故燸頂忍世第一法此四方便為四善根是加行位然大小乘釋小有不同大乘之義至初地廣釋言已熱而息者謂燸必至涅槃頂終不斷善忍不墮惡趣第一入離生至於燸位猶尚斷善故云已熱而息未入見道為火向不生未熱數息即三方便更加懈怠何由造證故遺教等者即是彼經八大人覺中釋精進相經云汝等比丘若勤精進則事無難者是故汝等當勤精進譬如小水常流即能穿石若行者之心數數懈廢譬如鑽火未熱而息雖欲得火火難可得是名精進釋曰彼以鑽火數息以況懈怠小水長流以比精進故云對此名小水長流禪宗六祖共傳斯喻願諸學者銘心書紳禪宗六祖下三結勸初引內教結勸自達磨教可即用此喻展轉相承但云六者後分南北多紛競故願諸學者引外典結勸言銘心者猶如刻銘長記不滅言書紳者即論語第十七子張問行子曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉立則見其參於前也在與則見其𠋣於衡也夫然後行子張書諸紳注曰紳大帶也若直就修行以釋當以智慧鑽注於一境以方便繩善巧回轉心智無住四儀無間則聖道可生瞥爾起心暫時亡照皆名息也若直就下四示不息相以智慧鑽注於一境等者心一境性名之為定一境之言通於事理故遺教經云制之一處無事不辦下經云禪定持心常一緣等如了法無生名為般若無生即境此理一境了即智慧無住住故名注一境則能入理言方便繩者帶空涉有照事照理喻之以繩有動用故善巧回轉者若了無生而入理者或觀生法求生不得或忘能了入無念門或起大悲方能入理如是種種若事若理名巧回轉言心智無住者亦通事理且約理者若以心知如是心住境若以智了心是智住心若內若外皆名為住若住無住亦名為住故經云若心有住則為非住應無所住而生其心謂生無所住心則非有無住可生不生於心則無住心生即此契理亦名方便故大品云以無所得而為方便若不住事理生死涅槃則事理無礙之方便也四儀無間者設爾有斷亦須知斷若不斷時亦知無斷常無念知則無間矣瞥然起心即失止也又違北宗暫時忘照即失觀也亦違南宗寂照雙流即無斯過如人持日珠不以物承影火終不可得懈怠者亦然三闕緣求火喻物者艾等也教詮聖道等彼火珠要持向智日以行承之則聖道火生空持文字不能決擇心行乖越道何由生譬如赫日照孩稚閉其目怪言何不覩懈怠者亦然四閉目求見喻智微識劣喻彼孩稚約聞慧者雖對明師不肯咨決約思修者雖對教日心眼不開貴聖道之不生何其惑矣如人無手足欲以芒草箭遍射破大地懈怠者亦然五闕緣心廣喻喻愚人無淨信手以持定弓復無戒足以拒惑地以劣聞慧箭欲遍射破業惑厚地空欲難遂如以一毛端而取大海水欲令盡乾竭懈怠者亦然六毛滴大海喻謂以少聞思欲測法海妄生希欲懈怠尤深又如劫火起欲以少水滅於佛教法中懈怠者亦然七少水滅火喻劫火遍熾喻觸境惑增少分三慧安能都滅如有見虛空端居不搖動而言普騰躡懈怠者亦然八不動遍空喻喻雖知性空智未游履而言遍證亦增上慢人也爾時文殊師利菩薩問法首菩薩言第七正行甚深問法首者以行法故佛子如佛所說若有衆生受持正法悉能除斷一切煩惱二顯問端中三初出聖教受謂心領義理持謂憶而不忘何故復有受持正法而不斷者隨貪瞋癡隨慢隨覆隨忿隨恨隨嫉隨慳隨誑隨諂勢力所轉無有離心二何故下申其所疑佛言能斷今有不斷即教行相違先標相違隨貪已下出所不斷勢力已下結成不斷謂有持法非唯不滅舊惑亦乃隨解新增十一種惑勢力所轉前四根本後七隨惑皆言隨者雜集第七說諸煩惱皆隨煩惱有隨煩惱而非煩惱由此即顯根本煩惱亦得名隨隨他生故通釋貪等如九地中今約依法新起者說即貪求名利瞋所不解迷其自行恃法自高覆藏己短論難生忿結恨擬酬疾彼勝己慳自所知不解言解廢法逐情雜集第七等者解妨既分根本隨惑何皆名隨故為此通故彼論云隨煩惱者謂所有諸煩惱皆是隨煩惱有隨煩惱非是煩惱釋曰非煩惱者所謂忿等但隨大惑名隨煩惱而非根本名非煩惱而貪嗔癡名隨煩惱者心法由此隨煩惱故隨惱於心令不離染令不解脫令不斷障故名隨煩惱如世尊說汝等長夜為貪嗔癡隨所惱亂心恆染汙釋曰論意云一切煩惱根本隨惑隨逐衆生令心心所隨順染汙故皆名隨是以疏云隨他生故他即衆生由惑隨生故生隨惑正是經意謂諸行人心隨貪等通釋貪者指廣在餘然九地中釋其別相若隨名釋如唯識第六云云何為貪於有有具染著為性能障無貪生苦為業謂由愛力取蘊生故釋曰有謂後有三有異熟之果有具謂彼惑業中有及器世間論云云何為嗔於苦苦具增恚為性能障無嗔不安隱行所依為業謂嗔必令身心熱惱起諸惡業不善性故釋曰苦謂三苦苦具謂一切有漏無漏但能生苦者謂邪見等謗無漏故亦能生苦論云云何為癡於諸理事迷暗為性能障無癡一切雜染所依為業謂由無明起疑邪定貪等煩惱隨煩惱業能招後生雜染法故釋曰獨頭無明多迷諦理相應無明亦迷事相謂於諦等生猶豫故論云云何為慢恃己於他高舉為性能障不慢生苦為業謂若有慢於彼有德心不護下由此生死輪轉無窮受諸苦故然根本有六疑及惡見此中不說者以解教人多無於疑及惡見故後七隨惑中然唯識隨惑總有二十頌云隨煩惱謂忿恨覆惱嫉慳誑諂與害憍無慙及無愧掉舉與昏沉不信并懈怠放逸及失念散亂不正知此二十中有其三品謂初忿等十各別起故名為小隨煩惱無慙等二遍不善故名為中隨煩惱掉舉等八遍染心故名大隨煩惱今唯小隨為成十故但舉其七略無惱害及憍三事亦憍屬慢攝惱害嗔收故而言覆者謂於自作罪恐失利譽隱藏為性能障不覆悔惱為業謂覆罪者後必悔惱不安隱故忿謂依對現前不饒益境憤發為性能障不忿執取為業謂懷忿者多發暴惡身表業故恨謂由忿為先懷惡不捨結怨為性能障不恨熱惱為業謂結恨者不能含忍恆熱惱故嫉謂徇自名利不耐他榮妬忌為性能障不嫉憂戚為業謂嫉妬者聞見他榮深懷憂感不安隱故慳謂耽著財法不能惠捨祕吝為性能障不慳鄙畜為業謂慳吝者心多鄙澀畜積財法不能捨故誑謂為獲利譽矯現有德詭詐為性能障不誑邪命為業謂矯誑者心懷異謀多現不實邪命事故諂謂為網冒他故矯設異儀險曲為性能障不諂教誨為業謂諂曲者或網冒他曲順時宜矯設方便為取他意或藏已失不任師友正教誨故然諂誑並以貪癡一分為體慳唯貪一分嫉恨忿三以嗔一分覆以貪癡一分為體恐失利譽是貪不懼當苦是癡餘可例知能受持法何故復於心行之內起諸煩惱三能受持下結成難也佛言受法能斷煩惱今受還起其故何耶答意云法是法藥要在服行服與不服有斷不斷非醫咎也故十行品云如說能行如行能說智論云能行說為正不行何所說若說不能行不名為智者故如說行方得佛法不以口言而可清淨法是法藥等者淨名云應病與藥令得服行服與不服等者即遺教經八大人覺後云汝等比丘於諸功德常當一心捨諸放逸如離怨賊大悲世尊所說利益皆已究竟汝等但當勤而行之若於山間若空澤中若在𣗳下間處靜室念所受法勿令忘失常當自勉精進修之無為空死後致有悔我如良醫知病說藥服與不服非醫咎也又如善導導人善道聞之不行非導過也此皆勸行智論云能行說為正等者即第六論文故如說修行等者即第三地經時法首菩薩以頌答曰佛子善諦聽所問如實義非但以多聞能入如來法十頌分二初一勸讚略說初句勸聽遠離貢高輕慢怯弱三種雜染方名善聽求悟解故專一趣心聆音屬耳掃滌其心攝一切心方名諦聽次句讚問顯行稱理故名如實下半略說遠離貢高等者即瑜伽論三十八云聽法由六種相遠離貢高雜染由四種相遠離輕慢雜染由一相遠離怯弱雜染言六相者一應時聽二殷重聽三恭敬聽四不為損害五不為隨順六不求過失言四相者一恭敬正法二恭敬說人三不輕正法四不輕說人言一相者不自輕蔑具上諸義方名善聽求悟解者論云由五相故無散亂心一求悟解心二專一趣心三聆音囑耳四掃滌其心五攝一切心疏文具足具此五心得名審諦言非但者要兼修行獨用多聞不能證入故下諸偈皆云於法不修行多聞亦如是此名不行之失非毀多聞若無多聞行無依故是以不行為失如調達善星行之為得如阿難身子故自利利他之行並須明達誓窮法海為種智因但應善義勿著言說言非但等下此下牒經廣釋一句顯一章大意此明不行等下以人多言此章毀於多聞令人守愚不習教理故為此揀初正揀非毀多聞但責聞而不行不令行而不聞次若無多聞者返立無聞無解依何而行後是以不行為失下三結成上義多聞不行調達等是是經所訶多聞而行身子等是經所不貴善星是佛之子調達是佛之弟並解十二部經不依修行生身陷入阿鼻地獄阿難身子多聞行故親得授記故自利下結要多聞但應下通伏難謂有難言一切經論皆說無言商主天子經云無有不毀語言而得道者涅槃二十六云若知如來常不說法是名具足多聞者又涅槃二十六云寧願少聞多解義理不願多聞於義不了故為此通涅槃但令解義不毀多聞商主等經但令莫著豈當不許衆生聞教婆沙四十二云多聞能知法多聞能離罪多聞捨無義多聞得涅槃淨名云多聞增智慧以為自覺音下經推度生之方便乃至不離善巧多聞婆沙四十二下第二引證總引二論三經先引一論二經證須多聞淨名即第二答普現色身菩薩之偈下經即第三地經前文已引上單顯聞涅槃四事為近因緣即雙美聞行故智論云多聞廣智美言語巧說諸法轉人心行法心正無所依如大雲雷霔洪雨如是教理無量無邊恐繁且止上單顯聞下二雙引聞行先引涅槃即第二十五高貴德王菩薩品第七功德云善男子菩薩摩訶薩修大涅槃微妙經典作是思惟何法能為大般涅槃而作近因菩薩即知有四種法為大涅槃而作近因若言勤修一切苦行是大涅槃近因緣者是義不然所以者何若離四法得涅槃者無有是處何等為四一者親近善友二者專心聽法三者繫念思惟四者如法修行善男子譬如有人身遇衆病若冷若熱虛勞下瘧衆邪鬼毒到良醫所良醫即為隨病說藥是人至心善受醫教隨教合藥如法服之服已病愈身得安樂有病之人喻諸菩薩大良醫者喻善知識良醫所說喻方等經善受醫教喻善思惟方等經義隨教合藥喻如法修行三十七助道之法病除愈者喻滅煩惱得安樂者喻得涅槃常樂我淨故云涅槃四事雙美聞行故智論者然彼論第六總有四偈此第一偈次偈云多聞辨慧巧言語美說諸法轉人心自不如法行不正譬如雲雷而不雨博學多聞有智慧訥口拙言無巧便不能顯發法寶藏譬如有雲無雷雨不廣學問無智慧不能說法無好行是弊法師無慙愧譬如不雲無雷雨此上以行為雨以辨為雷以聞智為雲合是以辨為雷初偈總具故今引之次一闕行次偈闕辨行後偈三俱闕故云弊法師恐繁且止者即智論次前云有智無多聞是不知實相譬如暗夜中有目無所見多聞無智慧亦不知實相譬如大明中有燈而無目多聞利智慧是所說應受無聞無智慧是名人中牛及餘諸經其文甚廣如人水所漂懼溺而渴死於法不修行多聞亦如是九頌喻明皆上半喻況下半法合初懼溺渴死喻喻貪隨文義失謂義門波濤漂蕩其心慮溺溺他無暇修行自絶慧命故名渴死如人設美膳自餓而不食於法不修行多聞亦如是二設食自餓喻喻隨說廢思失說法施人多求名利不思法味損減法身如人善方藥自疾不能救於法不修行多聞亦如是三醫不自救喻喻善知對治而不自治如人數他寶自無半錢分於法不修行多聞亦如是四貧數他寶喻喻說佛菩薩功德不能求諸身心故無分也如有生王宮而受餒與寒於法不修行多聞亦如是五王子饑寒喻謂王子違王法教於內起過故受饑寒學人亦爾生在法王教法宮中行違佛教起惡惑業故無慚愧忍辱之衣寧餐法喜禪恱之味故饑寒也如聾奏音樂恱彼不自聞於法不修行多聞亦如是六聾樂恱彼喻喻不解自說失謂夫真說聞者必忘說聞逐語而說為自不聞如盲繢衆像示彼不自見於法不修行多聞亦如是七盲晝示彼喻喻不見自義失譬如海船師而於海中死於法不修行多聞亦如是八船師溺海喻謂將導衆人游佛法海𠋣自所解不慎身行為法所淪如在四衢道廣說衆好事內自無實德不行亦如是九巧言無德喻謂亦說修行或談己德內無實德但有虛言獨此一偈三句是喻合文但云不行亦如是彌顯不毀多聞又此九偈亦可別對隨貪等義如理應思又此九偈者一溺水喻隨貪愛水故二喻隨慳不自食故三喻隨嫉是內病故四喻隨諂數他德故五喻隨嗔及忿違王之法受飢寒故六喻隨覆若掩耳偷鈴欲人不聞故七喻隨癡盲無見故八喻隨慢恃己慣故九喻隨誑無德說德故音釋苦角切鳥𡖉也曀於計切隂翳也懈怠懈古隘切懶也怠徒耐切惰也鑽燧鑽祖官切燧徐醉切鑽燧謂鑽木取火也孩稚孩戶來切始生小兒也稚直利切幼小也躡尼輒切蹈也數所舉切計也餒奴罪切飢也繢胡對切畫也鎔以中切銷也溉居大切澆也殼乞約切皮甲也廄居又切馬舍軛乙革切貊莫白切北方國豸種
