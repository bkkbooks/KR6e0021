body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述眼耳鼻舌身心意諸情根以此常流轉而無能轉者次正釋文且第一偈答三問者初答何因種種此具二意先答何因下摽也謂此一偈具四因中第二八識熏習第三由無定性一以八識熏習而成故初句五識次句心是本識集起義故意通六七七謂審思量故六謂意之識故了別義故偈文窄故不立識言亦諸情攝此從別義通則八識皆得心意識名諸情根者通於八種類非一故五依色根六依第七七八互依又第七識為染汙根第八又為諸識通依云諸情根言以此者以上八識為能所熏展轉為因而常流轉無別我人故云無能轉者又識外無法亦為無者次句心是本識者成唯識第五云云何應知此第七八識離眼等識別有體耶述曰以小乘謂此但是第六入過去故故為此問論云聖教正理為定量故謂薄伽梵處處經中說心意識三種別集起名心思量名意了別名識是三別義述曰此上總解謂小乘謂未來名心過去名意現在是識種種分別然無別體今顯經證論如是三義雖通八識而隨勝顯第八名心集諸法種起諸法故第七名意緣藏識等恆審思量為我等故餘六名識於六別境粗動間斷了別轉故釋曰謂為一切現行所熏是集諸法種現法為依種子為因能生一切故云起諸法言緣藏識等者因中有漏唯緣我境因中無漏緣於第八及緣真如果上許緣一切法故論云等也言粗動者易了名粗轉易名動不續名問各有所緣故得別名論如入楞伽第九伽陀中說藏識說名心思量性名意能了諸境相是說名為識此從別義下顯通別之義瑜伽六十三亦但有別名大同唯識已下更無別釋通則八識下通出八識皆得三名之相說者應云若以集起以解心第八獨名心若積集以解心八識皆名心若思量以解意第七獨名意若以等無間以解意八識皆名意若以了別別境以解識前六獨名識謂了差別六塵境故若以了別以解識八識皆名識即別識之義唯識第一疏云了別別境及粗顯境唯前六故對此六塵說六識故即斯義也通別之名居然易了諸情根者通於八識皆有根義已成非一況就八中復有二類前五依色後三依心三依心中復有單雙互依之異若具說者復有多少不同故唯識第四云諸心心所皆有三依一因緣依謂自種子諸有為法皆託此依離自因緣必不生故二增上依謂內六處諸心心所皆託此依離俱有根必不轉故三等無間依謂緣前滅意諸心心所皆託此依離開導根必不起故釋曰根識同時名俱有也前滅識等猶能開避導引後生名開導也然此三依言生轉起別相云何生約依種辦體而生轉約隨順與力令轉起約由前開路令後得起然其八識說俱有依四師不同今用第四護法護法廣破前義結云由此五識俱有所依定有四種謂五色根六七八識隨聞一種必不轉故同境分別染淨根本所依別故釋曰同境即五色根根識共同緣一境故分別是第六分別差別故染淨是第七依此能起染污識等故根本是第八若離第八餘不立故論曰聖教唯說依五根者以不共故又必同境近相順故釋曰此會違也謂對法第一但言眼識依色根會云不共者眼根但為眼識依故非餘識依餘四亦然六七八識通餘識依又必同境者根必與識同緣境故又近相順者六七等識即是遠故是故五識定有四依論曰第六意識俱有所依唯有二種謂七八識隨闕一種必不轉故雖五識俱取境明了而不定有故非所依聖教唯說依第七者染淨依故同轉識攝近相順故釋曰論中有三初正明次雖五識下通外間謂有問云意識得五緣境明了何不亦用五識為依故答云不定有故意識不得五識之時能獨緣故第七下會通餘教亦是對法通亦有三初明是彼染淨根故二者六七同是轉識故三多引意識起染汙執故名相順論第七意識俱有所依但有一種謂第八識藏識若無定不轉故如伽陀說阿賴耶為依故有末那轉依止心及意餘轉識得生阿賴耶識俱有所依亦唯一種謂第七識彼識若無定不轉故論說藏識恆與末那俱時轉故又說藏識恆依染汙此即末那釋曰上引伽陀即楞伽經上引論即瑜伽論然上所引唯識說識差別不同故今疏云種類非一而順諸聖教從多而說故於五中取不共依六取染汙故各舉其一餘義含在類非一中及次疏文重明七八二識中攝既七為染汙根即與前六為染淨依八為通依即與前七為根本依矣言染汙根者第四論云此意任運恆緣藏識與四根本煩惱相應其四者何謂我癡我見我慢我愛是名四種我癡者謂即無明愚於我相迷無我理故名我癡我見者謂我執於非我法妄計為我故名我見我慢者謂踞傲恃所執我令心高舉故名我慢我愛者謂我貪於所執我深生耽著故名我愛并表慢愛有見慢俱遮餘部師不相應義彼疏釋云餘部即薩婆多見慢愛三不得俱起故論云此四常起擾濁內心令外轉識恆成雜染有情由此生死輪回不能出離故名煩惱釋曰由此四惑常俱等故名染汙根下論文中往往皆名為染汙意第八又諸識通依者即根本依也言諸識者不唯第七識心所等法皆依此故直就第七名染汙根若為大依則通染淨故名為染淨依以上八識等者釋第三句前七為能熏第八為所熏故通云八識為能所熏七熏八種七是八因八含七種八是七因故云展轉又依種起現現復熏種故展轉無窮然此能熏所熏通性相宗先依法相宗說唯識第二廣顯其義論云依何等義立熏習名同也所熏能熏各有四義令種生長故名熏習此總答也何等名為所熏四義別從一堅住性若法始終一類相續能持習氣乃是所熏此遮轉識及風聲等性不堅住故非所熏釋曰轉識謂七轉識兼含心所若許七識能持種者初地已破四惑應失一切有漏種子已轉七識成平等性猶有有漏種者明是八識能持言風聲等者此揀根塵以間斷相顯故偏語之理實等字等取根塵及法處所攝色等一切皆揀至無色界即無色故入滅定等心亦無故名不堅住論云二無記性若法平等無所違逆能容習氣乃是所熏此遮善染勢力強盛無所容納故非所熏由此如來第八淨識唯帶舊種非新受熏釋曰善染如沉麝韭蒜等故不受熏無記如素帛故能受熏佛第八識以極善故亦非所熏唯於因中曾所熏故帶彼舊種論曰三可熏性若法自在性非堅密能受習氣乃是所熏此遮心所及無為法依他堅密故非所熏釋曰第八心王得自在故可是所熏第八同時五種心所體非自在故非所熏無為之法體又堅密如金石等故非所熏論曰四與能熏共和合性若與能熏同時同處不即不離乃是所熏此遮他身剎那前後無和合義故非所熏釋曰他身即上同處無有以他身識為我所熏故剎那前後即上同時揀於經部前念之識熏後念故論曰唯異熟識具斯四義可是所熏非心所等釋曰此總結也非心所者即第八同時心所等取所餘如上所揀論曰何等名為能熏四義釋曰徵也論曰一有生滅若法非常能有作用生長習氣乃是能熏此遮無為前後不變無生長用故非能熏二有勝用若有生滅勢力增盛能引習氣乃是能熏此遮異熟心心所等勢力贏劣故非能熏釋曰勝用有二一能緣勝用即揀諸色為相分熏非能緣熏二強盛勝用謂不任運起即揀別類異熟心等有緣慮用無強盛用為相分熏非能緣熏由斯色等有強盛用無能緣用異熟心等有能緣用無強盛用諸不相應法二用俱無皆非能熏論曰三有增減若有勝用可增可減攝植習氣乃是能熏此遮佛果圓滿善法無增無減故非能熏彼若能熏便非圓滿前後佛果應有勝劣釋曰有增減者第七末那至無漏位亦有增減唯除佛果言有勝劣者前佛應勝以熏無漏種子多故論曰四與所熏和合而轉若與所熏同時同處不即不離乃是能熏此遮他身剎那前後無和合義故非能熏釋曰此第四義大同所熏上二皆云共和合者和合即是相應異名論曰唯七轉識及彼心所有勝勢用而有增減者具此四義可是能熏釋曰上結能熏論云如是能熏與所熏識俱生俱滅熏習義成令所熏中種子生長如熏苣蕂容名熏習上來皆是法相宗意下經數數有熏習義莫猒文繁第二法性宗者上法相宗所熏第三能熏第一正揀真如受熏之義今法性宗亦七識等而為能熏八為所熏其第八中以如來藏隨緣成立含有生滅不生滅義故熏第八即熏真如故起信云復次有四種法熏習義故染法淨法起不斷絶云何為四一者淨法名為真如二者一切染因名為無明三者妄心名為業識四者妄境界所謂六塵熏習義者如世衣服實無於香若人以香而熏習故則有香氣此亦如是真如淨法實無於染但以無明而熏習故則有染相無明染法實無淨業但以真如而熏習故則有淨用云何熏習起染法不斷所謂以依真如法故有於無明以有無明染法因故即熏習真如以熏習故則有妄心以有妄心故則熏習無明不了真如法故不覺念起現妄境界以有妄境界染法緣故即熏習妄心令其念著造種種業受於一切身心等苦廣如彼論是則真如亦為能熏亦能受熏故楞伽云不思議熏不思議變是現識因謂不可熏而熏故名不思議熏真如不變而隨緣成立名不思議變亦即不染而染也賢首云妄心通業識及事識今據其本言業識耳言熏習故有染相者真如本無相隨熏現相又顯妄法無體故但云相此釋經中如來藏為惡習所熏等上即生滅門中真如言有淨用者此是生滅門中本覺真如故有熏義真如門中則無此義由此本覺內熏不覺令成猒求反流順真故云用也此釋經中由如來藏故能猒生死苦樂求涅槃也涅槃經云闡提之人佛性力故還生善根彼言佛性力者即此本覺內熏之力良以一識含此二義更互相熏遍生染淨此中佛者是覺性者是本故名本覺餘如彼說無別我下釋第四句然有二意一破我執者即人也二又識外下破於法執即此言者通一切法二明由不相知方成種種上半出種種以此者以前不相知故舉體性空方成流轉即此八識各無體性故無實我法而為其主向若有性不可熏變安得流轉二明不相知方成種種者即第二假明前四因中第三因也但由偈中以此二字取義不同故一偈文通於二義取文全別前熏習義則以此二字全指上半為流轉因今顯無性即上半偈為流轉果上半出種種即以此二字指前五偈法喻所明不相知義為流轉因即此八識下釋第四句既所流無性何有能轉者耶其主者通於人法向若有性下上來順釋此下反釋由如金石各有堅性不可令易今此無性猶如於水遇冷成冰逢火便燸故中論云集若有定性先來所不斷於今云何斷道若有定性先來所不修於今云何修等故知若有定性一切諸法皆悉不成若無定性一切皆成故中論云以有空義故一切法得成若無空義者一切即不成無性即空義也次遣疑者以虛妄中有二義故一虛轉二無轉故常種種常一性也次遣疑下釋第二番懷疑問也由前問云為是一性為是種種故今答云常一常多一虗轉者無性故有也二無轉者無性故空也虗轉故常種種無轉故常一性勿滯二途也次答難者虛轉故俗不異真而俗相立無轉故真不異俗而真體存故互不相違也後答難下即答第三番沒難也謂前難云一性隨於種種則失真諦種種隨於一性則失俗諦故今意明不相違也虗轉等者轉故是俗虗故不異真既言虗轉則俗相立無轉等者無轉即真也以即轉言無故不異俗即轉是空故真體存俗法離真而無別體故云相立真不可見但云體存上句俗不違真下句真不違俗故疏結云互不相違法性本無生示現而有生是中無能現亦無所現物第二偈亦答三問初明真如隨緣故成種種者答所以也初句印上心性是一是不變義次句答上云何見有種種是隨緣義唯心變現全攬真性生非實生故云示現下二句印上業不知心等者以是隨緣不失自性義故是以諸趣種種了不可得生即無生無能現者性不動故無所現者妄法虛故唯心變現著正釋真如隨緣之義謂即依前諸識熏習之緣所熏真如隨緣成法故云全攬真成以離如來藏無有實體為能所熏故云全攬真成正揀法相真如之外有能所熏真性即如來藏性如來藏性即生滅門中真如生非實生正釋示現字亦仍上起謂既攬真生生相即虗故云示現以是隨緣者如水遇風緣而成波浪濕性不失如來藏性雖成種種而不失於自清淨性此中隨緣即是前經見有種種此中不失自性即前業不知心等對上問中故云諸趣種種了不可得對今經文故云生即無生生即諸趣無生即不相知躡上示生之句經云此中即下八字是不失自性無能現者真如隨緣成一切法如即能現不失自性名性不動何有能現妄攬真成故自虗無體次遣疑者常生常無生上半即無生之生業果宛然故勝鬘云不染而染難可了知下半生即無生真性湛然故勝鬘云染而不染難可了知又法性本無生不空如來藏也此中無能現空如來藏也上半即無生之生者由上疑云為是種種為是一性故今答云無生之生即常種種生即無生故云一性本未染淨既相交徹安可凡情而了知耶又法性本無生者上約不變隨緣今約二空即以能隨緣者為不空藏故有種種即上半也隨緣不失自性名為空藏以妄法不染故即是下半又約二藏體即是一性不礙隨緣故有種種不空即是一性空藏即不相知答第三難者此中無能現性非性也亦無所現物相非相也又示現而有生性不違相亦無所現物相不違性無二為二二即無二無礙圓融豈有乖耶答第三難者謂上難云一性隨於種種則失真諦種種隨於一性則失俗諦亦性相相違今答意明性相無違然疏有二意一明性相雙絶故無可相違即下半意又示現下第二明性相相成故不相違即是上半即無生之性不違示生之相言亦無所現物者雖牒第四句連取第一句正示現生即無所現故不違性無二為二者結也一體而分能現所現云無二而二性相無違為二即無二故云圓融豈得種種乖於一心心性乖於種種言法性者法謂差別依正等法性謂彼法所依體性即法之性故名為法性又性以不變為義即此可軌亦名為法此則性即法故名為法性此二義並約不變釋也又即一切法各無性故名為法性即隨緣之性法即性也言法性下隨難別釋先解法性後解本字今初有三前之二義雖有依主持業不同然皆與法不得相即以不變之性非妄法故第三隨緣與法不離不即不離方為真性本有二義一約不變本謂源本本來不生隨緣故生二約隨緣有此法來本不自生非待滅無即示現生時本不生故故下云無能現也本有二義者釋本無生由於法性有其不變隨緣義故今本亦二本即是性末即是相前不變本與未不即後隨緣本與末不離不即不離融無障礙為真本也眼耳鼻舌身心意諸情根一切空無性妄心分別有第三偈答三問者初答所以者上三句種種即一心性亦印前文殊不相知等下句出因由妄分別故有種種正答前問此復二意一上二句依他起也次句圓成實也後句遍計性也由遍計故能起依他依他無性即圓成實故唯識云依他起自性分別緣所生圓成實於彼常遠離前性故此與依他非異非不異此復二意下上來總明此下別釋會性相宗初三性釋通於二宗疏文有三初直屬經文是法性意依他無性為圓成故由遍計下二正釋偈意由妄分別有上眼等既從緣生故體即空空即圓成故唯識下三引文證成二宗三性已見玄文今此略引依圓二性初之二句是依他性故彼釋云妄分別緣即是遍計然妄分別是能遍計眼等依他是所遍計計為實故成遍計性由此能生染分依他故此遍計能起依他是彼依故圓成實下釋圓成性一偈分二上半正釋下半明與依他起性非一異義彼論釋云謂圓滿成就諸法實性顯此常遍體非虗謬揀自共相虗空我等此即於彼依他起上常遠離前遍計所執二空所顯真如為性說於彼言顯圓成實與依他起不即不離常遠離言顯妄所執能所取性理恆非有前言為顯不空依他性顯二空非圓成實真如離有離無義故釋曰玄文已釋但釋論意分前性字二義不同遠離前言已空遍計故是離有而言性者自屬真如故能離無是以結云真如離有離無相故若依此釋則空無性妄分別有皆是遍計前偈法性方是圓成今順法性依他無性即是圓成故一偈中三性具足設順彼宗離有離無遠離前性離遍計有又此偈云此諸法勝義亦即是真如常如其性故即唯識實性此則離無未失彼宗何須傷巧離前性字若會二宗依他起上無遍計性即是圓成此無性理是真如故已離有無故八地云無性為性故此與依他下釋非一異謂由圓成於依他起遮前性故成非一異故云故此彼論釋云由前理故此圓成實與彼依他非異不異異應真如非彼所依不異此性應是無常彼此俱應淨非淨境則本後智用應無別釋曰圓成唯淨智境依他通淨非淨豈得全同二者上二句因緣所生法也次句我說即是空也後句亦為是假名此二不二是中道義二者上二句下別會法性宗三觀欲顯包含取文小異中論偈云因緣所生法我說即是空亦為是假名亦是中道義配經可知然中道言經文所無但含下半空有為中若取別顯亦在前偈法性無生即前偈中亦具三觀初句中道次句假名下半即空由前已配真如隨緣故不顯耳又真如隨緣亦不殊三觀上別出二宗取文小異若以義會二宗無違因緣所生法即總舉三性所依之法我說即是空遍計性也亦為是假名依他起也亦是中道義圓成實也但三性迢然即法相宗今皆言即是法性宗但即不即小有不同便成天隔然法相宗亦非即離多成不即法性宗中亦非即離多成非異法相由不即空遍計是空但是空無法性則明由無遍計令依他空便成天隔後人隨計二互相乖虗己而求大旨無別顯經包攝備舉二文又經旨無差二宗隨取又妄心分別有者情計謂有然有即不有故云一切空無性常有常空是即萬物之自虛豈待宰割以求通哉又妄心下二答懷疑問謂上問言為是一性為是種種故今答云常空故常一性常有故常種種也是即萬物下肇公不真空論意也意云萬物自虗即常一常多矣故彼論云尋夫不有不無者豈曰滌除萬物杜塞視聽寂寥虗豁然後為真諦者乎誠以即物順通故物莫之逆即僞而真故性莫之易性莫之易故雖無而有物莫之逆故雖有而無雖有而無所謂非有雖無而有所謂非無如此則非無物也物非真也物非真故於何而物故經云色性自空非色敗空以明聖人之於物也即萬物之自虗豈待宰割以求通哉釋曰此明體法即空非析法明空也又前偈從本起末末不異本此偈攝末歸本本不礙末豈相乖耶又前偈下釋第三重結成難謂前偈法性為本示生為末此偈以空無性為本眼等為末攝末歸本種種不乖一性非本無末一性豈乖種種欲顯起末攝末逆順具足故引前偈非獨此偈不能答難若獨此偈答者謂眼耳等即無性故種種不乖一性無性要依眼等故一性不乖種種又從本起末即不動真際建立諸法攝末歸本即不壞假名而說實相義理無妨如理而觀察一切皆無性法眼不思議此見非顛倒第二一偈釋成前義然有二義一者云何得知無性以法眼觀稱性非倒成淨緣起當知此理甚為決定二者前偈訶其見有種種是妄分別此不應依此偈印前觀察無性各不相知斯為法眼固應依止即依智不依識也若實若不實若妄若非妄世間出世間但有假言說第三一偈拂迹入玄者謂前法性無生一切皆空實也示現有生眼等差別非實也妄心分別有妄也如理觀察非妄也以妄為緣生世間流轉以如理觀成出世間非倒法眼皆是名言而無真實何者如言取故第三一偈拂迹入玄先正釋偈文然實不實約事理說妄非妄者約情智說上即如如及相下即妄想正智並屬於名五法具矣而其疏文雙牒前二偈文細尋可知初略標亦約智說故曉公云如言而取所說皆非得意而談所說皆是十地論云如言取義有五過失若不取著實非實等並皆契理故中論云一切法真實一切法非實亦實亦非實非實非非實是名諸佛法則真妄等一一例然無非當也又欲言其實而復示生欲言不實體性即空欲言是妄妄不可得欲言非妄能令流轉欲言世間即涅槃相欲言出世無世可出則染淨兩亡是以物不即名以就實名不即物而履真然則實理獨靜於言教之外豈文言之能辨哉故但假說是以什公云唯忘言者可與道合虛懷者可與理通冥心者可與真一遺智者可與聖同耳又欲言其實下二別釋亦約理釋以理圓言偏言不及故以實非實等相即相奪一一圓融理致包含故是以物下三結成於中二初正結即肇公不真空論意也然此言因破汰公本無論後結成言也彼論具云本無者情尚於無多觸言而無故非有有即無也非無無即無也尋夫立言之本旨直以非有非真有非無非真無何必非有無此有非無無彼無此直好無之談豈謂順通事實即物之情哉夫以物物於物則所物而可物以物物非物故雖物而非物是以物不即名以就實名不即物而履真然則真諦獨靜於教名之外豈文言之能辨哉今但引其結文兩對耳言物不即名以就實者物體虗無無當名之實也名不即物而履真者名但假立無得物之功也若名即物召火即應燒口若物即名見物即應知名今不爾者明俱非實故不相得也是以什公下第二引證即悟玄序其前文云夫玄道不可以設功得聖智不可以有心知真諦不可以存我會至功不可以管事為今疏即次下之言此上二對反顯難思疏文所引即順明難思忘言者捨筌蹄也虗壞者離取著也𡨋心者不已見也遺智者泯能證也道理真聖大同小異然上三即法後一約人道者虗通即前玄道理揀於事即前至功所契真揀於俗即前真諦聖揀於凡即前聖智故有心不契遺智方知若有契合復應拂迹故彼次云雖云道合無心於合合者合焉雖云聖同不求於同同者同焉無心於合即無合無散不求於同即無同無異超非於百非之外非所不能非焉忘是於萬是之內是所不能是焉非所不能非則無非矣是所不能是則無是矣無異無同故怨親無二無是無非則毀譽常一夫然則幾於道矣今略引二對足令得意又後三偈亦如次明三無性觀又後三偈下第二攝叠重釋上之十偈從後漸收於中有二先𭣣中自有三重第一𭣣後三偈為三無性觀者唯識論云即依此三性立彼三無性初則相無性次無自然性後由遠離前所執我法性釋曰謂依遍計所執性說相無自性性由彼體相畢竟非有猶如虗空花繩上蛇故故今偈云一切空無性妄心分別有次依依他起性立生無自性性此如幻事託衆緣生無始妄執自然性故故今偈云如理而觀察一切皆無性後依圓成實性立勝義無自性性謂即勝義由遠離前遍計所執我法性故故今偈云若實若非實若妄若非妄皆是假說實即圓成非妄即契圓成之智成於出世並是假名實尚不實何況非實舉況總結故云非實妄及世間一時總遣又此五偈合前四喻初以流轉合水漂流次頌合火火本無生隨緣生故次頌合風風即空無因見物動妄謂有故次頌合地法眼見理無分別故後一總顯令亡言故又此五偈下二合前四喻由依此義十偈正答亦可分四初諸法無體性一偈法說宗因次二偈舉四同喻三有四偈別合前喻四者末偈結成前義則五分具矣又前五偈是印成答次四出所以答後一奪令亡言文殊一問以含多意覺首縱答體勢無方逆順研窮以顯深致幸諸學者不咎文繁文殊一問下第二結歎以緣起深理幽玄該博故問答包含今釋竭愚發揚玄旨勿以經少責疏繁文音釋麝神夜切獸名蒜蘇貫切葷菜也豁呼括切疏通也
