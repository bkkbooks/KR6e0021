body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述何以故欲令增進於一切法善能出離有所聞法即自開解不由他教故二徵釋中善能出離者不沉沒於事理成後位自在也佛子云何為菩薩童真住此菩薩住十種業何者為十所謂身行無失語行無失意行無失隨意受生知衆生種種欲知衆生種種解知衆生種種界知衆生種種業知世界成壞神足自在所行無礙是為十第八童真住自分中初三三業無失永離習氣唯佛得之任運無功在於八地此中多同八地能行無漏故得無失無十不善失亦無錯謬失此三自行亦為化體餘皆利他初一能化身頓悟菩薩隨願受生貴在利人不揀淨穢漸悟地前許受變易意生身故次四以能化智知所化境即十力智之四智也次一化處後一化法正化永離習氣者即十八不共中之三也如浮行品無下不善失者此是過失之失下錯謬者誤失之失頓悟菩薩者此法性宗若法相宗頓悟八地方受變易漸悟初地許受變易意生身者如回向説即十力者解與樂欲本是一故開即為二佛子此菩薩應勸學十種法何者為十所謂知一切佛剎動一切佛剎持一切佛剎觀一切佛剎詣一切佛剎遊行無數世界領受無數佛法現變化自在身出廣大遍滿音一剎那中承事供養無數諸佛後明勝進是不動行初六於剎自在後四三業自在此同八地若色若土皆自在故初一總知分齊次二作用持兼願力四十眼智觀五有佛便詣六遊以化生後四中一意二身三語四通三業此同八地者八地得色自在一身多身等十自在有淨土分何以故欲令增進於一切法能得善巧有所聞法即自開解不由他教故下徵釋意為得善巧入於後位辨才自在故佛子云何為菩薩法王子住此菩薩善知十種法何者為十所謂善知諸衆生受生善知諸煩惱現起善知習氣相續善知所行方便善知無量法善解諸威儀善知世界差別善知前際後際事善知演説世諦善知演説第一義諦是為十第九王子住初自分十中一知六趣四生受報差別又知九種命終心受生差別故又知九種者即俱舍第三三界命終各起三界心故如欲界命終三者一還起欲界心二起色界心三起無色界心餘二界命終起三類耳二知現行煩惱三知種等相續非如現行有間斷故習氣有四如九地説習氣有四者一因習氣二果習氣三道習氣四餘殘習氣四知諸乘作業所入法門及善巧故上四多同九地十種稠林彼據入地尤多細密故名稠林此但云知上四多同者初一攝二謂一衆生字即第一衆生心稠林二受生字即第九受生稠林二煩惱現起即彼第二煩惱稠林三習氣相續攝二稠林一習氣即是種子即當第八隨眠稠林二即第十習氣稠林四所行方便攝六稠林一攝第三業二攝第四根三攝第五解四攝第六性五攝第七樂欲六攝第十一三聚差別以三聚林依機解性樂欲説故釋中略已含具謂諸乘即根解性欲作業即業所入法門亦即三聚及善巧故者即此經方便所攝六林皆是涉事為方便故五知法藥是智成就義知法藥者即彼經云佛子菩薩摩訶薩住此善慧地如實知善不善無記法行有漏無漏法行世間出世間法行思議不思議法行定不定法行聲聞獨覺法行菩薩法行如來地法行有為無為法行故今云無量法也六知法師軌儀知法師者即口業成就中具説之德故經云為大法師具法師行論説二十法師是知化處即法師自在成就中説成就經云處於法座為演説法於大千界滿中衆生隨其心樂差別為説是也七知所化處八知化時隨根生熟不差失故知化時者亦即説成就亦最初經云住此地已了知衆生諸行差別教化調伏令得解脫等是後二依二諦説皆説成就也後二依二諦者即口業得四十無礙辨才不出二諦故彼文云詞無礙智以世智差別説樂説無礙智以第一義智善巧説等中論云諸佛依二諦為衆生説法佛子此菩薩應勸學十種法何者為十所謂法王處善巧法王處軌度法王處宮殿法王處趣入法王處觀察法王灌頂法王力持法王無畏法王宴寢法王讚歎後勝進十法皆言法王者既言王子倣佛之儀合子法度而言處者即是位也如世王子之於父王今對辨之一善巧者言辭安立及諸伎藝恱可王心今此菩薩學佛法王説法言辭安立權實善巧方便以恱佛心二軌度軌謂坐立動中規矩容止可觀度謂升降出入往來進退可度此明無虧戒行住佛威儀也三宮殿者父王在宮即行子禮父王處殿即行臣禮若處涅槃正殿即令萬行歸宗若處慈悲宮室則子愛含識四趣入者趣者就也謂澤及萬人入者𭣣也謂來萬國菩薩則無機不就無德不𭣣五觀察者入則觀父王察其聲色出則觀羣臣知其賢愚菩薩入則觀佛教理出則審機可否菩薩入下佛合上父教合前聲色合前理顯然可見故可化曰賢不可化如愚六灌頂者一地有文出現法喻雙辨七力持者聚人則以財為力慎危則以戒為力降怨則以忍為力廣業則以勤為力定亂則以靜為力謀安則以智為力固衆則以仁為力制敵則以衆為力菩薩六度四等萬行總持皆力義也持財以儉持衆以信持安以不憍持力以不奢餘可類取皆能持也菩薩六度者次第合上施合聚人以財尸羅合慎危以戒乃至般若合智四等合仁愍傷不殺以為仁故萬行總持合上制敵以衆持財以儉者上來釋力以下釋持略舉其四儉則財不散故不可貪也無信於物人皆遠之故信及豚魚況於人乎大車無挽小車無軏其何以行之哉故可去食去兵不可去信持安以不憍者在上不憍高而不危則長守富貴斯則安矣故百姓者水聖人者舟水能載舟亦能覆舟是故不可不慎危也若人奢侈則力竭也八無畏者為上無亢則無憂悔之畏節儉財色則無病畏居上不憍則無亡畏為下不亂則無刑畏在醜不爭則無兵畏三不備者永無死畏菩薩修行離老病死五種怖畏得十無畏為上勿亢者易乾卦云上九亢龍有悔亢極則憂悔至焉桀紂是也在醜而諍則兵醜者背也類也九宴寢者晝無故不內宴夜無故不外寢宴於側室寢於正處菩薩入定同佛不過明以耽其味不昏沉以滯於境無幽不得其味正定不易其心菩薩入定者合上晝無故不內宴晝宴則耽其味明合上晝過明者慧增定少也言不昏沉以滯於境者合上夜無故不外寢昏沉合夜滯境合外寢無幽不得其味合宴於側室正定不易其心合寢於正處十讚歎者樂則歌讚苦則哀歎讚音宜和樂歎音宜哀思其情切其辭文菩薩應仰讚佛德哀歎衆生情詣於理使令欣猒情詣於理下合讚音宜和樂歎音宜哀思合哀即哀合樂即樂是詣理也使其欣猒有二義一成上猒其哀欣其樂猒生死苦欣涅槃樂二者合上其情切其辭文文故可欣切故可猒何以故欲令增進心無障礙有所聞法即自開解不由他教故二徵釋云欲令增進得於後位無礙智故佛子云何為菩薩灌頂住此菩薩得成就十種智何者為十所謂震動無數世界照曜無數世界住持無數世界往詣無數世界嚴淨無數世界開示無數衆生觀察無數衆生知無數衆生根令無數衆生趣入令無數衆生調伏是為十第十灌頂住文亦分二先徵後釋釋中亦二先自分後勝進前中二初有十句所成德用後有十句讚勝難測以位終故加此一𫨻前中前五了世界無礙智後五成就衆生無礙智以智度滿故多同大盡分智成就説多同大盡分者大盡分則第十地八分之中第四分此分有五種大一智大二解脫大三三昧大四陀羅尼大五神通大今經前五即神通兼解脫大即作用解脫故後五攝餘三大多同智大故智成就説佛子此菩薩身及身業神通變現過去智未來智現在智成就佛土心境界智境界皆不可知乃至法王子菩薩亦不能知後十讚勝及後勝進皆是神通有上無上分中義皆是神通者即第六分其勝進十法即彼經云佛子此菩薩摩訶薩已能安住如是智慧諸佛世尊復更為説三世法界差別智遍一切世界智照一切世界智慈念一切衆生智舉要言之乃至為説得一切智智今讚勝中前四即業自在不可知一身二身用三十通四通用後六心智自在不可知初三即三達圓明智四知器世間自在智五定心所現之境六大智所知之境並深廣故下位不知佛子此菩薩應勸學諸佛十種智後勝進中三初標即學佛一切智一切種智以當位滿灌頂成佛以攝諸位皆此中具故如法界品海幢處説玄中廣明何者為十所謂三世智佛法智法界無礙智法界無邊智充滿一切世界智普照一切世界智住持一切世界智知一切衆生智知一切法智知無邊諸佛智二徵列中一學佛三達智此是總句二佛法智者覺法自性善出現儀三事理無礙四事法橫廣五大用周遍六身智光照七神力持令不壞法力持令進善八窮盡所化九知化法十了化主何以故欲令增長一切種智有所聞法即自開解不由他教故三徵釋成十勝智復更學者為欲成佛種智位故然上所釋大依十地爾時佛神力故十方各一萬佛剎微塵數世界六種震動所謂動遍動等遍動起遍起等遍起踊遍踊等遍踊震遍震等遍震吼遍吼等遍吼擊遍擊等遍擊雨天妙華天末香天華鬘天雜香天寶衣天寶雲天莊嚴具天諸音樂不鼓自鳴放天光明及妙音聲如此四天下須彌山頂帝釋殿上説十住法現諸神變十方所有一切世界悉亦如是第六顯實證成分中二先現瑞顯實後菩薩證成前中先世界有動地雨供一萬佛剎猶劣行故後如此下結通又以佛神力故十方各過一萬佛剎微塵數世界有十佛剎微塵數菩薩來詣於此充滿十方二又以下菩薩證成於中二初能證現前作如是言善哉善哉佛子善説此法二作如是下發言讚述於中四一讚其所説我等諸人同名法慧所從來國同名法雲彼土如來皆名妙法我等佛所亦説十住衆會眷屬文句義理悉亦如是無有增減二我等下舉同顯證此有四同一能説人二所説處三者會主四所説法初後與此同中二但彼同者法慧表解不可不同法若不同豈名為證中二異此者表人異道同處殊法一方表通方之説成證義也若亦同此將謂餘異名界佛不同説也若爾何故同名法雲妙法不多舉耶為有表故謂所説法該於十地故非粗淺故就所説中衆會約人眷屬兼法文句義理主伴皆同也佛子我等承佛神力來入此會為汝作證三佛子下舉因結成如於此會十方所有一切世界悉亦如是四如於此下結通廣遍謂非唯來此為汝作證於餘處證亦同證此彌顯所説是通方也此是彼菩薩結通不俟經家結通也問此經何要十方同説答引攝之教隨機不一諸方有殊圓實之教法爾常規故十方同説十方如來同一道故三賢十聖無異路故問此經下料揀於中有三初問法同何要此彼同説十住那不或有國土説一乘或有國土説二三等問説此經處何要遍於十方答能詮如所詮故所詮義理無不周故表位優劣證有多少據其所説無處不該問説此經下第二問處遍上約所説之法同此明所説之處遍又前明彼此同説今明一説即遍有云此上瑞應證成應在偈後有四因故一未説偈經猶未了不應先瑞先證二瑞證本為證經既不證偈則偈應非經三證辭不應云文句無有增減四若許瑞證合在頌前頌中應頌二分假使梵本如此譯者即合回文此乃靜法佳判今為一救理或可通為欲表説證同時故然文不纍書編之作次若全居末則似説竟方證若更居初未説復何所證故置於散説偈文之際深有以焉諸會文同皆倣此釋有云此上下三辨文次即刊定難經爾時法慧菩薩承佛威力觀察十方暨于法界而説頌曰見最勝智微妙身相好端嚴皆具足如是尊重甚難遇菩薩勇猛初發心見無等比大神通聞説記心及教誡諸趣衆生無量苦菩薩以此初發心聞諸如來普勝尊一切功德皆成就譬如虛空不分別菩薩以此初發心第七重頌分中總有一百頌分二初九十一頌正顯前法後如是十住下九頌結歎勸修前中十住即為十𫨻初住中有四十六頌文分為四初三頌頌發心緣次三十二頌緣境發心次十頌勝進所學後一總結今初尊重即前衆生樂見第三偈即廣大法三世因果名為處我等自性為非處欲悉了知真實義菩薩以此初發心過去未來現在世所有一切善惡業欲悉了知無不盡菩薩以此初發心諸禪解脫及三昧雜染清淨無量種欲悉了知入住出菩薩以此初發心隨諸衆生根利鈍如是種種精進力欲悉了達分別知菩薩以此初發心一切衆生種種解心所好樂各差別如是無量欲悉知菩薩以此初發心衆生諸界各差別一切世間無有量欲悉了知其體性菩薩以此初發心一切有為諸行道一一皆有所至處悉欲了知其實性菩薩以此初發心一切世界諸衆生隨業漂流無暫息欲得天眼皆明見菩薩以此初發心過去世中曾所有如是體性如是相欲悉了知其宿住菩薩以此初發心一切衆生諸結惑相續現起及習氣欲悉了知究竟盡菩薩以此初發心二中分二初十頌緣十力發心一頌一力初中謂以因感果斯為是處從我心冥性等生無有是處餘文可見隨諸衆生所安立種種談論語言道如其世諦悉欲知菩薩以此初發心二二十二頌別顯所求長行結前生後云求一切智今偈略顯一切智相此二十二頌一頌一智或有闕智了等言者蓋文略耳今以類例相從攝為十智初一俗諦智一切諸法離言説性空寂滅無所作欲悉明達此真義菩薩以此初發心次一真諦智欲悉震動十方國傾覆一切諸大海具足諸佛大神通菩薩以此初發心三一偈神通智欲一毛孔放光明普照十方無量土一一光中覺一切菩薩以此初發心欲以難思諸佛剎悉置掌中而不動了知一切如幻化菩薩以此初發心欲以無量剎衆生置一毛端不迫隘悉知無人無有我菩薩以此初發心欲以一毛滴海水一切大海悉令竭而悉分別知其數菩薩以此初發心不可思議諸國土盡抹為塵無遺者欲悉分別知其數菩薩以此初發心四五頌解脫智過去未來無量劫一切世間成壞相欲悉了達窮其際菩薩以此初發心五過去下一頌劫剎智三世所有諸如來一切獨覺及聲聞欲知其法盡無餘菩薩以此初發心六一頌三乘智無量無邊諸世界欲以一毛悉稱舉如其體相悉了知菩薩以此初發心無量無數輪圍山欲令悉入毛孔中如其大小皆得知菩薩以此初發心七有七頌三密智謂二頌身密欲以寂靜一妙音普應十方隨類演如是皆令淨明了菩薩以此初發心一切衆生語言法一言演説無不盡悉欲了知其自性菩薩以此初發心世間言音靡不作悉令其解證寂滅欲得如是妙舌根菩薩以此初發心三頌語密欲使十方諸世界有成壞相皆得見而悉知從分別生菩薩以此初發心一切十方諸世界無量如來悉充滿欲悉了知彼佛法菩薩以此初發心二頌意密種種變化無量身一切世界微塵等欲悉了達從心起菩薩以此初發心八一頌唯心智過去未來現在世無量無數諸如來欲於一念悉了知菩薩以此初發心欲具演説一句法阿僧祇劫無有盡而令文義各不同菩薩以此初發心十方一切諸衆生隨其流轉生滅相欲於一念皆明達菩薩以此初發心九過去下三頌一多無礙智欲以身語及意業普詣十方無所礙了知三世皆空寂菩薩以此初發心十有一頌權實雙行智菩薩如是發心已應令往詣十方國恭敬供養諸如來以此使其無退轉菩薩勇猛求佛道住於生死不疲厭為彼稱歎使順行如是令其無退轉十方世界無量剎悉在其中作尊主為諸菩薩如是説以此令其無退轉最勝最上最第一甚深微妙清淨法勸諸菩薩説與人如是教令離煩惱一切世間無與等不可傾動摧伏處為彼菩薩常稱讚如是教令不退轉佛是世間大力主具足一切諸功德令諸菩薩住是中以此教為勝丈夫無量無邊諸佛所悉得往詣而親近常為諸佛所攝受如是教令不退轉所有寂靜諸三昧悉皆演暢無有餘為彼菩薩如是説以此令其不退轉摧滅諸有生死輪轉於清淨妙法輪一切世間無所著為諸菩薩如是説一切衆生隨惡道無量重苦所纏迫與作救護歸依處為諸菩薩如是説三菩薩如是下十頌頌勝進十法一頌一法皆言令其不退轉者顯勸學之意也不退有三一位不退七住已上二證不退初地已上三念不退八地已去今此近希位不退故偈中一位不退者初一不退為二乘二已得不退三未得不退若約圓教當位從信入住得位不退初發心時成正覺故此是菩薩發心住一向志求無上道如我所説教誨法一切諸佛亦如是四一頌總結亦是引證第二治地住菩薩應當發起如是心十方一切諸衆生願使悉順如來教利益大悲安樂心安住憐愍攝受心守護衆生同己心師心及以導師心第二住五頌初二頌自分已住如是勝妙心次令誦習求多聞常樂寂靜正思惟親近一切善知識發言和恱離粗獷言必知時無所畏了達於義如法行遠離愚迷心不動次二頌勝進此是初學菩提行能行此行真佛子我今説彼所應行如是佛子應勤學後一頌結説第三菩薩修行住當依佛教勤觀察諸法無常苦及空無有我人無動作一切諸法不可樂無如名字無處所無所分別無真實如是觀者名菩薩第三住五頌前二頌自分次令觀察衆生界及以勸觀於法界世界差別盡無餘於彼咸應勸觀察十方世界及虛空所有地水與火風欲界色界無色界悉勸觀察咸令盡觀察彼界各差別及其體性咸究竟得如是教勤修行此則名為真佛子後三頌勝進第四生貴住菩薩從諸聖教而出生了達諸有無所有超過彼法生法界信佛堅固不可壞觀法寂滅心安住隨諸衆生悉了知體性虛妄無真實世間剎土業及報生死涅槃悉如是佛子於法如是觀從佛親生名佛子第四住六頌初三自分過去未來現在世其中所有諸佛法了知積集及圓滿如是修學令究竟三世一切諸如來能隨觀察悉平等種種差別不可得如是觀者達三世次二勝進如我稱揚讚歎者此是四住諸功德若能依法勤修行速成無上佛菩提後一結歎從此第五諸菩薩説名具足方便住深入無量巧方便發生究竟功德業菩薩所修衆福德皆為救護諸羣生專心利益與安樂一向哀愍令度脫為一切世除衆難引出諸有令歡喜一一調伏無所遺皆令具德向涅槃第五住五頌初三頌自分一切衆生無有邊無量無數不思議及以不可稱量等聽受如來如是法次一頌勝進此第五住真佛子成就方便度衆生一切功德大智尊以如是法而開示後一結歎第六正心圓滿住於法自性無迷惑正念思惟離分別一切天人莫能動聞讚毀佛與佛法菩薩及以所行行衆生有量若無量有垢無垢難易度法界大小及成壞若有若無心不動過去未來今現在諦念思惟恆決定第六住四頌初三自分於中後半頌是顯不動之意一切諸法皆無相無體無性空無實如幻如夢離分別常樂聽聞如是義二一頌勝進第七不退轉菩薩於佛及法菩薩行若有若無出不出雖聞是説無退動過去未來現在世一切諸佛有以無佛智有盡或無盡三世一相種種相第七住四頌初二自分一即是多多即一文隨於義義隨文如是一切展轉成此不退人應為説若法有相及無相若法有性及無性種種差別互相屬此人聞已得究竟後二勝進第八菩薩童真住身語意行皆具足一切清淨無諸失隨意受生得自在知諸衆生心所樂種種意解各差別及其所有一切法十方國土成壞相逮得速疾妙神通一切處中隨念往於諸佛所聽聞法讚歎修行無懈倦第八住五頌初三自分了知一切諸佛國震動加持亦觀察超過佛土不可量遊行世界無邊數阿僧祇法悉咨問所欲受身皆自在言音善巧靡不充諸佛無數咸承事後二勝進第九菩薩王子住能見衆生受生別煩惱現習靡不知所行方便皆善了諸法各異威儀別世界不同前後際如其世俗第一義悉善了知無有餘第九住五頌初二自分法王善巧安立處隨其處所所有法法王宮殿若趣入及以於中所觀見法王所有灌頂法神力加持無怯畏宴寢宮室及歎譽以此教詔法王子如是為説靡不盡而令其心無所著於此了知修正念一切諸佛現其前後三勝進第十灌頂真佛子成滿最上第一法十方無數諸世界悉能震動光普照住持往詣亦無餘清淨莊嚴皆具足開示衆生無有數觀察知根悉能盡發心調伏亦無邊咸令趣向大菩提一切法界咸觀察十方國土皆往詣第十住六頌初四自分於中三頌頌所成德用其中身及身所作神通變現難可測三世佛土諸境界乃至王子無能了一頌頌讚勝難測一切見者三世智於諸佛法明了智法界無礙無邊智充滿一切世界智照曜世界住持智了知衆生諸法智及知正覺無邊智如來為説咸令盡後二頌勝進如是十住諸菩薩皆從如來法化生隨其所有功德行一切天人莫能測第二大𫨻結歎勸修九頌分三初一頌總歎十住過去未來現在世發心求佛無有邊十方國土皆充滿莫不當成一切智一切國土無邊際世界衆生法亦然惑業心樂各差別依彼而發菩提意始求佛道一念心世間衆生及二乘斯等尚亦不能知何況所餘功德行十方所有諸世界能以一毛悉稱舉彼人能知此佛子趣向如來智慧行十方所有諸大海悉以毛端滴令盡彼人能知此佛子一念所修功德行一切世界抹為塵悉能分別知其數如是之人乃能見此諸菩薩所行道次六別歎發心住去來現在十方佛一切獨覺及聲聞悉以種種妙辨才開示初發菩提心發心功德不可量充滿一切衆生界衆智共説無能盡何況所餘諸妙行後二結歎初心況出修行十住位竟音釋逮度耐切音代及也暨于暨其兾切及也迫隘迫博陌切狹也隘烏廨切陋也咨即夷切訪問也譽羊茹切稱美也
