body:
  text: 唐于闐國三藏沙門實義難陀譯唐清涼山大華嚴寺沙門澄觀撰述爾時妙𦦨海天王承佛威力普觀一切自在天衆而說頌言二上首說偈中二先彰說儀後明正說今初𦦨海是當衆上首仰承佛力為衆申心十地論云承佛力者顯無我慢普觀十方示無偏心今觀己衆通局小異耳十地論云承佛力等者論中但云示無我慢無偏心故昔人或將通配二句疏意以別配為正故便配之然頌總有四種一名阿耨窣覩婆頌此不問長行與偈但數字滿三十二即為一偈二名伽陀此云諷頌或名不頌頌不頌長行故或名直頌謂直以偈說法故三名祗夜此云應頌四名嗢䭾南此云集施頌謂以少言攝集多義施他誦持故今此即伽陀頌也下皆凖之為何意故經多立頌略有八義一少字攝多義故二諸讚歎者多以偈頌故三為鈍根重說故四為後來之徒故五隨意樂故六易受持故七增明前說故八長行未說故今此正唯前二義兼五六二正說中十偈次第各一法門結集取此以為長行非此頌前也然此中長行與偈有多不同謂偈字則定長行多少不同而長行則約天得法偈中即是歎佛此必然也若二文互望或因果之殊或體用有別或互相影略或難易更陳或法喻不同或能所遞舉故傳授者善消息之二文相映於義易了結集取此者以昔人皆云頌長行故然此中長行下相對料揀者示說偈儀然上舉四種明偈體式次明八義即立偈之由然通重頌及與孤起華藏品有十例五對唯約祇夜今此料揀唯局此文雖是孤起而經家廣列故須會釋總有六對一因果者如第十偈云佛於無邊大劫海為衆生故求菩提此舉因故長行即云自所悟處此顯果也第二體用者第二偈云能然照世妙法燈用也長行云普觀一切悉自在體也第三影略者長行云知一切法不生不滅不來不去偈中但云了相無有即偈略也第四偈云永滅衆生癡暗心長行但有現見一切法即長行略也第四難易者如初天王長行但云得法界虗空界寂靜方便力解脫不見偈文難為解釋第五法喻不同者長行第二但云觀一切法偈云能然照世妙法燈是也第六能所遞舉者初天王但云法界虗空界是所遍處偈中則云佛身普遍諸大會則長行闕能遍且就初假具有六對況下諸假顯文甚多言傳授者善消息之者易豐卦云天地盈虗與時消息釋云消者盡也息者生也謂可加則加可減則減可出則出可沒則沒故言消息二文相映者長行不了則觀偈文偈文難見則觀長行則易了也佛身普遍諸大會充滿法界無窮盡寂滅無性不可取為救世間而出現今初天中初二句即前所遍法界虛空兼明能遍佛身則十身皆遍無窮盡者一出現無盡若高山之出雲二非滅盡法猶虛空之常住次句寂靜也由無性故不可取為一異俱不俱等後句方便合二為力此偈是說者自法故不結天名下並凖知一出現無盡等者然還源觀說有三遍一一塵普周法界遍即經充滿法界無窮盡二一塵出生無盡遍即疏前意三一塵含容空有遍即疏後意不可取為一異等者普遍諸會此應有異充滿法界此應唯一今他相俱寂故皆叵得若有一異則合此為俱一異既亡俱從何有若有俱句遣此雙非俱句已無雙非寧立故四句皆遣百非俱亡寂乎唯寂而言等者亦不可說有無等四真應等殊唯證相應耳如來法王出世間能然照世妙法燈境界無邊亦無盡此自在名之所證二中初句是上自在佛為法王於法自在故次句觀也第三句普也後句結法屬人為他說故然其結名義同法門恐繁不配他皆倣此佛不思議離分別了相十方無所有為世廣開清淨道如是淨眼能觀見三中初句無功用也不思議是標離分別是釋次句即不生等相即生等無即不義第三句即行也長行約要先知法無生方得成無功用偈則要無分別方能見法無生內證與外用同時所以二文前後如來智慧無邊際一切世間莫能測永滅衆生癡暗心大慧入此深安住四中初句明廣次句明深即上智慧海也第三句自見法實故能令物不迷事理如來功德不思議衆生見者煩惱滅普使世間獲安樂不動自在天能見五中初句方便定也次二句與安樂也衆生癡暗常迷覆如來為說寂靜法是則照世智慧燈妙眼能知此方便六中初句即前癡暗謂長迷妄境鎮覆真心也次句即令觀寂靜次句因滅無明則得熾然三菩提明是前滅義因滅無明則得熾然三菩提明者即涅槃二十一南經十九高貴德王菩薩品因琉璃光菩薩欲來放光佛問文殊文殊初入第一義答云世尊如是光明名為智慧智慧者即是常住常住之法無有因緣云何佛問何因緣故有是光明廣說無因緣竟末後云世尊亦有因緣因滅無明則得熾然阿耨多羅三藐三菩提燈今略義引耳如來清淨妙色身普現十方無有比此身無性無依處善思惟天所觀察七中初二句即善入無邊境無邊境即所應處也無有比善也次句無性者感而應故無依者思念寂故由此能令物不造業如來音聲無限礙堪受化者靡不聞而佛寂然恆不動此樂智天之解脫八中初二句即普往十方說法次一句即不動無依寂靜解脫天人主十方無處不現前光明照耀滿世間此無礙法嚴幢見九中初句即入寂靜境次二句即普現光明佛於無邊大劫海為衆生故求菩提種種神通化一切名稱光天悟斯法十中初十一字即無邊境為所緣求菩提即自所悟處次句既緣其境必起通化前文略耳復次可愛樂法光明幢天王得普觀一切衆生根為說法斷疑解脫門第二明第四禪廣果天長行十法中一普觀等者此應根授法明於不知根說法無果障中得解脫也斷疑生信是說法果故謂觀機識病稱根說法藥病無謬故疑除疾愈淨莊嚴海天王得隨憶念令見佛解脫門二中隨憶念言略有二意一隨念何佛如名應之二隨念有淺深令見佛有粗妙此於現身得解脫也最勝慧光明天王得法性平等無所依莊嚴身解脫門三中法性平等者唯一味也無所依者離能所也莊嚴身者證真莊嚴即非莊嚴故雖現世間還如法性不依諸有此於有依得解脫也自在智慧幢天王得了知一切世間法一念中安立不思議莊嚴海解脫門四中知世間法者謂衆生世間心法各異知已隨宜現通說法故云安立一念速安非人天外道所能思議以此莊嚴如來教海此於安立教法遲鈍障得解脫也樂寂靜天王得於一毛孔現不思議佛剎無障礙解脫門五一毛等者約偈不思議解脫力也無礙有二義一唯就所現則毛中多剎自互無礙二雙就能所一毛不大而多剎不小一多大小皆無礙也又由無大小相故此於取著障得解脫普智眼天王得入普門觀察法界解脫門六普門者一門攝一切門名為普門隨一一門各全𭣣法界故於其中觀察法界深智契達故名為入此於隨相中得解脫樂旋慧天王得為一切衆生種種出現無邊劫常現前解脫門七中衆生無邊根器各異應形說法種種不同既根熟不休故窮劫長現此於畏苦不化生障得解脫善種慧光明天王得觀一切世間境界入不思議法解脫門八中觀一切等者謂觀事入理理超情表云不思議此於諸業報得解脫無垢寂靜光天王得示一切衆生出要法解脫門九中法門無邊出者為要根器萬品故出要難思此於著相得解脫廣大清淨光天王得觀察一切應化衆生令入佛法解脫門十中種種方便但隨所應終成種智名入佛法以大悲出現皆等雨故此於不欲利生得解脫上云出要令離妄苦今云入法令得真樂也爾時可愛樂法光明幢天王承佛威力普觀一切少廣天無量廣天廣果天衆而說頌言頌中觀己衆內三類天者上五淨居非所被故十偈次第一如長行諸佛境界不思議一切衆生莫能測普令其心生信解廣大意樂無窮盡初中前二句即所疑境界境界之言通分齊所觀普令者觀根為說故生信解者斷疑也信佛大用分齊難測故斷佛上疑生其正解信佛所觀之境則斷法上疑亦生正解謂如有疑云為存因果非真空耶為是空故無因果耶今明只由真空能立因果因果立故乃是真空也第四句釋一切之言佛以利生為意樂故既該一切故廣大無盡只由真空能立因果下答上疑念此句明其以有空義故一切法得成若無有空義因果定有便墯於常言因果立故乃是真空者即因緣故空義若離因果以明空者是斷空故若有衆生堪受法佛威神力開導彼令其恆覩佛現前嚴海天王如是見二中初句即憶念次二句令見佛一切法性無所依佛現世間亦如是普於諸有無依處此義勝智能觀察三中初句即法性平等無依次二句即莊嚴身謂如法性為嚴故無依處隨諸衆生心所欲佛神通力皆能現各各差別不思議此智幢王解脫海四中初一句即了一切世間次二句即一念安立不思議莊嚴海過去所有諸國土一毛孔中皆示現此是諸佛大神通愛樂寂靜能宣說五中初二句即毛孔現剎上云不思議佛剎但以橫多今云過去乃豎窮前際皆示現者如鏡現像次一句是無障礙令應度者見即佛神通依佛鏡智而觀乃法性恆爾一切法門無盡海同會一法道場中如是法性佛所說智眼能明此方便六中初二句即普門次一句即法界末句義兼於入十方所有諸國土悉在其中而說法佛身無去亦無來愛樂慧旋之境界七中初二句即為一切衆生種種出現次句即無邊劫常現前謂約機隱顯佛無去來故常現也佛觀諸法如光影入彼甚深幽奧處說諸法性常寂然善種思惟能見此八中初句即觀一切世間也次二句即入不思議法也若約理論深是深非甚今不壞事而即理故曰甚深全攬理以成事名為幽奧處兼上二法常寂然釋上義也以諸法即寂故不可以理事思也佛善了知諸境界隨衆生根雨法雨為啓難思出要門此寂靜天能悟入九中初二句示一切衆生次一句顯出要法世尊恆以大慈悲利益衆生而出現等雨法雨充其器清淨光天能演說十中初二句即觀應化衆生次句令入佛法復次清淨慧名稱天王得了達一切衆生解脫道方便解脫門第三明三禪長行十法第一門即寂普現名為方便說即是道由說入佛解脫海故此於體用有礙得解脫也又方便言亦通入解脫之方便也最勝見天王得隨一切諸天衆所樂如光影普示現解脫門第二門隨一切等者謂不能普現得解脫也光影之言略有二釋一謂因光發影影但似質而不似光依智現形形隨衆樂不隨自智隨樂即應名普示現二水中之月亦名光影謂佛月不來影現心水影多似月少似於水謂水動則流光蕩漾水濁則似晦魄臨池若止而且清則圓璧皎皎此亦隨自他意也此就天王且隨天衆所樂偈就於佛無不應也光影之言略有二者賢首更有一義今不存之故云略也彼釋云謂如明淨物得日光曜於屋壁上有光影現如來應機現身亦爾然有多義一緣集義謂大智明淨悲願日照於衆生陰室之內現於佛影二速疾義無遠不至故三無礙義不可執持故四有用義能破暗故五無生義無所有故廣如十忍品說此義似有穿鑿故略不存今疏所明二影者然攝論影略有三一眏質影二水月影三鏡像影廣如十忍品今是前二今云光影故略鏡像正是初義謂日喻如來身樹等形質以喻衆生日無異體質有萬差樹側影斜形端影正影不現於日內但在質邊弄影多端隨心萬品二水月影以月有光亦名光影影多似月者如月圓故少似水者隨動靜故寂靜德天王得普嚴淨一切佛境界大方便解脫門第三門佛境界有二一如如法性是佛證境二十方國土是佛化境嚴淨亦二離相息妄則嚴如境萬行回向則嚴化境此二無礙大方便也此於無巧莊嚴得解脫也須彌音天王得隨諸衆生永流轉生死海解脫門第四隨諸等者謂大悲深厚故隨入生死衆生無邊故永流轉而示導也此於無大悲捨衆生障得解脫也淨念眼天王得憶念如來調伏衆生行解脫門第五門佛調衆生或折或攝或兼二行雖悲願多門皆令趣無上道若憶念此居然受化不滯於權此於勝所緣有忘念障得解脫或折攝等者勝鬘云應攝受者而攝受之應折伏者而折伏之攝受折伏則正法久住可愛樂普照天王得普門陀羅尼海所流出解脫門第六得普門等者佛以稱法性之總持包攝一切總持故云普門復能流演無盡故得稱海此於聞思有忘失障得解脫也世間自在主天王得能令衆生值佛生信藏解脫門第七門謂佛出難值引之令值信心難生勸之令生信含衆德所以名藏下經云信為寶藏第一財故此於嫉妬邪見障得解脫也光𦦨自在天王得能令一切衆生聞法信喜而出離解脫門第八能令等者上令信佛此令信法仰依即信領解便喜信可趣入喜則奉行因得解脫名而出離此於迷覆衆生障出離道得解脫樂思惟法變化天王得入一切菩薩調伏行如虛空無邊無盡解脫門第九門謂衆生界法界調伏界虛空界皆無邊無盡菩薩悲智以方便界開示法界行調伏界等虛空界於有限礙障中得解脫故謂衆生界等者瑜伽有五無量界此前列四後言以方便界者即調伏方便界故五具矣變化幢天王得觀衆生無量煩惱普悲智解脫門第十觀衆生等者由悲故憐愍由智故觀察觀察煩惱知病行已化而度之此於無悲無方便障得解脫也星宿音妙莊嚴天王得放光現佛三輪攝化解脫門依藏補爾時清淨慧名稱天王承佛威力普觀一切少淨天無量淨天遍淨天衆而說頌言頌中十一頌初十次第如前長行依梵本列名中此長行闕第十一天彼名星宿音妙莊嚴天王下言妙音者略而未回了知法性無礙者普現十方無量剎說佛境界不思議令衆同歸解脫海第一頌中初二句是了達方便依法性而現故後二句說即是道說不思議解脫令衆同歸如來處世無所依譬如光影現衆國法性究竟無生起此勝見王所入門二中初二句明光影普現無依故如影第三句成上二義以無生故如影無依略不明隨天所樂無量劫海修方便普淨十方諸國土法界如如常不動寂靜德天之所悟三中初句標方便無量劫修兼顯大義次二句正明方便嚴佛境界衆生愚癡所覆障盲暗恆居生死中如來示以清淨道此須彌音之解脫四中初二句即衆生永流轉謂無明所盲覆本淨心造業受身故恆居生死次句即隨而示之諸佛所行無上道一切衆生莫能測示以種種方便門淨眼諦觀能悉了五中總相頌佛調生行初句高次句深後句廣如來恆以總持門譬如剎海微塵數示教衆生遍一切普照天王此能入六中初二句即普門陀羅尼次一句即所流出示教者示其善惡教使修行稱性無偏故遍而無盡如來出世甚難值無量劫海時一遇能令衆生生信解此自在天之所得七中初二句值佛次句生信藏不信則佛難值正信唯佛能生既值佛生信反覆相成今之一遇何得不信佛說法性皆無性甚深廣大不思議普使衆生生淨信光焰天王能善了八中初二句即所聞之法以無性為法之真性次句即令衆生信喜出離淨則出不信濁成無漏故三世如來功德滿化衆生界不思議於彼思惟生慶悅如是樂法能開演九中初句能調伏人前因此果耳化衆生界即調伏行無邊無盡為不思議思惟悅生是名為入衆生沒在煩惱海愚癡見濁甚可怖大師哀愍令永離此化幢王所觀境十中初二句即衆生無量煩惱謂利鈍二使愛見羅剎皆甚可怖也次一句以悲愍之以智令離愛見羅剎甚可怖畏者即涅槃第十一已如前引如來恆放大光明一一光中無量佛各各現化衆生事此妙音天所入門十一中既闕長行對名略顯初二句星宿莊嚴義也謂佛光流於法界粲若星羅次句即妙音莊嚴化衆生事不出三輪上云妙音舉一立稱耳若長行立名應云得放光現佛三輪攝化解脫門復次可愛樂光明天王得恆受寂靜樂而能降現消滅世間苦解脫門第四二禪長行十法初中二義一內證真樂經論共說樂有五種謂一因二果三苦對除四斷受五無惱害無惱害樂更有四種謂出家遠離樂禪定適悅樂菩提覺法樂涅槃寂靜樂今當第四若通取受字兼禪定菩提則含因果言恆受者以無所受受諸受故若待境界即非恆也二而能降下外建大義降神現相除苦因果此於涅槃體用障得解脫也經論共說樂有五種等者論即瑜伽等經即善戒經第二自利利他品經云云何名快樂快樂義者有五種一者因樂二者受樂三者斷受樂四者遠離樂五者菩提樂云何因樂因內外觸因觸因緣故有受樂是名因樂因行善法得他世樂是名因樂云何受樂從因因緣身得增長心得安隱是名受樂受樂者有二種何等為二一者有漏二者無漏無漏有二一者學地二者無學有漏有三欲界色界無色界三有有內外入故有六觸六觸有二一者身樂二者心樂五識共行名為身樂意識共行名為心樂修習聖道斷諸受故道得增長無有諸受名斷受樂永斷煩惱身心無患名遠離樂受常樂故名菩提樂或有說言無想定者名為斷樂是義不然何以故不斷受樂故遠離樂者有四種一者出家樂二者寂靜樂三者斷樂四者菩提樂世間之人多有憂苦永斷是苦名出家樂斷欲界貪名寂靜樂永斷煩惱名為斷樂受常樂故名菩提樂菩薩常能施衆生樂名菩提樂菩薩摩訶薩自受常樂轉施衆生名菩提樂何故名為因樂是樂因故名為因樂不名受樂受樂者不名因樂名為性樂斷樂者不名因樂不名受樂以斷多樂故名為斷樂遠離樂者不名因樂不名受樂不名斷樂以觀生死衆過患故名智慧樂菩提樂者不名因樂不名受樂不名斷樂不名遠離樂無邊常故名菩提樂名無勝樂名無邊樂名無上樂亦名常樂名寂靜樂菩薩摩訶薩能以如是五種之樂施於衆生是名因樂義今疏望彼經數名不同若欲會者果及苦對除即是受樂開出無惱害者即遠離樂及菩提樂經中遠離有四今云出家遠離樂含其二種出家即第一遠離兼得第三斷樂復開菩提為菩提涅槃二樂若瑜伽九十六說樂有二種一者欲樂二者遠離遠離復有三種一劣謂無所有已下二中謂第一有三勝謂滅受定然世尊依第一義說有三種最寂靜樂謂等解脫故總攝為三一應遠離二應修習即前三上中下遠離名有上遠離三最極究竟解脫無上住樂即前貪等解清淨妙光天王得大悲心相應海一切衆生喜樂藏解脫門第二門謂無緣大悲與性海相應拔世憂患故出生喜樂無盡名藏此於惱害心得解脫自在音天王得一念中普現無邊劫一切衆生福德力解脫門三一念等者修福德因感依正果福之力也雖多人多劫所感念劫融之䪺現此於時劫得解脫也最勝念智天王得普使成住壞一切世間皆悉如虛空清淨解脫門第四門謂以佛力不動成住壞三皆如空劫常清淨也此於遷變得解脫也可愛樂淨妙音天王得愛樂信受一切聖人法解脫門五愛樂等者謂信樂佛菩薩法敬奉修行則二障得解脫也善思惟音天王得能經劫住演說一切地義及方便解脫門第六門地謂地智義謂清淨即離念超心地也方便者教導及入地之由入住出等也以無盡辨演無盡法故能經劫演莊嚴音天王得一切菩薩從兜率天宮沒下生時大供養方便解脫門七一切等者通有二義一現多身興多供供多佛皆稱真故名大方便即長行意二一念八相遍法界故名大方便即偈中意於上自在名為解脫甚深光音天王得觀察無盡神通智慧海解脫門八於定慧障得解脫廣大名稱天王得一切佛功德海滿足出現世間方便力解脫門九果滿應機是於現身化生無堪任性得解脫最勝淨光天王得如來往昔誓願力發生深信愛樂藏解脫門十見佛大願雲愛樂隨學此於自輕障得解脫爾時可愛樂光明天王承佛威力普觀一切少光天無量光天極光天衆而說頌言二頌中十偈次第依前我念如來昔所行承事供養無邊佛如本信心清淨業以佛威神今悉見今初前三句明寂靜樂通舉因樂以顯果樂後句降現之用佛身無相離衆垢恆住慈悲哀憫地世間憂患悉使除此是妙光之解脫二中初句即所相應海次句即能應大悲大悲荷物故名為地次句即生喜藏憂除故喜患除故樂佛法廣大無涯際一切剎海於中現如其成壞各不同自在音天解脫力三中初句能現次句所現佛神通力無與等普現十方廣大剎悉令嚴淨常現前勝念解脫之方便四中初二句即普使成住等次一句頌如虛空清淨以三災彌綸而淨土不毀故然三四二偈似如前却且順文釋耳如諸剎海微塵數所有如來咸敬奉聞法離染不唐捐此妙音天法門用五中初二句咸敬奉是愛樂餘是聖人次一句即上法及信受也佛於無量大劫海說地方便無倫匹所說無邊無有窮善思音天知此義六中初句經劫住次二句即地義方便無邊是一切也如來神變無量門一念現於一切處降神成道大方便此莊嚴音之解脫七中通頌八相普周略無供養威力所持能演說及現諸佛神通事隨其根欲悉令淨此光音天解脫門八中初句是前智慧次句神通次句無盡及海以隨根令淨是深廣故如來智慧無邊際世中無等無所著慈心應物普現前廣大名天悟斯道九中初二句即德海滿足次句出現世間佛昔修習菩提行供養十方一切佛一一佛所發誓心最勝光聞大歡喜十中三句通明前昔誓願力第四句結中便顯深信愛樂藏以文云大歡喜故音釋嗢烏沒切奧於到切深也蕩漾蕩徒浪切漾餘亮切蕩漾浮遊貌盲暗盲眉庚切目無童子也唐捐捐余專切唐捐謂徒棄也
