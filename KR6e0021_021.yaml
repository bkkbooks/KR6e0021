body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述普賢三昧品第三將釋此品四門同前初來意者前衆既集光示法主今將説法是故法主入定受加為近方便故次來也二釋名者普賢明説法主以説普法故三昧是業用以非證不宣故此則人法合舉普賢之三昧亦此三昧是普賢所有又三昧境界名為普賢一切如來藏身為普賢故此則普賢即三昧揀餘定也若準梵本普賢三昧威德神變品威德神變皆定之用攝用從體但云三昧也縱佛加光讚皆因定故餘會入定受加起定即説同為一品今此開者文多義廣勸修學故言義廣者建立普賢之行願故故此比餘粗相而説四同六異言四同者入住加出言六異者一數異餘會入起唯一此會入起俱多故二者類異類餘方故三利益異定起多人益故四光讚異如來毛孔光明讚故五衆請異從定起已待衆請故六證相異餘會經終方有證相此品益已即便地動雨雲等故四五二種十地雖有而不具六今此具六故別立品以此説果餘皆因故又為諸會本故總故七八九會雖是果定説通因果又非總故縱佛加下二解妨難總有二難一義廣名局難難云文中具有佛加光讚何以偏名三昧釋意可知餘會下通第二違例開品難難云諸會之中皆入定等在於本品今何開耶故疏牒此以答答文有二一釋餘不開所由四五二種下展轉生難云光讚衆請十地亦有何名六異彼何不開今此別開答意可知七八下通躡迹難難云若説果法別立此品七八九會亦説果法何不立耶答意云彼唯有一而無有二義故三宗趣者入法界定法界佛加為宗令法界衆成法界德為趣望於後品亦説世界海為趣爾時普賢菩薩摩訶薩於如來前坐蓮華藏師子之座承佛神力入于三昧四釋文者文有六分一三昧分二加持分三起定分四作證分五毛光讚德分六大衆偈請分初中有二一明此界入定二類通十方就初分三一承力入定二彰定名字三明定體用今初有六一時説偈竟時二主顯佛普德唯普賢故三處依如來者常對佛故四所依座大集云菩薩得蓮華陀羅尼故説法處皆有蓮華表所入三昧自性無染含果法故五所依因謂所入深廣要承力故六正入三昧心境冥故此三昧名一切諸佛毗盧遮那如來藏身二此三昧下彰定名字毗盧遮那前已廣釋復有釋言廣大生息具此三義名如來藏身身即體也依也此有二種一者修成二者本性本性者凡聖俱成修成者唯諸佛有諸佛有者慈悲無邊故名為廣智慧無上故稱為大生相已盡故云生息涅槃云離有常住故名如來萬德含攝是謂藏身即是出纏之法身也言本性者謂即藏識包含種子建立趣生故名為廣本覺現量與佛等故名之為大新新生故名之為生染淨苦樂所不能動故名為息即上法身在纏名藏謂空不空空為能藏藏不空故復有釋下先總釋中毗廣大也盧遮生也那者息也即安國意諸佛下初釋修成三義即是三德謂恩智斷言生相盡者即起信意彼有三細謂業轉現總名生相在賴耶識今言盡者論云菩薩地盡覺心初起心無初相以遠離微細念故得見心性心即常住名究竟覺釋曰遠離細念即生相盡也故次引涅槃離有常住釋如來義即第四經離有即生息也常住之義同上起信言本性下釋本性本覺現量者本覺即是所證本性唯真現量方能證故與佛等者起信論云所言覺義者謂心體離念離念相者等虛空界無所不遍即是如來平等法身説名本覺故以等佛而釋大也新新生者釋生息義雖別名二字竟取即生而息上約本淨今約隨染言染淨苦樂所不能動者上約隨緣此明不變又上約生滅此約真如故約生滅隨緣常生約真如不變常息即上法身下別釋藏字兼釋如來非報身也謂空不空摽二藏名起信論云復次真如依言説分別有二種義一者如實空以能究竟顯實故二者如實不空以有自體具足無漏性功德故釋曰上即雙標空為能藏者即次論意論云所言空者從本已來一切染法不相應故謂離一切法差別之相以無虛妄心念故當知真如自性非有相非無相非非有相非非無相非有無俱相非一相非異相非非一相非非異相非一異俱相乃至總説一切衆生以有妄心念念分別皆不相應故説為空若離妄心實無可空故所言不空者以顯法體空無妄故即是真心常恆不變清淨滿足則名不空亦無有相可取以離念境界唯證相應故釋曰上引論文即雙釋二藏而疏引意釋於空藏不空意猶難見此有二義一者據論標中本意自性清淨心不與妄合則名為空性具萬德即名不空及至釋文乃云若離妄心實無可空即顯空藏因妄而顯而不空藏要由翻染方顯不空故云以顯法體空無妄故即是真心等如本有檀德今為慳貪本有尸德今隨五欲本有忍德今為嗔恚本有進德今為懈怠本有寂定今為亂想本有大智今為愚癡藏於慧是故論云以知法性無慳貪故隨順修行檀波羅蜜等萬行例然故下論釋本有真實識知義云若心有動非真識知明妄心之動藏其真知是以即妄之空藏不空之萬德故經云知妄本自真見佛則清淨故上論云以能究竟顯實故名為空故知空藏能藏不空能藏既空則顯不空之藏本來具矣二者自性心上無妄為空隨所無者即不空德如空無慳吝即顯有檀空無妄動顯有性空故是空藏藏不空也若以光明遍照解毗盧遮那毗盧遮那即是能觀大智如來藏身即所觀深理凡雖理有佛智方照又毗盧遮那亦通本有本有真實識知遍照法界義故斯即本覺迷而不知不得其用唯佛覺此能無不為故云一切諸佛揀非凡也亦非因也若以光明下二約光明遍照釋猶有二意一以毗盧遮那為能證即是修成如來藏身以為本有是故結云凡雖本有佛智方證又二毗盧下以毗盧遮那以為所證則以如來而為能證本有真實識知義者即是起信生滅相大中文論云若心起見則有不見之相以心性離見即是遍照法界義故若心有動非真實識知意云若無動念即真識知既云即是遍照則毗盧遮那亦本有矣顯於依正離如來藏無別自體故入此也賢首釋云諸佛遍於一切即顯諸佛無不周遍法界剎海及彼塵中所有諸剎諸剎塵中復有諸剎如是重重不可窮盡言如來藏身者明即此遍剎之身包容所遍法界剎海無不皆在如來身中故名藏身是故融通總有四句一身遍剎海二剎在身中三身遍身內剎四剎入遍剎身即內即外依正混融無礙無障是此三昧所作故以為名將説此法故入茲定賢首云下三敘昔異同意以身包剎海塵容法身得藏身名但是下文用中一義攝義不周不為正釋順經宗意故存而不論普入一切佛平等性能於法界示衆影像三普入下明體相用此是定相無量無邊皆悉依於如來藏説略舉其要句有十三門乃有十以後二門收五句故攝為六對後之二門各一對故文有四節義唯有三至下當明言六對者初二句明體用一對謂無分別智證平等性以為定體影現法界為勝用也謂以因因性證彼因性成彼果性顯果果性如是佛性則具七義一真二實三善四常五樂六我七者清淨生佛之性本末不殊況佛果果豈不平等佛平等性即如來藏是故但入如來藏身即是已入佛平等性此為第一契合佛性門也因因等者即涅槃二十七師子吼菩薩品云佛性有因有因因有果有果果因者十二因緣因因者即是智慧發心已去果者即阿耨多羅三藐三菩提果果者無上大涅槃今疏文意因因即觀緣之智通發心已去因即所證之理能證至果為大菩提所證至果名大涅槃前二是因後二是果而有重因重果言者謂十二因緣是正因性雖有此性若無觀智不能成果今由觀智令彼成果即與因作因故名因因菩提對前已名為果而大涅槃由菩提顯故此涅槃即是菩提果家之果故彼經喻云如無明為因諸行為果行緣識果則無明亦因則因因識亦果亦果果舉此無明為因因則在行前行如十二因緣無明如觀智則觀智在於十二因緣前而遠公云十二因緣近起觀智遠為涅槃正因故名為因方依前因以起觀智依因起因故名因因者則因因在於十二緣後理則可矣而不順喻無明因因在於行前耳然上四句之後經中復有四句云一是因非果如佛性二是果非因如大涅槃三是因是果如十二因緣所生之法四非因非果名為佛性此之四句三即是前二三兩句智慧菩提皆依十二因緣生故初及第四皆前中初一以十二緣約相是因若約緣性即非因果是中道正性法身理也二即第四而菩提望前是果望後是因故言亦因亦果涅槃之後更無所顯故唯是果又第四句非前四句總為四句之體就緣成四與此為因名為因性與此為果名為果性猶如真如出煩惱障名為涅槃出所知障名為菩提而體無二隨出得名佛性亦爾因等四句皆望緣取而佛性體體絶四句俱非因果四句已亡思之若總合上二種四句成五佛性復成四句一或有佛性闡提人有善根人無是前因性之中一分之義以未成佛時善惡無記皆名佛性亦取其惡故云一分闡提有也二或有佛性善根人有闡提人無即因因性三或有佛性二人俱有即因性中通十二緣亦非因非果之性四或有佛性二人俱無即彼果性及果果性對前兩重四句可以意得十二因緣名佛性者一當體淨故是法身性二能知名義成反流故名報身性又前滅後生非斷非常顯中道故故初四句後經云善男子以是義故十二因緣不生不滅不常不斷非一非二不來不去非因非果又三雜染即三德故翻煩惱雜染以成般若翻業雜染以成解脫翻苦雜染以成法身當相即是性淨三德觀之則是觀行三德證之則是圓滿三德又初因性即染淨緣起二因因性即內熏發心三果性即始覺已圓四果果性即本覺已顯又初隨染隱顯二微起淨用三染盡淨圓四還源顯實又初與四俱是理性但染淨分二二之與三俱是行性但因果有殊又初染而非淨二淨而非染三亦淨亦染四非染非淨又初自性佛性二是引出佛性三四皆是至得果性又初二因中理智後二果中理智因果雖異理智不殊理智似分冥契無二唯一心轉絶相離言無不包融故名佛性由此名為佛性契合門也如是佛性下即涅槃三十五經云善男子如來十力四無所畏乃至如是等法是佛佛性如是佛性則具七事一常二樂三我四淨五真六實七善今但義引故小不次澤州云四不遷名常六自在名我五安隱名樂七無染名淨一離妄是真二不空顯實三體順成善後明菩薩性有六種於前七中略無我樂加一少分見以其未得八自在我故無我德未得大涅槃無真實樂德未見自身佛性故加少分見生佛之性下釋平等義言佛平等性即如來藏下會別歸總此為第一下結十門之一言勝用者即示衆影像門謂能現能生身土智影也言勝用下即釋經能於法界示衆影像是第二門言能現能生者即唯識論釋大圓鏡智之文謂三身三土三智之影皆是鏡智之所現故如前已引廣大無礙同於虛空法界海漩靡不隨入次二深廣一對廣者無邊不在內外故大者無上究竟實際故無礙者無所障故同於虛空成上三義通為廣大無礙門後句即入法海漩澓門漩即深也出生一切諸三昧法普能包納十方法界三有二句出納一對初出生三昧門謂若自相若共相等一切三昧皆從此生此為諸定本故後攝受法界門終歸此故法界體性故謂若自相等者謂觀色等六塵入正定故名為自相若觀無常空等入定則名共相並皆不離如來藏性性即真如故起信云真如三昧是諸三昧之根本上釋出生一切諸三昧法後攝受下即釋普能包納十方法界終歸此者約事法界法界體性約理法界三世諸佛智光明海智從此生十方所有諸安立海悉能示現四有二句境智一對初句能成佛智門謂不體此理非佛智故後示現諸境門然安立言總有三種一者世界安立依報二者聖教安立妙義三者觀智安立諦相皆法界藏顯示現前四有二句前句即三世諸佛智光明海皆從此生言不體此理下體謂體達若能證入藏身之性即名佛智正用起信始覺同本名究竟覺故生公立體理成照義云理不待照而自了智必資理而成照故知理無廢興弘之由人智雖人用不在人出矣故人有照分功由理發失理則失照故要見此理方成佛耳後句示現者釋經十方所有諸安立海悉能示現上攝受法界即言終歸此故今此即言此能現者文影略耳皆自此生皆歸此故故知萬物依地而生終歸於地含藏一切佛力解脫諸菩薩智能令一切國土微塵普能容受無邊法界五有二句即依正含容門為內外含容對謂內含因果智力外令塵容法界由塵全依法界藏現同真性故五有二句即依正含容門二句共成一門一門便成一對內含因果智力釋經含藏一切佛力解脫諸菩薩智外令塵下釋經能令一切國土微塵悉能容受無邊法界釋云由塵全依法界藏現即是事塵頓變萬境故言同真性者約理法界成就一切佛功德海顯示如來諸大願海一切諸佛所有法輪流通護持使無斷絶六有三句即成就攝持門為成持人法對謂初成果人功德大願後持法輪令不斷絶由斯玄理法眼常全故六有三句成一門一門分二一對前二句成人即經云成就一切佛功德海二顯示如來諸大願海是故疏云初成果人功德大願即二句也後持法輪即是持法釋經一切諸佛所有法輪流通護持使無斷絶由斯玄理下法眼長全無減即第十四經由真理湛然故悟亦冥符理既無虧法眼常全矣上言四節者初四句明無幽不入釋上毗盧遮那遍照之義次四句無德不生釋上一切諸佛之義次二句內外含容釋上藏義後三句成德持法釋上身義上言四節下第三結束稱讚言次四句者即出生一切下言二句者即含藏下言後三句者即成一切下三義皆是結束此三圓融稱讚也言義唯有三者入平等性是定體也廣大同空是定相也餘皆定用此三圓融總為無礙普賢三昧如此世界中普賢菩薩於世尊前入此三昧二如此下類通十方及諸塵道於中有二初舉此如是盡法界虛空界十方三世微細無礙廣大光明佛眼所見佛力能到佛身所現一切國土後如是下類彼中二初明平遍法界後明重疊無盡前中十一句初一總明謂盡窮法界後十別指以彰曲盡一盡虛空界二於空中盡十方處三於十方中遍三世時四於三世中微細物處謂毛端等五凡諸小隟無礙之處六或廣大百千由旬等處七人天日月光明等處八盡佛眼見處九盡神力到處十佛身能現之處此第十句有二義一者結上國土之言通十一𫨻二者成下以是身內之剎為微細故第十句有二義者昔人唯有後義則是佛身中塵有諸佛剎遂令普賢不遍如來身外剎也及此國土所有微塵一一塵中有世界海微塵數佛剎一一剎中有世界海微塵數諸佛一一佛前有世界海微塵數普賢菩薩皆亦入此一切諸佛毗盧遮那如來藏身三昧二及此下重疊遍中略有四重一盡法界塵言及此國土者指前十處之國也二塵中多剎三剎中多佛四一一佛前有多普賢此國指前十處之國者即前第十句中初義謂及盡法界國土中盡虛空國土盡三世國土等其第十義身中國土以文近故疏不指於上諸處皆入此定故普賢身不分普遍粗細深廣平滿重疊於上諸處下總結能遍上之四重但所遍故於中三初正結遍身此處入定類通既然法界入定類通亦爾二此處下類通故約主定佛前唯一普賢一切一故若就類通佛前各有塵數一一切故三故約主定下解妨謂難云別明入定佛前唯一普賢今此結通何以一一佛前各有多耶疏含二義一約主伴二明即入初主伴中謂為主須一為伴必多難云此中普賢應不為伴應答云若為伴時亦得有多二者即由上義故此一是即多之一故疏云一切之一故彼類通中多是全一之多故疏云一一切故前是舉一結多此是即一即多前是通辨緣起相由今明力用交徹一有一切等故普賢身不可思議略有三類一隨類身隨人天等見不同故二漸勝身乘六牙象等相莊嚴故三窮盡法界身帝網重重無有盡故今當第三含有前二所由有三等爾時一一普賢菩薩皆有十方一切諸佛而現其前第二爾時一一下加分有三初口加次意加後身加初中有四一諸佛現前以此口加後無結通故此總舉重重時處一一普賢前也彼諸如來同聲讚言善哉善哉善男子汝能入此一切諸佛毗盧遮那如來藏身菩薩三昧二彼諸下讚其得定此雖果定菩薩門入故云菩薩三昧佛子此是十方一切諸佛共加於汝以毗盧遮那如來本願力故亦以汝修一切諸佛行願力故三佛子下明得定所由所由有三一伴佛同加佛佛道同故二主佛本願此二為緣三自修行願是入定因疏文有三初當句釋又上三義前前由於後後二又上三義下展轉釋謂由自有行願方得主佛願加由主佛願方得伴佛同加故云前前由於後後餘豈無斯行耶法門主故表説普法故三餘豈無下通難難言一切菩薩皆修行願何故不加法門主下疏答答中二意一約教相二表説下約表法説如金剛藏表地智等所謂能轉一切佛法輪故開顯一切如來智慧海故普照十方諸安立海悉無餘故令一切衆生淨治雜染得清淨故普攝一切諸大國土無所著故深入一切諸佛境界無障礙故普示一切佛功德故能入一切諸法實相增智慧故觀察一切諸法門故了知一切衆生根故能持一切諸佛如來教文海故四所謂下辨加所為此文二勢一辨加所為二顯上行願之相故云所謂也所為謂何為轉法輪故有十一句初總餘別別中初一總攝十智餘九即是十海一即安立海二即衆生及業海三即世界海四即佛海五即名號壽量及解脫海變化大用皆功德故六即波羅蜜海到實相岸故七即轉法輪海八即根海九即演説海與下十智令知此十餘九即是十海者就十海名二處具出影帶鉤鎖文該五處言二處者一現相品衆海問中十海二成就品初摽章答中十海然文小異開合不次問中十者一世界海二衆生海三長行闕中即有謂世界安立海四諸佛海五波羅蜜海六解脫海七變化海八佛演説海九佛名號海十佛壽量海二成就品初答中十者世界海衆生海一切諸佛海一切法界海一切衆生業海一切根欲海一切佛轉法輪海一切三世海一切如來願力海一切如來神變海若將此十對現相品者此中一二名次俱同三即問中第四四即彼三五六帶第二衆生海中開出亦可第六根海通下諸海須知根故至成就品當更會之七是前第八演説及第五波羅蜜海是所演故八即第六解脫九即前九十二海謂名號壽量皆由願力而得成故十即前變化海上言此者此成就品言文該五處者二處如前三即此所為中是為十海故四者即下意加與智即十海智故五世界成就品答中稱歎十智即是知此十海之智正是此中諸佛所與十智也此上五處三處是海二處是智其所為中雖無海言而是海義然其五處決定相承謂由問十海故加所為中為於十海佛與十智令知十海普賢得智將欲説之故觀察十海智海難思唯佛智能知故稱讚十智亦是讚所得之智方能遂佛所為答前問也而其五處開合廣略者顯義無方故文似譯人不相對會故今疏文並為會釋使前後無違下成就品更委會釋今此所為中十句正對問中十海有三兩海兼下答名以文同故謂一即問中第三安立海二即問中第二海言業者問中所無即兼下名答中開出然有衆生必有於業以此經中有淨治雜染得清淨言故疏加之及業海也三同問中第一四同問中第四五中攝前四海謂九名號海十壽量海六解脫海七變化海以其上四皆佛隨機之大用故故云一切佛功德也六即問中第五其七九二海皆是問中第八答中但有轉法輪海而無演説問中但有演説而無法輪今此所為及與歎智並開成二八亦問中第二衆生開出然上九句七九合成問中一演説海八復合歸第二故此九句唯有於七而第五佛功德中獨有其四兼七中餘六故十海具矣與下十智者上來正釋經文今對後生起如前已説爾時十方一切諸佛即與普賢菩薩摩訶薩能入一切智性力智與入法界無邊量智與成就一切佛境界智與知一切世界海成壞智與知一切衆生界廣大智與住諸佛甚深解脫無差別諸三昧智與入一切菩薩諸根海智與知一切衆生語言海轉法輪詞辨智與普入法界一切世界海身智與得一切佛音聲智二爾時下明意加於中有二先加後釋前中亦二先此土後類通前中與十種智初一總謂與果海之智而言與者佛力灌注令增長故一切智性即果海也智性即力無傾動故具十力故末後智字即能入也餘九為別即是成就品中十智由與此智故後能説彼智觀彼十海而文少不次一即第三法界安立海智安立無邊量故二即第四佛海佛海唯佛分齊之境三即第一四即第二衆生業海業因微細故云廣大五含二句一即第八佛神變海解脫作用即是神變神變依定加三昧言二含三世智下文一念知三世由佛不思議解脫力故由加總句故合此二六即第五七即第九八即第七願海以願力故入法界中一切世界九即第十建立演説二意加中二別別對釋欲對下智須知十智名字次第彼云諸佛子諸佛世尊知一切世界海成壞清淨智不可思議知一切衆生業海智不可思議下略不可思議而加次第三知一切法界安立海智四知説一切無邊佛海智五入一切欲解根海智六一念普知一切三世智七顯示一切如來無量願海智八示現一切佛神變海智九轉法輪智十建立演説海不可思議經脫智字然疏中易者則但對次第難者已為會釋並可知也又菩薩根更有多義修十善道有三善根修諸地度精進為根攝受正法信慧為根攝養衆生慈悲為根為成佛道悲智為根種種差別皆善知故如此世界中如來前普賢菩薩蒙諸佛與如是智如是一切世界海及彼世界海一一塵中所有普賢悉亦如是二如此下類通可知何以故證彼三昧法如是故第二何以故下釋所因中二先徵意云諸佛有力能與有慈能普何以十智偏加普賢釋云普賢得此三昧法爾應與是時十方諸佛各舒右手摩普賢菩薩頂三是時下身加中亦二初此土後如此下類通前中復二先佛手摩頂明加被攝受又準梵本明十方佛身皆不來此舒臂不必長而同時摩頂各全觸頂互不相礙皆是如來自在業用其手皆以相好莊嚴妙網光舒香流焰發二其手下辨手相用於中十句以顯無盡前五德相圓備謂傭纖直等故云相好莊嚴謂傭圓者傭纖之言言兼相好案大般若三十二相中第九雙臂修直傭圓如象王鼻斯則傭直是相手連臂故纖者三十二中云五世尊手足所有諸指圓滿纖長甚可愛樂言兼好者八十好中手足指為二十以一指為一好謂十指端皆圓纖可喜故而言等者即妙網光舒此言顯故三十二中云四世尊手足二指中間猶如鵝王咸有網鞔金色交絡文同𦂶畫即是相也略舉此五廣如十身相海品復出諸佛種種妙音及以自在神通之事過現未來一切菩薩普賢願海一切如來清淨法輪及三世佛所有影像皆於中現後復出下五句明妙用自在意明此手亘十方而包三世收因果而該人法深廣體用無邊自在非言能説也亘十方者一切諸言即橫亘十方也過現未來即三世也菩薩因也諸佛果也上二皆人法輪法也頓具為深橫該為廣相好即體出生等用皆悉圓融名無邊自在謂即橫即竪即人即法等如此世界中普賢菩薩為十方佛所共摩頂如是一切世界海及彼世界海一一塵中所有普賢悉亦如是為十方佛之所摩頂後結通可知音釋𧇊驅為切也隟乞逆切與隙同𦉑隙也傭丑凶切圎直也鞔莫官切
