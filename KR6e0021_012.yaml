body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述爾時大速疾力迦樓羅王承佛威力普觀一切迦樓羅衆而說頌言頌文如次配釋可知佛眼廣大無邊際普見十方諸國土其中衆生不可量現大神通悉調伏佛神通力無所礙遍坐十方覺樹下演法如雲悉充滿寶髻聽聞心不逆佛於往昔修諸行普淨廣大波羅蜜供養一切諸如來此速疾王深信解如來一一毛孔中一念普現無邊行如是難思佛境界不退莊嚴悉明覩佛行廣大不思議一切衆生莫能測導師功德智慧海此執持王所行處但第五偈或有前脫故略釋之初二句甚深廣大次句福智相嚴行通因果因深果遠已不思議復有一行是如來行所謂大乘大般涅槃則行為果果皆絶言道佛行如出現品復有一行是如來行即涅槃第十一至下當引如來無量智慧光能滅衆生癡惑網一切世間咸救護此是堅法所持說法城廣大不可窮其門種種無數量如來處世大開闡此妙冠髻能明入一切諸佛一法身真如平等無分別佛以此力常安住普捷現王斯具演佛昔諸有攝衆生普放光明遍世間種種方便示調伏此勝法門觀海悟佛觀一切諸國土悉依業海而安住普雨法雨於其中龍音解脫能如是復次羅睺阿修羅王得現為大會尊勝主解脫門第八阿修羅王十法一修羅尊勝等須彌之高如來威光蔽十方大衆衆生各見真勝主也毗摩質多羅阿修羅王得示現無量劫解脫門二彼能以一𮈔作種種事今一剎那現於多劫調生等事巧幻術阿修羅王得消滅一切衆生苦令清淨解脫門三以多法門入佛境界則苦滅心淨種種法門亦如幻也下云苫末羅即巧幻梵音大眷屬阿修羅王得修一切苦行自莊嚴解脫門四多劫多苦為物非己如尸毗救鴿薩埵投崖已是丈夫最勝嚴飾况終剋寂智萬德以嚴翻顯無利勤苦誠為可醜既為物而行故有大眷屬如尸毗王代鴿即智論第五及報恩經皆本師本行如常所知婆稚阿修羅王得震動十方無邊境界解脫門五以大幻通力動剎悟機不怖衆生斯為大力大力婆稚華梵異耳遍照阿修羅王得種種方便安立一切衆生解脫門六開種種權門安衆生於一極之樂權為入大之本故皆佛智因權實不迷斯為遍照堅固行妙莊嚴阿修羅王得普集不可壞善根淨諸染著解脫門七萬善順理普不可壞斯解脫處何染不亡功歸正覺故偈云佛力如是修者堅固妙嚴廣大因慧阿修羅王得大悲力無疑惑主解脫門八悲用智故普令無疑主斯事者廣大因慧現勝德阿修羅王得普令見佛承事供養修諸善根解脫門九供事修善有勝德故善因阿修羅王得普入一切趣決定平等行解脫門十普入諸趣明處無不遍偈云三世時無不均同有佛性名為決定具上三義平等行焉不宣實義非善音也此上一𫨻及後夜神皆結歸名上下例然恐繁不釋爾時羅睺阿修羅王承佛威力普觀一切阿修羅衆而說頌言頌文如次可知十方所有廣大衆佛在其中最殊特光明遍照等虛空普現一切衆生前百千萬劫諸佛土一剎那中悉明現舒光化物靡不周如是毗摩深讚喜如來境界無與等種種法門常利益衆生有苦皆令滅苫末羅王此能見無量劫中修苦行利益衆生淨世間由是牟尼智普成大眷屬王斯見佛無礙無等大神通遍動十方一切剎不使衆生有驚怖大力於此能明了佛出於世救衆生一切智道咸開示悉令捨苦得安樂此義遍照所弘闡世間所有衆福海佛力能生普令淨佛能開示解脫處堅行莊嚴入此門佛大悲身無與等周行無礙悉令見猶如影像現世間因慧能宣此功德希有無等大神通處處現身充法界各在菩提樹下坐此義勝德能宣說如來往修三世行諸趣輪回靡不經脫衆生苦無有餘此妙音王所稱讚復次示現宮殿主晝神得普入一切世間解脫門自下第三諸神衆有十九衆今初主晝神十法一智了物心如空入色光照身器如日合空身遍器中如像在鏡世間主力能攝此身此身之性等世間故皆入觀機故名普入所入之處即為宮殿智了物心如空入色者取下偈意偈中如空是喻光明之言含於法喻餘皆是法法喻相對略有三入一以初句佛智為能入第三句衆生心行為所入入者了達義故八十經云佛智廣大同虛空普遍一切衆生心悉了世間諸妄想不起種種異分別此即智了物心而云如空入色者出現品云譬如虛空遍至一切色非色處二言光照身器如日合空者即以第二句光明為能入第四句為所入一切世間即衆生世間及器世間故云光照身器即取上空喻為所入取光明上法喻皆為能入光通二種身光照事智光雙照事理三身遍器中如像在鏡者即唯取第四句自有能所則無不入言通三種入一光入二智入如上已說三身入但言無不入不揀身故而言如像在鏡者將上如空普遍喻此亦齊今傍出一喻以喻身入質來對鏡鏡中見像像是執像機感對剎剎中見佛佛是心佛世間主力下上是佛德今攝就晝神故云能攝此身此身之性等世間故者彰入所以智身色身皆等世間論云智性色性皆相即故皆入觀機彰入之意並釋普字結歸長行所入之處下結歸神名以難見故所以偏結隨緣非有之法身等至等五經當釋發起慧香主晝神得普觀察一切衆生皆利益令歡喜滿足解脫門二義圓稱機故滿心成益樂勝莊嚴主晝神得能放無邊可愛樂法光明解脫門三身法二光皆可愛樂華香妙光主晝神得開發無邊衆生清淨信解心解脫門四法雨潤種已含實者解開善未芽者信發普集妙藥主晝神得積集莊嚴普光明力解脫門五無法不悟名普明力曠劫修集成智莊嚴樂作喜目主晝神得普開悟一切苦樂衆生皆令得法樂解脫門六方便開示世樂亦苦令其悟入見理法樂如歡喜地也觀方普現主晝神得十方法界差別身解脫門七如來身雲就體則非有無約機則差別遍於十方不可謂之無約佛則稱真法界不可謂之有此則隨緣非有之法身恆不異事而顯現以化寂滅非無之衆生恆不異真而成立即無差別之差別也大悲威力主晝神得救護一切衆生令安樂解脫門八處危者護之令安有苦者救之令樂善根光照主晝神得普生喜足功德力解脫門九衆生暗於多欲故沉淪長夜以法開曉喜足為先喜足智俱是功德力能令離苦得安樂故妙華瓔珞主晝神得聲稱普聞衆生見者皆獲益解脫門十有覺德行故名稱普聞既福廣名高故不虛其益十有覺德行者即毛詩言注云覺大也爾時示現宮殿主晝神承佛威力普觀一切主晝神衆而說頌言偈文可知佛智如空無有𥁞光明照曜遍十方衆生心行悉了知一切世間無不入知諸衆生心所樂如應為說衆法海句義廣大各不同具足慧神能悉見佛放光明照世間見聞歡喜不唐捐示其深廣寂滅處此樂莊嚴心悟解佛雨法雨無邊量能令見者大歡喜最勝善根從此生如是妙光心所悟普入法門開悟力曠劫修治悉清淨如是皆為攝衆生此妙藥神之所了種種方便化群生若見若聞咸受益皆令踊躍大歡喜妙眼晝神如是見十力應現遍世間十方法界悉無餘體性非無亦非有此觀方神之所入衆生流轉險難中如來哀愍出世間悉令除滅一切苦此解脫門悲力住衆生暗覆淪永夕佛為說法大開曉皆使得樂除衆苦大善光神入此門如來福量同虛空世間衆福悉從生凡有所作無空過如是解脫華纓得復次普德淨光主夜神得寂靜禪定樂大勇健解脫門第二主夜神十法初七夜神是善財十地善友見解深廣彌顯衆海法門難思一普德淨光即善財離垢地善友彼名全同法門名寂靜禪定樂普游步普游步言即大勇健也寂靜禪定樂即是定體現法樂住故名為樂大勇健者即是定用健則堪能勇則無畏謂見佛淨機游戲神通故名勇健亦游步也勇健廣大故稱普德無惑智俱可謂淨光喜眼觀世主夜神得廣大清淨可愛樂功德相解脫門二即發光地善友彼名喜目觀察衆生解脫名大勢力普喜幢謂此解脫德無不備化無不周名大勢力即今廣大身惑俱淨無不樂見故云普喜悲為德相即幢義也觀察普喜名為喜目護世精氣主夜神得普現世間調伏衆生解脫門三即焰慧地善友彼名普救衆生妙德護世精氣方是救生由護生故顯德之妙也法門全同次第又當謂感必現前調令清淨故寂靜海音主夜神得積集廣大歡喜心解脫門四即難勝地善友彼名寂靜音海法門名念念出生廣大喜莊嚴念念出生即積集義見佛利生故生大喜莊嚴二義一見佛修歡喜因嚴樂見果故二積集此喜神自莊嚴由定發音名寂靜音深廣如海普現吉祥主夜神得甚深自在恱意言音解脫門五即現前地善友彼云守護一切城增長威力偈云尸利以梵音含於二義一云吉祥二翻為守故下譯跋陀室利以為賢首又以首字音同義別彼為頭首法界品中乃為守護皆譯者方言少融耳若以義會增長威力即是普現吉祥正當次第法門又同彼云甚深自在妙音解脫妙音故恱意恱則意淨即寂能演故名自在普發樹華主夜神得光明滿足廣大歡喜藏解脫門六即遠行地善友彼云開敷一切樹華一切開敷即普發也法門彼云菩薩出生廣大喜光明文少倒略耳舊經云菩薩無量歡喜知足光明知足滿足文相近也謂能知如來巧智示法大福威光故曰光明佛以福智滿足物心則含喜名藏平等護育主夜神得開悟衆生令成熟善根解脫門七即不動地善友彼名大願精進力救護一切衆生法門名教化衆生令生善根教化開悟文異義同令生成熟始終異耳謂現通示相皆為調化一切善根皆令生長平等護育即救護一切精進大願故能為之今文略耳遊戲快樂主夜神得救護衆生無邊慈解脫門八念念久修恆遍救護是無邊慈也此與善財歡喜地善友似同而文多異又非其次故但直釋諸根常喜主夜神得普現莊嚴大悲門解脫門九於三毒難壞衆生以大悲門現莊嚴身故石室留影毒龍革心况現身耶石室留影毒龍革心者革變也即觀佛三昧海經彼事極長今當略意即第七經佛告阿難云如來到那乾訶羅國古仙山薝蔔華林毒龍池側青蓮華泉北羅剎石穴阿那斯山南爾時彼穴有五羅剎化作龍女與毒龍通龍復降雹羅剎亂行飢饉疾疫已歷四年時王驚懼禱祀神祇於事無益下取意引有一梵志讚佛功德彼王焚香遙請如來如來受那乾訶羅王弗巴浮提請廣現神變羅剎毒龍既受化已爾時龍王長跪合掌勸請世尊唯願如來常住此間佛若不在我發惡心無由得成無上菩提世尊不離龍窟復受王請人城教化遊行往昔行菩薩道處諸龍皆從聞佛欲還復啼哭雨淚白佛言世尊請佛常住云何捨我我不見佛當作惡事墜墮惡道爾時世尊安慰龍王我受汝請坐汝窟中千五百歲釋迦文佛踊身入石猶如明鏡人見面像諸龍皆見佛在石內影現於外爾時諸龍合掌歡喜不出其池常見佛日爾時世尊結跏趺坐在石壁內衆生見時遠望則見近則不現諸天百千供養佛影影亦說法時梵天王合掌恭敬以偈頌曰如來處石窟踊身入石裏如日無障礙金光相具足我今頭面禮牟尼救世尊經文甚廣復令衆生觀於佛座見丈六像坐於草座作一石窟高丈八尺深二十四步青白石相又想此窟成七寶窟復見佛像踊入石壁等廣弘明集說遠公有石影讚說處所與經全同云在西域那伽訶羅國南山古仙石室中度流沙徑道去此一萬五千八百五十里感世之應備於別傳西域記第八亦說遠公序云昔遇西域沙門輒餐遊方之說知有佛影而傳者尚未曉然及在此山值罽賔禪師南國律學道士與昔聞既同並是其人遊歷所經因其詳問乃圖之為銘曰廓矣大像理玄無名體神入化落影離形回輝層巖凝映虛亭在陰不昧處暗逾明婉出蟬朝宗百靈應不同方迹絶杳𡨋其一茫茫荒宇靡勸靡獎淡虛寫容拂空傅像相具體微神姿自朗白毫吐曜昏夜中爽感誠乃應扣機發響留音停岫津悟冥嘗撫之有會功弗由曩其二餘如廣弘明集罽賔禪師即耶舍三藏示現淨福主夜神得普使一切衆生所樂滿足解脫門十本為衆生故成自德令他樂滿爾時普德淨光主夜神承佛威力遍觀一切主夜神衆而說頌言汝等應觀佛所行廣大寂靜虛空相欲海無涯悉治淨離垢端嚴照十方偈中十偈如次初中初句解脫之力能觀次句即寂靜樂神以此定觀佛此體故下經云普見三世佛而無取著以知如來無相性相本空故故云寂靜虛空相也次句即大勇健準下經則自他兼淨也次句定果也上約佛說若約天說即四句皆是定用以住此解脫能見佛體用因果故一切世間咸樂見無量劫海時一遇大悲念物靡不周此解脫門觀世覩導師救護諸世間衆生悉見在其前能令諸趣皆清淨如是護世能觀察二三可知佛昔修治歡喜海廣大無邊不可測是故見者咸欣樂此是寂音之所了四中稱理遍喜為廣大無邊縱內心不搖而外現威怒更深難測如來境界不可量寂而能演遍十方普使衆生意清淨尸利夜神聞踊恱五以寂故能遍佛於無福衆生中大福莊嚴甚威曜示彼離塵寂滅法普發華神悟斯道六以衆生本來自𥁞故是寂滅是以智窮妄末理無不顯妄徹真源惑無不𥁞喜方滿足餘四可知十方普現大神通一切衆生悉調伏種種色相皆令見此護育神之所觀如來往昔念念中悉淨方便慈悲海救護世間無不遍此福樂神之解脫衆生愚癡常亂濁其心堅毒甚可畏如來慈愍為出興此滅冤神能悟喜佛昔修行為衆生一切願欲皆令滿由是具成功德相此現福神之所入復次遍住一切主方神得普救護力解脫門第三主方神十法一現身說法令悟得果皆救護力普現光明主方神得成辦化一切衆生神通業解脫門二神通示相是能成辦業衆生出苦是所成辦業光行莊嚴主方神得破一切暗障生喜樂大光明解脫門二法光破暗暗斷智生智與法喜俱生斷以寂滅為樂周行不礙主方神得普現一切處不唐勞解脫門四普現說法聞必惑滅故不唐勞永斷迷惑主方神得示現等一切衆生數名號發生功德解脫門五聖人無名隨物立名貴在生德及滅惑耳遍遊淨空主方神得恆發妙音令聽者皆歡喜解脫門雲幢大音主方神得如龍普雨令衆生歡喜解脫門六七可知髻目無亂主方神得示現一切衆生業無差別自在力解脫門八業同性空並不失報俱無差異性相無礙為自在力說能感報令除惡業說業性空善業亦亡普觀世業主方神得觀察一切趣生中種種業解脫門九前約說業性相令物絶業此約知業差別擬隨機化周遍遊覽主方神得所作事皆究竟生一切衆生歡喜解脫門十世人靡不有初鮮克有終今聖人有志有能故所作究竟世人以人隨欲不能兼亡今有慈有愍故令物喜謂十波羅蜜無不究竟四無量心令物歡喜世人靡不有初等者本即毛詩王注周易亦用此言靡無也鮮少也克能也世人以人隨欲者書云小人以人從欲君子以欲從人言不能兼亡者亡無也然兩字相連即莊子意而亡字有心則自他想忘不恃己功也今云兼於無道之人耳爾時遍住一切主方神承佛威力普觀一切主方神衆而說頌言頌中次第配釋可知如來自在出世間教化一切諸群生普示法門令悟入悉使當成無上智神通無量等衆生隨其所樂示諸相見者皆蒙出離苦此現光神解脫力佛於暗障衆生海為現法炬大光明其光普照無不見此行莊嚴之解脫具足世間種種音普轉法輪無不解衆生聽者煩惱滅此遍住神之所悟一切世間所有名佛名等彼而出生悉使衆生離癡惑此斷迷神所行處若有衆生至佛前得聞如來美妙音莫不心生大歡喜遍遊虛空悟斯法佛於一一剎那中普雨無邊大法雨悉使衆生煩惱滅此雲幢神所了知一切世間諸業海佛昔開示等無異普使衆生除業惑此髻目神之所了一切智地無有邊一切衆生種種心如來照見悉明了此廣大門觀世入佛於往昔修諸行無量諸度悉圓滿大慈哀愍利衆生此遍遊神之解脫復次淨光普照主空神得普知諸趣一切衆生心解脫門第四主空神長行十法一智慧造理則十眼廣照日月合空則萬像歷然普遊深廣主空神得普入法界解脫門二身智二光遍入法界生吉祥風主空神得了達無邊境界身相解脫門三佛身如空是無邊境無生無染為吉祥風離障安住主空神得能除一切衆生業惑障解脫門四廣說聖道則離三障安住二空廣步妙髻主空神得普觀察思惟廣大行海解脫門五上求下化名廣大行為安衆生如妙髻焉無礙光焰主空神得大悲光普救護一切衆生厄難解脫門六沉生死之厄難悲智光以濟之無礙勝力主空神得普入一切無所著福德力解脫門七不礙福智相導是謂勝力離垢光明主空神得能令一切衆生心離諸蓋清淨解脫門八惑由智遣深遠妙音主空神得普見十方智光明解脫門九妙音善說光遍十方主空神得不動本處而普現世間解脫門十不壞本處而稱周十方爾時淨光普照主空神承佛威力普觀一切主空神衆而說頌言偈中十頌如次如來廣大目清淨如虛空普見諸衆生一切悉明了佛身大光明遍照於十方處處現前住普遊觀此道佛身如虛空無生無所取無得無自性吉祥風所見三中空有四義含於五法一離能取生即絶妄想二離所取相無相無名三境無自性即是如如四心無所得是為正智迷如以成名相妄想是生悟名相之本如執翻成智如外無智智體即如此二猶空寂照無礙如斯見佛是曰吉祥空有四義含於五法者四義即無生等五法即名等今當先釋五法後消疏文五法經論皆真且依楞伽列次者即名相妄想正智如如以為其次若瑜伽七十二云一相二名三分別四真如五正智分別即妄想異名相謂言談安足事處名即於相所有增語分別謂三界行中所有心心所真如謂無為法無我所顯聖智所行非一切言談安足事處正智略有二種一唯出世間正智二世間出世間正智釋曰上即根本下即後得此之五法為假為實然相通假實亦具假實二有名唯假有分別同相以有三界心心所實法故是實有若虛妄計度故是假有真如唯實有二智俱實有此五二諦何諦所攝前三世俗有真如勝義有根本智勝義有後得智通二有五從何生名從欲生相與分別俱從想分別生真如無生智從聽聞正法如理作意生此之五法為一為異今且將相望餘四法論異不異者一相與名若異名應實有不異取相應得名二與分別若異則分別應非相若不異分別外相應以分別為性三與真如若異則相之勝義應非是如觀者應捨相求如正覺真如應不覺相若不異真如無差別相亦無差別得相之時應得真如又得真時亦應得相應不清淨四相與正智如相與分別說應知名與分別及正智及分別於正智皆當言異餘略可知已知五法名相差別今當消疏疏中先以五法屬文後迷如下辨因起融攝言迷如以成名相則妄想是生者此顯迷時唯有三法一名二相三妄想故此五法通該一切而不必同時謂妄想正智此必不並故今有妄想決無正智其如如名相則有隱顯此中迷故如如則隱名相則顯次云悟名相之本如執翻成智者此顯悟時但有其二一正智二如如既有正智決無妄想了得如如名相即隱雖不壞相舉體即空理奪於事無不蕩盡是故空中無色等法故楞伽云謂了名相及與妄想體不可得名為正智如如即是名相妄想本自不生釋曰名相不生則境如矣妄想不生則心如矣了心境如是為正智故唯正智及如如存次云如外無智智體即如者復融上二以為一味如外無智即以如攝智智體即如是以智攝如合為一味故下經云無有智外如為智所入亦無如外智能證於如即斯義也故疏結云此二猶空寂照無礙寂即是如照即是智如日合空雖有二事一相難分如來無量劫廣說諸聖道普滅衆生障圓光悟此門四中長行及列並名安住今云圓光圓光表智安住表定二事相資前後互舉並能滅障於理無違我觀佛往昔所集菩提行悉為安世間妙髻行斯境一切衆生界流轉生死海佛放滅苦光無礙神能見六中生死海者瑜伽七十云五法相似生死得大海名一處無邊相似故二甚深故三難度故四不可飲故五大寶所依故釋曰由前四義衆生流轉由第五義菩薩入之且約分喻第九十云由三相故不同水海一自性不同分謂水海唯色一分二淪沒不同唯人畜故唯沒身故三超度不同未離欲者亦能度故生死海反上可思餘七偈可知清淨功德藏能為世福田隨以智開覺力神於此悟衆生癡所覆流轉於險道佛為放光明離垢神能證智慧無邊際悉現諸國土光明照世間妙音斯見佛佛為度衆生修行遍十方如是大願心普現能觀察復次無礙光明主空神得普入佛法及一切世間解脫門第五主風神十法一以方便風合智日光智入深法而無障礙身入世間而無影像普現勇業主風神得無量國土佛出現咸廣大供養解脫門二菩薩以求菩提之大心持稱真之供具等虛空之廣大不礙事之繁多而以全法之身一念供無邊之佛如彼風力無不成也飄擊雲幢主風神得以香風普滅一切衆生病解脫門三長風忽來浮雲散滅慈風忽起惑苦病亡淨光莊嚴主風神得普生一切衆生善根令摧滅重障山解脫門四福智莊嚴之風摧壞如山之障力能竭水主風神得能破無邊惡魔衆解脫門五十力降魔十軍皆殄獨名竭水者欲愛為初故十力降魔十軍皆殄者智論第六云欲為汝初軍憂愁軍第二饑渴軍第三渴愛軍第四睡眠軍第五怖畏軍第六疑軍為第七含毒軍第八利養軍第九著虛妄名聞自高軍第十輕慢於他人汝等軍如是一切世間人及諸一切天無能破之者我以智慧箭修定智為弓摧破汝魔軍如壞投水今以愛欲為水故偏語之大聲遍吼主風神得永滅一切衆生怖解脫門六毛孔慈音滅除五怖若百竅異吹遍吼恱機言若百竅異吹者義則可知事出莊子樹杪垂髻主風神得入一切諸法實相辨才海解脫門七智入實相故妙辨如海如風擊樹故能下垂普行無礙主風神得調伏一切衆生方便藏解脫門八調生方便為智所入故名為藏種種宮殿主風神得入寂靜禪定門滅極重愚癡暗解脫門九禪定宮殿必定慧雙游故能滅癡暗約佛則動寂無二見必滅癡大光普照主風神得隨順一切衆生行無礙力解脫門十日月明照非風不運智行無礙方便力焉爾時無礙光明主風神承佛威力普觀一切主風神衆而說頌言十偈可知一切諸佛法甚深無礙方便普能入所有世間常出現無相無形無影像汝觀如來於往昔一念供養無邊佛如是勇猛菩提行此普現神能悟了如來救世不思議所有方便無空過悉使衆生離諸苦此雲幢神之解脫衆生無福受衆苦重蓋密障常迷覆一切皆令得解脫此淨光神所了知如來廣大神通力克殄一切魔軍衆所有調伏諸方便勇健威力能觀察佛於毛孔演妙音其音普遍於世間一切苦畏皆令息此遍吼神之所了佛於一切衆剎海不思議劫常演說此如來地妙辨才樹杪髻神能悟解佛於一切方便門智入其中悉無礙境界無邊無與等此普行神之解脫如來境界無有邊處處方便皆令見而身寂靜無諸相種種宮神解脫門如來劫海修諸行一切諸力皆成滿能隨世法應衆生此普照神之所見音釋婆稚梵語也正云跋稚迦此云團圓又云被縛稚直利切鴿古沓切鳩屬殄徒典切滅也竅苦弔切穴也苫末羅梵語也此云金色王名也苫舒瞻切窟苦骨切罽賔梵語此云賤種罽居例切
