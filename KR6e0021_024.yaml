body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述華藏世界品第五初來意者前品通明諸佛剎海今此別明本師所嚴依果答世界海問故次來也釋名者準梵本具云華藏莊嚴嚴具世界海之遍清淨功德海光明品譯者嫌繁乃成太略處中應云蓮華藏莊嚴世界海品謂蓮華含子之處目之曰藏今剎種及剎為大蓮華之所含藏故云華藏其中一一境界皆有剎海塵數清淨功德故曰莊嚴世界深廣故名為海有云世界依海故立海名者恐非文意以下云華藏莊嚴世界海住在華中故其梵云嚴具即是能嚴其遍清淨功德海光明即顯嚴之相用依體有用故致之言今文舉體攝用但云華藏梵本具云者梵云拘蘇磨華多羅藏驃訶莊嚴阿楞伽嚴具嚕迦䭾都世界三牟達囉海鉢履輸陀云遍清淨懼曩功德三牟達囉海阿羅婆娑光明鉢履勿多品此云華藏莊嚴嚴具世界海遍清淨功德海光明品約事可爾何因剎海相狀如斯略舉二因一約衆生如來藏識即是香海亦法性海依無住本是謂風輪亦妄想風於此海中有因果相恆沙性德即是正因之華世出世間未來果法皆悉含攝故名為藏若以法性為海心即是華含藏亦爾然此藏識相分之中半為外器不執受故半為內身執為自性生覺受故如來藏識何緣如此法如是故行業引故二約諸佛謂以大願風持大悲海生無邊行華含藏二利染淨果法重疊無礙故所感剎相狀如之是以出現品中多將世界以喻佛德細尋文意乃由佛德世界如之約事可爾下核其本源不為此釋豈委剎海之興由三宗趣者別顯本師依報具三世間融攝無盡為宗令諸菩薩發生信解成就行願為趣餘如前品但總別異耳融攝之相亦見前文賢首立華藏觀復有十德大同小異如彼文說言有十德者前品已引爾時普賢菩薩復告大衆言諸佛子此華藏莊嚴世界海是毗盧遮那如來往昔於世界海微塵數劫修菩薩行時一一劫中親近世界海微塵數佛一一佛所淨修世界海微塵數大願之所嚴淨第四釋文一品分三初明華藏因果自體二明藏海安布莊嚴三明所持剎網差別三假如次釋華藏莊嚴世界之名今初二先長行後偈頌長行亦二初舉果屬人顯因深廣二彰果體相辨其寬容今初也謂指此剎海是我本師修因所淨然因深廣有三勝相一長時修剎海塵劫故不唯三祇二於多劫一一遇多勝緣不唯勝觀釋迦等佛三於多勝緣一一淨多大願願淨國等不唯淨一無生等由上三重故云深廣初華藏等者然第二安布莊嚴亦是果相故應對果分因總為二𫨻謂光明剎因後彰果相以第一𫨻長行具有因果偈文雙頌因果故合於因屬自體中不唯勝觀等者俱舍論第十八說於三無數劫各供養七萬又如次供養五六七千佛三無數劫滿逆次逢勝觀然燈寶髻佛初釋迦牟尼釋曰此三偈中初偈明供養佛數謂初無數劫供養七萬五千佛第二無數劫供養七萬六千佛第三無數劫供養七萬七千佛後頌明逢何佛供養言逆次者從第三無數劫向前以明謂第三無數劫滿逢勝觀佛第二無數劫滿逢然燈佛第一無數劫滿逢寶髻佛最初發心逢釋迦佛發誓願言願我當作佛一如今世尊彼佛世尊末劫出世法住千年今我如來一一同彼故今疏云不唯勝觀者舉第三阿僧祗劫滿佛言釋迦者舉初發心之佛而言等者乃有三義一等然燈寶髻二等所供佛數三等餘教所明設言供養三十六恆三十八恆佛等皆未足為多也不唯淨一無生忍者如智論說五華供養然燈得無生法忍故金剛經云若有少法可得然燈佛則不與我授記等無法可得是無生相而言等者等餘法門俱舍頌云但由悲普施被折心無忿讚歎底沙佛次無上菩提六波羅蜜多於如是四位一二又一二如次修圓滿釋曰初之四句即是四位初位一滿謂普施成檀次位二滿謂尸及忍被折不報故能滿尸由內無忿故成於忍第三位中但一度滿謂精進度第四位中定慧雙滿故云一二又一二等言底沙者此云圓滿讚佛偈云天地此界多聞室逝宮天處十方無丈夫牛王大沙門尋地山林遍無等七日七夜忘下一足歎底沙故超於彌勒九劫先成佛智論之中亦同此說故六度滿前後不多今經一一佛所淨修世界海微塵數大願况於多佛况多劫耶故疏結云由上三重故云深廣然瑜伽起信等約三乘教一方化宜一類世界定說三祇今約一乘該通十方及樹形等界故云剎海塵數是以寶雲經言我為淺識衆生說三僧袛劫修行然我實經無量阿僧袛劫修行又時無別體依法上立法既無盡時亦無窮況念劫圓融不應剋執然瑜伽下二隨難別釋即重釋三祗約三乘一乘以通言該通十方者對上一方化儀及樹形者對上一類世界且如娑婆一劫方知安養得為一日則安養世界乃經三無數日耳更方袈裟幢剎未經嵗月况於後後以劫為日之剎耶是則不可以此一方類定於成佛時劫之數二異類剎者即於一界即具諸界互不相見時劫亦殊安知修短故朝菌不知晦朔况識春秋况於大椿之嵗耶寶雲經者經云善男子菩薩不能思議如來境界如來境界不可思議但為淺近衆生說三僧祗修習所得菩提而實發心已來不可計數賢首釋云不可計者不可計數阿僧祗也義分齊云始教三祗不同小乘小乘十十數之此即倍倍數之仍說百劫修相好等智度論破此別修相好不許三祗之外別修即是實教之意然實教之意自有二義一定三僧祗一方化儀故又是實佛故起信論云或示超地速成正覺以為怯弱衆生故或說我於無量阿僧祗劫當成佛道以為懈慢衆生故能示如是無量方便不可思議而實菩薩種性根等發心則等所證亦等無有超過之法以一切菩薩皆經於三阿僧祗劫故斯則定也二者不定復有二意一為通餘類世界故如勝天王說即前樹形等剎是二據佛實德無限故如寶雲經若瑜伽說有二種無數劫一者日夜月半月等方便顯時無量故二者如常說若依初義經無量劫若依後義但三僧祗然依此釋不同寶雲寶雲不言為淺近衆生說於大劫為於深勝說日月劫明知意殊是則瑜伽亦是一方所宜說耳又時無別體下別教一乘融攝以說如毗目仙人執善財手時經多劫處歷無邊故不可以長短思也若顯超勝一生頓圓若約甚深多劫莫究故云不可定執貴在入玄第二諸佛子下彰果體相者植因既深果必繁奧然所依剎量諸教不同小乘但一娑婆三乘有大小之化或色究竟為實或他方別有淨邦今一乘十佛之境大小無礙淨穢相融且依一相說有邊表實則一重橫尋無邊況復重重塵含法界然所依下第二彰其分量言大小之化者如梵網經周匝千華上復現千釋迦即大化也一華百億國一國一釋迦即小化也小化唯一四洲大化總該百億且依一相者且依一種義相不壞邊表有蓮華外別佛剎海等實則稱性橫不可尋故云法界無差別若以性融相則一塵中法界無量然準下別顯應有十事一所依風輪二風持香海三海出蓮華四華持剎海五繞臺輪山六臺面寶地七地有香海八海間香河九河間樹等十總結多嚴今文之中唯闕一河文且分四第一能持風輪第二所持香海第三海出蓮華第四華持剎海應有十事者以文廣釋十事故此中長行略摽列故是以古德一品之中先分土因就果相中即分十𫨻今不依者以下六事各有長行偈頌而前四事同一長行故科十𫨻於文不便先科為三於第一華藏自體長行之內方分為四耳然其剎因有其總別已見上文為顯別義且明一因成於一果已見上文者即起具因緣中通義易知故示別相諸佛子此華藏莊嚴世界海有須彌山微塵數風輪所持今初風輪之因即大願等亦如前釋於中文三初總標數二略列名三別舉最上其最下風輪名平等住能持其上一切寶焰熾然莊嚴次上風輪名出生種種寶莊嚴能持其上淨光照耀摩尼王幢次上風輪名寶威德能持其上一切寶鈴次上風輪名平等焰能持其上日光明相摩尼王輪次上風輪名種種普莊嚴能持其上光明輪華次上風輪名普清淨能持其上一切華焰師子座次上風輪名聲遍十方能持其上一切珠王幢次上風輪名一切寶光明能持其上一切塵尼王樹華次上風輪名速疾普持能持其上一切香摩尼須彌雲次上風輪名種種宮殿遊行能持其上一切寶色香臺雲列中名平等住者一遍持諸位故二稱實性故餘文可知風並在下寶在臺面以力遙持以力遙持者古有二釋一云一重風輪持一重物疏以出現品中有十風輪持欲色等皆是遙持故今案定諸佛子彼須彌山微塵數風輪最在上者名殊勝威光藏三舉最上者勝力能持香海故立其名能持普光摩尼莊嚴香水海第二能持下所持香海以摩尼發光普照一切嚴海底岸及寶色香水故立此名又藏識名海具德深廣故流注名水剎那性故又佛性名水遠熏名香聞未證故涅槃亦云有人聞香又佛性名水下約通生佛佛性即是真法性故故此品初海表三義今舉其二略不說悲涅槃亦云有人聞香即第七經至問明品當具引之此香水海有大蓮華名種種光明蘂香幢第三此香水下所出蓮華蘂放異光又發勝香高出降伏故立此名又所發萬行一一覺性故曰光明皆能普熏即香義也又所發萬行下上約事釋此約表法但通相表行若別說者略示十德表於十度一開敷鮮榮以表施度二自性無染以表戒度三香氣芬馥四寶莖堅固五寶葉扶踈六寶蘂光幢七相巧成就八含藏蓮子九寶臺堅住十普放光明下八如次顯於八度華藏莊嚴世界海住在其中四方均平清淨堅固金剛輪山周匝圍繞地海衆樹各有區別第四華藏下所持剎海四方均平總顯形相清淨堅固彰其體性金剛圍等別明所有即下別顯此為其本一山二地三海四樹各別區分即總顯多嚴但闕一河以下有別顯故此略明下亦略頌是時普賢菩薩欲重宣其義承佛神力觀察十方而說頌言世尊往昔於諸有微塵佛所修淨業故獲種種寶光明華藏莊嚴世界海廣大悲雲遍一切捨身無量等剎塵以昔劫海修行力今此世界無諸垢第二偈中然長行偈頌有十例五對謂有無廣略離合先後為八九或超間十或頌已重頌故釋頌文不可一例上下準之此文略有四例一宿因現緣經離頌合一宿因現緣者此中名長行為經以取長行綴葺略說所應說義別相修多羅故言經離者宿因即前顯因深廣現緣即前風持香海等此二明離言頌合者初偈頌總前半宿因後半現緣第二偈三句宿因第四句是現緣故二所成果相經略頌廣二所成果相者長行云華藏世界海住在其中者即所成果相此文則略以十偈之內皆有果相故云頌廣三現緣風輪經廣頌略三現緣風輪者經列十種風輪偈中但云風力所持無動搖耳四山地海樹經有頌無四山地海樹者長行云金剛輪山周匝圍繞地海衆樹各有區別此經有也頌無可知上言有四者但有四例唯廣略一種乃成一對離合有無但成一例耳若成對者應須經合頌離經無頌有方成三對餘四例二對此中則無下頌則有十偈分二初二頌上因相即辨因招果放大光明遍住空風力所持無動搖佛藏摩尼普嚴飾如來願力令清淨普散摩尼妙藏華以昔願力空中住餘頌果相於中分四初一偈半頌風輪皆上句所持下句能持初半偈以果持果後偈兼明能成之因前半離障願令清淨故後半無礙願依空住故種種堅固莊嚴海光雲垂布滿十方諸摩尼中菩薩雲普詣十方光熾然二有一偈頌香海尋此了名光焰成輪妙華飾法界周流靡不遍一切寶中放淨光其光普照衆生海十方國土皆周遍咸令出苦向菩提寶中佛數等衆生從其毛孔出化形梵主帝釋輪王等一切衆生及諸佛化現光明等法界光中演說諸佛名種種方便示調伏普應群心無不盡三有三頌半頌蓮華初一偈半釋種種光明蘂則顯此華以寶為體次一偈釋香義就法以明寶中出佛佛出世主如從質發香遠熏之義後一釋幢義演佛是高出義調生是摧伏義華藏世界所有塵一一塵中見法界寶光現佛如雲集此是如來剎自在廣大願雲周法界於一切劫化群生普賢智地行悉成所有莊嚴從此出四有二頌明剎自在總頌上所持剎海初偈自在一一稱性故即同時具足相應門也心塵準思寶光現佛者依正互融故後偈結歸普因故能含攝爾時普賢菩薩復告大衆言諸佛子此華藏莊嚴世界海大輪圍山住日珠王蓮華之上第二別顯安布莊嚴文分為六第一四周輪山二寶地三香海四香河五樹林六總結各別有偈今初輪山則清淨戒德內攝外防之所成也長行中三初總舉所依二栴檀下別顯體相三如是下結德無盡今初山所依處即地面四周日珠王者所依處地故舊經云依蓮華日寶王地住亦有言大華之上別有此蓮為山所依義似不順所以地受此名者前華名種種光明蘂偈中云光熖成輪又云一切寶中放淨光明知此華以寶為體是則如日輪之珠王為蓮華也斯即總華之稱旃檀摩尼以為其身威德寶王以為其峰妙香摩尼而作其輪焰藏金剛所共成立一切香水流注其間衆寶為林妙華開敷香草布地明珠間飾種種香華處處盈滿摩尼為網周匝垂覆如是等有世界海微塵數衆妙莊嚴二別顯中前取堅利且云金剛今明具德略有十相前四自體圓滿後六外相莊嚴一身為總形摩尼圓明栴檀芬郁皆戒之德也二山峯謂秀出孤絶威伏諸惡三山輪古有二義一山彎曲之處二山腹跳出如師子座半月為輪準下偈文輪居山下為山所依四成山之緣上舉三事各別有體今顯金剛內含光焰遍成其體如世土石雜而成山金剛遍故得金輪名餘六文顯並在山間爾時普賢菩薩欲重宣其義承佛神力觀察十方而說頌言世界大海無有邊寶輪清淨種種色所有莊嚴盡奇妙此由如來神力起應頌有十文分為二前六明山體相莊嚴頌前別顯後四辨山妙用自在亦顯依正無礙即頌前結文前中五初一總頌圍山初句所圍次二句能圍後句出因言無邊者有其二義一但總相顯多故云無邊實有邊表二說有圍山外者是無邊之邊不礙理而即事故今云無邊者是邊之無邊不壞相而即理故是無邊之邊者意明理無分限總曰無邊事有分限故名有邊若依理成事理性全隱則無邊即邊若會事歸理事相全盡則邊即無邊今則不爾不失理而事現云無邊之邊不壞事而理顯云邊之無邊此是事理無礙義不是相即相作之義思之摩尼寶輪妙香輪及以真珠燈焰輪種種妙寶為嚴飾清淨輪圍所安住二有一頌頌前山輪堅固摩尼以為藏閻浮檀金作嚴飾舒光發焰遍十方內外映徹皆清淨三一頌山體金剛摩尼所集成復雨摩尼諸妙寶其寶精奇非一種放淨光明普嚴麗四一頌成山之緣香水分流無量色散諸華寶及旃檀衆蓮競發如衣布珍草羅生悉芬馥無量寶樹普莊嚴開華發蘂色熾然種種名衣在其內光雲四照常圓滿五六二偈頌前水等諸嚴及加衣等無量無邊大菩薩執蓋焚香充法界悉發一切妙音聲普轉如來正法轉諸摩尼樹寶末成一一寶末現光明毗盧遮那清淨身悉入其中普令見諸莊嚴中現佛身無邊色相無央數悉往十方無不遍所化衆生亦無限一切莊嚴出妙音演說如來本願輪十方所有淨剎海佛自在力咸令遍後四妙用自在並顯可知爾時普賢菩薩復告大衆言諸佛子此世界海大輪圍山內所有大地第二臺面寶地即體心性定之所成也長行文三初標所在二一切下別顯體相莊嚴三總結一切皆以金剛所成堅固莊嚴不可沮壞清淨平坦無有高下摩尼為輪衆寶為藏一切衆生種種形狀諸摩尼寶以為間錯散衆寶末布以蓮華香藏摩尼分置其間諸莊嚴具充遍如雲三世一切諸佛國土所有莊嚴而為校飾摩尼妙寶以為其網普現如來所有境界如天帝網於中布列諸佛子此世界海地有如是等世界海微塵數莊嚴二中十句初一地體標以金剛釋以堅固不壞遍華藏地盡是金剛故上菩提場地徹華藏也二地相平淨餘八皆莊嚴謂三飾以寶輪四畜以寶藏五間以異寶六散以寶末七布以蓮華八分置香摩尼九充以莊嚴具但云諸嚴嚴有多少三世佛國之嚴而為嚴者顯無盡之嚴具也十覆以寶網隱映莊嚴網有何用普現佛影此網何相如天帝網而布列也又此帝網重現無盡成上普現如來境界及上一一境界皆無盡也但云諸嚴下此句稍長故牒釋之即從諸莊嚴具下是第九句摩尼妙寶下皆第十句爾時普賢菩薩欲重宣其義承佛神力觀察十方而說頌言其地平坦極清淨安住堅固無能壞摩尼處處以為嚴衆寶於中相間錯金剛為地甚可悅寶輪寶網具莊嚴蓮華布上皆圓滿妙衣彌覆悉周遍菩薩天冠寶瓔珞悉布其地為嚴好栴檀摩尼普散中咸舒離垢妙光明寶華發焰出妙光光焰如雲照一切散此妙華及衆寶普覆於地為嚴飾偈有十頌分二前七頌前別顯後三頌總結前中三初四頌前八𫨻而小不次者顯前無優劣故或重或廣者顯義無方也恐繁不配可以意得密雲興布滿十方廣大光明無有盡普至十方一切土演說如來甘露法一切佛願摩尼內普現無邊廣大劫最勝智者昔所行於此寶中無不見次二頌嚴具如雲其地所有摩尼寶一切佛剎咸來入彼諸佛剎一一塵一切國土亦入中後一偈頌如天帝網謂一寶既收一切則彼剎諸塵復攝一切即重重也妙寶莊嚴華藏界菩薩遊行遍十方演說大士諸弘願此是道場自在力摩尼妙寶莊嚴地放淨光明備衆飾充滿法界等虛空佛力自然如是現諸有修治普賢願入佛境界大智人能知於此剎海中如是一切諸神變後三偈頌總結者結其所屬初偈結屬道場次屬佛力後結能知之人爾時普賢菩薩復告大衆言諸佛子此世界海大地中有十不可說佛剎微塵數香水海第三地面香海者上之大海既是藏識今明心華之內攝諸種子一一種子不離藏識海故有多香海然一一具於性德故皆有莊嚴長行分二初總舉數準下剎種及梵本中皆有十不可說今闕十字或是譯人之漏或是傳寫之失下標種處亦然準下剎種者以中海管十海十海一道布列結有不可說佛剎微塵數香水海十道皆然一海一種故有十不可說也下標種者標云諸佛子此不可說佛剎微塵數香水海中有不可說佛剎世界種釋曰此即摽種處無十字亦例合有一切妙寶莊嚴其底妙香摩尼莊嚴其𡶨毗盧遮那摩尼寶王以為其網香水映徹具衆寶色充滿其中種種寶華旋布其上栴檀細末澄垽其下演佛言音放寶光明無邊菩薩持種種蓋現神通力一切世界所有莊嚴悉於中現二一切下別顯莊嚴準後總結應云一一香海各有若干莊嚴今文略無若案文取義一切之言即一切海總以妙寶而為其底等文有二十句前十明海體狀一底二𡶨三網四水五華六垽七聲八光九人衛現通十結廣無盡十寶階陛行列分布十寶欄楯周匝圍繞四天下微塵數一切寶莊嚴芬陀利華敷榮水中不可說百千億那由他數十寶尸羅幢恆河沙數一切寶衣鈴網幢恆河沙數無邊色相寶華樓閣百千億那由他數十寶蓮華城四天下微塵數衆寶樹林寶焰摩尼以為其網恆河沙數栴檀香諸佛言音光焰摩尼不可說百千億那由他數衆寶垣墻悉共圍繞周遍嚴飾後十寶下十句攝異莊嚴唯白蓮華當於水中餘皆在𡶨言十寶者有云金銀琉璃硨磲碼瑙珊瑚琥珀真珠玫瑰琴瑟為十十中前七即是七寶芬陀利者即白蓮華亦是正敷榮時尸羅幢者應云試羅此云美玉若言尸羅此云清淨二義俱通餘並可知以法門合之可以意得芬陀利即白蓮華者即唐三藏等諸師所翻而言亦是正敷榮時者即什公意故𠮉公法華序云華有三時之異華而未敷名屈摩羅凋而將落名迦摩羅處中盛時名芬陀利生公亦云器像之妙莫踰蓮華蓮華之美榮在始敷始敷之盛則子盈於內色香味足謂之芬陀利意亦同也今存二譯各是一義梵語多含故兩存耳爾時普賢菩薩欲重宣其義承佛神力觀察十方而說頌言此世界中大地上有香水海摩尼嚴清淨妙寶布其底安住金剛不可壞香藏摩尼積成𡶨日焰珠輪布若雲蓮華妙寶為瓔珞處處莊嚴淨無垢香水澄渟具衆色寶華旋布放光明普震音聲聞遠近以佛威神演妙法頌中菩薩持蓋經有頌無日焰光輪經無頌有且分為二初三頌初十句一頌底二頌𡶨及網纓即網類三頌餘七細尋可見階陛莊嚴具衆寶復以摩尼為間飾周回欄楯悉寶成蓮華珠網如雲布摩尼寶樹列成行華蘂敷榮光赫奕種種樂音恆競奏佛神通力令如是種種妙寶芬陀利敷布莊嚴香水海香焰光明無暫停廣大圓滿皆充遍明珠寶幢恆熾盛妙衣垂布為嚴飾摩尼鈴網演法音令其聞者趣佛智妙寶蓮華作城郭衆彩摩尼所嚴瑩真珠雲影布四隅如是莊嚴香水海垣墻繚繞皆周匝樓閣相望布其上無量光明恆熾然種種莊嚴清淨海毗盧遮那於往昔種種剎海皆嚴淨如是廣大無有邊悉是如來自在力餘七偈頌後十句而小不次謂一頌階陛欄楯二頌樹林三頌華敷四頌幢相五頌城珠六頌墻閣繚者纏也七頌結嚴屬佛一昔因二現力爾時普賢菩薩復告大衆言諸佛子一一香水海各有四天下微塵數香水河右旋圍繞第四海間香河即隨一一心同時相應功德流注也長行亦三初舉數二一切下辨嚴三若廣下結廣即隨一一心者大海既喻藏識小海復表種子二皆心王故河表同時心所謂善十一遍行別境二千福河流注心地一切皆以金剛為𡶨淨光摩尼以為嚴飾常現諸佛寶色光雲及諸衆生所有言音其河所有漩澓之處一切諸佛所修因行種種形相皆從中出摩尼為網衆寶鈴鐸諸世界海所有莊嚴悉於中現摩尼寶雲以覆其上其雲普現華藏世界毗盧遮那十方化佛及一切佛神通之事復出妙音稱揚三世佛菩薩名其香水中常出一切寶焰光雲相續不絶嚴中嚴事並無差別故云一切皆以謂並用寶體寶嚴聖靈游集光雲相映萬象浮輝十句可知若廣說者一一河各有世界海微塵數莊嚴三結廣中既繞小海之小河已有剎海塵數之嚴彌顯諸標結文非唯約事皆是一多無礙耳爾時普賢菩薩欲重宣其義承佛神力觀察十方而說頌言清淨香流滿大河金剛妙寶為其𡶨偈中初半偈頌𡶨體金剛寶末為輪布其地種種嚴飾皆珍好寶階行列妙莊嚴欄楯周回悉殊麗真珠為藏衆華飾種種纓鬘共垂下次一偈半頌摩尼嚴𡶨香水寶光清淨色恆吐摩尼競疾流衆華隨浪皆搖動悉奏樂音宣妙法三一頌光雲言音細末栴檀作泥垽一切妙寶同洄澓香藏𣱦氳布在中發焰流芬普周遍河中出生諸妙寶悉放光明色熾然其光布影成臺座華蓋珠瓔皆具足摩尼王中現佛身光明普照十方剎以此為輪嚴飾地香水映徹常盈滿次三皆頌漩澓出影摩尼為網金為鐸遍覆香河演佛音克宣一切菩提道及以普賢之妙行七頌網鐸垂覆及總現諸嚴前現事嚴此說道行寶𡶨摩尼極清淨恆出如來本願音一切諸佛曩所行其音普演皆令見八頌現佛依正其河所有漩流處菩薩如雲常踊出悉往廣大剎土中乃至法界咸充滿九頌浪出妙音清淨珠王布若雲一切香河悉彌覆其珠等佛眉間相炳然顯現諸佛影十頌水出光雲更有影略可以意得爾時普賢菩薩復告大衆言諸佛子此諸香水河兩間之地悉以妙寶種種莊嚴第五河間華林長行有三初總標次一一下別顯後其香水下總結一一各有四天下微塵數衆寶莊嚴芬陀利華周匝遍滿各有四天下微塵數衆寶樹林次第行列一一樹中恆出一切諸莊嚴雲摩尼寶王照耀其間種種華香處處盈滿其樹復出微妙音聲說諸如來一切劫中所修大願復散種種摩尼寶王充遍其地所謂蓮華輪摩尼寶王香焰光雲摩尼寶王種種嚴飾摩尼寶王現不可思議莊嚴色摩尼寶王日光明衣藏摩尼寶王周遍十方普垂布光網雲摩尼寶王現一切諸佛神變摩尼寶王現一切衆生業報海摩尼寶王如是等有世界海微塵數其香水河兩間之地一一悉具如是莊嚴別顯二事謂華及樹水陸各一實有多事然此一假文勢少異不列十事以顯無盡而但舉二展轉明多謂初一白蓮後一寶樹於此一樹出五業用一出莊嚴雲二寶王照耀三華香盈滿四出音演法五雨寶遍地於中文有總別及結別有八事通三世間初六現器次一現正覺後一現衆生世間如劍葉林等現惡業報天意樹等即善業報男女林中朝生暮落皆業報海如劒葉林者其林樹葉猶如刀劒下即傷人天意樹者涅槃四十二問中當第二十四問云云何觀二寶猶如天意樹言天意樹者隨天意轉故至第九經方始答之云復次善男子如菴羅樹及閻浮提樹一年三變有時生華光色敷榮有時生葉滋茂蓊鬱有時凋落狀如枯死善男子於意云何是樹實為枯死不耶不也世尊善男子如來亦耳於三界中示三種身有時初生有時長大有時涅槃而如來身實非無常釋曰意明三寶隨物轉變而實常存如天意樹隨天意轉而實不死隨天之意明是善業男女林者即楞伽第一百六問云何男女林一百七問云何訶梨勒阿摩勸解曰謂令觀世間如男女林等依立世阿毗曇論第一云閻浮提林外有二林一名訶梨勒二名阿摩勒此二林南復有七林中有人林是人林中果形如人如閻浮提聖人王種若男子十六嵗如女一十五嵗莊嚴具足狀如行嫁是人林果可愛如是其子華形如人頭髻未離欲者見此果子便生愛心諸外道等有離欲人若見此果即失禪定欲心還生其子熟時唯鳥競食鳥食之餘殘落於地如尸陀林甚可厭惡退禪定者見是相已深生厭離還得本定意表世間男女如林所見榮飾悉皆如幻與此無別遍計所執妄謂之實菩薩觀之都無所有故楞伽云觀諸衆生如死尸無知以妄想故見有往來若離妄想如彼死尸無鬼入中云為自在故有經說菩薩所見世間資生無非實相此之謂矣如是等下且結樹之雨寶已有剎海塵數例上出雲等四一一皆然一樹之中已有多剎海之嚴矣次例芬陀利華亦同於樹其華與樹各有四天下塵一一皆爾如華樹等類復應有剎海塵數之物故為無盡之嚴也爾時普賢菩薩欲重宣其義承佛神力觀察十方而說頌言其地平坦極清淨真金摩尼共嚴飾諸樹行列蔭其中聳幹垂條萃若雲枝條妙寶所莊嚴華焰成輪光四照摩尼為果如雲布普使十方常現覩摩尼布地皆充滿衆華寶末共莊嚴復以摩尼作宮殿悉現衆生諸影像諸佛影像摩尼王普散其地靡不周如是赫奕遍十方一一塵中咸見佛妙寶莊嚴善分布真珠燈網相間錯處處悉有摩尼輪一一皆現佛神通衆寶莊嚴放大光光中普現諸化佛一一周行靡不遍悉以十力廣開演後應頌不次文分為三初六頌寶樹摩尼妙寶芬陀利一切水中咸遍滿其華種種各不同悉現光明無盡歇次一頌白蓮華三世所有諸莊嚴摩尼果中皆顯現體性無生不可取此是如來自在力此地一切莊嚴中悉現如來廣大身彼亦不來亦不去佛昔願力皆令見此地一一微塵中一切佛子修行道各見所記當來剎隨其意樂悉清淨後三結嚴所因謂由佛等力明體用無礙現而常如然此偈有多意趣一者初一偈則器世間次一智正覺後一衆生欲明一一事中皆現三世間嚴影略其文耳然此三偈下二別釋示難思相總有六重六重之中皆通一偈而各取一句中言又此四句各是一義如第一偈初句所現之境二能現之處三所現之相四能現之固下二例然其第一重料揀初句所現不同三偈各一世間而初偈是初句次偈是第二句後偈是第二三兩句影略其文者謂隨一能現現三世間今各舉一故云影略非但此義六重皆影略又初明一果能現次例一切莊嚴後明塵塵皆爾從略至廣從粗至細又初明一果能現下第二重約現處以明初偈第二句後二偈皆第一句又初明佛力次彰願力後隨樂力又初明佛力下第三重約能現固差各顯一因皆第四句又初果後因願通因果又初果後因者是第四重亦約現因明異重釋第四句而約因果不同又初自後他願通自他又初自下第五亦約能現因句亦第四約一利不同又初明即性無性體本不生次明即相無相現無來去後明不壞於相各見不同初明即性無性下第六重約所現性相明差三偈皆第三句以各見不同同體無來等此之一義更須解釋謂若順上釋既從佛力等因故所現之體即無生等二者此句亦是能現由體無生故現而叵取稱性而來故無來去隨機隱顯各見不同方顯華藏之嚴皆言亡慮絶非可情求也音釋分馥芬敷文切馥房六切芬馥香氣也沮壞沮在吕切遏也壞古聵切毀也垽語靳切滓也欄楯楯竪尹切欄檻也澄渟澄持陵切水靜而清也渟唐丁切水止曰渟鈴鐸鈴即丁切似鍾而小曰鈴鐸達各切鈴屬蘂乳捶切花須也玫瑰玫謀杯切瑰姑回切玫瑰火齊珠也繚憐蕭切漩澓漩旬宣切澓房六切漩澓回流也嫌胡兼切憎也奧於到切菌具隕切音郡地菌之小者蓊蓊烏紅切於勿切蓊草木盛貌
