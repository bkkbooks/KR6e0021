body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述如來現相品第二將釋此品四門分別一來意二釋名三宗趣四釋文然下諸品多用此四若有增減至文當辨今初來意中二先分來後品來今初三分之中自下正宗由致既彰正宗宜顯故次來也四分之中已明教起因緣次辨説法儀式故次來也二品來者曲有二義一前辨衆集今顯疑現相二前明舊衆今辨新集故次來也四分之中者四分即舉果勸樂生信等四分以四分科第一會名舉果觀樂生信分六品分三初品明教起因緣分次二品明説法儀式分後三品正陳法海分初分已竟次有説法儀式二品經來此是四分科中第一分內三分之中第二分來舉其大科故云四分之中對前序正流通三故二釋名者一分名者正宗正陳宗旨揀序流通若四分中名舉果勸樂生信者舉依正果勸物信樂是故亦名所信因果亦名説佛依果會以從多説故以從多説者此通妨難然有二妨一云以文從義科中名所信因果經中復有遮那品因何以問答相屬科中但名舉果勸樂生信分隨其本會科中但名説佛依果會耶故此答云以多説果以因少故如河少水亦名無水如乳有水但名為乳勸物信樂宜舉果故第二妨云上云舉佛依正二果勸物信樂何故隨會但言説佛依果會耶故此答云多説依果少説正故亦以本意在於依果正報之果第二會去方始説故二品名者如來是能現之人相是所現之法現通能所能所合説體用雙陳以立其稱然如來現相各有五義以成其十如來五者一就理顯謂法性名如出障名來二唯就行瑜伽云言無虛妄故名如來涅槃三十二亦同此説三理智合説轉法輪論云第一義諦名如正覺名來正覺第一義諦故名如來此與成實大同四離相説般若云如來者無所從來亦無所去故名如來五融攝説謂一如無二如若理若智若開若合無不皆如故名為如如外無法來亦即如如是來者是真如來現相五者一現面門光相召十方衆二現眉間光相示説法主三振動剎網以警群機四佛前現華表説依果五白毫出衆表教從佛流如是等相是如來現相品中辨此故以為名涅槃三十二者即是北經是樹提伽長者父之親友讚佛功德復問佛云何名如來佛云長者如來世尊於一切法知見無礙故名為佛發言無二故名如來斷煩惱故名阿羅訶世尊所説終無有二釋曰無二即無虛𡚶也此與成實大同者成實云乘如實道來成正覺故曰如來乘如實道即第一義來成正覺即正覺名來以如實道亦通萬行故言大同若理若智者若理即第一釋若智即第二釋若開即雙明前二若合者第三釋其第四釋義通理智亦兼開合謂例大品云諸法如即是佛諸法如則無來無去此則唯約理釋二云心無動搖智絶真妄則約智説無有來去三若以心無來去方契如如體無來去則通合説故但判為離相釋耳以離一切相名諸佛故現相五者下二釋現相然五各二句一句辨相一句辨意如一云現面門光相者辨現相也召十方衆者即彰所以下四例然三宗趣者亦二一分宗三分正宗已如上説四分之宗即以佛果無邊剎海具三世間無盡自在故以為宗令諸菩薩生淨信修行涉求以之為趣二品宗者以光相表示為宗令上智玄悟為趣即以佛果者然華藏品猶似有邊有金輪山蓮華外故此外更有別剎海故而彼文云法界無差別已無邊矣况世界成就品云十方剎海叵思議佛無量劫皆嚴淨為化衆生使成熟出興一切諸國土又偈中云所説無邊衆剎海毗盧遮那悉嚴淨世尊境界不思議智慧神通力如是則剎無邊矣具三世間者無邊剎海即器世間毗盧遍興即智正覺剎網所持如來所化即衆生世間言自在者三種世間互相即入隱顯重重皆無礙故華藏偈云華藏世界所有塵一一塵中見法界寶光現佛如雲集此是如來剎自在故無盡之義即是無邊况三皆無盡四釋文者此下二品説法儀式是當分方便即分為二初現相品為遠方便後三昧品為近方便今初一品大分為六一衆海同請二光召有緣三所召雲奔四現瑞表説五稱揚佛德六結通無窮今初先以五門料揀諸會請問之殊一問之有無二所問法異三能問人別四儀式不同五疑之權實初中前二後二此四有問中五皆無謂初會標果起因故問第二會尋因至果故問但因有升降寄六會以答之果無差別第七當會答也然諸會更有問者並當會別義以總𭣣之或重明於前非大位問第八會明因果純熟故須有問謂行修無礙六位頓成故當會答第九會明稱性因果故別有問謂俱入法界無差別故亦當會答四處都有三百一十句問謂初及第二各四十問第八二百第九三十中本廣本問則難思初舉摽果者舉果即是摽果勸樂生信即是起因第二會等者次第修因即是尋因契果即為至果果無差別者有二義一對上六會不同今但第七一會中答由第七會六品是因不言一會答也二者不對前六但第七會中六品因圓五品果滿與因同會故云當會當會因圓中即明果滿故云當會此中應有問云若果無差別何不別一會答故今答云欲顯因圓便得果滿故當會答若更別會便與因圓不相攝故故前六品望前是因望後屬果然諸會下通妨為有問言九會之中皆有問答何判唯四如第二會中十首相問第三會中正念天子及天帝釋俱問法慧第四會中精進林問功德林答第六會中解脫月問金剛藏答第七會中大衆念問如來功德豈非問耶唯第五會無有別問何得獨判唯四會問故今答云並當會別義耳以總𭣣別者第二會問但十信𭣣第三會問即十住𭣣第四會問即十行十藏所𭣣等故云以總𭣣之或重明者如不思議法品十問但重舉第二會初後十問耳謂已答因竟將欲答果因果懸絶故於果初重復念請亦表果德是所重故第八會明因果者初會已信次七已解故云純熟謂行修無礙下彰當會答由由二義故當會答之一行修無礙故謂取前六位所修之行諸位通修不隨位局故云無礙既沒位名則無優劣故當會答二者六位頓成設爾有位一時頓成異乎約解差別因果故一會答此云當會者當會問答第九會者謂既證法界則異前八前八但明於信及解行故四處都有下結成問數二所問異者初兩會問果廣因略為成信解故第八會問因廣果略為成行故第九會問全同初會而因舉主佛之因明因是果因顯唯證故初兩會者初會四十句問初二十句問果次十句通問因果唯後十句問因故云因略第二會四十問唯第二十句問因餘三十句皆是問果故云果廣初會為成於信舉果令信故第二會為成於解果相難知故廣舉之第九會問者此中十因皆云一切菩薩即通餘也法界中十因但云顯示如來往昔趣求一切智心往昔所起菩薩大願等故是主佛之因言明因是果因等者釋成第九舉主佛因義謂因是得佛竟因非是菩薩正修之因因果皆證入故三能問人異者初及第九皆同生異生二衆齊問以所問法衆同依故第二會中唯同生問以所入位問生勝故八唯同生一人自問以造修之行各自成故四請問儀式復有二義一約言念二約通別初中請有二種一言二念答亦有二一言答二示相交絡相望應成九句在文唯四初會之中具二問答謂現相品長行念請供聲言請初光示法主現華表義現衆表教即示相答三昧品中以言重請下之三品亦以言答第二會唯念請如來示相答菩薩言説答佛心自在不待興言佛力殊勝現相能答第八會言請言答此顯菩薩不同佛故第九會念請示相答顯以心傳心唯證相應離言説故二通別者初後二會別問通答二八兩會別問別答又初會亦得是別問別答次文當明交絡相望者一言請言答二言請示相答三念請言答四念請示相答五言請言及示相答六念請言及示相答七言念請言答八言念請示相答九言念請言説示相答初四以單望單次二以單問對復答次二以復問對單答後一復問復答今會正當第九第二會即第六句第八會即第一句第九會即第四句第五疑之權實者問諸王菩薩位皆圓極何得有疑有云為衆生疑故有云希佛果故又顯因果懸隔故然上二解初權後實並皆有理可通餘教然此經中若實若權無非法界之疑以疑為有力與所説證為緣起故此事舊爾海印頓現疑之與答念念常疑念念常斷其猶像模因模之高成像之下因模之下成像之高緣起法界理應爾故然此經中下中正義非斥權實為不當理但成緣起有異昔人言此事舊爾者法界之中法爾有此疑與答故海印頓現者疑之與答皆佛現故由上二義故疑答皆常其猶像模者假以喻顯以模喻疑以像喻答像因模有答假疑成爾時諸菩薩及一切世間主作是思惟次正釋文文分二別先長行念請後供聲偈請前中亦二先舉人標念謂盡於衆海皆希佛境並欲利生成緣起門故標同念二云何下正顯問端有四十句且分二別前二十句直爾疑念請後二十句引例舉法請準義二文皆應具舉互有影略不欲繁辭故下偈中更不引例合二處文直爾請説第二會中亦有此二而引例中問同此直請正欲顯於諸佛道同影略之義皆希佛境者總收上三皆希佛境即上實疑並欲利生即是權疑成緣起門即是正義故入大乘論第一偈云薄福之人不生於疑能生疑者必破諸有故下偈中下以義成立引二文證一引偈文直爾問中已具列故二引後會彼中引例同此直請彼中直請同此引例二文相對則直爾引例皆合四十其義明矣正欲顯下結成上義既引例直問皆具四十明是道同佛道既同知文影略所以要此二勢問者直請以尊主佛引例為顯道同故又四十句中初二十句問果後十問因中間十句明化用普周通問依正染淨因果前是所求後是所行中是所知故分是舉果故先問果分是舉果下通妨此有二妨一對上言因是所行理合在前故今答云分是舉果故先問果三釋文據斯義類亦可分三今以兩𫨻皆有結請故但分二前中亦二先正疑念後明結請今初前十句問德用圓滿後十句問體相顯著今初十句文唯有八偈有神通及自在二問世界成就品初答中亦同此有今文闕者或是脫漏或是義含無能攝取之中攝此二故故下法界品中闕無能攝取及與神通唯有自在故此三事合則可一開則為三故出沒不同二據斯下對科文難既義有三節何不分三以義從文故分為二二𫨻之中皆有結故故此三事等者可一故沒可三故出此文無能攝取中攝於自在及與神通法界品中復以自在攝於神通及無能攝取亦合有於神通攝無能攝取及與自在問中略無餘經則有云何是諸佛地言佛地者即智德分位即智德者正是出體非斷德故言分位者便彰地義然此經宗通𭣣萬德故廣則無量略有十種如上所引同性經説然體不出五謂清淨法界及與四智以斯五法攝大覺性具如佛地經及彼論説然要唯有二無所不攝謂真理妙智融而無二是諸佛地然此經宗下二辨類自寬之狹總有五重一無量法界融故二略有十者顯無盡故三然體不出五者尅實體故具如佛地經者即五法攝大覺性謂一真法界四智菩提又論第一釋佛地名云地謂所依所行所攝即當所説清淨法界大圓鏡智平等性智妙觀察智成所作智受用和合一味等事是佛所依所行所攝故名佛地然要唯有二下第四攝五為二五法之中四是智故金光明云唯有如如及如如智獨存名法身故疏而無二者五攝二為一謂無有智外如為智所證亦無如外智能證於如故融無二又融無二者總融五節為無障礙如來地矣並有生成住持功能故名為地並有生成者三釋名此有三義一能生萬德二成熟自他三任持萬德萬德依住故如下十地中明此句為總該攝諸德下明佛果皆答斯問此句為總下四結示結示是總總持諸德及示答文云何是諸佛境界二佛境界下諸句皆別明佛地之德言境界者悲智所緣故亦分齊故廣亦無量略有十種如出現及問明不思議品廣説三廣亦無量下三約類開合亦有五重一廣亦無量無有一境非佛境故二略有十種下寄圓説十於中有二先正説三種十然出現多明體遍不思議品以辨超勝故云十種無比境界問明該其因果體用小有不同至文當知然出現等者二揀三處不同謂出現品即五十二云佛子菩薩以無障無礙智慧知一切世間境界是如來境界知一切三世境界一切剎境界一切法境界一切衆生境界真如無差別境界法界無障礙境界實際無邊際境界虛空無分量境界無境界境界是如來境界佛子如一切世間境界無量如來境界亦無量如一切三世境界無量如來境界亦無量乃至如無境界境界無量如來境界亦無量如無境界境界一切處無有如來境界亦如是一切處無有等釋曰此即明體遍義也言多明者一切處無有亦顯深義也不思議品者四十六經云所謂一一切諸佛一加趺坐遍滿十方無量世界二一切諸佛説一義句悉能開示一切佛法三放一光明悉能遍照一切世界四於一身中悉能示現一切諸身五於一處中悉能示現一切世界六於一智中悉能決了一切諸法無所罣礙七於一念中悉能遍往十方世界八於一念中悉現如來無量威德九於一念中普緣三世佛及衆生心無雜亂十於一念中與去來今一切諸佛體同無二是為十上八句初皆有一切諸佛之言釋曰既一念能為無盡之事故云超勝問明該其因果者即十三經問有十一謂一何等是佛境界二何等是佛境界因三度四入五智六法七説八知九證十現十一廣上九皆有何等是佛境界之言初一是總二即是因智證知廣四句皆體餘五皆用偈中答云如來深境界其量等虛空一切衆生入而實無所入此雙答總及廣二句又云如來深境界所有勝妙因億劫常宣説亦復不能盡此即答因餘如彼文上三雖同佛境説意小殊故云小有不同若凖瑜伽如來境界謂五界差別一有情界二世界三法界四調伏界五調伏加行界或説要唯有四一所緣真俗二所住剎海三所起業用四所應攝化並如下説此與瑜伽大同總唯有二謂佛即境約分齊説或佛之境約所觀化等今文多顯佛之境也謂佛即境者分齊謂如來所成一切功德智慧等是佛所有如一國境屬於當國之王而菩薩不測唯佛得故言佛之境者真如實相真俗二諦等是智所緣境故云所觀衆生國土等是佛悲所化境故云所觀化等云何是諸佛加持三佛加持者謂佛勝力任持令有所作廣亦無量略有十種如不思議法品及法雲地説離世間品十種佛所攝持亦其例也然不出三類一如加持化身及舍利等二如加耆域入火不燒等三如加非情作佛事等此與神通寬狹不同謂六通中唯神境一有加持故今此加持即是神力略有十種者此舍二𫨻一即四十六經十種為衆生作佛事何等為十所謂一一切諸佛示現色身為衆生作佛事二出妙音聲三有所受四無所受五以地水火風六神力自在示現一切所緣境界七種種名號八以佛剎境界九嚴淨佛剎十寂寞無言皆上有一切諸佛下有為衆生作佛事之言故下開為三類中云三加非情作佛事等二即四十七十種大那羅延幢勇健法故疏結云今此加持即是神力及法雲地者即十種持經云又如實知佛持法持僧持業持煩惱持時持願持供養持行持劫持智持如是等皆如實知離世間品者即五十八經云所謂初始能發菩提之心佛所攝持二於生生中持菩提心今不忘失佛所攝持三覺諸魔事悉能遠離四聞諸波羅蜜如説修行五知生死苦而不厭惡六觀甚深法得無量果七為諸衆生説二乘法而不證取彼乘解脫八樂觀無為法而不住其中於有為無為不生二想九至無生處而現受生十雖證得一切智而起菩薩行不斷菩薩種皆有佛所攝持之言一如加持者如此類甚多謂化現多身隨所樂見碎身舍利一興供養千返生天全身舍利如多寶佛即是如來力持身也如出現品醫王留身喻等二如加耆域者即涅槃第三十南經二十八經云我於爾時往瞻婆城中時彼城中有大長者無有繼嗣供事六師以求子息於後不久其婦懷妊長者知已往六師所歡喜而言我婦懷妊男耶女耶六師答言必是其女長者聞已心生愁惱復有知識來謂長者何故愁惱乃至是耶長者答言我婦懷妊未知男女故問六師六師見語如我相法生必是女我聞是語自惟年老財富無量如其非男無所付囑是故我愁知識復言汝無智慧下取意引廣讚佛德令問世尊長者即至佛所而問佛言世尊我婦懷妊六師相言生必是女是事云何佛言長者汝婦懷妊是男無疑其兒生已福德無比六師聞已心生嫉妬乃以菴羅果和合毒藥授其長者令其妻服語云若服此藥兒則端正産者無患服已便死送至城外以火焚之如來知之便往冢間長者難言所言無二可名世尊母已終亡云何生子我言長者汝於爾時都不見問母命長短但問所懷為是男女諸佛如來發言無二是故當知定必得子是時死尸火焚腹裂子從中出端坐火中猶如鴛鴦處蓮華臺我於爾時尋告耆婆汝往火中抱是兒來六師止之耆婆言如來使我入阿鼻地獄所有猛火尚不能燒况世間火爾時耆婆前入火聚猶入清涼大河水中抱持是兒還諸我所授兒與我我授兒已告長者言一切衆生壽命不定如水上泡衆生若有重業果報火不能燒毒不能害是兒業報非我所作長者請佛立字佛言是兒生於猛火之中火名樹提應名樹提爾時會中見我神化無量衆生發阿耨多羅三藐三菩提心故云如加耆婆入火則入火之言兼於二事一如向緣二如耆婆所言佛令入阿鼻地獄猛火不燒復有一緣即令入地獄問提婆達多事也云何是諸佛所行四所行者是佛所作或説十種如不思議品云諸佛世尊有十種化不失時等諸佛所行有十種化者即四十六經云佛子諸佛世尊有十種化不失時何等為十所謂一切諸佛成等正覺不失時二成熟有緣三授菩提記四隨衆生心示現神力五隨衆生解示現佛身六住於大捨七入諸聚落八無諸淨信九調惡衆生十現不思議諸佛神通皆上有一切諸佛下有不失時言亦是所行之行如出現品謂無礙行是如來行等或大悲攝生或大智造緣無思成事方便善巧所作究竟皆名為行亦是所行者二約所行釋先引文謂無礙行是如來行等者即五十二經云佛子菩薩摩訶薩應云何知如來應正等覺行佛子菩薩摩訶薩應知無礙行是如來行應知真如行是如來行佛子如真如前際不生後際不動現在不起如來行亦如是不生不動不起下舉鳥飛虛空前後無際况真如行金翅闢海喻無礙行廣如彼文或大悲下二類釋亦成上義大悲攝生即無礙行大智造緣即真如行無思成事成上二義亦該通所緣然約人望行標云所行既是所作實通能所故不同彼境界之中彼智所觀所應攝化但就所故況所望不同故不相濫然約人下三揀濫以經云所行濫於境界是悲智所行故於中初正揀謂佛是能行故悲智之行是所行非如於境悲智是能行真如衆生是所行也故云約人望行摽云所行况所望不同者上行通能所境唯局所已是不同設同取悲智行約所行以用悲智境約能行以用悲智如人望子名父望父名子一人二用豈相濫耶若凖瑜伽七十八中引深密經佛答文殊此二別相云所行謂一切種如來共有不思議無量功德莊嚴淨土如來境界謂一切種五界差別五界如前若凖瑜伽下二引證以釋二相不同經當第五五界全同瑜伽然瑜伽全寫深密為論今引瑜伽引經者欲雙引經論故云何是諸佛力五佛力者即佛大力自在廣有無量略説有十即處非處等又有十種謂廣大力等如不思議品謂廣大力即四十七云佛子諸佛世尊有十種廣大力最上力無量力大威德力難獲力不退力堅固力不可壞力一切世間不思議力一切衆生無能動力大那羅延幢勇健法何等為十所謂一切諸佛身不可壞等為一此上十力遍於十種勇健法廣如彼文今略舉其名一身命不可壞力二毛孔容持力三毛持大山力四定用自在力五常遍演法力六德相降魔力七圓音遍徹力八心無障礙力九法身微密力十具足行智力一一力中有多義理具於下文云何是諸佛無所畏六無畏者無諸畏懼故離世間品説有十種無畏或説四種如常所明昔云前四是異二乘功德佛力是破魔功德無畏是伏外道功德未必全爾十力無畏亦不共二乘故然上來多明大智功德離世間者即五十六云佛子菩薩摩訶薩有十種無畏何等為十經文浩博今當義引謂一聞持無畏二辨才無畏上二不畏不能答難三二空無畏此不畏妄念四威儀無無畏五三業無過無畏上二不畏外譏六外護無畏此不畏天魔外道七正念無畏不畏遺忘八方便無畏不畏生死九一切智無畏不畏二乘十具行無畏不畏不能化生或説四種者即十藏品辨謂一一切智無畏二漏盡無畏三出障道四出苦道未必全爾者非不許昔解但顯義包含耳云何是諸佛三昧七佛三昧者謂佛果等持數過塵算如師子嚬呻等略説十種如不思議品説佛有無量不思議三昧等如師子者六十一經略列百門初名普莊嚴法界三昧二名普照一切三世無礙境界三昧最後云師子嚬呻三昧結云以如是等不可説佛剎微塵數三昧入毗盧遮耶如來念念充滿一切法界三昧大神變海略説十種者即四十七經云所謂一切諸佛恆在正定於一念中遍一切處普為衆生廣説妙法二普為衆生説無我際三普入三世四普入十方廣大佛剎五普現無量種種佛身六隨諸衆生種種心解現身語意七説一切法離欲真際八演説一切緣起自性九示現無量世出世間廣大莊嚴令諸衆生常得見佛十令諸衆生悉得通達一切佛法無量解脫究竟到於無上彼岸每句皆有一切諸佛恆在三昧於一念中遍一切處之言一如初句云何是諸佛神通八凖答及頌名佛神通者謂依定發起無礙神用或説有十如十通品不思議品云一切諸佛有無邊際無礙解脫示現無盡大神通力十通唯局菩薩或説有六如常所辨然名通大小或説有十者一他心智通二天眼智通三知過去劫宿住智通四盡未來際劫智通五無礙清淨天耳智通六無體性無動作往一切佛剎智通七分別一切言辭智通八無數色身智通九一切法智通十入一切滅盡三昧智通不思議品者義引經文無礙解脫一句牒經示現無量大神通力顯此解脫是神通解脫如淨名不思議解脫能以須彌內芥子等故經云何等為十所謂一切諸佛能於一念現不可説不可説諸佛出興於世二轉淨法輪三衆生受化調伏四諸佛國土五菩薩受記上五皆有一切諸佛能於一塵現不可説不可説言一如初句下五句但無不可説不可説言餘同上有謂六現去來今一切諸佛七現去來今一切世界八現去來今一切神通九現去來今一切衆生十現去來今一切佛事釋曰既皆一塵頓現明是大神通力十通唯局菩薩者欲生下六通通二乘故六謂天眼天耳他心宿住神境漏盡云何是諸佛自在九凖答及頌名佛自在謂所作任意無礙成就故廣有無量或説百種謂於衆生自在等各有十故略有十種謂命自在等並如離世間品説不思議品亦説有十謂諸佛世尊於一切法皆悉自在等廣有無量者歷事別明故或説百種者即五十六經初列十門云佛子菩薩摩訶薩有十種無礙用何等為十所謂衆生無礙用國土無礙用三法四身五願六境界七智八神通九神力十力皆有無礙用言下釋一一各有十門故成百也略有十種者即五十五經末云佛子菩薩摩訶薩有十種自在何等為十所謂命自在不可説劫住壽命故心自在智慧能入阿僧祗三昧故資具自在能以無量莊嚴莊嚴一切世界故業自在隨時受報故受生自在於一切世界示現受生故解自在於一切世界見佛充滿故願自在隨欲隨時於諸剎中成正覺故神力自在示現一切大神變故法自在示現無邊諸法門故智自在於念念中示現如來十力無畏成正覺故是為十若諸菩薩安住此法則得圓滿一切諸佛諸波羅蜜智慧神力自在不思議品者即四十六云何等為十所謂一切諸佛於一切法悉得自在明達種種句身味身演説諸法辨才無礙是為諸佛第一自在法下略取意上即法自在二心自在三勝解自在四財自在五命自在六如意自在七智自在八業自在九生自在十願自在然上二經與八地全同云何是諸佛無能攝取十無能攝取者頌名無能制伏答中名無能毀壞謂佛所作無有天上人中沙門魔梵及諸二乘大菩薩等神力能制是故舊經翻為佛勝法也略有十種如不思議品諸佛有十種最勝法等如不思議品者即四十六經一順晉經佛最勝法言故引此文經云所謂一切諸佛大願堅固不可沮壞所言必作言無有二二為欲圓滿一切功德盡未來劫修菩薩行不生懈倦三為欲調伏一切衆生故往不可説不可説世界如是而為一切衆生而無斷絶四於信行二種衆生大悲普觀平等無異五從初發心乃至成佛終不退失菩提之心六積集無量諸善功德皆以回向一切智性於諸世間終無染著七於諸佛所修學三業唯行佛行非二乘行皆回向一切智性成於無上正等菩提八放大光明其光平等照一切處及照一切諸佛之法令諸菩薩心得清淨滿一切智九捨離世樂不貪不染而普願世間離苦得樂無諸戲論十愍諸衆生受種種苦守護佛種行佛境界出離生死遠十力地是為十每句之上皆有一切諸佛之言一同初句若取無能毀壞即十種大那羅延幢勇健法是上之十問多在不思議品至下當知若取無能壞者二依今經釋大勇健法前文已引則義有兩兼多在不思議者亦有離世間等故致多言云何是諸佛眼云何是諸佛耳云何是諸佛鼻云何是諸佛舌云何是諸佛身云何是諸佛意云何是諸佛身光云何是諸佛光明云何是諸佛聲云何是諸佛智二云何是諸佛眼下十句問體相顯著謂六根三業於身業中開常光為身光放光為光明故有十句不思議法品諸佛有十種法普遍無量無邊法界謂無邊際眼等離世間品一一各有十門辨釋不思議法品者即四十六經云何等為十所謂一切諸佛有無邊際身色相清淨普入諸趣而無染著二無障礙眼於一切法悉能明見三無障礙耳悉能解了一切音聲四鼻能到諸佛自在彼岸五有廣長舌出妙音聲六身應衆生咸令得見七意住於無礙平等法身八無礙解脫示現無盡大神通力九消淨世界隨衆生樂現衆佛土具足無量種種莊嚴而於其中不生染著十菩薩行願得圓滿智遊戲自在悉能通達一切佛法佛子是為如來應正等覺普遍無邊際十種佛法其一一句上皆有一切諸佛有無邊際言一如初句但第五舌無無邊際言以廣長替故離世間品者即第五十七經謂十眼十耳等十眼者一肉眼二天眼三慧四法五佛六智七光明八出生死九無礙十一切智其十耳十鼻等廣如彼文辨然彼是菩薩眼等而下結皆云則得佛眼等故通因果可釋佛眼等又出現品説佛三業各具十義然諸經論説佛常光一尋凖不思議品常妙光明不可説不可説種種色相以為嚴好為光明藏出生無量圓滿光明普照十方無有障礙又出現品者身在五十經語意在五十一各有十義並以十喻喻之常妙光明者即四十六經十種莊嚴中第七莊嚴文云一切諸佛皆有無量常妙光明不可説不可説種種色相以為嚴好為光明藏出生無量圓滿光明普照十方無有障礙是為諸佛第七最勝無上常妙光明莊嚴然放光則有時不放如諸會面門毫相所放之類然相海品其一一相常放光明斯即放光亦通常光而分別者常即湛遍放則見有去來故然放光下通伏難恐有難言若常光一尋與放光異今常光周於法界何異放光故為此通而分別者下亦通妨難謂上通放光異常光者則放光有時不放今引相海常放光如何取別故為此通言佛智者廣即無量略説有十體不出五謂清淨智及大圓鏡等四智要唯有二謂根本後得總攝唯一諸法實相無障礙智此之十句多如相海及隨好品廣即無量者隨事無邊故略説有十者即如出現品第五十一經明意業中如來心意識俱不可知但以智無量故知如來心説有十智十喻是也體不出五者即攝論佛地論皆言五法攝大覺性謂一真法界四智菩提則是一理而非是智今清淨智即一真法界清淨智即本來智性金剛頂瑜伽説有五智初法界清淨智即一真法界故唯願世尊哀愍我等開示演説二惟願下結請將欲引例故且結請又十方世界海一切諸佛皆為諸菩薩説世界海衆生海法界安立海佛海佛波羅蜜海佛解脫海佛變化海佛演説海佛名號海佛壽量海二又十方下引例舉法請亦分為二初引例後結請今初分二前十句問化用普周後十句問因德深廣今初文唯有九闕安立海一世界海者是化用處如華藏品二衆生海是所化機即剎中所持三凖答及頌名法界安立海如世界成就品通明法界所安立海起具因緣等故若因緣者賢首云所化生法也亦是前二於法界中施設安立故諸經論皆説世諦為安立諦然安立言梵云奈耶而義多含或云理趣或云方便或云法式或云法門或云安立故知即安立法式也通明法界者有三釋初即疏意言通明者謂世界海唯約果説法界安立海通因通果由具因果能安立法界故二賢首云所化生法復是一義唯取化生之法亦是前二下是第三義安立衆生世界故前二即世界海及衆生海於中有二先正明後然安立言下引梵文證此是賢首引證後二義法式即化生法也安立即第三義故結云安立法式四佛海者能化生也如華藏品廣舉其名亦如不思議等品四佛海指不思議等品者等取相海隨好皆佛德相用故是妙覺故五波羅蜜海者化所成行如離世間品五波羅蜜指離世間品者以二千行法一一皆到彼岸故六佛解脫海者化所得果如法界品六如法界品者佛親證入離障解脫及大作用皆解脫故七佛變化海者臨機神變化難化衆生即身業化也如諸會不起而遍光明覺品長行身業阿僧祗等皆是其文七指僧祗者僧祗偈頌廣顯佛德重重無盡廣大用故等即等於一經上下變化之文八佛演説海者稱根説法語業化也如四諦品九佛名號海隨機立稱如名號品十佛壽量海者隨器所感住世修短如壽量品及一切菩薩誓願海一切菩薩發趣海一切菩薩助道海一切菩薩乘海一切菩薩行海一切菩薩出離海一切菩薩神通海一切菩薩波羅蜜海一切菩薩地海一切菩薩智海二及一切下問因德深廣中一創於生死立大誓願二勝進大心趣求佛果三積集菩提福智資糧四運諸菩薩從因至果五慈悲喜捨四菩薩行六謂永背業惑證契真理餘四可知因德深廣下正釋經然此十句有通有別別則初二寄十信次二十住次一十行次一十向以向出離故次三登地已上後一等覺此約橫論一切菩薩別則下釋別先以竪釋別諸位淺深故此約橫論一切菩薩者結上別義約所行位信住等異即是竪論約能行人一一位中攝多菩薩故云橫論一切菩薩若約通説各通始終即豎論一切菩薩通約所行法位位同修即是通義隨約一人遍歷諸位皆修此十即是竪論一切菩薩故此十句文通行位然皆普攝法界深廣無邊故云海也並如下諸會説通行位者三雙結也別説寄位通説約行故願佛世尊亦為我等如是而説二願佛下結請既是引例故致亦言此四十句答文在何問有通局答亦如之通即諸會與此相應皆是答此上所引者居然當之謂前衆海既是九會常隨豈得此問局於初會豈復衆海問不𥁞耶故知初會為總九會同答此問而為分意別故諸分初皆重舉諸問則顯分分之中皆通因果等故則從此𥁞光明覺答十海問問明已下答十因問不思議下答二十句果至下當知疏正明通謂九會通答謂前下立理此有三理一衆海常隨既通九會問答合通智深能問盡故合總問故以此三理問答合通而為分下釋妨謂前問言若言衆海問盡九會九會同答何以下文復有三位大問故為此通則顯分分之中皆通因果者謂問雖互有廣略因果皆足則是重問耳四則從下正示答文又就四十問十海為總九會同答十海一世界成就品答世界安立海二華藏品答世界海遮那但引因釋成現相三昧但是説法由致並非別答海問三名號品答如來名號海四四諦品答演説海五光明覺至十忍品別答十句因問通答衆生海修因之人即所化生故六阿僧祇品答變化海長行舉數欲顯化用難量故偈中廣明變化重重微細難説七壽量住處皆答壽量海八不思議等五品別答二十句果問總明佛海就德深廣以顯佛故九第八會答波羅蜜海總攝諸位皆成行故十第九會答解脫海證入法界起大用故又就下二約總別釋十海為總餘三十句別皆十海攝故總答十海已答餘三十問於中二先正以九會答於十海問中為次與答異者問約本有修成自行化他而為次第謂先有世界衆生則有佛出修因得果故波羅蜜海是因解脫是果餘四皆大用謂臨機變化隨宜説法稱物立名隨物修短答中先人後己故大用四海居先自利因果二海居後又衆生一海亦可通在九海皆為生故種種隨宜顯生多故後問中為次下以答對問辨次不同問中言先有世界衆生者即摽中本有三海世界即世界海及攝安立海故次則有佛出修因得果等者即摽中修成即自行意言餘四皆大用臨機等即摽中化他也先人後己下先利他故大用四海即先利他言四海者一名號海二四諦海三變化海四壽量海言自利二海居後者即波羅蜜海為因佛解脫海為果八九兩會答故居後此中唯會六海不會四海者以世界海及安立海依問在前故佛及衆生本居中故更以異門釋衆生海上欲具𭣣十問故以答因屬衆生海今以衆生為總即前答因屬演説海説諸位故上來通竟若約局言當會答𥁞此復有二一現相答下文當示二者言説答此亦有二一經來未𥁞二答二兼餘成就品當引若約局言下第二釋局答問經來未盡者遮那品後無結束故若來應具答盡二答二兼餘者謂正答安立海及世界兼餘三十八問故爾時諸菩薩威神力故於一切供養具雲中自然出音而説頌言第二爾時下供聲偈請中分二先明因緣後正説偈今初前請在念佛雖已知今請彰言使大衆同曉前既為法興供今乃以供宣心不因拊擊故曰自然非無因緣即菩薩威力同異生衆皆菩薩也又表身口為供具故供具皆即法界體故亦表身為供養具者即解脫和尚歎佛説偈云合掌以為華身為供養具善心誠實香讚歎香煙布諸佛聞此香尋聲來相度衆等勤精進終不相疑誤無量劫中修行滿菩提樹下成正覺為度衆生普現身如雲充遍盡未來衆生有疑皆使斷廣大信解悉令發無邊際苦普使除諸佛安樂咸令證二正説偈中十頌分二初三歎德請後七舉法請前中亦二初二歎佛明具説因後一歎衆明具説緣今初也前偈即悲之智已滿為物現身後偈即智之悲已圓能斷疑除苦有悲必普有智必能故應説也菩薩無數等剎塵俱來此會同瞻仰願隨其意所應受演説妙法除疑惑後一歎衆請中前半歎衆顯無異念後半結請明説則斷疑云何了知諸佛地云何觀察如來境佛所加持無有邊願示此法令清淨云何是佛所行處而以智慧能明入佛力清淨廣無邊為諸菩薩應開示云何廣大諸三昧云何淨治無畏法神通力用不可量願隨衆生心樂説諸佛法王如世主所行自在無能制及餘一切廣大法為利益故當開演舉法請中分三初四述前初十句問小有不次但取文便及餘一切廣大法者結例所餘謂二十句外佛無邊德亦願説之不思議品廣説餘門諸説果處皆答此也佛眼云何無有量耳鼻舌身亦復然意無有量復云何願示能知此方便次一頌述前體相顯著十句略示可知如諸剎海衆生海法界所有安立海及諸佛海亦無邊願為佛子咸開暢永出思議衆度海普入解脫方便海所有一切法門海此道場中願宣説後二頌述化用普周十句之問現文唯七以佛海中含於神變壽量名號以此三海不離佛故不問因者長行明通諸會故列因疑今彰初分請當會答又顯此會因略果廣第二會果略因廣故爾時世尊知諸菩薩心之所念第二爾時世尊下明光召有緣分長分為十一放光意以領念故供聲易了故略不明念但疑法何以放光現相答故答相云何謂佛三昧力加持放光令菩薩來遠遠能為此即佛地境界是佛所行無攝無畏故此為總意若別明者如文思之又召來菩薩亦是言答上之十問至文當知若別明者如文思之者若此之類顯義無方類例相似即可引證耳即於面門衆齒之間二即於下明光依處面門即口言衆齒者表四十問教道遐舒口生真子咀法滋味益法身故總處放者此會總故門即口者以昔有解云門即之正容非其口也又云鼻下口上以梵音呼及口并門並云目佉是故譯者解人取文非一今以衆齒之間則口為定解表四十問者有四十齒故教道遐舒即教智光故口生真子唯取口義故法華云從佛口生從法化生得佛法分故下出現加於普賢光明入口咀法味下約齒明義言總處者口為説法處一切法門總從此演故放佛剎微塵數光明三放佛下顯光體隨機多演故所謂衆寶華遍照光明出種種音莊嚴法界光明垂布微妙雲光明十方佛坐道場現神變光明一切寶焰雲蓋光明充滿法界無礙光明遍莊嚴一切佛剎光明逈建立清淨金剛寶幢光明普莊嚴菩薩衆會道場光明妙音稱揚一切佛名號光明四所謂下列光名略列十名皆從體用立稱如是等佛剎微塵數五如是下結光數一一復有佛剎微塵數光明以為眷屬六一一下彰眷屬其光悉具衆妙寶色七其光下辨色相衆寶隱映表教道含容普照十方各一億佛剎微塵數世界海八普照下明光應遠彼世界海諸菩薩衆於光明中各得見此華藏莊嚴世界海九彼世界下彼衆感通以佛神力其光於彼一切菩薩衆會之前而説頌言十以佛下偈聲命召即通舉十號示為所歸即通舉十號者佛德無邊十號略盡故法華第三云我是如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊未度者令度未解者令解未安者令安未涅槃者令得涅槃令世後世如實知之我是一切知者一切見者汝等天人阿修羅衆皆應到此為聽法故斯即舉十號以昭然初但云如來亦復如是出現於世如大雲起遍覆三千大千世界則通局有異又下衆集但云天人阿修羅等勝劣小異耳今取彼意故以十號釋經十號之義法界品方辨無量劫中修行海供養十方諸佛海化度一切衆生海今成妙覺遍照尊十偈在文且分為五初六偈自彰因果已圓勸同觀禮於中初一總明二利因滿成正遍知毛孔之中出化雲光明普照於十方應受化者咸開覺令趣菩提淨無礙次一毛光開覺是明行足佛昔往來諸趣中教化成熟諸群生神通自在無邊量一念皆令得解脫次一頌往來諸趣是世間解一念解脫可謂善逝摩尼妙寶菩提樹種種莊嚴悉殊特佛於其下成正覺放大光明普威耀次一頌成正覺即佛義焉大音震吼遍十方普為弘宣寂滅法隨諸衆生心所樂種種方便令開曉次一大音演寂謂無上士隨心開覺是調御丈夫往修諸度皆圓滿等於千剎微塵數一切諸力悉已成汝等應往同瞻禮次一諸力皆圓即天人師也十方佛子等剎塵悉共歡喜而來集已雨諸雲為供養今在佛前專覲仰二有一頌明衆海已集引例勸歸既云已雨諸雲為供是應供也為對引例故不當次如來一音無有量能演契經深大海普雨妙法應群心彼兩足尊宜往見三一頌圓音隨機見必蒙益結云見兩足尊即世尊也三世諸佛所有願菩提樹下皆宣説一剎那中悉現前汝可速詣如來所四一頌義海頓演宜速及時如三世佛大願而來故結云如來也毗盧遮那大智海面門舒光無不見今待衆集將演音汝可往觀聞所説五一頌特命有緣是光本意音釋模莫胡切模範也嚬毗賔切拊斐父切彈也咀在吕切嗣嚼也妊如鴆切懷孕也塜知隴切高墳也翅施智切翼也沮壞沮在呂切遏也壞古聵切毀也軌範軌居洧切範音范軌範法式也
