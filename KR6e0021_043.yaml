body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述佛子菩薩在家當願衆生知家性空免其逼迫孝事父母當願衆生善事於佛護養一切妻子集會當願衆生冤親平等永離貪著若得五欲當願衆生除欲箭究竟安隱妓樂聚會當願衆生以法自娛了妓非實若在宮室當願衆生入於聖地永除穢欲著瓔珞時當願衆生捨諸偽飾到真實處上升樓閣當願衆生升正法樓徹見一切若有所施當願衆生一切能捨心無愛著衆會聚集當願衆生捨衆聚法成一切智若在厄難當願衆生隨意自在所行無礙今初在家有十一願初一總舉在家以家是貪愛繫縛所故若了性空則雖處居家家不能迫次一在家行孝願以是至德行本故首而明之大集經云世若無佛善事父母事父母者即是事佛父母於我為先覺故今翻令事佛者生長法身故護養一切者一切衆生皆我子故護之一切男女皆我父母故養之生生無不從之受身故平等敬之法身佛故以是至德等者即外典意故孝經夫子語曾子曰先王有至德要道民用和睦上下無怨汝知之乎注云至德者孝悌也要道者禮樂也故上至天子下至庶人皆當行孝無始終也言行本者俗典以孝為百行之本下引佛教證菩薩戒亦云孝養師僧父母孝名為戒亦名制止次四受家室等願然五欲射心猶如箭中王侯有宮餘皆名室次五在家所作事業等願在頸曰瓔在身曰珞珞以持衣瓔以繫冠一切悉捨亦捨心也了聚無性成佛智也捨居家時當願衆生出家無礙心得解脫入僧伽藍當願衆生演説種種無乖諍法詣大小師當願衆生巧事師長習行善法求請出家當願衆生得不退法心無障礙脫去俗服當願衆生勤修善根捨諸罪軛剃除鬚髮當願衆生永離煩惱究竟寂滅著袈裟衣當願衆生心無所染具大仙道正出家時當願衆生同佛出家救護一切自歸於佛當願衆生紹隆佛種發無上意自歸於法當願衆生深入經藏智慧如海自歸於僧當願衆生統理大衆一切無礙受學戒時當願衆生善學於戒不作衆惡受闍梨教當願衆生具足威儀所行真實受和尚教當願衆生入無生智到無依處受具足戒當願衆生具諸方便得最勝法第二捨居家下出家受戒時有十五願初一正捨俗家次三出家方便僧伽藍者此云衆園衆有六和法則事理一味故無諍也大師謂佛衆所宗故小謂和尚親所教故若約末世三師為大七證為小靡不有初鮮克有終故希不退次四正落𩭄出家袈裟者不正色依也亦云染色表心染於法要無所染方曰染也然二乘之染亦非真染必心染大乘故云具大仙道為於正法除其結使方為究竟寂滅落𩭄披衣之後為正出家然二乘等者即涅槃第二南經哀歎品佛訶三修比丘云汝諸比丘勿以下心而生知足汝等今者雖得出家於此大乘不生貪慕汝諸比丘身雖得服袈裟染衣心猶未染大乘淨法汝諸比丘雖行乞食經歷多處初未曾求大乘法食汝諸比丘雖除鬚髮未為正法除諸結使汝諸比丘今當真實教勑汝等我今現在大衆和合如來法性真實不倒是故汝等應當精進攝心勇猛摧諸結使釋曰此以小乘方大尚未能除所知無明染法空法常住妙法故云爾也餘七受學戒時初三自歸佛在之日則五受之一佛滅之後受五八戒必依三歸歸要三者翻彼外道邪師邪教及邪衆故猶如良醫良藥及看病人煩惱病愈故為與衆生為緣念故三寶之義至下當釋受學戒者即十戒也亦通五戒優婆塞戒經云欲受菩薩戒先應遍受五戒十戒二百五十戒若尼則受六事及五百戒受謂受戒學即隨戒願中即止作二持闍梨者此云正行軌範教授故云具足威儀和尚此云親教亦云力生道力自彼生故故翻云入無生智依之得戒故翻無依具足戒言義含二種一則大比丘戒二則菩薩戒亦制意地方為具足則五受之一者一善來二上法三三歸四八敬五羯磨多釋不同多依此五歸要三者前歸敬序中已廣説竟言至下當釋者即明法品前是抄廣故此指下和尚等者此是昔時梵語即龜茲以來梵言正云塢波陀耶此云親教具足戒等者依比丘戒則五八十皆為方便五衆之最為最勝法若菩薩戒為具足則比丘戒亦為方便超二乘上為最勝法願所成者明是佛果若入堂宇當願衆生升無上堂安住不動若敷牀座當願衆生開敷善法見真實相正身端坐當願衆生坐菩提座心無所著結跏趺坐當願衆生善根堅固得不動地修行於定當願衆生以定伏心究竟無餘若修於觀當願衆生見如實理永無乖諍捨跏趺坐當願衆生觀諸行法悉歸散滅第三若入堂下七願明就坐禪觀時願初四為修方便次二正修止觀後一修行事訖下足住時當願衆生心得解脫安住不動若舉於足當願衆生出生死海具衆善法著下裙時當願衆生服諸善根具足慙愧整衣束帶當願衆生檢束善根不令散失若著上衣當願衆生獲勝善根至法彼岸著僧伽梨當願衆生入第一位得不動法第四下足住時下明將行披挂時六願下衣蓋醜故願得慙愧上衣即衫襖之輩前已辨袈裟故此直云僧伽梨僧伽梨者義云和合新者二重故者四重要以重成故云和合即是三衣中第一衣故手執楊枝當願衆生皆得妙法究竟清淨嚼楊枝時當願衆生其心調淨噬諸煩惱大小便時當願衆生棄貪瞋癡蠲除罪法事訖就水當願衆生出世法中速疾而往洗滌形穢當願衆生清淨調柔畢竟無垢以水盥掌當願衆生得清淨手受持佛法以水洗面當願衆生得淨法門永無垢染第五手執楊枝下澡漱盥洗時有七願楊枝五利是曰妙法去穢為淨西域皆朝中嚼楊枝淨穢不相雜此為常規凡欲習誦別須用之盥者澡也楊枝五利者一明目二除痰三除口氣四辨味五消食新經有十義朝中嚼楊枝淨穢不相雜此兩句語全是無行禪師於西域寄歸之書南海寄歸傳亦廣説之手執錫杖當願衆生設大施會示如實道執持應器當願衆生成就法器受天人供發趾向道當願衆生趣佛所行入無依處若在於道當願衆生能行佛道向無餘法涉路而去當願衆生履淨法界心無障礙見升高路當願衆生永出三界心無怯弱見趣下路當願衆生其心謙下長佛善根見斜曲路當願衆生捨不正道永除惡見若見直路當願衆生其心正直無諂無誑見路多塵當願衆生遠離塵坌獲清淨法見路無塵當願衆生常行大悲其心潤澤若見險道當願衆生住正法界離諸罪難第六手執錫杖下乞食道行時總有五十五願更分為三初十二願遊涉道路次見衆會下十九願所覩事境後見嚴飾下二十四願所遇人物今初錫者輕也明也執此杖者輕煩惱故明佛法故更有多義具如經辨今略明二用一執為行道之儀二振以乞食故發相似之願無依之道是真道也向無餘法真涅槃也真淨法界心所履也險道有二一多賊鬼毒獸二狹徑阻絶初惑業罪苦凡夫之險道也後自調滯寂二乘之險道也皆為難處不斷生死而入涅槃正法界也若見衆會當願衆生説甚深法一切和合二覩事境願初覩衆會謂衆聚多談無義故願説深法衆心易乖故令和合若見大柱當願衆生離我諍心無有忿恨二大柱者舊經云大樹梵云薩擔婆去聲輕呼此云樹也薩擔婆入聲重呼此云柱也由茲二物呼聲相濫古今譯殊柱有荷重之能一舍由之而立翻此願離我能之諍忿恨何由而生若見叢林當願衆生諸天及人所應敬禮三德猶叢林森聳可敬若見高山當願衆生善根超出無能至頂見𣗥刺樹當願衆生疾得翦除三毒之刺見樹葉茂當願衆生以定解脫而為蔭映若見華開當願衆生神通等法如華開敷若見樹華當願衆生衆相如華具三十二若見果實當願衆生獲最勝法證菩提道若見大河當願衆生得預法流入佛智海若見陂澤當願衆生疾悟諸佛一味之法十一陂澤者畜水曰陂不集諸流故願一味若見池沼當願衆生語業滿足巧能演説十二説文曰穿地通水曰池沼即池也取其盈滿引法流故亦可巧思穿鑿能有説故若見汲井當願衆生具足辨才演一切法十三汲者取也辨才演法猶綆汲水若見涌泉當願衆生方便增長善根無盡若見橋道當願衆生廣度一切猶如橋梁若見流水當願衆生得善意欲洗除惑垢見修園圃當願衆生五欲圃中耘除愛草見無憂林當願衆生永離貪愛不生憂怖若見園苑當願衆生勤修諸行趣佛菩提無憂林者處之忘憂故見嚴飾人當願衆生三十二相以為嚴好三見嚴飾下二十四願所遇人物見無嚴飾當願衆生捨諸飾好具頭陀行見樂著人當願衆生以法自娛歡愛不捨見無樂著當願衆生有為事中心無所樂見歡樂人當願衆生常得安樂樂供養佛見苦惱人當願衆生獲根本智滅除衆苦六云獲根本智滅衆苦者若得見道無分別根本智則斷惡道業無明故三塗苦滅則三苦八苦亦皆隨滅死及取蘊直至金剛後根本智則能永斷三苦八苦等者由三塗苦滅故生老病苦亦滅由斷此惑不造十惡業故無怨憎會苦由斷分別欲貪故無求不得苦及愛別離苦從此唯有死及取蘊至金剛無間道根本智斷彼二苦雖有漏善法此時猶在行苦所隨由被勝智照同法性於解脫道不待擇滅任運棄捨功歸無間上約法相説取正體無分別智名為根本以望加行得名雖通諸位而見道金剛二處最顯故略舉之又有約法性以本覺為根本智以與始覺為根本故此唯約解脫道證理時與根本冥合乃名獲得本覺根本從此永無死及取蘊雖斷惑證理立二道名然同一剎那獲智亦爾是故無間道斷見修二障種時即是解脫道時斷也見無病人當願衆生入真實慧永無病惱七願入真實慧永無病惱者此有二種一約入真見道之慧斷身病之苦惱及煩惱病謂一切惡趣諸煩惱品所有粗重是分別起亦為身病遠因至歡喜地真見道中一剎那斷頓證三界四諦真如身病及惑永不復有二約金剛心慧頓斷一切諸煩惱病及習氣隨眠證極圓滿真實勝義諸惑永亡依上解者真實慧者即根本智但約所滅惑苦不同耳一約入真見道者亦有二義例同斷苦斷身病之苦牒前所斷及煩惱病是此所斷謂一切下出所斷體粗重即是種子分別揀於俱生亦為身病遠因者非近因故如房色過度是身病近因由貪故前即為遠因一剎那斷者至初地中廣釋頓證三界四諦真如至十回向中釋二約金剛心等者即俱生也此上所轉捨依上解下結成前二也見疾病人當願衆生知身空寂離乖諍法八四大乖違成病知空則永無所乖見端正人當願衆生於佛菩薩常生淨信見醜陋人當願衆生於不善事不生樂著見報恩人當願衆生於佛菩薩能知恩德見背恩人當願衆生於有惡人不加其報於佛菩薩能知恩德者諸佛菩薩始自發心普緣衆生難行苦行不顧自身垂形六道隨逐衆生見其造惡如割支體迄成正覺隱其勝德以貧所樂法誘攝拯救見其憍恣示迹涅槃留餘福教以濟危苦故自頂至足從生至死皆佛之蔭斯之恩德何可報耶得人小恩常懷大報不知恩者多遭橫死故經云假使頂戴經塵劫身為牀座遍三千若不傳法利衆生畢竟無能報恩者故唯自利利人如説修行為報佛恩耳諸佛菩薩下文中有三初列十恩一發心普彼思二難行苦行恩猶如慈母咽苦吐甘捨頭目髓腦國城妻子剜身千燈投形餓虎香城粉骨雪嶺亡軀如是等事皆為衆生三不顧自身者一向為他思曾無一念自為於己猶如慈母但令子樂自殺不辭經云菩薩所修功德行不為自己及他人但以最上智慧心利益衆生故回向四垂形六道思謂已證滅道應受無為寂滅之樂而垂形六道遍八三塗長劫救物人於地獄以身救贖一切衆生五隨逐衆生恩上辨橫遍六道今約長劫不捨如子見父視父而已無出離心如來隨之如犢逐母備將萬行隨逐救攝如須彌音遍淨天王得隨諸衆生永流轉生死海解脫門六見其造惡如割支體即大悲深重恩故善財童子謂無憂德神云聖者譬如有人唯有一子愛念情至忽見被人割截支體其心痛切不能自安菩薩摩訶薩亦復如是見諸衆生造煩惱業墮三惡趣受種種苦心大憂惱若見衆生起身語意三種善業生人天趣受身心樂菩薩爾時生大歡喜今略舉悲深喜亦深故七迄成正覺隱其勝德者即隱勝彰劣恩十蓮華藏塵相海滴難稱無盡之德並隱不彰但云百劫修成三十二相三十四心斷見修惑五分法身覺樹初圓如老比丘同五羅漢故法華中脫珍御服著弊垢衣執除糞器往到子所八以貧所樂法誘攝拯救即隱實施權恩圓頓一乘隱而不説乃以三乘人天小法教化衆生此上二句即淨名經第三香積品中彼諸菩薩問維摩詰今世尊釋迦牟尼以何説法維摩詰言此土衆生剛強難化故佛為説剛強之語以調伏之言是地獄是畜生是餓鬼是諸難處是愚人行是身邪行是身邪行報等乃云如是剛強難化衆生故以一切苦切之言乃可入律彼諸菩薩聞説是已皆曰未曾有也如世尊釋迦牟尼佛隱其無量自在之力乃以貧所樂法度脫衆生斯諸菩薩亦能勞謙以無量大悲生是佛土九見其憍恣示迹涅槃者示滅生善恩故法華經云若佛久住於世薄福之人不種善根貧窮下賤貪著五欲入於憶想妄見網中若見如來常住不滅便起憍恣而懷猒怠不能生難遭之想恭敬之心是故如來以方便説比丘當知諸佛出世難可值遇乃至云斯衆生等聞如是語必當生於難遭之想心懷戀慕渴仰於佛便種善根四十七經有涅槃佛事與此大同十留餘福教以濟危苦者即悲念無盡恩謂世尊同人中壽應壽百年留二十年福以庇未法弟子大集月藏分第十卷云悲愍衆生故捨壽第三分令我法海滿洗浴諸天人假使毀禁戒悉住不退地若有撾打彼即為打我身若有罵辱者則為毀辱我又云留白毫之福以覆弟子言留教者即三藏八藏廣益衆生依之修行皆得成佛形像塔廟乃至舍利一興供養千返生天等故自頂至足下結成恩重得人下引經證成共引三經初即涅槃第二十八二不知恩者即此經四十八隨好品故經云下三引他經先一偈具足經文唯自利下取意引彼亦一偈云唯有傳持正法藏宣揚教理施羣生修習一念契真如即是真報如來者會意可知若見沙門當願衆生調柔寂靜畢竟第一沙門此云止息畢竟止息唯大涅槃見婆羅門當願衆生永持梵行離一切惡見苦行人當願衆生依於苦行至究竟處見操行人當願衆生堅持志行不捨佛道見著甲胄當願衆生常服善鎧趣無師法世之甲胄隨於師旅進忍甲胄趣於無師見無鎧仗當願衆生永離一切不善之業見論議人當願衆生於諸異論悉能摧伏見正命人當願衆生得清淨命不矯威儀能離五邪方為正命謂一詐現奇特二自説功德三占相吉凶四高聲現威令他敬畏五為他説法行此五事若為利養皆邪命也第三句通願離五第四句但離初一能難五邪者即智論二十二其第五名稱説計得供養以動人心前四全同若見於王當願衆生得為法王恆轉正法若見王子當願衆生從法化生而為佛子若見長者當願衆生善能明斷不行惡法若見大臣當願衆生恆守正念習行衆善明斷方稱長者守王正法始曰大臣若見城郭當願衆生得堅固身心無所屈若見王都當願衆生功德共聚心恆喜樂見處林藪當願衆生應為天人之所歎仰第七若見城郭下二十二願到城乞食時願初三總處王都則賢達輻輳林藪則衆德攸歸入里乞食當願衆生入深法界心無障礙到人門戶當願衆生入於一切佛法之門入其家已當願衆生得入佛乘三世平等次三入家未入則諸家差別入已唯一無多如入佛乘無二三也見不捨人當願衆生常不捨離勝功德法見能捨人當願衆生永得捨離三惡道苦若見空鉢當願衆生其心清淨空無煩惱若見滿鉢當願衆生具足成滿一切善法若得恭敬當願衆生恭敬修行一切佛法不得恭敬當願衆生不行一切不善之法見慙耻人當願衆生具慙耻行藏護諸根見無慙耻當願衆生捨離無慙住大慈道次八乞食得不若得美食當願衆生滿足其願心無羡欲得不美食當願衆生莫不獲得諸三昧味得柔軟食當願衆生大悲所熏心意柔軟得粗澀食當願衆生心無染著絶世貪愛若飯食時當願衆生禪恱為食法喜充滿若受味時當願衆生得佛上味甘露滿足飯食已訖當願衆生所作皆辦具諸佛法次七得食正食若説法時當願衆生得無盡辨廣宣法要後一食訖説法亦為報施主之恩也其中云藏獲諸根者瑜伽名善守根門淨名云所見色與盲等乃至云知諸法如幻相是也瑜伽名善守根門者即第二十三論云云何根律儀謂如有一能善安住密護根門防守正念乃至廣説云何名為密護根門謂防守正念常委正念乃至防護意根及正修行意根律儀等淨名云所見色等者即迦葉章令迦葉以空聚想入於聚落所見色於盲等所聞聲於響等所嗅香與風等所食味不分別受諸觸如智證知諸法如幻相無自性無他性本自不然今則無滅等是故藏護諸根則不犯塵境成六自在王豈為六賊所劫奪耶從舍出時當願衆生深入佛智永出三界若入水時當願衆生入一切智知三世等洗浴身體當願衆生身心無垢內外光潔盛暑炎毒當願衆生捨離衆惱一切皆盡暑退涼初當願衆生證無上法究竟清涼第八從舍出下還歸洗浴時節炎涼五願可知諷誦經時當願衆生順佛所説總持不忘若得見佛當願衆生得無礙眼見一切佛諦觀佛時當願衆生皆如普賢端正嚴好見佛塔時當願衆生尊重如塔受天人供敬心觀塔當願衆生諸天及人所共瞻仰頂禮於塔當願衆生一切天人無能見頂右繞於塔當願衆生所行無逆成一切佛繞塔三匝當願衆生勤求佛道心無懈歇讚佛功德當願衆生衆德悉具稱歎無盡讚佛相好當願衆生成就佛身證無相法第九諷誦下習誦旋禮時有十願右者順義故普耀經第二亦云菩薩降神趣右脅者所行無逆故佛功德者謂如來十力等若洗足時當願衆生具神足力所行無礙以時寢息當願衆生身得安隱心無動亂睡眠始寤當願衆生一切智覺周顧十方第十若洗足下寤寐安息時三願一切智覺者非唯三世齊明抑亦十方洞曉一日始終既爾餘時類然佛子若諸菩薩如是用心則獲一切勝妙功德一切世間諸天魔梵沙門婆羅門乾闥婆阿修羅等及以一切聲聞緣覺所不能動第三佛子若諸菩薩下結歎因所成益若能如上為善用心若此用心則內德齊圓外不能動心遊大智故人天不能動心冠大悲故二乘不能動不動有二一修行時此等不能惑亂故二不希彼故音釋盥古玩切澡手也坌蒲悶切塵塕也陂彼為切澤也藪音叟鎧苦改切甲也矯居夭切詐也澀色立切寢七稔切臥也寤五故切寐覺也綆古杏切井索也輻輳輻方六切輳千候切䰂此宰切䰂髻也
