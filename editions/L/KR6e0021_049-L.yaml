body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述須彌頂上偈讚品第十四初來意者既明化主赴感今辨助化讚揚將演住門先陳體性性即佛智先讚如來故品來也先陳體性者即第二來意如前品明二釋名者須彌約處讚稱佛德依處有讚故立此名亦頂上之讚揀餘處也三宗趣者以集眾放光偈讚為宗為成正說為趣又顯佛德為宗令知住體為趣爾時佛神力故第四釋文總為三分第一集眾分第二放光分第三偈讚分今初文有十同義兼三異謂五六七一集因同皆佛力故亦同前會時十方各有一大菩薩二十方下主首同一各與佛剎微塵數菩薩俱三一一各下眷屬數同從百佛剎微塵數國土外諸世界中而來集會四從百佛下來處量同前十此百位已增故其名曰法慧菩薩一切慧菩薩勝慧菩薩功德慧菩薩精進慧菩薩善慧菩薩智慧菩薩真實慧菩薩無上慧菩薩堅固慧菩薩五其名下表法名同慧即十解能見法故菩薩名異至偈釋之所從來土所謂因陀羅華世界波頭摩華世界寶華世界優鉢羅華世界金剛華世界妙香華世界恱意華世界阿盧那華世界那羅陀華世界虛空華世界六所從來下世界名同同名華者位相創開無著感果故別即次第配於十住一發心主導世間故二淨治心地如蓮開故三修行圓淨故四水生之貴故五方便堅誓故六正心無相如香氣故七不退意恱故八阿盧那者此云日出時紅赤之相童真明淨故九那羅陀者此云人持以華香妙人皆佩故王子佩持法王軌度故十智徧如空故亦可別明十住勝進十法思之可知別即次第者下之所釋闇引經文如以主導世間釋因陀羅者因陀羅此云帝也主也即下𤼵心住勸學十法中云所謂勤供養佛樂住生死主導世間令除惡業乃至為苦眾生作歸依處皆為主義從二已下但取名上之義不引經文亦可別明者初之一住已引經文餘九思者二以治地勝進云習誦多聞虗閑寂靜近善知識了達於義等皆如蓮華開敷義故三謂觀察眾生法界等謂智寶故四為了知三世佛法等為最勝故五知眾生無邊無量無數不思議等為大乘如金剛誓願心故六學一切法無相無體不可修等如香氣故七說一即多說多即一文隨於義義隨文等可恱意故八知剎持剎觀剎詣剎領受佛法為明淨故九善學法王善巧軌度等為可持故十學十種智如空徧故各於佛所淨修梵行所謂殊特月佛無盡月佛不動月佛風月佛水月佛解脫月佛無上月佛星宿月佛清淨月佛明了月佛七各於下所事佛同同名月者表位中佛果智明闇息恩益清涼應器周故別名即十住自分十法之果智明闇息等者月有四德合佛三法明是智德闇息斷德清涼思德應器周故亦是恩德又具上三德故能徧應別名即十住者前剎配勝進故此配自分具如下文一以十難得法可謂殊特二發十大心不可窮盡三觀於空等不可傾動四了知業行生死涅槃如風不住五饒益安樂一切眾生如水普潤六聞十種法心定不動故得解脫七聞十不退可謂無上八三業無失如星明淨隨意受生燦然滿空神足自在若依空運轉九善知煩惱現起習氣故得清淨十觀察無數眾生根欲智慧心境餘不能知唯自明了以此十因成茲十佛上且隨要相屬以為此釋委明其相如十住文是諸菩薩至佛所已頂禮佛足八是諸已下申禮敬同隨所來方各化作毗盧遮那藏師子之座於其座上結跏趺坐九隨所來下威儀住同如此世界中須彌頂上菩薩來集一切世界悉亦如是彼諸菩薩所有名字世界佛號悉等無別十如此下結十方同又上十方從東次第如名號品問凖此結通即於十方盡空世界皆有菩薩而來集會者且如東方過百剎塵土外亦有眾集未知彼因陀羅華世界為在何處餘界亦爾答如名號品如名號品者不欲繁文故令尋彼但遠近小異義理全同若剎若人皆徧法界重重無𥁞爾時世尊從兩足指放百千億妙色光明普照十方一切世界須彌頂上帝釋宮中佛及大眾靡不皆現第二爾時下如來放光分文義有六一時二主三處四數五相六業處謂兩足指足指拒地得住有力成位不退而行有恒數位過前加於千也相表解顯故云妙色普照十方顯佛眾會一光照於一切則一切亦爾重疊無礙無不互見為一法界圓明大會爾時法慧菩薩承佛威神普觀十方而說頌曰佛放淨光明普見世導師須彌山王頂妙勝殿中住第三爾時法慧下偈讚分中十菩薩說即為十叚初一是總餘九為別以法慧是說法主故總敘此會本末事義總顯佛德餘九歎佛差別之德總別共顯如來無礙之會此十菩薩名亦表十住其所說法表位勝進勝進有二一趣後位二趣佛果今約佛果今初東方法慧總了佛法故勝進中云欲令菩薩於佛法中心轉增廣文中觀佛現用及與往修皆周徧故十頌分三初五敘因佛光見多盛事初一敘此品放光一切釋天王請佛入宮殿悉以十妙頌稱讚諸如來次一敘前品請讚彼諸大會中所有菩薩眾皆從十方至化座而安坐彼會諸菩薩皆同我等名所從諸世界名字亦如是本國諸世尊名號悉亦同各於其佛所淨修無上行餘三重敘此品佛子汝應觀如來自在力一切閻浮提皆言佛在中我等今見佛住於須彌頂十方悉亦然如來自在力次二勸觀佛力更發勝心即前品不起而升二頌勸觀下前品成於四句亦從此生謂前一偈半即指上文是不起一切處而升一處後十方悉亦然單取十方須彌頂亦然即是不離一切處而升一切處取上一閻浮提對此則是不離一處而升一切處取上一閻浮對我等今見佛生於須彌頂即不離一處而升一處如來自在力通於四句一一世界中發心求佛道依於如是願修習菩提行佛以種種身遊行徧世間法界無所礙無能測量者慧光恒普照世暗悉除滅一切無等倫云何可測知後三舉因結果初一舉因後二結果由因中行願剎剎齊修故果位身智徧應徧斷爾時一切慧菩薩承佛威力普觀十方而說頌言假使百千劫常見於如來不依真實義而觀救世者是人取諸相增長癡惑網繫縛生死獄盲冥不見佛第二南方一切慧者了一切法真實之性淨心地故頌意為顯於諸眾生增長大悲以稱實而觀救世者故了一切法者約偈文釋言淨心地者約表治地住釋頌意等者約彼位中勝進行釋以稱實等者約當偈釋十頌分六初二違理觀佛非見佛次四了法真性真見佛三有一偈迷性取法不見佛四一偈佛即同法為真佛五一偈引己了法為見佛六一偈推功有本了真佛初中前偈出其妄觀假設長時以況蹔見後偈明其有損由上不依真實則取相乖真但見集網繫於苦獄盲無慧眼㝠然不見佛之法身然此遮取相故假設長時無有多劫全不了義以見如來增智慧故觀察於諸法自性無所有如其生滅相但是假名說一切法無生一切法無滅若能如是解諸佛常現前法性本空寂無取亦無見性空即是佛不可得思量若知一切法體性皆如是斯人則不為煩惱所染著第二四偈了法真性真見佛於中二前二真觀後二真止前中初二句空觀緣生無性故次二句假觀隨俗假名故次二句中觀由前生滅一切諸法即無性故相體即是不生滅也後二句觀益諸法如即是佛如無生滅佛體本常觀稱於如則佛常現況三觀一心則佛之體用無不現矣初二句空觀等者約三觀釋皆初牒經標觀後句取經意釋成中觀䟽釋成中有二義釋一云由觀前生滅一切諸法即無性故者一切法故非無即無性故非有由前但觀無性是空但觀假名是假今二相即故非空非假是中道義此約即緣生法以明中道二云相體即是不生滅也者約三性義以辨中道然無生多義略有二種一事無生緣生之相即無生故二理無生圓成實體本不生故今既經言該一切法不揀相性則相體皆無生矣則徧計無生是空觀緣生假有是假觀緣生無生及圓成無生皆中道觀則性相二宗三觀皆具然此二偈亦可但為性空觀則初二句正辨性空故言自性無所有次假觀二句通妨謂有難言現見生滅那言無生故釋云隨世假說次二句中觀正示不生之理依此釋者極順常解三論中意而未得於龍樹玄旨故䟽取論三觀釋之後二真止中以觀觀法能所紛動故須寂之初句牒前法性次句泯其能所法性本空非觀之使空故無所取何有能見次二句心㝠性佛故止絕思求法性本空者此以性空門顯無所取次云何有能見者即以相待門遣其能見此中語略合云若有所取則有能取既無所取故無能取能因於所而得立故亦曰相因門然取與見皆通能所令所取中則存於取略無能取於能見中略無所見所見即所取故又上來空以遣有假以遣空如則雙遣空假形奪兩亡又上來者此別為一釋不分止觀四偈相躡總為遣病則四偈中初二句以空遣有次二句以假遣空次二句以如不生滅雙遣空假次二句且結觀益第三偈即遣雙非若謂雙非還成戲論故辨起心皆妄絕念方真念本自無斯絕亦滅故中論云如來寂滅相分別有亦非如是性空中思惟亦不可用斯文也若謂雙非下正釋第三偈以上來䟽重舉前文生此偈故故此正釋於中初舉所破次故辨起心皆妄下以偈正破起心皆妄絕念方真釋其上半念本自無斯絕亦滅釋其下半以性空無念亦不可思故故中論云下引證即如來品初廣破有如來竟末後結云若於一異中如來不可得五種求亦無云何受中有又所受五陰不從自性有若無有自性云何有他性以如是義故受空受者空云何當以空而說空如來次破於空四句皆拂頌云空則不可說非空不可說共不共叵說但以假名說何以故寂滅相中無常無常等四寂滅相中無邊無邊等四次問云若如是破應無如來次偈答云邪見深厚者則說無如來如來寂滅相分別有亦非如是性空中思惟亦不可如來滅度後分別於有無次總拂偈云如來過戲論而人生戲論戲論破慧眼是皆不見佛長行釋云戲論名憶念分別有此彼又云此如來品初中後思惟如來定性不可得故偈說如來所有性即是世間性如來無有性世間亦無性此上諸偈文義相連䟽家但引同今經偈用此文者明是龍𣗳取此經意而為論偈後一顯觀益心㝠體性惑何由生亦含三止意也亦含三止者上云心㝠性佛即停止止心安正理故止絕思求即止息止今偈䟽文即心㝠體性停止止也惑何由生止息止也直就經文體性皆如即是對不止止也謂法性非止非不止而詺性為止故云對不止止又亦通結止觀稱上而觀見惑性空即同佛性何能染哉又亦通結者即以第四偈結七三偈而止已先明故此䟽文但結上凡夫見諸法但隨於相轉不了法無相以是不見佛第三一偈迷性中上半取法次句迷性末句結過牟尼離三世諸相悉具足住於無所住普徧而不動第四一偈佛即同法如謂同空法故離三世同假法故相具足同雙遣故無住無著同如體故徧不動搖我觀一切法皆悉得明了今見於如來決定無有疑第五一偈引己中此親自證希眾無惑法慧先已說如來真實性我從彼了知菩提難思議第六一偈推功有本者非師心也亦謙己推人異乎凡情令法鈎鎻殊塗同致下八凖之第六偈推功下此有四意一明義意相承有本二亦謙己下揀異凡情三令法下辨法相承四殊途下彰法體連合次八菩薩例有此四爾時勝慧菩薩承佛威力普觀十方而說頌言如來大智慧希有無等倫一切諸世間思惟莫能及第三西方勝慧以解佛勝智隨空心淨故以為名頌意為顯欲令菩薩智慧明了即大智了如及佛性故十頌分四初一讚智為迷悟本次四正顯迷悟次四喻前得失後一推功有在今初由難思故迷難則容有思者故有悟約此偈明隨空心淨即表位中義故彼文云所謂觀一切法無常一切法苦一切法空等故云隨空心靜下七菩薩初釋名中皆有二意細尋凖此凡夫妄觀察取相不如理佛離一切相非彼所能見迷惑無知者妄取五蘊相不了彼真性是人不見佛次四迷悟中初二迷後二悟迷中初一心外取境生想違理故不能見無相之佛後偈取內蘊相不了蘊性故不見心佛亦是愚法小乘故名無知者了知一切法自性無所有如是解法性則見盧舍那因前五蘊故後蘊相續起於此性了知見佛難思議後二悟中前明倒想內外俱妄今有了因內外皆悟初偈翻前外取謂了一切法即心自性性亦非性情破理現則見舍那稱於法性無內外也謂了一切法等者即心自性此是表詮由一切法無性故即我心之實性言性亦非性者此是遮詮即上真性以無性為性也即心自性如圓成性性亦非性如勝義無自性性以偈但云一切法自性無所有故故復遣性後偈翻前內取了蘊性相則見自心之佛與盧舍那非一非異故難思議然此一偈文含多意一但是蘊縛無有我人則破前凡夫取我相也二前後因依相續無性則破凡小取法相也一但是蘊縛等者即涅槃二十九師子吼難云如佛所說一切法有二種因一者正因二者緣因以是二因應無縛解是五陰者念念生滅如其生滅誰縛誰解世尊因此五陰生後五陰此陰自滅不至彼陰雖不至彼能生彼陰如子生芽子不至芽而能生芽眾生亦爾云何縛解下佛牒以為答引蠟印印埿印壞文成喻意云生時諸根有具不具具者見色則生於貪生於貪故則名為愛狂故生貪是名無明貪愛無明一因緣故所見境界皆悉顛倒無常見常無我見我無樂見樂無淨見淨以四倒故作善惡行煩惱作業業作煩惱是名繫縛以是義故名五陰生此中意云雖復生滅不妨繫縛故今用云但是蘊縛無有我人此性即第一義空第一義空即是佛性此性即是下會通佛性然案顯文但辨二空理已玄矣觀其法喻包涅槃經佛性深義故復顯之此中文勢連環先總示佛性即師子品初如前玄中已廣引竟又上性無所有正因性也前解此了皆了因性又上性下別示諸因先指經以明性無所有者即前偈自性無所有內外雖異皆是第一義空故指前偈亦即此偈於此性也既以第一義空為正因佛性故性無所有即正因也前解此了者前偈云如是解法性故云前解此偈云於此性了知故云此了並是了因明知一切眾生雖有第一義空智慧之性若無般若等為了因者終不成佛上通二偈以出正了此蘊相續即是正因亦名生因言正因者是中道義中道即是佛性謂現在陰滅中陰陰生是現在陰終不變為中陰五陰故現陰非常如種生牙種不至牙雖不至牙而能生牙此現在陰雖不至後而能生後則現陰非斷而中陰五陰亦非自生不從餘來因現五陰生中陰陰斯則後陰非無因故後陰非常既能續前故後陰非斷非斷非常是中道義正因性也能生佛果故曰生因眾生佛性有二種因一者正因二者緣因正因者謂諸眾生是故五陰即正因也緣因者謂六波羅蜜非蘊相生名緣因也今以了因了彼正因故曰於此性了知了即般若亦緣因也言正因下即雙釋也然欲解諸因先須知彼經又二十八云善男子因有二種一者生因二者了因能生法者是名生因燈能照物名為了因煩惱諸結是名生因眾生父母名為了因穀子名生水土名了六度阿耨多羅三藐三菩提名為生因佛性阿耨多羅三藐三菩提名為了因復有了因謂六波羅蜜佛性復有生因謂首楞嚴三昧阿耨多羅三藐三菩提復有了因謂八正阿耨多羅三藐三菩提復有生因謂信心六度又云善男子因有二種一者正因二者緣因正因者如乳生酪緣因者如酵暖等又云正因者名為佛性緣因者𤼵菩提心又云正因者謂諸眾生善男子僧名和合和合者名十二因緣十二因緣中亦有佛性十二因緣常佛性亦常是故我說僧有佛性故下䟽云然復生必對了正必對緣已引經文次當釋䟽言正因者是中道義中道即是佛性者總示其體故二十七云佛性即是無上菩提中道種子謂現在陰滅下出中道相即今因前五陰故偈是中道義其下所用涅槃經文即前二十九答師子吼陰縛難文上引難文則具引答則略今當具引佛答之文經云善男子諦聽諦聽我當為汝分別解說善男子如人捨命受大苦時宗親圍繞號哭懊惱其人惶怖莫知依救雖有五情無所知覺肢節戰動不能自持身體虗冷暖氣欲盡見先所修善惡報相善男子如日垂沒山陵搥阜影現東移理無西逝眾生業報亦復如是此陰滅時彼陰續生如燈生闇滅燈滅闇生善男子如蠟印印埿即與埿合印滅文成而是蠟印不變在埿文非埿出不餘處來以印因緣而生是文現在陰滅中陰陰生是現在陰終不變為中陰五陰中陰五陰亦非自生不從餘來因現陰故生中陰中如印印埿印壞文成名雖無差而時節各異是故我說中陰五陰非肉眼見天眼所見釋曰此上具引今䟽用經便以義間但觀經文自分主客然百論唯識皆說因緣相生續故不斷滅故不常不斷約果續不常約因滅今䟽以中論中義於因果中各有斷常現陰為因先明滅故不常後雖不至芽而能生芽此現在下以有功能照現陰不斷而中陰下約後陰明非斷常先明非無因常以中論明無因則墮常過如外道立時方微塵等故既能續前下明續故不斷能生佛果者上釋正因今釋生因前有六對生了二因前二對以因為生因緣為了因皆就能生後二對以因望果以論生了今是前意如乳是生因酵等為了因故乳等即喻眾生望於佛果而為因也譬如暗中寶無燈不可見佛法無人說雖慧莫能了亦如目有醫不見淨妙色如是不淨心不見諸佛法又如明淨日瞽者莫能見無有智慧心終不見諸佛若能除眼醫捨離於色想不見於諸法則得見如來第三四偈喻前得失者前三喻失後一喻得前中二初二喻內取失於中初一顯無緣了不見正因闇中寶者正因性也圓滿可貴所以稱寶居於無明五陰室內如在闇中燈喻緣了之因下半法合無人說者闕於緣因雖慧莫了義含二意一慧即正因合上寶也闕於緣因故不能了二佛法即寶以闕緣因雖內有慧不成了因不見真性初止釋本文中下半法合下釋合然有二解解雖慧莫能了前義但有二法成見謂實與燈以成正因緣因後義則三法成見應須加眼以喻於慧此中法喻應各四句謂一有眼無燈不見二無眼有燈不見三無眼無燈不見四有眼有燈則見則眼為因燈為緣因緣合故方得見寶因緣隨則不成見以喻善友為緣如燈有慧為因如眼因緣具故方見亦有四句一者有慧無友不見二無慧過友不見三無慧無友不見四有慧有友則見其第四句則是得人因緣和合方成了因今喻前失故無此句三句失中唯合初一其無眼有燈影在後喻瞽者不見明淨日中則明因緣互不見況全耶故不明於無眼無燈然則緣因即是了因了因未必是於緣因有親踈故善友是於緣因而必是了佛性名為了因未必是緣此約智慧性故若以第一義空為佛性者唯是正因而非了因但為了因所了而非生因所生若以智慧為佛性者即是了因若以五蘊為佛性者名為正因亦名生因然復生必對了正必對緣然即緣因下第二揀定二因於中有二先標二別因有親踈者總示別義踈者是了亦是緣因親者是了非是緣因善友是於下出其二相善友是踈亦緣亦了如酵暖等是酪了因亦是緣因佛性名為下顯上了因未必是緣以是親因故言智慧性故者亦是了相以無漏智性本自具足本有真實識知徧照法界義故當體名了又約行性居然是了又上所引生了二因中云六度阿耨多羅三藐三菩提是名生因佛性阿耨多羅三藐三菩提是名了因六度能生菩提故為菩提生因佛性能了菩提明知佛性之體即是了因若以第一義空等者揀異智慧性也然涅槃云佛性者名第一義空第一義空名為智慧此二不二以為佛性然第一義空是佛性性名為智慧即佛性相第一義空不在智慧但名法性由在智慧故名佛性以性從相則唯眾生得有佛性有智慧故墻壁瓦礫無有智慧故無佛性若以相從性第一義空無所不在則墻壁等皆是第一義空云何非性故下經云知一切法即心自性論云以色性即智性故色體無形說名智身以智性即色性故說名法身徧一切處明體本均今分性相故分二義若以智慧者結成上義生下五蘊是正是生不得名了五蘊名生者能生諸法故名生因今因五蘊能得菩提豈非生因如乳生酪如穀生芽皆生因故然復生必對了者以䟽叅用為順今經依涅槃明義有二對並如上引今燈一喻雙喻緣了闇中之寶雙喻正了義意包含具如涅槃二十六七所辨又上燈喻既是正義何以涅槃師子吼立佛不許耶故師子吼言一切眾生有佛性性如乳中酪以有性故要須緣因何以故欲明見故緣因者即是了因譬如闇中先有諸物為欲見故以燈照了若本無者燈何所照故佛難言若使乳中定有酪性即是了因若是了因復何須了又善男子一切眾生有佛性者何須修習無量功德若言修習是了因者已同酪壞結正義云乳有酪者以定得故佛性亦爾眾生有者以當見故今燈一喻下第三結示喻旨兼指理源涅槃二十六七者此是南經北經即當二十八九又上燈喻下初師子吼立然䟽引文隨要略引若經具云師子吼菩薩言世尊一切眾生有佛性性如乳中酪性若乳無酪性云何佛說有二種因一者正因二者緣因緣因者一酵二暖虗空無性故無緣因佛言善男子若使乳中定有性者何須緣因師子吼菩薩言世尊以有性故故須緣因何以故欲明見故緣因者即是了因世尊譬如暗中先有諸物為欲見故以燈照了若本無者燈何所照如土中有故須人工水輪繩杖等而為了因如尼拘陀子須地水糞而作了因乳中酵暖亦復如是須作了因是故雖先有性要假了因然後得見以是義故定知乳中先有酪性善男子若使乳中定有酪性者即是了因若是了因復何須了善男子若是了因性自了者常應自了若自不了何能了他若言了因有二種性一者自了二者了他是義不然何以故了因一法云何有二若有二者乳亦應二若使乳中無有二相者云何了因而獨有二師子吼言世尊如世人言我共八人了因亦爾自了了他佛言善男子了因若爾則非了因何以故數者能數自色他色故得言八而此色性自無了相無了相故要須智性乃數自他是故了因不能自了亦不了他又善男子一切眾生有佛性者何故修習無量功德若言修習是了因者已同酪壞若言因中定有果者戒定智慧則無增長我見世人本無禁戒禪定智慧從師受已漸漸增益若言師教是了因者當師教時受者未有戒定智慧若是了因應了未有云何乃了戒定智慧令得增長師子吼言世尊若了因無者云何得名有乳有酪善男子世間答難凡有三種一者轉答如先所說何故名戒以不悔故乃至為得大涅槃故二者嘿然答如有梵志來問我言我是常耶我時嘿然三者疑答如此經中若了因有二乳中何故不得有二善男子我今轉答如世人言乳有酪性佛性亦爾有眾生有佛性以當見故釋曰此上所引對今䟽文則知廣略但要須了義然澤州釋云自下第五師子以其緣正二因證性本有如來對破佛破有三一就喻二就法三雙就法喻初就喻中云若使乳中有酪性即是了因者乳中既得有其酪性性由了有明知乳中即有性了破性了中文別有四一若是了因復何須了者以內徵外二乳中先自有其了因何須乳外酵暖為了因此即以外破內今䟽云又善男子一切眾生有佛性者下即彼就法破言已同酪壞者難破須了師子吼立意性體雖有須修了因了之令現故舉破之前破喻中若有酪性應有性了若有性了何須外緣以為了因破此同彼名同酪壞喻既已破法全同喻何得不破䟽結正義云下指彼最後結文並如上引但觀上來所引經䟽則此中䟽居然可了然上諸義總有二意一燈了於寶為正義者約因性故師子吼立佛不許者約果性故二者燈喻正者約其體性與有不異佛不許者約其現惑與無不殊故知若言定有名為執著若言定無是則妄語應言眾生佛性亦有亦無然眾生智慧是佛性因菩提涅槃是佛性果然則佛性非因非果然上諸義者第二決擇經意然有二意前義即澤州意後意即䟽正意所以更加後意者若但用前意猶招來難次下當明約其體者如鑛有金性波有濕性約其現惑與無不殊者不得其用如水成冰無水之輭若言定有名為執著者暗引經證即涅槃三十五云善男子是故如來於是經中說如是言一切眾生定有佛性是名執著若無佛性是名虗妄智者應說眾生佛性亦有亦無三十六又云善男子若有說言一切眾生定有佛性常樂我淨不作不生煩惱因緣故不可見當知是人謗佛法僧若有說言一切眾生都無佛性猶如兔角從方便生本無今有已有還無當知是人謗佛法僧若有說言眾生佛性非有如虗空非無如兔角何以故虗空常故兔角無故是故得言亦有亦無有破兔角無破虗空如是說者不謗三寶善男子夫佛性者不名一法不名十法不名百法不名千法不名萬法未得阿耨多羅三藐三菩提一切善不善無記盡名佛性如來或時因中說果果中說因是名如來隨自意語隨自意語故名為如來隨自意語名阿羅訶隨自意語名三藐三佛陀然眾生者此下第二遮於外救即前意家救然䟽雖雙存二義以後意為正故假以前師設難救前救云汝意加後者豈不以前義為未造玄因果二性皆有明文如何不許故經云佛性有因有因因有果有果果因者即十二因緣因因者名為智慧果者謂大菩提果果者謂大涅槃既有四種前二本有後二當有文理昭然如何不信因果二性更別說理故為此通欲通此義光應反難前師云向引四性是一處文謂有處說是因非果名為佛性是果非因如大涅槃是因是果如十二因緣所生之法非因非果名為佛性此復云何設爾通云是因非果是初性是果非因是第四性是因是果為第三者理亦可通非因非果名為佛性如何可通明知直語佛性之體體非因果因中取之名為因性果中取之名為果性非是佛性分成因果如取空是中空世界取空是界中空空豈有異故言眾生智性是佛性因菩提涅槃是佛性果非是佛性分成因果故結示云然則佛性非因非果今此經宗宗於法性故以法性而為佛性則非內非外隨物迷悟強說升沉佛性要義不可不知廣如別章及涅槃師子吼品等說今此經宗下結示正宗於中有二先結正義宗於法性者以無障礙法界為宗則法性即佛性知一切法即心自性若以心性為佛性者無法非心性則不隔內外而體非內外內外屬相性不同相何有內外然迷一性而變成外外既唯心何有非佛所變無實故說墻壁言無佛性以性該相無非性矣如煙因火煙即是火而煙欝火依性起相相翳於性而相即性如水成波波即是水境因心變境不異心心若有性境寧非有況心與境皆即真性真性不二心境豈乖若以性從相不妨內外若以外境而例於心令有覺知修行作佛即是邪見外道之法故須常照不即不離不一不異無所惑矣故云即非內非外隨物迷悟強說升沉後偈目有翳者此喻了因與惑俱故見不清淨以不淨故不見佛法佛法即是佛性故涅槃云佛性二種一者是色二者非色色者諸佛菩薩非色者一切眾生色者名為眼見非色者名為聞見佛性者非內非外雖非內外然非失壞故名眾生悉有佛性此喻了因者翳喻於惑眼喻了因但見有垢非全不見然見空華無而謂有不見於無即不見法故涅槃下引證即二十八經但初云善男子佛性復有二種一者是色下䟽全是經直至然非失壞一叚終畢然有二意一以非內非外然不失壞證強說升沉二證可見謂佛菩薩見之了了如眼見色言非色者以未證如聞他說故故云聞見若二十七經云善男子佛性亦色非色非色非非色及歷相非相常非常等下釋云色者金剛身故非色者十八不共等故非色非非色者無定相故釋曰此約佛性之體名色非色以如來身智等皆果性故非今所用二一偈喻上外取之失瞽謂全無於目如鼓皮故則全不見佛無垢障為明淨目取相是識非智慧眼故不見也三一偈喻前悟中抉去取相之翳捨於空華之像絕見契如則見如佛一切慧先說諸佛菩提法我從於彼聞得見盧舍那第四一偈推功有在凖上可知音釋級居立切階級也𦂶去𠋣切文繒也瞖於計切目病也瞽音古目有联而無明也埿音泥塗也酵古孝切
