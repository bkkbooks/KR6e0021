body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述爾時法界普音菩薩摩訶薩承佛威力普觀一切道場眾會海已即說頌言佛威神力徧十方廣大示現無分別大菩提行波羅蜜昔所滿足皆令見第八法界頌中歎佛徃修十度行滿今得果圓十一頌分二初一總餘十別今初也佛威神力略有三類一者俱生力謂風不動衣等二者聖威力謂通明等種種功德三者法威力謂波羅蜜圓滿法力佛威神力者即當瑜伽三十七中彼有二類初列三種云一聖威力二法威力三俱生威力次又云復有五種一神通威力二法威力三俱生威力四共二乘威力五不共二乘威力彼廣釋相今疏引三不依彼次及至釋文二處叅用風不動衣等即五中俱生俱生有多謂佛菩薩常右脇臥如師子王雖現安處草葉等蓐一脇而臥曾無動亂一切如來應正等覺雖現睡眠而無轉側大風卒起不動身衣行如牛王步如師子等今但云風不動衣等等取餘事五中望三神通即聖共與不共但顯超勝疏中皆含二處法威力疏中謂波羅蜜圓滿法力即是語因令五根中無諸非淨四支百節有無量力故名堅固不可壞法身常身無邊之身言遍十方者即無邊身廣大示現謂變化身無分別者平等智身大菩提行者波羅蜜身昔所滿足者眾行先成皆令見者大果今出令五根下辯其果相彼法威力中諸度各有四相一斷所對治二資糧成就三饒益自他第四辯果果各不同施得大財寶朋黨眷屬戒生人天忍臨終之時心無憂悔生於天界進得愛樂殊勝士夫功業定得神通生靜慮天慧果能離煩惱所知二種重障上瑜伽中多是近果又是別明今是究竟之果又是總明無諸非淨即離繫果百節有力是施等果堅固不壞是戒度果故普眼長者以十度因成十身果遍十方下疏以經文會上果義二有十頌別顯一頌一度皆上半徃修因下半今得果十頌別顯下疏二先總指文十度之義十行十地一經始末亦多辯之須粗識其相略啟十門一釋名二出體三辯相四建立五次第六相攝七修證八約教九觀心十釋文今初又二先通名後別稱今初通稱波羅蜜多者唯識云要七最勝之所攝受方可建立波羅蜜多一安住最勝謂要安住菩薩種性二依止最勝謂要依止大菩提心三意樂最勝謂要慈愍一切有情四事業最勝謂要具行一切事業五巧便最勝謂要無相智之所攝受六廻向最勝謂要廻向無上菩提七清淨最勝謂要不為二障間雜即三時無悔若七隨闕非到彼岸故此十度應各四句分別其別稱及出體三辨相至文當釋此中立章多依唯識第九安住菩薩種性者若依五性則揀餘四性唯取菩薩種性今法性宗約習以成性非約本有本有平等故故攝論中但有六種最勝無初安住或云菩提心攝則知唯約習成然無性引頌亦似證有安住種性頌云麟角喻無有六波羅蜜多唯我最勝尊上品到彼岸此最勝尊義似初一然依此釋亦是習成非約本有謂要無相智者即三輪空也故離世間品云三輪清淨施施者受者及以施物正念觀察如虗空故六迴向最勝問既言迴向菩提何異依止釋曰彼有道心未必一切迴向菩提此乃迴向又依止者即行前心今迴向者乃行後願七清淨最勝者約分說耳通說清淨為離二障行於六度即三時無悔者此乃大乘法師釋論意也悔即煩惱由不了故即是所知又即此悔心障於真智亦所知也四句分別者有三四句一者一一自望種類而為四句施中四者一是施非度不與七勝相應施故二是度非施隨喜他施具七勝故三亦施亦度具七勝故四非施非度隨喜他施不與七勝共相應故二者不約種類次第修者以明四句唯施一種但有二句未成餘度問二句故謂是度非施及非施非度餘戒等五得有四句前有施度得為是度非戒等故謂一是戒非度謂不與七勝共相應故二是度非戒即前施度具七勝故三亦戒亦度具七最勝而持戒故四非戒非度謂前布施不具七故忍度望戒進度望忍次第如戒三非次第修者諸度各得具施四句如施得望戒忍等度得有是度非施等句故可以思凖此上釋度即彼論疏明相門也謂顯波羅蜜多相故故此論初云此十相者要七最勝等四建立者為十地中對治十障證十真如故但有十為對六蔽漸修佛法漸熟有情故但說六六中前三增上生道感大財體及眷屬故後三決定勝道能伏煩惱成熟有情及佛法故又前三饒益有情施財不惱忍彼惱故後三對治煩惱勤修加行永伏永滅故又由前三故不住涅槃由後三故不住生死能為無住涅槃資糧後唯四者助六令滿方便助前三願助精進力助靜慮智助般若如深密說四建立等者即彼第四無增減門疏文有三一明十無增減即建立十度之所以對治十障者即異生性等十無明也至十地具明今略列名一異生性障二邪行障三暗純障四微細煩惱現行障五於下乘般涅槃障六麤相現行障七細相現行障八無相中作加行障九利他中不欲行障十於諸法中未得自在障若凖對法十二云所知障等皆度所治故云對治障故為對六蔽下二立六度所以六一對治六蔽門即上一句言六蔽者一慳悋蔽二犯戒蔽三嗔恚蔽四懈怠蔽五散亂蔽六惡慧蔽亦有師言離惡慧為五成十度障大乘法師不許此義上來十度及六度皆是第四無增減門漸修佛法者即第二漸修佛法門故唯識云漸次修行諸佛法故諸佛法者謂十力等攝論云前之四度不散動因第五一種不散動成熟第六依是如實覺知漸熟有情者即第二漸熟有情門故唯識云漸次成熟諸有情故攝論云由施能攝受由戒能不害由忍雖遭苦能受由勤助彼所作由定心未定者令定由慧已定者令得解脫六中前三下第四二道之因門施感大財謂多饒財寶戒感大體謂尊貴身忍感眷屬有情歸附由富勝形及多眷屬趣中增上名增上生道亦即因能伏煩惱者謂修善方便定熟有情者依此發通故慧成佛法佛法由慧故有此三德名決定勝諸菩薩道唯有此三若闕一種道不成故又前三種者第五利生斷惑門故瑜伽七十八解深密等說由一因緣是故六度不增不減即其義也施財攝彼戒不惱害忍受彼惱此三皆通有饒益故後三言勤修加行者瑜伽云由精進故雖未永斷煩惱永害隨眠而能勇猛修諸善品彼諸煩惱不能傾動善品加行故唯識云雖未伏滅而能勤修善法加行由靜慮故云伏煩惱由般若故永斷隨眠是故疏云永伏永滅對法十一亦有此解又有前三者第六為無住涅槃因故以前三是大悲饒益有情故後三是大智斷滅諸惑故故為無住涅槃因也翻彼凡小之雙住也又復三學攝於六度故不增減瑜伽四十九說前四是戒後二是二學故由上七義故立六度此第七義疏略不明後唯四下第三重顯十義謂有問言六度既爾後四云何此答意云四屬六攝義隨六異於中分二先總明方便助前三下別顯大論第七十八云由前三種所攝有情以諸攝事方便善巧而攝受故意云巧用施等以攝物也願助精進者大論云由正願故能破羸劣意樂煩惱微薄起精進修力助靜慮者解深密云若諸菩薩親近善士聽聞正法如理作意為因緣故轉劣意樂成勝意樂亦得上界勝解名力波羅蜜多由此力故於內心住有所堪能故說力度助於定也智助般若者彼經云若諸菩薩已能聞法為緣善修習故能發靜慮如是名智由此智故性能引發出世間慧故說智為慧助是以後四助於前六令前六度修習圓滿前六不能助於後四五次第者謂由前前引𤼵後後及由後後持淨前前又前前麤後後細易難修習次第如是五次第門此曲有四謂由前前下即初引發門謂由行施引發持戒由持戒故引發忍等二攝持門布施本欲益他持戒不惱於彼彌令施淨等故云及由後後持淨前前三麤細門布施則麤持戒則細戒望於忍戒則為麤忍則為細等故云前前麤後後細前九並為前前從戒至智並名後後一一相望故致重言初一唯前後一唯後中間八度遞為前後四難易門亦結通上三也上之四門並如瑜伽對法所辦六相攝者此十一一皆攝一切波羅蜜多互相順故般若論云檀義攝於六資生無畏法等智論云有未莊嚴波羅蜜即不攝者有已莊嚴波羅蜜即相攝者今此經文必具攝十若但說六六攝後四若開為十第六唯攝無分別智後四皆是後得智攝資生無畏法等者等取下半云此中一二三名為修行住謂施有三種一財二無畏三法施財即資生正是檀度故云此中一也無畏攝二謂尸不惱彼忍受彼惱皆無畏相故云二也法施攝三謂進定及慧決定勝道漸熟佛法是法施相故云三也即十八住中修行住也今此經文下會釋今意是圓教故非唯要約相順相類以理融故法爾一攝一切行也若但說六下二明六十相攝若六度攝十第六攝後四若十度攝六第六但攝第六少分有所未盡不攝後得加行智故故兼後四方攝第六是故疏云若開為十第六唯攝無分別智七修證者五位通修佛方究竟十約因位總有三名謂初無數劫施等勢力尚微被煩惱伏但名波羅蜜多第二劫去勢力漸增能伏煩惱名近波羅蜜多第三僧祗勢力轉增能畢竟伏一切煩惱名大波羅蜜多故上下文中屢言廣大波羅蜜也七修證者謂此一門亦名為位今云修者以五位通修故名為修佛方究竟故名為證故二十一種功德之中有波羅蜜多成滿功德然唯識云五位皆具修習位中其相最顯通漏無漏廣修行故故十地中各一圓滿十約因位下即分位分別顯於三劫得名不同初但名波羅蜜多者以一行中修一行故二名近者一行之中修一切行近菩提故三廣大者一切行中修一切行體包博故然未入劫同於第一已成佛竟同於第三八約教者諸教可思此教要須一一融攝徹果該因八約教者謂小乘不成波羅蜜多無七最勝故始教要是菩薩種性人方有故又各有體性或說俱空終教一一皆從真如性功德起頓教一一皆不可說謂不施不慳不戒不犯不忍不恚不進不急不定不亂不智不愚等一切皆絕若十若六皆悉亡言圓教如文九觀心者可以意得九觀心者謂一念相應心捨則具十度捨而不取為施不為過非所汙即戒忍可非有為忍離身心相為進寂然不動為定決了無生為慧雖空不礙智相為方便希齊佛果是願思擇不動為力決斷分明為智一念方等十度頓圓縱七最勝亦在一念可以思凖欲令行者即之於心是故結云可以意得昔於眾生起大悲修行布施波羅蜜以是其身最殊妙能令見者生歡喜十釋文中第一偈明施度輟己惠人名之為施即以無貪及所起三業而為其性此有三種謂財法無畏十釋文中一一偈疏多皆有四一釋名二出體三辯相四釋文唯識併在一處出體謂施以無貪及所起三業為性戒以受學菩薩戒時三業為性忍以無嗔精進審慧及彼所起三業為性精進以勤及所起三業為性靜慮但以等持為性後五皆以擇法為性謂是根本後得智故辯相亦併居一處今隨文配屬以相映易了耳即以下出體無貪即善十一中一法要由無貪相應思於自身財方能慧捨然三施體大意多同上半因中大悲行施已該此三此悲亦是七最勝中前三最勝下半果中財能資身無畏益心法資法身故得果身身最殊妙三皆恱物故見者必喜亦由具七最勝故身殊妙也昔在無邊大劫海修治淨戒波羅蜜故獲淨身徧十方普滅世間諸重苦二戒度防非止惡名之為戒即受學菩薩戒時三業為性戒有三種律儀攝善得淨身果攝眾生戒能除物苦遍十方者無作戒身等眾生故二戒中初名防其未起非止已起惡故即受學下次出體大論律儀以七眾別解脫戒在家出家戒為體即唯二業謂表無表不說語故若攝善法戒者謂諸菩薩受律儀後一切所作為大菩提由身語意積集諸善以為其體今疏通三聚及與受隨故云三業攝眾生戒居然通三戒有三種下三釋文即當辯相律者法律儀者儀式於不善法而能遠離及防護故故攝論名為依持戒依是能有集諸佛法無罪益生故徃昔修行忍清淨信解真實無分別是故色相皆圓滿普放光明照十方三忍者堪受諸法未能忘懷名之為忍此約生忍又忍即忍可忍即是慧雙忍事理即以無瞋精進審慧及彼所起三業為性忍亦有三謂耐怨害忍安受苦忍諦察法忍即以下出體無嗔精進即善十一中二審慧即別境五中慧所以有此三者大論云自無憤勃不報他怨亦不隨眠流注相續是名菩薩耐怨害忍即以無嗔及三業為性若安受苦忍即精進三業為性若諦察法忍即審慧三業為性故此三業通於三忍餘三各配其一故有三耳偈云信解真實即諦察法也色相圓滿前二忍果放淨光明第三忍果偈云下釋文然無性云初忍是諸有情成熟轉因二是成佛因寒熱等法皆堪忍故三是前二之所依處堪任甚深廣大法故今言色相圓滿是前二忍果者由忍他辱生端正故得依色相言皆圓滿者究竟成佛具諸相故故此四字是二忍故光通智光故是第三往昔勤修多劫海能轉眾生深重障故能分身徧十方悉現菩提樹王下四精進者練心於法名之為精精心務達目之為進以勤及所起三業為性亦有三種一被甲二攝善三利樂三亦有下三辯相被甲即大誓願攝善即方便進趣利樂即勤化眾生初句通前二以被甲精進瑜伽釋云設千大劫為一日夜處於地獄唯為脫一眾生故次句即第三下半通三果也因既離身心相故果能身遍十方初句下釋文通前二者勤修二字故是攝善多劫海言即是被甲被甲相隱故引論釋佛久修行無量劫禪定大海普清淨故令見者心歡喜煩惱障垢悉除滅五禪那梵云禪那此云靜慮即以等持為性亦有三種謂安住引𤼵辦事五禪中初釋名靜揀散心慮無慧止觀均故即以下二出體即三摩地雖是別境心所之一今約定說不遽散心故不說三業對法論云起三業自在用時所有一切種常安住即通三業以約用故亦有三種下三辯相言安住者安住現法樂住故無性云離見慢等得清淨故言引發者引神通故言辦事者辦利有情事故既引起神通辦利生事故見者深喜現法樂住諸惑不行又資慧斷惑故見者惑滅既引發者下釋文取上辯相以釋經文如來徃修諸行海具足般若波羅蜜是故舒光普照明克殄一切愚癡暗六般若者般若梵言此翻為慧推求諦理名之慧也此及後四皆擇法為體亦有三種一生空無分別二法空無分別三俱空無分別攝論以加行正體後得為三約六度說瓔珞以照有照無及照中道而為三者唯約法空三觀之義至下當明此及下二出體以後五體同故故唯識云後五皆以擇法為體說是根本後得智故意云以根本智為第六體後之四體皆後得故此依勝說若對法及瑜伽四十三同以出世間加行正智後得為體唯識下文亦云十度皆通漏無漏故依此實義亦有三種下三辯相總有三說唯識依十度唯取根本攝論三智約六度說纓絡三觀亦約十度約兼正說故有照空照有照中是以疏云三觀之義至下當明謂十行當會慧導萬行故云修諸行海言具足者具上三也因如有目故果獲身智二光能滅諸闇慧導萬行下釋文謂萬行不得般若照體空寂不成彼岸故因如有目者智論云五度如盲人般若如有眼故見夷途開道萬行御心中道至一切智城即其義也種種方便化眾生令所修治悉成就一切十方皆徧徃無邊際劫不休息七方便者即善巧也方謂方法便謂便宜下四但各二種今初謂迴向方便拔濟方便下四下次辯相先總顯下四此依唯識若約本業亦各有三至十行品說今初下別明此度謂由大智故迴前六度向大菩提由大悲故迴前六度拔濟有情故無性云不捨生死而求菩提文云種種化生即拔濟善巧所修成就兼於迴向菩提所化無邊果得十方而橫遍為物取果豎窮來際而不休佛昔修行大劫海淨治諸願波羅蜜是故出現徧世間盡未來際救眾生八願者即希求要誓有義以欲勝解及信為性亦有二種謂求菩提願利樂他願有義下次出體前雖總出此一有異故復別用此三為性三法正是願之性故謂願者希求希求即欲要於前境正信印持方希求故其後得智但是所依依此起願耳由初願故出現世間由後願故救生不息佛無量劫廣修治一切法力波羅蜜由是能成自然力普現十方諸國土九力者不可屈伏故隨思隨修任運成就亦有二種謂思擇修習今言法力即思擇諸法而修習故攝論由此二力令前六度無間現前經云成自然力即無師而成不習而無不利何能壞哉今言下三釋文初即無性釋論之言故攝論下本論之語佛昔修治普門智一切智性如虛空是故得成無礙力舒光普照十方剎十智度決斷名智謂如實覺了亦有二種謂受用法樂智成熟有情智無性論云由施等六成此智復由此智成立六種名受法樂由此妙智能正了知此施戒等饒益有情亦有下次辯相此相難見故引論釋但引釋論本論但云謂由前六成立妙智受用法樂成熟有情若天親云由般若波羅蜜無分別智故成立後得智復由此智成立前六波羅蜜多由此自為與同法者受用法樂成熟有情大意亦同也瑜伽四十九云於一切法如實安立清淨妙智名智波羅蜜多當知能取勝義名慧能取安立名智又三十九云謂無量智當知方便波羅蜜多希求後後殊勝性名願一切魔怨不能壞名力如實覺了所知境名智大意皆同然上辯體約剋實性體若兼助伴一一皆以一切諸行功德為性經云普門智總含二智別配即初句成熟有情次句即受用法樂此二無二故成無礙力舒光普照經云下三釋文可知若廣分別如唯識䟽第十及瑜伽四十二爾時雲音淨月菩薩摩訶薩承佛威力普觀一切道塲眾海即說頌言神通境界等虛空十方眾生靡不見如昔修行所成地摩尼果中咸具說第九雲音頌述菩提樹摩尼果中歎佛徃修十地行果十一頌分二初一總舉謂佛果大用由昔地行及結說處餘十次第各述一地地義當品廣明今皆略述而已清淨勤修無量劫入於初地極歡喜出生法界廣大智普見十方無量佛初地略述四義一加行多劫諸論皆說地前為一僧祇已為無量更有異說恐猒繁文二標入地名三出生廣智謂生如來家見法實性得妙觀察平等性智故四普見佛海同下願智果中恐猒繁文者謂仁王下卷奉持品說伏忍下中上下忍初賢一僧祗中忍次賢兩僧祗上忍亞聖三僧祗初地四僧祗乃至七地有十八地干九地萬十地百萬僧祗故地前已經三阿僧祗經中多說三阿僧祇成佛者以下中忍位菩薩相隱上賢之位菩薩相顯所以特言經三僧祗地前菩薩二乘聖者見初入地皆謂究竟故說三祗成等正覺亦佛隨宜故寶雲經云實經無量阿僧祗劫華藏已初當更會釋得妙觀察者由破分別我執第七不與四惑相應成平等性已證真如於多百門已得自在成妙觀察未捨異熟識體不得大圓鏡智異熟既存眼等五根是異熟生故亦未得成所作智此二直至佛果方得一切法中離垢地等眾生數持淨戒已於多劫廣修行供養無邊諸佛海二地四義一舉法標名二別地行相三修行時分四供佛多少積集福德𤼵光地奢摩他藏堅固忍法雲廣大悉已聞摩尼果中如是說三地四義一舉法標名世間中極云積福德二修諸禪定三忍度偏多四聞持廣博世間中極者前三地寄同世間故燄海慧明無等地善了境界起慈悲一切國土平等身如佛所治皆演暢四地四義一歎慧標名世無等故二了道品境異凡夫故三起慈悲異小乘故四淨身土離身見故離身見者寄出世初同須陀洹故又初地斷分別身見四地斷俱生身見故普藏等門難勝地動寂相順無違反佛法境界悉平等如佛所淨皆能說五地四義一標入地謂積集福智故云普藏十平等心故曰等門二標地名三真俗極違會令相順四諦法俗境無不等觀十平等心者三十六經入五地有十心一過去佛法平等清淨心二未來三現在四戒五心六除見疑悔七道非道智八修行智見九於一切菩提分法上上觀察十教化一切眾生皆有平等清淨心四諦法俗境者良以十重觀四諦故四地出世五地却入云觀俗境廣大修行慧海地一切法門咸徧了普現國土如虛空樹中演暢此法音六地有四一歎行二標名三正顯行相即了緣起法四明地用得十空三昧故得十空三昧者即六地末云佛子菩薩住此現前地得入空三昧自性空三昧第一義空三昧第一空三昧大空合空起空如實不分別空不捨離空離不離空句句皆有三昧之言結云得如是十空三昧門為首百千空三昧門皆悉現前周徧法界虛空身普照眾生智慧燈一切方便皆清淨昔所遠行今具演七地有四一先標果用二照達羣機三雙行巧攝四寄行標名一切願行所莊嚴無量剎海皆清淨所有分別無能動此無等地咸宣說八地四義一別地行相二明淨土果三略釋地名四歎地結說無量境界神通力善入教法光明力此是清淨善慧地劫海所行皆備闡九地四義一標地作用二善達教法三標示地名四廣行多劫法雲廣大第十地含藏一切徧虛空諸佛境界聲中演此聲是佛威神力十地有四一標起地名二含藏法雨三能蔽如空麤重四深廣難測故云佛境諸偈多有結說文並可知爾時善勇猛光幢菩薩摩訶薩承佛威神觀察十方即說頌言第十善勇猛說頌儀中前文多觀眾會此觀十方者觀眾表無偏心觀方表說周遍二文影略十頌歎佛體用應機自在德文分為三初一總顯次八別明後一結歎歸佛一一頌中各有四義無量眾生處會中種種信解心清淨悉能悟入如來智了達一切莊嚴境今初總歎佛令物悟入福智有四義者一多眾二心異三悟智四了福莊嚴即福也亦通二嚴皆佛令爾故顯眾德即為歎佛各起淨願修諸行悉曾供養無量佛能見如來真實體及以一切諸神變別中一見佛體用亦四義一起願二具行三見體四見用或有能見佛法身無等無礙普周徧所有無邊諸法性悉入其身無不盡二見法身一勝故無等二淨故無礙三大故周遍四深廣故包含或有見佛妙色身無邊色相光熾然隨諸眾生解不同種種變現十方中三見佛色身一色妙謂如金等二相具十華藏相等三光盛謂常放等四隨機變謂三尺無邊等或見無礙智慧身三世平等如虛空普隨眾生心樂轉種種差別皆令見四見佛智身一無礙真俗無礙故二等空稱法性故三知根四巧現或有能了佛音聲普徧十方諸國土隨諸眾生所應解為出言音無障礙五了佛音聲一音普遍二說應器三言同類四應無礙或見如來種種光種種照耀徧世間或有於佛光明中復見諸佛現神通六見佛光明一多種二遍照三見佛四現變或有見佛海雲光從毛孔出色熾然示現徃昔修行道令生深信入佛智七見佛毛光一顯光名二明出處三示徃因四令信悟或見佛相福莊嚴及見此福所從生徃昔修行諸度海皆佛相中明了見八見佛福相一見福相二了福因三示因體四明見處如來功德不可量充滿法界無邊際及以神通諸境界以佛力故能宣說後一結歎德廣一數多二深廣三用普四結說謂推功歸佛謙己無能上來總明第八大叚座內眾流竟爾時華藏莊嚴世界海自下第九明天地徵祥謂動地興供即是顯證上來佛成正覺眾海雲集各申慶讚顯佛高深而下稱機情上協佛願故世主為之興供天地為之呈祥就文分二先動地後興供前中三一動處二動因三動相今初自陿之寬且云華藏約下結通實周法界自狹之寬者娑婆為狹華藏為寬也諸天重重並華藏之內故云其地何所不該諸天重重下通妨難難云既言華藏地動華藏之地乃在大蓮華地靣今娑婆界當第十三重曾何是地設若是地是娑婆地即非華藏故今通云乃有二意一以本該末謂舉華藏總該剎網故二十重皆華藏內況第十三下豈非地耶又染淨融故雖標摩竭而地震華藏二又約染淨融故下染淨交徹通摩竭之地便是金剛染淨既融是故一動一切動也以佛神力二動因中就主顯勝但明佛力感應道交亦由物機然汎明動因總有其十今當轉法輪亦兼成道餘如別章餘如別章者即教義分齊中明謂智論引長阿含第二云有八因緣一大水動時動二尊神試力時動三如來入胎時動四出胎五成道六轉法輪七息教八涅槃時九依增一二十八更加大神足比丘心得自在乃至觀地無相故令地動十智論云授菩薩記當於此界作佛之時地神喜故所以動也其地一切六種十八相震動所謂動徧動普徧動起徧起普徧起踊徧踊普徧踊震徧震普徧震吼徧吼普徧吼擊徧擊普徧擊三動相者其地下是震即是聲動即是形聲兼吼擊形兼起踊故有六種此六各三成十八相搖颺不安為動自下漸高為起忽然騰舉為踊隱隱出聲為震雄聲郁遏為吼砰磕𤼵響為擊十八相者唯一方動直爾名動四方若次第若一時動者名為遍動若八方次第或一時動名普遍動又四方八方十方如次名三相動又一方獨動十方次第動十方同時動又為三相餘五例之然動何所為依勝思惟梵天經所為有七一令諸魔怖故二為說法時大眾心不散亂故三令放逸者生覺知故四令眾生知法相故五令眾生觀說法處故六令成熟者得解脫故七令隨順問正義故此上七緣正是今經所為地論有四非當此文上約外器若心地聖賢地法性地亦有震動等義可以虛求地論有四者第十一論云器世間中依四種眾生聚一依不善眾生二依信種種天眾生三依我慢眾生四依呪術眾生為此眾生下中上次第差別故動乃至吼如十八句異義應知如是生信功德今言非當此文者始成正覺便演一乘皆是海會何有不善等據別行經順別機故論為此釋此諸世主一一皆現不思議諸供養雲雨於如來道場眾海二興供中三一標數同生之眾亦得稱主為物依故所謂一切香華莊嚴雲一切摩尼妙飾雲一切寶燄華網雲無邊種類摩尼寶圓光雲一切眾色寶真珠藏雲一切寶栴檀香雲一切寶盖雲清淨妙聲摩尼王雲日光摩尼瓔珞輪雲一切寶光明藏雲一切各別莊嚴具雲如是等諸供養雲其數無量不可思議二所謂下略列此諸世主一一皆現如是供養雲雨於如來道場眾海靡不周徧三此諸下結遍如此世界中一一世主心生歡喜如是供養第十如此下結通無盡文分有二一結華藏內二結華藏外前中亦二先舉此界其華藏莊嚴世界海中一切世界所有世主悉亦如是而為供養二其華藏下類華藏中一切世界於中三初類眾海興供一切世界者謂華藏中有十不可說佛剎微塵數世界種一一種中各有不可說不可說佛剎微塵數世界彼等一切諸世界中悉有世主而為供養其一切世界中悉有如來坐於道場二其一切下類佛坐道場然有二義一彼諸世主各供當處之佛二彼諸世主亦供此佛此佛亦坐彼界道場一一世主各各信解各各所緣各各三昧方便門各各修習助道法各各成就各各歡喜各各趣入各各悟解諸法門各各入如來神通境界各各入如來力境界各各入如來解脫門三一一下類結大眾得法於中有十一句為聞法得益得益有三一聞益各各信解故謂信其言而解其義二思益謂於所對審緣慮故三修益修益有七一修門謂三昧方便故二修法謂資糧助道故三修果契理成就故四修益隨有所得成法喜故五修轉各各趣入無量乘門及眾生界故六修同悟解法門合先聖故七修極修極有三一大悲極入佛神通境入佛神通境但為益生故此成恩德二大智極入佛力境如來力境悲智超絕無能及故成佛智德三自在極入如來解脫門盡一切障心境自在成佛斷德亦即是前諸解脫門如於此華藏世界海十方盡法界虛空界一切世界海中悉亦如是二如於此下結華藏外謂以華藏例於法界各有此會同為一大法界會方是華嚴無盡說耳上來十𫨻總明教起因緣分竟音釋蓐儒欲切薦也脇虗業切腋下也羸倫為切瘦也協檄頰切合也分齊分扶問切齊才詣切分齊限量也颺餘亮切風飛物也砰磕砰披耕切磕克盍切砰磕石相築聲也
