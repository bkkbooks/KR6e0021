body:
  text: 唐于闐國三藏沙門實义難陀譯唐清涼山大華嚴寺沙門澄觀撰述爾時世尊處于此座於一切法成最正覺第五爾時世尊下明教主難思前但云佛未顯是何身佛又但云始成正覺未知成相云何故今顯之教主難思䟽文有二先彰大意亦二先躡前徵起對前二文一對標主二對別明時分謂具十種深廣功德即是遮那十種無盡法界身雲遍於法界成正覺也非權應身謂具十種深廣下緫答初答前佛後遍於法界成正覺者答其成相文分為二先總後別今初總辦即菩提身具無盡德為世所尊座相現時身即安處智處諸法無前後故於一切法示所覺境即二諦三諦無盡法也成最正覺示能覺智開悟稱覺離倒為正至極名最獲得名成此當相解初緫辯䟽文有三初當相以辯即菩提身緫示所屬具無盡下釋世尊次座相下釋爾時次於一下牒釋餘文開悟稱覺者二諦中道理本湛然妄惑所翳久迷不見今二障既寂若雲卷長空故名為開了了分明若晴天廓徹故名為悟悟即覺悟如睡夢覺開即開𤼵如蓮華開若揀別者凡夫倒惑佛覺重昏二乘雖覺不名為正但知法有未知法空但悟我空未知我有有猒生死空該涅槃顛倒未除豈得稱正設許稱正亦未名最菩薩雖正有上有修不得稱最設位極稱最亦未得名成若揀別者下第二寄對以釋仍含二意一對凡名覺對小名正對因名最對位極名成二者對凡名覺對邪名正對小名最對因名成一時雙牒如文思之但悟我空未知我有者謂敝體與菩薩相反二乘知我空法有菩薩知法空我有然二乘所空之我菩薩亦空謂是我執若無我法中有真我菩薩知有二乘不知若但約二空了我空與菩薩同不了法空與菩薩異有猒生死空該涅槃者此出上空有之過由謂法有故猒生死不如菩薩了生死之本空無可猒故淨名善意菩薩曰生死涅槃為二若見生死性則無生死無縛無解不生不滅如是解者是為入不二法門又寶印手菩薩曰樂涅槃不樂世間為二若不樂涅槃不猒世間則無有二所以者何若有縛則有解若本無縛其誰求解無縛無解則無樂猒是為入不二法門二乘不能如是解故故猒生死空該涅槃者即涅槃經意涅槃云空者所謂生死不空者謂大涅槃今二乘謂生死却為不空以涅槃無餘永寂却是於空故云空該涅槃顛倒未除者倒有八種外道謂世間為常樂我淨為四顛倒二乘永寂計為涅槃則無常樂我淨復為四顛倒若謂世間無常樂我淨涅槃乃有常樂我淨則名八行皆非顛倒是則二乘但有無常樂我淨之四倒此約與之若奪二乘二乘既不能知涅槃常樂我淨則於無常樂我淨亦不如實知以其漫該如蟲食木偶成字故况不了生死實性即是涅槃要離八倒故云顛倒未除豈得稱正餘如涅槃四倒品說設許稱正亦未名最者此對邪名正對小名最以上與之能知我空異乎外道故得名正不能雙覺二空及不空義故不名最菩薩雖正下亦有二意初對二乘不名正義今對菩薩方得名正有上者上有佛故有修者未絕學故設位極下對上二乘得名正義則菩薩許得最名但未成故佛方成耳我佛獨能故云成最正覺謂如量如理了了究竟已出微細所知障故我佛獨能下第三結歸就佛具有成最正覺四字之義謂如量下對上所覺境中以釋覺義如量覺俗如理覺真三諦中道亦如理攝亦是合上二智覺於中道了了究竟揀異菩薩故涅槃云十住菩薩見不了了唯佛世尊名為了了故闍王云了了見佛性猶如文殊等已出微細下釋上了了究竟之言障有三種一現行二種子三習氣習氣種子名為微細佛已盡故然二障習氣通障菩提及大涅槃若就別說斷煩𢙉障顯於涅槃今成正覺畧言所知耳智入三世悉皆平等後智入下第二別中分二初總科二別釋即約十德別顯十身文即分十一三業普周二威勢超勝三福德深廣四隨意受生五相好周圓六願身演法七化身自在八法身彌綸九智身窮性相之源十力持身持自他依正今初即別顯菩提身之相也以成菩提時得無量清淨三輪故文中分二先法後喻法中三先意次身後語一三業普周者十中後五全十身名前五無有身言而義具之一即菩提身前緫中已示二即威勢身三福德身四意生身五相好莊嚴身今初意業即釋上成正覺前云於一切法此云三世乃橫豎影略耳智入平等是正覺成也智即二智三智四智無障礙智二智者即如理如量也此復有二一以如量智達俗名入三世以如理智證真名悉平等故佛地論云以二智覺二諦是也二者證差別性即無差別故三世即平等瑜伽云如其勝義覺諸法故名等正覺二智者下一釋二智二釋三智三釋無障礙智四釋四智以無障礙智約義即圓故列在後因三諦成故釋居前一如量智者然入有二義一達二證故以達入俗以證入真然二智相者攝論云如人初開目是名加行智如人正閉目是無分別智即彼復開眼後得智亦爾應知如虛空是無分別智於中現色像後得智亦爾如其勝義者證第二義上則二智別覺二境則三世為俗平等為真今覺俗即真是故三世即是平等勝義是真諸法是俗今以真智而覺於俗故令諸法即真勝義以其性相非一異故言三智者即俗智真智中道智也此亦二義一真俗互泯雙遮辯中則三世平等二相兩亡方為智入二真俗雖即而不壞相即雙照明中此二覺三諦之境一真俗互泯者俗即真故非俗真即俗故非真非真非俗即是中道三世即平等故非三世平等即三世故非平等為兩亡也二真俗雖即而不壞相者謂即有之空方是真空即空之有方為妙有空有不二兩相歷然如波即水而恒動水即波而恒濕故云雙照此二覺下結成在境為一諦而三諦在心為一觀而三觀在果為一智而三智如一圓珠珠相喻有珠淨喻空圓明喻中三無前後此喻一諦而三諦若以明鏡照之珠上三義一時頓現即喻一觀而三觀若就鏡中觀珠珠之與鏡非一非異則喻心境二而不二為真覺也境既雙泯而雙現智亦寂照而雙流為無障礙智覺無障礙境為正覺也境既雙泯下第三仍前三智釋無障礙智謂合前二種中道為無障礙然前三智圓融已為無礙而未明遮照無礙故復雙融明無障礙然雙泯即前雙遮雙現即前雙照若境雙泯則無心於真俗為寂也若境雙現則心權實雙鑑為照故云智亦寂照而雙流二種中道既無障礙一種二諦居然相融言四智者即圓鏡等四智也通緣三世境故並入三世通緣三世下二會釋然四智廣義次下喻中廣引論釋今此但取其中同義言通緣三世者四智皆緣三世之境果位八識相應之智皆緣三世故云並入三世下釋平等言平等者鏡智離分別故依持平等言鏡智離分別等者論云此智心品離諸分別所緣行相微細難知故云離諸分別又云純淨圓德現種依持故云依持平等意云雖言現行功德之依種子功德之持由無分別故得平等平等性智證平等性故平等性智者論云謂此心品觀一切法自他有情皆悉平等即是所觀平等故云證平等性妙觀察智觀察平等妙觀察智者論云謂此心品善觀諸法自相共相無礙而轉此即明平等能遍觀一切諸法故云觀察平等成所作智普利平等成所作智者論云謂此心品為欲利樂諸有情故普於十方示現種種變化三業此即普利之義不揀怨親豈非平等四智圓融一句攝盡下身語等皆是四智之所發現四智圓融下即歎勝也下身語等者明此中用四智之意以觀下文佛德與唯識論釋四智同故云皆是四智之顯現所以緫中宜用四智釋也四智圓融無二性故修生本有非一異故不失經宗四智圓融下第三解妨謂有難云四智菩提有為無漏非我經宗何得叅雜釋此玄旨故今通云四智菩提性相二宗皆具有之但義小異耳用之無真謂圓融無二是其一義故彼宗說四不得相雜今明一智使具四智故下出現以四寶珠喻其四智補經云復次佛子譬如大海有四寶珠具無量德能生海內一切珍寶若大海中無此寶珠乃至一寶亦不可得何等為四一名積集寶二名無盡藏三名遠離熾然四名具足莊嚴佛子此四寶珠一切凡夫諸天龍神等悉不得見何以故娑竭羅龍王以此寶珠端嚴方正置於宮中深密處故佛子如來應正等覺大智慧海亦復如是於中有四大智寶珠具足無量福智功德由此能生一切眾生聲聞獨覺學無學位及諸菩薩智慧之寶何等為四所謂無染著巧方便大智慧寶一大圓鏡智離諸分別名無染著所緣行相微細難知不忘不愚一切境相巧方便故善分別有為無為法大智慧寶二平等性智觀一切法有為無為自他境相名巧方便利他平等名善分別分別說無量法而不壞法性大智慧寶三妙觀察智此智善觀察諸法自相共相無礙而轉故說無量法而不壞法性無量法者即攝觀無盡捴持定門而言說者雨大法雨斷一切疑知時非時未曾誤失大智慧寶四成所作智知機知時作所應作故若諸如來大智海中無此四寶有一眾生得入大乘終無是處此四智寶薄福眾生所不能見何以故置於如來深密藏故自經云至此藏無方冊補以有利益故姑存之其一一智皆云平均正直端潔妙好即四智之德故况同一性居然融通言修生本有者是第二意不同彼宗彼宗四智修生涅槃本有今即四智是本覺智修生之四非別有體如金成像金像不殊故然上能覺即成上菩提就其所覺即法身也理智無二為真法身然上能覺下第三緫結所以結者欲明一菩提身已具法報二身况具下九初意業竟其身充滿一切世間二其身下身業也通三世間故云一切此正覺身以是十身之總故此其身通於三身十身無不充滿初緫明身業且寄一身以明下明攝十以為三故法身普遍世所同依故智身證理如理遍故色身無礙亦同理遍法身下明法身本體周遍智身修成如體而遍色身即體之用遍法身如虛空遍智身如日光遍色身如日影遍並是圓遍而非分遍謂一切世間一一纖塵等處佛皆圓滿總看亦現別看亦現並是圓遍下別示遍相三身皆如下說故云並是言並是圓遍者若大若小皆圓滿故非分遍者非是分析散布令遍謂一切下示圓遍相纖塵亦圓麤則可了緫看亦現者遍法界內唯一佛佛身充滿於法界故別看亦現者則向一一國土一一塵中皆見全身故下經云如於此處見佛坐一切塵中亦如是佛身無去亦無來所有國土皆明現是也又緫別看者緫則一身處處皆有別則支分眼耳鼻等各遍法界故現相品云佛眼云何無有量耳鼻舌身亦復然又國土等即是我身土等體外無別我故我即土等我之體外無土等故餘一一身互望融攝猶多燈光各互相遍又國土下二圓融緫攝遍謂前明能遍三身非所遍土今明能遍即是所遍能所互融故又明一一身相融和雜遍故又上約佛身上十身謂菩提願化力莊嚴等今明三世間無礙之十身謂國土眾生等故十身相作千何不融故云猶如燈光經云譬如𡨋室百千燈一一燈光遍室內諸佛身智亦復然二身業竟其音普順十方國土三其音下語業也順有三義一順異類言音經云一切眾生語言法一言演說盡無餘故二順所宜說法如來於一語言中演說無邊契經海故三則順遍佛以一妙音周聞十方國故譬如虛空具含眾像於諸境界無所分別又如虛空普徧一切於諸國土平等隨入二譬如下喻顯通喻三業然佛三業非喻能喻唯虛空真如略可顯示更以餘喻便為謗佛二喻此下緫明大意然佛三業非喻能喻者八十卷末云三界有無一切法不能與佛為譬喻譬如山林鳥獸等無有依空而住者虛空真如及實際涅槃法性寂滅等唯有如是真實法可以顯示於如來即其文也又佛地論第四云如契經言乃至所有施設譬喻喻諸如來所有功德一切皆是謗諸如來唯除一喻所謂虛空可喻如來戒等無量功德同虛空故然虛空喻有同不同故下經云解如來身非如虛空一切妙法所圓滿等此顯不同今分取同義同義多種如下十忍品然虛空等者上兩句標下釋二相先釋不同即第五回向之文此明佛有自利之德不同虛空不能自利而言等者等取次下經文云於一切處令諸眾生積集善根悉充足故此明如來有利他之德不同虛空今分取同下二釋同義但是分同同義多種如下十忍品者即第十如空忍經云佛子此菩薩了一切法界猶如虛空以無相故一切世界猶如虛空以無起故一切法猶如虛空以無二故一切眾生行猶如虛空無所行故一切佛猶如虛空無分別故一切佛力猶如虛空無差別故一切禪定猶如虛空三際平等故所說一切法猶如虛空不可言說故一切佛身猶如虛空無著無礙故釋曰上所引文若取緫通無相無起等皆是虛空多義若取別相唯取無分別無差別無著無礙以喻於佛佛力佛身故又彼忍下文云譬如虛空一切法依不生不沒又云不可破壞又云一切世間之所依止而無所依又云無生無滅能持一切世間生滅又云無方無隅而能顯現一切方隅又云非行非住而能示現種種威儀又云非色非非色而能示現種種諸色又云非久非近而能久住現一切物又云非淨非穢不離淨穢又云一切世間皆現其前非現一切世間之前又云普入一切而無邊際等皆喻菩提經具有合今畧不引例喻於佛亦具上諸義以十忍位是等覺故故可同佛今有二喻開成四義一含攝喻兼無分別義二普遍喻兼遍入義以此四喻喻意業者下經云佛智廣大同虛空故此總喻也以此四喻下喻其所喻別喻三業即為三𫨻古人唯將前喻喻於意業後喻身語普遍喻身隨入喻語今並喻三業但引文證居然可知初引經緫釋下經等者通於二智四智然下三句云普遍一切眾生心悉了世間諸妄想不起種種異分別了世妄想即是量智不起分別即是理智而今但取廣大同空則二四皆廣故云緫也量智包含而普遍理智無分別而證入量智包含下初喻二智取前喻中包含之義及後喻中普遍之義以斯二義並喻量智量智知差別故似包含義無法不知是普遍義理智無分別者中前喻無分別義後喻平等隨入義緫取二義以喻理智理智即無分別智方能證入真如故又大圓鏡智純淨圓德現種依持能現能生身土智影即含攝義又大圓鏡智下二以二喻喻四智於中先引唯識證包含義後引當經雙證二義今初唯識第十云一大圓鏡智相應心品謂此心品離諸分別所緣行相微細難知不忘不愚一切境相性相清淨離諸雜染純淨圓德現種依持能現能生身土智影無間無斷窮未來際如大圓鏡現眾色像釋曰純者無雜淨者離染圓者滿義現種依持者現行功德之依種子功德之持能現能生身土三智之影餘文可知下經云菩提智普現一切眾生心念根欲等而無所現無所現言無有分別下經云下第二引當經雙證二義經云譬如大海普能印現四天下中一切眾生色身形像是故共說以為大海諸佛菩提亦復如是普現一切眾生心念根欲等而無所現無所現言無有分別者上現心欲等即證含攝義今證無分別義然唯識鏡智亦有無分別義前䟽緫中已引用故故今畧之然無所現有其二義一所現空二無心現今取後義平等性智觀一切法自他有情悉皆平等亦無分別無分別言顯無差別平等性智者䟽二先引唯識論云二平等性智相應心品謂此心品觀一切法自他有情皆悉平等大慈悲等恒共相應隨諸有情所樂示現受用身土形像差別妙觀察智不共所依無住涅槃之所建立一味相續窮未來際釋曰由昔因中執有我故自他差別今我執既無故皆平等隨十地有情所樂由無住涅槃所立此識恒共悲智相應一味無漏亦無分別者彼論無有無分別言今言亦無分別乃有二意一依唯識四智通緣真如境故是無分別二者約境無差別故名無分別今初論云大圓鏡智緣真如故是無分別緣餘境故後得智攝其體是一隨用分二了俗由證真故說為後得餘三分二凖此應知釋曰凖此論文四智各通二智並通真俗今且從增勝二喻各配二智無分別下即第二意然所觀二境無分別故能觀之智亦無分別故無分別言顯無差別此顯平等性智無分別義與鏡智不同鏡智無分別若明鏡之無心平等性智無分別如日合空空無異相故名無差別謂不分別差別相故故攝論第八云應知一切法本性無分別所分別無故無分別智無故下經云於一切義無所觀察等故下經者二引當經即出現品菩提相中經云佛子如來成正覺時於一切義無所觀察而言等者等取餘經云於法平等無有疑惑無二無相無行無止無量無際遠離二邊住於中道出過一切文字言說釋曰無所觀察證大圓鏡無分別義於法平等下證平等性無分別義餘義兼具是以太虛含眾像眾像不能含太虛太虛不分別眾像眾像乃差別太虛以況我法不能容佛智佛智乃能容我法有我法者分別如來是如來者不分別我法二普遍喻中妙觀察智無不遍知即普遍義成所作智曲成無遺即隨入義二普遍喻下第二以第二喻喻妙觀察智及成所作智䟽文有四一引唯識言妙觀察者論云三妙觀察智相應心品謂此心品善觀諸法自相共相無礙而轉攝觀無量緫持定門及所發生功德珍寶於大眾會能境無邊作用差別皆得自在雨大法雨斷一切疑令諸有情皆獲利樂釋曰神用無方稱之曰妙緣自共相名為觀察自即色心等別共即同無常等又攝論云圓成實性為共相依他起性為自相言攝觀者攝即藏義觀即觀察六度道品為功德寶諸神通等為作用差別既觀有情自相共相等明無不遍知也成所作智等者論云四成所作智相應心品謂此心品為欲利樂諸有情故普於十方示現種種變化三業成本願力所應作事釋曰既云種種三業成所作事豈非委曲成就於物無所遺漏此言即周易繫辭云範圍天地之化而不過曲成萬物而不遺注云範圍者擬範天地而周𬾨其理也曲成者乘變以應物不係一方者也則物宜得所矣此說易之德今借况佛之德耳唯識論結云如是四智相應心品雖各定有二十二法能變所變種現俱生而智用增以智名顯故此四品總攝佛地一切有為功德皆盡會二宗義已如上說又下經云佛智廣大同虛空普遍一切眾生心此即智體遍悉了世間諸妄想此約智用遍又云得一切法界量等心此約證遍智性全同於色性故此約理遍又下經云下於中先釋普遍有四種遍一約智體遍二約智用遍此二即第八十經已如前引三約契證遍心與境𡨋即出現品菩提章文四約理遍者即義引起信論云問曰若諸佛法身離於色相者云何能現色相答即此法身是色體故能現於色所謂從本已來色心不二以色性即智性故色體無形說名智身以智性即色性故說名法身遍一切處所現之色無有分齊隨心能示十方世界無量菩薩無量報身無量莊嚴各各差別皆無分齊而不相妨此非心識分別能知以真如自在用義故釋曰此文亦可證下身遍今但取其二性不異之義以明智性之遍上言智體以智為體今是理性與前懸隔云何遍入不壞能所有證知故故下經云世間諸國土一切皆隨入智身無有色非彼所能見云何下二釋隨入不壞能所者由前普遍之言有其二義一有能所遍二無能所遍謂約體遍眾生却是智中物故若約理遍所遍全是能遍體故則能所不二故今此義不壞能所所證能證二相容差故下經云下引證即問明品佛境甚深中答佛境入文然彼中意入有二義一者色身入二者智身入今取智入身入可見智入唯智能知故云非彼所能見由隨於如即入無所入故云平等由隨於如下釋平等入言此乃義引淨名目連章云法隨於如無所隨故謂若有所隨所隨則在能隨之外能隨之法乃在所隨如外所隨之如不遍能隨由無所隨當體如矣若約觀行隨如之心不生真順如矣問明亦云如來深境界其量等虛空一切眾生入而實無所入即其義也是以虛空遍入國土國土不遍入虛空有國土處必有虛空有虛空處或無國土虛空之於國土平等隨入國土之於虛空自有彼此虛空可喻佛智國土可喻三世三世有處佛智必在其中佛智知處三世或無其體三世有處要者佛智通達染淨無礙一念普觀無量劫故佛智無不遍知如來定慧無邊際故前觀無始後無終故言佛知知處三世或無其體者謂真如實際涅槃法性是佛智證彼無三世故佛智之於三世平等隨入三世之於佛智自有始終此猶約不二而二說耳若二而不二國土虛空三世佛智同一性故皆互相入舉一全𭣣此猶下四緫結難思初明其隨入由上隨入之言約不壞能所故云不二而二說耳則喻中虛空為能入國土為所入法中佛智為能入三世為所入所入不得為能入今皆互相入則國土亦入虛空三世亦入佛智故云舉一全𭣣普遍亦然普遍亦然者二例普遍也上但佛智遍三世今明三世亦遍佛智三世間圓融則言思道斷故名佛智為不思議也三世間者兼結上來包含之義及無分別悉皆圓融故云不可思議次以二喻喻身業者一毛尚容法界全分必含眾像次以二喻喻身業即第二𫨻亦具四義初義引經文舉况以釋含攝之義故云一毛尚容法界全分必含眾像世界成就品云一毛孔內難思剎等微塵數種種住一一皆有遍照尊在眾會中宣妙法出現品云如人持尺量虛空復有隨行計其數虛空邊際不可得佛一毛孔無涯限次下文云一一毛端悉能含受一切世界而無障礙皆毛含法界義也出現身業第二喻云譬如虛空寬廣非色而能顯現一切諸色而彼虛空無有分別亦無戲論合云如來身亦復如是一切眾生諸善根業皆得成就即含攝義而如來身無有分別即第二義出現身業下引此一喻證前含攝兼無分別但合文未具具云如來身亦復如是以智光明普照明故令一切眾生世出世間諸善根業皆得成就而如來身無有分別亦無戲論何以故從本已來一切執著一切戲論皆永斷故對文可知佛身充滿於法界即普遍義佛身充滿者即現相品下三句云普現一切眾生前隨緣赴感靡不周而恒處此菩提座此四句皆普遍義今但用初句足已為證又云譬如虛空遍至一切色非色處非至非不至如來身亦復如是遍一切法一切國土等即普遍義又云譬如虛空遍至一切等者引此一文亦證二義謂普遍隨入二喻喻中次釋經云何以故虛空無身故合中畧引具云如來身亦復如是遍一切處遍一切眾生遍一切國土非至非不至何以故如來身無身故為眾生故示現其身今但略引足證遍義亦非至非不至即平等隨入義亦非至非不至等者謂無身故非至非至即平等非不至即不礙至是隨入義次以四義喻語業者如來於一語言中具一切語言故次以四義喻語業者即第三𫨻如次證四義言如來於一語言中具一切語言故者即證含攝義亦是義引即出現語業中第四善口天女喻合云當知如來亦復如是於一音中出無量聲隨諸眾生心樂差別皆悉遍至悉令得解釋曰據其末句可證遍至今但取前即含攝義又妙嚴品云如來於一語言中演說無邊契經海亦即含攝義也舍支天鼓無心出故舍支天鼓者即證第二無分別義此有二喻一舍支者即十忍品如響忍云如帝釋夫人阿修羅女名目舍支於一音中出百千種音亦不心念令如是出菩薩摩訶薩亦復如是入無分別界成就善巧隨類之音於無邊世界中恒轉法輪天鼓即出現語業第三天鼓覺悟喻結云佛子彼天鼓音無主無作無起無滅而能利益無量眾生下法合竟結云而如來音不住方所無有言說即無心出義又如隨好品天鼓為諸地獄天子說法云諸天子如我說我而不著我不著我所一切諸佛亦復如是自說是佛不著於我不著我所即無心義故諸論皆云佛身如摩尼珠無心現色佛已如天鼓無心出聲皆無分別義如來音聲無不至故如來音聲無下亦出現語業第一相云應知如來音聲遍至普遍無量諸音聲故此證第三普遍義應知如來音聲無斷絕普入法界故應知如來音聲下此全證平等隨入之義以普入故法界平等故又云如來音聲無邪曲即平等義隨其信解令歡喜故即隨入義又云如來下引於二文別證平等隨入二義彼文具云應知如來音聲無邪曲法界所生故言隨其信解令歡喜者具云應知如來音聲隨其心樂皆令歡喜說法明了故上來四文皆出現語業以空一喻遍喻三業故云正覺得無量清淨三輪明文昭然非是穿鑿菩提身竟以空下一喻下三結示有歸謂既明文具有故應不可唯以初喻喻智後喻喻身語也初三業普周竟身恒徧坐一切道場菩薩眾中威光赫弈如日輪出照明世界第二身恒下威勢身超勝謂隨諸有情所樂示現受用身土影像差別無不周遍謂隨諸下即唯識論平等性智之用謂以由身明義此當他受用身雖語於土意正取身唯識第十云一他受用身謂諸如來由平等智示現微妙淨功德身居純淨土為住十地諸菩薩眾現大神通轉正法輪决眾疑網令彼受用廣大法樂釋曰彼唯淨土今十身圓融染淨交徹與彼小異耳言一切道場者略有十種一智身遍坐法性道場二法身非坐而坐道場三法門身安坐萬行道場四幻化身安坐水月道場此四義便故來言一切道塲下牒經別釋上就別義配受用身為順法相此中據實故說十身皆坐道塲而言此四義便故來者為順十身別故若將十身配十二塲初二可知三即福德身願身相好莊嚴身以福德云三世所行眾福大海是萬行故願是眾行之本以行填願方能遍周故相好莊嚴由行成故故十佛中名業報佛由萬行業報得相好故如云不可思議大刧海供養一切諸如來普以功德施羣生是故端嚴最無比等皆約因成相好也然法門之言是天台依智論立名即功德法身四幻化身即化身意生身力持身此三皆屬化身攝故菩提身緫亦此化身攝此四具九兼後威勢即十身具矣上約別說既十身圓融隨舉一身即已具一坐一道塲即坐十類今就相顯故說不同耳已知十身坐處次當別釋坐義一智身遍坐法性道塲者法性是所證以能證智安處理故二法身等者法身既無能所故曰非坐非坐之坐湛然安住名坐道塲三法門身等者即淨名經光嚴童子章云佛告光嚴童子汝行詣維摩詰問疾光嚴白佛言世尊我不堪任詣彼問疾所以者何憶念我昔出毗耶離大城時維摩詰方入城我即作禮而問言居士從何所來答我言吾從道塲來我問道塲者何所是答曰直心是道塲無虛假故發行是道塲能辦事故深心是道塲增益功德故菩提心是道塲無錯謬故布施是道塲不望報故持戒是道塲得願具故忍辱是道塲於諸眾生心無礙故精進是道塲不懈退故禪定是道塲心調柔故智慧是道塲現見諸法故廣說乃至云一念知一切法是道塲成就一切智故如是善男子菩薩若應諸波羅蜜教化眾生諸有所作舉足下足當知皆從道塲來住於佛法矣釋曰光嚴謂事道塲故問道塲何者是淨名以法表示故萬行為得道之處即是道塲故曰法門身坐萬行道塲耳四幻化身安坐木月道塲名涅槃云吾今此身是幻身則所得道之處如水中月故昔人云修習空華萬行安坐水月道塲降伏鏡像天魔證成夢中佛果意云若因若果皆從緣生如幻夢故若正約威勢身略辨六類道場一遍一切同類世界道場如名號品等說二一切異類世界謂樹形等如世界成就品三一切世界種中四一切世界海中並如華藏說五一切微塵中文云如於此會見佛坐一切塵中亦如是等六剎塵帝網無盡道場并前十種故云一切若正約威勢下別辯十身之一坐六類道塲但自狹之寬威勢既通變化他受用身故約諸剎漸寬周遍法界乃至重重如名號品等者等取四聖諦光明覺品及昇忉利天宮品謂遍法界虛空界皆有百億四天下等一類相似佛皆遍故已如前引其名號四諦皆先列百億後結周遍皆有百億十千名等故知皆是同類界也下之五類至下當見言菩薩眾中威光赫弈者正顯威勢超勝勝於勝者故獨言菩薩非不超餘如日輪出照明世界約喻以顯暎山出沒無隱顯故處處全現無異體故喻遍坐道場言菩薩眾中等者即以此文顯是威勢身也映蔽菩薩故映山出沒者謂映山出沒如化身坐道塲無隱顯者即法身坐道塲處處全現下即報身坐道塲以即應即真故隨處即全皆無異體大明流空餘輝掩耀赫日之照難究其涯喻彼威光超暎菩薩菩薩不能測也大明流空下正釋威勢大明即日餘輝謂星月等日喻如來月喻菩薩星喻餘眾正取映奪是威勢義兼菩薩不測亦威勢義赫日之照等者即夜摩會勝林菩薩偈云譬如孟夏月空淨無雲翳赫日揚光輝十方靡不充其光無限量無有能測知有目斯尚然何况盲𡨋者諸佛亦如是功德無邊際不可思議刧莫能分別知既云照世則終益生盲先照高山獨言菩薩既云照世下通妨謂有問言既十身圓融則普應一切何為唯處菩薩眾耶故義取喻中如日輪出之言則無所不益故云終益生盲三世所行眾福大海悉已清淨第三三世下福德身深廣三世佛德昔皆遍學今三際已斷垢習斯亡故眾福皆淨今三際已斷者此下釋清淨義若有三世相福非清淨稱法界修故無三際謂不從前際來非向後際去不於現在住法身已淨為斷三際福豈可量萬行之上垢習斯亡故云清淨謂恒沙煩惱皆已盡故而恒示生諸佛國土第四而恒下隨意受生一隨他意處處受生二隨自意能無不生謂慈悲般若恒共相應感而遂通窮未來際四即意生身然意生有二義一者是喻猶如意去速疾無礙故二者是法自有二義一隨自意二隨他意緫謂隨意速疾而成故謂慈悲般若等者此即唯識平等性智之用下配屬於化身畧舉一相實則此身亦通他受用隨十地菩薩意所生故又悲智相導通化用故化身即是無住涅槃之大用故感而遂通者即周易繫辭云夫易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此注曰至神者寂然而無不應斯蓋功用之母象數之所由生意明亡象方能制象遺數方能極數非動方能應動彼取易之虛無無動故能無不動今借此言以况如來內體圓寂外應羣生躡上眾福已淨之體寂便言而恒示生故云寂然不動感而遂通即法身無生無所不生耳無邊色相圓滿光明徧周法界等無差別第五無邊色下相好莊嚴身色無盡故名色無邊十蓮華藏微塵數相名相無邊而皆稱真則一一無邊諸相隨好放光常光皆稱法界故云圓滿廣處陿處皆圓現故名無差別演一切法如布大雲第六演一切法下即願身演法謂雨大法雨斷一切疑故下經云毗盧遮那佛願力周法界一切國土中恒轉無上輪初標示大意謂雨大法雨斷一切疑即引唯識妙觀察智之文別成此義然經二句上法下喻文含多意一雲喻於身雨為說法法喻影略又先興慈雲後霔法雨一雲一雨所潤不同亦隨物機宜雲雨各異掩塵蔽日普覆無心等三牒經委釋緫有五意一雲喻法身雨喻說法法喻影畧者出現語業第十娑竭羅龍王降雨喻中廣說諸處雲色不同雨亦各別合中云佛子如來應正等覺無上法王亦復如是欲以正法教化眾生先布身雲彌覆法界隨其所欲為現不同所謂或為眾生現意生身雲或為眾生現化身雲或現力持身雲色身雲相好身雲福德身雲智慧身雲諸力不可壞身雲無畏身雲法界身雲皆有或為眾生現言次云此相現已一切眾生身之與心皆得清涼然後從如來大法身雲大慈悲雲大不思議雲雨不思議廣大法雨令一切眾生身心清淨所謂為坐菩提塲菩薩雨大法雨名法界無差別等故知雲為現身雨為說法言法喻影畧者法中但有法說喻中但有興雲故若具應云廣現化身演一切法如布大雲雨大法雨又先興慈雲等者亦即上出現所引之文一雲一雨等者即法華藥草喻品云一雲所雨稱其種性而得生長華果敷實雖一地所生一雨所潤而諸草木各有差別喻也合云迦葉當知如來亦復如是出現於世如大雲起以大音聲普遍世界天人阿修羅如彼大雲遍覆三千大千世界釋曰上即合雲次云如來于時觀是眾生諸根利鈍精進懈怠隨其所堪而為說法種種無量皆令歡喜快得善利釋曰上即合雨何以知是一耶次云如來知是一相一味之法所謂解脫相離相滅相究竟至於一切種智即一雲一雨之義偈云其雲所出一味之水草木叢林隨分受潤亦一雲一雨所潤不同下云為大眾說甘露淨法其法一味解脫涅槃以一妙音演暢斯義乃至云正見邪見利根鈍根等雨法雨而無懈倦一切眾生聞我法者隨力所受住於諸地或處人天轉輪聖王釋梵諸王是小藥草等皆一雲一雨所潤不同也亦隨物機等者亦出現意上引法華雲雨則一所潤不同喻佛身說法曾無有差異在於物今明佛能具異謂現十身雲降十法雨如娑竭羅龍王興雲或閻浮檀金光明色或毗瑠璃光明色或白銀光明色或玻𬎙光明色等即雲不同次云所謂於大海中雨清淨水名無斷絕於他化自在天雨簫笛等種種樂音名為羙妙等即雨不同也故云雲雨各異掩塵蔽日等者即十地經及法華意法雲地云佛子此地菩薩以自願力起大悲雲震大法雷通明無畏以為電光福德智慧而為密雲現種種身周旋往返於一念頃普遍十方百千億那由他世界微塵數國土演說大法摧伏魔怨復過此數於無量百千億那由他世界微塵數國土隨諸眾生心之所樂霔甘露雨滅除一切眾惑塵𦦨是故此地名為法雲釋曰此即掩塵及普覆義無心之義乃是通說即出現云復次佛子譬如海中有大龍王名大莊嚴於大海中降雨之時或降十種莊嚴雨或百或千或百千種莊嚴雨佛子水無分別但以龍王不思議力令其莊嚴乃至百千無量差別如來應正等覺亦復如是為諸眾生說法之時或以十種差別音說或百或千或以百千或以八萬四千音聲說八萬四千種行乃至或以無量百千億那由他音聲各別說法令其聞者皆生歡喜如來音聲無所分別但以諸佛甚深法界圓滿清淨能隨眾生根之所宜出種種言音皆令歡喜等即無心義即娑竭興雲喻中亦云雖彼龍王其心平等無有彼此但以眾生善根異故而有差別亦是無心之義法華亦云我無貪著亦無限礙又云等雨法雨而無懈倦皆無心義一一毛端悉能容受一切世界而無障礙各現無量神通之力教化調伏一切眾生第七一一下化身自在謂於大眾會能現無邊作用差別皆自在故謂於大眾下即引唯識妙觀察智之用釋成化身文中二先明廣容無礙謂於如來身一一毛頭容一切剎而無障礙無礙有二義一以一小毛現多大剎則一多大小無礙二此毛多剎與彼毛多剎參而不雜則隱顯無礙廣容無礙者謂法界如空有其二義一廣容二普遍今一塵如法界之包含故即是廣容後各現下普遍以廣容不礙普遍故還於前毛內剎中神力調生若廣遍十方示現種種變化三業成所作事居然易了以廣容下出毛內調生所以謂廣容則收法界入於一毛普遍則展一毛遍於法界今毛正容無邊剎時即普遍故便遍所容剎內若廣遍下二舉况釋謂尚遍毛內何况外耶䟽文即是成所作智之妙用也身遍十方而無來徃第八身遍下法身彌綸以法為身本來湛遍故無來徃彌綸即周遍包羅之義以法為身等者先明法性身遍無來往依法現色還如法身在此即是在彼亦不待徃來依法現色下約應化法身明無來往所以用此釋者由下以三身收之以此屬化身故智入諸相了法空寂第九智入下智身窮性相之源相別曰諸性皆空寂性靜故寂相無故空三世諸佛所有神變於光明中靡不咸覩一切佛土不思議劫所有莊嚴悉令顯現第十三世諸佛下力持身能持自他依正於中先持正報神謂妙智變謂現身轉變變現俱名為變皆能持之尚持於他况於自事後叚亦然力持等者䟽文有二先正釋力持後以三身收束前中又二初正報二依報今即初也後一切佛土下能持依報橫盡諸土豎窮諸劫所有嚴事常持令現上約十身若約三身者則初三叚皆名報身而恒下化身身遍十方下法身就報身中前一自受用報後二即他受用報故云處菩薩眾上約十身今以三身收束於中初約三身四身然則十望於三有通有局菩提為緫亦是化身餘九身中願化力持此唯化身意生威勢通他受用及與變化福智相好通於二報及變化身法局法性今取順次故為此配所以前菩提身復明真身向來法身復明色身欲順今次第配故耳以諸教中說三身四身成說等別今皆圓融於一始成無不頓具二出收束所以謂有問言何用更以三身收束十身故今釋云以諸教三四迢然不同今明圓融一身具三則權實有別言三身成異者法身無成出障為成報身四智創圓為成化身八相菩提𣗳下為成三身說異者法身無說報身佛佛相見亦無有說化身有說若攝末歸本應化非真佛亦非說法者即報身說報同所證是法身說言四身成說異者於報身中開自他受用自受用遍法界成則無所說他受用為十地成為十地說若依楞伽四佛皆說而說不同言四佛者一化佛二報生佛三如如佛四智慧佛初化次報後二皆法如如及如如智為法身佛亦可智亦是報自受用故言說異者化身說五戒等因緣法報佛說三性法謂為地上菩薩說今成佛故法佛唯說離心自性則以無念會於法界是故法佛唯說法性智佛說者依淨法界了相智覺如說而解故名為說十身為正三四義兼又毛內調生光中持剎如空普遍等亦即國土等十身三世間圓融豈報化之云別四融國土等十身毛內調生則有眾生身聲聞身緣覺身菩薩身及業報身光中持剎是國土身如空普遍是虛空身菩薩眾中亦菩薩身如來居然可見三世間下謂十身中眾生業報即眾生世間國土虛空即器世間餘是智正覺世間此三情非情異染非染義尚得為一豈一如來身上而分報化之殊明知權說隔歷難可比此圓融是知略以十德歎於教主其一一德無不圓融當去情思之矣音釋纖思廉切細微也範音范分齊分扶問切齊才詣切限量也詰契吉切赫弈赫郝格切弈夷益切赫弈光盛貌填亭年切音田滿也錯謬錯倉各切謬眉救切錯謬舛誤也霔未戍切霖霔也
