body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述十住品第十五初來意者上由致既彰正宗宜顯故次來也又前辨所依佛德今辨能依十住故次來也又前辨所依下上即通明此下別顯上是古意此下是今意如前已明二釋名者慧住於理得位不退故名為住本業下卷云始入空界住空性位故名為住然住義多種寄圓說十總言十住帶數釋也下諸品有十凖此可知二釋名然住有二義一約能所合釋故言慧住於理則理是所住慧是能住二唯約慧釋信未終極慧未安住得入正位位不動搖故云得位不退然位不退復有二義一約三乘至第七住位方不退二約終教入初住位即云不退異輕毛故今依後義則通十住位皆不退從初受名本業云始入空界即證初義住空性位即證後義三宗趣者以十住行法為宗攝位得果為趣四釋文者四品分二前三當位行德後一勝進趣後前會無勝進者但是趣位方便未成位故廻向是位無進趣者三賢位滿總為趣地之方便故亦顯趣無分別離趣相故前會無勝進下上正科經文此下對前辨異迴向是位下通其外難先牒難也三賢位滿下通通有二意一明有勝進總攝前三故不別立二亦顯下明無勝進則後無方便欲證無分別智故爾時法慧菩薩承佛威力入菩薩無量方便三昧今初分三初品辨位次品辨行後品明德初亦名解文分七分一三昧分二加分三起分四本分五說分六證成分七重頌分今初何故入定略辨六意一此三昧是法體故二非證不說故三顯此法非思量境故四觀機審法故五為受佛加故六成軌儀故餘如玄說畧辨六意者前三取下論勢然其三意大同小異異相云何一是所證法體欲說此法要須心比體二非證不說者揀異未證之人亦許心合法故三非思量境者絕思方說亦通未證故四觀機則識病所宜審法則知藥功力不觀人根不應說法不審而說理事或乖應病與藥令得服行矣五散心不堪諸佛加故六菩薩常定但為物執菩薩將說尚須入定况凡夫耶文有三別一入定人法慧入者是眾首故餘入則亂不調伏故顯十住法慧能說故二入定依謂承佛力推功化主表無慢故三入定名為揀果定故云菩薩任性能知觀解善巧故名方便十住各攝各門善巧故云無量心詣於法故云入也又一切三昧皆有三相謂入住出五識對境意從門出遠境護根意識却入此通權小今即照之寂故名為入即寂之照故名為出入已未起故名為住餘三昧等並如前釋是眾首者此有二意一約教相云是眾首言餘入則亂者此即論意謂有問言豈此海會無如法慧故應答云眾雖德齊眾人爭入眾則亂故次應問曰何不亂入答云眾調伏故故今䟽云亂起則不調伏顯十住下二約表法說任性能知下釋方便言此有二意一以絕分別心名為方便如下文云以無所得而為方便初池經中無分別智名大方便二約善巧事理無礙故如常所明以三昧力二以三昧下加分於中三初總辨因緣二明加所為三別顯加相今初又三一標加所因二加緣顯現三讚說因緣今初謂以三昧力故論云所以偏加金剛藏者得此定故前由佛力能入今由定力佛現互為增上力相云何謂無作三昧顯自覺智寂不失照𡨋同佛心故感佛現三業加也互為增上者前則佛力為入定緣今則入定為佛現緣十方各千佛剎微塵數世界之外有千佛剎微塵數諸佛皆同一號名曰法慧普現其前二十方下加緣顯現來處佛數皆云千者望行猶劣故多佛加者顯於法及法師增敬心故又顯諸佛同說故加佛同名法慧者得法不異故論云此菩薩聞同己名增踊躍故但諸佛於此住門中現皆名法慧以法力故法應爾故普現其前者不來而至故言望行猶劣者行一萬故行向有前望前辨過今前未有故望後言劣餘義多同十地雖賢聖位殊儀範相似又圓教十住似十地故告法慧菩薩言善哉善哉善男子汝能入是菩薩無量方便三昧善男子十方各千佛剎微塵數諸佛悉以神力共加於汝又是毗盧遮那如來徃昔願力威神之力及汝所修善根力故入此三昧令汝說法三告法慧下讚說因緣於中二一讚有加因能入定故言汝能者希越之辭此定難得汝今乃能入故舉定名者向來默入眾未知名故舉歎之令眾仰故二善男子十方下雙說加定因緣於中先別顯四因一伴佛神力諸佛自說者令眾敬仰故二主佛宿願三主佛現威四法慧善根略無大眾機感後入此三昧令汝說法二句結因所屬謂由上四事前三為緣第四是因因緣合故入此三昧故前四定因令汝說法即是加因故論云何故加為說此法故故十行十向之中皆云令汝入是三昧而演說法故又此令汝說法亦是後文之總令汝說法者意明加因亦有其四故下正釋後三復為加因更添說法即是四因然為說法即是入定故下引諸會合說法與定為一入定本為說法入定既為加因則說法即是加因故初標云一讚有加因諸佛遮那皆由願力故二願皆為加因然十地論釋諸佛遮那皆由先願故加則此四𫨻俱是加因以彼經中諸佛但云加汝威神遮那則云本願力故加古人便將諸佛之加為得定因下之三緣轉為加因便令得定無後三因則又字何用既結云令汝入是三昧何得後三不為定因非唯違經文理亦乃乖論所釋言四𫨻者即上四因謂諸佛為一遮那為二威神為三自善為四而論但有二因今以遮那之願是加因例於後二亦是加因以彼經下初出昔解之源然具論經云諸佛皆同一號加汝威神此是盧舍那佛本願力故加古人下二正申昔解昔人見上諸佛威神加而得定下云此是盧舍那佛本願力故加加因分明故分二因亦例此經後二皆加因而言轉為加因者不連上因是得定因故云轉為亦展轉義得定由諸佛加諸佛加由主佛本願力故云展轉便令下二辨有違違相云何正由得定無三因故無之何過違文理故何名違文舉其二文一違又字夫言又者復重之義下之所列同是定因則得言又又是此因故既上是定因下是加因何用又字二違結文既列二因竟云入此三昧令汝說法明知此三皆定因也然此經文令汝二字在三昧下今䟽乃安三昧上者有二義故一以義廻既云善根力故入此三昧則知令汝義合在上二以行向二品為例十行亦先列四因竟即云今汝入是三昧而演說法十廻向亦是列四緣後即云令汝入是三昧以此故知理必後三通定因也非唯違經下結破言違理者自無善根主佛不加何能入定亦乖論者論釋同號佛加云何故同號金剛藏加如來願力故何故如來作是願顯示多佛故又此三昧是法體故汝今既以願屬遮那彼顯願因云此三昧是法體明知為三昧故發願而加則顯願為三昧因矣下䟽正釋更出其相如實義者此之四因通於二義一由此四為得定因如上所辨二由後三復是加因諸佛即以願力而為加因論主為顯斯旨故云彼佛先作是願今復自加如實義下三申今正義則初一唯得定因後三通二諸佛即以下通妨難也謂有問云前言此四皆是加因今何加因但取後三故今釋云初因有二一約現文此是十方諸佛共加於汝即是加相只得以加為得定因不應以加自為加因若依論云諸佛昔願故加則諸佛亦為加因是故前云四皆加因下引論文證成願為加因之義蓋通論意而其䟽意加因亦四自以入定為其一耳如上所明問加之與定何先後耶若先定後加則不應云汝能入此三昧此是十方諸佛共加於汝乃至云及汝善根力故入此三昧若先加後定則不應在三昧分後方說加分又十地論云何故加為說此法故不言為入三昧故又云唯加金剛藏不加餘者以是菩薩得此定故既俱文證如何會通古人答云加定同時謂若未定而加則散心不能勝受若未加而定則自力不堪入此深定是故同時此解亦違教理現言入三昧竟諸佛方現身稱讚得定及說加所為竟方與三業之加而云同時豈不違文若言同時為因不成斯則違理亦不應引俱有因證以此二事容相離故若正釋者加有二種若約內外善根威神願力𡨋資令其得定則在定前若約與智讚述摩頂勸說三業顯加則居定後二文昭著何其惑哉後亦不應下遮救恐彼救云俱舍論云俱有互為果如大相所相心於心隨轉釋曰俱有者俱時而有也互為果者釋俱有因義論云若法更互為士用果彼法更互為俱有因下二句指法體此有三類一如大者謂四大種互相假藉生所造色故互相望為俱有因二相所相者即生等四大相也此四大相與所相法更互為果謂此能相相所相故復由所相能相轉故故互為果三心於心隨轉者謂心王心所隨轉法亦更互為果釋曰謂彼救云俱有因果既得互為云何不可故今遮云彼三類法皆不相離如相所相所相無相不成有為能相無所無有依止今或有加而不入定或時入定不必須加二許相離云何成例為增長佛智故深入法界故善了眾生界故所入無礙故所行無障故得無等方便故入一切智性故覺一切法故知一切根故能持說一切法故所謂發起諸菩薩十種住第二為增長下辨加所為且對加因名加所為然加所為正在說法此十亦即說法所為展轉相成言展轉相成者舉佛願等為得加故所以加者為說法故若更進釋則有四重一諸佛願等為入三昧故二入三昧者為得加故三所以加者為說法故四說法為何為令菩薩增長佛智等故文分二別初十句別明後一結說前中文含二意望加所為即是別說望於說法即說法之意謂加為說法說法為何為增佛智等然說法所為即加所為於十句中初總餘別總謂說十住法令信解諸菩薩修行增長性習二性生菩提智故又此因智即同佛智亦得言增增智何用深入法界等故九句五對初二證真了俗對謂入無入相故云深入了相了性故云善了次二無障無礙對由入法界離煩惱礙由了眾生離所知障次二圓因趣果對謂巧安真俗無等故因圓入薩婆若故云果滿次二識法知根對後一句雖非文對而是義對謂內持諸法外說利他所謂下總結所說謂若說十住則前所為皆得成就善男子汝當承佛威神之力而演此法第三善男子下正辨加相分三先口加勸說以增辨二意加冥被以益智三身加摩頂以增威今初可知初口加者此中有三一口加標名二勸說是加相三增辨是加意亦加益下二業例此是時諸佛即與法慧菩薩無礙智無著智無斷智無癡智無異智無失智無量智無勝智無懈智無奪智何以故此三昧力法如是故二是時下意加中先加後釋前中與十種智初總謂四無礙解智是說法所依故餘皆樂說無礙一無著者論名不著辨才於所說法無住著故即七辨中㨗辨須言即言故無著也二無斷智即無斷辨謂相續連環終無竭故三無癡者即是迅辨明於事理心無癡闇言則迅疾如懸河故四無異者即應辨也應時應根無差異故五無失者即無錯謬辨凡說契理無差失故六無量者即豐義味辨名數事理皆無量故七無勝者即一切世間最上妙辨此有五德一甚深如雷二清徹遠聞三其聲哀雅如迦陵頻伽四能令眾生入心敬愛五其有聞者歡喜無猒具斯五義故云無勝上即七辨八無懈者通䇿前七無疲倦故九無奪者具前總別無能制伏令退屈故論名不著者所為小異與辨等大同故得引論以釋今經廣有義相如十地䟽何以故下徵釋先徵意云諸佛有力能與有慈能普何故十智唯與法慧下釋云法慧得此三昧法爾如是得諸佛加是時諸佛各伸右手摩法慧菩薩頂三是時下身加一令增威二令起故然三加同時隨義為次承前說便故先語加為令起定身最居後準地論經有諸佛不離本處則去住無礙手又不延則延促無礙同時觸頂一多無礙故是奇特要摩頂者楞伽云若有不為如來二種神力之所建立而能說法無有是處一者身面言說神力即前語加二者灌頂神力即智灌心頂手摩身頂頂受摩者上稟尊力故右手者法慧所說順理機故諸佛隨順法慧說故然三加同時下上釋文此下辨次楞伽云下引證彼經第二云復次大慧如來以二種神力建立菩薩摩訶薩頂禮諸佛聽受問義云何二種神力建立謂三昧正受為現一切身靣言說神力及手摩頂神力大慧菩薩摩訶薩初地菩薩住佛神力所謂入菩薩大乘照明三昧入是三昧十方世界一切諸佛以神通力為現一切身靣言說如金剛藏菩薩摩頂及餘如是相功德成就菩薩摩訶薩下又云大慧若菩薩摩訶薩離佛神力能辨說者一切凡夫亦應能說釋曰今䟽義引正引後反釋之文兼取前列二相法慧菩薩即從定起第三法慧菩薩下起分略由四意一三昧事訖故二已得勝力故三說時至故四定無言說故此四後後以釋前前此四後後者亦展轉通難謂有難云云何事訖入定為受佛加今已得勝力故為事訖復應問曰雖得勝力何不且定答云說法時至故次又問云何不定中說答云定無言說故告諸菩薩言佛子菩薩住處廣大與法界虛空等佛子菩薩住三世諸佛家第四告諸下本分文分為三初總顯體相次標以許說後別陳其名今初然十住體略有三種一約所依即前三昧依此說於十住法故論云三昧即法體故二者約本即下所辨三尅性體若約所緣即真俗二境若約能緣即悲智二行二境既融悲智不別境智𡨋契同一法界也然十住體者若立章門十住畧以五門分別一釋名二出體三辨相四定位五諸門分別今經䟽皆具一名中有總有別總如品初別名如本分出體即今文辨相即經文定位次下當說諸門分別含在前後文中今此出體畧有三重今約本體若直觀經文則住處二字總示其體廣大已下略顯其相住三世佛家結示住處今依地論類例以解則住處為總餘皆是別總即示體此云住處十行名行業十向名願十地名願善決定皆當位體也而得名不同者何耶然三賢十聖皆以菩提心而為其體菩提心有三一者直心正念真如法故二者深心樂修一切諸善行故三者大悲心救護一切苦眾生故所念真如亦即本智本覺智故後二顯是恒沙性德然此三心有一必兼餘二而二賢互有增微十住直心增故故名為解解為行願本故首而明之十行深心增故名為行依於前解以起行故十向大悲增故名為願廻前解行願諸眾生離苦得樂故十地三心等證故名決定而大悲為首故舉其願是以論云願善決定者如初地中發菩提心即此本分中願十信通信此三等覺此三等佛故知菩提心是諸位通依今此住位名住處者若從增勝則以深般若住於真如即復由此而為行願之所住處若從通說俱住上三菩提心家故住處梵本名為俱羅此云家也家即家族是以舊譯名為種性即四種性中習種性也良以此家菩薩所居故翻名住處下文還就佛家以結直心增名解者正念真如是智解故三心等證名善決定者證理無差故而大悲為首下通妨妨云若總三心何以地體名願善決定通意可知大悲為首即下經文別中句乃有二義乃有三一廣大與法界等是勝住處然地經總句是於決定不應學彼此中廣大即是勝義其法界言含於四義一正念真如同理法界深無際限勝諸凡夫亦勝二乘偏真理故二普該菩薩無邊行相大悲深心同事法界無有邊量勝二乘故三者三心無礙同無礙法界事理融故四同圓融法界一一塵中無不具故此與第三勝權菩薩別中句乃有二下第二釋別句於初句中分成二義謂與法界等與虛空等是勝住處者下論釋云大勝高廣一體異名故彼經云廣大如法界然地經下彈古古人亦取下論立其三義而云一勝善決定二因善決定三不怯弱善決定故今破云彼中總句是決定故別句為六決定今經總句是住處即合別句為三住處但取類例如何一向學彼則好學太過也此三義理應尋下十地經二虛空等者是因住處因有二種一無常愛果因是因如虛空依是生色色不𥁞故二常果因今是地前故闕此也古德又云一一位中如空包含無邊行海又如空周徧非至非不至又如空無礙故今是地前者且依行布未證真如故無常果因盡未來際如空包含者此三義中一事次理三即無障礙法界然類六決定而但有三者餘三證如方得有故謂一觀相善云無雜二真實善云不可見三大善云普能救護一切眾生皆未證如故無此三矣三住三世諸佛家準論此名不怯弱住處謂菩薩所住即佛所住故名佛家進住佛家是不怯弱若直釋經文即結示也謂向言住處何所住耶謂住佛家佛家即是大菩提心諸佛住此生菩薩故真如悲願究竟唯佛方能住故言三世者是讚勝也彼菩薩住我今當說二彼菩薩下牒以許說可知諸佛子菩薩住有十種過去未來現在諸佛已說當說今說三諸佛子菩薩住有十種下別陳其名文有三別初標數引證二依數列名三總結顯勝今初謂三世佛果無不由此十住因成如大王路法爾常䂓故同說也何者為十所謂初發心住治地住修行住生貴住具足方便住正心住不退住童真住法王子住灌頂住一何者下依數列名初發心住者瓔珞云是上進分善根人若一劫二劫一恒二恒佛所行十信心信三寶常住八萬四千般若波羅蜜修一切行一切法門乃至始入空界住空性位故名為住依仁王起信即十千劫來修信行滿入位不退創起大心發心即住名發心住三種發心中即信成就發心也二治地者謂常隨空心淨八萬四千法門清淨潔白故為練治心地使悲智增明名治地住三巧觀空有增修正行故四生佛法家種姓尊貴故五帶真隨俗習無量善巧化無住故六成就般若故聞讚毀真正其心念不動故七入於無生畢竟空性心心常行空無相願止觀雙運緣不能壞故八心不生倒不起邪魔破菩提心故九從法王教生解當紹佛位故十從上九住觀空得無生心最為上故諸佛法水灌心頂故乃至始入者乃至二字中間則有所越皆信受行常起信心不生邪見十重五逆四倒八倒不生難處常值佛法廣多聞慧多求方便始入空界住空性位故名為住此後復云空理智心習故佛法一切功德不自造心生一切功德故不名為地但名為住釋曰學他非自有故名住不名地餘可知十皆彼經二中謂練治下䟽釋三中經但云長一切行四中云生在佛家種性清淨五中云多習無量善六中成就第六般若七中止觀下䟽意八九全同十中諸佛下䟽取經意然此十住得名有三謂四八九十從喻為名第七離過受稱餘約功德從其所喻皆持業釋若從能喻或依士釋然此十住下謂於釋名門中有總名別名各有得名釋名今皆具足從其所喻下即是釋名會六釋故謂發心即住為持業釋若從能喻等者喻劣法故此一即依主釋中開出然六釋義上下多有今當畧出謂西方釋名有其六種一依主二持業三有財四相違五帶數六鄰近以此六種一一具二若單一字名即非六釋以不得成離合相故初依主者謂所依為主如說眼識識依眼起即眼之識故名眼識舉眼之主以表於識亦名依士釋此即分取他名如名色識如子取父名名為依主父取子名即名依士所依劣故言離合相者離謂眼者是根識者了別合謂此二合名眼識餘五離合準此應知言持業者如說藏識識者是體藏是業用用能顯體體能持業藏即識故名為藏識故言持業亦名同依釋藏取含藏用識取了別用此二同一所依故云同依也言有財者謂從所有以得其名一如佛陀此云覺者即有覺之者名為覺者此即分取他名二如俱舍對法藏對法藏者是本論名為依根本對法藏造故此亦名對法藏論此全取他名亦名有財釋言相違者如說眼及耳等各別所詮皆自為主不相隨順故曰相違為有及與二言非前二釋義通帶數有財言帶數者以數顯義通於三釋如五蘊二諦等五即是蘊二即是諦此用自為名即持業帶數如眼等六識取自他為名即依主帶數如說五逆為五無間無間是果即因談果此全取他名即有財帶數言鄰近者從近為名如四念住以慧為體以慧近念故名念住既是鄰近不同自為名無持業義通餘二釋一依主鄰近如有人近長安住有人問言為何處住答云長安住此人非長安以近長安故云長安住以分取他名復是依主鄰近二有財鄰近如問何處人答云長安以全取他處以摽人名即是有財以近長安復名鄰近頌曰用自及用他自他用俱非通二通三種如是六種釋然下諸品多用本名但云依主持業等可以意得是名菩薩十住去來現在諸佛所說三是名下總結可知若定位者略有十義一依唯識等五位之中即當初位言五位者一資糧位即是三賢從初發心積習福智為道資糧為眾生故修解脫分善二加行位順解脫分既圓滿已為入見道復修加行亦名順决擇分三通達位即是見道謂初入地二種見道四修習位始從初地第二住心乃至金剛無間心位名為修道五究竟位金剛心後解脫道中𥁞未來際皆此位攝若定位者一依唯識五位即論第九第十總有五頌位各一頌一資糧二加行三通達四修習五究竟位初資糧偈云乃至未起識求住唯識性於二取隨眠猶未能伏滅論曰從發深因大菩提心乃至未起順決擇識未住唯識真勝義性齊此皆是資糧位攝為趣無上正等菩提修習種種福智資糧故為諸有情勤求解脫由此亦名順解脫分釋曰謂修福智二事資糧益己身之糧用故涅槃名為解脫行行行不違故名為順分者因義支義是解脫因之一分故二加行頌云現前立少物謂是唯識性以有所得故非實住唯識論曰菩薩先於初無數劫善備福德智慧資糧順解脫分既圓滿已為入見道住唯識性復起加行伏除二取三通達位頌云若時於所緣智都無所得爾時住唯識離二取相故下論文云加行無間此智生時體會真如名通達位初照理故立見道名四修習位頌曰無得不思議是出世間智捨二麤重故便證得轉依釋曰從初入地二見道後住心已去名修習位論曰菩薩從前見道起已為斷餘障證得轉依復數修習無分別智五究竟位頌曰此即無漏界不思議善常安樂解脫身大牟尼名法此後四位至十地品當廣分別今是三賢之初即初位之初名初位攝則知第四五會亦初位攝十地即是二三四攝第七一會是修習餘乃第五攝具等妙覺故下之九義雖但釋住則以例釋差別因果準思可知二依攝論第六說有四位即當初位之初言四位者一勝解行位始從十信終於地前餘三見修究竟同五中後三二依攝論等者即彼論入所知相分中論云何處能入謂即於彼有見似法似義意者大乘法相等所生處勝解行地見道修道究竟道中於一切法唯有識性隨聞勝解故如理通達故治一切障故離一切障故無性釋云何處能入者問所入境及能入位謂即於彼有見等者謂於大乘法相等是所生決定行相似法似義意言能入於此境界能入是用所入境界是入是持於此意言或能入在勝解行地於一切法唯識性中但隨聽聞生勝解故或有能入在見道中如理通達此意言故或能入在修道中由此修習對治煩惱所知障故或有能入在究竟道中最極清淨離諸障故如是四種是能入位釋前本論中有四節一明所入二意言為能入三勝解行地下明能入位四位能入四於一切法唯有識下出四入之相上釋論中已摘破配竟三依瑜伽四十七說十二住當其第二之初言十二者一種性住謂彼菩薩性自仁賢性自成就菩薩功德任持一切佛法種子性離麤垢不能現起上煩惱纏二勝解行住謂從初發心乃至未得清淨意樂所有一切菩薩行是三極喜住四增上戒住五增上心住六七八三名增上慧分成三種謂六覺分相應增上慧住七諸諦相應增上慧住八緣起流轉止息相應增上慧住九無相有功用住十無相無功用住十一無礙解住十二最上菩薩住十三最上如來住言十二住就菩薩說加後如來為十三住第二即是三賢第三已去如次十地三依瑜伽等者論云云何十二住等嗢陀南云種性勝解行極喜增上戒增上心三慧無相有功用無相無功用及以無礙解最上菩薩住最極如來住長行釋云謂菩薩種性等具列其名而無次第今䟽依下釋加於次第便引釋文已畧釋竟然彼廣釋中皆先問後答今初先有問云云何菩薩種性住此問位體云何菩薩住種性位此問能住人今䟽引答具答二問文有三𫨻初答後能住人間謂由性仁賢性能成菩薩行德不由思擇制約有所防護故即善行人任持等者二答前位體問也此言猶畧具足論云若諸菩薩種性任持一切佛法種子於自體中於所依中具足有一切佛法一切種子釋曰阿頼耶識名為自體相續之身名為所依未發心前彼自體中佛法種子為此住體種性即住持業釋也以其宗中立有五性此即菩薩種性人也性離麤垢下三約煩惱輕微重釋能住人也此言亦畧具足論云又諸菩薩種性住性離麤垢不能現起上煩惱纏由此故無造無業或斷善根二勝解行住者釋文具足論也彼䟽釋云即以此住有漏種現及無漏種諸善為體而猶未證真寂之理但印持決定而起諸行故名勝解行三極喜住者即以所得無為有為無漏善等而為其體下諸位體皆同此體但約初得以受別名廣如地品三即初地從四至十二配二地至十地易故不釋四亦依瑜伽及顯揚第七於十三住建立七地一種性地二勝解行地三淨勝意樂地即前三住四行正行地謂從第四乃至第九住五決定地即第十住六決定行地即第十一住七以後二住為到究竟地前六唯菩薩第七菩薩如來雜立為地四亦瑜伽下即四十九論復以類例大同束為七地一約種性二約賢位三初入聖故三住即為三地四從二地至七依聖道修功用行滿故束為一名行正行地五以八地無功任運增進故名決定六以九地依無功用起利他行故名決定行七因圓果滿名到究竟地也五依仁王下卷說十三法師各住一位即當第一言十三者一習種性二性種性三道種性四善覺摩訶衍五德慧六明慧七爾熖八勝達九常現真實十玄達十一等覺即八地十二慧光神變即當九地十三觀佛菩薩義當十地及等覺而佛非十三之數五依仁王等者即奉持品若新經如次牒十住行向十地之名今依舊經名異義同經云大牟尼言有修行十三觀門諸善男子為大法王從習忍至金剛頂皆為法師依持建立汝等大眾應如佛供養而供養之應持百億天華天香而以奉上下經便牒便釋其文繁廣亦不列次今畧列其名加以次第今初言一習種性者此即十住經云善男子其法師者是習種性菩薩若在家婆差優婆差若出家比丘比丘尼修行十善自觀己身地水火風空識分分不淨復觀十四根所謂五情五受男女意命等有無量罪過故即發無上菩提心常修三界一切念念皆不淨故得不淨忍觀門住在佛家修六和敬所謂三業同戒同見同學行八萬四千波羅蜜道等下皆廣釋今但釋難言善覺者即歡喜地初證真如得無分別智故二地戒德清淨入修慧故三地聞持發慧光故故舊為明地四地是燄慧故亦云爾燄亦云所知燒於所知慧燄增故五地入真達俗為難勝故六地般若寔智常現前故七地依空涉有為玄達故八地得一切法如寔覺故九地善慧具四十辯普應多會使情非情皆說法故十三菩薩地盡能入佛境故言義當十地等覺者仁王不立等覺故云義當六依仁王上卷五忍之中此當伏忍之下言五忍者謂伏忍信忍順忍無生忍寂滅忍各有上中下如次配三賢十地等覺妙覺六依仁王等者即教化品新經即菩薩行品十忍品廣明今當畧示言如次配三賢者伏忍下品當十住中品當十行上品當十廻向故彼經云佛言大王五忍是菩薩法謂伏忍上中下信忍上中下初二三地順忍上中下四五六地無生忍上中下七八九地寂滅忍上中下名為諸菩薩修般若波羅蜜今以瓔珞亦有五忍寂滅亦分三品中品即當等覺七亦依仁王五十二位當其第二七亦仁王等者亦即上品五忍以文云善男子初發相心信恒河沙眾生修行伏忍於三寶中生習種性十心信心精進心念心慧心定心施心戒心護心願心廻向心是為菩薩能少分化眾生已超過二乘一切善地一切諸佛菩薩長養十心為聖胎釋曰此之十心是習種性中為十住因開因異果故加此十剋實唯五十一開等覺故亦通諸經有五十二八依瓔珞四十二賢聖位當於下賢十住以不立十信十信攝在十住中故八依瓔珞等者但除十信信未成位故故彼經云佛告敬首菩薩汝言義相云何者所謂十住十行十廻向十地無垢地妙覺地我今當說九依瓔珞六種性亦當第一言六性者一習種性二性種性三道種性四聖種性五等覺性六妙覺性若依楞伽等無復地位九依瓔珞等者即總收大位為四後二因圓果滿為二並如十忍品釋依楞伽等者此非立位不別為門而欲成五教故此附出以十門中前四是始教次五終教此楞伽當頓教十即圓教小非大位故畧不論十依此經說四十二位無別資糧加行等名然所說位依法性立行布圓融二俱無礙如玄文辨十信開合已見賢首品十依此經者雖言四十二以具圓融行布則融前九一經通明若取差別即第二會終第七會十信開合者指前開成五十二合唯四十二開合無礙此經必具故十門收之佛子云何為菩薩發心住第五佛子云何為下說分即是行相釋此十住即為十𫨻一一𫨻中皆先徵復釋釋中皆先明自分後明勝進又前是住位後是起行今初發心住先徵可知此菩薩見佛世尊形貌端嚴色相圓滿人所樂見難可值遇有大威力或見神足或聞記別或聽教誡或見眾生受諸劇苦或聞如來廣大佛法發菩提心求一切智釋自分中二先明發心之緣後正明緣境發心今初文列十緣義含四因謂信悲智及種性也見佛世尊是初總相發菩提下結前生後中間十句別顯不同一形貌容儀二顯色大相三具隨好故人所樂見上三觀外相也四時乃一出出便利益故為難遇此通內外五十力無畏降魔制外此明內德六神變難思即神足輪此唯外用於上六中隨見一事發生淨信欣心上求此若可修我定當取七聞授記含於二義一聞授記作佛希預其數二聞記當事希得此知皆記心輪八聽教誡知惡可斷善可進修即教誡輪上皆信智為因九見受苦起悲未必聞教以種性內具法爾慈恕即悲因也十聞廣大法謂佛功德義兼法滅或傳或護因通悲智種性之因義通前十此之十緣與賢首品所引瑜伽四緣但開合之異耳謂前六見佛緣次二聞法緣次一見生受苦緣後即見法滅也後結前生後者唯證菩提方成前事結前也求一切智生後緣難得法而發心也此菩薩緣十種難得法而發於心何者為十所謂是處非處智善惡業報智諸根勝劣智種種解差別智種種界差別智一切至處道智諸禪解脫三昧智宿命無礙智天眼無礙智三世漏普盡智是為十第二此菩薩下正明緣境發心前言求一切智十種智力即一切智文有標徵列名結數而義見初品大同初地為得十力故等又此十力於一實智而開為十化生事足義含悲智故略舉之非不緣佛餘之功德大同初地者即彼住分中當為何義彼有十句總云為得佛智故為得十力故為得大無畏故等十力乃是別中一句雖廣畧有異然皆求佛果故云大同又此十力下通妨妨云若言大同那唯一別句耶答意云既言大同何妨多異顯於初賢劣初地故又以十力攝義寬長故畧舉此一如十力章故非不緣餘蓋文畧是以下偈廣斯十力及餘諸義皆發初心佛子此菩薩應勸學十法何者為十所謂勤供養佛樂住生死主導世間令除惡業以勝妙法常行教誨歎無上法學佛功德生諸佛前恒蒙攝受方便演說寂靜三昧讚歎遠離生死輪迴為苦眾生作歸依處第二勝進文分為三初總標次徵列後徵釋今初謂欲求勝位應自勸勵亦勸他學列中有十不出悲智供佛為總通財及法下九為別行下九事真供養故一樂住生死大悲為首故智了其空無所懼故二住為主道除惡三即能導理教之法四示果令欣即教之所至五學佛德行以為能至六成德依緣故生佛前七寂前上求下化之紛動八寂必遠離生死輪廻九不失悲故常為物依亦是總結前義諸所施為皆為眾生大悲增上故問八遠離生死初令樂住此云何通略有三意一勸物遠離自處無猒二要自無縛方能攝物三即智之悲故樂住生死即悲之智遠離輪廻故瑜伽云菩薩猒離生死過於二乘百千萬倍非不猒也斯則不斷生死而入涅槃不動真際常隨流轉成不住道畧有三意初約二利說二約利他三約悲智悲明利他智約自利如實義者自他皆具如悲濟九類智了無生而可度者即一向利他有悲無智即墯愛見有智無悲即滯二乘無智不能觀空無悲不能起行多約自利故與初別然前釋樂住生死具悲智二意今為對遠離義故但舉悲故瑜伽下引文證顯引瑜伽證猒離義恐有悞解謂唯二乘有猒離故闇引二經雙證二義一即淨名舍利弗章已如前引二不動真際即大品意及智論文成不住道者上釋是俱住義由俱不住故能雙住由不住生死故能住涅槃由不住涅槃故能住生死等前已廣說又初既樂住生死六復云何生諸佛前亦有三義一為誘物故二求攝物之方故三悲智無礙故又十藏約實智契捨聞諸佛土不願徃生此約權不壞事故生諸佛土又初下更有一問答亦具三意一自不要生為引眾生令修淨土因故二如人不善於水見子墯水若便入者自他俱沒應求船筏而濟度之三悲故樂住智故徃生下通十藏難約權實智說何以故欲令菩薩於佛法中心轉增廣有所聞法即自開解不由他教故三何以下徵釋何須學此令得通別二種益故別謂增勝廣大此之別益皆希後位凖下頌文亦令不退有所聞下諸位通益以解從內法故不由他他有三種一他人二者心外三者性外自解亦三一者熏習成性故能自解二了唯心三了唯性故下云知一切法即心自性若爾云何復言有所聞耶謂汎爾聞故或自披尋聞乃約法開悟約義必不假人委曲指授故不由他究竟則是佛無師智下諸位中並同此釋有云從自種生云不由他但是初意何足可尚又引下文雖知諸法悟不由師然求善知識無有猒足亦非此意彼據雙行此約自悟故自解亦三者次第對上謂一由內性成故不隨他人二了唯心故不心外取法三由了性故如性外一法亦無佛子云何為菩薩治地住第二治地住中亦二先徵可知此菩薩於諸眾生發十種心何者為十所謂利益心大悲心安樂心安住心憐愍心攝受心守護心同己心師心導師心是為十二釋中自分內文有四別一標二徵三列四結下諸自分皆倣此知列中十心有其二義一於一一眾生各起十心二為辨差別對八種眾生一於怨眾生非直不念加報亦乃授與利益二於貧苦眾生欲令遠離故起悲心三於危懼無樂眾生令得樂具不𥁞四於惡行眾生令安住善行五於得樂眾生以矜愍心不令放逸六於外道未發心者攝令正信發心七已發心同行者守令不退八於一切攝菩提願眾生取如己身於此開二謂於乘大道集進趣者推之如師集具足功德者敬之如佛此十大同第二地集義中釋以斯十心治自心地佛子此菩薩應勸學十法何者為十所謂誦習多聞虛閑寂靜近善知識發言和恱語必知時心無怯怖了達於義如法修行遠離愚迷安住不動二勝進亦三列中十法有通有別通相可知別依展轉一總求多聞為二利行依二聞已閑靜思修三聞必依友四於友求請言必和恱五問不非時六不怖深法而不能受不怯行法而不能行七以思慧力解達深義非但多聞於義不了八如說修行涅槃經說親近善知識聽聞正法繫念思惟如說修行是大涅槃近因緣故今展為十九成行伏惑故離愚迷十觀智照理決定究竟故安住不動非但多聞者即涅槃經高貴德王品云寧願少聞多解義理不願多聞於義不了何以故欲令菩薩於諸眾生增長大悲有所聞法即自開解不由他教故三徵釋所以修者上十多約智以智導悲令轉增也通益可知音釋髻吉詣切燦倉晏切明也錯謬錯七各切謬靡㓜切錯謬舛誤也劇竭吉切甚也
