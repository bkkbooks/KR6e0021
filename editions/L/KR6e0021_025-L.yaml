body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述爾時普賢菩薩復告大眾言諸佛子諸佛世尊世界海莊嚴不可思議第六辯總結莊嚴上來諸𫨻雖說莊嚴猶未能盡故今總顯一一之境若說不說皆具剎海塵數功德莊嚴是以文云一切境界長行文二先標莊嚴難測何以故諸佛子此華藏莊嚴世界海一切境界一一皆以世界海微塵數清淨功德之所莊嚴二何以下徵釋所由清淨功德文含二義一謂眾多果嚴即是清淨功德二謂一一果嚴從多清淨功德因生以因望果應成四句謂多因一果一因多果等故隨一一事即曰難思應成四句者文出二句三一因一果四多因多果隨修一行無德不招廣如問明及昇兜率品四句相融故一一難思是以頌云但由如來昔所行神通願力而出生斯即因也若語果嚴略有五相一者令多周給一切一者令多者第四偈一切剎海咸周遍是令周給他也二者令常永無乏絕第二偈中靡暫停第三偈中恒聞見是令常也三者令妙恱可眾心第三偈中其音美妙是令妙也四者稱性無生無相第十偈中無等無生無有相是稱性也五者自在鎔融無礙偈文具之總斯五義故曰難思況因果相即第八偈等能於一切微塵中普現其身淨眾剎及第九偈一剎那中悉能現皆自在也爾時普賢菩薩欲重宣其義承佛神力觀察十方而說頌言此剎海中一切處悉以眾寶為嚴飾發燄騰空布若雲光明洞徹常彌覆摩尼吐雲無有盡十方佛影於中現神通變化靡暫停一切菩薩咸來集一切摩尼演佛音其音美妙不思議毘盧遮那昔所行於此寶內恒聞見清淨光明徧照尊莊嚴具中皆現影變化分身眾圍繞一切剎海咸周徧偈文有十大分為二前六果嚴用勝後四對因辯果前中分三初四別明嚴用所有化佛皆如幻求其來處不可得以佛境界威神力一切剎中如是現次一結屬現緣如來自在神通事悉徧十方諸國土以此剎海淨莊嚴一切皆於寶中見後一總結多類十方所有諸變化一切皆如鏡中像但由如來昔所行神通願力而出生後四對因辯果中一由行願神通為因故獲變化如鏡像果若有能修普賢行入於菩薩勝智海能於一切微塵中普現其身淨眾剎二以普行勝智為因故得一塵淨眾剎果不可思議億大劫親近一切諸如來如其一切之所行一剎那中悉能現三由長時近友為因故得剎那頓現之果諸佛國土如虛空無等無生無有相為利眾生普嚴淨本願力故住其中四彰淨國之意使倣而行之前半智境嚴即無嚴謂自受用土周徧無等法性之土體性無生二皆無相後半悲應無嚴之嚴嚴徧法界無住之住常住剎中上釋莊嚴竟悲應已下後半即他受用及變化淨一偈之中四土具矣爾時普賢菩薩復告大眾言諸佛子此中有何等世界住我今當說第三明所持剎網釋品目世界之言又前明本剎今辯末界故兼染淨文分三別第一告眾許說二諸佛子此不可說下雙標二章三諸佛子彼諸世界種下廣釋二章諸佛子此十不可說佛剎微塵數香水海中有十不可說佛剎微塵數世界種安住一一世界種復有十不可說佛剎微塵數世界標二章者謂種及剎然剎種依剎海諸剎依剎種則寬陿可知名從何得欲明世界無邊方便顯多故立此名謂積多世界共在一處攝諸流類故名為種如是種類復有眾多深廣無邊故名為海如積多魚以成一種魚龍鼈山泉島嶼乃有多種並悉攝在一大海中而言世界無邊者海外有海海海無窮也若爾種無別體攬界以成何以下文說有形體雖依種類以立種名何妨此種別有其體如多蠭孔共成一窠豈妨此窠別有其體上舉魚龍蓋分喻耳即依後義亦得名為種性依於此種能生世界如依一禾有多穀粒舊經云性多取此義恐濫體性故改為種言有不可說者若凖下文香海及種皆有十不可說梵本亦有今脫十字多是傳寫之漏耳雖依種類下初正釋也前為成海故取種類畧無別體今別喻蜂窠以彰有體蜂孔如剎一窠如種則顯魚龍乃成分喻即依後義下二結成也先會同晉經成種性義種有二義一類二性以禾喻種以粒喻剎禾能生榖故有性義恐濫下顯今經意亦是通難難云若有種生之義何不依昔為世界性故為此通則種兼二義今經存之諸佛子彼諸世界種於世界海中各各依住各各形狀各各體性各各方所各各趣入各各莊嚴各各分齊各各行列各各無差別各各力加持三廣釋二章中文分為二初通明剎種不同釋剎種章二別明剎種香海雙釋二章二𫨻各有長行與偈今初長行文二初列十門後隨門廣釋今初也然此十門剎種之異並悉不離所依華藏故云於世界海中所列十事與成就品都望全異彼通一切海此明一海種故若別別相望互有互無起具因緣清淨佛出劫住轉變彼有此無方所分齊行列趣入力持等五彼無此有依住形體莊嚴無別彼此名同前後互出都有十五皆顯十者俱表無盡而或異者彰義多端復有同者恐濫全別何以起具前有此無前𫨻總明成立因果此中正辯何等世界住故餘可思準何以起具下即初問也問意云一種起具等五此無前有方所等五此有前無前𫨻總明下答也答中對上牒起具問餘可思凖者即是結例餘四但用何等世界住言總通五難劫住是果起具是因此通易了餘四猶難謂清淨佛出劫住轉變正是果相正辯界住何得全無今云無者清淨方便亦是約因又不通染今則通染又不語因佛住約人今此辯剎故亦無之劫住轉變此二竪明今語現住亦非此要故畧不說然與前同已如前釋不同五事今當說之然與前同下第三隨文別釋但解五句各各方所者若圓滿方所周滿法界無處不有不即三界不離三界若隨宜方所隨十方中向背各別若圓滿方所等者釋此五句皆是十八圓滿中意次下當明此中每句各具二義方所二者圓滿方所即自受用方所如上引唯識明自受用土相若隨宜方所即他受用及變化淨然依佛地十八圓滿唯約他受用說今約圓通故進入自受用下該變化各各趣入者依門趣入約法門者謂三解脫又互相現入而無來去等依門趣入者彼有事門即如向說二約法為門今但出此又互相現入者是約此宗以辯門義並如下說各各分齊者約事隨宜廣陿異故約佛分齊則十方無際分齊分二隨宜即他受用等約佛即自受用土問圓滿方所云無處不有圓滿分齊十方無際二相何別答若識隨宜方所分齊即圓滿二相不同謂隨宜方所者此之淨土十方之內為在何方如極樂在西妙喜在東等言分齊者此之淨土廣狹云何或等一娑婆或等百千是分齊也是則圓滿方所明無處不有者即遍在也其分齊也十方無際者量周法界也各各行列即是道路約事可知約法謂大念慧行以為游路各各力加持者即食能令住約法廣大法味喜樂所持行列與下第十加持各約事法分為二又此互出顯佛淨土十八圓滿十五攝故言十八者顯色形色分量方所因果及主輔翼眷屬任持事業攝益無畏住處路乘門及依持又此互出下初標釋也總將二品之文共攝十八圓滿言十八下第二列名文無次第及圓滿言而十八具足一顯色圓滿二形色圓滿三分量圓滿四方所圓滿五因圓滿六果圓滿七主八輔翼九眷屬十任持十一事業十二攝益十三無畏十四住處十五路十六乘十七門十八依持圓滿云何攝耶此具因緣即因圓滿依住即是依持形狀即當形色體攝二種一攝顯色七寶光明為體性故二攝果滿隨類之果可知約佛大圓鏡智相應淨識之所變故故上偈云或一念心普示現為體莊嚴攝三謂一攝住處如來莊嚴為住處故二攝輔翼菩薩嚴故三攝眷屬有餘眾故清淨攝三一攝事業謂作有情之義利故二攝攝益謂現證解脫滅彼煩惱及災橫故三攝無畏謂內無災橫外無怖畏故此中佛住攝二圓滿一攝主二攝乘或說一乘等故方所分齊二名全同行列即路趣入即門力持為任持云何攝耶第三正明相攝先徵此具下釋釋中文意皆是佛地論中之意細尋可知十八名相第五廻向更當廣釋此但舉於此十五名攝彼十八其有難者引經會釋劫住轉變十八中無義同於果及事業攝亦可成二十圓滿於理無違謂劫住窮未來故轉變即如來神通變化世界海普清淨轉變即圓滿義劫住轉變下第四明同異通有四種此有二門一立名同異如上別對中明二開合同異亦如上說然上體及佛住各攝於二清淨莊嚴各攝於三則四門攝十餘之八門各攝其一則十二門以攝十八即開合異也三有無同異即是劫住及劫轉變釋無所以畧有二意一以彼攝此謂果攝劫住有剎之果必有劫住之時分故事業圓滿攝此轉變菩薩神通如來作用皆轉變故二者不用彼攝何必定須十八圓滿加於此二成二十數正圓滿故如以六通為十通等謂以劫住窮未來故下示於二種圓滿之相其無差別彼文雖無即由此故方顯圓滿餘皆隨宜故云各各其無差別下明通局同異彼十八事各各不同今無差別通該十八由無差別約融攝說故令十八得圓滿名則此十四皆約隨宜由此無差故名圓滿無差既同云何各各所無差事有多種故無差既同下躡跡生難上云餘十四事皆是隨宜故稱各各其無差別稱實而說今餘圓滿則無差別非各各義何以經云各各無差今答此云所無差事有多種者上經中明塵塵剎剎佛佛生生皆悉融攝事事相望即云一一各各融攝即是無差若將此十對成就品十亦得相攝恐厭繁文若將此十下第二攝成就品前攝十八共以二品皆為能攝今此對前自分能所而得互攝䟽恐責繁不能具出鈔須盡理一一示之此華藏品攝成就品者此中起入攝彼起具因緣及清淨二事以起入即三解脫門可為剎因今剎淨故此中力持攝餘三事謂佛出劫住及劫轉變以力持即是廣大法喜無佛從何得法喜耶况有佛持若佛不出但以食持若佛出世即有法持若以食持住時即少若用法持住劫則長二種力持皆通轉變法持則染變為淨食持則淨變為染故俱舍說三灾起時由二種因一躭着美味二者懶墯故以食持淨變為染上以此二攝於彼五五事全同故十具矣若以成就稱華藏者上以此二攝於彼五則以彼五攝於此二此餘三事謂方所分齊并及行列彼何攝耶即五同中依生形狀二事所攝以但有依住則有方所及行列故但有形狀則有分齊則以彼七攝此五事五事全同則十亦具故於二處各舉十事無所不𠬧巧顯多端故互隱顯理實互出為顯十八又上諸文一一𫨻中具多圓滿一一融攝故異餘宗諸佛子此世界種或有依大蓮華海住或有依無邊色寶華海住或有依一切真珠藏寶瓔珞海住或有依香水海住或有依一切華海住或有依摩尼寶網海住或有依漩流光海住或有依菩薩寶莊嚴冠海住或有依種種眾生身海住或有依一切佛音聲摩尼王海住如是等若廣說者有世界海微塵數二隨門廣釋但釋其三謂依住形體餘七雖略義上已說今初依住中初列後結文並可知諸佛子彼一切世界種或有作須彌山形或作江河形或作迴轉形或作漩流形或作輪輞形或作壇墠形或作樹林形或作樓閣形或作山幢形或作普方形或作胎藏形或作蓮華形或作佉勒迦形或作眾生身形或作雲形或作諸佛相好形或作圓滿光明形或作種種珠網形或作一切門闥形或作諸莊嚴具形如是等若廣說者有世界海微塵數二形狀中初列二十種後結塵數不同今初迴轉形者攝褺徃來之形也壇墠形者築土為壇除地為墠佉勒迦者梵音此云竹篅諸佛子彼一切世界種或有以十方摩尼雲為體或有以眾色燄為體或有以諸光明為體或有以寶香燄為體或有以一切寶莊嚴多羅華為體或有以菩薩影像為體或有以諸佛光明為體或有以佛色相為體或有以一寶光為體或有以眾寶光為體或有以一切眾生福德海音聲為體或有以一切眾生諸業海音聲為體或有以一切佛境界清淨音聲為體或有以一切菩薩大願海音聲為體或有以一切佛方便音聲為體或有以一切剎莊嚴具成壞音聲為體或有以無邊佛音聲為體或有以一切佛變化音聲為體或有以一切眾生善音聲為體或有以一切佛功德海清淨音聲為體如是等若廣說者有世界海微塵數三明體中先列後結列中亦二十種前十色相後十是聲會釋如前爾時普賢菩薩欲重宣其義承佛神力觀察十方而說頌言剎種堅固妙莊嚴廣大清淨光明藏依止蓮華寶海住或有住於香海等應頌有十分為六𫨻初一頌依住須彌城樹壇墠形一切剎種徧十方種種莊嚴形相別各各布列而安住次一形狀及布列安住或有體是淨光明或是華藏及寶雲或有剎種燄所成安住摩尼不壞藏燈雲燄彩光明等種種無邊清淨色或有言音以為體是佛所演不思議或是願力所出音神變音聲為體性一切眾生大福業佛功德音亦如是次三體性剎種一一差別門不可思議無有盡如是十方皆徧滿廣大莊嚴現神力十方所有廣大剎悉來入此世界種雖見十方普入中而實無來無所入以一剎種入一切一切入一亦無餘體相如本無差別無等無量悉周徧次三頌於三事謂初二句頌所入門次句方所第四句莊嚴餘二偈中廣大剎之本相即是分齊廣陿此彼相入亦頌趣入初偈以多入一後偈一多互入此彼相入亦頌趣入故上䟽中釋趣入義以為此解於中有二先畧屬偈文皆入而無入入則壞緣起不入壞性用皆入而無入下通釋二偈入無入言前偈中有義通後偈故致皆言總有三意初一反釋通緣起相由及法性融通二門約緣起門者凡緣起法要有三義一諸緣各異義二互遍相資義三俱存無礙義今云入則壞緣起者反釋不入入則失緣則無諸緣各異義言不入則壞性用者反釋入義則不得不入不入則不得力用交徹故無互遍相資義則壞用也若具入不入則俱存無礙成緣起門言法性融通門者即性之一字凡法性融通要不壞相而即真性入則壞緣起者無可相入不入則壞性者則性不遍一切法故由不壞相性而能普遍方是法性融通義也又要由不入方能入耳二又要由不入方能入者即順釋也亦通二門唯執相說若約緣起門要由諸緣歷然不入方能相資遍相入耳若約法性融通門者要由事相歷然方隨理融入一切法故說若唯約理無可即入又約體本空故無來無入約相不壞故如本無差以性融相故得互入三又約體本空下亦順明而雙約性相上第一義相即不入性即能入今此一義獨相獨性俱不能入要二相融方能入故言若約體空則無來無入者是若唯約性無可即入言約相不壞如本無差者即若唯約事不能即入上二皆不入義以性融相故得互入者即釋入義是顯正義謂不異理之一事全攝法性時令彼不異理之多事隨所依理皆於一中現等一事攝理既爾多事攝理亦然則一事隨所依理皆於多中現故得互入是為法性融通門也一切國土微塵中普見如來在其所願海言音若雷震一切眾生悉調伏次一頌無差謂塵容佛海等無差故佛身周徧一切剎無數菩薩亦充滿如來自在無等倫普化一切諸含識後一頌力持主伴皆是神力任持普化之言兼於法味爾時普賢菩薩復告大眾言諸佛子此十不可說佛剎微塵數香水海在華藏莊嚴世界海中如天帝網分布而住第二別明種剎香海雙釋二章者謂香海依剎海剎種依香海諸剎依剎種亦有長行偈頌長行分三初總舉諸海所依二次第別顯海種及剎第三總略結釋今初也上來雖復但標剎種及剎二章而釋依住中皆云依海故列海數此多香海並在剎海地面故云所依言如帝網者大都分布則似車輪其有別者謂帝釋殿網貫天珠成以一大珠當心次以其次大珠貫穿帀繞如是展轉遞繞經百千帀若上下四面四角望之皆行伍相當今此香海雖在地面分布相似又有涉入重重之義故云如也諸佛子此最中央香水海名無邊妙華光以現一切菩薩形摩尼王幢為底第二諸佛子此最中央下次第別顯諸海種剎文分為三初辯中間一海次辯右旋十海後明十海所管之海然十海各管不可說佛剎塵數之海總顯則有十不可說佛剎塵數次第說者但有一百一十一海餘皆略指今初中央一海文分為二先明香海出華以持剎種後有不可說下明所持世界前中有三初香海名以多華發光故亦由菩薩行華而為因故出大蓮華名一切香摩尼王莊嚴二華名謂以香摩尼嚴此華故又從摩尼底而出生故約法即萬行圓明之所成故海能有華故受華名華依於海取海底稱海能有華等者以海名無邊妙華光故如蓮華池池受華名華依於海者海以摩尼王幢為底故華名摩尼王莊嚴如泥中華華受泥稱有世界種而住其上名普照十方熾然寶光明以一切莊嚴具為體三種名約事寶光遠照故約法其世界種正是所含種子一一皆有大智光明徧照法界義故性德互嚴故有不可說佛剎微塵數世界於中布列第二所持世界中三初總舉大數次其最下方下別辯二十層大剎後諸佛子下類結所餘初文可知其最下方有世界名最勝光徧照第二別辯中凖標及結皆有不可說剎塵其別辯中但列十九佛剎塵數為二十重其能繞剎但有二百一十佛剎塵數下當會釋二十層即分二十𫨻最下層中文有七事一舉名但有二百一十者第一層一佛剎微塵數世界第二層二佛剎一上加二為三第三層加三為六第四層加四為十第五層加五成十五第六層加六成二十一第七層加七成二十八第八層加八成三十六第九層加九成四十五第十層加十成五十五下十層有五十五上十層一一漸加算數亦有五十五而各有十謂十一十二十三十四等上十層更有一百都有一百五十五并下十層五十五故有二百一十矣問既有二十層何以但云十九佛剎為主剎耶答以最下一層但云一世界非一佛剎塵數世界故云從此一界云此上過一佛剎微塵數世界至第二層故二層共有一佛剎塵數剎耳如竪二千錢為二十百最下取一錢如最下一剎此上過一百取一錢為第二層方共一百爾此上過一百至第三層方是二百乃至二十層方有一千九百文耳故二十層成十九佛剎思之下當會釋者即第三會能繞所繞類結之中以一切金剛莊嚴光耀輪為際二辯際謂世界所據之際如金剛際依眾寶摩尼華而住三依住若凖此名大同剎種所依蓮華而舊釋云於前無邊香海所出華上更有此華持此一界者以例上諸層別有依住故為此釋何妨最下依於總華思之其狀猶如摩尼寶形四形如摩尼者為摩尼狀有於八楞似方不方似圓不圓故異下八隅一切寶華莊嚴雲彌覆其上五上覆佛剎微塵數世界周帀圍繞種種安住種種莊嚴六眷屬六眷屬者即經中云種種安布種種莊嚴是辯眷屬剎之相耳佛號淨眼離垢燈七本界佛名離二障垢智眼清淨照世如燈然佛德無邊各隨一義二層已去或有八事謂加去此遠近故或有九事加純淨言故凖此若無此言即通染淨此上眷屬漸加剎數中間諸事可以凖知此上過佛剎微塵數世界有世界名種種香蓮華妙莊嚴以一切莊嚴具為際依寶蓮華網而住其狀猶如師子之座一切寶色珠帳雲彌覆其上二佛剎微塵數世界周帀圍繞佛號師子光勝照此上過佛剎微塵數世界有世界名一切寶莊嚴普照光以香風輪為際依種種寶華瓔珞住其形八隅妙光摩尼日輪雲而覆其上三佛剎微塵數世界周帀圍繞佛號淨光智勝幢此上過佛剎微塵數世界有世界名種種光明華莊嚴以一切寶王為際依眾色金剛尸羅幢海住其狀猶如摩尼蓮華以金剛摩尼寶光雲而覆其上四佛剎微塵數世界周帀圍繞純一清淨佛號金剛光明無量精進力善出現此上過佛剎微塵數世界有世界名普放妙華光以一切寶鈴莊嚴網為際依一切樹林莊嚴寶輪網海住其形普方而多有隅角梵音摩尼王雲以覆其上五佛剎微塵數世界周帀圍繞佛號香光喜力海五中云普方者都望即方而一面之中亦有多角隅即是角文體容爾此上過佛剎微塵數世界有世界名淨妙光明以寶王莊嚴幢為際依金剛宮殿海住其形四方摩尼輪髻帳雲而覆其上六佛剎微塵數世界周帀圍繞佛號普光自在幢此上過佛剎微塵數世界有世界名眾華燄莊嚴以種種華莊嚴為際依一切寶色燄海住其狀猶如樓閣之形一切寶色衣真珠欄楯雲而覆其上七佛剎微塵數世界周帀圍繞純一清淨佛號歡喜海功德名稱自在光此上過佛剎微塵數世界有世界名出生威力地以出一切聲摩尼王莊嚴為際依種種寶色蓮華座虛空海住其狀猶如因陀羅網以無邊色華網雲而覆其上八佛剎微塵數世界周帀圍繞佛號廣大名稱智海幢此上過佛剎微塵數世界有世界名出妙音聲以心王摩尼莊嚴輪為際依恒出一切妙音聲莊嚴雲摩尼王海住其狀猶如梵天身形無量寶莊嚴師子座雲而覆其上九佛剎微塵數世界周帀圍繞佛號清淨月光明相無能摧伏此上過佛剎微塵數世界有世界名金剛幢以無邊莊嚴真珠藏寶瓔珞為際依一切莊嚴寶師子座摩尼海住其狀周圓十須彌山微塵數一切香摩尼華須彌雲彌覆其上十佛剎微塵數世界周帀圍繞純一清淨佛號一切法海最勝王此上過佛剎微塵數世界有世界名恒出現帝青寶光明以極堅牢不可壞金剛莊嚴為際依種種殊異華海住其狀猶如半月之形諸天寶帳雲而覆其上十一佛剎微塵數世界周帀圍繞佛號無量功德法此上過佛剎微塵數世界有世界名光明照耀以普光莊嚴為際依華旋香水海住狀如華旋種種衣雲而覆其上十二佛剎微塵數世界周帀圍繞佛號超釋梵此上過佛剎微塵數世界至此世界名娑婆以金剛莊嚴為際依種種色風輪所持蓮華網住狀如虛空以普圓滿天宮殿莊嚴虛空雲而覆其上十三佛剎微塵數世界周帀圍繞其佛即是毘盧遮那如來世尊其第十三層主剎即此娑婆言形如虛空者靜法云大小乘經並說虛空體無形質不可見相今云有形者迴文者誤梵本云三曼多周圓第嚩皤嚩曩天宮伽伽那虛空阿楞迦羅莊嚴蓋覆僧塞恒那形狀迴文應以形狀置周圓之前虛空安天宮之上然後合綴飾云其形周圓以空居天宮莊嚴之具而覆其上靜法此正深有理致今依經通之亦有理在謂空雖無形隨俗說故以俗典指空為天謂天為圓穹其形如鐵故說天勢圍平野亦如法華云梵王為眾生之父亦隨俗說耳謂天為圓穹者外典說天或謂有形故云天形穹隆其形如鐵故天圓地方若莊子云天者自然也則無形質如法華者即第六經藥王本事品中云譬如大梵天王為一切眾生之父此經亦復如是為一切眾生之父以梵王劫初初生後有諸天下降梵王凡夫皆悉妄計梵王為父諸經論皆破為非是外道計今法華經如來自引以譬法華豈佛不知是父為妄故是世尊隨俗說耳今亦隨俗說天有形於理何違然今䟽意非是不許靜法之見但已著在經小有可通即為會釋不欲使人輕毀聖教耳此上過佛剎微塵數世界有世界名寂靜離塵光以一切寶莊嚴為際依種種寶衣海住其狀猶如執金剛形無邊色金剛雲而覆其上十四佛剎微塵數世界周帀圍繞佛號徧法界勝音此上過佛剎微塵數世界有世界名眾妙光明燈以一切莊嚴帳為際依淨華網海住其狀猶如卍字之形摩尼樹香水海雲而覆其上十五佛剎微塵數世界周帀圍繞純一清淨佛號不可摧伏力普照幢第十五云形如卍字者靜法云室離瑳本非是字乃是德者之相正云吉祥海雲眾德深廣如海益物如雲古來三藏誤譯洛剎曩為惡剎攞遂以相為字故為謬耳然此相以為吉祥萬德之所集成因目為萬意在語略義含合云萬相耳餘並易了誤譯洛剎曩者洛剎曩此云相也惡剎攞此云字也聲勢相近故使有誤梵本是室利跊蹉洛剎曩合云吉祥海雲相也然此相下䟽出古德以吉祥海雲為萬所由合云萬相者即結成靜法正義縱汝吉祥海雲為萬合言萬相不合云萬字此上過佛剎微塵數世界有世界名清淨光徧照以無盡寶雲摩尼王為際依種種香燄蓮華海住其狀猶如龜甲之形圓光摩尼輪栴檀雲而覆其上十六佛剎微塵數世界周帀圍繞佛號清淨日功德眼此上過佛剎微塵數世界有世界名寶莊嚴藏以一切眾生形摩尼王為際依光明藏摩尼王海住其形八隅以一切輪圍山寶莊嚴華樹網彌覆其上十七佛剎微塵數世界周帀圍繞佛號無礙智光明徧照十方此上過佛剎微塵數世界有世界名離塵以一切殊妙相莊嚴為際依眾妙華師子座海住狀如珠瓔以一切寶香摩尼王圓光雲而覆其上十八佛剎微塵數世界周帀圍繞純一清淨佛號無量方便最勝幢此上過佛剎微塵數世界有世界名清淨光普照以出無盡寶雲摩尼王為際依無量色香燄須彌山海住其狀猶如寶華旋布以無邊色光明摩尼王帝青雲而覆其上十九佛剎微塵數世界周帀圍繞佛號普照法界虛空光此上過佛剎微塵數世界有世界名妙寶燄以普光明日月寶為際依一切諸天形摩尼王海住其狀猶如寶莊嚴具以一切寶衣幢雲及摩尼燈藏網而覆其上二十佛剎微塵數世界周帀圍繞純一清淨佛號福德相光明諸佛子此徧照十方熾然寶光明世界種有如是等不可說佛剎微塵數廣大世界第三類結所餘此中非唯結數兼總顯上文所依住等文分為四一總結都數二各各所依下結形類三此一一下結眷屬四如是所說下彰其所在今初即舉本剎種結有若干此所結剎定是主剎以下文指此不可說佛剎更有兩重繞故其直上中間但有十九佛剎而結有不可說者以傍論故不爾豈一剎種最下唯一主剎故知如向所說主剎橫豎共論有不可說故下結其所在云及在香水河中思之此所結剎者以昔人云經言此一一世界者此上二百一十佛剎塵數之剎耳非此上不可說佛剎塵數之剎也以二百一十塵數剎為所繞兩重繞竟方有不可說耳故立理云若不將此以會大數一即此剎種中非唯有不可說剎塵數廣大世界二即三處說數相違釋曰此公意云若所繞已有不可說佛剎塵數更加兩重繞剎則有眾多不可說佛剎塵剎也言三處說數相違者一是標中有不可說二中間說但有二百一十三是結文兩重能繞初則有不可說後則有無量不可說中間則不滿不可說故相違也此釋亦似有理而經此一一言遠承於前二百一十殊已隔越文中既云如是有不可說佛剎微塵數佛剎即云此一一世界各有十佛剎微塵數廣大世界周帀圍繞明知合繞前不可說也又以二百一十為所繞者前中間說剎但超間明有二百一十望其文意直上十九佛剎塵之剎一一各有眾多佛剎圍繞應有不可說不可說也何者且如最下一剎已有一佛剎微塵數佛剎圍繞向上過一佛剎微塵世界方至第二層一剎有二佛剎微塵世界圍繞此第一層向上至第二層中間諸剎何以無繞剎無繞則剎網不成故知直上一佛剎塵數之剎一一皆應有繞不能具說故有超過舉二十重耳既最下層一剎有一佛剎塵數剎繞此上次第二剎更加一剎為能繞第三亦加一剎如是漸上至百加百至千加千至萬加萬至滿佛剎塵數到第二層還加一佛剎微塵數剎為能繞故有二佛剎塵數剎繞如是乃至第二十層亦復如是一一漸增故但直上至一佛剎塵數世界并其能繞已有眾多佛剎塵數箇佛剎微塵數世界不可知數且就一期之數云不可說耳明知所繞定是生剎若爾云何不與標文相違標文但云一剎種有不可說佛剎微塵數世界故既加兩重能繞多多故答此有二意一言不可說者就主標耳二者其兩重能繞並不出不可說剎塵剎中何者觀其文意但是諸剎互為主伴為相繞耳如百人共聚一人為主則九十九人繞之餘九十九人一一為主時皆得九十九人繞之若不爾者最下一剎已有一佛剎塵數世界圍繞此能繞剎更有兩重能繞已有不可說不可說剎塵數剎也思之明知互為主伴則本數不增各各所依住各各形狀各各體性各各方面各各趣入各各莊嚴各各分齊各各行列各各無差別各各力加持周帀圍繞二結形類中初三列十門既言周帀圍繞則知旁去而䟽言傍去者經中現說下狹上濶如倒立浮圖倒安鴈齒亦合更說上尖下廣如正浮圖仰安鴈齒則上下櫛比皆悉周滿間無空處方為剎網上下四周皆悉相當經欲揀別諸重不能備舉故且增數說繞剎殊又欲令斜望相當故為此說所以梵網經云世界不同猶如網孔若但取二百一十以為所繞殊非得意所謂十佛剎微塵數迴轉形世界十佛剎微塵數江河形世界十佛剎微塵數旋流形世界十佛剎微塵數輪輞形世界十佛剎微塵數壇墠形世界十佛剎微塵數樹林形世界十佛剎微塵數樓觀形世界十佛剎微塵數尸羅幢形世界十佛剎微塵數普方形世界十佛剎微塵數胎藏形世界十佛剎微塵數蓮華形世界十佛剎微塵數佉勒迦形世界十佛剎微塵數種種眾生形世界十佛剎微塵數佛相形世界十佛剎微塵數圓光形世界十佛剎微塵數雲形世界十佛剎微塵數網形世界十佛剎微塵數門闥形世界二所謂下廣說十門形狀有十八事望前剎種形中闕須彌山形及嚴具形餘皆全同但此約剎為異耳如是等有不可說佛剎微塵數三如是等下結歸都數此一一世界各有十佛剎微塵數廣大世界周帀圍繞此諸世界一一復有如上所說微塵數世界而為眷屬三結眷屬中然有兩重主伴此一一者指上不可說塵數也若望前文主剎直上繞數漸增今總相說故云一一各有十剎塵也又是欲顯無盡義故一一復有如上所說微塵數者如上之言文含二義一即總指前能繞所繞之數繞一世界不欲繁文故云如上二者如上亦用十佛剎為能繞也依此則似譯人文繁理隱何不言一一復有十佛剎塵數耶若依前義則譯者之妙依此則似者若言十佛剎但有三字今云如上所說則有四字故為文繁但云如上所說言不分明即是理隱若依前義者能繞所繞其既多但云如上則言省畧故云妙耳雖有二釋䟽意存第二釋但用十佛剎塵數而為能繞為順經宗明無盡故前後體勢類皆然故餘如䟽文細尋可見如是所說一切世界皆在此無邊妙華光香水海及圍繞此海香水河中四彰所在即最中香海既言及在香水河明知傍去音釋輪輞輞音罔車輞也壇墠壇唐千切祭場也墠土演切除地以祭曰墠佉丘迦切卍音萬按卍字本非是字武后長壽二年權制此文著於天樞音之為萬謂吉祥萬德之所集也分齊分符問切齊才詣切分齊限量也島嶼島覩老切海中山也嶼象吕切海中洲也𧔧敷容切與𧊵同陿胡夾切與狹同襵𧜼襵陟葉切𧜼達恊切篅重圓切音椽竹囤盛穀者
