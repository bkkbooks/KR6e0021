body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述佛子云何為菩薩修行住第三修行住此菩薩以十種行觀一切法何等為十所謂觀一切法無常一切法苦一切法空一切法無我一切法無作一切法無味一切法不如名一切法無處所一切法離分別一切法無堅實是為十釋中先明自分是護煩惱行後明勝進是護小乘行前中然此十無常大同三地彼論具釋引中邊釋己見問明既文義包含畧舉一兩論云命行不住總名無常此總句也然復有二一者念念無常二者一期無常於何無常依五盛陰逼迫相故苦也瑜伽三十四云由無常行作意為先趣入苦行由苦無所得行趣入空行空故不自在由不自在趣入無我此四即苦下四行相也五無作者但緣有故由念念無常故無造作由皆苦故無有樂味但於下苦中橫生樂想即一切世間不可樂想以彼空故萬法無體物無當名之實以無我故無有處所非在色中乃至識中無分別者觀能取也無堅實者觀所取也論云下命行即無常體不住即無常義經無作下四句從上四句次第而生由無常成無作由苦成無味由空成無體由無我成無處後三句雙結離二取也即一切下即智論第二十六十想之一也言十想者一無常二苦三無我四食不淨五一切世間不可樂六死七不淨八斬九離十盡想問涅槃比丘作無常想佛呵倒惑云何入住作無常觀答彼但得名不得其義以無常等該涅槃故故佛呵之今但說生死故無有失問涅槃下第二依涅槃常無常對解於中有二先問答生起哀歎品中三修比丘讚無常等想中文也比丘白佛言世尊快說無常苦空無我世尊一切眾跡中象跡為上是無常想亦復如是於諸想中最為第一若有精勤修習之者能除一切欲界欲愛等又如秋耕為勝等又說無我佛便讚其善修無我比丘答言我等不但修無我想亦更修習其餘諸想謂苦想無常想無我想略不說空故云三修又引醉人喻下取意引譬如醉人見日月轉眾生亦爾無常計常佛言句引醉人但知其文未知其義謂醉人見日月轉日月實不曾轉涅槃真常而謂無常等涅槃等實不無常等謂依如來法門次第初因外道橫計邪常故說無常諸觀中最二乘不曉漫該佛地雙林極唱則常等區分又無常者未會法身故苦者未得涅槃故空者無善有故無我者未得八自在故則前四句自說生死次無作等四自說涅槃常故無作樂故無味我故不如名淨故無處所然二理不偏照與之符猶懸鏡高堂萬像斯鑑又無常下二依經正解躡前問答故致又言上以無常該於涅槃今以未會涅槃則不該矣由生死中有無常等則顯法身是常涅槃是樂善有不空自在有我八自在我者一能作小二能作大三能作輕四能作自在五能作主六能遠到七者動地八隨意所欲盡能作得廣如大論及涅槃說然以法身性出自古體無變異偏語其常涅槃寂滅故為真樂然空亦不淨是有為故故涅槃云淨者諸佛菩薩正法名為善有如來者即是我義然別說則爾若如實言涅槃即具四德故二十七經云所言空者不見空與不空智者見空及與不空常與無常苦之與樂我與無我空者一切生死不空者謂大涅槃乃至無我者所謂生死我者謂大涅槃釋曰其乃至字中間越二若具說云無常者所謂生死常者謂大涅槃苦者所謂生死樂者謂大涅槃故一經中廣說生死無常樂我淨涅槃有常樂我淨則知涅槃必具四德則前四句下分判經文上第一釋十句皆無常今第二釋具常無常常故無作者造作是無常因以有所作為故名有為有為是無常無所作為故名無為無為即是常也有味皆苦三界之樂於下苦中橫生樂想故無味為寂滅樂也如於名字則不自在謂小如小名不即成大安名自在若有處所則非清淨淨無淨相十真淨故然二理下結歎前八謂常無常等總為二理皆不遍也明常無常我無我等皆不相離此為所證照與之符即是能證然其此上本即生公常住義中彼云夫泥洹本有不可為無三界本無今有已有還無故不可為有泥洹以不生滅為實諦三界以生滅為真諦二理不偏名中道義彼有問云常與無常二理相反云何而為中道不偏之理耶答二理雖殊理自相資何者因乖常故有三界無常因解無常之實性故成常智所以經引二鳥義旨在此二理不偏照與之符猶懸鏡高堂萬像斯鑑矣釋曰懸鏡高堂即無心虛照萬像斯鑑則不揀妍故以絕常無常之淨心照常無常之圓理若依此釋則一切法言前四自屬有為故涅槃云一切法者名為生死非一切法者謂佛法僧及正解脫又云我觀諸行悉皆無常云何知耶以因緣故若一切法從緣生者則知無常是諸外道無有一法不從緣生是故無常如來虛空佛性不從因緣是故為常今後四句亦云一切法者性淨涅槃不離一切為無為故既有區分則翻八倒成八行矣又初四句則因緣生滅是無常義等次四則不生不滅是無常義故云無作五受陰洞達空無所起是苦義因起有苦起即無起故無味也諸法畢竟無所有是空義人法二空空亦空故故不如名於我無我而不二是無我義諸佛或說我或說於無我諸法實相中無我無非我故無處所又初四句等者第三傍淨名經約生滅無生滅釋唯就無常明義於中有二先正解初四即因緣生滅等者等取逼迫為苦義不淨為空義不自在為無我義次四句者此之一句言含總別總則該後四句別則初句無作是無常義既無造作則無生滅此即淨名迦旃延章迦旃延白佛言憶念昔者世尊為諸比丘略說法要我即於後敷演其義謂無常義苦義空義無我義寂滅義時維摩詰來謂我言唯迦旃延無以生滅心行說實相法迦旃延諸法畢竟不生不滅是無常義五受陰洞達空無所起是苦義諸法畢竟無所有是空義於我無我而不二是無我義法本不生今則無滅是寂滅義釋曰今䟽文中全已用之但觀所引自分主客生公釋諸法畢竟不生不滅是無常義云無常者以事滅驗之終苟有滅始無然乎始若果然則生非定矣生不定生滅孰定哉生滅既其不定真體復何在哉推無在之為理是諸法實義實以不生不滅為義豈非無常之所存乎故云不生不滅是無常義此則正就生滅推之即無生滅耳又無常者乃明常之為無則所以無無常也故不生滅是無常義五受陰者受者取也謂煩惱業因能招此陰故名受陰因起有苦下釋䟽就經謂從緣起故起則無起故生公云夫苦之為事會所成也會所成者豈得有哉是以言五受陰空是苦義五受陰苦之宗也無常推生及滅事不在一又通在有漏無漏故言諸法苦即體是無義起於內又得無漏者不以失受致苦故唯受陰而已也洞達者無常以據終驗之云畢竟耳苦以空為其體故洞達也無所起者無常明無本之變理在於生苦言假會之法所以配起也今經云一切者各少分一切又含餘義故云一切諸法畢竟者經也人法二空空亦復空故不如名者䟽會就經也生公云惑者皆以諸法為我之有也理既為苦則事不從己已苟不從則非我所保保之非我彼必非有也有是有矣而曰非有無則無也豈可有哉此為無有無無究竟都盡乃所以為空義也中論云諸佛說空法為離諸有見若復見有空諸佛所不化故畢竟空耳於我無我者生公云既理不從我為空豈有我能制之哉則無我矣無我本無生死中我非不有佛性我也解曰此即無我法中有真我故不二也諸佛下引中論則二雙非也實相之中二義俱寂非有無我與我二也實相之中豈有處所故菴提遮經說不生不滅是無常義生滅却是常義等故菴提遮經下則生滅不生滅交絡而釋故彼經中文殊師利言若知諸法畢竟生滅變易無定如幻相而能隨其所宜有所說者是為常義以諸法生不自得生滅而不自得滅故云何無常謂若知諸法畢竟不生不滅隨如是相而能隨其所宜而有所說是無常義以諸法自在變易無定明不自得隨如是知者說為無常義也釋曰此意正顯性相交徹二義相成生滅相盡無常即常故不生不滅是無常義隨緣變易常即無常即生滅是常義也又性即相故不生不滅是無常義相即性故生滅是常義互奪則雙非互成則雙立雙𣗳中間入涅槃者即斯意矣雙非之義次下當釋瑜伽四十六云云何菩薩觀一切行皆是無常謂觀一切行言說自性於一切時常無所有如是諸行常不可得若得斯意則入中道瑜伽四十六下引大論證前不生不滅是無常義正順前經亦即是生公常之為無乃所以無無常故即不生不滅矣即諸行而不可得故入中道非常非無常也若依中邊論約三性說則初後二性不生不滅是無常義依他起性則生滅是無常義等若依辨中邊論下則雙證前生滅不生滅皆無常義而各有所囑可知遠公釋淨名多用中邊論意意取圓成實性釋不生滅是無常義故云實相理窮名為畢竟體寂無為名不生不滅此不生不滅是彼無常真實性故名無常義餘例此知則初後者遍計無可生滅故圓成體常湛然故又無作者非常非無常故無味者非苦非樂故不如名者非空非不空言不及故無處所者非我非無我不在生死及涅槃故無分別者念想無故無堅實者實與不實相待有故又無作下第四取涅槃雙非釋也亦有二意一者實相之中二邊斯寂如向所引中論云諸法實相中無我無非我亦應云諸法實相中無常無無常諸法實相中無苦無樂無淨不淨無空不空以破常故說於無常非謂有無常破無常故說常非謂有於常也二者非常者性徹相故非無常者相徹性故等思之無分別下上來四重但解前八此下二句通遣能所歷上四重皆用此二如第一重不分別無常無常無堅實也第二重不分別常無常常與無常俱無堅實常無堅者離常相故第三重不分別無生無常生滅常義無實例知第四重亦不作雙非分別未免戲論故既離四句雙非亦無堅實亦同淨名法本不生今則無滅是寂滅義上對四句且引前四今具五矣上來所說無常之義並已具足特由此義常所聞故更引古來一兩師釋肇公云畢竟者決定之辭小乘觀法以生滅為無常義大乘之士以不生滅為無常義無常名同而幽致殊絕其道虛徹故非常情之所能測妙得其旨其唯淨名乎遣常故言無常非謂有無常無常常無故云畢竟不生不滅是無常義釋曰斯則美麗理但一重前已含有大乘法師云小乘以生滅為無常謂不生滅為常故今折彼汝見有不生滅為常者此常還是無常故云不生不滅是無常義釋曰此則破其見常之心而有二失一者彼但說無常曾不說常何得以無常折彼常耶二者彼未知常何得言不生不滅是常義耶故非經意下四句大例同此然䟽上四重解釋理無所遺尚通實教若華嚴宗一切法趣無常無常攝法無遺義理無盡方真無常總𭣣諸義以為一致皆是此宗一義所𭣣無常既爾餘句例然佛子此菩薩應勸學十法何者為十所謂觀察眾生界法界世界觀察地界水界火界風界觀察欲界色界無色界後勝進中是護小乘行小乘不求種智不欲廣知故十中初三是作佛事處眾生是所度法界是能度世界是度處勝進者此皆十地論立下當廣釋大意云觀無常等煩惱不生名護煩惱行不同凡夫觀察諸界破邪顯正不墮小乘名護小乘行次四界是起見處外道計大為諸法本小乘計大為諸色因又成身之體次四界者總摽也外道計大為諸法本者外道有計地為物本依地生故或事於水水能淨故或事於火火能熟故或事於風風成壞故廣如別說小乘計者地水火風即是能造色香味觸以為所造色香非一己名為諸況若形若顯五境五根諸色非一皆大所造也如薩婆多宗此說總造若楞伽第二大慧說四大種云何造色謂津潤妄想大種生內外水界堪能妄想大種生內外火界飄動妄想大種生內外風界斷截色妄想大種生內外地界色及虛空俱計著邪諦五陰集四大造色生彼䟽解云謂見有津潤妄想大種熏成種子從此種子而生內外水界餘三例然但加經見有字耳然火能成熟故曰堪能地有形叚及體堅住而可斷截故云斷截䟽言又成身之體者淨名云四大合故假名為身四大無主身亦無我等後三界是繫縛處云何觀耶一觀其相委細而知二觀其性甚深平等何以故欲令菩薩智慧明了有所聞法即自開解不由他教故三徵意云但總觀無常何用廣知釋意云觀空不礙廣有知見性相兼了法智增明故佛子云何為菩薩生貴住此菩薩從聖教中生成就十法第四生貴住自分中有五謂釋名標徵列結也從聖教生者謂多聞熏習等流無漏教法生其智故又下偈云佛子於法如是觀從佛親生名佛子此約能說人也又偈云了達諸有無所有超過彼法生法界此約理也上三義皆能生後一義兼顯所生之處又能說所說能詮所詮成此三異從此三生並可尊貴從聖教生者此牒經即釋名也謂從多聞下䟽引論釋即攝論第六云多聞熏習者謂於大乘而起多聞聞法義已熏心心法相續所依其少聞者無容得入此現觀故等流無漏者即是能熏此是如來所流從勝流真如流此教法故名無漏教似智故名為等流生其智故者智是所生即第四住菩薩之智由生此智故名生貴住唯識等論大意皆同次引下文復出二能生從上三義下結其通局能生為局兼所生處即名為通依能生智還住此故又能說下辨三名所以三事成於兩重能所佛為能說教及法界皆是所說教為能詮法界所詮要具此三生義方足故前後互出從此三生下結成生貴之名何者為十所謂永不退轉於諸佛所深生淨信善觀察法了知眾生國土世界業行果報生死涅槃是為十列中十事同四地十種法智但有開合耳既從聖教生成就四智教化眾生一自住處智不退轉故亦所生也二同敬智於佛淨信故亦能生也三真如智善觀察法故亦所生處也法即法界四分別所說智即餘七句謂了眾生空有佛土權實世界染淨行業善惡果報苦樂二種生死四種涅槃具如常釋列中十事者然三賢如次似於十地就中十住相似最多以入初賢如地修故初住似初地二住似二地乃至十住似十地故䟽多引地文釋住但有開合者初二不開彼經初句云深心不退故此句自分云自住處二云於三寶中生淨信畢竟不壞故即是勝進上二約德行差別今云亦能生者以上云從佛親生故下之二智約智解差別三真如智即是證智四即教智其真如智彼經兩句一云觀諸行生滅故二觀諸行自性無生故上句生空真如下句法空真如故此合為一句善觀察法具上二觀故名為善亦所生處者以上三義釋名中法界為所生處即真如故第四智中彼但有六此有七句開也句雖有七義乃略彼彼六句中一云觀世界成壞即今世界二觀因業有生即今業行果報二句三觀生死涅槃即今六七二句四觀眾生國土業故即此初二亦此合也五觀前際後際故六觀無所有盡故此之二句今文略無攝在果報生死之中故全同也今䟽中觀眾生牒經空有即觀相佛土即牒經言權實者即是觀相下五例知二種生死四種涅槃下當廣說佛子此菩薩應勸學十法何者為十所謂了知過去未來現在一切佛法修習過去未來現在一切佛法圓滿過去未來現在一切佛法了知一切諸佛平等後十勝進初三解了通於教理行果次三修集行法次三誓當滿果後一別了理法何以故欲令增進於三世中心得平等有所聞法即自開解不由他教故後徵釋意欲進後位真俗平等故徧觀三世不殊方知平等故佛子云何為菩薩具足方便住此菩薩所修善根皆為救護一切眾生饒益一切眾生安樂一切眾生哀愍一切眾生度脫一切眾生令一切眾生離諸災難令一切眾生出生死苦令一切眾生發生淨信令一切眾生悉得調伏令一切眾生咸證涅槃第五具足方便住者自分十心亦是方便也勝進十心亦具足也今自分中即第二住發起此心今以所修善根正向所為例前解釋文並可見今別為一勢謂初是總句救苦護善故云何護善一授與樂因如經饒益故二令得樂果謂安樂故三哀愍妄樂不令著故四云何救苦度一切苦得解脫故何者是苦苦有二種一三災八難二二種生死云何能離一教生淨信二由淨信故授以三學令諸根煩惱皆得調伏云何得樂謂咸證涅槃究竟滅苦是真常樂初句九字流至於此初句九字等者謂句句皆有此菩薩所修善根皆為字佛子此菩薩應勸學十法何者為十所謂知眾生無邊知眾生無量知眾生無數知眾生不思議知眾生無量色知眾生不可量知眾生空知眾生無所作知眾生無所有知眾生無自性後勝進中前六義含深廣後四唯顯甚深云何廣耶一無涯畔二無分限三離算數四言思莫儔五色類非一六非稱量盡所言深者無邊謂非有非無非斷非常故無量者常一剎那無長短故無數者非一非異不墮數故不思議者即妄即真言語道斷心行處滅故無量色者頓現身器故不可量者出二量故後四中七為總句人法空故此云何空八約能成非是自他共所作故九約所成內外推尋無所有故十無自性釋成上義無性故空無性故誰能作無性故無所有非斷無也又七八九是三脫門頓現身器者前約廣釋直語色類之多故云非一今約深釋藏識頓變根身器世間故為甚深出二量者現量比量不能量故又過量無量故非是自他者中論苦品云自作及他作共作無因作如是說諸苦於果則不然自他等義下當廣說何以故欲令其心轉復增勝無所染著有所聞法即自開解不由他教故三徵釋意云雙明深廣性相交徹則轉復增勝形奪兩亡皆無染著成般若故佛子云何為菩薩正心住此菩薩聞十種法心定不動何者為十所謂聞讚佛毀佛於佛法中心定不動聞讚法毀法於佛法中心定不動聞讚菩薩毀菩薩於佛法中心定不動聞讚菩薩毀菩薩所行法於佛法中心定不動聞說眾生有量無量於佛法中心定不動聞說眾生有垢無垢於佛法中心定不動聞說眾生易度難度於佛法中心定不動聞說法界有量無量於佛法中心定不動聞說法界有成有壞於佛法中心定不動聞說法界若有若無於佛法中心定不動是為十第六正心住初自分內由成就般若了法性相故皆不動名為正心初四約所敬三寶由了法平等聲如谷響故於讚毀不生欣慼又在執應毀就理應讚故故商主天子經云無有不毀語言而能至其解脫中故又在執應毀者上約不取聲相而毀為非今明合毀毀却順理商主天子經者彼經云又復問文殊師利言若復有人毀汝所說彼將何去答言當向涅槃又問何緣作如是說答言一切無有不毀語言而能得至聖解脫中者所以者何其聖道中無有名字章句語言可說可示若不信者彼等當不解脫又問何緣作如是說答言不可已得解脫復得解脫也故言在執應毀因言通理言語性空即是解脫故云就理應讚也次三約所愍眾生有量無量是斷常邊菩薩不墮有垢無垢是增減邊菩薩遠離易度難度是苦樂邊菩薩不住又有垢者難無垢者易又亦反此以不發心不知垢故名之為無有量無量者有量無量略有二義一約豎論眾生當盡不有眾生故名為斷若常為眾生即墮於常二者橫論眾生無邊即墮於常定有著常故若傍有邊涯即墮於斷傍更無故定無則斷有垢則眾生界增無垢則眾生界減難度則菩薩勤苦易度即生安樂又難度常受苦易度得安樂也以不發心者是不知垢者難度則顯已發心者則知有垢故易度也如暗室中塵若有隙光則知有塵無光之處不見於塵後三約所知法界有量無量亦是斷常餘二增減已得正心故皆不動法界有量者有量故斷無量故常有成即增有壞即減苦有即增若無即減又約眾生大悲大願無限量故了法界性超量非量故知法界相緣成世界說有成壞非成壞故體有相無體無相有皆自在故况並音聲性離何足動哉又約眾生者上量無量等皆悉是過但以般若正知不動今明有量無量等各有所以故皆不動悲願無限成其無量耳了法界性雙成上二故下經云法界非有量亦復非無量牟尼悉超越有量及無量既能超越故心不動知法界相下釋有成壞緣成故有成緣離故有壞緣成故無成緣壞故無壞體有相無下釋若有若無體有是圓成之有相無是緣成之無體無相有則緣成之體無自性故緣成之相不壞相故則二體不同實體則有妄體則無若約真俗二義別說體有相無是真如上二義體無相有是緣成上二義又體有體無皆真如上義相有相無皆緣起上二義思之可知上皆出所以故不動況並下約觀心故不動佛子此菩薩應勸學十法何者為十所謂一切法無相一切法無體一切法不可修一切法無所有一切法無真實一切法空一切法無性一切法如幻一切法如夢一切法無分別後十勝進中然勸學者通聞思修偈云聽聞乃一義爾偈云聽聞者恐人引下文為難下文云一切諸法皆無相無體性空無實如幻如夢離分別常樂聽聞如是義故云聽聞是一義耳理實應須思修無相無體等法耳列中一自性之相不可得故二緣起想成故三圓成性淨故四能成非有五所成無實六自性本空七空性亦離八喻上緣現九喻上想生十總離取捨出沒想故此與六地取染淨法分別慢對治文多相似此與六地者彼經初二句全同但彼皆云平等耳經云一切法無相故平等無體故平等想成即體三即無生故平等謂諸入苦果虛妄分別為本故無有生如知妄本真即圓成性今經云不可修也四即無成故平等然成則非有五即本來清淨故平等所成果法無有真實即是實性故清淨也上二三句即無染分四五二句即遣淨分六即無戲論故平等無戲論故即空七即寂靜故平等故今云無性無性故寂靜八九二喻即當彼我非有相彼有八喻今但有二而成二義然前六以無遣有此二以有遣無云我非有但無法我不壞於事如幻事等非無幻化幻化非真耳總離等者即今經無有分別彼經云有無不二故平等即雙遣有無故無分別而上䟽云總離取捨出沒想故者取捨即論經別句第六無取捨故平等云出沒即是論釋論云六遣出沒故釋曰出沒取捨皆分別故今既遣之故無分別然彼句當寂靜之後前來未用留此說之即與論經前後不同唯一句耳亦由有此故云多同言染淨者由彼五地觀苦集是染滅遏是淨今深般若故能治之何以故欲令其心轉復增進得不退轉無生法忍有所聞法即自開解不由他教故三徵釋云此如順忍欲進後位不退忍故此如順忍者十地配五忍四五六地配於順忍七八九地配無生忍無生忍者即不退忍故次䟽云然此位中已入無生佛子云何為菩薩不退住此菩薩聞十種法堅固不退何者為十所謂聞有佛無佛於佛法中心不退轉聞有法無法於佛法中心不退轉聞有菩薩無菩薩於佛法中心不退轉聞有菩薩行無菩薩行於佛法中心不退轉聞有菩薩修行出離修行不出離於佛法中心不退轉聞過去有佛過去無佛於佛法中心不退轉聞未來有佛未來無佛於佛法中心不退轉聞現在有佛現在無佛於佛法中心不退轉聞佛智有盡佛智無盡於佛法中心不退轉聞三世一相三世非一相於佛法中心不退轉是為十第七不退住自分十中初三三寶次二別顯前法次三別明初佛後二約佛境智通佛法也而十皆言不退轉者大同前位然此位中已入無生知所聞法畢竟空故又前位會事入理令心不動今此事理雙現而心不退後位從理向事唯隨事行轉純熟故是故前位於三寶等但聞讚毀忍之尚易今聞有無利害轉深成忍則難故過前位又前言不動但能正心今云不退有進趣義又權實方便皆悉通達有無等言皆有在故佛則色相虛無應機為有法則離相離性不壞相性菩薩同佛今云不退者不退有二一已得不退即前心定不動二未得不退即今此位念念進入則是不退又權實下此中通有四義對前正心以釋不退上三義對前了法平等聲如谷響故此下一義對前在執應毀就理應讚故云有無等言皆有在故佛則色相下出有在之相次二中約事行為有入理行為無出離有二一約自行義同前文有垢無垢亦約事理二就化他悲故不出由智故出出離有二者即前正心住中眾生有垢無垢上有二義有垢則難度等亦約事理者事則有出理則無出次下三句亦論有無何異初句初句邪見為無正信言有此三亦非正見雖許有佛不徧三世或言過去入滅是故非有未來未成安得為有現在生界未盡佛願未滿今有佛者皆應現耳俱有可知今知其謬說為無正說為有雖許有佛者䟽中先併出三世無後俱有可知者即併舉三世有既言不遍三世則諸計不同或言過現有未來無或言過現無未來有等故云不遍現在生界下辨現在無佛義此師計云一切如來因地發願度盡眾生生界不盡不取正覺現見眾生沉淪九有故知諸佛未合有成成則違誓也今有佛者下通妨難難云若爾今十方世界諸佛出現何得言無答云皆是菩薩應成佛耳此師之計最為孟浪謗無諸佛理實難容若爾云何通於違誓之義古有多釋一云本擬度生未期成佛積行淳著行催自成如撥火杖本欲燒草不欲燒杖撥草既多任運燒盡故三論師詺為不自在佛不欲成佛而自成故有云成佛若不化生可違本誓成竟亦化豈違本誓難云化生之義雖許得存盡竟方成其義何在豈得不違如實義者諸佛皆有慧智二門以大悲故窮未來際無成佛時故菩薩闡提不成佛也以大智故念念速成又欲化盡諸眾生界自須速成方能廣化不懼違誓盡竟成言又了眾生之本如故化而無化是則常成亦常不成亦常化生而常無化悲智自在何局執耶此乃傍來亦是人情好難問故今許三世皆悉有佛故下結云謬說為無正說為有後二句中初智後境佛智有盡等者一豎約智體以盡智故名為有盡窮未來故名為無盡又若入永滅則名為盡不永滅度是為無盡約從修生則名為盡即同無為故名無盡二橫就所知謂法無盡故智亦無盡以無盡智稱無盡法則名為盡故法華云唯佛與佛乃能究盡諸法實相智度論云如函大蓋亦大還將無盡之智知無盡法是故如來名一切智今菩薩窮究知依豎義半了半不了知依橫義二俱是了佛智有盡下此亦常人之所好難就豎約智體中自有三義初約體相說言盡智者諸惑都亡諸相皆寂故名盡智智體湛然盡未來際體不可亡故名無盡二約權實說三約修生本有說含兩宗義修生名盡約剎那盡即法相宗若無盡者即無剎那屬法性宗並如玄中二橫就所知者一稱理無盡二無法不窮故名為盡下引法華第一智論第三論釋佛是一切智人彼先難云所知處無量故無一切智人答云智亦無量如函大蓋亦大是一切智人函喻所知蓋喻能知今菩薩下結成邪正言知依豎義下總相而言盡皆不了無盡皆了若別說者三釋之中初一皆了二中言永盡滅是邪是機言不永滅是正是實三中依權宗實則盡為不了不盡為了若約當宗隨宜之說二俱是了又相待說有盡無盡就理而言並非二相後一就境約性一相約相非一知其隨說皆非徧知佛子此菩薩應勸學十種廣大法何者為十所謂說一即多說多即一文隨於義義隨於文非有即有有即非有無相即相相即無相無性即性性即無性後勝進中十事五對此大同地中樂無作行對治發起十種殊勝行由此知其事理無礙至地則得權實雙行此大同地者即是七地由六地般若常樂無作今起十行以為能治法之有本不得不知全引彼文恐成繁長要自尋檢初一多對總含三義一約權實於一佛乘說無量故雖有眾多皆佛因故二約事理理能成事說一即多事能顯理說多即一三約事事無礙有同體異體義如上說於一佛乘說無量故此對即法華第一中意故經云諸佛以方便力於一佛乘分別說三又云吾從成佛已來種種因緣種種譬喻無量方便引導眾生即從本流末雖有眾多者即攝末歸本故從經中三世諸佛皆云以無量無數方便演說諸法是法皆為一佛乘故第三云汝等所行是菩薩道又云究竟至於一切種智故皆佛因是知依實開權說一即多會權歸實說多即一二文義對文隨於義轉變密意故即如初句一言隨於多義義隨於文顯了直說故即下三對但顯事理一無礙義若望下偈云如是一切展轉成則文義亦通事事無礙轉變密意者即文同義異也如一名四實九義瞿聲如一無常之言小乘即以生滅為義大乘即以不生不滅而為其義在遍計性則無可常在依他性即說生滅在圓成性則以轉變染淨為義故云轉變言密意者則如前引攝論之中以異言詞說異法等言即如初句下即指初句為文隨於義一多言同而有三義故義隨於文下釋後句也顯了對上密意直說對上轉變即下三對者明下三對唯是義隨於文但得釋為事理無礙不得通於事事無礙及約權實如初句故若望下偈云下重會前義前中文隨於義但約所詮有事事無礙未明文望於義相望無礙由文成義則文有力全攝於義由義成文則義有力全攝於文等故成事事無礙也以下偈云知一即多多即一文隨於義義隨文於是一切展觀成此不退人應為說即其文也三徧計理無情有無二四依他幻相性空無二五圓成性空與不空二如不異三遍計者䟽有兩重第一別約三性以明事理若法相宗遍計依他所明二義唯約於事圓成二義方是於理今法性宗遍計理無依他無性即是於理非有即有是理徹於事有即非有即事徹於理等其圓成二義即就理上自論無礙第三無性對於圓成亦然揀非事事無礙及權實等故上三對但顯事理無礙又上三中皆以三性三無性相即準思又上三下第二重釋則初二對以遍計依他為事二無性為理事理交徹非有即有者相無自性性即遍計所執有即非有者遍計所執即相無性次對例知三如前釋音釋逼迫逼必歴切驅也迫愽陌切窘也涯畔涯宜皆切畔薄半切邊際也撥北末切般入聲捩開又轉之也
