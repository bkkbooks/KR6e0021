body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清凉山大華嚴寺沙門澄觀撰述爾時十方世界海一切眾會蒙佛光明所開覺已各共來詣毘盧遮那如來所親近供養第三爾時十方下所召雲奔文分為三第一同會道場第二現自在用第三聲光自述今初亦三初總明二所謂下別顯三如是等下總結所謂此華藏莊嚴世界海東別中十方即為十段一一方中皆有十事一定方次有世界海名清淨光蓮華莊嚴二土海彼世界種中有國土名摩尼瓔珞金剛藏三世界佛號法水覺虛空無邊王四佛名於彼如來大眾海中有菩薩摩訶薩名觀察勝法蓮華幢五主菩薩與世界海微塵數諸菩薩俱六眷屬數來詣佛所七至佛所各現十種菩薩身相雲徧滿虛空而不散滅復現十種雨一切寶蓮華光明雲復現十種須彌寶峯雲復現十種日輪光雲復現十種寶華瓔珞雲復現十種一切音樂雲復現十種末香樹雲復現十種塗香燒香眾色相雲復現十種一切香樹雲如是等世界海微塵數諸供養雲悉徧虛空而不散滅八興供雲現是雲已向佛作禮以為供養九申禮獻供即於東方各化作種種華光明藏師子之座於其座上結跏趺坐十化座安坐此中應有世界種名畧不說耳其東方供雲應有十種而但九者塗香燒香二文合故言各現者主伴一一皆現也重重無礙各徧虛空一一可觀名不散滅十方化座體相各異而皆同名蓮華藏師子之座者師子之義已見上文蓮華藏言通有三意一約菩薩表含藏開敷故二約所詮將說依報故三約諸會通顯華嚴故上下還於本方坐者佛圓廻身皆見靣故異於餘宗但八方故此華藏世界海南次有世界海名一切寶月光明莊嚴藏彼世界種中有國土名無邊光圓滿莊嚴佛號普智光明德須彌王於彼如來大眾海中有菩薩摩訶薩名普照法海慧與世界海微塵數諸菩薩俱來詣佛所各現十種一切莊嚴光明藏摩尼王雲徧滿虛空而不散滅復現十種雨一切寶莊嚴具普照耀摩尼王雲復現十種寶燄熾然稱揚佛名號摩尼王雲復現十種說一切佛法摩尼王雲復現十種眾妙樹莊嚴道場摩尼王雲復現十種寶光普照現眾化佛摩尼王雲復現十種普現一切道場莊嚴像摩尼王雲復現十種密燄燈說諸佛境界摩尼王雲復現十種不思議佛剎宮殿像摩尼王雲復現十種普現三世佛身像摩尼王雲如是等世界海微塵數摩尼王雲悉徧虛空而不散滅現是雲已向佛作禮以為供養即於南方各化作帝青寶閻浮檀金蓮華藏師子之座於其座上結跏趺坐此華藏世界海西次有世界海名可愛樂寶光明彼世界種中有國土名出生上妙資身具佛號香燄功德寶莊嚴於彼如來大眾海中有菩薩摩訶薩名月光香𦦨普莊嚴與世界海微塵數諸菩薩俱來詣佛所各現十種一切寶香眾妙華樓閣雲徧滿虛空而不散滅復現十種無邊色相眾寶王樓閣雲復現十種寶燈香𦦨樓閣雲復現十種一切真珠樓閣雲復現十種一切寶華樓閣雲復現十種寶瓔珞莊嚴樓閣雲復現十種普現十方一切莊嚴光明藏樓閣雲復現十種眾寶末間錯莊嚴樓閣雲復現十種眾寶周徧十方一切莊嚴樓閣雲復現十種華門鐸網樓閣雲如是等世界海微塵數樓閣雲悉徧虛空而不散滅現是雲已向佛作禮以為供養即於西方各化作真金葉大寶藏師子之座於其座上結跏趺坐此華藏世界海北次有世界海名毘瑠璃蓮華光圓滿藏彼世界種中有國土名優鉢羅華莊嚴佛號普智幢音王於彼如來大眾海中有菩薩摩訶薩名師子奮迅光明與世界海微塵數諸菩薩俱來詣佛所各現十種一切香摩尼眾妙樹雲徧滿虛空而不散滅復現十種密葉妙香莊嚴樹雲復現十種化現一切無邊色相樹莊嚴樹雲復現十種一切華周布莊嚴樹雲復現十種一切寶𦦨圓滿光莊嚴樹雲復現十種現一切栴檀香菩薩身莊嚴樹雲復現十種現徃昔道場處不思議莊嚴樹雲復現十種眾寶衣服藏如日光明樹雲復現十種普發一切恱意音聲樹雲如是等世界海微塵數樹雲悉徧虛空而不散滅現是雲已向佛作禮以為供養即於北方各化作摩尼燈蓮華藏師子之座於其座上結跏趺坐此華藏世界海東北方次有世界海名閻浮檀金玻瓈色幢彼世界種中有國土名眾寶莊嚴佛號一切法無畏燈於彼如來大眾海中有菩薩摩訶薩名最勝光明燈無盡功德藏與世界海微塵數諸菩薩俱來詣佛所各現十種無邊色相寶蓮華藏師子座雲徧滿虛空而不散滅復現十種摩尼王光明藏師子座雲復現十種一切莊嚴具種種校飾師子座雲復現十種眾寶鬘燈燄藏師子座雲復現十種普雨寶瓔珞師子座雲復現十種一切香華寶瓔珞藏師子座雲復現十種示現一切佛座莊嚴摩尼王藏師子座雲復現十種戶牖階砌及諸瓔珞一切莊嚴師子座雲復現十種一切摩尼樹寶枝莖藏師子座雲復現十種寶香間飾日光明藏師子座雲如是等世界海微塵數師子座雲悉徧虛空而不散滅現是雲已向佛作禮以為供養即於東北方各化作寶蓮華摩尼光幢師子之座於其座上結跏趺坐此華藏世界海東南方次有世界海名金莊嚴瑠璃光普照彼世界種中有國土名清淨香光明佛號普喜深信王於彼如來大眾海中有菩薩摩訶薩名慧燈普明與世界海微塵數諸菩薩俱來詣佛所各現十種一切如意王摩尼帳雲徧滿虛空而不散滅復現十種帝青寶一切華莊嚴帳雲復現十種一切香摩尼帳雲復現十種寶燄燈帳雲復現十種示現佛神通說法摩尼王帳雲復現十種現一切衣服莊嚴色像摩尼帳雲復現十種一切寶華叢光明帳雲復現十種寶網鈴鐸音帳雲復現十種摩尼為臺蓮華為網帳雲復現十種現一切不思議莊嚴具色像帳雲如是等世界海微塵數眾寶帳雲悉徧虛空而不散滅現是雲已向佛作禮以為供養即