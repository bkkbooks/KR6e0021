唯分故者謂由上諸義理性不唯無分故在一切處而全體在於一內不唯分故常在一中而全在一切處事法不唯分故常在此處恒在他方不唯無分故遍一切處而不移本位又由理性不唯無分故不在一事外不唯分故不在一事內事法不唯分故常在此處而無在不唯無分故常在他處而無不在是故無在無不在而在此在彼無有障礙也然此中有兩對事理各有二四句乃成八句䟽中但出二句謂上云證理不唯無分故即初對約理一句其一切法皆爾者舉例耳今云身等不唯分者即是後對中約事一句以身等即事也餘之六句略而不出故上總言各二四句意中含取普賢勝行皆能入一切眾生悉樂見佛子能住此法門諸光明中大音吼後一偈結廣有歸普賢勝行皆入非獨向來所陳故能光中演斯自在爾時世尊欲令一切菩薩大眾得於如來無邊境界神通力故大文第四現瑞表法上所現相但召有緣眾集將陳故重現斯瑞瑞文有三初光示法主二現華表義三現眾表教法藉人弘故先明主義為教本故在教前今初示主文分為六一意二體三名四相五展六收今初可知放眉間光二放眉間光即光體也眉間者表離二邊故於體不計有無二邊於義不著常無常等諸法相邊於行不習苦樂二邊於道不住邪正二邊於人不執因果二邊於教不說世出世二邊於諦不見真俗二邊於化不定權實二邊是故為眾放眉間光於體不計有無者一切法體不出有無於義不著常等就一有上自有常無常之義謂生滅是無常義不生滅是常義又不生滅是無常義等只要一有法上即有常無常我無我苦之與樂淨非淨等故示諸法相遍於行不習苦樂者斷見計樂行常見計苦行等住正道者則不分別是邪是正因果交徹故世間性空即是出世隨順觀察世諦即入第一義故於諦常自二於解常自一未堪實化權為說三大根既熟便為說實權是即實之權實是即權之實故此光名一切菩薩智光明普照耀十方藏三此光下辯光名菩薩智光者令得能知智也普照十方藏者令照所知境也藏有三義一智光含德無盡故二以十方剎海各於塵內重含諸剎故三亦通於五藏以言智光故照初二藏令菩薩證照次二藏令菩薩成證則得於涅槃成則得於菩提照第五藏令化令淨三中後二如下業中照初二藏者一如來藏在纏含果法故二自性清淨藏在纏不染故此二本有故令其證照次二藏者一法身藏謂果位為功德所依故二出世間上上藏謂出纏超過二乘菩薩故並已出纏故致成言照第五藏者以第五法界藏通因通果外持一切染淨有為名為法界內含一切恒沙功德故復名藏以有因故化之以有染故淨之餘如前說三中後二者即藏有三義中後二義下動剎網一一塵中現無數佛即第二義三雨法雨即第三義妙法輪雲即如來藏便是所證二出離雲即令化令淨三大願雲令得令成義其狀猶如寶色燈雲四其狀下顯相謂色如燈雲猶日月洞照周遍潤澤雨法雨故如相海品謂色如燈雲者相海品云如來眉間有大人相名遍法界光明雲摩尼寶華以為莊嚴放大光明具眾寶色猶如日月洞徹清淨其光普照十方國土於中顯現一切佛身復出妙音宣揚諸法徧照十方一切佛剎五遍照下展即光業用於中分五一所照分齊謂盡十方一切佛剎其中國土及以眾生悉令顯現二光所現謂土及眾生又普震動諸世界網三動剎網以諸世界重疊影現交互相當猶如網孔一一塵中現無數佛四塵現如來隨諸眾生性欲不同普雨三世一切諸佛妙法輪雲顯示如來波羅蜜海又雨無量諸出離雲令諸眾生永度生死復雨諸佛大願之雲顯示十方諸世界中普賢菩薩道場眾會五隨機雨法略舉三法皆下所顯初法輪雲示其所行二出離雲示其所度三大願雲示說法主謂將說普法令知法主大願普周剎塵內故作是事已右繞於佛從足下入第六作是下收則示有終歸證從佛流眉間出光修因順果故須右繞自下升高故從足入履佛所行方證入故爾時佛前有大蓮華忽然出現第二爾時佛前下現華表義文有二別一總標華現為坐所現中方眾故通表所詮佛華嚴故別表華藏佛所淨故故於佛前出此蓮華既通表華嚴亦具同時具足等十門及教義等而其本意正表義耳忽然現者依理起事難測量故亦具同時者十門可思但法是所依體事中一華事耳言教義等者即是十對所依體事由此華事為理所融故具十對令同時等而賢首約義釋成云一教義謂見此蓮華能生解故二事理華即是事舉體同真故三境智華是所觀同智性故四行位是萬行華隨位別故五因果因事之華覽成果故六依正全是所修亦能依故七體用體同真性用應機故八人法恒覽於人攝為法故九逆順逆同五熱順十度故十感應遍應一切亦能感故而其本意者以十玄十對凡舉一事必具十玄凡一玄門必収十對泛明一法一一圓收故若作義者但是傍來然其本意唯表義耳忽然現者隨難牒釋凖觀佛三昧海經第二明地金剛白毫相光云此相現時佛菩提𣗳白毫力故根下自然化生寶華縱廣正等四十由旬其華金色金剛為臺佛眉間光照此華臺其光直下至金剛際等與此大同其華具有十種莊嚴一切蓮華所不能及二其華下顯具德嚴文亦有二先標十種顯德無盡所謂眾寶間錯以為其莖摩尼寶王以為其藏法界眾寶普作其葉諸香摩尼而作其鬚閻浮檀金莊嚴其臺妙網覆上光色清淨後所謂下別列十句前六體備眾德後四妙用自在今初蓮子住處有含藏之義故名為藏表示法門一含一切華藏之名由此而立於一念中示現無邊諸佛神變普能發起一切音聲摩尼寶王影現佛身於音聲中普能演說一切菩薩所修行願後妙用中一念況多摩尼寶王即前藏體影現佛身即依正無礙既發多聲聲皆演法此華生已一念之間第三此華生下現眾表教文略有三一現眾時言一念者華生無間表教義相應於如來白毫相中二現眾處謂白毫中表教從所證淨法界所流為眾教源如白為色本有菩薩摩訶薩名一切法勝音與世界海微塵數諸菩薩眾俱時而出三有菩薩下正明眾現亦分為三一主屬齊現遍詮諸法故云一切所詮圓滿是曰勝音圓教法門必攝眷屬故下文云世界海微塵數修多羅以為眷屬權實無礙故曰俱時右繞如來經無量帀禮佛足已時勝音菩薩坐蓮華臺諸菩薩眾坐蓮華鬚各於其上次第而坐二右繞下申敬就座主伴雖殊並修因順果故右繞如來文義相隨故依華坐正助不等臺鬚有差上義依理明故忽然而現今教由人立故眾從佛流亦如涅槃從牛出乳亦如涅槃等者即第十四經南本十三云爾時眾中有一菩薩名住無垢藏王有大威德成就神通得大總持三昧具足得無所畏即從座起偏袒右肩右膝著地長跪合掌白佛言世尊如佛所說諸佛菩薩所可成就功德智慧無量無邊百千萬億實不可說我意猶謂故不如是大乘經典何以故因是大乘方等經力故能出生諸佛世尊阿耨多羅三藐三菩提時佛讚言善哉善哉善男子如是如是如汝所說是諸大乘方等經典雖復成就無量功德欲比是經不可為喻百倍千倍百千萬億乃至算數譬喻所不能及善男子譬如從牛出乳從乳出酪從酪出生酥從生酥出熟酥從熟酥出醍醐醍醐最上若人服者眾病皆除所有諸藥悉入其中善男子佛亦如是從佛出十二部經從十二部經出修多羅從修多羅出方等經從方等經出般若波羅蜜從般若波羅蜜出大涅槃猶如醍醐言醍醐者喻於佛性佛性者即是如來以是義故說言如來所有功德無量無邊不可稱計釋曰彼約讚法勝能從微至著今但依從佛出教以况眉間出眾然此經文諸說不同若澤州先於菩薩申已解中有一問云此經是其言教阿耨多羅三藐三菩提是其果證教淺證深何故菩提不及是經釋言此中偏名宣說佛性之詮法身之教以之為經所證即是性淨因果所生菩提是其方便因果性淨為本方便為末末不如本故佛菩提功德不及凖佛答其義如是次下釋佛答合中云以佛合牛約應身佛十二部經合乳說小乘經修多羅合酥名大乘教藉小開大故名為出後四俁大乘詮事之教名修多羅謂施戒等事方等合生酥即大乘中破相空教因事顯理故名為出以般若合熟酥究竟離相證實之慧名為般若依理起慧是故名出又約行辯教亦得名出般若經然此般若即是向前菩提體也以醍醐合涅槃般若了因了彼無始法性涅槃是故名出約實辯教亦得名出涅槃經言佛性即是如來者是法身如來非報身如來報身功德不及此經故不即之上皆遠公之意若望經意未必如是謂此公竪將大小事理以配五味乃成屈曲如何不說大乘十二部等耶今謂無垢藏意唯推功歸本果從教生如來述成成其推功之義醍醐最上功本由乳如來至極功歸於教故涅槃即是如來如來即是菩提誠謂滔滔之水本於濫觴合抱之𣗳生於毫末故說教為佛本何用強分大小法報別耶然佛自揀此經異於小乘今牛出乳是大教耳若爾何成五味謂十二部經辯所說教出修多羅者十二分教出生契理合機之義故修多羅出方等者由契理故顯出真理正理廣陳為方等故從方等出般若者依理生智故般若出涅槃者以智契理成極果故故云涅槃猶如醍醐醍醐喻於佛性佛性即是如來文理昭然何須屈曲亦有說言從佛出十二部經是本質教從十二部出修多羅是影像教者亦是妄推度耳都無本影之意其一切法勝音菩薩了深法界生大歡喜入佛所行智無疑滯入不可測佛法身海徃一切剎諸如來所身諸毛孔悉現神通念念普觀一切法界十方諸佛共與其力令普安住一切三昧盡未來劫常見諸佛無邊法界功德海身乃至一切三昧解脫神通變化三其一切下彰其德業主教是宗故偏歎主文有十句略為二解一豎配十地此明普攝十地功德一句一地初地歡喜得智證如二地性戒是佛所行三地多聞入法身海四行道品善友是依五地雙行現通利物六觀法界般若現前七功用已終故佛與力八無生無動住三昧心九為法師見無邊法十具於大盡三昧等圓初地尚攝諸地功德況於後後不具前前二橫就極位釋者一理智了真二量智入行三證窮法身四常觀受用五毛現神變六念觀法門七外感佛加八內安深定九豎見來際十橫無不圓故此十句攝為五對若橫若豎能證必具故為二釋故此十句者重收前釋一如理如量對二法身報身對三身毛心念對四外感內安對五竪見橫圓對大文第五稱揚佛德既現既至任力稱揚自申罔極之情顯佛無涯之德既現既至者䟽於釋文之前總彰讚意於中有二先正釋既現即勝音讚既至即十方菩薩讚罔極者即無極之情故詩序云情動於中而形於言言之不足則詠歌之詠歌之不足則不知手之舞之足之蹈之故生公用此意釋說偈意云以罔極之心詠歌舞蹈耳文分為二初一眉間菩薩讚後十十方菩薩讚新眾纔集佛便現瑞文不累書故編成次以讚德相類結集併之一處乘現勝音之次先舉勝音之偈後十菩薩即如次十方昔人不曉斯文便將後十為勝音眷屬非唯章疏之失亦乃翻譯有違何者且眉間出眾即主伴皆讚十方來眾寂無一言主伴禮儀一何疎索況凖法界品例來者皆有讚詞細尋菩薩之名與前十方如次相似但由譯人不審致令名小乖差至下文中一一對辯新眾纔集下明讚亦二先正明亦是通妨謂有問言若以後十為十方菩薩讚者十方先來何以後讚故今通云現瑞與讚二皆同時則勝音與十方讚亦同時自是結集集讚一處又應問言既是結集排次居然合排十方在前何以向後故釋云承前讚勝音德次是故先舉勝音讚耳音釋優鉢羅梵語也此云青蓮華優音憂鉢音奮迅奮方問切迅思𣈆切玻梵語也此云氷玉乃千年氷之所化也玻滂禾切瓈鄰知切鬘莫班切塗同都切促趨玉切短也歿莫勃切終也
