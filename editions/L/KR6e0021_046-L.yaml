body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述有勝三昧名安樂能普救度諸群生放大光明不思議令其見者悉調伏第八有勝三昧下八十九頌半明毛光照益三昧門智契解脫之門慈熏身語意業故得身同法界大用無涯毛光觸物為益萬品徧於時處緣者會之是謂菩薩圓建立眾生也文分為五初一頌標門總辨二所放光明下別明一毛光明業用三如一毛下類顯一切毛光業用四如其本行下釋成分齊五若有聞下聞信光益今初就所益說故名安樂智契等者總出光明之因具悲智故先此上一句約智亦約表釋謂毛孔表解脫門光明表智慧故二正明智慧故云智契解脫之門慈熏等者約悲智釋以菩薩曠劫慈悲熏修三業故所放光明名善現若有眾生遇此光必令獲益不唐捐因是得成無上智彼先示現於諸佛示法示僧示正道亦示佛塔及形像是故得成此光明就第二𫨻中二初略辨四十四門光用後如是等下結略顯廣就四十四光中皆有四義一標光名二辨光用三出光因四結光果類例相從分為十𫨻五對初有二光顯示三寶二有四光令發大心上二即三寶四弘對三有二光總圓福智四有二光入理持法上即二嚴二持對五有六光六度行圓六有七光四等救攝即六度四等對七有一光總彰三學八有八光雜彰萬行供養為先為三學萬行對九有六光令六根內淨動與理會十有六光明六塵外淨觸境皆道即根清境淨對今初二光中前一顯現於中初句標名以近初標但云所放不言又放次三句辨用後偈辨因中示三寶令其正歸示正道令其正向上通一體及別相三寶亦示佛塔令其正信義兼住持又放光明名照曜映蔽一切諸天光所有暗障靡不除普為眾生作饒益此光覺悟一切眾令執燈明供養佛以燈供養諸佛故得成世中無上燈然諸油燈及酥燈亦然種種諸明炬眾香妙藥上寶燭以是供佛獲此光後一光照耀用有七句一偈辨因並顯可知又放光明名濟度此光能覺一切眾令其普發大誓心度脫欲海諸群生若能普發大誓心度脫欲海諸群生則能越度四流示導無憂解脫城於諸行路大水處造立橋梁及船筏毀訾有為讚寂靜是故得成此光明第二四光令發大心中即四弘願也初一令眾生無邊誓願度因中興有為而毀有為又放光明名滅愛此光能覺一切眾令其捨離於五欲專思解脫妙法味若能捨離於五欲專思解脫妙法味則能以佛甘露雨普滅世間諸渴愛惠施池井及泉流專求無上菩提道毀訾五欲讚禪定是故得成此光明二一光令煩惱無邊誓願斷因中興有為而讚禪定上二皆事理兼修又放光明名歡喜此光能覺一切眾令其愛慕佛菩提發心願證無師道造立如來大悲像眾相莊嚴坐華座恒歎最勝諸功德是故得成此光明三上欣佛果又放光明名愛樂此光能覺一切眾令其心樂於諸佛及以樂法樂眾僧若常心樂於諸佛及以樂法樂眾僧則在如來眾會中逮成無上深法忍開悟眾生無有量普使念佛法僧寶及示發心功德行是故得成此光明四愛樂三寶窮盡法門因中四弘之終故總云及示發心功德又放光明名福聚此光能覺一切眾令行種種無量施以此願求無上道設大施會無遮限有來求者皆滿足不令其心有所乏是故得成此光明又放光明名具智此光能覺一切眾令於一法一念中悉解無量諸法門為諸眾生分別法及以決了真實義善說法義無虧減是故得成此光明第三有二光總圓福智智因中分別法相決了真理無虧理事不減佛法故得一念悉解多門又放光明名慧燈此光能覺一切眾令知眾生性空寂一切諸法無所有演說諸法空無主如幻如焰水中月乃至猶如夢影像是故得成此光明又放光名法自在此光能覺一切眾令得無盡陀羅尼悉持一切諸佛法恭敬供養持法者給侍守護諸賢聖以種種法施眾生是故得成此光明第四二光入理持法初一慧入二空即義持也後一具四總持於法自在後一具四總持者一法持二義持三呪持四無生忍持七地廣說四持並具何不自在又放光明名能捨此光覺悟慳眾生令知財寶悉非常恒樂惠施心無著慳心難調而能調解財如夢如浮雲增長惠施清淨心是故得成此光明又放光明名除熱此光能覺毀禁者普使受持清淨戒發心願證無師道勸引眾生受持戒十善業道悉清淨又令發向菩提心是故得成此光明又放光明名忍嚴此光覺悟瞋恚者令彼除瞋離我慢常樂忍辱柔和法眾生暴惡難可忍為菩提故心不動常樂稱揚忍功德是故得成此光明又放光明名勇猛此光覺悟懶惰者令彼常於三寶中恭敬供養無疲厭若彼常於三寶中恭敬供養無疲厭則能超出四魔境速成無上佛菩提勸化眾生令進䇿常勤供養於三寶法欲滅時專守護是故得成此光明又放光明名寂靜此光能覺亂意者令其遠離貪恚癡心不動搖而正定捨離一切惡知識無義談說雜染行讚歎禪定阿蘭若是故得成此光明又放光明名慧嚴此光覺悟愚迷者令其證諦解緣起諸根智慧悉通達若能證諦解緣起諸根智慧悉通達則得日燈三昧法智慧光明成佛果國財及己皆能捨為菩提故求正法聞已專勤為眾說是故得成此光明第五六度光中戒因中云發大心者謂若發二乘心則破淨戒大心導善不在人天勤䇿萬行慧為上首各加一偈餘可思之又放光明名佛慧此光覺悟諸含識令見無量無邊佛各各坐寶蓮華上讚佛威德及解脫說佛自在無有量顯示佛力及神通是故得成此光明第六有七光四等救攝中初一慈光與佛慧真樂見無量佛此有二義一見事佛真樂因故二見心佛一一心華有覺性故又放光明名無畏此光照觸恐怖者非人所持諸毒害一切皆令疾除滅能於眾生施無畏遇有惱害皆勸止拯濟厄難孤窮者以是得成此光明次三悲光拔苦初一厄難苦又放光明名安隱此光能照疾病者令除一切諸苦痛悉得正定三昧樂施以良藥救眾患妙寶延命香塗體酥油乳蜜充飲食以是得成此光明次一疾病苦又放光明名見佛此光覺悟將歿者令隨憶念見如來命終得生其淨國見有臨終勸念佛又示尊像令瞻敬俾於佛所深歸仰是故得成此光明後一死苦令見佛者一捨命不恐二惡道不畏又要臨終勸者智論二十八云臨終少時能勝終身行力以猛利故如火如毒依西域法有欲捨命者令面向西於前安一立像亦面向西以旛頭挂像手指令病人手捉旛脚口稱佛名作隨佛徃生淨土之意兼與燒香鳴磬助稱佛名若能行此非直亡者得生佛前抑亦終成見佛光也若神游大方去留無礙者置之言外不爾勉旃斯行又放光明名樂法此光能覺一切眾令於正法常欣樂聽聞演說及書寫法欲盡時能演說令求法者意充滿於法愛樂勤修行是故得成此光明又放光明名妙音此光開悟諸菩薩能令三界所有聲聞者皆是如來音以大音聲稱讚佛及施鈴鐸諸音樂普使世間聞佛音是故得成此光明次二光令生法喜初則欣法聽說法喜已充終則觸境無非佛法成喜之極又放光名施甘露此光開悟一切眾令捨一切放逸行具足修習諸功德說有為法非安隱無量苦惱悉充徧恒樂稱揚寂滅樂是故得成此光明後一令成大捨捨除放逸眾惑之根又放光明名最勝此光開悟一切眾令於佛所普聽聞戒定智慧增上法常樂稱揚一切佛勝戒勝定殊勝慧如是為求無上道是故得成此光明第七一光總彰萬行三學攝盡故曰普聞又放光明名寶嚴此光能覺一切眾令得寶藏無窮盡以此供養諸如來以諸種種上妙寶奉施於佛及佛塔亦令惠施諸貧乏是故得成此光明又放光明名香嚴此光能覺一切眾令其聞者恱可意決定當成佛功德人天妙香以塗地供養一切最勝王亦以造塔及佛像是故得成此光明又放光名雜莊嚴寶幢旛蓋無央數焚香散華奏眾樂城邑內外皆充滿本以微妙妓樂音眾香妙華幢蓋等種種莊嚴供養佛是故得成此光明又放光明名嚴潔令地平坦猶如掌莊嚴佛塔及其處是故得成此光明又放光明名大雲能起香雲雨香水以水熏塔及院是故得成此光雲第八八光雜明諸行供養為先前五供敬田又放光明名嚴具令躶形者得上服嚴身妙物而為施是故得成此光明又放光明名上味能令飢者獲美食種種珍饌而為施是故得成此光明又放光明名大財令貧乏者獲寶藏以無盡物施三寶是故得成此光明後三施悲田又放光名眼清淨能令盲者見眾色以燈施佛及佛塔是故得成此光明又放光名耳清淨能令聾者悉善聽鼓樂娛佛及佛塔是故得成此光明又放光名鼻清淨昔未聞香皆得聞以香施佛及佛塔是故得成此光明又放光名舌清淨能以美音稱讚佛永除麤惡不善語是故得成此光明又放光名身清淨諸根者令具足以身禮佛及佛塔是故得成此光明又放光名意清淨令失心者得正念修行三昧悉自在是故得成此光明第九六光內淨六根又放光名色清淨令見難思諸佛色以眾妙色莊嚴塔是故得成此光明又放光名聲清淨令知聲性本空寂觀聲緣起如谷響是故得成此光明又放光名香清淨令諸臭穢悉香潔香水洗塔菩提樹是故得成此光明又放光名味清淨能除一切味中毒恒供佛僧及父母是故得成此光明又放光名觸清淨能令惡觸皆柔輭戈鋋劒㦸從空雨皆令變作妙華鬘以昔曾於道路中塗香散華布衣服迎送如來令蹈上是故今獲光如是又放光名法清淨能令一切諸毛孔悉演妙法不思議眾生聽者咸欣悟因緣所生無有生諸佛法身非是身法性常住如虛空以說其義光如是第十六光外清六境文並可知戈者平頭㦸也鋋者小矛也如是等比光明門如恒河沙無限數悉從大仙毛孔出一一作業各差別第二如是等比下結略顯廣一毛之用光有塵沙如一毛孔所放光無量無數如恒沙一切毛孔悉亦然此是大仙三昧力第三如一毛下類顯一切毛光業用及結用所依謂三昧力如其本行所得光隨彼宿緣同行者今放光明故如是此是大仙智自在第四如其下釋成分齊如是等光今何不見謂有緣者見如目覩光無緣不覺盲瞽常闇於中分二初偈總明如其本行牒前徃因所得光者牒前果用若有宿緣及曾同行者則隨其所見如是差別徃昔同修於福業及有愛樂能隨喜見其所作亦復然彼於此光咸得見若有自修眾福業供養諸佛無央數於佛功德常願求是此光明所開覺後六偈別顯於中初二法說後四喻說前中初偈宿緣宿有四緣一昔同業二愛其行三能隨喜四但見所作後偈現因不必有緣但功行內著光明爰燭有三種因一修廣福二供多佛三求佛果即福智二嚴也上之七類皆蒙光照譬如生盲不見日非為無日出世間諸有目者悉明見各隨所務修其業大士光明亦如是有智慧者皆悉見凡夫邪信劣解人於此光明莫能覩二喻說中雙明見與不見二喻皆有法合初日喻喻光為益因合中謂法日常明有智慧者心不住法如人有目則能得見有三類人則不能見一者凡愚二邪信外道三劣解二乘皆無因緣如人無目摩尼宮殿及輦乘妙寶靈香以塗鎣有福德者自然非無德者所能處大士光明亦如是有深智者咸照觸邪信劣解凡愚人無有能見此光明後寶嚴喻喻光正益明法寶常存由福無福有處不處若有聞此光差別能生清淨深信解永斷一切諸疑網速成無上功德幢第五若有下一頌明聞信光益謂信仰解了不生疑惑則成佛果不以不見疑菩薩之無光不以極苦莫救謂光明之無益亦不高推果用謂菩薩不能故云永斷諸疑不以不見等者此下別釋絕疑之義絕於三疑一以不見疑無光明二不救劇苦謂光明無益經文以如盲不見日等雙釋二疑三亦不高惟果用下又遣一疑謂此作用是佛果用非十信故八毛光照益三昧門竟有勝三昧能出現眷屬莊嚴皆自在一切十方諸國土佛子眾會無倫匹第九有勝三昧下六頌主伴嚴麗三昧門亦是出現三昧文分三別初一標門顯意有妙蓮華光莊嚴量等三千大千界其身端坐悉充滿是此三昧神通力復有十剎微塵數妙好蓮華所圍繞諸佛子眾於中坐住此三昧威神力宿世成就善因緣具足修行佛功德此等眾生繞菩薩悉共合掌觀無厭譬如明月在星中菩薩處眾亦復然大士所行法如是入此三昧威神力次四明一方業用於中前三法說後一喻合既言量等三千則不壞次第劣於十地及等覺也既言量等者此亦遮其不信十信八相成道謂十地方能故云不壞次第謂十地菩薩受職有大蓮華量等百萬三千大千世界十定品辨等覺菩薩有一蓮華量周法界周法界唯大百萬億中但言三千故劣後一如於一方所示現諸佛子眾共圍繞一切方中悉如是住此三昧威神力三一頌類顯十方九主伴嚴麗三昧門竟有勝三昧名方網菩薩住此廣開示一切方中普現身或現入定或從出第十有勝三昧下三十四頌半明寂用無涯三昧門約處名為方網約相是謂寂用亦總顯上來動寂無二故文分為三初一標名總辨十方交絡出入縱橫故名為網或於東方入正定而於西方從定出或於西方入正定而於東方從定出或於餘方入正定而於餘方從定出如是入出徧十方是名菩薩三昧力盡於東方諸國土所有如來無數量悉現其前普親近住於三昧寂不動而於西方諸世界一切諸佛如來所皆現從於三昧起廣修無量諸供養盡於西方諸國土所有如來無數量悉現其前普親近住於三昧寂不動而於東方諸世界一切諸佛如來所皆現從於三昧起廣修無量諸供養如是十方諸世界菩薩悉入無有餘或現三昧寂不動或現恭敬供養佛二或於下三十二頌半正顯業用三是名下一頌總結難思就業用中分三初二頌於十方處交絡出入明於噐世間自在二有五頌十方佛所入出無礙明於智正覺世間自在三於眼根下二十五頌半通顯三世間自在菩薩於三世間自在略有二義一以自身作三世間故得自在二菩薩於三世間處示現自在今此三𫨻初二約後義後一通二義文或𦂶互理實皆具初二世間略有四重無礙一約處謂東處即是西處是故菩薩常在東恒在西也二約佛謂東佛即西佛是故在東佛恒在西佛三約菩薩身不分謂在東之身即是西身四約定謂入定即是出定所以爾者略顯二因一以所觀之法事隨理融相即在故二能觀之心亦寂用無礙故然此文中為顯菩薩祕密隱顯自在德故但說後二若辨前二則似菩薩無力音釋唐捐捐以專切唐捐徒棄也蒲報切急也筏音伐木𥱼也拯濟拯之庱切拯濟救濟也酥音蘇躶郎果切赤體也珍饌饌雛戀切具食也鋋音延短矛也㦸訖逆切枝兵也蹈音導踐也輦力展切車輦也鎣烏定切飾也矛迷浮切瞽果五切目但有联也劇竭㦸切甚也
