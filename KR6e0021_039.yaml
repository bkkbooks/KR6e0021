body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述爾時文殊師利菩薩問財首菩薩言第二教化甚深先問中二初標告告財首者彼得此法財益生門故佛子一切眾生非眾生二正問中二初立宗眾生即非眾生彼此同許亦可躡前覺首八識皆空云何如來隨其時隨其命隨其身隨其行隨其解隨其言論隨其心樂隨其方便隨其思惟隨其觀察二云何下設難謂眾生既空佛云何化若佛不見生空則無大智便成謗佛若見空而化豈不違空空有相違進退何據於中先明十隨辨所化差別後明三輪顯能化不同今初一隨根生熟時如是時中堪如是化又此句為緫謂隨何壽命時等下九為別各有二義謂隨其壽命脩短而化又以無命者法而教化之身二義者謂隨其所受何等類身而受化故又冝以觀身空寂等而得度者以彼化故餘準此知故下答中多說後意行謂三業善惡解謂識解差別言論者國俗教誨此六多約未發心前餘凖比知者上三各顯二義下七不欲繁文故令例知若具說者行二義者一隨修何行時二以何行化之其能化行與所行行未必全同如行施行時或以施行化或以禪慧行化故解二義者一隨有深淺之解二說諸佛菩薩之解化故言論二者一隨何國俗言說二宜用何等言辭化故後四多約發趣已去心樂者有所欣求方便者隨所進趣思惟者依法求義觀察者如說修學心樂二者一隨希求何法二稱根為說諸願樂故方便二者一隨何進趣時二隨用何善巧等化故思惟二者一隨思求何義二說云何思化故觀察二者一如修學時二稱宜為說觀察相故於如是諸眾生中為現其身教化調伏二於如是下能化差別先牒十隨後現三業教化調伏通於語意為以十隨化故眾生非空耶為以眾生空故十隨虛設耶時財首菩薩以頌答曰第二財首答中準諸深經及此偈文略有四意一佛見眾生本來自空非斷空故不礙隨化偈云諸法空無我眾報隨業生故二佛知眾生不能自知真空故悲以隨化偈云隨解取眾相顛倒不如實故三隨化即空不異眾生空故二不相乖偈云寂滅多聞之境故四融上諸義良以攬空為眾生生與非生唯一味故不增不減經云即此法身流轉五道名曰眾生法身即眾生眾生即法身法身眾生義一名異以斯義故佛見眾生舉體自盡本是法身不須更化大智現前見於法身隨緣即眾生故大悲攝化今以寂滅非無之眾生恒不異真而成立故是不動真際無化而化以隨緣非有之法身恒不異事而顯現故不壞假名化即無化所化既空有不二能化亦悲智不殊一佛見下初一空不礙化答二佛知下智不礙悲答三隨化下化不違空答四融上等者即總攝上三共為一致也然前三中初後即性相交徹中一乃悲智雙運故今融成悲智性相皆無障礙就文更三初明所化性相無礙即前第一意以斯義下二躡前初意以辯能化即前第二意悲智無礙悲對前事智對前理今以寂滅下三更融前能所兼具前第三意方成一味初融所化性相無礙以成能化無化而化即前第一意以隨緣下二融其能化成前第三化不失空所化既空下對於所化成前第二能化悲智無礙之義不礙有而觀空方能入理不動真而隨化方能究竟化他眾生不知此理故流轉無窮今令眾生悟如斯法是則真實隨化非直十隨不違空理亦由此十方契真空故淨名云當為眾生說如斯法是即真實慈也不礙有而觀空下第二結釋於中有五一既云不礙有而觀空方能入理結成問意則前以空難隨化非得意也二既云不動真而隨化結成答意三眾生下結成化意四非直下正結無違非但無違兼能相成五故淨名下引證但證為眾生說如斯法即觀眾生品維摩詰問文殊師利云云何觀於眾生文殊答言我觀眾生如第五大如第六陰如第七情如十三入等意明畢竟空故次淨名問云若爾云何行慈答曰當為眾生說如斯法是即名為真實慈也然上云寂滅非無之眾生者體雖寂滅不無眾生之相由寂滅故恒不異真由非無故而恒成立是故不動真際等者即智論意謂不動真際而建立諸法不壞假名而說實相此是樂寂滅多聞者境界我為仁宣說仁今應諦受十頌分二初一舉法勸聽上半以人顯法已含答意上句體深下句用廣即聞之寂則聞無所聞故無眾生大經亦云若知如來常不說法是名具足多聞即寂多聞則善解藥病不礙隨化下二句許說勸聽大經亦云下即二十六經教體中已辯分別觀內身此中誰是我若能如是解彼達我有無分別後九頌別答前問文勢多含略為二釋一者一一別答謂初三答隨身次一隨命三一頌答隨觀察四一頌答隨行及方便五一頌答隨心樂及解六一頌答隨言論七一頌答隨思惟時通此九二謂依前五隨答後四隨亦時通於九今依此消文文分為六初三頌教依隨何身時隨其心樂修其方便思惟觀察此四徧於五𫨻二有一頌依命時三二頌依行時四一頌依解時五一頌依言論時六一頌教離二取通結上文今初三頌若著我時作界分別觀分別觀身皆無我故若愛染身時作念處觀觀於內身及心法故緫相而言即二空觀初一我空次一法空後一類通一切總相而言者謂界分別及四念處皆明二空故便以二空科判經文我空下即界分別觀謂十八界等中求我不得故今初上半即尋思觀觀於內身四大五蘊若即若離尋求主者不可得故下半觀益如實知於假我則有計實我無上半尋思觀者斯為方便即顯下半是如實觀此身假安立住處無方所諦了是身者於中無所著次偈觀身實相法無我觀上半諦了身空謂攬緣假立來無所從故本無住處緣盡謝滅去無所至無停積處虛假似立實無所住下半觀益謂攬緣假立者此釋初句來無所從下釋次句虗假似立下雙結二句於身善觀察一切皆明見知法皆虛妄不起心分別後偈類通以身觀身既明見自身二我皆空則知萬法皆是虛妄此觀亦寂故不起心以身觀身者即借老子之言彼云以身觀身以家觀家以國觀國以天下觀天下此觀亦寂者此釋不起心分別言此句有二意一既物我皆虗故不分別物我皆異此意則淺故畧不出今明知空之心即是此觀二我既寂觀何由生若觀不忘非是空矣則空病亦空能所雙寂矣若作念處釋者內身揀於外器及他身故念處有二一通二別通則身等皆無我等別則觀法無我今是通也復有二種一小二大此中是大觀身性相同虛空故空無二我誰是我言已兼二我次偈觀受不在內外中間故無方所後偈觀心及法不得善法及不善法故云知法虛妄心如幻故不起分別內身下然四地中有於三身智論瑜伽各有解釋今即瑜伽意一以自身為內身二以外器衣車乘等為外身三以外有情妻子男女等為內外身故今揀於後二念處有一下釋此中誰是我句謂有問言凖念處觀觀身不淨觀受是苦觀心無常觀法無我今何觀身為無我耶故今答云有通有別上以別難今約通說故於觀身得作無我及苦無常不淨之觀今但舉無我耳後有二種下通釋一偈以為通妨謂有問言下既別觀受及心法法應無我何無不淨苦等觀耶故今答云約大說故然大乘中具有二觀謂約世諦先觀身等為不淨等約第一義別觀身等同虗空等今約大小對辯則不淨等唯屬小乘觀身性相同虗空等唯屬於大誰是我下上約界分別觀釋誰是我但遣人我次第二偈方遣法我今約大乘念處故兼二我謂於四大五蘊求其主宰了不可得但蘊等合則人無我觀蘊等相緣成故空則法無我又別則身受不同通則受等皆身是故三偈皆致身言久別母身受不同下此亦通妨謂有問言大小二觀皆觀身受心法今何三偈皆有身言故此通以身受心法但合五蘊五蘊皆身亦猶淨名方便品云是身如聚沫不可撮摩是身如泡不得久立是身如燄從渴愛生是身如芭蕉中無有堅是身如幻從顛倒起此則如次喻於五蘊皆名為身若別說者應言色知聚沫受如水上泡想如熱時燄諸行如芭蕉諸識猶如幻今皆言身明知四處皆得稱身故云通則受等皆身前問意云眾生既空云何如來隨其身化今釋意云以彼不知身本空寂教如是觀故說如來隨眾生身而教化也下皆準之壽命因誰起復因誰退滅猶如旋火輪初後不可知二一頌令於壽命思惟觀察命謂命根能令色心連持故名為命壽謂壽限即命根體實謂由業種力引一期報眾同分體住時分限假立壽命命謂下先釋壽命二字先依小乘即俱舍根品偈云可根體即壽能持燸及識論引對法云云何命根謂三界壽謂有別法能持燸識說名命根此有三法壽為能持故名為體䟽云色心色即是燸燸必依色實謂由下約大乘釋印唯識第一廣破小乘離色心外別有命根竟示正義云然依親生此識種子由業所引功能差別住時决定假立命根而䟽云引眾同分體者通大小乘不乘是假小乘是實故俱舍云依同分及命令心等相續又云同分有情等同謂身形等同互相似故分者因義謂由此分能令有情身形等同言有情者同分所依揀非情也等者揀於不等正顯能依同分義也論云別有實物名為同分彼言眾同分者眾多同分故唯識廣破竟示正義云然依有情身心相似分位差別假立同分即大乘義具如䟽文從業緣起起即無起業盡便滅滅無所滅本無主者況剎那生滅實無自性從業緣起下二通顯上半先以因緣門釋後况剎那下以生滅門釋喻以火輪謂旋火速轉不見始終生滅遄流寧知本際又薪火不續識鈍謂輪命實遷流妄謂相續又輪資火有命假心明待他而成固無自體喻以火輪下釋偈下半䟽有三意初二皆喻上生滅門而初就所知二就能知第二意喻上因緣門然上法說因果對明今合喻中能所對說命為能依心為所依依心假立故是因緣故生公云如杖薪之火旋之成輪輪必資火而成照有情亦如之必資心而成用也以彼情依於心類此命依於心智者能觀察一切有無常諸法空無我永離一切相三二偈令依行時思惟觀察成四種觀一無常觀二空觀三無我觀四無相觀於中初偈略標其四一切有者二有也亦一切有為然無常等經論異說今且依辨中邊論以三性釋之初約徧計名無性無常以性常無故約依他起名生滅無常有起盡故約圓成實名垢淨無常位轉變故空亦有三一無性空性非有故二異性空與妄所執自性異故三自性空二空所顯為自性故無我亦三一無相無我我相無故二異相無我與妄所執我相異故三自相無我無我所顯為自相故無相亦三一相都無故二相無實故三無妄相故然無常者淨名諸經皆說下第三住當廣示之今依中邊盖是一義即第二論彼論具有無常苦空無我論云無常三者一無性無常謂徧計所執此常無故二生滅無常謂依他起有起盡故三垢淨無常謂圓成實位轉變故苦三種者一所取苦謂徧計所執是補特伽羅我執所取故二事相苦謂依他起三苦相故三和合苦謂圓成實苦相合故空有三者一無性空謂徧計所執此無理趣可說為有由此非有說為空故二異性空謂依他起以妄所執不如實有非一切種性今無故三自性空謂圓成實二空所顯為自性故無我三者一無相無我謂徧計所執此相本無故名無相即此無相說為無我二異相無我謂依他起此相雖有而不如彼徧計所執故名異相即此異相說為無我三自相無我謂圓成實無我所顯以為自相即此自相說為無我彼論結云如是所說無常苦空無我四種如其次第依根本真實各分三種釋曰根本真實者上論云謂三自性所以名真實者偈云許於三自性唯一常非有一有而非真一有無真實釋曰彼論具釋如其次第一常非有即是徧計一有非真即是依他一有無真實即是圓成釋此句云唯圓成實亦有非有唯有非有於此性中許為真實釋曰論意云具有具無有此非有故為真實其無字屬上非是無真實也意明二性皆依於此真實上立今經無苦而有無相䟽依三無我開三無相故彼論釋無我之中皆有無相又亦依此三種無相對於三苦以論對䟽廣略可知然皆融攝則此宗意而偈正意多約前二性辨眾報隨業生如夢不真實念念常滅壞如前後亦爾後一偈略顯二觀上半明空觀報從業生如夢從思起不實故空下半明無常觀由上不實故念念無常前即過去已滅事顯例後現未當滅不殊世間所見法但以心為主隨解取眾相顛倒不如實四一偈依解令入唯識量觀境即心變故心為主然此唯識略有二分一相二見今隨其見分之解取其相分之相心外取故為顛倒也然此唯識者以唯識第二四師不同謂安慧唯立一自證分難陀立二謂相見二分陳那立三加自證分變法立四於前三上加證自證分依彼論宗即以四分而為正義故今䟽云畧有二分以諸經論及彼論文多說二故謂離二取等而論文有三初明立二二明立三三明立四而安慧一分於二分中破之傍出初立二分論云然有漏識自體生時皆似所緣能緣相現彼相應法應知亦爾似所緣相說名相分似能緣相說名見分釋曰謂依他二分似徧計所執二分又以小乘相分名行相能取所緣故見分名事是心心所自體相故今似心外之境名似所緣是心外法此中無故所變相分為所緣耳若明相分未是顛倒向心外取方為倒耳又言見者是能緣境義通心心所非推求義推求義者唯慧能故次破安慧唯立自證分論云若心心所無所緣相應不能緣自所緣境釋曰謂緣色之心應不能緣色論云或應一一能緣一切釋曰謂隨一識等能緣一切境以眼識無所緣而能緣於色餘識無色緣亦應能緣色既餘不能緣一切明知無所緣者是義不然此中正義緣自境時心上必有帶境之相如鏡上靣似靣相生次破無能緣論云若心心所無能緣相應不能緣如虛空等釋曰同於虛空不能緣故論云或虛空等亦是能緣釋曰此反難也謂心心所法無能緣而能緣所緣此虛空等無能緣亦應緣所緣論云故心心所必有二相如契經說一切唯有覺所覺義皆無能覺所覺分各自然而轉釋曰此即厚嚴經上半明無外境下半明有見相二分各各自從因緣所生名自然而轉下結正義論云達無離識所緣境者則所變相分是所緣見分名自行相相見所依自體名事即目證分釋曰此中雖是立二分家義已有三故次論云若無此者應不自憶心心所法如不曾更境必不能憶故釋曰此明有自證分意云相離於見無別自體但二功能故應別有一所依體若無自證應不自憶心心所法如不曾更境必不能憶謂如見分不更相分之境則不能憶要曾更之方能憶之若無自證已滅心所則不能憶以曾不為自證緣故則如見分不曾更境今能憶之明先有自證已曾緣故如於見分憶曾更境故次下立三分論云然心心所一一生時以理推微各有三分所量能量量果別故相見必有所依體故釋曰所量是相分能量是見分量果是自證分自證分與相見為所依故如集量論伽陀中說似境相所量一能取相二自證三即能量及果此三體無別釋曰所量如絹能量如尺量果如解數智果是何義成滿因義言無別體者同一識故則離心無境次立四分論云又心心所若細分別應有四分三分如前第四證自證分若無此者誰證第三心分既同應皆證故釋曰見分是心分須有自證分自證是心分應有第四證論云又自證分應無有果諸能量者皆有果故釋曰見分是能量須有自證果自證量見分須有第四果恐彼救云却用見分為第三果故次論云不應見分是第三果見分或時非量攝故由此見分不證第三證自體者必現量故釋曰意明見分通於三量三量者謂現量比量非量即明見緣相時或量非量不可非量法為現量果或見緣相是於比量及緣自證復是現量故自證是心體得與比量非量而為果見分非心體不得與自證而為其量果故不得見分證於第三證自體者必現量故第三四分既是現量故得相證無無窮失矣意云若以見分為能量但用三分亦得足矣若以見分為所量必須第四為其量果若通作喻者絹如所量尺如能量智為量果即自證分若尺為所使智為能使何物用智即是於人如證自證分人能用智智能使人故能更證亦如明鏡鏡像為相鏡明為見鏡面如自證鏡背如證自證靣依於背背復依靣故得互證亦可以銅為證自證鏡依於銅銅依於鏡此上四分即護法之後方有此義論如是四分或攝為三第四攝入自證分故果體一故論或攝為二後三俱是能緣性故攝論為二亦攝入見故論或攝為一體無別故如入楞伽伽陀中說由自心執著心似外境轉彼所見非有是故說唯心如是處處說唯一心此一心言亦攝心所故識行相即是了別了別即是識之見分釋曰此上論文釋偈了字雖開合不同今但畧舉相見二分故彼論初便立二分處處多說相及見故若了相分唯心所變此非顛倒謂相為外心外取故是名顛倒故上釋云依他二分似於徧計相見二分今約徧計故成顛倒上之四分文則似橫法相之要故畧引耳世間所言論一切是分別未曾有一法得入於法性五一偈依言論時令尋伺名等入如實觀謂了名等唯意言分別無別名等意即意識分別言即名言名言既唯意之分別名下之義亦無別體故所言論以兼名義令尋伺名等者此借唯識加行位中四尋伺觀四如實觀以解經文四尋伺者一名二義三自性四差別今云名等等取下三謂了名等下即以意言釋尋伺觀於中有三今初總釋意即意識下即引攝論第七釋意之相論云意謂意識覺觀思惟但緣名言分別無別有義可緣又必依名分別諸法故云意言分別三名言下會論釋經顯四尋伺相名詮自性句詮差別名句皆名自性差別皆義故但云名義既隨分別則妄計意流尚未了唯心安入法性既隨分別下二釋下半未曾有一法得入於法性此句牒上攝論及經一切是分別言故云既隨分別妄計意流者即引楞伽釋成彼經第三因說破外道所說皆是世論未後婆羅門問言癡愛業因故有三有耶為無因耶我時報言此二亦是是世論彼復問言一切法皆入自相共相耶我復報言此二亦是世論婆羅門乃至意流妄計外塵皆是世論故云妄計意流尚未了唯心者上躡前分別之義為不入法性之由此下舉况釋不入義然其要觀畧有二種一唯心識觀二真如實觀唯心觀淺尚未能了真如觀妙彼安能入法性即是真如異名若能如是自覺通達是入唯識之方便也即復此心無相可得妄想不生便入法性若能如是下上來順釋經文不入之義今此反顯能入之義即如實觀於中先入唯心識觀言自覺者對上楞伽楞伽云彼婆羅門又問頗有非世論不佛答云有外道不能知以於外性不實妄想虛偽計著故謂妄想不生覺了有無自心現量妄想不生不受外塵妄想永息是名非世論此是我法非汝有也今言自覺畧其大意令覺自心耳其通達之言即攝論意通達唯是意言分別無有實法即為入唯識方便不取外相即入唯心即復此心下引起信論成真如實觀故彼論云心若馳散即當攝來令住正念其正念者當知唯心無外境界釋曰此即唯心識觀次云即復此心亦無自相念念不可得釋曰此即真如實觀妄想不生亦楞伽經已如前引便入法性結成上義上約心乖體非不即又不入者妄想體虛無可入故上約心乖等者通難重釋謂有難言如淨名等一切皆如文字性離即是解脫下經亦云一切法皆如諸佛境亦然三毒四倒皆亦清淨如何言說不入法性今通有二一約修人心不入理非約法體不即法性二約所觀亦無可入故下文云如來深境界其量等虛空一切眾生入而實無所入能緣所緣力種種法出生速滅不暫停念念悉如是六一偈通結亦近結次前二偈能緣所緣即見相也又觀一切法唯是意言未能除遣此境亦為能所也以此為方便得入唯心種種法出生者此相見二分由無始數習有種種法相似生謂能緣心生則種種境生所緣境起則種種心起起法必滅安得暫停六有一偈通結五叚令離能所亦可近結前二偈者能所相顯初明前偈又觀一切下明結後偈以意言觀縱成如實亦有能所云未除遣加行偈云現前立少物謂是唯識性以有所得故非實住唯識故但為方便得通達位方入唯心此相見二分等者即唯識意而言似者顯其無真但似二相若執有實便成徧計起法必滅下釋下半然躡上半起上既心境相藉則皆從緣生生法必滅一向絕故剎那不住故云安得暫停若了相無相生無有生名了種種則了唯心若了無性心境兩亡則住無分別自覺智境不動法界名入法性若了相下正顯偈意上順釋偈文明二取之失今令了之則令離二取是經之意是則反釋經文而順經意則了唯心成唯心識觀若了無性下成真如實觀心境兩亡則住無分別如上所引通達位偈云若時於所緣智都無所得爾時住唯識離二取相故自覺智境即楞伽意不動法界即大般若意文殊室利分云繫緣法界一念法界不動法界知真法界不應動搖謂若言我入法界已動法界能所兩亡入相斯寂故不動法界是入法性故末後偈結上諸觀令亡觀相也故末後下總出此偈意通明結前佛如是化應如是知幻人化幻皆無化化也佛如是化下總顯答意音釋詰欺吉切蹔昨濫切不久也燸乃菅切遄純圓切歠平聲
