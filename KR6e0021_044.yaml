body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述賢首品第十二初來意者夫行不虛設必有其德既解行圓妙必勝德難思收前行願成信德用故次來也又前智首舉果徵因文殊廣顯其因略標其果云獲一切勝妙功德故問賢首今廣斯言是以偈初躡前起後夫行不虛設者此有二來意初對前行以成今德後又前智首下廣前所成之德故次來也二釋名者謂體性至順調善曰賢吉祥勝德超絶名首即以此名菩薩演説此法賢即是首賢首之品以當賢位之初攝諸德故偏舉賢名三宗趣者於信門中成普賢行德而自在莊嚴無方大用建立衆生通貫始終該攝諸位以為其宗令起圓融信行成位德用而為意趣令起圓融等者天台智者依此一品立圓頓止觀止觀第一云此菩薩聞圓法起圓信直圓行住圓位以圓功德而自莊嚴以圓力用建立衆生今宗即圓法意趣有五一信即起圓信二行三位四德五用皆以上圓融貫之彼釋聞法云謂聞生死即法身煩惱即般若結業即解脫雖有三名而無三體雖是一體而立三名是三即一相其實無有異法身究竟般若解脫亦究竟般若清淨餘亦清淨解脫自在餘亦自在聞一切法亦復如是是名聞圓法云何起圓信信一切法即空即假即中無一二三而一二三無一二三是遮一二三而一二三是照一二三無遮無照直入中道皆究竟清淨自在聞深不怖聞廣不疑聞非深非廣意而有勇是名圓信云何行圓行一向專求無上菩提不餘趣向三諦圓修不為無邊所寂不為有邊所動不動不寂直入中道是名圓行其位德用之圓全引今經若自取當經聞圓即聞上同時具足等十種玄門及依正無礙等依此起信即是圓信其圓行等並廣如前説今此一品多廣圓德用耳爾時文殊師利菩薩説無濁亂清淨行大功德已欲顯示菩提心功德故以偈問賢首菩薩曰四釋文者文有三分初文殊發起次賢首廣説三十方現證今初分二初經家敘述二正明發起二𫨻各有結前生後今初先結前已説順違皆順客塵不能濁其心悲智雙遊萬境不能亂其慮是曰清淨行矣大功德者即前所成之果後欲顯示下生後文含始終約終則顯示信滿菩提心殊勝功德廣具五位因行盡故約始但於生死誓證菩提萬德攸依故今顯示我今已為諸菩薩説佛性修清淨行仁亦當於此會中演暢修行勝功德二偈正發起中前半結前偈文窄故略無所成之德後半勸説令説修行之德則與長行文有影略則與長行等者長行起後但起發心偈中起後但起修行故二處起後互為影略就結前中長行有大功德無佛往修偈有往修復闕功德亦是影略爾時賢首菩薩以偈答曰第二時賢首下賢首廣説於中先總標舉以偈答者此略有二一少言攝多義故二美詞讚説令淨信故以始德該終散説難盡故顯此勝妙之功德故善哉仁者應諦聽彼諸功德不可量我今隨力説少分猶如大海一滴水第二正顯偈詞有三百五十九頌半大為三分初四頌謙讚許説分次三百四十六偈半正説勝德分三九偈校量勸持分初中分二初偈總明前半讚問勸𥊸後半謙己少説海喻次下當明若有菩薩初發心誓求當證佛菩提彼之功德無邊際不可稱量無與等何況無量無邊劫具修地度諸功德十方一切諸如來悉共稱揚不能盡如是無邊大功德我今於中説少分譬如鳥足所履空亦如大地一微塵後三開章以發心之德況出修行巧顯深廣於中初偈舉發心章次偈況出修行章初心祈於當證德已叵量況長時入位遍修故多佛不能盡説後偈許説分齊前半法説如是者雙指發心修行下文具顯故前文雙問故後半喻明然有二意一顯喻少分謂發心行德如太空大地所説者狹如足履一塵二密喻不異謂鳥足之空不異太空微細之塵不殊大地故比略説義無不周若廣若略皆無邊故出現品云如鳥飛虗空經於百年已經過處未經過處皆不可量何以故虛空無邊際故等彼就果行此就因德然普賢行德似同佛果是故皆以虛空為量上下文中皆同此説後三開章下此𫨻有二先正釋經文此初發心與下文十住初發心住及發心功德品各何別耶此中發心該於初後取其成德乃是信終取其為本乃在初發雖如輕毛功歸初簣故十住初發即是此終成彼初發此終能為發彼是所發此正是發起之發義兼開發彼是開發之發義兼發起其發心品正顯十住初心之功德耳以斯甄別非無有異故瓔珞云發心住者是人始從具縛未識三寶乃至值佛菩薩教法中起一念信便發菩提心既云始從凡夫最初發心明知此中發心該於初後以斯甄別者此中異下二處之文故纓絡云下證成發心通始義也彼經第二初釋經義云佛子發心住者是人始從具縛凡夫未識三寶聖人未識好惡因之與果一切不識不解不知佛子從不知始於凡夫地值佛菩薩教法之中起一念信便發菩提心是人爾時住前名信相菩薩亦名假名字菩薩其人略行十心所謂信心進心念心定心慧心戒心回向心護法心捨心願心又云佛子發心住是上進分善根人若一劫二劫乃至一恆二恆佛所行十信心信三寶常住等明知此中發心該於初後者具縛未識初發為始而一劫二劫修行方得初住住前但名信相菩薩居然通始終也問此既是初何得乃具後諸行位及普賢德耶古德釋此略有二門一行布次第門謂從微至著從淺至深次第相乘以階彼岸如瓔珞仁王起信瑜伽等説二圓融通攝門謂一位即具一切位等如此經所説亦如大品等中一行具一切行此中有二門一緣起相由門二法界融攝門前中普攬一切始終諸位無邊行海同一緣起為普賢行德良以諸緣相望略有二義一約用由相待故有有力無力義是故得相收及相入也二約體由相作故有有體無體義是故得相即及相入是也此經之中依斯義故行位相收總有四説一或始具終如此門中具一切行位普賢德海者是也二或終具始並在十地位後如下文十定十通等説三或諸位齊收並在十住等一一位中各收一切悉至究竟如下文十住十行等説四或諸位皆泯行德顯然如離世間品説二法界融攝門者謂此諸位及所修行皆不離普賢無盡法界然此法界圓融無限隨在一位即具一切今在信門收無不盡下諸位中皆具一切者並準此釋如下文十定十通等説者定通二品義該始終故等者等取十忍下經十忍之中有音聲順忍等謂約五忍明義七八九地得於無生已過信順況於等覺今明等覺有音聲等故是攝初十住十行等説者謂位位滿處皆成佛故一住若不𭣣諸住云何説得位滿成佛故十住後有灌頂住海幢灌頂之後便説佛故如離世間品説者離世間品具二千行法如次配於住行而不存其位名但有與位相應之行故問下發心功德品亦説初心具無邊德與此何別答此據行首信門所具彼約行本菩提心具問約法相收是則可爾約人修行豈十千劫修信才滿即得如此無邊德海答以法是圓融具德法故若諸菩薩行此法行是彼所收或無量劫或無定限十千劫言非此所説如下善財童子及兜率天子等所行所得並是其人不同行布次第教中之所説也又十千劫乃是一經瓔珞但言一劫二劫此經縱有行布亦皆圓融又十千劫乃是一經是即仁王經此經縱有行布下三通伏難謂有難言如上所説既有行布此與諸經復云何異故今答云行布乃是圓融之行布耳亦有引此下文證成此信乃是捨異生性成就聖性出無明地生如來家以有則獲灌頂而升位等非是信故若爾初地豈得灌頂升位等耶若云展轉進入佛地何以不得始自於信展轉入耶若許從信展轉入者何以要判此乃捨凡入聖下文自有十地之會此中尚隔住行向等判為入地乃孟浪之談下發心品亦判為初地發心義同此會亦有引此下第二傍序異説即安國法師於中有三初正立意明此中發心是初地證發心非信成就發心以其作用殊勝非地前故以有則獲灌頂而升位等下引文證成而言等者彼有十義以證此中非信成就謂一以説斷除疑網出愛流便得堅固不壞心故以若未入聖何以度疑若是凡夫何能不壞入見諦者乃能度疑信不壞故二若未入地不應得有常持戒故三不應云生如來家故四凡夫不得身語意業常無失故五不應則獲功德法性身故六不應云則獲十地十自在故七不應則獲灌頂而升位故八不應云則身充遍於虛空故九何以菩薩具智慧故十信大乘者猶為易能信此法倍更難故豈有凡法難於聖法故知此品正教捨凡展轉乃至進入佛地今疏文中略引彼證故致等言是其一意若爾已下辨非文有五𫨻初正以其所引難其所立但難其一餘九例知謂既十地中方得灌頂縱是初地豈得灌頂若云展轉下二順設彼救反以成立若許從信下三假縱彼救結破彼立下文自有下四廣引文證顯彼立非孟浪者出莊子已見華藏品下發心品下五例破後文所立非理以彼下文亦判彼品為初地發心故此既不立彼居然非問下云無量億劫勤修學得是無上菩提智斯則非一生也亦非十千以為無量通斯難者應有二義一此約行布展轉義故二約圓融展促無礙故如上所辨故善財見仙人執手一一佛所經無量劫故修短難思特由於此故賢首菩薩云信大乘者猶為易能信此法倍更難以初心即具一切功德故難信也問下云下第三引妨會宗於中有二先問即此品文安國堅執屬證發心經多劫故非是初心一生故也亦非十千以為無量遮救自義況有救云無量即十千故菩薩發意求菩提非是無因無有緣於佛法僧生淨信以是而生廣大心第二菩薩發意下正明發心修行勝德文分為五初五頌發心行相二信為道元下略示勝能三若常信奉下所具行位四或有剎土下無方大用五一切如來下喻況玄旨然此五𫨻初一顯正發心後四發心之德第三亦兼修行此及後二皆修行之德第三亦兼修行者以所具行位行即修行故位即亦是修行之德故云此及後二皆修行之德今初發心行相中初偈總標餘文別顯瑜伽菩薩地明發心有五種相一自性二行相三所緣四功德五最勝今文五偈具之謂發意即是正願為發心自性也希求菩提及下作有情義利即行相也菩提三寶有情皆有所緣能攝一切菩提分法為其功德不求五欲等反顯菩薩所求最勝瑜伽等者疏文有二先釋科文行相之言便引瑜伽明具五義而行相為總故為科目言因緣者謂親能發起求大菩提曰因假之助發為緣因即自性住性內熏之力緣即習所成性又上二皆因善友及境外熏為緣瑜伽云由有四因四緣四力菩薩發心四因者一種性具足二賴佛菩薩善友攝受三多起悲心四長時猛利難行苦行無所怯畏四緣者一見聞佛神變威力二聞法微妙三見法欲滅四見生受惑業苦四力者一自力二他力三因力以宿習故四加行力謂於現法親善聞法修善加行故若具上因緣及初三二力當知不退若因二四力心不堅固今經即初及三也又起信論智印經有七因緣如彼應知下別顯中以三因四緣攝上諸義三因者謂信悲智四緣者三寶衆生初中因緣之外更加四力緣謂見聞境界因謂內心發起力謂有所幹能然即前四因正望發心以明力用自力即從種性因發他力即是善友所攝因力即是多起悲心加行力即長時苦行又四力成就即名為因親能發故今經即初及三者文中無人勸故不言因加行故又起信下論云信成就發心者依何等人修何等行得信成就堪能發心所謂依不定聚衆生有熏習善根力故信業果報能起十善猒生死苦欲求無上菩提得值諸佛親承供養修行信心經一萬劫信心成就故諸佛菩薩教令發心或大悲故能自發心或因正法欲滅以護法因緣故能自發心如是信心成就得發心者入正定聚畢竟不退名住如來種中正因相應若有衆生善根微少等未經萬劫於中遇緣亦有發心所謂或見佛色相而發其心一或因供養衆僧而發其心二或因二乘之人教令發心三或學他發心四如是等發心者悉皆不定遇惡因緣或便退失墮二乘地智印經中亦同此今文中後半總以信智因緣三寶境信謂於實德能深忍樂欲心淨為性故云淨信然實謂一切事理德謂三寶淨德能謂世出世善有其力能今法寶中已攝初後亦三寶中皆具此三體實具德大用救生故大者智心求大菩提廣者悲心廣濟含識翻彼二乘小狹心也信謂於實德等者唯識第六云云何為信於實德能深忍樂欲心淨為性對治不信樂善為業此總明界然信差別略有三種一信有實謂於諸法實事理中深信忍故二信有德謂於三寶真淨德中深信樂故三信有能謂於一切世出世善深信有力能得能成起希望故釋曰實德能三即信依處忍樂欲三如次配之言能得能成者信己及他今得後成又無為得有為成故論云由斯對治彼不信心愛樂證修世出世善釋曰上釋信業下欲揀別故又問答論云忍謂勝解此即信因樂欲謂欲即是信果確陳此信自相是何問也豈不適言心淨為性此猶未了彼心淨言若淨即心應非心所若令心淨慚等何別心俱淨法為難亦然釋曰此中三難初持業釋次依主釋後鄰近釋言為難亦然者同前慙等何別亦是心王俱時法故論曰此性澄清能淨心等以心勝故立心淨名如水清珠能清濁水慙等雖善非淨為相此淨為相無濫彼失又諸染法各別有相唯有不信自相渾濁復能混濁餘心心所如極穢物自穢穢他信正翻彼故淨為相也正義竟有説信者愛樂為相應通三性體應即欲又應苦集非信所緣此破小乘上座郭也有執信者隨順為相應通三性即勝解欲若印順者即勝解故若樂順者即是欲故離彼二體無順相故此破大乘發師由此應知心淨是信結也然今疏文略引標釋義已周備今法寶下以論配經復有二意一者別配謂法有事理即是初實也法有理行即出世善等故是後能故云今法寶中已攝初後亦三寶中皆具此三者義以前三通於三寶如文可知次大者下釋下句也不求五欲及王位富饒自樂大名稱別中初半偈揀去偏偽謂攝眷屬過所不能染故文中不求五事求即過故一若求人天五欲此能長貪多是鬼因二求王位長瞋多地獄因三求富饒長癡是畜生因實通三塗各從多説四求自樂是二乘因五求大名稱若勝負心是修羅因若我慢心是外道因又以理求樂是人天因為王攝屬是魔羅因有二乘心目之為偏有餘心者名之為偽初半偈揀去偏偈者即天台止觀中意然有二文一當第五卷明十法成乘中有真正發菩提心故云揀去偏偈故下疏云有二乘心者目之為偏等二者第一卷中明有五略謂發大心修大行感大果裂大網歸大處今即第一發大心中文然彼復分為三初方言次揀非後顯是方言易了今將不求一行當彼揀非也餘文即當顯是今初彼文云道亦有通有別今亦揀之略為其十若心念念專貪嗔癡攝之不還之不出日增月甚起上品十惡如五扇提羅者此發地獄心行火途道一若其心念念欲多眷屬知海吞流如火焚薪起中諦十惡如調達誘衆者此發畜生心行血塗道二若其心念念欲得名聞四遠八方稱揚歎詠內無實德虛比賢聖起下品十惡如摩揵提者此發鬼心行刀塗道三若其心念念欲勝於彼不耐下人輕他珍己如鵄高飛下視人物而外揚仁義禮智信起下品善心行阿修羅道四若其心念念欣世間樂安其臭身恱其癡心此起中品善心行於人道五若其心念念知三惡苦多人間苦樂相間天上純樂為天上樂閉六根不出六塵不入此起上品善心行於天道六若其心念念欲大威勢身口意業才有所作一切弭從此發欲界主心行磨羅道七若其心念念欲得利智辨聰高才勇哲鑒達六合十方顒顒此發勝智心行尼揵道八若其心念念五塵六欲外樂蓋微三禪之樂由如石泉其樂內熏此發梵心行色無色道九若其心念念知善惡輪環凡夫耽湎賢聖所訶破惡由淨慧淨慧由淨禪淨禪由淨戒尚此三法如飢如渴此發無漏心行二乘道十若心若道其非甚多略舉十耳結今疏欲具此十非故於經文委曲而取耳疏文中分二先總明即瑜伽意後文中不求五事下正釋經文配成十非然不必全爾故致多言以隨一煩惱有三塗因故又但取意略明但尋上引疏文居然易了但人天因含其三界一人二欲天三上二界餘文可知有二乘下結成即前九為偽後一為偏也但為永滅衆生苦利益世間而發心常欲利樂諸衆生莊嚴國土供養佛受持正法修諸智證菩提故而發心深心信解常清淨恭敬尊重一切佛於法及僧亦如是至誠供養而發心深信於佛及佛法亦信佛子所行道及信無上大菩提菩薩以是初發心後三偈半直顯真正別釋因緣於中初偈悲因下救嚴土供佛亦為調生故滅苦是悲利樂是慈次一偈半大智上供上二不二為真正發心後偈總結成信兼信因行其中對上四因四緣可以意得其中對上等者深心信解及深信諸佛及佛法即第一種性具足因恭敬尊重一切佛即第二賴佛菩薩攝受因以恭敬故但為永滅衆生苦即第三多起悲心也常欲利樂諸衆生莊嚴國土供養佛即第四長時猛利難行苦行也四因具矣言四緣者恭敬尊重一切佛者以見聞神變威力故即第一緣受持正法修諸智者以聞法微妙故即第二緣又受持正法者見法欲滅故即第三緣但為永滅衆生苦者即見生受惑業苦是第四緣見苦即緣長悲即因故雖一文因緣具足此中四力不具故不會之又上從不求五欲下即顯信心之德故瓔珞經云修十信心須具十德今文並具但不次耳一遭苦能忍即前反顯二正顯中初二句即慈悲深厚三次句及莊嚴國土即修習善根謂利他善及淨土因故四有三字即供養諸佛五受持一句志求勝法六證菩提故即求佛智慧七一句即深心平等八次二句即親近善友九次二句即心常柔和謂至誠供養柔和善順於佛法故十有二句即愛樂大乘十德備矣又上從不求五欲下重解經文以上來所釋參古德意此下一向新意不千舊解文自有五一約信德經文五偈應分為二初一偈標信發心後四偈彰信之德今文並具等者彼經次云一親近善友二供養諸佛三修習善根四者志求勝法五心常柔和六遭苦能忍七慈悲深厚八深心平等九愛樂大乘十求佛智慧四有三字者以供養佛字全同故又此十德即求菩提之意下經休舍云欲教化調伏一切衆生盡無餘故發菩提心等又此十德下二明菩提意而云發菩提心等者彼廣有文略舉十四廣結無邊今但舉一以等十三謂二欲承事供養一切諸佛悉無餘故發菩提心其悉無餘下八字一一皆有三欲嚴淨一切諸佛國土四欲護持一切諸佛正教五欲成滿一切如來誓願六欲往一切諸佛國土七欲入一切諸佛衆會八欲知一切諸佛世界中諸劫次第九欲知一切衆生心海十欲知一切衆生根海十一欲知一切衆生業海十二欲知一切衆生行海十三欲滅一切衆生煩惱海十四欲一切衆生煩惱習氣海悉無餘故發菩提心善男子以要言之菩薩以如是等百萬阿僧祗方便行故發菩提心善男子菩薩行普入一切法皆證得故普入一切剎悉嚴淨故是故善男子嚴淨一切世界盡我願乃盡一切衆生煩惱習氣盡我願乃滿釋曰上皆菩提心所為也對今經文可以意得又末後偈初句即自性住佛性以信心佛衆生無差別故方是真法可謂深信次句即引出佛性後句即至得果性又末後下三約佛性即隨難重顯種性具足三佛性義即佛性論第二卷第三顯體分三因品論云復次佛性體有三種三性所攝義應知三種者所謂三因三種佛性三因者一應得因二加行因三圓滿因初即二空所顯真如由此應得菩提心乃至道後法身故二加行因者謂菩提心由此心故得三十七品十度十地乃至道後法身三圓滿因者即加行因由此故得一切圓滿三種佛性者應得因中具有三性一住自性性二引出性三至得果性釋曰住自性者謂道前凡夫位引出性者從發心已上窮有學聖位至得果性者無學聖位又文有四弘可以意得又文有四弘等者四約四弘也文中不求五欲等即顯煩惱無邊誓願斷但為永滅衆生苦即衆生無邊誓願度受持正法修諸智即法門無盡誓願學證菩提故即佛道無上誓願成又上云深心信解常清淨者與理相應方曰深心若昔染今淨淨則有始始即必終非常淨也信煩惱即菩提方為常淨由稱本性而發心故本來是佛更無所進如在虛空退至何所慨衆生之迷此起同體大悲悼昔不知誓期當證有悲故不為無邊所寂有智故不為有邊所動不動不寂直入中道是謂真正發菩提心又上云等下五結歸真正先顯真正菩提心體有其三意初約三心菩提二約三觀三約四弘今初明大智心次慨衆生迷此下大悲心後悼昔不知下大願心即菩提心燈大悲為油大願為炷大智為光光照法界故上如次即直心大悲心深心也二約三觀者悲願為假觀前大智心中直明本性清淨即是空觀煩惱即菩提本來是佛即中道觀三約四弘者初通立理以是圓教四弘故稱性明之次信煩惱即菩提下別顯四弘初即煩惱無邊誓願斷二由稱本性而發心故下即佛道無上誓願成三慨衆生迷此下衆生無邊誓願度四悼昔不知下法門無盡誓願學此明四弘即指上四弘上但指文今將深心之言會通此四令圓妙耳有悲故下二正結歸謂上雖多義不出悲智故今結之即結上疏文及經耳故止觀第五明十法成乘中第二真正發菩提心云既深識不思議境一苦一切苦自悲昔苦起惑耽湎乃至云思惟彼我鯁痛自他即起大悲興兩誓願衆生無邊誓願度煩惱無邊誓願斷衆生雖如虛空誓度如空之衆生雖知煩惱無所有誓斷無所由之煩惱上二空觀雖知衆生甚多而度多多之衆生雖知煩惱無邊底而斷無邊底之煩惱暇稱雖知衆生如佛而度如佛之衆生雖知煩惱如實相而斷如實相之煩惱中觀何者若但苦因苦果此誓雜毒故須觀空若偏觀空則不見衆生可度是名著空者諸佛所不化若偏見衆生可度即墮愛見大悲非解脫道今則非毒非偽故名為真非空邊非有邊故名為正如鳥飛空終不住空雖不住空迹不可尋雖空而度雖度而空是故誓與虛空共鬪故名真正發菩提心釋曰此上釋須三觀所以又云又識不思議心一樂心一切樂心我及衆生昔雖求樂不知樂因如執瓦礫謂如意珠妄指螢光呼為日月今方始解故起大悲興兩誓願謂法門無盡誓願知無上佛道誓願成雖知法門永寂如空誓願修行永寂雖知菩提無所有無所有中吾故求之上即空觀雖知法門如空無所有而有誓願畫繪莊嚴虛空雖知佛道非成所成如空中種樹使得華果名假觀也雖知法門及佛果非修非不修非證得非不證得以無所證而證而得中觀是名非偽非毒名之為真非空非愛見名之為正如是慈悲誓願與不思議境智非前非後同時俱起慈悲即智慧智慧即慈悲無緣無念普覆一切任運苦自然與樂不同毒害不同但空不同愛見是名真正發菩提心釋曰但觀上所引之文疏文居然易了即撮其大意而為此疏顯經深玄然此經上下菩提心義文理淵博見其撮略故取而用之引而證之信為道元功德母長養一切諸善法斷除疑網出愛流開示涅槃無上道第二信為道元下七頌略示勝能於中初一頌總標次五頌別釋後一頌總結今初初句又標道有二義一果所謂菩提涅槃二因謂三賢十聖乘一直道元亦二義一本義菩提本故其猶滔滔之水始於濫觴二首義元者善之長也即一因之初功德二義通因及果母有二義生長養育下三句共釋初句長養即母二義亦道元義一切善法及第二句即因功德第三一句即果功德無上道者即大菩提由信長善得此菩提由信斷疑出愛成涅槃證不信身心如來知見豈能開示菩提涅槃一本義等者意以本義為果德元首義為因德元耳言元者善之長也即周易乾卦文言釋乾元亨利貞四德云元者善之長也亨若嘉之會也利者義之和也貞者事之幹也君子體仁足以長仁嘉會足以合禮利物足以和義貞固足以幹事君子行此四德者故曰乾元亨利貞今但用其一字義耳不信身心下反成上義知見相為菩提知見性為涅槃故法華論釋開佛知見為無上義謂雙開菩提涅槃信無垢濁心清淨滅除憍慢恭敬本亦為法藏第一財為清淨手受衆行信能惠施心無吝信能歡喜入佛法信能增長智功德信能必到如來地信令諸根淨明利信力堅固無能壞信能永滅煩惱本信能專向佛功德信於境界無所著遠離諸難得無難信能超出衆魔路示現無上解脫道信為功德不壞種信能生長菩提樹信能增益最勝智信能示現一切佛次信無垢濁下別顯中有二十句一句辨一勝能一心淨為性故能翻不信濁二信理普敬故翻憍慢三十藏之內信即是藏七聖財中信為第一四信手受取奉行五信財如夢故無所吝六智論云佛法大海信為能入七增福智因八到二嚴果九十五根五力各在初故十一信本無惑方斷惑根十二若向餘德不名淨信十三信境本空故無所著十四正信之人不生八難十五非不正信十六正信解脫十七成不壞本十八為菩提根十九增佛勝智二十究竟見佛謂信自己心自佛出現信外諸佛諸佛現前故下經云一切諸佛從信心起是故依行説次第信樂最勝甚難得譬如一切世間中而有隨意妙寶珠三是故下一偈總結勝能前法後喻信樂者信三寶性已於方便諸度求欲修行信樂二字是菩薩正意由此二故於諸行有能故名最勝非佛不信故云難得喻如意珠略有五義一勝義法寶中王故二希義非佛輪王餘無有故三淨義能清不信濁故四貴義出位行寶等不可盡故五蘊義蘊衆德物無障礙故喻如意珠等者取與信相應義耳若準寶性論寶有六義頌云真實一世希有二明淨三及勢力四能莊嚴世間五最上不變等六今此勝義攝真實最上二義餘四則同四即勢力五即莊嚴或無莊嚴加此蘊義然疏五義皆言含法喻思之可知若常信奉於諸佛則能持戒修學處若常持戒修學處則能具足諸功德戒能開發菩提本學是勤修功德地於戒及學常順行一切如來所稱美若常信奉於諸佛則能興集大供養若能興集大供養彼人信佛不思議第三若常信奉下五十頌半廣明信中所具行位然有二意一行布二圓融古約圓融故名信中所具於中三初明所具行次辨所具位三結歎功德今初八頌半分二先五頌明信三寶以成諸行後三頌半明信展轉以成諸行前中初三頌信佛成行初二句標章持戒惡止也修學處善行也瑜伽云既發心已應於七處修學故名學處謂一自利處二利他處三真實義處四威力處五成熟有情處六成熟自佛法處七無上正等菩提處次一偈半雙顯二德若不持戒尚不能得疥野干之身況於菩提戒止妄非則性淨菩提開發因果功德皆依學處而生故云地也尚不能得等者即薩遮尼揵子經第四後一偈別明成供養行謂財法供養故云大也若常信奉於尊法則聞佛法無厭足若聞佛法無厭足彼人信法不思議次一信法若常信奉清淨僧則得信心不退轉若得信心不退轉彼人信力無能動後一偈信僧文並可知若得信力無能動則得諸根淨明利若得諸根淨明利則能遠離惡知識若能遠離惡知識則得親近善知識若得親近善知識則能修習廣大善若能修習廣大善彼人成就大因力若人成就大因力則得殊勝決定解若得殊勝決定解則為諸佛所護念二有三頌半成展轉行展轉依前功歸於信若為諸佛所護念則能發起菩提心若能發起菩提心則能勤修佛功德若能勤修佛功德則得生在如來家若得生在如來家則善修行巧方便若善修行巧方便則得信樂心清淨若得信樂心清淨則得增上最勝心二若為諸佛下三十九頌明所具諸位於中成後四位即為四假初三頌明十住位有六句初句發心住次句治地修行二住次句生貴住次句方便具足住次句正心住後句增上是不退住最勝心是後三住準下釋之初明十住者下明諸位皆含義理並如本品後句增上等者由前正心但聞讚毀不動今聞無有利害更深而心不退故為增上餘當下文尋之然皆隱位名存其中行或合或開或略或廣不全次第者意明圓融信門即頓具故亦猶離世間品六位頓成為二千行位位頓修故若一向次第但得行布一分義耳若得增上最勝心則常修習波羅蜜若常修習波羅蜜則能具足摩訶衍若能具足摩訶衍則能如法供養佛若能如法供養佛則能念佛心不動若能念佛心不動則常覩見無量佛二若得增上下二頌半明十行位波羅蜜是十行總名摩訶衍是異二乘行初二行收如法供養是順理行次二行攝念佛心不動及常見佛並是定慧行故屬後六行釋相可知若常覩見無量佛則見如來體常住若見如來體常住則能知法永不滅若能知法永不滅則得辨才無障礙若得辨才無障礙則能開演無邊法若能開演無邊法則能慈愍度衆生若能慈愍度衆生則得堅固大悲心三若常覩見下三頌明十回向位通顯三種回向佛體常住是向菩提法永不滅是向實際餘向衆生若得堅固大悲心則能愛樂甚深法四若得堅固下三十頌半明十地位初半頌是初地謂深法是所證真如愛樂是極喜異名若能愛樂甚深法則能捨離有為過二半頌是離垢地以離犯戒有為過故若能捨離有為過則離憍慢及放逸若離憍慢及放逸則能兼利一切衆三一頌離慢等是三四二地以三地於禪不著故無慢又以求法不懈亦名離慢第四地得出世間道品故云無放逸然不捨攝生故云兼利若能兼利一切衆則處生死無疲厭若處生死無疲厭則能勇健無能勝四有一頌明五地謂雖得出世而還處生死故無厭真俗互違難合能合餘地不過故云勇健無能勝此是難勝之名也若能勇健無能勝則能發起大神通若能發起大神通則知一切衆生行五有一頌明第六地悲智不住般若現前謂神通攝物是大悲行知衆生行是十二緣生是大智行若知一切衆生行則能成就諸群生若能成就諸群生則得善攝衆生智若得善攝衆生智則能成就四攝法若能成就四攝法則與衆生無限利若與衆生無限利則具最勝智方便六二頌半明七地謂初一明有中殊勝行後一頌半明空中方便智準釋可知音釋簣求位切土籠也甄稽延切明也兜率兜當侯切梵語兜率此云知足慨口溉切感慨也悼大號切傷也濫盧瞰切濫觴泛觴也疥疥居拜切落蓋切憍慢憍舉喬切恣也慢莫安切倨也鵄抽知切鳶屬鯁古杏切咽也
