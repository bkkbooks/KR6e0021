body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述菩薩問明品第十釋此一品亦有四門初來意中有通有別通謂上來三品已答十句生解所依此下正答生解因果故次來也生解因中先答十住住攬信成將答所成先辨能成又正答十信故下三品來也後別者三品明信有解行德解為二本此品先來通謂下明盡一分來意直盡第七會來生解因中下唯明下三品來意初依古德信住合明又正答下疏意別明答信以第二會初十問中脫十信問故今三品答之不答住也然賢首意始教別開信位如梁論云如須陀洹見道前四位謂燸頂忍世第一菩薩道前四位亦爾謂十信十住十行十回向又彼論及佛性論皆云地前修四種行謂十信修信樂大乘行十解修般若行十行修三昧行十回向修大悲行如其次第即是四位故又為除四類障正使故即此四住謂初除闡提不信障二除外道我執障三除聲聞畏苦障四除獨覺捨大悲障又信成淨德因種解成我德因種行成樂德因種回向成常德因種又仁王經寄四輪王謂鐵銅銀金以上教義故知十信亦成位也若終教十信但是十住方便自無別位謂仁王釋三賢云十信十止十堅心十信即住故今疏不論成位不成位皆以三品別答信問別一會答合有問故已如前說二釋名者菩薩是人問明是法遮果表因故云菩薩問即是難明即是答然問有二種一泛爾相問梵云必理車二者難問謂以理徵詰梵云鉢羅室囊即今品意也答亦有二一但依問酬答報曰答二若俱為解釋旁兼異義美言讚述令理顯煥曰明即今品意也明亦破暗能除問者之疑暗故今文殊九首互為明難遞作砧椎研核教理以悟羣生故以名也又長行明起於問偈頌明解於問故曰問明不云答者欲以明兼於問故問有二義故得稱明一問中徵責詰難理盡使答者亡言此至明之問也二以問中進退詰理令現使答者易釋故以為明又明即法明以十菩薩問出十種法明故曰問明雖諸義不同皆菩薩之問明依主釋也然問有二下約論通問即是難明即是答今對彼難問故答稱明此明局在答者而有二義一顯理為明此明屬自明亦已下二破暗為明此約答他令他明故又長行下二約賔主問唯屬問明通問答使答者亡言者如緣起甚深中問云心性是一何以種種若云緣令種種何以復不相知逆遮其救使其亡言使答者易釋者謂問意言既是一性何以種種欲言種種復不相知故答云由不相知能成種種種種無性即不相知故不乖一性即答者易釋也又明即法下三約理法釋亦是約教義說謂問即是教釋有往復故明即法明是義所攝謂十甚深為十種法明就此法明又約心境法即是境明即是心以智慧明照二諦法故云法明三宗趣者亦先通後別通復二義一通分宗二通會宗並如會初二別明此品有其二義一望當品以十甚深為宗依成觀解為趣二望後二品則以甚深觀解為宗成後行德為趣四釋文此下至菩薩住處明生解之因配十句問如前問中依文次第且分為六初此下三品明未信令信二第三會已信令解三第四會已解令行四第五會已行令起願五第六會已起願令證入六十定品至住處品已證入令等佛今初三品即為三別此品明正解理觀次品明隨緣願行賢首品明德用該收就初分二先問答顯理後示相結通前中以十菩薩各主一門顯十甚深即為十𫨻一緣起甚深二教化甚深三業果甚深四說法甚深五福田甚深六正教甚深七正行甚深八正助甚深九一道甚深十佛境甚深此十甚深次第云何緣起深理總該諸法觀解之要故首明之衆生迷此故須教化違化順化有善惡業欲知此業由說法成然說法成善唯佛福田既說順田須持聖教教在勤行行須助道助必有正殊塗同歸得一道者當趣佛境故為此次又此十種亦可配於十信但不次耳文殊佛境即當信心文殊主信故佛境即所信故約發心次第信居其初約所信終極最居其後亦明十心不必次故勤首即進心財首為念心明四念故德首定心心性無念為上定故智首則慧心慧為上首兼己莊嚴故有十度法首即不退心如說修行得不退故寶首即戒心三聚無如寶珠故業果甚深戒所招故覺首即護法心緣起甚深是所護故目首即願心福田等一由願異故目能將身如願導行故賢首即回向心以歸一道即回向真如一身一智等即是佛果文云如本趣菩提所有回向心等以是圓融十法故各兼多義又亦攝十信之十德恐繁不敘前中以十菩薩下先列十名然十甚深即遷禪師所立今古同遵緣起深理者若染若淨染淨交徹無不攝故攝論云菩薩初學應先觀諸法如實因緣以成正信及正解故又此十種下先正配釋然十信心謂一信二進三念四定五慧六不退七戒八護法九願十回向配文可知以是圓融下後通妨難謂有難云信進等相釋處易知今十甚深文義兼廣何得而是十信等耶故為此答又亦攝者信有十德一親近善友二供養諸佛三修習善根四志求勝法五心常柔和六遭苦能忍七慈悲深厚八身心平等九愛樂大乘十求佛智慧配十甚深者一即正教甚深近佛善友聞教法故二即福田甚深法即業果四即緣起五即正行六即助道七即教化八即一道九即說法十即佛境通說佛智為所信故既有多含故文義兼廣爾時文殊師利菩薩問覺首菩薩言且為十甚深解然有二義一約行二約法言約行者文殊發問九菩薩答明妙慧通於衆行九菩薩問文殊為答明衆行成於妙慧言約法者初九顯差別義後一顯差別同歸佛境此二不二成信中之觀解妙慧通於衆行者文殊為妙慧九首為衆行各主一門故而問為能成答為所成故妙慧衆行互為能所此二不二者融上二也謂行與法不二了法成行行契法故又衍法師云一人問多表一中解無量故多人問一表無量中解一故又文殊是主餘九是伴故文殊是總餘九是別不是全要故略不出文中十𫨻皆先問後答又先起明問後解問明今初緣起中二初問分二初爾時下彰問答之主問覺首者彼得此門故緣起深義不覺則流轉故二正顯問端略啓五門初問所為者有二義故最初問之一拂異見二顯深理拂見有三一令諸菩薩知法從緣異外道見二知從心現捨二乘見三但心性起不同權教二顯深理者令諸菩薩於此實義發深信解起行證真始終皆實故問斯義起信論云有法能起摩訶衍信根是故應說所言法者謂衆生心依一心法有真如門及生滅門彼論依此生淨信故二顯深理者疏文分二先正明令始涉者便悟心性超乎大方故云始終皆實起信論云下第二引證於中有四初至應說是論初標文二所言法者謂衆生心即立義分論云次說立義分摩訶衍者總說有二種一者法二者義所言法者謂衆生心是心即攝一切世間出世間法依於此心顯示摩訶衍義何以故是心真如相即是摩訶衍體故是心生滅因緣相能示摩訶衍自體相用故釋曰法通執持亦能顯下義故稱為法該於染淨大位在因故言謂衆生心為染淨依故攝世出世何以故下出攝所以以有三大故三大即義大位在果今取通為緣起之本故但引法以證真心隨緣三從依一心法有真如門及生滅門即義引解釋分顯示正義中文以釋前法論云顯示正義者依一心法有二種門一者心真如門二者心生滅門是二種門皆各總攝一切法盡是義云何以是二門不相離故心真如門者即是一法界大總相法門體所謂心性不生不滅等次下釋心生滅云心生滅者依如來藏有生滅心所謂不生不滅與生滅和合非一非異名阿賴耶識等廣如彼釋今以真如證心性一隨緣生滅而成種種為此深理故四從彼論依此生淨信故即結示為實馬鳴依此造論令物生信何不信耶二述問意者謂明心性是一云何見有報類種種若性隨事異則失真諦若事隨性一則壞俗諦設彼救言報類差別自由業等熏識變現不關心性故無相違者為遮此救故重難云業不知心等謂心業互依各無自性自性尚無何能相知而生諸法既離真性各無自立明此皆依心性而起心性既一事應不多事法既多性應非一此是本末相違難亦是理事相違亦一異相違亦真妄相違各無自立者起信論云若得無念者則知心相生住異滅以無念等故而實無有始覺之異以四相俱時而有皆無自立本來平等同一覺故心性既一下二正結先以本難末事法既多下後以末難本故初結云本末相違此結有四一本末約能所生二事理直語體性三一異唯語其相然一有事一有理一今是理一四真妄唯語其體然真亦通事如佛真智等今亦約理為真以含義不同故有四結大同小異三揀定所問者凖此問意離如來藏不許八識能所熏等別有自體能生諸法唯如來藏是所依生亦不可言八識無二類故名心性一以能生種種非相違故亦非第八而為性一熏成種種非相違故心性之言非第八故答中既言法性本無生示現而有生法性即是真如異名正與報事相違故成難耳文殊欲顯實教之理故以心性而為難本欲令覺首以法性示生決定而答海會同證楞伽密嚴皆廣說故三揀定所問者意云此是假名法相師問欲顯法性義非是法性師問顯成法相義故云揀定亦不可言下二遮救也即法相師救云此法性師難法相義心性是一者八識心王同是心故名為性一破云生於種種即眼耳鼻舌等故非相違亦非第八下遮轉救云若八識非一第八賴耶此是一義故今破云第八正是所熏心體含多種子熏成種種亦非相違心性之言下以理正折第八但是心相生滅非唯識性答中既云法性示生不言第八無生示生明是真如隨緣義耳四會相違者問若爾瑜伽等中異熟賴耶從業惑種辨體而生非如來藏隨緣所成如何會釋答瑜伽等中對於凡小約就權教隨相假說楞伽密嚴對大菩薩依於實教盡理而說既機有大小法有淺深教有權實故不相違故密嚴云佛說如來藏以為阿賴耶惡慧不能知藏即賴耶識此明守權拒實訶為惡慧又彼經云如來清淨藏世間阿賴耶如金與指環展轉無差別楞伽中真識現識如泥團與微塵非異非不異金莊嚴具亦復如是皆此義也又彼經云如來藏為無始惡習所熏名為藏識又入楞伽云如來藏名阿賴耶識而與無明七識共俱又起信論云不生不滅與生滅和合非一非異名阿賴耶識又如達磨經頌云無始時來界為諸法等依攝論等就初教釋云界者因義即種子識寶性論翻此頌云此性無始時等彼論就實教釋云性者謂如來藏性如聖者勝鬘經說依如來藏故有生死依如來藏故有涅槃以此等文故知兩宗不同淺深可見又唯識等亦說真如是識實性但後釋者定言不變失於隨緣過歸後輩耳四會相違者此門躡前而起謂若依上如來藏隨緣成立則違瑜伽等文故會之先敘所違玄談已釋後答下會通先相宗意後楞伽下申性宗意故密嚴下引證初引密嚴自有二文俱是第三卷微密品兩頌相續中間有釋故著又言此前更有一偈云如來清淨藏亦名無垢智常住無始終離四句言說次即云佛說如來藏等彼疏釋云上半定賴耶體謂是如來藏與妄染合名賴耶更無別體此是教說故引佛說下半明會權教謂守權者不能了如來藏作賴耶者當知惡慧之言訶守權者令歸實說次頌即如來清淨藏等彼疏釋云此頌釋成前義上半法說牒舉下約喻釋成謂如金作指環環相虗無金體露現故云無差別如來藏作賴耶賴耶相虗藏性理現亦可迷成賴耶悟成如來藏體無有二故云無差楞伽中真識現識如泥團等者若具彼文亦爾下云大慧若泥團微塵異者非彼所成而實彼成是故不異若不異者泥團微塵應無差別如是轉識藏識真相若異者藏識非因若不異者轉識滅藏識應滅而自真相實不可滅是故非自真相滅賢首解云此中真相是如來藏轉識是七識藏識是梨耶此解甚當但喻有二而合有三意少難見此即第一經初先明識三相次明三識初云諸識有三種相謂轉相業相真相釋曰此三種相通於八識謂起心名轉八俱起故皆有生滅故名轉相動則是業如三細初業相八識皆動盡名業相八之真性𥁞名真相經云諸識有三種相則知三相通八識次經辨三識云大慧略說有三種識廣說有八種相何等為三謂真識現識分別事識釋曰約不與妄合如來藏心為真現即第八下經云譬如明鏡現衆色像現識處現亦復如是明是第八餘七皆名分別事識是則三識別為三類現唯第八分別唯前七真相約佛是八出纏約凡在第八中亦兼餘七然泥團經文含前二假意明三識而參三相之名轉識即轉相之名意是分別事識故唯識中名七轉識藏識即現識此則可知真相即真識上二取識類別故牒識名真相但取通八之真故牒相名經文言若異者藏識非因者謂三若異藏識則應不同真相及轉識為因既以轉識熏故真識隨緣而成藏識則知不異非以藏識為二識因故下重案定云非自真相滅但業相滅斯則三事備矣謂喻中有三一塵二水三泥以水和塵泥團方立以業熏真相藏識便生業以合水但水滅而塵在故業亡而真存若自真相滅者藏識即滅者反顯藏識以真妄和合而成但其妄滅而真體不無故下以水喻如來藏波喻七識合成動海即為藏識但波相滅濕性不壞即斯義也不異之義易知言皆此義者皆是如來藏隨緣成識義也然云自真相者十卷但云自相曉公釋云本覺之心不藉妄緣性自神解名自真相約不一義說又隨無明風作生滅時神解之性與本不異亦名自真相是依不異義說又彼經云等者上辨與七和合為藏識今明無始無明為因故論下文中無明為因生三細境界為緣生六粗此中正取無明為因生於三細三細既屬賴耶已成識藏即第四經文具云大慧如來藏是善不善因能遍興造一切趣生譬如伎兒變現諸趣離我我所不覺彼故三緣和合方便而生外道不覺計著作者為無始虗僞惡習所熏名為識藏生無明住地與七識俱如海浪生常生不斷離無常生過離於我論等又入楞伽下前引楞伽與七識俱次引楞伽為惡習熏今則雙具故復引之大意無異言而與無明七識共俱者與無明俱即前第二意與七識俱即第一意又起信下引於三論初正引起信即二門之中生滅門初具云心生滅者依如來藏故有生滅心所謂不生不滅與生滅和合非一非異名阿賴耶識釋曰初二句標所謂不生不滅下辨相不生不滅者是上如來藏自性清淨心因無明風動舉體隨緣作生滅心不相捨離故云和合非謂別有生滅來與真合此心所以生滅者因無明生此生滅心原從本覺而起故有二義而無二體故下論云如大海水因風波動水相風相不相捨離乃至廣說此中名動為風水之動是風相動之濕是水相以水舉體動故水不離於風相無動而非濕故動不離於水相心亦如是不生滅心舉體動故心不離生滅相生滅之相無非真故生滅不離於心相如是名為和合此是不生滅心與生滅合以是隨緣門故非是生滅與不生滅合以此不是向本真如門故言非一非異者真如全體動故心與生滅非異而恆不變真性故與生滅不一此約三細以為生滅則第八中已含動靜若楞伽經云七識染法為生滅以如來藏淨法為不生滅以此二和合為阿賴耶識以和合故非一非異非一異者就粗顯說然非一非異廣義如十忍品如幻忍明又如來藏名初品已釋言不生滅等者且公云性該始終體非起盡體遍迷悟性非解惑故云不生不滅若不覺知能令生死不斷名生始覺能滅生死故名為滅又如達磨經頌下先舉經偈而云達磨經頌者攝論第二釋所知依中云此中最初且說所知依即阿賴耶也世尊何處說阿賴耶識名阿賴耶謂薄伽梵於阿毗達磨大乘經中說釋曰此乃通指大乘經為對法經耳文中但舉上半下半云由此有諸趣及涅槃證得攝論等下初即法相宗等者等取瑜伽雜集彼釋云無始者初際無故界者因義即種子也是識因種謂一切法此唯雜染非是清淨彼一切法等所依者能任持故非因性義所依能依性各異故若不爾者界聲已了無假依言故第三論云此中聞熏習為是阿賴耶識自性為非阿賴耶自性下論答云此聞熏習隨在一種所依轉處寄在異熟識中與彼和合俱轉猶如水乳然非阿賴耶自性是彼賴耶對治無分別智種子性故下二句易了明知賴耶但是生滅非真性成寶性論翻下即法性宗疏中一句但是義引彼論具云無始時來性作諸法依止依性有諸道及證涅槃果即第四論彼論釋云此偈明何義無始時來性者如經說言諸佛如來依如來藏說諸衆生無始本際不可得知故所言性者如聖者勝鬘經言世尊如來說如來藏者是法界藏出世間法身藏出世間上上藏自性清淨法身藏自性清淨如來藏故作諸法依止者如聖者勝鬘經言是故如來藏是依是持是住持是建立等次論云依性有諸道者如聖者勝鬘經言世尊生死者依如來藏世尊有如來藏故說生死是名善說故及證涅槃果者如聖者勝鬘經言世尊依如來藏故有生死依如來藏故證涅槃世尊若無如來藏者不得猒苦果求涅槃不欲涅槃不願涅槃故此明何義明如來藏究竟如來法身不差別真如體相畢竟云佛性體於一切時一切衆生身中皆無餘盡應知以此等文下先正結以上諸教皆如來藏而為識體故知心性即如來藏此外無法故為深也又唯識下引唯識文結同法性故論云此諸法勝義亦即是真如常如其性故即唯識實性釋曰既用真如為識實性明知天親亦用如來藏而成識體但後釋論之人唯立不變故云過歸後輩况世親造佛性論廣用勝鬘佛子心性是一五釋文分三初佛子下立宗案定謂心之性故是如來藏也又心即性故是自性清淨心也又妄心之性無性之性空如來藏也真心之性實性之性不空如來藏也皆平等無二故云一也又妄心之性等者此下一對成上二義然有二意一如次成上謂妄心之性成心之性以性相不同故真心之性成上即性真心即性故二者通成謂此之二性別名二藏前之二性皆具二藏但為妄覆名如來藏直語藏體即自性心故此自性清淨真心不與妄合名為空藏具恆沙德名不空藏前明即離此明空有故重出也皆平等無二者上二即離不同由心之性故不即由心即性故不離不即不離為心之性後二即空之實為不空即實之空為空藏空有不二為心之性然空有無二之性即是不即不離之性故但云一云何見有種種差別三設難相違難分二初云何下總顯相違謂心性既一云何而有五趣諸根總別殊報故云種種五趣等者如持五戒招得人身是總報業由於因中有瞋忍等於人總報而有妍蚩名別報業唯識亦名為引滿業能招第八引異熟果故名引業能招第六滿異熟果名為滿業俱舍亦云一業引一生多業能圓滿猶如繢像先圓形狀後填衆彩等然其引業能造之思要是第六意識所起若其滿業能造之思從五識起所謂往善趣惡趣諸根滿受生同異端正醜陋苦樂不同二所謂下別示相違十事五對約總報明趣有善惡善謂人天惡謂三塗下四對皆約別報諸根下於前善惡趣中各根有滿謂眼等內根受生下於前滿中各生有同異謂四生不同勝劣處異端正下於上同異生處各貌有妍苦樂下於上妍各受有苦樂上之五對前前皆具後後後後必帶前前展轉異同成多差別故云種種不同心性是一其義安在展轉異同等者都有六十二句謂初對是善惡為二第二對開二成四兼前二成六第三對開四成八配前六成十四第四對開八成十六兼前十四成三十第五對開十六成三十二配前三十成六十二此約以後添前故成六十三剋實而言但有三十二以後開前前更無體故如開善惡趣各成滿但有四耳謂一善趣根滿二善趣根三惡趣根滿四惡趣根此四之外更無有別善惡趣故又若二二開之唯成三十二若更展其四生則復成多句謂第三對先以四生乘上四句四四成十六句更有勝劣乘十六已有三十二配六已成三十八後後開之句數更多第四對開成六十四第五對開成一百二十八若從初善惡開為六趣則句數更多並可思凖故云後後必帶前前展轉異同成多差別業不知心心不知業受不知報報不知受心不知受受不知心因不知緣緣不知因智不知境境不知智第三結成前難此文意稍難見略為二解一依古德作遮救重難如前第二問意中辨二直結成前難且依此釋文自有三意由前難意亦有三故一直問所以故今結云非但本性是一我細推現事各不相知既有種種何緣不相知既不相知誰教種種若謂業令種種業不知心若謂心令種種心不知業一一觀察未知種種之所由也二懷疑重難故結云既不相知為是一性為是種種三作相違難結云一性隨於種種即失真諦種種隨於一性即失俗諦今見種種又不相知此二互乖云何並立二正釋本文亦有十事五對略為二解一通二別初通謂總觀前來總別二報業不下就先業因約能所依以難然有二意一約本識謂業是能依心是所依離所無能故云業不知心離能無所故云心不知業以各無體用不能相成既各不相知誰生種種下並準之二約第六識業是所造心是能造並皆速滅起時不言我起滅時不言我滅何能有體而得相生成種種耶一約本識者業是心所故依於心心是第八為根本依離所無能下釋不相知義以相待門釋言誰所無能者既無所依心王亦無能依之業今依心有業業從緣生故無自性不能知心離能無所者離能依業則心非所依今由業成所依所依無性故不能知業以各下結謂各從緣成性空無體相依無力故云無用覺首亦云無體用故故不相知二約第六識者即以第六識名心從於積集通相說故謂第六識人執無明迷真實義異熟理故以善不善相應思造罪等三行熏阿賴耶能感五趣愛非愛等種種報相但云六者謂五識無執不能發潤故非迷理無推度故不能造業雖造滿業亦非自能但由意引方能作故並皆速滅者明不相知通相而言皆約無體用故別相而言用門不同此用二門一無常門故言並皆速滅淨名弟子品云優波離一切法如幻如電諸法不相待乃至一念不住諸法皆妄見故心業皆空下經云衆報隨業生如夢不真實念念無滅壞如前後亦爾故由無常不能相知起時不言我起下即無我門約法無我明不相知故淨名問疾品云又此病起皆由著我是故於我不應生著既知病本即除我想及衆生想當起法想應作是念但以衆法合成此身起唯法起滅唯法滅釋曰一以法遣我次經云又此法者各不相知起時不言我起滅時不言我滅釋曰此總顯我空明不相知次經又云彼有疾菩薩為滅法想當作是念此法想者亦是顛倒顛倒者即是大患我應離之云何為離謂離我我所云何離我我所謂離二法云何離二法謂不念內外諸法行於平等云何平等謂我等涅槃等所以者何我及涅槃此二皆空以何為空但以名字故空如此二法無決定性釋曰此破法顯空今但取我法不相知義故略用二句次下經云得是平等無有餘病唯有空病空病亦空釋曰此以空空破空非今所要因便引來成一假義畢耳受不下約得報果時難能所受謂受是報因即名言種為業所引受所受報離報無受故云受不知報離受無報故云報不知受以並無體故準前應知第二對者此釋受不知報報不知受受是能受之回報是所受之報此上總明謂受是報因下別釋即名言種者唯識第八云覆次生死相續由諸習氣然諸習氣總有二種一名言習氣二我執習氣三有支習氣名言習氣者謂有為法各別親種名言有二一表義名言即能詮義音聲差別二顯境名言即能了境心心所法隨二名言所熏成種作有為法各別因緣釋曰言各別親種者三性種異故能詮義聲者揀無詮聲彼非名故名是聲上屈曲唯無記性不能熏成色心等種然因名起種名名言種顯境名言即七識見分等心非相分心相分心者不能顯境故此見分等實非名言如言說名顯所詮義此心心所法能顯所了境如似彼名能詮義故隨二名言皆熏成種二我執習氣三有支習氣並如六地有支即是今文為業所引能引之業故唯識云三有支習氣謂招三界異熟業種有支有二一有漏善即能招可愛果業二諸不善即能招非愛果業隨二有支所熏成種令異熟果善惡趣別故論頌云由諸業習氣二取習氣俱前異熟既盡復生餘異熟此能引業即諸業習氣此名言種即二取習氣言為業所引者即彼俱義親辦果體即由名言若無業種不招苦樂如種無田終不生芽故此名言由業引起方受當來異熟之果苦樂之報故六地云業為田識為種離報無受下釋不相知亦約相待空故心不下約名言因就能所依難謂前能受報因依心無體故無相知餘義同前三約名言等者標也即將第二對中能受名言之因對第一對中所依本識前以業依識難今以種依現行難謂前能受報因下釋不相知但釋受不知心不解心不知受故結云餘義同前若具應云所依心體若離能依亦無所依無所依故不能相知因不下約因緣親疏相假難謂所引名言為因能引業為緣相待相奪各無自性如不自生等準之四約因緣等者取前第二對中所引名言及能引業相對以明此即標也謂所引下出體相待相奪下釋不相知言相待者業無識種不親辦體識無業種不招苦樂既互相待即各無自性言相奪者以業奪因唯由業招故因如虗空以因奪緣即唯心為體故業如虗空互奪獨立亦不能相知互奪兩亡無可相知如不自生等者引例以釋以緣奪因故不自生以因奪緣故不他生因緣合辨相待無性故不共生互奪雙亡無因豈生以此不生類於不知居然易了即以因為自以緣為他合此為共離此為無因互有尚不相知互無豈能相知智不下約境智相對相見虛無難謂境是心變境不知心心託境生心不知境以無境外心能取心外境是故心境虛妄不相知也五約境智等者相即相分見即見分諸心心所略有二分廣說有四如下當辨謂境是心變下明不相知義先約唯識能所變釋後以無境外下約當經互融以說故下經云無有智外如為智所入亦無如外智能證於如無有少法與法同住以舉心攝境則無心外之境舉境攝心則無境外之心以性無二相即性故相隨性融隨一皆攝上約真心後心境虗妄下約其妄心真即互融妄俱無體故下答中云能緣所緣力種種法出生速滅不暫停念念悉如是即顯妄無性故不相知也然上五對初及第四唯約因中第二一對因果對辨第三一對心含因果第五一對義通因果修因二取即名言等故唯識論釋二取二中總有四義一者相見二者名色三者王所四者本末末即六識異熟本即第八異熟四種二取皆能熏發親能生彼本識上功能名二取習氣所變心境即通果也又能變之心是因所變之境是果心託境生俱通因果二別觀者以初二對結趣善惡趣善惡者正由業熏受總報故第二別觀者上云通觀五對之中一一通前善惡趣等五對本難今即以斯五對別對前五而前後鉤鎖但有四重細尋可見以初二對結趣善惡者標也趣善惡者正田業熏是第一對業不知心心不知業此對為因次云受總報故即第二對受不知報報不知受初對為因受第二對報總報即是趣善惡故二復以第二及第三對結受生同異初對以名言種對所生處次對以名言種對能依本識二復以第二等者鉤取前二對中第二對即重明受不知報報不知受受即名言種故云初對以名言種對所生處謂亦由識種往所生處故初地云於三界田中復生苦芽次對以名言等者即心不知受受不知心受即名言種心即能依本識者依名言種招現行識故識為能依則此心言通因及果上約因中本識故為所依今約果中故為能依三復以第三及第四對結苦樂不同及端正醜陋初對觀現受時次對觀苦樂因及彼妍皆由緣令異謂損益因成苦樂果以瞋忍因成妍果三復以第三等者即通以此二對雙結前二對初對觀現受時者即心不知受受不知心謂亦由受因受苦樂體及妍故若無識種本識此二亦無所依次對觀苦樂因等者即因不知緣緣不知因謂損益下別示二對之相由損他業感於苦報由益他業感於樂報以嗔恚業感於醜陋由忍辱業感於端正此中言因名緣為因此中言果是別報果四復以第四及第五對結諸根滿亦由滿業因緣有損他益他之異故成內六處滿之果又由內根有滿故於分別位了境不同並皆無性各不相知既不相知誰令種種四復以第四等者此上總明亦由滿業下別說其相滿業即第四對因不知緣緣不知因緣即是業唯取滿業由損他眼耳成盲聾等由益他六根等成六處滿足又由內根等者即第五對智不知境境不知智謂智於境有信進念定慧之滿足則受果中亦具五根明利勝上若智於境信等隨闕或非深厚則得果時五根隨或成下品並皆無性下上別釋中但出能對所對二種法體今則聰明不相知義在文易了意云並各相依從緣無性何有能所熏等而能相知既不相知者此但約第一直問意結亦應帶疑云為是種種為是一性結成難云一性隨於種種則失真諦種種隨於一性則失俗諦一性即不相知亦應結云種種隨於不相知則失俗諦不相知隨於種種則失真諦音釋遞大計切更易也砧椎砧知林切椎傳追切研核研𬾐堅切究也核下革切考也環胡關切鬘莫班切配滂佩切匹也軌古委切法也繢胡對切畫也填亭年切
