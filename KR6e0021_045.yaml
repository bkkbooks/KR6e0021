body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述若具最勝智方便則住勇猛無上道若住勇猛無上道則能摧殄諸魔力若能摧殄諸魔力則能超出四魔境若能超出四魔境則得至於不退地若得至於不退地則得無生深法忍若得無生深法忍則為諸佛所授記七若具最勝下三頌明第八地略辨六義一道勝謂無功用道故云勇猛無上二力勝謂智力摧魔三用勝謂超四魔境捨分叚故無蘊魔無捨命故無死魔惑不現行故超煩惱魔覺佛十力故超天魔四位勝不動地故云不退也五行勝謂得無生忍六因勝謂此位中當大授記位也若為諸佛所授記則一切佛現其前若一切佛現其前則了神通深密用若了神通深密用則為諸佛所憶念若為諸佛所憶念則以佛德自莊嚴八二頌明第九地作大法師略辨四義一諸佛加持名佛現前二解了諸佛深密之法三佛憶念增其慧力四佛德自嚴為眾說法若以佛德自莊嚴則獲妙福端嚴身若獲妙福端嚴身則身晃耀如金山若身晃耀如金山則相莊嚴三十二若相莊嚴三十二則具隨好為嚴飾若具隨好為嚴飾則身光明無限量若身光明無限量則不思議光莊嚴九若以佛德下十九頌明第十地位分五初八頌三業殊勝德初五身業於中前三頌明身體德殊勝若不思議光莊嚴其光則出諸蓮華其光若出諸蓮華則無量佛坐華上示現十方靡不徧悉能調伏諸眾生若能如是調眾生則現無量神通力後二頌明身業大用若現無量神通力則住不可思議土演說不可思議法令不思議眾歡喜次演說一頌語業勝說法益生若說不可思議法令不思議眾歡喜則以智慧辯才力隨眾生心而化誘若以智慧辯才力隨眾生心而化誘則以智慧為先導身語意業恒無失後二頌意業勝智先導故若以智慧為先導身語意業恒無失則其願力得自在普隨諸趣而現身若其願力得自在普隨諸趣而現身則能為眾說法時音聲隨類難思議若能為眾說法時音聲隨類難思議則於一切眾生心一念悉知無有餘若於一切眾生心一念悉知無有餘則知煩惱無所起永不沒溺於生死二若以智慧為先下四頌明三業廣大功三輪攝生德初一頌身業次一語業後二意業若知煩惱無所起永不沒溺於生死則獲功德法性身以法威力現世間若獲功德法性身以法威力現世間則獲十地十自在修行諸度勝解脫三若知煩惱下二頌辨得法結位若得十地十自在修行諸度勝解脫則獲灌頂大神通住於最勝諸三昧若獲灌頂大神通住於最勝諸三昧則於十方諸佛所應受灌頂而昇位若於十方諸佛所應受灌頂而昇位則蒙十方一切佛手以甘露灌其頂四若得十地下三頌明三昧分大盡分受位分並顯可知若蒙十方一切佛手以甘露灌其頂則身充徧如虛空安住不動滿十方若身充徧如虛空安住不動滿十方則彼所行無與等諸天世人莫能知五若蒙下二頌明大用難測亦是釋名分事也謂以法智雲含眾德水能蔽如空麤重故又若蒙下二頌亦是進入佛地也菩薩勤修大悲行願度一切無不果見聞聽受若供養靡不皆令獲安樂彼諸大士威神力法眼常全無減十善妙行等諸道無上勝寶皆令現第三菩薩勤修下三頌結歎其德初二法說後一喻況前中賢首云初二句悲願內滿謂菩薩勤修等者結前若字下義無不果者結前則字下義以若有彼則有此非是前後鈎鎻相因唯是本位信中有此則有彼同時具有而說有前後是故信門具足一切行位之相然行雖無量皆以悲願為首故就此結之次二句明此悲願益物不空次一頌結前所具行位初句舉人標法威神即信為能具之由次句結能證智眼證如如永常故次句結所證道十善舉二地行等取餘地及餘位餘道謂教證等勝寶皆現以若有彼等者揀濫明此是圓融義纔得一位即得諸位如十味香纔燒一丸如小芥子十氣齊𤼵若有聞香十味齊聞若得沉氣時則得檀氣若得酥合則得龍腦等十味丸藥服者齊得亦準此知非如鈎鎻由得於前方能得後非如涉路若行一里則得二里若行二里則進三里故此位中不存位名或開或合正在於此思之思之譬如大海金剛聚以彼威力生眾寶無減無增亦無盡菩薩功德聚亦然後一頌喻況唯喻後偈初句及威力喻前初句信體堅固以喻金剛並居智海之內以信威力能生所生眾寶即喻前第三句行位第三句喻前法眼常全或有剎土無有佛於彼示現成正覺或有國土不知法於彼為說妙法藏無有分別無功用於一念頃徧十方如月光影靡不周無量方便化群生於彼十方世界中念念示現成佛道轉正法輪入寂滅乃至舍利廣分布第四或有剎土下二百三頌明無方大用分彼能無邊大用者由普賢德徧一切時處法界無限故略辨十門三昧業用一圓明海印三昧門二華嚴妙行三昧門三因陁羅網三昧門四手出廣供三昧門五現諸法門三昧門六四攝攝生三昧門七俯同世間三昧門八毛光照益三昧門九主伴嚴麗三昧門十寂用無涯三昧門以無不定心故皆云三昧作用不同略辨十種又初門依體起用末後明用不異體中間並顯妙用自在又十三昧皆具此三畧朝十門等者然還源觀立一體二用三徧四德五止六觀亦不出此言一體者即自性清淨圓明體即通為十定之體言二用者一海印森羅常什用即此第一三昧二法界圓明自在用即華嚴三昧言三徧者一一塵普周法界徧二一塵出生無盡徧三一塵含容空有徧此三並是因陀羅網三昧門言四德者一隨緣妙用無方德二威儀住持有則德三柔和質直攝生德四普代眾生受苦德即次下第六三昧門言五止者一照法清虛離緣止二觀人寂怕絕欲止三性起繁興法爾止四錠光顯現無念止五事理玄通非相止言六觀者一攝境歸心真空觀二從心現境妙有觀三心境祕密圓融觀四智身影現眾緣觀五多身入一鏡像觀六主伴互現帝網觀上之止觀並是寂用無涯三昧門故此十門無不收矣廣釋一體六觀等具如還源觀辨今初六頌明海印三昧文分為二前五別明業用周徧後一總結大用所依前中三初三佛事次一三乘後一類餘總顯十法界之化也前中初一總明現佛說法次一體用自在初句揀非二義一念無分別二動無功用下三句顯正二義謂無念之念一念徧於十方無功之功多門攝於羣品月喻四義準法可知或現聲聞獨覺道或現成佛普莊嚴如是開闡三乘教廣度眾生無量劫二一頌辯三乘或現童男童女形天龍及以阿脩羅乃至摩睺羅伽等隨其所樂悉令見三有一頌類餘眾生形相各不同行業音聲亦無量如是一切皆能現海印三昧威神力後一結用所依海印之義昔雖略解未盡其源今以十義釋之以表無盡之用下經云如淨水中四兵像乃至莫不皆於水中現又云海有希奇殊特法能為一切平等印眾生寶物及川流普悉包容無所拒故大集十四云如閻浮提一切眾生身及餘外色如是等色海中皆有印像以是故名大海為印菩薩亦爾得大海印三昧已能分別見一切眾生心行於一切法門皆得慧明是為菩薩得海印三昧見一切眾生心行所趣然此經文多同出現但出現現於四天下像又約佛菩提大集唯閻浮約菩薩所得然皆見心所趣等了根器也此文所現形類應根器也二文互舉皆是所現菩薩定心以為能現下經云下第二總明即引當經及於他經以示能現所現海印之相言乃至莫不皆於水中現者其中間云各各別異無交雜劒㦸弧矢類甚多鎧冑車輿非一種隨其所有相差別莫不皆於水中現而水本自無分別菩薩三昧亦如是即第十五經又云海有希奇等者即此卷中下合云無盡禪定解脫者為平等印亦如是福德智慧諸妙行一切普修無猒足大集十四下䟽文分二先正引後解釋前中即虛空藏菩薩品頭有一善男子言此中亦爾彼云亦復如是餘皆全同然此經文下解釋此即此上大集也出現四天下像等者文云佛子譬如大海普能印現四天下中一切眾生色相形像是故共說以為大海諸佛菩提亦復如是普現一切眾生心念根性欲樂而無所現是故說名諸佛菩提下偈文云如海印現眾生心以此說名為大海菩提普印諸心行是故說名為正覺言十義者一無心能現義經云無有功用無分別故二現無所現義經云如光影故出現品云普現一切眾生心念根性欲樂而無所現故三能現與所現非一義四非異義經云大海能現能所異故非一水外求像不可得故非異顯此定心與所現法即性之相能所宛然即相之性物我無二五無去來義水不上取物不下就而能顯現三昧之心亦爾現萬法於自心彼亦不來羅身雲於法界未曾暫去上之五義與鏡喻大同六廣大義經云徧十方故普悉包容無所拒故明三昧心周於法界則眾生色心皆定心中物用周法界亦不離此心七普現義經云一切皆能現故出現云菩提普印諸心行故此與廣大異者此約所現不揀巨細彼約能現其量普周又此約所現無類不現彼約能現無行不修八頓現義經云一念現故謂無前後如印頓成九常現義非如明鏡有現不現時十非現現義非如明鏡對至方現經云現於四天下像故四兵羅空對而可現四天之像不對而現故云非現現也以不待對是故常現該三際也具上十義故稱海印諸佛窮究菩薩相似經云徧十方者即是今經於一念頃徧十方也普悉包含無所拒者即指上引十義所引皆上總中所引之經及出現品文多易了但第十云以不待對是故常現者此以第十釋成第九即為揀異由十成九故云釋成而九豎論十是橫說故為揀也問仁王三賢都無八相之文初地方云方生百三千一時成正覺此之八相豈在信門答即上所引大集亦云灌頂住菩薩得佛神力若菩薩成就如是等法能於無佛世界示現八相乃至廣說彼說住終若占察經漸次作佛略有四種何等謂四一者信滿法故作佛所謂依種性地決定信諸法不生不滅清淨平等無可願求故二解滿作佛三證滿作佛謂淨心地四一切功德行滿作佛依究竟菩薩地起信依此說信成就發心能八相作佛文據昭然況圓融門中不依位次寄終教說信滿即能因果無礙以因門取常是菩薩以果門取即恒是佛或雙存俱泯自在難思又此化現非唯一位依一類界而能具攝一切地位徧於時處故云念念徧十方也問仁王三賢下問也即上卷菩薩教化品經云若菩薩住百佛國土中作閻浮提王王四天下修百法明門二諦平等心化一切眾生下偈云善覺菩薩四天下雙照二諦平等道權化眾生遊百國始登一乘無相道釋曰此前更無成佛之文答即上所引下第二答中有三初指前引答謂上引大集灌頂即第十住故云住終則初賢已得八相何得偏引仁王三賢無文若占察經下次引別文答謂占察經作佛有四初是信滿正與今文相當餘三因便故來耳二解滿作佛即同前大集灌頂受位三證滿者初證名證滿故云淨心地即初地故四究竟菩薩地即第十地後故起信云菩薩地盡覺心初起心無初相以遠離微細念故得見心性心即常住名究竟覺是也起信依此下上正引經此方引論用信成就𤼵心即第一信滿位論云菩薩𤼵是心故則得少分見於法身以見法身故隨其願力能現八種利益眾生所謂從兜率天退入胎住胎出胎出家成道轉法輪入涅槃即八相之文也况圓融門等者三况出圓義也則上所引尚是行布以四位成佛深淺不同故今初即具後故是圓融今約信滿猶寄終教說耳因果無礙下通伏難謂有難云若初即後應壞因果故故為此通明其無礙正在因時即有果果中有因隨門不同名因名果體無前後故得圓融雙存則亦因亦果俱泯則果海離言又此化現非唯等者重揀前文以圓融非唯一位則顯具一切地位非依一類界則顯徧於時處也第一海印三昧竟嚴淨不可思議剎供養一切諸如來放大光明無有邊度脫眾生亦無限智慧自在不思議說法言辭無有礙施戒忍進及禪定智慧方便神通等如是一切皆自在以佛華嚴三昧力第二嚴淨下華嚴三昧文有十句略辨七行前六句各一行七八是十度行九結上自在十總結所依萬行如華嚴法身故餘如別說萬行等者遺忘集說畧有十觀一攝相歸真觀二相盡證實觀三相實無礙觀四隨相攝生觀五緣起相𠬧觀六微細容攝觀七一多相即觀八帝網重重觀九主伴圓融觀十果海平等觀然此十觀融四法界初二理法界始終不異三即事理無礙法界四即事法界次五即事事無礙法界五即一多相容不同門六即微細相容安立門七即諸法相即自在門八即因陀羅網境界門九即主伴圓融具德門其第十觀果海絕言通為前四之極則四法界十種玄門皆約因分然此十觀畧𭣣萬類不異玄中故指在餘又釋題中廣顯華嚴義竟又還源觀釋云廣修萬行稱實成德普周法界而證菩提如華有結實之用行有感果之能今則託事表彰所以舉華為喻嚴者行成剋果契理稱真性相兩亡能所俱絕顯煥炳著故名嚴也良以非真流之行無以契真何有飾真之行不從真起斯則真該妄末行無不修妄徹真源相無不寂故曰法界自在圓明無礙用為華嚴三昧也若更總釋總以萬行嚴於法界成於法身為華嚴也行有行布圓融成佛亦有十身總別別如普眼長者以十波羅蜜嚴成十身融如八地一念之中十度圓修成佛之時十身無礙故曰華嚴餘如題中第二華嚴三昧竟一微塵中入三昧成就一切微塵定而彼微塵亦不增於一普現難思剎彼一塵內眾多剎或有有佛或無佛或有雜染或清淨或有廣大或狹小或復有成或有壞或有正住或傍住或如曠野熱時燄或如天上因陀網如一塵中所示現一切微塵悉亦然此大名稱諸聖人三昧解脫神通力第三一微塵中下四頌明因陁羅網三昧門於中初二句標定心境然有二意一由一多相即故入一定能成多定由成多定令一塵內有一切塵一一塵中現一切剎二但令一塵現剎一切亦爾故云成就一切微塵定次二句明不壞相而普現故云不增次二頌明一塵中所現剎相無礙如焰重現如帝網次半頌舉一例餘亦有二意一例上一塵之內所具之塵二例如一塵入定示現餘塵入定示現亦然次半頌者前意對前第一意既一塵之中有多塵向來方說一塵攝剎今方說塵內所具餘塵攝剎後意對前第二意此所例塵非前塵內是前塵外徧法界中塵也後二句結用所因略辨三門一三昧力此同標中二不思議解脫力如不思議品云於一塵中現三世佛剎等三神通力謂幻通自在並如下說三因陀羅網三昧門竟若欲供養一切佛入於三昧起神變能以一手徧三千普供一切諸如來十方所有勝妙華塗香末香無價寶如是皆從手中出供養道樹諸最勝無價寶衣雜妙香寶幢旛蓋皆嚴好真金為華寶為帳莫不皆從掌中雨十方所有諸妙物應可奉獻無上尊掌中悉雨無不備菩提樹前持供佛十方一切諸妓樂鐘鼓琴瑟非一類悉奏和雅妙音聲靡不從於掌中出十方所有諸讚頌稱歎如來實功德如是種種妙言辭皆從掌內而開演菩薩右手放淨光光中香水從空雨普灑十方諸佛土供養一切照世燈又放光明妙莊嚴出生無量寶蓮華其華色相皆殊妙以此供養於諸佛又放光明華莊嚴種種妙華集為帳普散十方諸國土供養一切大德尊又放光明香莊嚴種種妙香集為帳普散十方諸國土供養一切大德尊又放光明末香嚴種種末香聚為帳普散十方諸國土供養一切大德尊又放光明衣莊嚴種種名衣集為帳普散十方諸國土供養一切大德尊又放光明寶莊嚴種種妙寶集為帳普散十方諸國土供養一切大德尊又放光明蓮莊嚴種種蓮華集為帳普散十方諸國土供養一切大德尊又放光明瓔莊嚴種種妙瓔集為帳普散十方諸國土供養一切大德尊又放光明幢莊嚴其幢絢煥備眾色種種無量皆殊好以此莊嚴諸佛土種種雜寶莊嚴蓋眾妙繒旛共垂飾摩尼寶鐸演佛音執持供養諸如來手出供具難思議如是供養一導師一切佛所皆如是大士三昧神通力第四若欲下十八頌明手出廣供三昧門初一總標後一通結中間別顯欲顯勝妙略舉一手為供所依由於昔時以手持供供佛施人稱周法界故令真流供具等諸佛之難思由於昔時等者此出因也供佛施人約其施行稱周法界約其施心入深觀故故令真流等者顯今果也真流供具顯出供時心以稱法界乎出供具故等諸佛之難思者稱因境也因雖尊勝心不稱境非真供養由稱真之因感稱真之果能供真佛之境四手出廣供三昧門竟菩薩住在三昧中種種自在攝眾生悉以所行功德法無量方便而開誘第五菩薩住下八頌明現諸法門三昧門分四初一總標多門或以供養如來門或以難思布施門或以頭陀持戒門或以不動堪忍門或以苦行精進門或以寂靜禪定門或以決了智慧門或以所行方便門或以梵住神通門或以四攝利益門或以福智莊嚴門或以因緣解脫門或以根力正道門或以聲聞解脫門或以獨覺清淨門或以大乘自在門或以無常眾苦門或以無我壽者門或以不淨離欲門或以滅盡三昧門二有五頌別顯二十種門供等即門通入佛果故隨諸眾生病不同悉以法藥而對治隨諸眾生心所樂悉以方便而滿足隨諸眾生行差別悉以善巧而成就三一頌半結多所因由四悉檀故初半對治次半世界隨行差別即當為人而成就言謂第一義初半對治者對治文顯隨心所樂為世界者順心令喜故隨行差別即當為人者心行不同生善異故如云心寂靜應教禪定若心明利為說智慧悉以善巧而成就文則連上屬於為人謂第一義者謂要見理見理方得名成就耳又成就言通於上三前三悉檀皆為見理故如是三昧神通相一切天人莫能測四半頌結用難測五現諸法門三昧門竟有妙三昧名隨樂菩薩住此普觀察隨宜示現度眾生悉使歡心從法化第六有妙下十七頌明四攝攝生三昧門文分為二初一偈總標名用劫中饑饉災難時悉與世間諸樂具隨其所欲皆令滿普為眾生作饒益或以飲食上好味寶衣嚴具眾妙物乃至王位皆能捨令好施者悉從化或以相好莊嚴身上妙衣服寶瓔珞華鬘為飾香塗體威儀具足度眾生一切世間所好尚色相顏容及衣服隨應普現愜其心俾樂色者皆從道餘頌別顯於中分四初四頌布施攝初一偈半求受用者恣其所須次半偈求自在者施以王位又此施位即難行施以是可愛著故次偈身行法施後偈妙色恱心是無畏施又後二偈初身行法儀後服世妙飾貴恱物心隨求即與布施攝中前二偈有兩重釋先約財施所須王位皆屬外財故王位兼於身命亦屬內財又此施位下第二重釋次半偈可愛著物即三種難行之一次法及無畏兼前財三為一切施又將後二屬於遂求然凖瑜伽六度四攝各有九門頌云自性一切難一切門善士一切種遂求二世樂清淨自性皆一一切或二或三難行皆三一切門皆四善士皆五一切種皆六遂求皆七皆八二世樂皆九清淨皆十四攝即當三十三卷至十行品更說其相今䟽言即難行者以難行有三一物少自在施二可愛著物施三極大艱難獲財施今當第二難也又後二偈者是遂求施遂求有八一匱乏飲食而求乞者施以飲食二匱乏車乘而求乞者施以車乘三乏衣服四嚴具五資生什物六種種塗飾香鬘七舍宅八光明皆如初二句會文可知迦陵頻伽美妙音俱枳羅等妙音聲種種梵音皆具足隨其心樂為說法八萬四千諸法門諸佛以此度眾生彼亦如其差別法隨世所宜而化度次二頌愛語攝一切愛語謂慰喻慶恱勝益之言一切愛語等者下所列即三愛語一慰喻愛語二慶恱愛語三勝益愛語言種種梵音者即八種梵音一最好聲其音清雅如迦陵鳥二易了聲言辭辨了三和調四柔輭五不誤六不女七尊慧八深遠言俱枳羅者亦云都吒迦此云眾音合和微妙最勝皆愛語之具隨心說法應在後偈隨世所宜應在前偈以瑜伽一切愛語略有二種一隨世儀軌語二順正法教語今開示佛說八萬法門即順正教也言種種梵音者文中具列初二䟽釋後六但摽若釋應云三調和謂大小得中四柔軟者言無麤獷五不誤者言無錯誤六不女者其聲雄朗七尊慧者言無戰懼八深遠者臍輪𤼵聲隨心等者以後偈說八萬法門是順正法教語故應合云隨心為說前偈種種梵音故是隨世儀軌合言隨世所宜而化誘眾生苦樂利衰等一切世間所作法悉能應現同其事以此普度諸眾生一切世間眾苦患深廣無涯如大海與彼同事悉能忍令其利益得安樂三有二頌明同事攝物見菩薩俯同其事知有義利而修行故於中初頌一切同事八風等事皆悉同故後偈難行同事忍於諸苦而同事故初頌一切同事者瑜伽同事不舉別相但同上利行即名同事故利行居先則示同利衰等為一切也等取毀譽稱機苦樂忍於諸苦等者難行有三亦無別相即同三利行為三難行同事謂一諸未行勝善根因諸有情所行利行二現在耽著廣大財位眾具圓滿諸有情所行利行三餘外道本異邪見邪行所行利行同事例耳今於上三同事皆須忍苦若有不識出離法不求解脫離諠憒菩薩為現捨國財常樂出家心寂靜家是貪愛繫縛所欲使眾生悉免離故示出家得解脫於諸欲樂無所愛四有八頌明利行攝謂說趣義利之行以益有情於中初二偈一切利行此有三種一於現法利勸導利行謂令以德業招守財位以益近故經文略無二於後法利行謂勸捨財位清淨出家即當初偈三於現法後法利行謂勸離欲即後偈也又初一偈即難行利行此自有三一不識出離即外道異執二不求解脫即未種善因三現捨國財誘躭財位於此利行是謂難行菩薩示行十種行亦行一切大人法諸仙行等悉無餘為欲利益眾生故次一偈初句即攝二利行一即十種清淨利行也二令離十惡即此世他世樂利行次三句即善士利行慈心勸導等故一即十種等者謂一依外清淨有五二依內清淨有五依外五者一無罪利行二不轉利行三漸次四徧行五如應論廣釋其相依內五者一謂諸菩薩於諸有情起廣大悲意樂現前而行利行二諸菩薩於諸有情所作義利雖受一切大苦劬勞而心無倦深心歡喜為諸有情而行利行三安處最勝第一財位而自謙下如子如僕及離憍慢而行利行四心無愛染無有虛偽真實哀愍而行利行五起畢竟無復退轉慈愍之心而行利行次三句即善士利行者善士有五一於真實義勸導有情二於應時勸導三於能行攝勝妙義勸導四於有情柔軟勸導五於有情慈心勸導此之五相皆是大人之法慈心勸導舉後等初若有眾生壽無量煩惱微細樂具足菩薩於中得自在示受老病死眾患或有貪欲瞋恚癡煩惱猛火常熾然菩薩為現老病死令彼眾生悉調伏次二偈即遂求利行謂眾生為八纏所繞開解令離故名遂求初偈即化無愧纏以恃壽長不知進修不知此身但婬欲生終竟敗壞具諸煩惱故後偈開解無慚纏眾生餘畧不具初為八纏者論云此畧有八謂諸菩薩見諸有情於應慙處為無慙纏之所纏繞方便開解令離彼纏如無慙纏二無愧三昏沉四睡眠五掉舉六惡作七嫉八慳皆如無慙纏說如來十力無所畏及以十八不共法所有無量諸功德悉以示現度眾生記心教誡及神足悉是如來自在用彼諸大士皆示現能使眾生盡調伏次二偈即一切種利行初偈即應攝受者而攝受之後偈即應調伏者而調伏等即一切種利行者彼說或六或七總有十三六者一應攝受者正攝受之二應調伏者正調伏之三憎背聖教者除其恚惱四處中住者令入聖教五於三乘中令其成熟六已成熟者令得解脫云何七種謂諸菩薩安處一分所化有情於善資糧守護長養所謂一依下乘出離二依大乘出離三於遠離四於心一境性五於清淨諸障六於二乘而正安處七於無上正等菩提而得安處菩薩種種方便門隨順世法度眾生譬如蓮華不著水如是在世令深信後一偈即一切門利行謂不信令信故亦總結諸利行也後一偈即一切門等者此畧有四一不信令信二犯戒有情令戒圓滿三惡慧有情令慧圓滿四慳恡有情於捨圓滿今䟽文中畧舉其一瑜伽廣說利行居先略明同事居後此則先略明同事者以利行中若以行勸修與愛語相近若自示行即同事相近同事即是利行利行未必同事此二相近廣略互影耳又次下三昧亦同事故影六四攝攝生三昧門竟雅思淵才文中王歌舞談說眾所欣一切世間眾技術譬如幻師無不現或為長者邑中主或為賈客商人導或為國王及大臣或作良毉善眾論或於曠野作大樹或為良藥眾寶藏或作寶珠隨所求或以正道示眾生若見世界始成立眾生未有資身具是時菩薩為工匠為之示現種種業不作逼惱眾生物但說利益世間事呪術藥草等眾論如是所有皆能說一切仙人殊勝行人天等類同信仰如是難行苦行法菩薩隨應悉能作第七雅思下十七頌俯同世間三昧門於中三初六身同世間利益眾生若依若正無不示為或作外道出家人或在山林自勤苦或露形體無衣服而於彼眾作師長或現邪命種種行習行非法以為勝或現梵志諸威儀於彼眾中為上首或受五熱隨日轉或持牛狗及鹿戒或著壞衣奉事火為化是等作導師或有示謁諸天廟或復示入恒河水食根果等悉示行於彼常思己勝法或現蹲踞或翹足或臥草𣗥及灰上或復臥杵求出離而於彼眾作師首如是等類諸外道觀其意解與同事所示苦行世靡堪令彼見已皆調伏次六示同外道救彼邪黨初五別辨後一總結義如別說眾生迷惑稟邪教住於惡見受眾苦為其方便說妙法悉令得解真實諦三眾生迷惑下五頌明語業大用初一總明次三別顯後一總結或邊呪語說四諦或善密語說四諦或人直語說四諦或天密語說四諦分別文字說四諦決定義理說四諦善破於他說四諦非外所動說四諦或八部語說四諦或一切語說四諦隨彼所解語言音為說四諦令解脫次別中云或邊呪語者梵云達邏鼻茶曼達邏鉢底鞞言達邏鼻茶者是南印度中邊國名也此云消融曼達邏者呪也鉢底鞞者句也謂其國人稟性純質凡所出言皆成神呪若隣國侵害不用兵仗但以言破之彼自喪滅故曰消融呪句也或云唯童男童女方得言成呪句餘不得也又天密語等者婆沙七十九說世尊有時為四天王以聖語說四諦二王領解二不能解世尊憐愍故以南印度邊國俗語說四諦二天王中一解一不解世尊憐愍故復以一種篾戾車語說四聖諦時四天王皆得領解婆沙七十九者彼云毗奈耶說世尊有時為四天王以南印度邊國俗語說四聖諦謂毉泥迷泥瑜部達縣剌篾戾車語說四聖諦謂摩奢都奢僧攝摩薩縛怛囉毗剌達論引淨名圓音為難下釋有七一云有作是說佛以聖語說四聖諦能令一切所化有情皆得領解何以作此等語說答為滿彼意故彼天欲聞故下並取意引之二復次世尊欲顯於諸言音皆能善解故謂有疑佛不能餘語等三復次有所化者依佛不變形言而得受化有所化者依佛轉變形言而受化者四復有說者佛以一音說四聖諦不能令一切所化有情皆得領解世尊雖有自在神力而於境界不能改越如不能令耳見諸色等通圓音云答不須通非三識故諸讚佛頌言名過實如常在定不睡眠等皆過實也五復次如來言音徧諸聲境隨所欲語皆能作之故復伽陀作如是說六復次佛語輕利速疾轉故故云佛以一音演說法眾生各各隨所解七復次如來言音雖有多種而同有益故說一音釋曰然上七解前三可通後四淺近即彼小乘三藏說故篾戾車者三藏云惡中惡亦云奴中奴皆義翻耳善破於他者以因明比量等真能破故非外所動者真能立故不為他破所有一切諸佛法皆如是說無不盡知語境界不思議是名說法三昧力後一偈類結非唯說四諦六度萬行等皆然一心說法得語實性能起隨類之用名三昧力七俯同世間三昧門竟音釋掉杜弔切音去聲摧殄殄徒典切絕也絢煥絢許遠切煥音喚絢煥文彩光明貌繒疾陵切帛也饑饉饑居依切穀不熟也饉渠遴切菜不熟也鬘莫班切愜苦恊切快也諠憒諠兄袁切憒古對切諠憒謂諠譁憒亂也蹲踞蹲音存踞音據翹足翹渠遙切舉足也吒陟嫁切邏郎果切鞞駢迷切篾戾車篾莫結切梵語篾戾車此云邊地犍渠焉切鎧可亥切甲也文甲切
