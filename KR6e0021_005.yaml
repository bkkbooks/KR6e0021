body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述第二異生衆中總三十九衆相從為三第一雜類諸神衆第二阿修羅下八部四王衆第三三十三天下欲色諸天衆復有佛世界微塵數執金剛神今初有十九衆通名神者靈祇不測故文皆三𫨻第一標數辨類第二列名結數第三攝德圓滿今第一金剛神衆初辨類中以執持此杵守護佛故然一一類皆通有所表如地表心地海表德海等觀其歎德則知通意今此表般若堅利導於衆行到彼岸故所謂妙色那羅延執金剛神二所謂下列名結數然諸衆立名皆隨所得法門為物立稱一那羅延者此云堅固由見佛妙色皆不可壞故受此名那羅延者取下得法以釋此名下經云妙色那羅延執金剛神得見如來示現無邊色相身解脫門偈云汝應觀法王法王法如是色相無有邊普現於世間日輪速疾幢執金剛神二見佛身毛猶如日輪現種種光速摧障惱故名曰幢見佛者下經云日輪速疾幢執金剛神得佛身一一毛孔如日輪現種種光明雲解脫門偈云佛身一一毛光網不思議譬如淨日輪普照十方國舉此為例下皆凖之欲具釋者但看下經名義俱了餘三十八衆例此可知須彌華光執金剛神三見佛身光映蔽一切猶如須彌顯于大海神通等法如華開敷故清淨雲音執金剛神四圓音隨類如雷震故諸根美妙執金剛神五現為世主以美妙根令物悟故可愛樂光明執金剛神六智光演法令愛樂故大樹雷音執金剛神七寶飾妙相如華嚴樹方便警物如雷震音師子王光明執金剛神八福深相妙炳著光明如師子王處衆無畏密焰勝目執金剛神九慈眼視物為吉祥目神通之焰密現物前故蓮華光摩尼髻執金剛神十雨此嚴具及光明故如是等而為上首有佛世界微塵數如是等結數下諸衆皆類此知至得法處名當自顯恐厭繁文下略不釋皆於往昔無量劫中恆發大願願常親近供養諸佛隨願所行已得圓滿到於彼岸第三皆於下攝德圓滿十句分二初二句總彰願行由昔願力得預法會常為親侍由今行滿故能遍侍積集無邊清淨福業於諸三昧所行之境悉已明達獲神通力隨如來住入不思議解脫境界處於衆會威光特達隨諸衆生所應現身而示調伏一切諸佛化形所在皆隨化往一切如來所住之處常勤守護後積集下別顯滿相一福積淨業二智達定境事定之境隨事百千理定之境即真如實相不思議定則以無礙而為其境今皆智照故云明達三通隨佛住四入用難思五處衆超絶六應物調生七隨佛化形八護佛住處文並可知復有佛世界微塵數身衆神第二身衆神文三同前初辨類有二義一身謂神之自身衆即同生同名及所隨者凡有其一必更有二共有其三三故名衆能所合目名身衆神二約所主謂此類神專以變化多身為佛事故衆即同生同名者謂左右肩童子所謂華髻莊嚴身衆神光照十方身衆神海音調伏身衆神淨華嚴髻身衆神無量威儀身衆神最上光嚴身衆神淨光香雲身衆神守護攝持身衆神普現攝取身衆神不動光明身衆神如是等而為上首有佛世界微塵數皆於往昔成就大願供養承事一切諸佛所謂下二名三德文並可知復有佛世界微塵數足行神第三足行神亦有二義一謂依止足行衆生及守護故如下善見比丘足行之神持華承足故下德中戀仰如來二足所行處即道路神通表修行履佛所行故所謂寶印手足行神蓮華光足行神清淨華髻足行神攝諸善見足行神妙寶星幢足行神樂吐妙音足行神栴檀樹光足行神蓮華光明足行神微妙光明足行神積集妙華足行神如是等而為上首有佛世界微塵數皆於過去無量劫中親近如來隨逐不捨復有佛世界微塵數道場神第四道場神從所依所守得名下諸神衆類皆同此言道場者非唯護佛道場但有莊嚴道場之處即於中護故下德中願供養佛表護萬行道場及修行者故所謂淨莊嚴幢道場神須彌寶光道場神雷音幢相道場神雨華妙眼道場神華纓光髻道場神雨寶莊嚴道場神勇猛香眼道場神金剛彩雲道場神蓮華光明道場神妙光照耀道場神如是等而為上首有佛世界微塵數皆於過去值無量佛成就願力廣興供養復有佛世界微塵數主城神第五主城神表行德防御法城心城故如摩耶處説所謂寶峯光耀主城神妙嚴宮殿主城神清淨喜寶主城神離憂清淨主城神華燈焰眼主城神焰幢明現主城神盛福光明主城神清淨光明主城神香髻莊嚴主城神妙寶光明主城神如是等而為上首有佛世界微塵數皆於無量不思議劫嚴淨如來所居宮殿德中以己德行嚴佛宮殿者一佛殿為所守之最瑩飾為尊佛故二主伴善根互融攝故三瑩飾自心佛安處故復有佛世界微塵數主地神第六主地神表深重願荷負行德故亦表心地為依持故所謂普德淨華主地神堅福莊嚴主地神妙華嚴樹主地神普散衆寶主地神淨目觀時主地神妙色勝眼主地神香毛發光主地神恱意音聲主地神妙華旋髻主地神金剛嚴體主地神如是等而為上首有佛世界微塵數皆於往昔發深重願願常親近諸佛如來同修福業復有無量主山神第七主山神通表萬德高勝性皆間寂別表智德最高故德中云得清淨眼名中多有光稱所謂寶峯開華主山神華林妙髻主山神高幢普照主山神離塵淨髻主山神光照十方主山神大力光明主山神威光普勝主山神微密光輪主山神普眼現見主山神金剛密眼主山神如是等而為上首其數無量皆於諸法得清淨眼復有不可思議數主林神第八主林神表以無漏智導於衆行森聳建立故德中云皆有可愛光明所謂布華如雲主林神擢幹舒光主林神生芽發曜主林神吉祥淨葉主林神垂布焰藏主林神清淨光明主林神可意雷音主林神光香普遍主林神妙光逈曜主林神華果光味主林神如是等而為上首不思議數皆有無量可愛光明復有無量主藥神第九主藥神表行德伏惑資益法身若約利他則三業不空如藥樹王故下德中性皆離垢即伏惑去病也仁慈祐物即進善補益也名中總名主藥藥既不同神神各別吉祥者主香茅之類也清淨光明謂乳石之流名稱普聞如藥樹王雪山忍草等明見十方謂眼藥等約法凖之所謂吉祥主藥神栴檀林主藥神清淨光明主藥神名稱普聞主藥神毛孔光明主藥神普治清淨主藥神大發吼聲主藥神蔽日光幢主藥神明見十方主藥神益氣明目主藥神如是等而為上首其數無量性皆離垢仁慈祐物復有無量主稼神第十主稼神稼者樹五也表萬行法味資益自他他益稱心故德中大喜成就所謂柔軟勝味主稼神時華淨光主稼神色力勇健主稼神增長精氣主稼神普生根果主稼神妙嚴環髻主稼神潤澤淨華主稼神成就妙香主稼神見者愛樂主稼神離垢淨光主稼神如是等而為上首其數無量莫不皆得大喜成就復有無量主河神十一主河神即河伯之流也表法河流注潤益群品又於生死流拯彼漂溺江河淮濟清濁俱河故生死法流此神皆主第十一主河神即河伯之流者外典説為河伯故莊子秋水篇云秋水時至百川灌河涇流之大雨涘渚涯之間不辨牛馬言其廣也於是焉河伯欣然自喜以天下之美為盡在己順流而東行至於北海東靣而視不見水端於是焉河伯始旋其靣目望洋向若而歎曰野語有之曰聞道百謂萬分之一以為莫己若者我之謂也釋曰若即海若海神名也如下引之皆此章具今但取名河伯亦名馮夷故洛神賦云馮夷鳴鼓女媧清歌所謂普發迅流主河神普潔泉澗主河神離塵淨眼主河神十方遍吼主河神救護衆生主河神無熱淨光主河神普生歡喜主河神廣德勝幢主河神光照普世主河神海德光明主河神如是等而為上首有無量數皆勤作意利益衆生德中勤益生者謂遇沿流則平波息浪逢泝泳則微風輕動水性之屬深止而住居陸行之流富生而應采導百川而去害灌萬頃而開利為勤作意利益衆生約所表法隨意消息復有無量主海神十二主海神即海若之輩表具含萬德一一深廣也所謂出現寶光主海神成金剛幢主海神遠離塵垢主海神普水宮殿主海神吉祥寶月主海神妙華龍髻主海神普持光味主海神寶焰華光主海神金剛妙髻主海神海潮雷音主海神如是等而為上首其數無量悉以如來功德大海充滿其身名中三名遠離塵垢者瑜伽八十六云現斷煩惱離故遠塵彼隨眠離繫故離垢今約近事塵謂塵境垢即煩惱六根對境了彼性空故曰遠塵衆惑不行誠為離垢心境相藉離垢由於遠塵復有無量主水神十三主水神者通上河海等水及雨露霜雪等也表法水含潤等多義理故所謂普興雲幢主水神海潮雲音主水神妙色輪髻主水神善巧漩澓主水神離垢香積主水神福橋光音主水神知足自在主水神淨喜善音主水神普現威光主水神吼音遍海主水神如是等而為上首其數無量常勤救護一切衆生而為利益德中拯溺為救濟危為護謂己溺邪見貪愛水者救之將沉者護之而為利益即雲雨等潤發生萬物也法合可知復有無數主火神十四主火神即宋無忌之流也以顯智慧火燒煩惱薪成熟善品破無明暗耳所謂普光焰藏主火神普集光幢主火神大光普照主火神衆妙宮殿主火神無盡光髻主火神種種焰眼主火神十方宮殿如須彌山主火神威光自在主火神光明破暗主火神雷音電光主火神如是等而為上首不可稱數皆能示現種種光明令諸衆生熱惱除滅德中夫火有二能一能為益二能為今用益止表法亦爾示慧光以去暗用益也除惑若之熱惱止也復有無量主風神十五主風神通表方便無住無所不摧別表如下所謂無礙光明主風神普現勇業主風神飄擊雲幢主風神淨光莊嚴主風神力能竭水主風神大聲遍吼主風神樹杪垂髻主風神所行無礙主風神種種宮殿主風神大光普照主風神如是等而為上首其數無量皆勤散滅我慢之心復有無量主空神十六主空神表法性空別即離染周遍等亦各如名辨所謂淨光普照主空神普遊深廣主空神生吉祥風主空神離障安住主空神廣步妙髻主空神無礙光焰主空神無礙勝力主空神離垢光明主空神深遠妙音主空神光遍十方主空神如是等而為上首其數無量心皆離垢廣大明潔德中若情塵亂起翳本性空智日高升則情雲自卷空有日而廓爾無際智合理而杳然無涯故云爾耳復有無量主方神十七主方神即東方青帝等類也表顯邪正方隅使行無迷倒即東方者此主五方有五帝東方甲乙木其色青故東方為青帝南方丙丁火其色赤為赤帝西方庚辛金其色白為白帝北方壬癸水其色黑為黑帝中央戊己土其色黃為黃帝若十二神即一方有三故故成十二大集經説十二獸皆是大菩薩示迹為之如彼經説所謂遍住一切主方神普現光明主方神光行莊嚴主方神周行不礙主方神永斷迷惑主方神普遊淨空主方神大雲幢音主方神髻目無亂主方神普觀世業主方神周遍遊覽主方神如是等而為上首其數無量能以方便普放光明恆照十方相續不絶德中身智放光無不引攝名普放也無時不放所以稱恆如日周天故相續不絶復有無量主夜神十八主夜神表於無明黑暗生死長夜導以慧明令知正路所謂普德淨光主夜神喜眼觀世主夜神護世精氣主夜神寂靜海音主夜神普現吉祥主夜神普發樹華主夜神平等護育主夜神遊戲快樂主夜神諸根常喜主夜神出生淨福主夜神如是等而為上首其數無量皆勤修習以法為樂德中夜分亡寢是曰勤修翻彼長迷故以法為樂復有無量主晝神十九主晝神於晝攝化顯行德恆明也所謂示現宮殿主晝神發起慧香主晝神樂勝莊嚴主晝神香華妙光主晝神普集妙藥主晝神樂作喜目主晝神普現諸方主晝神大悲光明主晝神善根光照主晝神妙華瓔珞主晝神如是等而為上首其數無量皆於妙法能生信解恆共精勤嚴飾宮殿德中先修正解後勤正行有信無解增長無明有解無信還生邪見信因解淨解藉信深晝之義也上來多主器界故但名神準梵本除金剛神餘皆女神表慈育故菩薩同於彼類以攝衆生自下攝領有情皆受王稱並是丈夫復有無量阿修羅王第二八部四王衆文有八假前四雜類後四能統是天王所統是八部今初阿修羅亦云阿素落梵音楚夏耳婆沙譯為非天佛地論云天趣所攝以多行諂媚無天實行故曰非天依阿毗曇亦鬼趣攝諂曲覆故正法念經鬼畜二攝以羅睺阿修羅是師子子故伽陀經天鬼畜攝具上説故由此或開六趣或合為五多好鬪諍懷勝負故或居衆相山中或居海下如正法念説然有大力者廣修福故今之修福有懷勝負諂媚心者多生其中依阿毗曇亦鬼趣攝者若依雜心第八修多羅品亦畜生趣攝有言阿修羅與天同趣是故説言汝先是天問若然何不見天帝耶答諂曲所覆故有説是大力餓鬼天趣不攝故問若爾釋天云何與相習近耶答天貪色故勝負多故所謂羅睺阿修羅王毗摩質多羅阿修羅王巧幻術阿修羅王大眷屬阿修羅王大力阿修羅王遍照阿修羅王堅固行妙莊嚴阿修羅王廣大因慧阿修羅王出現勝德阿修羅王妙好音聲阿修羅王如是等而為上首其數無量羅睺此云攝惱以能將手隱攝日月令天惱故二毗摩此云𮈔也質多羅種種也謂此王能以一𮈔幻作種種事故悉已精勤摧伏我慢及諸煩惱德中實者因果俱慢故權應偏摧非不斷餘故云及也復有不可思議數迦樓羅王二迦樓羅昔云金翅正云妙翅以翅有種種寶色莊嚴故此就狀翻若敵對翻此云大嗉項以常著龍於嗉中故此鳥能食龍魚七寶然鳥及龍各具四生謂卵胎濕化後後勝前前劣不能食勝謂卵生鳥不能食胎等勝能噉劣化食四生如增一辨以化食化暫得充虛亦表菩薩攝生故離世間品云菩薩迦樓羅如意為堅足乃至搏撮人天龍安置涅槃岸化食四生者化最勝故濕生鳥食濕胎卵三生龍胎生鳥食胎卵二生龍卵生鳥唯食卵生龍然劣不能食勝若有食者其鳥即死而可食者日食一龍王五百小龍繞四天下周而復始次第取食其鳥命將盡時至海取龍為龍吐毒復不能食飢火所燒聳翅入海直下至風輪際為風所吹還復却上如是七返無處停足遂至金剛山頂命終以食龍故其身毒氣發火自燒難陀龍王恐燒寶山降雨滅火滴如車軸其身肉消散唯有心在大如人䏶紺琉璃色輪王得之用為珠寶帝釋得之為髻中珠亦表菩薩下約表以釋引文云乃至者彼經具云菩薩迦樓羅如意為堅足方便勇猛翅慈悲明淨眼住一切智樹觀三有大海摶撮天人龍安置涅槃岸所謂大速疾力迦樓羅王大速疾力者增一中説此鳥食龍從金剛山頂鐵杈樹下入海取龍水未合間還至本樹是為速疾無能壞寶髻迦樓羅王清淨速疾迦樓羅王心不退轉迦樓羅王大海處攝持力迦樓羅王大海處攝持力者即是攝彼命將盡者食之而龍受三歸及袈裟一縷在身則不可取菩薩亦爾如前引離世間品説又出現云取善根熟衆生置佛法中此為命盡若心有邪歸斷見所覆則不可取而龍受三歸者菩薩處胎經佛自説昔為金翅鳥七寶宮殿等時入大海求龍為食時彼海中有化生龍龍子八日十四日十五日受如來齋八禁戒法時鳥銜龍出海金翅鳥法若食龍時先從尾吞求尾不得已經日夜明日龍出尾示金翅鳥云化生龍者我身是也我若不持八關齋法者汝可食我我奉齋戒汝屈滅我金翅聞已悔過自責云佛之威神甚深難量請龍入宮龍即隨入乃請龍受八戒一緌在身即觀佛三昧海經又出現下即彼如來行中金翅闢海喻喻如來無礙行經云佛子譬如金翅鳥王飛行虛空回翔不去以清淨眼觀察海內諸龍宮殿奮勇猛力以左右翅鼓揚海水悉令兩闢知龍男女命將盡者而搏取之如來應正等覺金翅鳥王亦復如是住無礙行以淨佛眼觀察法界諸宮殿中一切衆生若種善根已成熟者如來奮勇猛十力以止觀兩翅鼓揚生死大愛海水使其兩闢而撮取之置佛法中令斷一切妄想戲論安住如來無分別無礙行釋曰觀前經文自知廣略下釋救攝引出現品亦是此文堅固淨光迦樓羅王巧嚴冠髻迦樓羅王普捷示現迦樓羅王普觀海迦樓羅王普觀海者即周四天下求命盡龍普音廣目迦樓羅王如是等而為上首不思議數悉已成就大方便力普能救攝一切衆生德中大方便力即雖了衆生空而能入有是十力止觀也普能救攝即鼓生死大愛海水取善根熟者如出現品説復有無量緊那羅王三緊那羅者此云疑神謂頂有一角形乃似人面極端正見者生疑為是人耶為非人耶為此立稱依雜心論畜生道攝亦云歌神以能歌詠是天帝執法樂神即四王眷屬表菩薩示衆生形而非衆生常以法樂娛衆生故亦云歌神即唐三藏譯所謂善慧光明天緊那羅王妙華幢緊那羅王種種莊嚴緊那羅王恱意吼聲緊那羅王寶樹光明緊那羅王見者欣樂緊那羅王最勝光莊嚴緊那羅王微妙華幢緊那羅王動地力緊那羅王攝伏惡衆緊那羅王如是等而為上首其數無量皆勤精進觀一切法心恆快樂自在遊戲德中要勤觀察則得法樂怡神自他兼樂為自在遊戲音釋杵歌呂切擢直角切聳也逈曜逈戶茗切寥遠也曜弋笑切光照也聳荀勇切幹居案切與幹同木旁生者為枝正出為幹沿同浴夷然切循也軟乳𭀚切柔也漩澓漩音旋澓音伏漩澓水回流也蒲報切疾雨也泝蘇故切逆流而上也泳為命切遊泳也鬥丁候切競也嗉蘇故切鳥吭也樹杪杪弭沼切木末也搏撮搏怡各切擊也撮倉括切拯音整扠初加切木歧枝也阿修羅梵語也亦云阿素洛此云無酒又名非天迦樓羅梵語也亦云揭路荼此云金翅鳥緊那羅梵語也亦云緊捺洛此云疑神又云人非人緊居忍切䏶部禮切股也
