body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述爾時光明過百千世界遍照東方百萬世界南西北方四維上下亦復如是彼一一世界中皆有百億閻浮提乃至百億色究竟天其中所有悉皆明現彼一一閻浮提中悉見如來坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其大菩薩謂文殊師利等所從來國謂金色世界等本所事佛謂不動智如來等第七重光照十方百萬世界此下四假答法性問佛以功德為法性故即分為四初一總顯內外包攝德二方便幹能德三大悲救攝德四因果圓遍德今初假爾時一切處文殊師利菩薩各於佛所同時發聲説此頌言如來最自在超世無所依具一切功德度脫於諸有無染無所著無想無依止體性不可量見者咸稱歎光明遍清淨塵纍悉蠲滌不動離二邊此是如來智偈中分二前五歎佛法難思後五示入方便今初分三初三直就佛明次一對機以辨後一約法以明今初初一句所緣及一切種智清淨於所緣所知中無礙智自在轉故次句所依清淨煩惱習氣永無餘故三一切種心清淨一切善根皆積集故四具大悲故初句所緣者契經諸論皆説如來一百四十不共功德今依瑜伽四十九説論云依如來住及依如來到究竟地諸佛世尊有百四十不共佛法謂諸如來三十二大人相八十種隨形好四一切種清淨十力四無所畏三念住三不護大悲無忘失法永害習氣及一切種妙智今經略具初三句中具四一切種清淨言四種者一一切種所依清淨謂煩惱粗重并諸習氣於自所依無餘永滅故又於自體如自所欲取住捨中自在而轉二一切種所緣清淨謂於種種若化若變若所顯現一切所緣皆自在轉故三一切種心清淨謂如前説一切心粗重永滅離故又於心中一切種善根皆積集故四一切種智清淨謂如前所説一切無明品粗重永滅離故又遍一切所知境中知無障礙智自在轉故上四中除第二皆有二釋今疏之中皆具四淨而文少略取順經耳初如來最自在句有二清淨所緣是第二一切種智是第四於所緣中無礙轉釋第二所緣清淨於所知中無礙智自在轉即是第四一切智清淨彼論二釋今取後釋此二皆是最自在義次句所依清淨者即經超世無所依是第一淨可知三一切種心清淨者即經具一切功德是第三心清淨亦二釋中後對論易知五無憂喜之離染安住捨故故無所著六惡想都絶不依止名聞利養故七八二句體雖叵量具相好故稱歎五無憂喜者即無染無所著是三念住謂一者一心聽法不憂二者一心聽法不喜三者常住捨心謂有憂喜即染不住捨即著今無染無著故具三念住六惡想下即經無想無依止是三不護一惡想都絶二不依止名聞三不依止利養今無想成初一無依止成後二九智光遍覺離倒名淨身光可知十永害習氣故十一住正念故離邊常明記故不動亦是成上智光所觀故結云佛智又此一偈即四無所畏光明即正覺清淨即出苦滌纍漏盡及與障道無畏不動即無畏之義外難不能傾故不墮勝負二邊故是無畏智九智光遍覺即一切種妙智十可知十一即無忘失法故常明記又此一偈者謂光明遍清淨屬無畏無畏有四一一切智無畏二漏盡無畏三出障道無畏四出苦道無畏至十藏品當釋唯十力智在第三約法以顯中則百四十功德具矣若有見如來身心離分別則於一切法永出諸疑滯二一偈對機以辨中身心離分別者含於二意一約佛以三業隨智慧行等故二約機即知上功德而能身心無分別者得無疑益一切世間中處處轉法輪無性無所轉導師方便説三有一偈約法以顯雖法界遍轉無性寂滅故無所轉假以言宣云方便説其能轉智即十力智於法無疑惑永絶諸戲論不生分別心是念佛菩提後五示入方便者上來説佛不離功德菩提上所説法不離教義次第令入初偈令念菩提初句善決性相次二句契理絶想以生分別想即戲論故具斯二義為念菩提故大般若云覺法自性離諸分別同菩提故又心絶動搖言亡戲論又瑜伽九十五有六種戲論故名為諸故大般若下即文殊分中如前已引又心絶動搖亦是此經次後那伽室利分那伽云龍即龍吉祥菩薩妙吉祥菩薩欲入城乞食龍吉祥問云我欲入城為有情故巡行乞食妙吉祥云隨汝意往然於行時勿得舉足勿得下足勿屈勿伸勿起於心勿興戲論勿生路想城邑想大小男女想所以者何菩提遠離諸所有想無高無下無卷無舒心絶動搖言忘戲論無有量今此唯用後一對耳又瑜伽者一顛倒戲論二唐捐戲論三諍競戲論四於他分別勝劣戲論五分別工巧養命戲論六耽著世間財食戲論動搖尚無斯六豈有了知差別法不著於言説無有一與多是名隨佛教次偈隨教上二句了法亡言次句得旨方名隨順多中無一性一亦無有多如是二俱捨普入佛功德次偈入佛功德上二句雙存一多相別故次句雙泯相形奪故一因於多有多中應有一多因於一有一中應有多今多中無一一無從矣一中無多多無從矣故二俱捨也而性相融通入一即是入多名普入也次偈入佛等者文有三𫨻初略釋經文然一多相依互為本末通有四義一相成義則一多俱立以互相持有力俱存也即初二句二相害義形奪兩亡以相依故各無性也即二俱捨是三互存義以此持彼不壞彼而在此彼持此亦爾故上文云一中解無量等是四互泯義以此持彼彼相盡而唯此以彼持此此相盡而唯彼故下文云知一即多多復即一是也諸文各據一義故不相違矣二然一多下束成四義以順經文復總收之以為十義一孤標獨立二雙現同時三兩相俱亡四自在無礙五去來不動六無力相持七彼此無知八力用交徹九自性非有十究竟離言三復總𭣣下融成十門一孤標獨立者即前多中無一性一亦無有多二法互無故得獨立亦一即多而唯多多即一而唯一廢己同他故云獨立二雙現同時者即下經云知以一故衆知以衆故一無一即無多無多即無一故二雙現更無前後如牛二角三兩相俱忘者兩即前二俱捨也四自在無礙者欲一即一不壞相故欲多即多一即多故一既如此多亦準之常一常多常即不即故云自在五去來不動者一入多而一在多入一而多存若兩鏡相入而不動本相相即亦然六無力相持者因一有多多無力而持一因多有一一無力而持多七彼此無知者二互相依皆無體用故不相知故覺首云諸法無作用亦無有體性是故彼一切各各不相知八力用交徹者即前一中解無量無量中解一九自性無有者互為因起舉體性空十究竟離言者不可言一不可言非一不可言亦一亦非一不可言非一非非一不可言相即以相入故不可言相入以相即故不可言即入不壞相故不可言不即不入互交徹故口欲辨而辭喪心將緣而慮亡唯證方知同果海故一多既爾染淨等法無不皆然衆生及國土一切皆寂滅無依無分別能入佛菩提次偈入佛菩提依正皆寂故無所依智契於斯故無分別衆生及國土一異不可得如是善觀察名知佛法義後偈知法義上明生土皆寂不可言異依正兩殊不可云一爾時光明過百萬世界遍照東方一億世界南西北方四維上下亦復如是彼一一世界中皆有百億閻浮提乃至百億色究竟天其中所有悉皆明現彼一一閻浮提中各見如來坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其大菩薩謂文殊師利等所從來國謂金色世界等本所事佛謂不動智如來等第八重光照一億界前云百萬今十倍於前即千萬為一億也爾時一切處文殊師利菩薩各於佛所同時發聲説此頌言十偈歎佛權實雙行方便幹能然方便之言略有三意一以因中十種加行方便之力修成佛果自在之德二但是差別之用皆名方便其無礙慧無若干故三即實之權起用自在故名方便今文具三皆三句辨相一句結名今文具三者具上三方便也然其十偈皆具此三取其相顯八九兩偈但有第二故下疏云上之二偈但了差別即是方便餘之八偈皆是即實之權約其因修總是加行方便之力如第四偈善巧通達一切法差別用也正念勤修涅槃道加行方便也上二皆權樂於解脫離不平即是稱實對上故為即實之權也餘可意得智慧無等法無邊超諸有海到彼岸壽量光明悉無比此功德者方便力初偈即體起用為方便然有六義一智超下位二證法無邊三解脫有海四具上三義到涅槃岸五壽兼真應六身光無涯皆佛功德所有佛法皆明了常觀三世無厭倦雖緣境界不分別此難思者方便力二歎寂照方便初句橫照次句豎窮次句即寂照而無思故難思也樂觀衆生無生想普見諸趣無趣想恆住禪寂不繫心此無礙慧方便力三歎佛事理無礙方便初二句有無無礙次一句定散無礙初二句者無即是理有即是事次句定散無礙者恆住禪寂定也由契心性理也禪不繫心不礙散也即涉事也善巧通達一切法正念勤修涅槃道樂於解脫離不平此寂滅人方便力四歎佛修無修方便初句善窮性相次句無念勤修樂於解脫釋修涅槃離不平者釋前正念以不見生死為雜染涅槃為清淨此二無差為真寂滅有能勸向佛菩提趣如法界一切智善化衆生入於諦此住佛心方便力五歎回向方便初二句趣如法界是回向實際餘皆回向菩提次句回向衆生住如化物故為方便初二句者二句之中唯取四字是向實際初句及一切智皆回向菩提佛所説法皆隨入廣大智慧無所礙一切虛行悉已臻此自在修方便力六證知方便初句隨順證入次句知而無障次句知遍趣行即利生法即知即證為自在修也恆住涅槃如虛空隨心化現靡不周此依無相而為相到難到者方便力七寂用方便初句寂次句用次句寂用無礙為無住涅槃凡小難到晝夜日月及年劫世界始終成壞相如是憶念悉了知此時數智方便力八時數方便可知一切衆生有生滅色與非色想非想所有名字悉了知此住難思方便力九難思方便初句了生滅剎那一期皆悉了知次十一字了相即衆生體不出三界九地下二界是色無色界非色二界八地皆名為想無想天為非想有頂非想非非想悉了知者能了兼了其性即是無生此是無邊之境故難思也上二偈但了差別即是方便二界八地者以欲色二界有五地皆全有想其無想天在第四禪不攝一地全故八地有想其有頂天是第九地不屬於想及與無想故今無色一界四地不全屬有無故云二界其無色界下之三地由是有想故舉八地而以攝之過去現在未來世所有言説皆能了而知三世悉平等此無比解方便力十無比方便初二句知相上句豎窮下句橫攝次句知性此二不二故無比即為方便也爾時光明過一億世界遍照東方十億世界南西北方四維上下亦復如是彼一一世界中皆有百億閻浮提乃至百億色究竟天其中所有悉皆明現彼一一閻浮提中悉見如來坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其大菩薩謂文殊師利等所從來國謂金色世界等本所事佛謂不動智如來等第九重光照十億界歎佛大悲救生德爾時一切處文殊師利菩薩各於佛所同時發聲説此頌言廣大苦行皆修習日夜精勤無厭怠已度難度師子吼普化衆生是其行十偈多以第四句為結於中分三初偈總標行海已圓而能普化次八別顯化類不同後一總結悲智周遍初中初句無餘修廣謂遍受大謂極苦次句長時無間次句功行已圓極惡難度已能度故云何能度謂師子吼師子吼者名決定説定説一切衆生皆有佛性度一闡提定説無我度諸外道定説欲苦不淨以度波旬定説如來常樂我淨度諸聲聞定説大悲以度緣覺定説如來無礙大智以度菩薩故云普化衆生初句無餘修者此有四修一無餘修以皆修故次句有二修一長時修二無間修日夜不息即是長時精勤無怠故無有間難度能度勇猛修也此偈是總示度相謂師子吼者名決定説即涅槃二十七師子吼品下説法度類略有六亦攝下偈文有四節初偈即説佛性度一闡提闡提佛性無明所覆迷真起妄如墮大河二有一偈無我化外三有六偈皆説欲苦度於波旬波旬為主諸類皆攝故四有一偈濟度三乘聲聞法執不了性空緣覺無悲不隨六道故悲智雙流普教羣生即化菩薩衆生流轉愛欲海無明網覆大憂迫至仁勇猛悉斷除誓亦當然是其行次八別中云何普化初化癡愛衆生前半所救如人墮海五事難出一水深二波迅三迷暗四蟲執五憂迫失力衆生欲海流轉亦爾此中愛有二義一已得無厭深廣如海二於未得處無足如流癡亦二義一迷不見過二妄見有德結網自纏五由前癡愛招大憂苦次句舉古佛已行亡身為物故曰至人後句立誓當作五事難出一水深即愛欲海二即流轉三即無明四即網覆義兼蟲執羅不得出五即大憂迫次衆生下約法釋五而四釋蟲執云妄見有德結網自纏世間放逸著五欲不實分別受衆苦奉行佛教常攝心誓度於斯是其行二度著欲衆生上半所救放逸者著欲緣也著五欲欲事也不實分別欲因也受衆苦欲果也未得已失皆受大苦正得亦苦橫生樂想況當受三塗故云衆苦次句受教自修後句立誓轉化衆生著我入生死求其邊際不可得普事如來獲妙法為彼宣説是其行三救著我衆生前半所救著我為因受生死果未證無我浩無邊際次句救方説二無我唯佛有之衆生無怙病所纏常淪惡趣起三毒大火猛焰恆燒熱淨心度彼是其行四救惡趣衆生三句所救謂無善可恃顯唯惡業及惑病因招三惡趣展轉復起三毒之過因果俱燒末句救方但淨其心因亡果喪衆生迷惑失正道常行邪徑入暗宅為彼大然正法燈永作照明是其行五救邪見衆生前半所救上句明因迷四真諦惑現境故次句起見邪見翳理即為暗宅後半能救之方衆生漂溺諸有海憂難無涯不可處為彼興造大法船皆令得度是其行六救著有衆生前半所救三有深廣總喻於海漂至人天還溺惡趣未遇如來多成難處希求不已故名為憂未有對治故無涯畔具上諸失故不可處後半能救可知衆生無知不見本迷惑癡狂險難中佛哀愍彼建法橋正念令升是其行七救無明衆生前半所救由本住無明故不見無住之本迷理惑事狂走於生死之中後半能救佛既授法正念即升也見諸衆生在險道老病死苦常逼迫修諸方便無限量誓當悉度是其行八救險道衆生前半所救人天報危臨墮惡趣名為險道能救可知聞法信解無疑惑了性空寂不驚怖隨形六道遍十方普救羣迷是其行後一偈總結者前半結有教證之智能導無緣之悲次句結有同體之悲能遍十方六道後句結於所救不越羣迷爾時光明過十億世界遍照東方百億世界千億世界百千億世界那由他億世界百那由他億世界千那由他億世界百千那由他億世界如是無數無量無邊無等不可數不可稱不可思不可量不可説盡法界虛空界所有世界南西北方四維上下亦復如是彼一一世界中皆有百億閻浮提乃至百億色究竟天第十重光照十方總結無盡長行分二先明世界數量略有十七漸窮法界其中所有悉皆明現彼一一閻浮提中悉見如來坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其大菩薩謂文殊師利等所從來國謂金色世界等本所事佛謂不動智如來等後明彼諸世界所有皆現爾時一切處文殊師利菩薩各於佛所同時發聲説此頌言一念普觀無量劫無去無來亦無住如是了知三世事超諸方便成十力十頌明因果圓遍德於中分二前四示佛因果遍説後六勸物順行今初初一偈因圓果滿彰有説因初三句三達因圓後句十力果滿初三句者三達即達三世於中初句了相無量劫言通過及未次句了性過去心不可得故云無去未來心不可得故云無來現在心不可得故云無住淨名云若過去過去心已滅若未來未來心未至若現在現在心無住現在是住亦生即滅故云無住第三句結知佛如是知云何如是非唯知無去等亦知其相又性相無礙又一念能知為如是了十方無比善名稱永離諸難常歡喜普詣一切國土中廣為宣揚如是法次一偈大用外彰正明説法周遍可知為利衆生供養佛如其意獲相似果於一切法悉順知遍十方中現神力從初供佛意柔忍入深禪定觀法性普勸衆生發道心以此速成無上果後二對因辨果初一偈遍因初句為因三句皆果法供養佛故於法順知普為衆生故能遍用斯即等流名相似果晉經云正心供養明是法供養也後一偈深因故能速證初二句六度自利謂供佛是檀意柔兼戒從初至末是進䇿也次句利他兼方便等二行既圓則佛果朝夕故云速成無方便者勸物涉有故是方便勸生發心即是大願衆生無邊誓願度佛道無上誓願成故即修習力為智決斷佛果朝夕者此有二意一明果速匪朝即夕故一念相應功圓曠劫此為正意結云速成二朝夕是海文選云挹朝夕之池者無以測其淺深謂此是佛果大海以深廣故與此相應亦得速成十方求法情無異為修功德令滿足有無二相悉滅除此人於佛為真見後六偈勸物順行佛昔如是行今得説法果令物行之亦得斯果初一偈求法行二説法行三聽法行四有三偈破相行今初初句離過勝他名利名為異情次二句顯德一句滿福一句圓智又無異者於一切法都無所求若此之求則見真法身於一切者即淨名經身子念座因有此示普往十方諸國土廣説妙法興義利住於實際不動搖此人功德同於佛二説法行前半説法益物義利者令衆生得離惡攝善故此世他世益故世出世益故福德智慧益故上四對皆先義後利後半若無説無示同佛説也上四對者即佛地論若無説下亦淨名目連章經云夫説法者無説無示其聽法者無聞無得説約教道示約證道無聞則不如言取故為真聞無得則心無所得方真證得無聞無得即後偈聽法行中今此説法但無説示亦同寶積歎佛偈云善能分別諸法相於第一義而不動故言同佛如來所轉妙法輪一切皆是菩提分若能聞已悟法性如是之人常見佛三聽法行兼顯法輪之體初句教法次句即教成行無有一文一法非菩提因豈止三十七品次句悟理揀去隨文後句理無廢興故常見佛果也次句悟理者不隨文故無聞悟理故無得不見十力空如幻雖見非見如盲覩分別取相不見佛畢竟離著乃能見衆生隨業種種別十方內外難盡見佛身無礙遍十方不可盡見亦如是譬如空中無量剎無來無去遍十方生成滅壞無所依佛遍虛空亦如是後三破相行初一正明後二轉釋今初初三句反顯金容煥目而非形安可以相取後句正顯法性超乎視聽唯可虛己而求後二轉釋云何不見前偈以妄喻真衆生妄惑尚不可窮諸佛契真如何見盡後偈復轉釋云雖遍十方不可定取如剎遍空有其四義一多剎滿空二體無來去三不妨成壞四無別所依佛身遍空亦具四義一頓遍多剎二恆不去來三應有出沒四體用無依是故佛身亦不可以遍空而取耳上來三品答初十句所依果問竟音釋蠲滌蠲古玄切潔也滌音狄淨也滯直例切凝滯也臻側詵切至也一闡提闡齒善切梵語一闡提此云信不具漂溺漂音飄浮也溺奴歷切沒也
