body:
  text: 唐于闐國三藏沙門實義難陀譯唐清涼山大華嚴寺沙門澄觀撰述復有無量摩睺羅伽王四摩睺羅伽者此云大腹行即蟒之類亦表菩薩遍行一切而無行也所謂善慧摩睺羅伽王清淨威音摩睺羅伽王勝慧莊嚴髻摩睺羅伽王妙目主摩睺羅伽王如燈幢為衆所歸摩睺羅伽王最勝光明幢摩睺羅伽王師子臆摩睺羅伽王衆妙莊嚴音摩睺羅伽王須彌堅固摩睺羅伽王可愛樂光明摩睺羅伽王如是等而為上首其數無量皆勤修習廣大方便令諸衆生永割癡網德中此類聾騃故令方便捨癡復有無量夜叉王五夜叉王初一是北方天王即毗沙門是也若從能領是天衆攝今從所領為名然四王各領二部從一立稱夜叉此云輕捷飛空速疾故亦云苦活此天又領一部名羅剎此云可畏所謂毗沙門夜叉王自在音夜叉王嚴持器仗夜叉王大智慧夜叉王焰眼主夜叉王金剛眼夜叉王勇健臂夜叉王勇敵大軍夜叉王富資財夜叉王力壞高山夜叉王如是等而為上首其數無量名中云毗沙門者此云多聞以福德之名聞四方故此一是天夜叉之王餘九是夜叉夜叉即王雖一是天又從所領況九皆夜叉故非天衆下三例然如龍中娑竭羅王豈是天耶皆勤守護一切衆生德中此類飛空噉人故菩薩示為其王翻加守護亦令愛見羅剎不害法身慧命亦令愛見者涅槃十一浮囊喻中羅剎乞浮囊合以愛見羅剎謂一切衆生或因貪愛煩惱破戒如有人明信因果正見在懷但為惑纏遂破禁戒名愛羅剎二者以見不正撥無因果起諸邪見斷常等見便破禁戒謂破無罪名見羅剎但彼令破戒此害慧命以之為異羅剎義同復有無量諸大龍王六龍王亦初一是天即西方天王所謂毗樓博叉龍王娑竭羅龍王毗樓博叉唐三藏譯云醜目毗樓醜也博叉目也日照三藏譯云毗遍也多也樓者具云嚕波此云色也博吃叉此云諸根也謂眼等諸根有種種色故以為名此不必醜此王主二部謂龍及富單那富單那者此云熱病鬼也娑竭羅此云海也於大海中此最尊故獨得其名雲音妙幢龍王焰口海光龍王普高雲幢龍王德叉迦龍王德叉迦舊云多舌以嗜語故正云能害所害德叉者能害也迦者所害也謂若瞋噓視人畜皆死無邊步龍王清淨色龍王普運大聲龍王無熱惱龍王無熱惱者即阿耨達池之龍也諸龍有四熱惱今皆離故四熱至下當釋智論云此龍是七地菩薩須彌藏經云是馬形龍主又一切龍總有五種形類一象形善住龍王為主二蛇形難陀龍王為主三馬形阿那婆達多龍王為主四魚形婆樓那龍王為主五蝦蟇形摩那斯龍王為主須彌藏者經有兩卷此即下卷功德天自敘云我與世尊往昔於因陀羅幢相王佛所同時發誓願今願悉滿心意滿足是故如來出現於世我今得住功德之處我今雖復住功德處猶未圓滿昔本誓願何以故此處多有象龍下即義引謂惡龍惱害衆生請佛除滅佛告須彌藏龍仙菩薩云汝於往昔然燈佛所為化諸龍起大勇猛今四生龍有於惡毒氣毒見毒觸毒齧毒貪瞋癡毒云何當令如法除滅彼菩薩答我入其窟入深三昧彼當降伏廣說竟云我從阿僧祗劫勇猛精進故能教化一切衆生此諸龍王於大乘法精進修行謂此善住龍王為一切象形龍主此難陀龍王為一切蛇形龍主此阿耨達龍王為一切馬形龍主此婆樓那龍王為一切魚形龍主此摩那蘇婆帝龍王為一切蝦蟇形龍主如是等諸大龍王能與衆生作諸衰惱自餘諸龍自力不堪作上衰患此五大龍安住大乘有大威德是大龍王各各佛前率諸眷屬不令起作如上灾禍於佛法僧三寶種性久住於世不令速滅如是等而為上首其數無量莫不勤力興雲布雨令諸衆生熱惱消滅德中外則雲行雨施散去炎毒內則慈雲廣被法雨普霑散業惑之熱惱德中雲行雨施者語出周易乾卦象曰大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乘六龍以御天乾道變化各正性命保合大和乃利貞首出庶物萬國咸寧釋曰乾為龍也六爻皆龍今釋於龍宜取乾德況雲行雨施復有無量鳩槃茶王七鳩槃茶王所謂增長鳩槃茶王龍主鳩槃茶王善莊嚴幢鳩槃茶王普饒益行鳩槃茶王甚可怖畏鳩槃茶王美目端嚴鳩槃茶王高峯慧鳩槃茶王勇健臂鳩槃茶王無邊淨華眼鳩槃茶王廣大天面阿修羅眼鳩槃茶王如是等而為上首其數無量初一是南方天王即毗樓勒叉此云增長主謂能令自他善根增長故此王更領一部謂薜荔多薜荔多者此云魘魅鬼餘如音義餘如音義者前後不多引音義以鳩槃茶此譯為陰囊其狀稍隈故指在音義耳舊云冬苽鬼亦以狀翻皆勤修學無礙法門放大光明德中此類障礙深重故偏明無礙自學權實無礙法界智光以利衆生復有無量乾闥婆王八乾闥婆此云尋香謂諸樂兒不事生業但尋諸家飲食香氣即往設樂求食自活因此世人號諸樂人為乾闥婆彼能執樂故以名焉亦云食香止十寶山間食諸香粖即帝釋執樂神也帝釋須樂此王身有相現所謂持國乾闥婆王樹光乾闥婆王淨目乾闥婆王華冠乾闥婆王普音乾闥婆王樂搖動妙目乾闥婆王妙音師子幢乾闥婆王普放寶光明乾闥婆王金剛樹華幢乾闥婆王樂普現莊嚴乾闥婆王如是等而為上首其數無量提頭賴吒即東方天王此云持國謂護持國土安衆生故此從所領為名更領一部名毗舍闍此云噉精氣謂噉有情及五穀精氣故皆於大法深生信解歡喜愛重勤修不倦德中大法即大緣起法也信解故歡喜深心故愛重既歡既重故不替修行二八部四王衆竟第三月天子下十二𫨻明欲色諸天衆天者自在義光明義清淨義智論云天有三種一人天謂帝王二生天謂欲色等三淨天謂佛菩薩第一義天今通後二然諸天壽之長短身之大小衣服輕重宮殿勝劣俱舍十一及瑜伽等論起世等經皆廣辨之恐繁不敘然諸天壽者俱舍世界品云人間五十年下天一晝夜乘斯壽五百上五倍倍增色無晝夜殊劫數等身量無色初二萬後後二二增言身量者頌云欲天俱盧舍四分一一增色天踰𮜖那初四增半半此上增倍倍唯無雲滅三釋曰俱盧舍即二里踰𮜖那即十六里以八俱盧舍為一踰𮜖那則四天王天身長半里至第六天身長三里以半里半里增故有引三法度經云忉利天身長一由旬衣二由旬廣一由旬者以彼誤譯里為由旬不知彼失故妄引耳四天王天半里忉利天則一里餘可例知上云劫數等身量者色界梵衆天身長半由旬則人壽半劫餘可例知云初四增半半者二梵輔天則一由旬三大梵則一由旬半四少光則二由旬此上諸天皆倍倍增唯無雲天滅三由旬所以減者略出一意唯無量光天四由旬光音則八少淨十六無量淨三十二遍淨六十四至無雲天合有一百二十八減却三由旬有一百二十五此上七天倍倍增之至色究竟天欲成一萬六千劫故則身長一萬六千由旬又云少光上下天大全半為劫謂少光已上大全為劫謂八十中劫為一劫也自下諸天大半為劫即四十中劫為一劫也言中劫者即一增一滅劫也言衣服輕重者四天王衣十二銖忉利六銖夜摩三銖兜率一銖半化樂一銖他化半銖上皆減半也言宮殿等殊者月天長阿含云其城正方一千九百六十里高下亦爾二分天金一分琉璃王座二十里遙看似圓而實正方日天同此但量加半由旬三十三天中宮名善現周萬踰𮜖那高一半金城雜飾其地柔軟中有殊勝殿周千踰𮜖那此上諸天皆倍倍勝可以意得今但略消名意故指廣在餘復有無量月天子文中先有七𫨻明欲界天後有五𫨻明色界天前中即分為七今初月天子月者也有虧故下面頗𦙆迦寶水精所成能冷能照表菩薩得清涼慈照生死夜如云菩薩清涼月等所謂月天子華王髻光明天子衆妙淨光明天子安樂世間心天子樹王眼光明天子示現清淨光天子普遊不動光天子星宿王自在天子淨覺月天子大威德光明天子如是等而為上首其數無量名中初一是總雖標總稱即受別名下皆凖此皆勤顯發衆生心寶德中顯發衆生心寶者水珠見月則流潤發光淨心遇緣則慈流智發生了既發正因顯然生由性成則了非外入生與不生無二發乃發其本心故顯發雙辨復有無量日天子二日天子日者實也常充實故下面亦頗胝迦寶火精所成能熱能照表菩薩智照故又日以陽德月以陰靈一能破暗表根本破惑一能清涼表後得益物又依寶性論法日有四義一破暗如慧二照現如智三輪淨如解脫四上三不相離如同法界也又日以陽德月以陰靈即文選月賦中言所謂日天子光焰眼天子須彌光可畏敬幢天子離垢寶莊嚴天子勇猛不退轉天子妙華纓光明天子最勝幢光明天子寶髻普光明天子光明眼天子持勝德天子普光明天子如是等而為上首其數無量名中可畏敬幢者為惡者畏其照明為善者敬其辦業以斯超出故以名幢皆勤修習利益衆生增其善根德中居者辦業成就本行等利益也生長榖稼開敷覺華等為增長善根如出現品復有無量三十三天王三三十三天者佛地論等皆云妙高山四面各有八大天王帝釋居中故有三十三也下釋天名皆依佛地所謂釋迦因陀羅天王普稱滿音天王慈目寶髻天王寶光幢名稱天王發生喜樂髻天王可愛樂正念天王須彌勝音天王成就念天王可愛樂淨華光天王智日眼天王自在光明能覺悟天王如是等而為上首其數無量名中言釋迦等者釋迦能也因陀羅主也具足應云釋迦提桓因陀羅提桓天也即云能天主撫育勸善能為天主故更有異釋如音義說更有異釋等者彼云釋迦正云鑠迦羅此云帝也因陀羅此云主也古來釋同佛釋種族望之稱謬之深矣又楞伽大雲疏云大帝名有一百八今略舉三一因陀羅此云尊重三十三天共尊重故二云釋迦此云勇猛威德勇猛勝諸天故三名不蘭陀此云降伏以能降伏阿修羅故皆勤發起一切世間廣大之業德中言發起廣大業者令修普賢行故以此天居地天之頂總御四洲雖勝事頗多猶懼修羅之敵若修善者衆即天侶增威苟為惡者多即諸天減少故多好勸發況受佛付囑大權應為至如堅常啼之心施雪山之偈成尸毗大行破盧志巨慳談般若於善法堂中揚大教於如來會下等皆是發起廣大業也猶懼修羅者修羅嫉天有甘露味諸天求修羅之女色因起諍競廣有因緣若修善者正法念經說帝釋知修羅欲來遽遣天使令觀閻浮之人為修善多為作惡多若修善多知戰必勝故生歡喜若為惡者多不孝父母不敬三寶則生憂悴知戰不勝今言減少者兼辨餘時為惡必墮三塗故人天減少況受佛付囑者則淨名大品等皆屬天帝大權應為者小乘中說是須陀洹若準此經例是大權菩薩至如下引事證成堅常啼之心大品般若施雪山之偈即涅槃十三成尸毗大行即方便報恩經破盧志巨慳即盧志長者經談般若等者大品廣說揚大教等者淨名大品等其類非一恐厭文繁不能具出復有無量須夜摩天王四須夜摩天須者善也妙也夜摩時也具云善時分天論云隨時受樂故名時分天又大集經此天用蓮華開合以明晝夜又云赤蓮華開為晝白蓮華開為夜故云時分也隨此時別受樂亦殊故論云隨時受樂也所謂善時分天王可愛樂光明天王無盡慧功德幢天王善變化端嚴天王總持大光明天王不思議智慧天王輪䐡天王光焰天王光照天王普觀察大名稱天王如是等而為上首其數無量皆勤修習廣大善根心常喜足德中心恆喜足者喜足在於第四今慕上而修復有不可思議數兜率陀天王五兜率陀天王此云喜足論云後身菩薩於彼教化多修喜足之行故得少意恱為喜更不求餘為足所謂知足天王喜樂海髻天王最勝功德幢天王寂靜光天王可愛樂妙目天王寶峯淨月天王最勝勇健力天王金剛妙光明天王星宿莊嚴幢天王可愛樂莊嚴天王如是等而為上首不思議數皆勤念持一切諸佛所有名號德中彼天是諸佛上生之處故令修念佛三昧也召體曰名響頒人天為號通號別名皆悉念也不計一方故云一切以諸如來同一法界體德均故念即明記而慧逾增持而不忘故無間斷以佛為境何五塵之能惑哉復有無量化樂天王六化樂天王論云樂自變化作諸樂具以自娛樂又但受自所化樂不犯他故名為善化也變謂轉變轉粗為妙化謂化現無而忽有所謂善變化天王寂靜音光明天王變化力光明天王莊嚴主天王念光天王最上雲音天王衆妙最勝光天王妙髻光明天王成就喜慧天王華光髻天王普見十方天王如是等而為上首其數無量皆勤調伏一切衆生令得解脫德中以出世化故得解脫復有無數他化自在天王七他化自在天王論云令他化作樂具以自娛樂顯己自在故所謂得自在天王妙目主天王妙冠幢天王勇猛慧天王妙音句天王妙光幢天王寂靜境界門天王妙輪莊嚴幢天王華蘂慧自在天王因陀羅力妙莊嚴光明天王如是等而為上首其數無量名中寂靜境界門者境為入理之處即是門也根無躁動故稱寂靜根即門也根無取著方見境空合為門也故鴦掘經云明見來入門具足無減修皆勤修習自在方便廣大法門德中物我自在即廣大法門初欲界天衆已竟復有不可數大梵天王第二色界諸天衆有五衆以第四禪有二衆故然四靜慮攝天多少下經頻列至十藏品當會釋之多依十八初靜慮四二三各攝三天皆舉最上以勝攝劣故但列一下文說頌遍觀諸天第四靜慮自攝九天上五小乘聖居非此正被異生位中廣果至極故今列之大自在天三千界主所以別列今初大梵天王衆佛地論云離欲寂靜故名為梵具云梵摩此云清潔寂靜謂創離欲染故名清潔得根本定名為寂靜所謂尸棄天王慧光天王善慧光明天王普雲音天王觀世言音自在天王寂靜光明眼天王光遍十方天王變化音天王光明照耀眼天王恱意海音天王如是等而為上首不可稱數尸棄此云持髻謂此梵王頂有肉髻似螺形故亦名螺髻或云火頂以火災至此故貌如童子身白銀色衣金色衣禪恱為食皆具大慈憐愍衆生舒光普照令其快樂德中本修慈心得生梵世等流相續還慜衆生好請轉法輪故智光照物不為汙行故身光發揮若有遇之身心恱樂復有無量光音天王第二光音天二禪第三天也智論亦云第二禪通名光音彼天語時口出淨光故有云彼無尋伺言語亦無用光當語故名光音瑜伽名極光淨謂淨光遍照自他處故所謂可愛樂光明天王清淨妙光天王能自在音天王最勝念智天王可愛樂清淨妙音大王善思惟音天王普音遍照天王甚深光音天王無垢稱光明天王最勝淨光天王如是等而為上首其數無量皆住廣大寂靜喜樂無礙法門德中定生喜樂離尋伺故得寂靜名然凡得之捨動求靜故非廣大味定之喜非無礙法今菩薩即動而靜不散不味是為廣大無礙法門也復有無量遍淨天王第三遍淨天此天離喜身心遍淨故所謂清淨慧名稱天王最勝見天王寂靜德天王須彌音天王淨念眼天王可愛樂最勝光照天王世間自在主天王光焰自在天王樂思惟法變化天王變化幢天王星宿音妙莊嚴天王如是等而為上首其數無量悉已安住廣大法門於諸世間勤作利益德中身心遍淨未為廣大物我無二普益世間方為廣大也復有無量廣果天王第四廣果天即第四禪第三天於異生善果此最廣故所有功德勝下三故所謂愛樂法光明幢天王清淨莊嚴海天王最勝慧光明天王自在智慧幢天王樂寂靜天王普智眼天王樂旋慧天王善種慧光明天王無垢寂靜光天王廣大清淨光天王如是等而為上首其數無量莫不皆以寂靜之法而為宮殿安住其中德中此天離八災患世中最寂今以實智住本寂之宮復有無數大自在天王第五大自在者梵云摩醯首羅是也於三千界最自在故智論第二云此天有八臂三目乘白牛執白拂一念之間能知大千雨滴下經同此智論第九過五淨居有十住菩薩住處亦名淨居號大自在天王又三乘中立此為淨土是報身所居約實但是第十地菩薩攝報之果多作彼王耳所謂妙焰海天王自在名稱光天王清淨功德眼天王可愛樂大慧天王不動光自在天王妙莊嚴眼天王善思惟光明天王可愛樂大智天王普音莊嚴幢天王極精進名稱光天王如是等而為上首不可稱數皆勤觀察無相之法所行平等德中三界之頂非無相不超非離相求故所行平等然上釋名歎德多從義便以順類殊若約實德無不互有皆可虛求衆海雲集竟音釋囊奴當切隈烏回切苽音瓜銖慵朱切十黍重曰銖鑠式灼切臆乙力切胸肉也魘魅魘於琰切魅明祕切蘂乳捶切花鬚也兜率陀梵語也亦云覩史多此云知足兜當侯切
