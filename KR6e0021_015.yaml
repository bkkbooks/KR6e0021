body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述復次普賢菩薩摩訶薩入不思議解脫門方便海自下第二同生衆文分為三初明普賢菩薩得一切法門次十普菩薩各得一門後十異名菩薩各一法門此三各有長行及頌就初普賢長行中二初總標所入二別顯十門今初二句先指陳法體次辨法功能今初言不思議者謂數過圖度理絶言思故言方便海者謂不動真而成事巧以因門契果故云方便謂不動真而成事者即事理無礙為方便如涉有不迷於空巧以因契果者即事事無礙之方便因果交徹故入如來功德海後入如來下辨法功能謂證入因圓趣入果海故然前後但明以別入總故各得一解脫門猶如百川一一入海今明以總入總如海入海故得難思解脫門復稱能入為方便海以普賢是同異二衆之上首故所謂有解脫門名嚴淨一切佛國土調伏衆生令究竟出離二所謂下別顯十門以彰無盡一嚴土調生謂隨所化衆生取佛土故一切佛土者豎通四土橫該法界橫豎相融故一塵一剎皆廣大嚴淨故云一切演最妙法故令所調究竟出離竪通四土等者並如世界成就品略言竪者即於一處有四土故以法性之土為三土體故本遍常自受用土量周法界一如法性他受用土及變化土不離上二猶如物影不離空及日光而他受用及變化土隨心異見亦如兩影互相涉入故一塵中則有四土橫遍法界即十方一切差別國土橫竪相融者以竪融橫則一塵之中有十方國以橫融竪則一塵四土常遍十方結成可知有解脫門名普詣一切如來所修具足功德境界二佛遍塵道詣彼修德乃了彼境有解脫門名安立一切菩薩地諸大願海三通辨安立菩薩六種功德一位二願餘四在偈有解脫門名普現法界微塵數無量身四身普應機演所證法有解脫門名演說遍一切國土不可思議數差別名五國土不同所敬各異故隨宜立稱成益不空如名號品有解脫門名一切微塵中悉現無邊諸菩薩神通境界六塵中現身說菩薩行境有解脫門名一念中現三世劫成壞事七以時隨法融令三世劫及劫中成壞一念中現無所障礙然事通能所能成壞事謂火水及風所成壞事天地萬像有解脫門名示現一切菩薩諸根海各入自境界八菩薩根海雖繁廣多類但能入自所知境界豈能測量佛無邊法則顯前來衆海未測佛德普賢能知此理有解脫門名能以神通力化現種種身遍無邊法界九明如來身體同虛空用周法界有解脫門名顯示一切菩薩修行法次第門入一切智廣大方便第十攝因成果故云一切菩薩行入一切智也妙音宣此故云顯示此亦別釋標中第二句爾時普賢菩薩摩訶薩以自功德復承如來威神之力普觀一切衆會海已即說頌言頌中次第如前十門佛所莊嚴廣大剎等於一切微塵數清淨佛子悉滿中雨不思議最妙法第一偈前半嚴淨佛國後半調伏衆生兼顯人法為嚴之義佛子有三一者外子謂諸凡夫未能紹繼佛家事故二者庶子謂諸二乘不從如來大法生故三者真子謂大菩薩從大法喜正所生故此言清淨意顯第三最妙法者揀非權小昔以妙法淨所化心故所感土亦有清淨佛子來生其國還雨妙法如於此會見佛坐一切塵中悉如是佛身無去亦無來所有國土皆明現二中前半明總遍別中後半明體用無礙亦是總遍總中前半明總遍別中者然能遍所遍不離依正依正各二一總二別全佛身為正之總一毛孔等為正之別一佛國土為依之總一微塵等為依之別今以前半佛遍塵中故云總遍別中言體用無礙者上句是體無去來故下句是用現諸土故亦是總遍總者身遍國故顯示菩薩所修行無量趣地諸方便及說難思真實理令諸佛子入法界二中四句即前四義一修十勝行二起十方便三所證十如四正證法界成薩婆若地位為總餘五為別出生化佛如塵數普應羣生心所欲入深法界方便門廣大無邊悉開演四中前半普現身後半演所證如來名號等世間十方國土悉充遍一切方便無空過調伏衆生皆離垢佛於一切微塵中示現無邊大神力悉坐道場能演說如佛往昔菩提行三世所有廣大劫佛念念中皆示現彼諸成壞一切事不思議智無不了佛子衆會廣無限欲共測量諸佛地諸佛法門無有邊能悉了知甚為難次四偈可知佛如虛空無分別等真法界無所依化現周行靡不至悉坐道場成正覺九中初句智身次句智身等法身後二句化用等法身之周遍略舉正覺實通一切故上云種種佛以妙音廣宣暢一切諸地皆明了普現一一衆生前盡與如來平等法十中三句攝因後句成果復次淨德妙光菩薩摩訶薩得遍往十方菩薩衆會莊嚴道場解脫門第二十普菩薩各得一門第一菩薩前列名中無以前與普賢共為十普今普賢別說故加為十以表圓足然偈文具十長行中第七菩薩及法門俱脫又脫第八菩薩法門及第九菩薩名至文當知十中第一嚴處說法皆名為嚴普德最勝燈光照菩薩摩訶薩得一念中現無盡成正覺門教化成熟不思議衆生界解脫門二塵塵皆成正覺已為無盡方是正覺一門有如是等無量成正覺門如出現品辨隨所成正覺門調生亦爾故云成熟不思議衆生界普光師子幢菩薩摩訶薩得修習菩薩福德莊嚴出生一切佛國土解脫門三修行福海嚴出剎海普寶焰妙光菩薩摩訶薩得觀察佛神通境界無迷惑解脫門四以深妙智觀難思境故多處不迷多劫不厭普音功德海幢菩薩摩訶薩得於一衆會道場中示現一切佛土莊嚴解脫門五如一逝多林會頓現一切淨土會會皆爾念念現殊普智光照如來境菩薩摩訶薩得隨逐如來觀察甚深廣大法界藏解脫門六法界含攝無盡故名為藏觀佛法界之身一毛即無分限普覺恱意聲菩薩摩訶薩得親近承事一切諸佛供養藏解脫門七佛昔行因無佛不供今成佛果無衆不歸猶如百川馳流趣海普清淨無盡福威光菩薩摩訶薩得出生一切神變廣大加持解脫門八遍剎充塵劫窮來際皆佛加持之力普寶髻華幢菩薩摩訶薩得普入一切世間行出生菩薩無邊行門解脫門九若無大悲不入生死則不能出菩薩行門如不入海安能得寶此即化他成己如不入海安能得寶即淨名佛道品譬如不下巨海則不能得無價寶珠如是不入煩惱大海則不能得一切智寶故普相最勝光菩薩摩訶薩得能於無相法界中出現一切諸佛境界解脫門十即依體起用爾時淨德妙光菩薩摩訶薩承佛威力普觀一切菩薩解脫門海已即說頌言十方所有諸國土一剎那中悉嚴淨以妙音聲轉法輪普遍世間無與等如來境界無邊際一念法界悉充滿一一塵中建道場悉證菩提起神變世尊往昔修諸行經於百千無量劫一切佛剎皆莊嚴出現無礙如虛空佛神通力無限量充滿無邊一切劫假使經於無量劫念念觀察無疲厭汝應觀佛神通境十方國土皆嚴淨一切於此悉現前念念不同無量種觀佛百千無量劫不得一毛之分限如來無礙方便門此光普照難思剎如來往劫在世間承事無邊諸佛海是故一切如川騖咸來供養世所尊如來出現遍十方一一塵中無量土其中境界皆無量悉住無邊無盡劫佛於曩劫為衆生修習無邊大悲海隨諸衆生入生死普化衆會令清淨佛住真如法界藏無相無形離諸垢衆生觀見種種身一切苦難皆消滅頌文前已配釋欲表菩薩法門互入故不結法屬人後𫨻亦然復次海月光大明菩薩摩訶薩得出生菩薩諸地諸波羅蜜教化衆生及嚴淨一切佛國土方便解脫門第三十異名菩薩亦各一法長行中一得成菩薩四種方便一地位二度行三調生即行位所作四嚴剎通二利因果也或一地一度滿或地地諸度滿此一為總下九皆別然不出上四多顯調生雲音海光離垢藏菩薩摩訶薩得念念中普入法界種種差別處解脫門二謂遍轉法輪智生寶髻菩薩摩訶薩得不可思議劫於一切衆生前現清淨大功德解脫門三普示滅惑功德自在王淨光菩薩摩訶薩得普見十方一切菩薩初詣道場時種種莊嚴解脫門四普嚴場會善勇猛蓮華髻菩薩摩訶薩得隨諸衆生根解海普為顯示一切佛法解脫門五以法隨機普智雲日幢菩薩摩訶薩得成就如來智永住無量劫解脫門六為物永存大精進金剛䐡菩薩摩訶薩得普入一切無邊法印力解脫門七法印悟物香焰光幢菩薩摩訶薩得顯示現在一切佛始修菩薩行乃至成就智慧聚解脫門八頓顯終始大明德深美音菩薩摩訶薩得安住毗盧遮那一切大願海解脫門九同佛往修大福光智生菩薩摩訶薩得顯示如來遍法界甚深境界解脫門十光顯如來難思之境以偈對釋文並可知爾時海月光大明菩薩摩訶薩承佛威力普觀一切菩薩衆莊嚴海已即說頌言諸波羅蜜及諸地廣大難思悉圓滿無量衆生盡調伏一切佛土皆嚴淨如佛教化衆生界十方國土皆充滿一念心中轉法輪普應羣情無不遍佛於無量廣大劫普現一切衆生前如其往昔廣修治示彼所行清淨處我覩十方無有餘亦見諸佛現神通悉坐道場成正覺衆會聞法共圍繞廣大光明佛法身能以方便現世間普隨衆生心所樂悉稱其根而雨法真如平等無相身離垢光明淨法身智慧寂靜身無量普應十方而演法唯第六偈略須開示初句所證性淨法身言無相者示真如相身即體義在纏不染出障非淨凡聖必同故云平等次句出纏法身也真如出煩惱障故云離垢出所知障故云光明又塵習雙亡故云離垢真智圓滿故曰光明淨法身者揀於在纏後半體用無礙身由出纏故應用無方約理即是體用無礙約用則止觀雙運故得果則寂照為身即用之體故寂即體之用故智體用既無不在佛身何有量耶故能普應十方此句正顯化用故經云水銀和真金能塗諸色像智慧與法身處處應現往即斯義也經云水銀和真金能塗諸色像者金如法身水銀如般若以般若照機真身隨感故天台智者亦用此義以釋法華壽量應用法王諸力皆清淨智慧如空無有邊悉為開示無遺隱普使衆生同悟入如佛往昔所修治乃至成於一切智今放光明遍法界於中顯現悉明了佛以本願現神通一切十方無不照如佛往昔修治行光明網中皆演說十方境界無有盡無等無邊各差別佛無礙力發大光一切國土皆明顯爾時如來師子之座衆寶妙華輪臺基陛及諸戶牖如是一切莊嚴具中自下第八明座內衆流分於中長分十𫨻一明出處二顯衆類三列衆名四結衆數五興雲供六供衆海七敬繞佛八座本方九歎德能十申偈讚今初座即是總寶等為別如是已下結廣從略非獨輪等故云一切所以此能出者良以座該法界依正混融一一纖塵無不廣容普遍座所遍剎恆在座中故從中出非是化也若約法空之因及法空之座則萬行為嚴能生菩薩一一各出佛剎微塵數菩薩摩訶薩二一一下顯衆類皆菩薩故其名曰海慧自在神通王菩薩摩訶薩雷音普震菩薩摩訶薩衆寶光明髻菩薩摩訶薩大智日勇猛慧菩薩摩訶薩不思議功德寶智印菩薩摩訶薩百目蓮華髻菩薩摩訶薩金焰圓滿光菩薩摩訶薩法界普音菩薩摩訶薩雲音淨月菩薩摩訶薩善勇猛光明幢菩薩摩訶薩三其名下列衆名出處既多名亦多種略舉上首十名耳即如次十方如是等而為上首有衆多佛剎微塵數同時出現四如是等下結衆數嚴具非一故有衆多剎塵此諸菩薩各興種種供養雲所謂一切摩尼寶華雲一切蓮華妙香雲一切寶圓滿光雲無邊境界香焰雲日藏摩尼輪光明雲一切恱意樂音雲無邊色相一切寶燈光焰雲衆寶樹枝華果雲無盡寶清淨光明摩尼王雲一切莊嚴具摩尼王雲如是等諸供養雲有佛世界微塵數五此諸菩薩下興供雲彼諸菩薩一一皆興如是供養雲雨於一切道場衆海相續不絶六彼諸下供衆海衆多菩薩各興剎塵供雲已重疊難思況相續不絶而諸供具皆稱雲者乃有多義謂色相顯然智攬無性從法性空無生法起能現所現逈無所依應用而來故來無所從用謝而去故去無所至而能含慈潤霔法雨益萬物重重無礙有雲像焉上下諸文雲義皆爾現是雲已右繞世尊經無量百千匝七現是雲已下明敬繞佛順向殷重瞻望不足乃至百千隨其方面去佛不遠化作無量種種寶蓮華師子之座各於其上結跏趺坐八隨其下坐本方參而不雜也如師子子亦師子故菩薩座亦名師子自化自坐者自心智現還自安處故諸佛菩薩坐多跏趺者為物軌故智論引偈云若結跏趺坐身安入三昧等若結跏趺坐等者等取餘偈云威德人敬仰如日照天下除睡懶覆心身輕不疲𠋣覺悟亦輕便安坐如龍蟠見畫跏趺坐魔王亦驚怖何況入道人安坐不傾動即第八論是諸菩薩所行清淨廣大如海句九是諸菩薩下歎其德能者有十二句初總餘別得智慧光照普門法句隨順諸佛所行無礙句能入一切辨才法海句別顯一一各是一種清淨廣大略束為三初三明三業清淨廣大一智證普法二身隨佛行三語入辨海中一義求亦通三業得不思議解脫法門句住於如來普門之地句已得一切陀羅尼門悉能容受一切法海句次三明得法清淨廣大一獲自分解脫二住勝進果位三遍具諸持普門地言即同經初已踐如來普光明地善住三世平等智地句已得深信廣大喜樂句後五福智清淨廣大初二正明後三重顯今初中一智安理事故云善住二福無不修故生信喜然三世平等經初已明今更略示謂依生及佛善住平等且依佛說佛佛平等法身智身無增減故若依衆生生生平等煩惱業苦有支皆等若生佛相望者凡夫現在等佛過去進修得果等佛現在成佛究竟等佛常住然三世平等下重釋善住三世平等智地文三初指前摽舉二別明義相三結釋善住智地之言初唯約佛如問明品十方諸如來同一法身等二唯約生六道雖差皆三雜染此約三世互望煩惱佛則本有今無衆生則本無今有菩提則衆生本有今無諸佛則本無今有約迷悟異則說本今涅槃之性非三世攝故知三世有法無有是處此約三世下別示義相便引涅槃四出偈釋今先敘彼經後方釋疏言四出偈者四處出故亦名四住一即第十經中出二即十七經三即二十七經四即二十八經初𫨻即如來性品南經第九菩薩品文殊師利白佛言世尊今此純陀猶有疑心佛徵文殊文殊師利言純陀心疑如來常住以得知見佛性力故若見佛性而為常者本未見時應是無常若本無常後亦應爾何以故如世間物本無今有已有還無如是等物悉是無常以是義故諸佛菩薩聲聞緣覺無有差別爾時世尊即說偈言本有今無本無今有三世有法無有是處善男子以是義故諸佛菩薩聲聞緣覺亦有差別亦無差別文殊師利讚言善哉誠如聖教我今始解諸佛菩薩聲聞緣覺亦有差別亦無差別佛更不說迦葉便請佛說如來便為引長者牛之喻以況佛性乳色皆一如性無異上第一出竟第二出即第十七經南經十五皆梵行品因為迦葉說無所得竟迦葉領解更欲請問無所得義舉佛先說本有今無偈問如來為答云本有者我昔本有無量煩惱以煩惱故現在無有大般涅槃言本無者本無般若波羅蜜以無般若波羅蜜故現在具有諸煩惱結此釋上半若有沙門若婆羅門若天若魔若梵若人說言如來去來現在有煩惱者無有是處此釋下半下略經意有二一明本有父母之身無金剛身本無三十二相具有四百四病二云本有無常無我等今無無上菩提本無見佛性今有無常等總有八𫨻大意多同皆明本有有世間妄因今無無出世真德本無無出世因今有有世間妄法結云我或知言不知有相言無相隨宜化物耳上即第二出意第三出即二十七經南經二十五師子吼品因說一切衆生定得菩提是故我說一切衆生定有佛性一切衆生真實未有三十二相八十種好以是義故我說偈云本有今無等善男子有者凡有三種一未來有二現在有三過去有一切衆生未來當有無上菩提是名佛性一切衆生現在悉有煩惱是故現在無有三十二相八十種好一切衆生過去之世有斷煩惱是故現在得見佛性以是義故我常宣說一切衆生悉有佛性乃至一闡提亦有佛性未來有故如有乳者問言有酥上即第三出竟第四出即二十八經南經二十六因明食為命因非食即命故說此偈本有今無等釋曰上四處經偈意大同而用小異諸公多於第十經中廣釋其相遠公引十七經意釋云上二句自立道理下二句破他定義釋上二句一同第十七經釋下二句云此文語略亦合云三世無法亦無是處意云於佛煩惱昔有今已斷竟故三世有法無有是處涅槃昔無今已證竟言三世無法亦無是處於衆生反此可知故無一法三世定有三世定無此意明必互有互無次通難意云佛今現證有異二乘故非無差彼亦當得則亦無差別此答文殊疑又云佛今已證何得難言後亦無常此通純陀疑諸公大同此意則成此偈但是三世有無之法如何能通純陀之難難意正云由見佛性而為常者見既有始後必當終如世間物有已還無今明證見何能通此若超悟法師說答疑意意則善成是生公意但是我始會之非照今有而其釋偈亦多同遠公將偈答難亦不順理薦福即用本有今無論意出二種疑釋偈下半亦同遠公不得論意故非盡理今先出論意後出經中四出別意今初先定本有今無之法謂煩惱業苦是生得名本有解脫聖性是修得是今無釋曰今此正順十七經本有煩惱今無涅槃等故論云為二乘說不謗大乘若為大乘說是謗大乘意云此是隨相之法是三世有法迷悟之殊是無常法可化二乘非是大乘涅槃真性上定本今之法次正說偈意論云此偈有二意一破邪義二立正義破邪義者依語言說立正義者依於義說不依語言然邪復有二一者外道二者小乘上三句是邪小所立之法第四句總非之云無有是處初外道者謂本有同僧佉因中有果本無同衛世因中無果三世有同勒沙婆因中亦有果亦無果皆有多過故云無有是處二破小乘者如向所說為小乘說煩惱本有為大乘說過三種義謂若煩惱本有為真諦有為俗諦有若真諦有前後無異煩惱不可斷若俗諦有俗諦無本何名本有言本無今有者若本無者後不應有若本無法而得有者空應生華諸本無法皆應當生若三世共有居然不成三世相違故故下結云無有是處則破小乘說三世有法無有是處也已破邪義所言立正義者本有今有過於三世是名正義本有今有者從初發心至得涅槃一味無異不依生因不依滅因有則清淨凡夫法不能染汙聖人法不能清淨乃至過一切語言道及一切思惟不可說不可思惟攝受因果非因非果如來一體最極攝受一切妙寶是大涅槃超過三世為用說涅槃功德乃至常樂我淨復次有二種義若本有今有則是常見若過三世則是斷見若二義相待成離斷常是中道義如是俗諦真諦相待故有十二因緣真實何以故離二邊是真十二因緣若能善解則見如來現在於世釋曰此後一𫨻復融性相令其無礙餘廣如論已知論意今將論釋經之疑論云純陀有二因緣故疑一見同相不見別相故生疑二見別相不見同相故生疑皆是權為物疑然若別配初疑即經中純陀疑後疑即文殊疑然此二疑文即影略實即二人俱有此疑故論云純陀有二種疑今初云何見同謂純陀將本無今有疑同本有今無疑云佛本不見佛性後見佛性而得常住豈非本無今有本無今有即是生法生法必滅故是無常即與世同故云見同云何不見異不見如來契無三世異於凡小故今舉異答云約緣始會似本無今有涅槃之性不屬三世智契此性同性是常何得難言有始必終是無常耶純陀疑遣矣若通文殊疑者文殊見異不見同故疑謂見三乘迷悟差別今同二乘無常盡滅即無差別此名見異生疑云何不見同不見同無三世故今答云契無三世一得永常何得同於二乘無常無三世性則無差別會與不會則有差別上根一聞二疑頓遣中下未悟迦葉起悲梵行品中因無得問佛舉八𫨻八𫨻之中皆悉結云三世有者無有是處斯無得矣二十七經因說一切衆生定得菩提是當有義是故說言有三種有一未來有二過去有三現在有明此三有亦約迷悟佛性菩提豈屬三世二十八經食為命因非即是命如佛性為因非即是佛亦是三世因緣之法隨相而說若隨相取亦無是處釋曰上來判釋四出之偈理無不盡次當解釋今疏用意按十七經本有今有皆約於妄故本無今無並約於真故云我本有煩惱今無涅槃本無般若今有煩惱所以爾者約佛昔因故二十七經則云衆生過去有斷煩惱因緣今見佛性則是真法本無今有故純陀生疑正約世尊因見佛性本無今有為難是知若真若妄皆通本有今無本無今有故疏取經意及彼論意故約生佛相望真妄並說又十七經約佛昔說故即以佛昔時為本亦以昔時為今例於衆生則以今時為本亦以今時為今如佛昔有煩惱無異又十七經後之二𫨻約佛身上亦說本今皆是影略今疏取意則以昔為本現在為今煩惱佛則本有今無者以佛昔為凡夫則有煩惱今成正覺故無煩惱衆生則本無今有者約性淨故本無煩惱約客塵故今有煩惱菩提則衆生本有今無者亦約性淨菩提本有今為客塵之所覆故迷真起妄無有證得圓淨菩提故云今無耳諸佛則本無今有者約圓淨菩提昔未修成故云本無今已修得故云今有上來已顯彼偈上半約迷悟異下釋偈下半然凖論意三句皆相第四一句拂去上三方為真性今疏以第三句總牒三世以第四句遣之故云下半顯性取文小異全是論意云何約迷悟異等謂迷時有妄非是無真悟時見性性非今有故生公云但是我始會之非照今有照不在今即是莫先為大既云大矣所以稱常是知迷悟雖異涅槃之性三世不遷湛然常住會即符契同彼性常如始覺同本無復始本之異何得難言有始必終則純陀之難遣矣若以性淨而說則佛與衆生現今平等而不妨迷悟之殊是故三乘亦有差別亦無差別衆生寂滅即是法身法身隨緣即是衆生故寂滅非無之衆生恆不異真而成立隨緣非有之法身恆不異事而顯現是故染淨三世一切諸法無不平等況稱性互收若以性淨下第二約同時平等正是前偈下半之意以離三世性故現今平等而不妨迷悟之殊者即是論主末後融其性相令離斷常若相外有性性為斷滅相是定常故離迷悟無別真性因乖常故有三界無常因解無常之實性故成常智二理不偏照與之符猶懸鏡高堂萬像斯鑒經引二烏意在此也是故三乘亦有差別亦無差別即是涅槃文殊領解性無二故故無差別迷悟淺深故有差別則文殊之疑遺矣二疑既遣迦葉之疑亦亡餘如上論衆生寂滅即是法身下示於亦有差別亦無差別之相言衆生寂滅即是法身者生不異佛法身隨緣名曰衆生者佛不異生則無差別矣寂滅非無之衆生恆不異真而成立下一對明無差不礙差寂滅故無差非無衆生故不礙差恆不異真成上寂滅而成立言成上非無之衆生隨緣非有之法身恆不異事而顯現者隨緣故佛不異生非有之法身則不礙異生恆不異事成上隨緣而顯現成上非有之法身是故染淨下總以融結況稱性互𭣣者上但事理無礙已是難思餘經容有此則事事無礙唯華嚴意如是解者名為善住一切智地如地能生終歸於地萬法依於佛智究竟還至一切智也如是下結釋可知此上一義乃是傍來涅槃玄旨於是乎見也無邊福聚極善清淨句虛空法界靡不觀察句十方世界一切國土所有佛興咸勤供養句後三重顯中一淨前福障故令諸福無邊清淨二成上智慧由觀法界虛空三近勝緣故成前二音釋川騖騖亡遇切馳也陛部禮切升堂之階也牖音酉穿壁交也跏趺跏音加趺音夫跏趺屈足坐也𤛓古候切取牛乳也
