body:
  text: 唐于闐國三藏沙門實義難陀譯唐清涼山大華嚴寺沙門澄觀撰述復次持國乾闥婆王得自在方便攝一切衆生解脫門自下第二有八𫨻明八部四王衆初四𫨻皆初一是天義如前釋今初乾闥婆王長行十法初一即東方天王謂攝受折伏逆順多端善巧應機故名自在樹光乾闥婆王得普見一切功德莊嚴解脫門二普見等者謂令衆生見佛一切功德莊嚴佛一毛而為利益一一皆爾故云普見淨目乾闥婆王得永斷一切衆生憂苦出生歡喜藏解脫門三以慈愍方便除憂則喜生憂苦既如海廣深喜樂亦難𥁞名藏然則世之憂喜生乎利害利害存乎情偽苦樂存乎吉凶吉凶存乎愛惡愛惡𥁞則吉凶苦樂皆亡情偽息則利害憂喜永斷如此方為永斷憂苦喜樂生焉然則世之憂喜生乎利害下上顯釋經文此下密取經意舉世憂喜況出世樂即周易繫辭之文而倒用之先具出易文易云剛柔雜居而吉凶可見矣變動以利言注云變而通之以盡利也易云吉凶以情遷注云吉凶無定唯人所動情順乘理以之吉情逆違道以蹈凶故曰吉凶以情遷也易云是故愛惡相攻而吉凶生焉即今疏云吉凶存乎愛惡則愛惡是吉凶之因也易云遠近相取而悔吝生情偽相感而利害生即今疏云憂喜存乎利害利害存乎情偽是則情偽為利害因故注云情以感物則得利偽以感物則致害則有憂喜故利害是憂喜之因故上易云遠近相取而悔吝生意云相取相資也順之則喜逆之則憂順則利也逆則害也又次易云凡易之情近而不相得則凶或害之悔且吝今為順逆之次第不順疏次但曉易文疏文自了愛惡盡下彰滅吉凶憂喜所以易雖無文乃易本意即知無憂無喜方為大喜無苦無樂真樂耳華冠乾闥婆王得永斷一切衆生邪見惑解脫門四永斷等謂得佛決定智光則邪惑永斷喜步普音乾闥婆王得如雲廣布普蔭澤一切衆生解脫門五謂慈雲普蔭材與不材皆涼慧澤廣霑三草二木咸發慈雲普陰材與不材皆涼等者上句依莊子下句依法華材者可為棟梁成器之木也不材無所堪也莊子行山見伐木者止其傍而不取周歎曰此木以不材得終其天年及還至故人家主人將殺鴈豎子曰一能鳴一不能鳴請奚殺主人曰殺不能鳴者弟子問周曰山中之木以不材得終天年主人之鴈以不材致死先生將何處焉周笑對曰將處夫材與不材之間然材不材之言雖在莊子意亦法華第三云我觀一切普皆平等乃至云貴賤上下持戒毀戒威儀具足及不具足正見邪見利根鈍根等雨法雨而無懈倦即材與不材皆涼也言三草者謂小草中草上草二木謂小樹大樹以人天乘為小草經云或處人天轉輪聖王釋梵諸王是小藥草二乘為中草經云知無漏法能得涅槃起六神通及得三明獨處山林常行禪定得緣覺證是中藥草菩薩為上草經云求世尊處我當作佛行精進定是上藥草此通説大乘為上以大乘登地已上慈陰義廣復加二樹七地已前小樹經云又諸佛子專心佛道常行慈悲自知作佛決定無疑是名小樹八地已上為大樹經云安住神通轉不退輪度無量億百千衆生如是菩薩名為大樹而言咸發者經云佛平等説如一味雨隨衆生性所受不同如彼草木所稟各異等樂搖動美目乾闥婆王得現廣大妙好身令一切獲安樂解脫門六現廣等者現身益物也稱性普應故廣大具相清淨故妙好妙音師子幢乾闥婆王得普散十方一切大名稱寶解脫門七佛出説法是大名稱佛法衆僧俱稱為寶令此遠聞義云普散普放寶光明乾闥婆王得現一切大歡喜光明清淨身解脫門八現一切等者身光普照塵不能染見者必歡智光恱機惑纍不生又歡喜也故云大喜金剛樹華幢乾闥婆王得普滋榮一切樹令見者歡喜解脫門九法水遍滋菩提實行行既樹立見者必歡無復二乘一切皆菩提樹也普現莊嚴乾闥婆王得善入一切佛境界與衆生安樂解脫門十善入等者一多無礙名為佛境天王智達故云善入爾時持國乾闥婆王承佛威力普觀一切乾闥婆衆而説頌言偈中亦十諸佛境界無量門一切衆生莫能入善逝如空性清淨普為世間開正道如來一一毛孔中功德大海皆充滿一切世間咸利樂此樹光王所能見世間廣大憂苦海佛能消竭悉無餘如來慈愍多方便淨目於此能深解十方剎海無有邊佛以智光咸照耀普使滌除邪惡見此樹華王所入門佛於往昔無量劫修習大慈方便行一切世間咸慰安此道普音能悟入前五可知佛身清淨皆樂見能生世間無𥁞樂解脫因果次第成美目於斯善開示六中初句現身次一句一切獲安樂也世間即一切也無𥁞樂總顯也謂佛現於世足履影覆若在人天現增快樂若在下苦七日之中身心安樂乃至終獲涅槃之樂故云無𥁞足履影覆至身心安樂者涅槃二十六説如有怖鴿至身子影中猶自戰懼至佛影中坦然安樂世尊履地去地四指然當足下蟲皆得生天於如來所種少善根如食金剛必至涅槃次句別示出世因果之樂先因後果先世後出世皆次第義又總取偈意佛身清淨是解脫因生無𥁞樂是解脫果又總取偈意等者上別配三句竟今總取三句釋因果次第成言乃有五對因果一取初句上四字為因第三句初二字是果由佛身淨令衆解脫故二以第三句初解脫字為因第二句為果此是如來作用解脫令衆生得樂故上為一對世無盡樂又解脫因能現淨身又解脫果世無盡樂下三以第二句為因第三句初解脫字為果以世樂為因出世解脫樂為果故四以第三句初解脫字為因第一句初四字為果佛證離障解脫方能起於犬用而現身故上即第二對又佛身清淨是樂見因樂見即為清淨身果五又佛身清淨下唯就初句自分因果上四字為因下三字為果由佛身淨令物樂見無有厭足六以下三字為因上四字為果由物樂見自感淨身又衆生若樂見則淨身有果若不樂見則淨身無果即以利他為果故上即第三對衆生樂見是安樂因無盡安樂是樂見果七衆生樂見下以初句下三字為因第二句為果由樂見佛天上人間常受安樂八第二句為因初句下三字為果樂見若得樂樂見即有果樂見若無樂樂見便無果上即第四對無盡安樂是淨身因能現淨業是無盡果九無盡安樂下以第二句全為因以初句上四字為果由得無盡世樂故終得清淨之身此舉世尊因中修行之果勸物亦然十能現淨業是無盡果者即以第二句中下三字為因第一句上四字為果謂無盡樂即涅槃樂安住涅槃能建大事方現淨身是故淨身是無盡樂果故上釋云終獲涅槃為無盡樂則無盡樂言有其二種一則出世如上所明二連取一句即世無盡樂如純陀施佛果報無盡應不成佛故約世樂説無盡耳如是展轉因果名次第成結云如是展轉者遞互相成也衆生迷惑常流轉愚癡障蓋極堅密如來為説廣大法師子幢王能演暢七中初二句寶所濟機堅謂難壞密謂無隙間無空處智不得生次句正散寶也如來普現妙色身無量差別等衆生種種方便照世間普放寶光如是見八中結句應云普放寶光如是見而云妙音譯者之誤妙音屬前師子幢故大智方便無量門佛為群生普開闡入勝菩提真實行此金剛幢善觀察九中初二句法水普滋次句道樹普榮也又方便多門是開權也入菩提行是顯實也種種方便但為一乘是普滋也一剎那中百千劫佛力能現無所動等以安樂施群生此樂莊嚴之解脫十中初二句佛境也次句安樂也佛力能現無所動者遮妄見也非促多劫就一剎那非展剎那受於多劫本相如故名無所動隨應度者佛力令見復次增長鳩槃茶王得滅一切冤害力解脫門第二鳩槃茶王長行十法中初即南方天王謂內惑外讐皆名怨害安住忍力並能伏之龍王鳩槃茶王得修習無邊行門海解脫門二修習等者二利之行趣果曰門深廣難窮名無邊海莊嚴幢鳩槃茶王得知一切衆生心所樂解脫門三知其現欲如應化伏饒益行鳩槃茶王得普成就清淨大光明所作業解脫門四普成就等者鈍識者現之以通利智者示之以法遍世多劫名普成就並如虛空故云清淨俱能照世即是光明三輪化生是所作業可怖畏鳩槃茶王得開示一切衆生安隱無畏道解脫門五世間惑苦可畏不安菩提涅槃安隱無畏萬行為其因道則無畏滅果成矣妙莊嚴鳩槃茶王得消竭一切衆生愛欲海解脫門六消竭等者愛欲漂流深廣如海智日赫照則妄竭真明高峯慧鳩槃茶王得普現諸趣光明雲解脫門七謂於諸趣普現身雲耀通明等之電光也勇健臂鳩槃茶王得普放光明滅如山重障解脫門八普放等者身智光明遣除二障無邊淨華眼鳩槃茶王得開示不退轉大悲藏解脫門九多劫修悲究竟滅苦為不退轉悲多方便故復名藏為安衆生所以開示廣大面鳩槃茶王得普現諸趣流轉身解脫門十普現等者稱性神通無來去而流轉爾時增長鳩槃茶王承佛威力普觀一切鳩槃茶衆而説頌言成就忍力世導師為物修行無量劫永離世間憍慢惑是故其身最嚴淨偈中初偈通顯明佛已滅怨怨之大者莫越憍慢有之則卑陋滅之則端嚴佛昔普修諸行海教化十方無量衆種種方便利群生此解脫門龍主得佛以大智救衆生莫不明了知其心種種自在而調伏嚴幢見此生歡喜神通應現如光影法輪真實同虛空如是處世無央劫此饒益王之所證衆生癡翳常蒙惑佛光照現安隱道為作救護令除苦可畏能觀此法門次四偈可知欲海漂淪具衆苦智光普照滅無餘既除苦已為説法此妙莊嚴之所悟六中初句欲海欲為苦本云具衆苦次二句消竭既欲惡止當説善行欲為苦本者法華云諸苦所因貪欲為本佛身普應無不見種種方便化群生音如雷震雨法雨如是法門高慧入七中初句普現身雲次句明等電光故云種種次句兼明雷雨雷有二義一遠震二發生謂蟄蟲發動草木發萌圓音之雷可以思凖次句明等電光者下經云通明無畏以為電光謂十通十明十無畏等皆稱電光故云方便圓音之雷可以思凖者謂雷震百里今周法界二發生是標云何為發耽著禪味起大功用是蟄蟲發動云何為生令諸衆生善根萌芽未生令生清淨光明不唐發若遇必令消重障演佛功德無有邊勇臂能明此深理為欲安樂諸衆生修習大悲無量劫種種方便除衆苦如是淨華之所見神通自在不思議其身普現遍十方而於一切無來去此廣面王心所了餘三可知復次毗樓博叉龍王得消滅一切諸龍趣熾然苦解脫門第三龍王衆凖偈及梵本皆有十前第卷中長行脫第五但有十法今長行十一法初一即西方天王法門及第二如偈當釋娑竭羅龍王得一念中轉自龍形示現無量衆生身解脫門雲音幢龍王得於一切諸有趣中以清淨音説佛無邊名號海解脫門三與偈文通有六義一諸趣是化處二淨音是化具三佛名是化法四神通是化本五衆生是化機六隨樂是化意焰口龍王得普現無邊佛世界建立差別解脫門四普現等者謂一毛普現無邊依正以毛稱性能廣容故廣容即是普遍故能現之佛還自住於毛孔所現剎中能所無雜依正區分大小宛然名建立差別焰龍王得一切衆生瞋癡蓋纏如來慈愍令除滅解脫門五靜法云凖梵本有焰龍王得一切衆生瞋癡蓋纏如來慈愍令除滅解脫門謂大慈居懷則三毒俱滅雲幢龍王得開示一切衆生大喜樂福德海解脫門六開示等者佛大慈悲是福德海二資糧滿然後得故衆生慈福即是百川佛毛示現以表同體既知同體自然朝宗因示悟入故得大喜樂自然朝宗者謂百川趣海如萬國歸朝禮云春見曰朝夏見曰宗德叉迦龍王得以清淨救護音滅除一切怖畏解脫門七慈音智俱故云清淨淨無貪愛何畏何憂無邊步龍王得示現一切佛色身及住劫次第解脫門八示現等者謂於身中現身土也清淨色速疾龍王得出生一切衆生大愛樂歡喜海解脫門九觀佛昔行深廣故愛樂歡喜海言通二謂歡喜供養普行大音龍王得示現一切平等恱意無礙音解脫門十示現等者謂為衆演音故云示現音有四義一類多謂一切二普遍謂平等三稱根清雅故云恱意四一音隨類故云無礙無礙即方便也無熱惱龍王得以大悲普覆雲滅一切世間苦解脫門十一謂此無熱龍住清涼池出香美水流注四海導引百川時布慈雲降澍甘澤是故能滅諸世間苦爾時毗樓博叉龍王承佛威力普觀一切諸龍衆已而説頌言汝觀如來法常爾一切衆生咸利益能以大慈哀愍力拔彼畏塗淪墜者偈有十一初中諸龍有四熱惱名熾然苦今並有治一金翅所食苦初句為治以觀佛法同三歸故二行欲時復本身苦三鱗甲細蟲苦並第二句為治學佛等利故四熱砂著身苦後二句為治以不堪蟲癢熱砂中𩥇今大悲哀愍故能治之有説四苦無鱗甲細蟲而有風吹寶衣露身之苦亦以第二句治之就龍且説龍趣末句約佛通拔畏塗諸龍皆有四種熱惱者經論不同然謗佛經説如阿那婆達多龍王三種過患皆悉遠離一者熱沙不墮其頭二者不以蛇身行欲三者無迦樓羅鳥之畏彼喻發菩提心離三界惡然會之亦同無鱗甲細蟲而有風吹者由有細蟲故𩥇熱沙此二則同其風吹寶衣露身即現復本身之耻所以互有開合一切衆生種種別於一毛端皆示現神通變化滿世間娑竭如是觀於佛二中此就佛論示現前約龍云能轉又前一念時促今一毛處小二文影略餘九可知但第五偈即前所脫佛以神通無限力廣演名號等衆生隨其所樂普使聞如是雲音能悟解無量無邊國土衆佛能令入一毛孔如來安坐彼會中此焰口龍之所見一切衆生瞋恚心纏蓋愚癡深若海如來慈愍皆除滅焰龍觀此能明見一切衆生福德力佛毛孔中皆顯現現已令歸大福海此高雲幢之所觀佛身毛孔發智光其光處處演妙音衆生聞者除憂畏德叉迦龍悟斯道三世一切諸如來國土莊嚴劫次第如是皆於佛身現廣步見此神通力我觀如來往昔行供養一切諸佛海於彼咸增喜樂心此速疾龍之所入佛以方便隨類音為衆説法令歡喜其音清雅衆所恱普行聞此心欣悟衆生逼迫諸有中業惑漂轉無人救佛以大悲令解脫無熱大龍能悟此復次毗沙門夜叉王得以無邊方便救護惡衆生解脫門第四夜叉王衆長行十法第四夜叉王下前之十𫨻長行偈頌委釋第十一𫨻去即摘難釋此下多不釋偈偈有難者懸引釋於長行之中講者自對會之初一即此方天王得以無邊等者謂善者自樂不待加哀惡者必苦心則偏重巧救多門故云無邊又此天能伏惡鬼令不犯衆生是救護也自在音夜叉王得普觀察衆生方便救護解脫門二普觀悲救救苦護善不滯空有故云方便嚴持器仗夜叉王得能資益一切甚羸惡衆生解脫門三惡業障重名甚羸惡又羸無善力謂一闡提惡即弊惡謗方等經者明示妙理是謂資益大智慧夜叉王得稱揚一切聖功德海解脫門四倣佛歎佛得名聞果焰眼主夜叉王得普觀察一切衆生大悲智解脫門五悲智二照合為一心與法身俱故恆觀察金剛眼夜叉王得種種方便利益安樂一切衆生解脫門六妙音説法利益多端唯應度者聲暨能益勇健臂夜叉王得普入一切諸法義解脫門七教廣理深一句能演即是普入勇敵大軍夜叉王得守護一切衆生令住於道無空過者解脫門八令物離邪則能住正為守護矣然住正道者則不分別是邪是正云不思議住正道者下即淨名入不二法門品中珠頂王菩薩之言富財夜叉王得增長一切衆生福德聚令恆衆生罪惡深可怖於百千劫不見佛漂流生死受衆苦為救是等佛興世如來救護諸世間悉現一切衆生前息彼畏塗輪轉苦如是法門音王入衆生惡業為重障佛示妙理令開解譬以明燈照世間此法嚴仗能觀見佛昔劫海修諸行稱讚十方一切佛故有高遠大名聞此智慧王之所了智慧如空無有邊法身廣大不思議是故十方皆出現焰目於此能觀察受快樂解脫門九集福德因受快樂果由身智光得增長也力壞高山夜叉王得隨順憶念出生佛力智光明解脫門十念佛修因生十力果天未證極故云隨順爾時多聞大夜叉王承佛威力普觀一切夜叉衆會而説頌言偈中亦千文顯可知一切趣中演妙音説法利益諸群生其聲所暨衆苦滅入此方便金剛眼一切甚深廣大義如來一句能演説如是教理等世間勇健慧王之所悟一切衆生住邪道佛示正道不思議普使世間成法器此勇敵軍能悟解世間所有衆福業一切皆由佛光照佛智慧海難測量如是富財之解脫憶念往劫無央數佛於是中修十力能令諸力皆圓滿此高幢王所了知復次善慧摩睺羅伽王得以一切神通方便令衆生集功德解脫門第五摩睺羅伽衆十法一普現威光名為神通不動性淨示涅槃因故云方便依因集德必得無依涅槃淨威音摩睺羅伽王得使一切衆生除煩惱得清涼恱樂解脫門二除惑契寂是清淨因清涼恱樂是涅槃果勝慧莊嚴髻摩睺羅伽王得普使一切善不善思覺衆生入清淨法解脫門三善者善之不善者佛亦善之善覺亦亡乃入本淨善者善之等即道德經云善者吾善之不善者吾亦善之妙目主摩睺羅伽王得了達一切無所著福德自在平等相解脫門四福非福相染不可著非福現福名自在相佛佛無二是平等相燈幢摩睺羅伽王得開示一切衆生令離黑暗怖畏道解脫門五無智黑因如燈開示怖畏苦果如幢為歸最勝光明幢摩睺羅伽王得了知一切佛功德生歡喜解脫門六以知佛德同空齊已一性故歡喜也師子臆摩睺羅伽王得勇猛力為一切衆生救護主解脫門七見理決斷聞深不怖聞淺不疑聞非深非淺意而有勇八風不傾為勇猛力既以自正必能正他為救護主聞深不怖等者大分深義所謂空也聞説於空謂同斷滅故令人怖故大品云既非先有亦非後無自性常空勿生驚怖聞淺不疑者淺謂涉事方便多門則令疑惑今知隨宜何所疑耶聞非深非淺疑無所據使身心然知非深為妙有非淺為真空離身心相方為勇猛可造斯境又此三句亦即三觀初空次假後中道三句齊聞一念皆會衆妙莊嚴音摩睺羅伽王得令一切衆生隨憶念生無邊喜樂解脫門八往修喜因故見念皆喜須彌臆摩睺羅伽王得於一切所緣決定不動到彼岸滿足解脫門九見理智成則緣不動智為行本諸度悉圓亦猶海納百川更不流矣可愛樂光明摩睺羅伽王得為一切不平等衆生開示平等道解脫門十開生等理示佛等應破情不等令悟性等為平等道爾時善慧威光摩睺羅伽王承佛威力普觀一切摩睺羅伽衆而説頌言十偈如次文顯可知汝觀如來性清淨普現威光利群品示甘露道使清涼衆苦永滅無所依一切衆生居有海諸惡業惑自纏覆示彼所行寂靜法離塵威音能善了佛智無等叵思議知衆生心無不𥁞為彼闡明清淨法如是嚴髻心能悟無量諸佛現世間普為衆生作福田福海廣大深難測妙目大王能悉見一切衆生憂畏苦佛普現前而救護法界虛空靡不周此是燈幢所行境佛一毛孔諸功德世間共度不能了無邊無盡同虛空如是廣大光幢見如來通達一切法於彼法性皆明照如須彌山不傾動入此法門師子臆佛於往昔廣大劫集歡喜海深無𥁞是故見者靡不欣此法嚴音之所入了知法界無形相波羅蜜海悉圓滿大光普救諸衆生山臆能知此方便汝觀如來自在力十方降現罔不均一切衆生咸照悟此妙光明能善入復次善慧光明天緊那羅王得普生一切喜樂業解脫門第六緊那羅王十法一世喜樂業皆因佛生妙華幢緊那羅王得能生無上法喜令一切受安樂解脫門二聞深適神故法喜無上終得涅槃無𥁞安樂種種莊嚴緊那羅王得一切功德滿足廣大清淨信解藏解脫門三佛德深廣信亦包含恱意吼聲緊那羅王得恆出一切恱意聲令聞者離憂怖解脫門四音演真法令聞故妄憂除而意恱寶樹光明緊那羅王得大悲安立一切衆生令覺悟所緣解脫門五達境唯心而本空則安立衆生於覺悟普樂見緊那羅王得示現一切妙色身解脫門六難遇益生所以示現相嚴常住名為妙色最勝光莊嚴緊那羅王得了知一切殊勝莊嚴果所從生業解脫門七大智普慈是二嚴果一切智因是能生業微妙華幢緊那羅王得善觀察一切世間業所生報解脫門八業細難窮自觀示物動地力緊那羅王得恆起一切利益衆生事解脫門九神通益物無間稱恆威猛主緊那羅王得善知一切緊那羅心巧攝御解脫門十知機巧化謂攝心正智御心如境爾時善慧光明天緊那羅王承佛威力普觀一切緊那羅衆而説頌言十頌次第文並可知世間所有安樂事一切皆由見佛興導師利益諸衆生普作救護歸依處出生一切諸喜樂世間咸得無有𥁞能令見者不唐捐此是華幢之所悟佛功德海無有𥁞求其邊際不可得光明普照於十方此莊嚴王之解脫如來大音常演暢開示離憂真實法衆生聞者咸欣恱如是吼聲能信受我觀如來自在力皆由往昔所修行大悲救物令清淨此寶樹王能悟入如來難可得見聞衆生億劫時乃遇衆相為嚴悉具足此樂見王之所覩汝觀如來大智慧普應群生心所欲一切智道靡不宣最勝莊嚴此能了業海廣大不思議衆生苦樂皆從起如是一切能開示此華幢王所了知諸佛神通無間歇十方大地恆震動一切衆生莫能知此廣大力恆明見處於衆會現神通放大光明令覺悟顯示一切如來境此威猛主能觀察復次大速疾力迦樓羅王得無著無礙眼普觀察衆生界解脫門第七迦樓羅王依賢首靜法皆云凖頌長行脫第五執持王一智無著故見無礙悲普觀故通悉調不可壞寶髻迦樓羅王得普安住法界教化衆生解脫門二遍坐覺樹名住法界現通説法名為教化清淨速疾迦樓羅王得普成就波羅蜜精進力解脫門三進䇿諸度往修故成不退心莊嚴迦樓羅王得勇猛力入如來境界解脫門四境界如偈文難思則入方為勇猛大海處攝持力迦樓羅王得入佛行廣大智慧海解脫門五諸本多脫遇本有文云大海處攝持力迦樓羅王得能竭衆生煩惱海解脫門多是古疏本脫今依有本然偈約能竭説佛福智今南藏能竭衆生煩惱海堅法淨光迦樓羅王得成就無邊衆生差別智解脫門六衆生無邊故成就智多妙嚴冠髻迦樓羅王得莊嚴佛法城解脫門七城有三義一防外敵二養人衆三開門引攝城有三義下文有二意先解長行城義後會偈頌門義前中有三初立城三義今言法城通教理行果行契理教則無不俱嚴故次今言法城已下出城體各有三義謂了心城之性空則衆惑不入見恆沙性德則萬行爰增道無不通則自他引攝三各有三義下別釋教理行果皆有防外敵等三而四法為三以理行合釋非理不顯行非行不顯理故初若了心城之性空則衆惑不入是防外敵義性空是理謂自性淨心不與妄合即理防外敵了空即行衆惑不入即行為城名防外敵見恆沙性德則萬行爰增即是第二養人衆義恆沙性德是不空藏是理所養見即行體萬行爰增即行養人衆義以知法性本寂有大智慧增定慧等道無不通則自他引攝者第三開門引攝義道無不通言含二意一理即是道無不通故即開門引攝二行契於道則無所不通故能引攝二利之行便能契果絶百非以成解脫養衆德以全法身開般若而無不通矣便能契下約果城説三義果由理行故便能即契果位三德為涅槃城之三義矣方顯教城無非養所詮旨句句通神方顯教下第三由上三城皆因能詮方顯教功三義可思有斯多義故偈云廣大叵窮重重四門故無數量究竟能闡唯我世尊有斯多義下二會釋偈文重重四門者且第一重即是四句謂一有門二空門三亦空亦有門四非空非有門天台以斯歷於四教則有四箇四門略如前玄談中辨今且於一重四句中更有四重四門然執著成見取成四謗得意為門今取門義言四重者一即單四句如句所説二復四句謂一有有有無二無有無無三亦有亦無有亦有亦無無四非有非無有非有非無無而言復者四句之中皆説有無故第三具足四句者四句之中皆具四故第一有句具四者謂一有有二有無三有亦有亦無四有非有非無第二無句中四者一無有二無無三無亦有亦無四無非有非無第三亦有亦無具四者一亦有亦無有二亦有亦無無三亦有亦無亦有亦無四亦有亦無非有非無第四非有非無具四者一非有非無有二非有非無無三非有非無亦有亦無四非有非無非有非無上四四一十六句為具足四句第四絶言四句者一單四句外一絶言二復四句外一絶言三具足四句外一絶言有三絶言若為見釋上諸四見一一皆有八十八使相應是見即外道見故若約佛法歷四教四門各生四見又一種四句各一絶言如是一一亦各有八十八使六十二見百八等惑若破諸見一一見破一一成門故云重重四門又重重者如一有無門具諸四句則歷常無常我與無我等亦有多四句謂一有無常二無無常三亦有亦無無常四非有非無無常等又歷萬行謂布施等如云一有布施二無布施三亦有亦無布施四非有非無布施等普捷示現迦樓羅王得成就不可壞平等力解脫門八法身無相故不可壞體即真如凡聖平等無分別智安住證會名成就力普觀海迦樓羅王得了知一切衆生身而為現形解脫門九現同類形方便調伏龍音大目精迦樓羅王得普入一切衆生歿生行智解脫門十衆生歿生皆由行業佛生死智方能普入音釋蟄直立切蟲藏也癢以兩切與癢同𩥇陟扇切馬土浴也蔭於禁切芘也蹈徒到切踐也遞大計切更互也耽都含切樂也復音福重也滌除滌音狄洗也慰紆胃切安也癡翳癡超之切迷也翳於計切障也漂淪漂音飄流也淪龍春切沒也羸惡羸倫為切瘦也暨巨至切及也叵思叵普火切不可也捷疾業切疾也
