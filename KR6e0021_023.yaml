body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述爾時普賢菩薩欲重宣其義承佛威力觀察十方而說頌言所說無邊衆剎海毗盧遮那悉嚴淨世尊境界不思議智慧神通力如是第二偈頌多以果顯因文有九偈束為八假第一偈頌佛神力據此無邊剎海皆遮那嚴淨則下嚴華藏猶是分明理實而言願周法界菩薩修行諸願海普隨衆生心所欲衆生心行廣無邊菩薩國土遍十方次一超頌衆生菩薩同集善根菩薩趣於一切智勤修種種自在力無量願海普出生廣大剎土皆成就三一頌頌第四成一切智自受用土因前半因後半果成唯識云大圓鏡智相應淨識由昔所修自利無漏純淨佛土因緣成熟從初成佛盡未來際相續變為純淨佛土周圓無際衆寶莊嚴配經可見成唯識下此下之文前已總引今當略釋大圓鏡智相應淨識即果位第八此是依因依此頓變故由昔所修下此是行因從初成佛下辨其果相初明豎長後周圓下明其橫廣修諸行海無有邊入佛境界亦無量為淨十方諸國土一一土經無量劫四一頌頌第六嚴淨願力及第七不退行願修諸行海無有邊者論云謂平等性智大慈悲力由昔所修利他無漏純淨佛土因緣成熟隨住十地菩薩所宜變為淨土或小或大或劣或勝前後改變上經雖云願力非無有行為分功用有無長行成其二句皆他受用故偈為一初句頌第六次句頌第七以八地已上念念入法流心心趣佛境故後之半偈通其二文論云等者上已具引先智及行俱是緣因亦以行為因以智為緣故云因緣亦上二皆因隨十地菩薩為緣如上隨所化衆生等變為淨土即是果相初地見剎等百三千故名為小二地即千三地即萬等後後大於前前前前即劣後後漸勝下所引地義並如本品衆生煩惱所擾濁分別欲樂非一相隨心造業不思議一切剎海斯成立五一偈却頌第三衆生行業加造業因煩惱所擾造於穢剎欲樂非一感土有殊前與菩薩同修必多善業故此明於煩惱佛子剎海莊嚴藏離垢光明寶所成斯由廣大信解心十方所住咸如是六一頌頌菩薩勝解菩薩能修普賢行遊行法界微塵道塵中悉現無量剎清淨廣大如虛空七一頌超頌普賢願力以普賢有三一位前普賢但發普賢心即是非今所用二位中普賢即等覺位故此居佛前三位後普賢謂得果不捨因行故長行居後等虛空界現神通悉詣道場諸佛所蓮華座上示衆相一一身包一切剎一念普現於三世一切剎海皆成立佛以方便悉入中此是毗盧所嚴淨八有二偈却頌如來自在前偈頌果用後偈頌善流略不頌法爾法爾即是法性通故略之又第七偈依中有依第八偈正中有依第九偈融於三世故三共顯融攝無礙然其無礙通有十種諸教說土或謂但是無常或云心變理事懸隔多一不融故今經宗要辨無礙又第七下以義料揀成無礙行門此即賢首華藏觀意彼有五門一成立因緣正當此門起具因緣二相狀布列即華藏品風輪香海等三具德圓滿四依正融攝五攝成觀智今初有二先牒經略明即彼第四然其無礙下即彼第三但解此二自成觀智略無第五然彼具德指一香樹亦明十義一此香樹即佛智身德二即轉法輪三事理無礙四悲智德五難思德六體用無礙七定亂無礙八微細德九佛境界德十緣起無礙德而內外相參以成十門亦不引證今為順經加減廢立皆引文證而具事理事事無礙初總摽也二立意或是無常者通大小乘或云心變唯是大乘理事懸隔明非實教一理事無礙謂全同真性而剎相宛然經云華藏世界海法界無差別莊嚴悉清淨故一事理下三開門別釋一中引經即第十經偈末句云安住於空虛今但取莊嚴為事法界為理無差別言即是無礙二成壞無礙謂成即壞壞即成等二成壞中不引文者義易了故亦是此偈故云一一剎種中劫燒不思議所現雖敗惡其處常堅固三廣狹無礙不壞相而普周故經云體相如本無差別無等無量悉周遍等四相入無礙下文云以一剎種入一切一切入一亦無餘及此文云身包一切等其文非一亦是一多無礙三中經云體相如本者即第八經釋剎種章偈及後四相入中所引即前偈前半具云以一剎種入一切一切入一亦無餘體相如本無差別無等無量悉周遍五相即無礙文云無量世界即一界故五相即無礙證文即第十七經六微細無礙經云清淨珠玉布若雲炳然顯現諸佛影等六清淨珠玉等即第八香水河偈具云清淨珠玉布若雲一切香河悉彌覆其珠等佛眉間相炳然顯現諸佛影今但取初後二句是顯微細之義七隱顯無礙謂染淨異類隱顯等殊見不同故七隱顯中略不引經以義多故即此中偈隨心造業不思議一切剎土斯成立即其義也以同處異見故不思議又形狀偈云一切塵中所現剎皆是本願神通力隨其心樂種種殊於虗空中悉能作釋曰既一塵隨樂種種皆作則隱顯自在也然疏中略出二種隱顯一染淨隱顯如感娑婆者對華藏而見娑婆則淨隱染顯感華藏者對娑婆而見華藏則染隱淨顯故摩竭提國其地金剛等二明異類隱顯如須彌山形世界一類顯時江河等形即皆隱也長剎顯時短剎則隱餘可例知八重現無礙謂於塵中見一切剎剎內塵中見剎亦然重重無盡如帝網故八重現無礙亦不引文以華藏世界所有塵一一塵中見法界已頻引故若更引者依住偈云或有國土周法界清淨離垢從心現如影如幻廣無邊如因陀羅各差別等九主伴無礙凡一世界必有一切以為眷屬下經云毗盧遮那昔所行種種剎海皆清淨種種剎即眷屬也凡所引即第八經釋小海中偈十時處無礙謂或於一剎現三世劫或於一念現無量剎如今第九偈文又下文云三世所有諸莊嚴摩尼果中皆顯現十中又下文云即第八經河閒樹林偈此十無礙同時具足自在難知散在諸文可以六相融之此十無礙下結釋六相之義略如前說廣如十地別章起具因緣竟爾時普賢菩薩復告大衆言諸佛子一一世界海有世界海微塵數所依住第二假所依住通染淨也所謂或依一切莊嚴住或依虛空住或依一切寶光明住或依一切佛光明住或依一切寶色光明住或依一切佛音聲住或依如幻業生大力阿修羅形金剛手住或依一切世主身住或依一切菩薩身住或依普賢菩薩願所生一切差別莊嚴海住長行釋中十事文並可知然依異者由於心樂有差別故謂一依莊嚴住者樂飾好故二樂無礙故三樂即質光故四怖衆苦故五愛離質光故光作寶色非寶發光六奉聖教故七求神護故八求天護故九菩薩願力所任持故十普安衆生故如何廣大世界依有情等小類而住此有二義一外由內感故說依身此復有二一宿因力頌云業力之所持故二現在轉變力即世主菩薩神力任持攝屬已故二由無漏體事大小無礙得相依住如何廣大下隨難別釋釋第八九有二義釋前通諸教後由無漏下即事事無礙宗故上普賢云一切剎土入我身所住諸佛亦復然汝應觀我諸毛孔我今示汝佛境界諸佛子世界海有如是等世界海微塵數所依住三結爾時普賢菩薩欲重宣其義承佛威力觀察十方而說頌言遍滿十方虛空界所有一切諸國土如來神力之所加處處現前皆可見頌有二十二文分兩別初一總顯一切世界依佛神力而住故梵本云一切依佛神通現長行不列者若列則餘九非佛神通故偈以此文該於前十皆佛神力或有種種諸國土無非離垢寶所成清淨摩尼最殊妙熾然普現光明海後二十一偈別頌前文分之為九初一頌依莊嚴住舉能顯所莊嚴之具皆寶成故或有清淨光明剎依止虛空界而住二半偈頌依空或在摩尼寶海中復有安住光明藏三半偈頌依寶光明如來處此衆會海演說法輪皆巧妙諸佛境界廣無邊衆生見者心歡喜四一偈頌佛光稟佛教光成世界故有以摩尼作嚴飾狀如華燈廣分布香焰光雲色熾然覆以妙寶光明網五一偈頌寶色光明住以嚴及覆影顯依住或有剎土無邊際安住蓮華深大海廣博清淨與世殊諸佛妙善莊嚴故或有剎海隨輪轉以佛威神得安住諸菩薩衆遍在中常見無央廣大寶六二偈頌佛音聲謂妙善所感音聲有威神故或有住於金剛手或復有住天主身毗盧遮那無上尊常於此處轉法輪七一偈頌七八二住兼顯說法或依寶樹平均住香焰雲中亦復然或有依諸大水中有住堅固金剛海或有依止金剛幢或有住於華海中廣大神變無不周毗盧遮那此能現或修或短無量種其相旋環亦非一妙莊嚴藏與世殊清淨修治乃能見如是種種各差別一切皆依願海住或有國土常在空諸佛如雲悉充遍或有在空懸覆住或時而有或無有或有國土極清淨住於菩薩寶冠中十方諸佛大神通一切皆於此中見諸佛音聲咸遍滿斯由業力之所化八有六偈頌依菩薩身住若樹若水皆菩薩身菩薩現故長行但云菩薩此中兼依佛身此中雖有願力是上宿善所持非普賢願或有國土周法界清淨離垢從心起如影如幻廣無邊如因陀網各差別或現種種莊嚴藏依止虛空而建立諸業境界不思議佛力顯示皆令見九餘八頌皆頌普賢願所生住於中三初二偈明廣大國土周法界故前偈明淨識所生心外無體故如影像後偈難思業起起不離空一一國土微塵內念念示現諸佛剎數皆無量等衆生普賢所作恆如是為欲成熟衆生故是中修行經劫海廣大神變靡不興法界之中悉周遍法界國土一一塵諸大剎海住其中佛雲平等悉彌覆於一切處咸充滿如一塵中自在用一切塵內亦復然諸佛菩薩大神通毗盧遮那悉能現次四偈明微細國土調生自在然佛力現此亦普賢願𭣣故二假文皆兼佛力一切廣大諸剎土如影如幻亦如焰十方不見所從生亦復無來無去處滅壞生成互循復於虛空中無暫已莫不皆由清淨願廣大業力之所持末後二偈彰剎體性結歸有在初偈明剎依性有有即非有次半成壞更起猶若尋環後半結歸普願兼顯廣業依住竟爾時普賢菩薩復告大衆言諸佛子世界海有種種差別形相第三形相亦通染淨所謂或圓或方或非圓方無量差別或如水漩形或如山焰形或如樹形或如華形或如宮殿形或如衆生形或如佛形長行釋中非圓方者三維八隅皆非圓方故云無量差別山熖形者如山似熖皆取上尖對上方圓等故餘並可知如是等有世界海微塵數三結爾時普賢菩薩欲重宣其義承佛威力觀察十方而說頌言諸國土海種種別種種莊嚴種種住殊形共美遍十方汝等咸應共觀察頌中十偈初之一頌總讚勸觀其狀或圓或有方或復三維及八隅摩尼輪狀蓮華等一切皆由業令異或有清淨焰莊嚴真金間錯多殊好門闥競開無壅滯斯由業廣意無雜餘皆正頌前義兼舉因顯果於中初二頌前十假後七頌前無量差別今初摩尼輪者即水旋之類淨熖莊嚴頌上山熖門闥競開義兼宮殿剎海無邊差別藏譬如雲布在虛空寶輪布地妙莊嚴諸佛光明照耀中一切國土心分別種種光明而照現佛於如是剎海中各各示現神通力或有雜染或清淨受苦受樂各差別斯由業海不思議諸流轉法恆如是後七中分二前三彰剎由因異一毛孔內難思剎等微塵數種種住一一皆有遍照尊在衆會中宣妙法於一塵中大小剎種種差別如塵數平坦高下各不同佛悉往詣轉法輪一切塵中所現利皆是本願神通力隨其心樂種種殊於虛空中悉能作一切國土所有塵一一塵中佛皆入普為衆生起神變毗盧遮那法如是後四明自在由佛一毛孔內難思剎者更有一理謂修行者居自報土各各不同佛攝衆生所現國土似彼報故重重而現不離一毛所現國土等者如千盞燈共照一毛則一毛之上有千重光也準喻思法形狀竟爾時普賢菩薩復告大衆言諸佛子應知世界海有種種體所謂或以一切寶莊嚴為體或以一寶種種莊嚴為體或以一切寶光明為體或以種種色光明為體或以一切莊嚴光明為體或以不可壞金剛為體或以佛力持為體或以妙寶相為體或以佛變化為體或以日摩尼輪為體或以極微細寶為體或以一切寶焰為體或以種種香為體或以一切寶華冠為體或以一切寶影像為體或以一切莊嚴所示現為體或以一念心普示現境界為體或以菩薩形寶為體或以寶華藥為體或以佛言音為體第四剎體唯約淨剎長行略辨二十種體然其剎體諸教不同或以八微為體或以唯心為體或法性為體或一切法為體今皆具之謂衆寶等即是八微加之佛音聲即九微也一念心現是唯識頓變佛變化者或通果色或一切法令三世間互相作故又融上諸說為無礙剎體言日摩尼輪即日輪也香通質氣佛言為體者無礙體事故又依如來說力起故諸教不同下即五教出體釋有二意一則別配八微是小乘唯心是始教法性是終頓二教或一切法是圓教二則通明圓教具四義頓教唯法性小乘唯八微始終二教通於前三若三各別即二是始教若三無礙性相圓融即是終教故法相宗出體云一法性土以真如為體二實報土力無畏等一切功德無漏五蘊以為體性若攝相歸性亦真如為體三色相土攝境從心自利後得智為體故佛地論云最極自在淨識為相相即體相若約相別即四塵為體四他受用土攝境從心利他後得智為體攝相歸性亦以真如為體若約相別亦是四塵五變化土同前他受用體是知始教具用三法圓教則以性融相相無礙故通一切法則事事無礙而為其體是故疏云今皆具之次引經具收後融無礙爾時普賢菩薩欲重宣其義承佛威力觀察十方而說頌言或有諸剎海妙寶所合成堅固不可壞安住寶蓮華頌中十偈初偈頌三謂初二及第六不可壞金剛或是淨光明出生不可知一切光莊嚴依止虛空住次一偈頌第三第四或淨光為體復依光明住光雲作嚴飾菩薩共遊處三有一偈頌第五一切莊嚴光明或有諸剎海從於願力生猶如影像住取說不可得四有一偈頌二種體願力生者頌佛力持如影像現頌妙寶相若兼二事頌佛變化或以摩尼成普放日藏光珠輪以嚴地菩薩悉充滿五有一偈頌二種體上半頌日輪下半頌微細寶有剎寶焰成焰雲覆其上衆寶光殊妙皆由業所得第六偈頌寶熖殊妙之言亦兼香也或從妙相生衆相莊嚴地如冠共持戴斯由佛化起第七偈頌寶冠寶冠亦佛變化非正頌佛化也或從心海生隨心所解住如幻無處所一切是分別第八偈頌一念普現境界或以佛光明摩尼光為體諸佛於中現各起神通力第九偈頌一切寶莊嚴示現及頌後三體摩尼光者頌菩薩形寶及寶華葉佛光明者頌佛音聲聲光成剎故或普賢菩薩化現諸剎海願力所莊嚴一切皆殊妙第十偈結歸普賢體往竟爾時普賢菩薩復告大衆言諸佛子應知世界海有種種莊嚴所謂或以一切莊嚴具中出上妙雲莊嚴或以說一切菩薩功德莊嚴或以說一切衆生業報莊嚴或以示現一切菩薩願海莊嚴或以表示一切三世佛影像莊嚴或以一念頃示現無邊劫神通境界莊嚴或以出現一切佛身莊嚴或以出現一切寶香雲莊嚴或以示現一切道場中諸珍妙物光明照耀莊嚴或以示現一切普賢行願莊嚴如是等有世界海微塵數第五𫨻剎莊嚴中唯明淨剎其中或寶為嚴或人或法或說法修行示現融攝皆為嚴剎以人法為寶故又由說法因等得莊嚴果以果名因為莊嚴也或寶為嚴者然莊嚴有三即名三淨一處所淨即衆寶為嚴二住處衆生淨即人寶為嚴三法門流布淨即以法為嚴對文可知爾時普賢菩薩欲重宣其義承佛威力觀察十方而說頌言廣大剎海無有邊皆由清淨業所成種種莊嚴種種住一切十方皆遍滿十頌分二初一總顯剎嚴無邊色相寶焰雲廣大莊嚴非一種十方剎海常出現普演妙音而說法菩薩無邊功德海種種大願所莊嚴此土俱時出妙音普震十方諸剎網衆生業海廣無量隨其感報各不同於一切處莊嚴中皆由諸佛能演說三世所有諸如來神通普現諸剎海一一事中一切佛如是嚴淨汝應觀過去未來現在劫十方一切諸國土於彼所有大莊嚴一一皆於剎中見一切事中無量佛數等衆生遍世間為令調伏起神通以此莊嚴國土海一切莊嚴吐妙雲種種華雲香焰雲摩尼寶雲常出現剎海以此為嚴飾十方所有成道處種種莊嚴皆具足流光布逈若彩雲於此剎海咸令見普賢願行諸佛子等衆生劫勤修習無邊國土悉莊嚴一切處中皆顯現後九別頌上文於中初一偈頌初妙雲次一偈頌第二菩薩功德及第四菩薩願海次一偈却頌說衆生業報後六偈如次頌後六事莊嚴竟爾時普賢菩薩復告大衆言諸佛子應知世界海有世界海微塵數清淨方便海第六𫨻明剎清淨方便者唯約淨也若約隨宜攝物佛應統之則淨穢皆稱佛土若就行致唯淨非穢第六𫨻明剎清淨文中有四一總摽大意言唯約淨者以言清淨故不同形等通於染淨若就行致者即生公意彼淨名注云行致淨土非造之也造於土者衆生類矣十四科中釋致義云問云何致而非得耶答夫稱致者體為物假雖獲非已釋曰謂因他而得故名為致謂佛修萬行直趣真極不取色相他受用等因他衆生遂以大悲為物取土故云行致既因萬行而致於土必招淨也然淨有二種一世間淨離欲穢故以六行為方便上二界為淨土然淨有二下第二別顯其相展轉開之乃成四重皆以方便為因清淨為果第一對中言以六行為方便者謂欣上淨妙離厭下苦粗障故以色無色界而為淨土二出世間淨此復二種一者出世所謂二乘以緣諦為方便權教說之無別淨土約實言者出三界外別有淨土二乘所居智論有文二出世間上上淨此謂菩薩即以萬行而為方便以實報七珍無量莊嚴而為其土今此正明菩薩兼顯二乘此復二種下第二對二乘淨土玄中已明然出世上上淨中復有二種一者真極佛自受用相纍兼亡而為方便二者未極等覺已還故仁王云三賢十聖住果報唯佛一人居淨土仁王經云者即菩薩行品波斯匿王讚佛此前一偈半云正覺無相遍法界三十生盡智圓明寂照無為真解脫大悲應現無與等湛然不動常安隱光明遍照無所照三賢十聖住果報唯佛一人居淨土在文易知若瓔珞經亦云佛子有土名一切賢聖所居之處是故一切衆生一切聖賢各有自居果報之土若凡夫衆生住五陰中為正報土山林大地為依報土初地聖人亦有二土一實智土前智為住後智為土二變化淨穢經劫數量應現之土乃至無垢地土亦如是一切衆生乃至無垢地盡非淨土住果報故唯佛獨居中道第一法性之土是故我昔在普光堂廣為一切衆生說淨土門以上二經唯佛為淨未極之中復有二種一八地已上一向清淨以永絶色纍照體獨立神無方所故其淨土色相難名二七地已還未出三界無漏觀智有間斷故非一向淨若依瑜伽入初地去方為淨土三賢所居皆稱非淨此分受用變化別故約此經宗十信菩薩即有淨土故今此文始自近友終成佛力皆淨方便故通萬行永絶色纍者即生公十四科淨土義云夫未免形纍者八地已前在生空觀即居淨土出即居穢八地已上長在生空即長在淨土故須託土以自居八地已上永絶色纍照體獨立神無方所土復何為意云八地已淨無生忍得色自在捨於分𫨻故云永絶色纍一切世間出世間心悉不現前故云照體獨立稱性普周故云神無方所神即心神易云神者妙萬物而為言也故神無方而易無體既無色纍故其土相難以名目二七地已還者依直往者未捨分假故無漏觀智有間斷者即六地已下若至七地觀無有間依十地經六地已下為染八地已上為淨七地亦名中間亦可名染亦得名淨或名非染非淨今取染義故非純淨若依瑜伽下第三對教揀定然淨方便即是淨因長行亦可為等流果如云久近善友得生有善友之剎中故即十事皆淨相也然望莊嚴有同約門別故望具因緣當知亦爾又起具因緣通於染淨此則唯淨莊嚴多約其果清淨多約其因又前多修善此多治惡故於世界此如洗滌彼如粉繪然淨方便下第四對文揀濫於中有二先對此文上來四對皆約清淨為果方便為因今以義通方便亦果近友即是方便今得人寶為嚴則兼於果故極樂等土諸上善人俱會一處是等流果也然望莊嚴下第二對前文揀也如莊嚴中云或以說一切菩薩功德莊嚴與此增長大功德雲遍法界故文同又彼偈中多舉因顯果與此長行同此云慈悲廣大遍衆生以此莊嚴諸剎海與莊嚴同起具因緣諸淨剎因與此長行修淨因同故為此揀疏文有二一明門別謂所用雖一用處不同猶如說法在布施門名為法施在智慧門名為方便等又起具下更以別理揀於二門則具緣是通此章則局故前疏云唯約淨也對於莊嚴則多少不同如多藥和合從強得名定中有慧但資於定慧中有定但名般若等故云彼多約果此多約因從前多修善者亦從多少前則以因對果論其多少此則唯就因中自有多少前云菩薩無邊功德海及普賢行願諸佛子等衆生劫勤修習此多修善也今文云淨修廣大諸勝解成就方便清淨力即治惡多喻顯可知所謂諸菩薩親近一切善知識同善根故增長廣大功德雲遍法界故淨修廣大諸勝解故觀察一切菩薩境界而安住故修治一切諸波羅蜜悉圓滿故觀察一切菩薩諸地而入住故出生一切淨願海故修習一切出要行故入於一切莊嚴海故成就清淨方便力故如是等有世界海微塵數別釋中一近友同善根者如善財夜神處廣說二智導慈雲大彌法界三法門勝解皆已淨治約位地前也四即初地證遍行如故云觀察一切境界生如來家故云安住五修治等者見道之後修道位故餘雖未滿一切皆修若約圓融亦得稱滿六初地勝進遍學十地行法後後但是依法行故上三皆初地七初地發願順行至第八地一切皆成故名出生一切願海而言淨者純無漏故八即九地二乘出要唯止與觀菩薩出要唯無礙辨令衆出故九一切莊嚴者十地二嚴皆成滿故十淨方便力即是普賢佛功德也十中前三變化淨因後七受用淨因上欲總𭣣諸土故依次豎配若約橫修初心即可圓具其十如善財者七十三經大願精進力夜神善財初見起於善知識同己等十心便得佛剎微塵數同行所謂同念心常憶念十方三世佛故同慧心分別決定一切法故等廣如彼說此下數假皆如十地經文爾時普賢菩薩欲重宣其義承佛威力觀察十方而說頌言一切剎海諸莊嚴無數方便願力生一切剎海常光耀無量清淨業力起其十頌中九偈分二初一總明能所淨前半方便後半清淨皆上句果下句因前半方便後半清淨者以各下句有方便清淨言故言皆上句果下句因者從多分說則方便為因清淨為果若從通說俱通因果方便約因善巧出生於土方便約果依正業用是淨土相清淨約因離諸障蓋清淨約果無有三惡八難等故久遠親近善知識同修善業皆清淨慈悲廣大遍衆生以此莊嚴諸剎海一切法門三昧等禪定解脫方便地於諸佛所悉淨治以此出生諸剎海發生無量决定解能解如來等無異忍海方便已修治故能嚴淨無邊剎為利衆生修勝行福德廣大常增長譬如雲布等虛空一切剎海皆成就後八別頌前文於中初四如次頌上四淨初地慈悲為首故云為生修行遍滿真如故云廣大諸度無量等剎塵悉已修行令具足願波羅蜜無有盡清淨剎海從此生第五偈頌修治淨及超頌第七願淨以願通初地八地此據初地故超頌也淨修無等一切法生起無邊出要行種種方便化群生如是莊嚴國土海第六偈頌前第八出要修習莊嚴方便地入佛功德法門海普使衆生竭苦源廣大淨剎皆成就第七偈頌第九及却頌觀菩薩地地義通前後故力海廣大無與等普使衆生種善根供養一切諸如來國土無邊悉清淨第八偈頌方便力上來且配長行其間亦兼餘義清淨竟爾時普賢菩薩復告大衆言諸佛子應知一一世界海有世界海微塵數佛出現差別第七𫨻佛出差別者十事五對於海及種有此差別所謂或現小身或現大身或現短壽或現長壽或唯嚴淨一佛國土或有嚴淨無量佛土或唯顯示一乘法輪或有顯示不可思議諸乘法輪或現調伏少分衆生或示調伏無邊衆生如是等有世界海微塵數五中初二隨彼類故次一緣廣狹故次一隨機宜故五熟未熟故初二隨彼類者如佛出娑婆但可丈六若生極樂無量由旬不可無邊身如來以化三尺衆生丈六之佛化萬丈之人壽亦然矣居於此剎不滿百年彌陀人民壽皆無量然此一對亦通化機多少次一緣廣狹者緣廣則剎廣如文殊普見之邦緣狹則剎狹如迦葉光德之國三宜聞三則祕一乘之妙寶宜聞一則廢羊鹿之小車根熟者化多如釋迦之化未熟則化少如須扇多如來亦是因中緣廣狹故爾時普賢菩薩欲重宣其義承佛威力觀察十方而說頌言諸佛種種方便門出興一切諸剎海皆隨衆生心所樂此是如來善權力十頌分三初一頌總標諸佛法身不思議無色無形無影像能為衆生現衆相隨其心樂悉令見或為衆生現短壽或現住壽無量劫法身十方普現前隨宜出現於世間或有嚴淨不思議十方所有諸剎海或唯嚴淨一國土於一示現悉無餘或隨衆生心所樂示現難思種種乘或有唯宣一乘法一中方便現無量或有自然成正覺令少衆生住於道或有能於一念中開悟群迷無有數次五偈別釋如次頌前五對或於毛孔出化雲示現無量無邊佛一切世間皆現覩種種方便度群生或有言音普周遍隨其心樂而說法不可思議大劫中調伏無量衆生海或有無量莊嚴國衆會清淨儼然坐佛如雲布在其中十方剎海靡不充諸佛方便不思議隨衆生心悉現前普住種種莊嚴剎一切國土皆周遍後四頌總結既隨心總遍故剎海塵數未足為多佛出差別竟爾時普賢菩薩復告大衆言諸佛子應知世界海有世界海微塵數劫住所謂或有阿僧祗劫住或有無量劫住或有無邊劫住或有無等劫住或有不可數劫住或有不可稱劫住或有不可思劫住或有不可量劫住或有不可說劫住或有不可說不可說劫住如是等有世界海微塵數第八假劫住不同謂剎住經停時分也隨能感因有長短故長行略列有十大數更有多少不同如標結中及頌所顯並通諸剎不謂淨長如大地獄其壽更長人趣却促故極惡極善受時即多更約異門亦不可定也十中唯九者缺不可說不可說也並如阿僧祇品爾時普賢菩薩欲重宣其義承佛威力觀察十方而說頌言世界海中種種劫廣大方便所莊嚴十方國土咸觀見數量差別悉明了我見十方世界海劫數無量等衆生或長或短或無邊以佛音聲今演說偈中十頌然劫但時分無別義理故此偈文轉勢頌之略分為三初二總標許說頌上標也我見十方諸剎海或住國土微塵劫或有一劫或無數以願種種各不同次有一偈通頌上列兼顯修短之因以願力故或有純淨或純染或復染淨二俱雜願海安立種種殊住於衆生心想中餘七頌總結偈各一義一明修短通於染淨結以心想往昔修行剎塵劫獲大清淨世界海諸佛境界具莊嚴永住無邊廣大劫二淨劫住久釋以因深有名種種寶光明或名等音焰眼藏離塵光明及賢劫此清淨劫攝一切三列諸劫名染淨相聶有清淨劫一佛興或一劫中無量現無盡方便大願力入於一切種種劫四佛興願異故入劫不同或無量劫入一劫或復一劫入多劫一切劫海種種門十方國土皆明現五一多互融齊攝雙現或一切劫莊嚴事於一劫中皆現覩或一劫內所莊嚴普入一切無邊劫六時法相攝普入無邊始從一念終成劫悉依衆生心想生一切剎海劫無邊以一方便皆清淨七結由想心示以方便一方便者即了唯心也一念與劫並由想心心想不生長短安在非長非短是謂清淨不壞於相則劫海無邊一念與劫下釋唯心方便之義然一念與劫並由想心此有二意一者由有想念即有剎那積此剎那終竟成劫心想若滅生死長絶此順經文二者一切境界皆依妄念而有差別若離心念則無一切境界之相此順經意成唯心觀是故疏云心想不生長短安在無長無短即心體清淨是以經言以一方便皆清淨也此約真性故第三句是不壞相義相性無礙剎海義也劫住竟爾時普賢菩薩復告大衆言諸佛子應知世界海有世界海微塵數劫轉變差別第九假劫轉變差別者此有二種一者但約感成住壞劫皆名轉變二唯約住劫之中居人善惡令染淨轉變二唯約住劫之中居人善惡復有二義一約衆生引因所得二約菩薩居中作用心純善故染淨交徹耳所謂法如是故世界海無量成壞劫轉變釋中具二初一即是前義故云無量成壞劫轉變言法爾者法爾隨業轉也若爾何異起具因緣因緣意在於因轉變意彰於果又因緣通有唯成不壞如自受用因是也餘九釋後義染汙衆生住故世界海成染汙劫轉變一遇惡緣故淨變為染下文云泉池皆枯涸等遇惡緣故變淨為染即是經中染汙衆生住故七十二經云往昔此城邑大王未出時一切不可樂猶如餓鬼處衆生相殺害竊盜縱淫佚兩舌不實語無義粗惡言貪愛他財物瞋恚懷毒心邪見不善行命終墮惡道以是諸衆生愚癡所覆蔽住於顛倒見上惡緣也天旱不降澤以時無雨故百穀悉不生草木皆枯槁泉流亦乾竭大王未興世河池悉枯涸園苑多骸骨望之如曠野即劫變也修廣大福衆生住故世界海成染淨劫轉變二修人天大福令世界多染少淨故先云染如下文云粳米自然生等粳米自然生等即是上經次文云大王升寶位廣濟諸群生油雲被八方普雨皆充洽乃翻十惡成其十善其中翻偷盜云往昔諸衆生貧窮少衣服以草自遮蔽饑羸如餓鬼大王既興世粳米自然生樹中生妙衣男女皆嚴飾即其事也信解菩薩住故世界海成染淨劫轉變三即地前以未斷障故非純淨以淨多故故先云淨經多云染淨與前何別或譯人之失或傳寫之誤即地前者信解是地前通稱亦名勝解行住未證真如但依解力而修行故無量衆生發菩提心故世界海純清淨劫轉變四即證發心居受用土故但云純淨諸菩薩各各遊諸世界故世界海無邊莊嚴劫轉變五各各游者即二地至十地諸菩薩遊戲神通以多莊嚴而嚴一剎或以一嚴而嚴多剎所至染剎則能莊嚴也以多莊嚴者如第五回向即願普攝十方三世所有佛剎一切莊嚴而嚴一剎一切亦然至登地竟能如願成如八地十地中說或以一嚴而嚴多剎者第二回向云以一莊嚴嚴一切亦不於法生分別如是開悟諸衆生一切無性無所觀十方一切世界海諸菩薩雲集故世界海無量大莊嚴劫轉變六大莊嚴者即普賢位嚴於微塵內剎如上口光召衆等是如上口光召衆者即第六經其諸菩薩既至會中現自在用云如是坐已其諸菩薩身毛孔中一一各現十世界海微塵數一切寶種種色光明一一光中現十世界海微塵數諸菩薩皆坐蓮華藏師子之座此諸菩薩悉能遍往一切法界諸安立海所有微塵彼一一塵中皆有十佛世界微塵數諸廣大剎一一剎中皆有三世諸佛世尊此諸菩薩悉能遍往親近供養等即嚴淨塵中剎也諸佛世尊入涅槃故世界海莊嚴滅劫轉變七莊嚴滅者此明失善緣而惡現謂如來示滅能事隨滅佛滅百年乳不及水况今之世况於減極稗為上味鐵為上嚴佛滅百年者育王經說育王常供養諸聖僧上座食乳稍多育王白言乳若多食恐生疾患上座云此乳有何力不及世尊在世時水今佛滅度一切精淳皆沉地下育王願見佛在時水上座展手地下取水育王嘗之實過於乳明知福人滅矣能事隨滅百年上爾況今去聖將二千年尤更淡薄況於減極鐵為上嚴稗為上味如起世經說諸佛出現於世故一切世界海廣博嚴淨劫轉變八如彌勒來也如彌勒來者即彌勒下生經說佛告舍利弗云四大海水以漸減少三千由旬是時閻浮提地長十千由旬廣八千由旬平坦如鏡名華軟草遍覆其地種種樹木華果茂盛其樹悉皆高三十里城邑次比雞飛相及人壽八萬嵗智慧威德色力具足安隱快樂有一大城名翅頭末底長十二由旬廣七由旬其城七寶上有樓閣戶牖軒窗皆是衆寶真珠網覆街廣十二里巷陌處處皆有明珠柱處處皆有金銀之聚便利不淨地裂受之受已還合亦無衰惱水火刀兵及諸饑饉毒害之事園林池沼入功德水衆華異香皆悉盈滿不生草穢一種七穫味甚香美增益色力等廣如彼說如來神通變化故世界海普清淨劫轉變如是等有世界海微塵數九以佛神通于何不淨淨名足指案地法華三變淨土即其類也淨名足指案地者即佛國品說隨其心淨則佛土淨爾時舍利弗承佛威神作是念若菩薩心淨則佛土淨者我世尊本為菩薩時意豈不淨而是佛土不淨若此佛知其意即告之言我此土淨而汝不見爾時世尊即以足指案地即時三千大千世界若干百千衆寶嚴飾譬如寶莊嚴佛無量功德寶莊嚴土一切大衆歎未曾有而皆自見坐寶蓮華等是也法華三變淨土即見寶塔品大樂說請開塔戶佛言須集分身大樂說請集分身世尊放光遠召為欲受分身佛故一變娑婆二於八方各更變二百萬億那由他國土皆令清淨坐佛不足第三更變二百萬億那由他國土皆令清淨故云三變上之十事初總餘別不出業故又初二屬凡次四菩薩後三屬佛又約佛菩薩即染令淨約於凡夫即淨成染爾時普賢菩薩欲重宣其義承佛威力觀察十方而說頌言一切諸國土皆隨業力生汝等應觀察轉變相如是染汙諸衆生業惑纏可怖彼心令剎海一切成染汙若有清淨心修諸福德行彼心令剎海雜染及清淨信解諸菩薩於彼劫中生隨其心所有雜染清淨者無量諸衆生悉發菩提心彼心令剎海住劫恆清淨無量億菩薩往詣於十方莊嚴無有殊劫中差別見一一微塵內佛剎如塵數菩薩共雲集國土皆清淨世尊入涅槃彼土莊嚴滅衆生無法器世界成雜染若有佛興世一切悉珍好隨其心清淨莊嚴皆具足諸佛神通力示現不思議是時諸剎海一切普清淨十頌如次頌前可知劫轉變差別竟爾時普賢菩薩復告大衆言諸佛子應知世界海有世界海微塵數無差別第十無差別者謂前九辨諸世界約相不同隨業染淨由於衆生有差別故今云無差性無二故故偈云業性起也謂前九下皆釋摽名於中有三一約性相相對相則有差性則無差又約權設則種種差別今約實說則一切無差如教法中或說三乘即是差別說華嚴時一切無差又約權設下二約權實相對實則無差又皆是諸佛之所用故一一融攝等無異故故前九差別是此無差之差今此即是前九差之無差也故法華云衆生見燒淨土不毀二皆相即由依此義說淨土中十八圓滿一一稱真皆周遍故又皆是諸佛下三𭣣差與無差皆歸果用前之二對性相權實二不相即今則融即言無差之差者是圓融之行布也差之無差者是行布之圓融也若離圓融非圓教法若無差別無可圓融如攬別成總非離別外而有此總故法華下但明二不相離由依此義下顯十八圓滿由此而成所謂一一世界海中有世界海微塵數世界無差別一一世界海中諸佛出現所有威力無差別一一世界海中一切道場遍十方法界無差別一一世界海中一切如來道場衆會無差別一一世界海中一切佛光明遍法界無差別一一世界海中一切佛變化名號無差別一一世界海中一切佛音聲普遍世界海無邊劫住無差別一一世界海中法輪方便無差別一一世界海中一切世界海普入一塵無差別一一世界海中一一微塵一切三世諸佛世尊廣大境界皆於中現無差別二釋中十事一海中包數同則盡海之塵一塵一剎已是含攝之義二佛示威力同三道場同同真性故四衆會同常隨衆故五光明六名號七音聲八法輪方便上七皆約不動一而普遍無差九塵含剎海十塵容佛境此二約不壞相而廣容無差則盡海之塵者以經云一一世界海中有世界海微塵數世界無差別謂一箇世界海還有世界海微塵數世界則義當一塵是一世界竟唯就此一句已顯融攝釋無差別義善成矣若界界相望論無差者無差全少今十句中句句各有世界海塵則一海之中已有十世界海塵數無差故須融攝諸佛子世界海無差別略說如是若廣說者有世界海微塵數無差別爾時普賢菩薩欲重宣其義承佛威力觀察十方而說頌言一微塵中多剎海處所各別悉嚴淨如是無量入一中一一區分無雜越一一塵內難思佛隨衆生心普現前一切剎海靡不周如是方便無差別一一塵中諸樹王種種莊嚴悉垂布十方國土皆同現如是一切無差別一一塵內微塵衆悉共圍繞人中主出過一切遍世間亦不迫隘相雜亂一一塵中無量光普遍十方諸國土悉現諸佛菩提行一切剎海無差別一一塵中無量身變化如雲普周遍以佛神通導群品十方國土亦無別一一塵中說衆法其法清淨如輪轉種種方便自在門一切皆演無差別一塵普演諸佛音充滿法器諸衆生遍住剎海無央劫如是音聲亦無異剎海無量妙莊嚴於一塵中無不入如是諸佛神通力一切皆由業性起一一塵中三世佛隨其所樂悉令見體性無來亦無去以願力故遍世間頌中十頌如次頌上十義但第六約身與前名體異耳而前但約平漫無差今顯塵內重疊共融攝無差之義若云約同事者何以不言染同業苦同豈世界海中都無此耶而前但約下即長行云一一世界海中所有佛威力無差別今乃皆云一一塵中無量光等即是重疊無差也若云已下結彈古人謂經舉十事皆約融攝若依昔義何以不言一一世界海中染剎無差別一一世界海由衆生受苦無差別以世界海中皆有染有苦故豈世界海中都無此耶今經不言明知約融攝無差別耳無差別竟音釋擾而沼切亂也繪胡對切畫也稗旁卦切似稻穢草也頃丘切頃刻也儼然儼疑檢切儼然端莊貌蘂乳切花鬚也翅丑智切癡去聲涸曷各切音鶴水竭也粳古衡切音耕與杭同佚弋質切音逸穫胡郭切黃入聲刈禾也牖因九切音有骸雄皆切音鞋羸盧回切音雷廋也
