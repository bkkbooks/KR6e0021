body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述爾時文殊師利菩薩摩訶薩承佛威力普觀一切菩薩衆會而作是言此諸菩薩甚為希有第二爾時文殊下辨言説答就文分四一歎衆希奇二諸佛子下牒問總歎三何以故下徵歎總釋四諸佛子如來下廣顯難思今初也前衆疑問佛令文殊答者以文殊示居此土生有十徵來自他方體含萬德降魔制外通辨難思化滿塵方用周三際道成先劫已稱龍種尊王現證菩提復曰摩尼寶積實為三世佛母豈獨釋迦之師以文殊者釋文殊説意上明是主菩薩盧山遠公但云文殊師利是遊方大士唯見一經但覩一迹耳今具出之是主是客亦果亦因具難思也言示生此土者即文殊般泥洹經云佛告跋陀婆羅此文殊師利有大慈悲生此國土多羅聚落梵德婆羅門家其生之時家內屋宅化如蓮華從母右脅而生身紫金色墮地能言如天童子有七寶蓋隨覆其上釋曰言此國者即舍衛國佛正在此説故此經復云文殊師利具三十二相八十種好則相好同佛復有經説生有十徵無非吉瑞一光明滿室二甘露垂三地踊七珍四神開伏藏五雞生鳳子六豬誕龍純七馬産麒麟八牛生白澤九倉變金栗十象具六牙由是得立妙吉祥號來自他方者即今經文從東方金色世界中來節節皆言所住世界謂金色等既周法界不動而遍各領十佛剎塵數菩薩説佛功德明萬德斯備矣上之二對摽其主客下略説勝德降魔制外通辨難思者然此一句有通有別通則通用通辨降伏魔怨制諸外道別明以神通怖之以威故言降用四辨屈之以辨故言制然其事頗多略舉一二如幻三昧經云時有善住意天子白文殊同見佛文殊現變三十二部交絡重閣有諸菩薩先至佛所身子覩變怪問佛佛答是文殊令諸菩薩集會又問何以不見文殊佛答文殊住降毀諸魔三昧正受蔽魔宮殿與大威變詣如來所於是文殊住降毀諸魔三昧應時三千大千世界百億魔宮一時皆蔽不樂其處各各懷懼時魔波旬自見老毫嬴毀少氣拄杖而行所有宮人及彩女等亦復嬴老又見宮殿而復崩壞暗暗冥𡨋不知東西時魔波旬即懷恐懼身毛為竪心自念言比何變怪令吾宮殿萎頓乃爾將死罪至歸命終𥁞天地遇災劫被燒耶時魔波旬棄除貢高捨惡思想時文殊師利所化百億天子在交絡者住諸魔前謂魔波旬莫懷恐懼汝等之身終無患難有不退轉菩薩大士名文殊師利威德殊絶總攝十方德過須彌智超江海慧越虛空於今已入降毀魔場三昧正受是其威神下取意引時魔恐懼魔宮震動求化菩薩願見救濟菩薩答言勿懼可詣釋迦如來所有無盡慈悲令無所畏言訖不現魔即俱來詣佛請救我等聞文殊名即懷恐懼不能自安畏亡身命佛讚文殊魔請歸依願脫斯苦佛令且待須文殊當來即脫此難後文殊至佛問三昧彼廣説竟令捨諸魔文殊問魔汝穢惡此身耶魔答云爾若爾當厭貪欲事不住三界魔教從命即令諸藏皆復本形五體如故等此即降魔也剎外者即文殊般泥洹經佛説文殊初詣諸仙求出家法諸婆羅門九十五種諸論議師無能酬對唯於我所出家學道餘文廣博不可具引至如聖智怖心開聲揚而劈地寂順思覩入隱身而立空故得帝釋欣喜雨天華而至膝蔽魔愁憂行拄杖而垂淚劫火燒剎蹈水芝上行霖雨絶供化鉢飯而無盡示多身以抗迦葉放一鉢而發本源皆是通辨降魔制外也又如度二十億佛現説法者持地猶存化百千諸龍立登正覺者王女是一是以禮妙慧而不忘敬本勸善財而增長發心無言於不二法門悉力於安樂行品教龍吉祥之分衛下位莫知答琉璃光之光明正覺稱妙談般若之玄致屢質本師説權實之雙行頻驚小聖皆辨才也化滿塵方者辨德用橫竪深廣也謂十方微塵剎土皆是文殊化處故菩薩處胎經云我身如微塵今在他國土三十二相明在在無不現餘如衆海雲集中引又般泥洹經云住首楞嚴三昧以三昧力於十方國或現初生出家滅度入般涅槃分布舍利饒益衆生又寶藏陀羅尼經廣説至下菩薩住處品當更明之即今文中一切處一時説偈即橫周法界道成先劫者此下別明竪窮略示一二也先劫即過去名龍種上尊王智度論十二具引首楞嚴三昧經説名龍種上尊王經文但名龍種上佛即譯人廣略耳五十三佛名亦名龍種上尊王其首楞嚴三昧經有三卷即當下卷因文殊廣説首楞嚴三昧境界竟爾時長老摩訶迦葉白佛言世尊我謂文殊法王子曾於先世已作佛事現坐道場轉於法輪示諸衆生入大滅度佛言如是如是如汝所説迦葉過去久遠無量無邊不可思議阿僧祇劫爾時有佛號龍種上如來應供正遍知云云於此世界南方過於千佛國土國名平正無有沙礫瓦石丘陵塠阜地平如掌生柔軟革如迦陵伽龍種上佛於彼世界得阿耨多羅三藐三菩提初轉法輪教化成就七十億數諸菩薩衆云云佛壽四百四千萬歲下取意引涅槃後起三十六億塔法住十萬歲記智明菩薩次當作佛下結會云爾時平等世界龍種上佛豈異人乎即文殊法王子是現證菩提者即央掘摩羅經此經有四卷事出第四初卷中明舍衛城北有村名薩那有一貧窮婆羅門女名跋陀羅女生一子名一切世間現少失其父年將十二聰明辨慧有異村名頗羅訶私有一舊住婆羅門師名摩尼跋陀羅下取意引世間現從其受學師受王請留其守舍師婦年少染心逼之世間現不受其師少婦自懸毀害師歸言世間現強逼師言汝已為惡當殺千人可滅汝罪即殺千人還歸見師師怪其存又令殺千人各取一指作鬘冠首唯欠一人母為送食便欲害母世尊現前捨母趣佛為佛所降廣顯深妙第四末波斯匿王嚴四兵至欲罰央掘來至佛所佛示央掘後發其迹云大王南方去此過六十二恆河沙剎有國名一切寶莊嚴佛名一切世間樂見上大精進下取意引壽命無量國土嚴淨純説一乘即央掘是由前文殊廣與對揚後顯文殊之迹云大王北方去此過四十二恆河沙剎有國名常喜佛名歡喜藏摩尼寶積純一大乘無餘乘名即文殊師利是故云現證菩提復云摩尼寶積蓋言略耳下顯師及師婦央掘之母三人皆是如來化現耳上略舉過現不説未來成佛者未來成佛現即是因非殊勝故疏略不顯若欲説者即大寶積文殊會中説於未來成佛號普見如來以恆河沙界莊嚴為一佛國以安養世界莊嚴比之析毛滴海不可為喻其中衆生具三十二相天眼無礙鏡照十方不聞生老病死等苦但出佛法僧之聲若人欲見應念便覩不待解釋疑網皆除聞名得最上善利聆記為面見諸佛等實為三世佛母者結其實德七十九經云文殊師利所有大願非餘無量百千億那由他菩薩之所能有善哉文殊師利其行廣大其願無邊出生一切菩薩功德無有休息善哉文殊師利常為無量百千億那由他諸佛母常為無量百千億那由他諸菩薩師教化成就一切衆生等佛名經説過去無量恆河沙佛皆是文殊教令發心然猶帶數故今顯實實為一切佛母不可窮其始末豈獨釋迦之師者即前所引處胎經云昔為能仁師今為佛弟子二尊不並立故我為菩薩即法華九世祖師亦帶方便住首楞嚴三昧亦是迹中故弛張乎權實之場瑩徹乎真如之際住諸佛不思議之境豈可語其始終無言強言為三世之佛母耳影響而來一切咸見故其説也何不待請敬同佛故何不待告承佛神力佛意許故衆既念請佛方現相非夫尊極大士安行理契潛通故上以光示普賢此乃𡨋加妙德若爾普賢云何定後更請表説所信甚深細故何不入定以果從因同於信故餘如上説何故無加以無定故又承佛神力是𡨋加故影響而來者結也影響顯非實因也何不入定者問意云信未入位許不入定説佛三業何不入定故為此通以果從因因即十信十信不入果亦不入是十信中所説果故歎衆希有者略有五義感應懸隔難一遇故德行內充總稱歎故以名表法甚希有故創起信行未曾有故此一衆會即是等空法界會故諸佛子佛國土不可思議佛住佛剎莊嚴佛法性佛剎清淨佛説法佛出現佛剎成就佛阿耨多羅三藐三菩提皆不可思議二牒問中脫於剎體佛出現者即前威德也阿云無也耨多羅上也三者正也藐者等也又三遍也菩提覺也謂道不可加曰無上也無邪委知為正遍也何以故諸佛子十方世界一切諸佛知諸衆生樂欲不同隨其所應説法調伏如是乃至等法界虛空界三徵釋中徵上難思言也下釋云能感之機差別無邊如來普應周于法界廣難思也下結文具顯結文具顯者即品末云如世尊昔為菩薩時以種種談論種種語言種種音聲種種業種種報種種處種種方便種種根種種信解種種地位而得成就亦令衆生如是知見而為説法即其文也又隨宜説法意趣難思又等法界者舉一説法等餘多門門不可𥁞量等法界法門難思又隨宜説法者上指品末廣故難思今明意趣深故難思亦如法華方便品説謂稱體大用或隨自意或隨他意或隨自他意故又等法界下多門難思諸佛子如來於此娑婆世界諸四天下種種身種種名種種色相種種修短種種壽量種種處所種種諸根種種生處種種語業種種觀察令諸衆生各別知見第四廣顯難思文二先總顯多端二隨門別顯今初也舉娑婆為首略顯十種差別多端凖下結通實通法界十句不出三業一身為總相現十法界不同故云種種二名以召實次下廣辨三金銀等色不同三十二相等異三金銀等色者如觀佛三昧海經第三廣説今當義引佛為父王説觀諸相竟佛白父王乃勑阿難吾今為汝悉現具足微妙身相説是語已佛從坐起令衆俱起令觀如來從頂順觀至足輪相復從足相逆觀至頂一一身分分明了了如人執鏡自見靣像若生垢惡不善心者若有曾毀佛禁戒者見像純黑猶如炭人五百釋子但見炭人有千比丘見赤土色優婆塞十六人見黑象腳色優婆夷二十四人見如聚墨比丘尼見如白銀優婆塞優婆夷有見如藍染青色四衆悲淚釋子髮碎身自述所見父王安慰竟釋子即起白阿難言我宿罪故不見佛身佛為説因過去毗婆尸佛時有長者名日月德有五百子聰慧無雙不信父之正法子臨終時父云汝等邪見不信正法今無常刀割汝身心為何所怙令稱毗婆尸佛名未及法僧而終生天四王天後邪見因故墮地獄鐵叉刺眼憶父所教得生人中六佛出現聞名而不得見以得聞六佛名故與我同生如來令稱佛名禮拜懺悔還見相好即得初果求佛出家得阿羅漢千比丘見赤土色者過去然燈佛時像法中有千弟子疑師師見其臨終令稱念然燈佛名生忉利天以疑師罪墮餓鬼中洋銅灌明以稱佛名今得值佛佛示胸前萬字令讀於此字中説八萬四千功德行即便懺悔罪障消滅得記作佛比丘尼見白銀色者過去釋迦佛時五百童女在山澤中忽過比丘皆脫銀環散上發願願此比丘成佛時願我見之如所散環此後生生作銀山神今見銀色從是已來恆值諸佛優婆塞見黑象腳者此等昔時皆作國王受邪沙門説於邪法其説法人墮阿鼻獄汝等隨惡友教故墮黑暗獄由前聞法善心力故今得遇我得受五戒令其懺悔佛放眉間白毫光照便得初果求佛出家成阿羅漢優婆夷見聚墨色者佛説昔時寶蓋燈王佛像法中有一比丘巡行乞食至女家其女見之盛滿鉢飯戲弄比丘言汝顏色可惡猶如聚墨身所著衣狀如乞明大智利根無有過不答言有問誰是答云沙門瞿曇此一無過我四圍陀經中説釋種沙門無有過失所謂生在大家不可譏嫌何以故是轉輪王種故種姓豪貴不可譏嫌以甘蔗種姓家生故福德莊嚴不可譏嫌三十二相八十種好莊嚴身故下廣説如來具大慈悲無礙辨才十力無畏諸不共德廣説三十二相八十種好一切功德云唯此一人無有過失則顯餘皆不免故今疏云無能説遇王聞發心諸佛子此四天下南次有世界名為難忍如來於彼或名帝釋或名寶稱或名離垢或名實語或名能調伏或名具足喜或名大名稱或名能利益或名無邊或名最勝如是等其數十千令諸衆生各別知見暮寂五壽命者或無量劫如阿彌陀或不滿百年如今世尊故涅槃云我聞諸天壽命極長云何如來是天中天壽命短促不滿百年下至朝現暮寂者如月靣佛壽一日夜故佛名經第六云妙聲佛壽六十百千歲智自在佛壽十二千歲威德自在佛壽七十六千歲摩醯首羅佛壽一億歲梵聲佛壽十億歲大衆自在佛壽六十千歲勝聲佛壽百億歲月靣佛壽一日夜日靣佛壽一千八百歲梵靣佛壽二十三千歲又第二云諸佛壽命長短差別有十阿僧祗百千萬億毗盧遮那品云一切功德須彌勝雲佛壽五十億歲下經之中説諸佛壽長短多門六處謂化處染淨等殊七根謂眼等隨感現異七根謂眼等者佛眼等六根通相而言三十二相廣長舌等既有八萬四千等異則六根之相隨宜亦殊故高幢普照主山神得觀察一切衆生心所樂嚴淨諸根解脫門雨華妙眼道場神得雨一切難捨衆寶莊嚴具解脫門偈云昔行施行無量劫能捨難捨眼如海如是捨行為衆生此妙眼神能悟悅謂於一眼有無量行故所得眼無量差別復有諸根美妙執金剛神又上經云佛眼云何無有量等八生處有剎利等別九依語之用隨方言音施設非一故十觀察者周旋顧盻以應羣機又觀存亡安危可不智照諸境示有多端下結意云令諸衆生各稱己分而自知見得調伏耳諸佛子如來於此四天下中或名一切義成或名圓滿月或名師子吼或名釋迦牟尼或名第七仙或名毗盧遮那或名瞿曇氏或名大沙門或名最勝或名導師如是等其數十千令諸衆生各別知見第二諸佛子下隨門別顯文分為三初終此品辨身名差別答上佛住之問近廣種種身等八句以色相等皆屬身故二四諦品辨言教遍周答佛所説法問近廣種種語業三光明覺品明光輪窮照答上威德法性菩提三問近廣種種觀察其五句依報但有現相答廣在前會故今初廣上名者然聖人無名為物立稱若就德以立德無邊涯若隨機立名等衆生界雖復多種皆為隨宜生善滅惡見理而立海印頓現不應生著也然聖人無名下欲顯多名先且立理於中有二先雙標謂本無言相故下經云已出世間言語道其性非有非無故凡有言象皆是隨俗利衆生耳若就德下二辨名就無名立名不出此二就德通於真應隨機唯約利他雖復多種下二以義統收不出四悉檀義一世界悉檀但令歡喜如來立名少從於此多約後三今言隨宜此為總句四悉皆是隨物宜故此句亦攝世界悉檀二生善者即是為人三滅惡者即是對治四見理者即第一義四悉亦名四隨問明品中更當廣説海印頓現者無𥁞之名皆我本師海印頓現即攝十方三世佛號皆屬一佛隨宜之號非約多佛文中分四一娑婆之內自有百億二娑婆鄰近即百億之外三類通一切謂𥁞十方四釋差別所由由隨物故初中分三初此四洲二四洲之鄰十界三總結娑婆今初亦三初標處次列名後結數他皆倣此舉四洲者昔云意取閻浮言總意別餘三天下佛不出故然雖不出除北俱盧餘容有往下並凖之一切義成即悉達也無事不成就故一切義成者梵名悉達多太子時號果收因名恐人不知故將梵言以釋唐語圓滿月者惑斷智圓恩蔭清涼故惑斷等者暗𥁞明圓清涼益物如三德也師子吼者名決定説釋迦牟尼者釋迦云能能仁種故牟尼云寂默契寂理故第七仙者七佛之末故若取賢劫當第四仙即喻也無欲染故毗盧遮那廣如前釋瞿曇氏者唯約姓也此云地主以從劫初代代相承為轉輪王故然上云釋迦乃是族望此即姓望故智論第二云釋迦牟尼姓瞿曇故佛名經亦然然上云者姓望如崔盧等族望如博陵等以是能二之瞿曇故沙門此云息惡無惡不息故復稱大最勝者聖中極故德無加故導師者引導衆生離險難故於生死海示衆寶故然名含多義略釋此十恐文繁博餘但隨難解之諸佛子此四天下東次有世界名為善護如來於彼或名金剛或名自在或名有智慧或名難勝或名雲王或名無諍或名能為主或名心歡喜或名無與等或名斷言論如是等其數十千令諸衆生各別知見二此四天下東下此洲之鄰十界即為十𫨻其善護等皆四洲之通稱也今初東方斷言論者證離言故無能説過故無能説過者即大薩遮凡乾子所説經第四卷有嚴熾王請薩遮入宮供養因問云大師頗有人於衆生界中聰明大智利根黠慧有罪過不答言有下有十重問答大意皆同一問是誰一云能雨婆羅門聰明大智常多欲喜侵他妻二頗羅墮婆羅門多睡三黑王子多嫉妬四勝仙王子多殺生五無畏王子慈心太過六天力王子飲酒太過七婆藪天王子行事太過八大仙王子貪心太過九大天王子輕躁戲笑放逸太過十波斯匿王噉食太過第十一問還更有不答云有王亦有過謂太暴惡急卒王聞大怒令殺尼乾尼乾驚怖乞容一言云我亦有過實語太過大王黠慧之人不應於一切時常行實語觀其可不我於暴卒人前出其實語故為太過王悟悔過更問頗有聰明大智利根無有過不答言有問誰是答云沙門瞿曇此一無過我四圓陀經中説釋種沙門無有過失所謂生在大家不可譏嫌何以故是轉輪王種故種姓豪貴不可譏嫌以甘蔗種姓家生故福德莊嚴不可譏嫌三十二相八十種好莊嚴身故下廣説如來具大慈悲無礙辨才十力無畏諸不共德廣説三十二相八十種好一切功德云唯此一人無有過失則顯餘皆不免故今疏云無能説過王聞發心諸佛子此四天下南次有世界名為難忍如來於彼或名帝釋或名寶稱或名離垢或名實語或名能調伏或名具足喜或名大名稱或名能利益或名無邊或名最勝如是等其數十千令諸衆生各別知見南云帝釋者為天人主能稱物心故諸佛子此四天下西次有世界名為親慧如來於彼或名水天或名喜見或名最勝王或名調伏天或名真實慧或名到究竟或名歡喜或名法慧或名所作已辦或名善住如是等其數十千令諸衆生各別知見西云水天者水善利萬物天光淨故諸佛子此四天下北次有世界名有師子如來於彼或名大牟尼或名苦行或名世所尊或名最勝田或名一切智或名善意或名清淨或名醫羅跋那或名最上施或名苦行得如是等其數十千令諸衆生各別知見北方醫羅跋那者具云醫濕弗羅跋那醫濕弗自在也羅跋那者聲也即圓音自在耳諸佛子此四天下東北方次有世界名妙觀察如來於彼或名調伏魔或名成就或名息滅或名賢天或名離貪或名勝慧或名心平等或名無能勝或名智慧音或名難出現如是等其數十千令諸衆生各別知見諸佛子此四天下東南方次有世界名為喜樂如來於彼或名極威嚴或名光焰聚或名遍知或名祕密或名解脫或名性安住或名如法行或名淨眼王或名大勇健或名精進力如是等其數十千令諸衆生各別知見諸佛子此四天下西南方次有世界名甚堅牢如來於彼或名安住或名智王或名圓滿或名不動或名妙眼或名頂王或名自在音或名一切施或名持衆仙或名勝須彌如是等其數十千令諸衆生各別知見諸佛子此四天下西北方次有世界名為妙地如來於彼或名普遍或名光焰或名摩尼髻或名可憶念或名無上義或名常喜樂或名性清淨或名圓滿光或名修臂或名住本如是等其數十千令諸衆生各別知見諸佛子此四天下次下方有世界名為焰慧如來於彼或名集善根或名師子相或名猛利慧或名金色焰或名一切知識或名究竟音或名作利益或名到究竟或名真實天或名普遍勝如是等其數十千令諸衆生各別知見諸佛子此四天下次上方有世界名曰持地如來於彼或名有智慧或名清淨面或名覺慧或名上首或名行莊嚴或名發歡喜或名意成滿或名如盛火或名持戒或名一道如是等其數十千令諸衆生各別知見上云盛火者盛火焚薪不擇材木佛智利物無揀賢愚問餘聖教説大輪圍內平布百億上即諸天下安地獄如何此説上下皆有四洲答此教所説事隨理融隨説法處即是當中縱極上際旁至大輪圍山亦有十方互為主伴以融為眷屬本數非多十方界融亦凖於此因此略説娑婆融通改非改相略有其五一約事常定如小乘説二隨心見異若身子梵王三就佛而言本非淨穢四隨法回轉如上主伴互為五潛入微塵如前會説因此以下二類顯義理即五教意二通始終三即頓教四五皆圓若通論餘淨土更有五義謂諸剎相入義相即義一具一切義廣狹自在義帝網重疊義並如前後諸文所説若約通論下該通諸剎以上五義但語娑婆今該橫竪一切諸剎此五亦即成就品中十無礙義欲對上五顯其無𥁞故復重明又前約五教以法隨機此五約理直語融即一相入義即一多相容不同門二相即義即諸法相即自在門三一具一切即同時具足相應門四即廣即狹是廣狹自在無礙門五即因陀羅網境界門又兼上五潛入微塵即微細義隨法回轉即主伴義隨心見異即隱顯義就佛而言本非淨穢託事表法十門不同即託事義顯於時中即十世義十玄具矣上之十義直約處明立名如是若小乘中𥁞三千界唯一釋迦若三乘説亦百億內有百億釋迦餘十方剎自是別佛今約一乘皆是遮那海印頓現餘十方佛例此亦然猶如燈光互入同遍然於一乘不可説體建立多名故今此名一一融攝諸佛子此娑婆世界有百億四天下如來於中有百億萬種種名號令諸衆生各別知見三諸佛子此娑婆下總結娑婆諸佛子此娑婆世界東次有世界名為密訓如來於彼或名平等或名殊勝或名安慰或名開曉意或名聞慧或名真實語或名得自在或名最勝身或名大勇猛或名無等智如是等百億萬種種名號令諸衆生各別知見二諸佛子此下彰娑婆鄰近十方亦為十𫨻密訓唯九者勘𣈆經開曉意下闕一聞慧諸佛子此娑婆世界南次有世界名曰豐溢如來於彼或名本性或名勤意或名無上尊或名大智炬或名無所依或名光明藏或名智慧藏或名福德藏或名天中天或名大自在如是等百億萬種種名號令諸衆生各別知見南方唯二舊經則具乃是新本脫漏凖前後例不應獨此便略諸佛子此娑婆世界西次有世界名為離垢如來於彼或名意成或名知道或名安住本或名能解縛或名通達義或名樂分別或名最勝見或名調伏行或名衆苦行或名具足力如是等百億萬種種名號令諸衆生各別知見諸佛子此娑婆世界北次有世界名曰豐樂如來於彼或名薝蔔華色或名日藏或名善住或名現神通或名性超邁或名慧日或名無礙或名如月現或名迅疾風或名清淨身如是等百意萬種種名號令諸衆生各別知見諸佛子此娑婆世界東北方次有世界名為攝取如來於彼或名永離苦或名普解脫或名大伏藏或名解脫智或名過去藏或名寶光明或名離世間或名無礙地或名淨信藏或名心不動如是等百億萬種種名號令諸衆生各別知見諸佛子此娑婆世界東南方次有世界名為饒益如來於彼或名現光明或名盡智或名美音或名勝根或名莊嚴蓋或名精進根或名到分別彼岸或名勝定或名簡言辭或名智慧海如是等百億萬種種名號令諸衆生各別知見諸佛子此娑婆世界西南方次有世界名為鮮少如來於彼或名牟尼主或名具衆寶或名世解脫或名遍知根或名勝言辭或名明了見或名根自在或名大仙師或名開導業或名金剛師子如是等百億萬種種名號令諸衆生各別知見諸佛子北婆婆世界西北方次有世界名為歡喜如來於彼或名妙華聚或名栴檀蓋或名蓮華藏或名超越諸法或名法寶或名復出生或名淨妙蓋或名廣大眼或名有善法或名專念法或名網藏如是等百億萬種種名號令諸衆生各別知見西北方名有十一者獨此有餘不成文體此中專念法應即是前所脫聞慧亦是梵本之漏注者誤安貝葉耳諸佛子此娑婆世界次下方有世界名為關鑰如來於彼或名發起焰或名調伏毒或名帝釋弓或名無常所或名覺悟本或名斷增長或名大速疾或名常樂施或名分別道或名摧伏幢如是等百億萬種種名號令諸衆生各別知見下方云帝釋弓者如來念定之弓以明利箭能射業惑阿修羅故然舊云法命主意取帝釋以法教命為天主故今云其弓但一事耳若作宮室字以處取人大同𣈆本諸佛子此娑婆世界次上方有世界名曰振音如來於彼或名勇猛幢或名無量寶或名樂大施或名天光或名吉興或名超境界或名一切主或名不退輪或名離衆惡或名一切智如是等百億萬種種名號令諸衆生各別知見諸佛子如娑婆世界如是東方百千億無數無量無邊無等不可數不可稱不可思不可量不可説𥁞法界虛空界諸世界中如來名號種種不同南西北方四維上下亦復如是第三諸佛子如娑婆下類通一切凖四諦品更有舉此例餘十方亦如娑婆互為主伴如世尊昔為菩薩時以種種談論種種語言種種音聲種種業種種報種種處種種方便種種根種種信解種種地位而得成熟亦令衆生如是知見而為説法第四如世尊下釋差別所由此有二意一自既由於差別名言等而得成就今還倣古以差別熟他二昔菩薩時隨機調物今時出世稱本立名如昔教衆生令空妄境今成正覺為立超境界名他皆倣此故而得成熟之言通自他也音釋豚徒昆切小豬也騏驎騏音其驎音鄰騏驎良馬也白澤下徒洛切神獸也耄莫報切人年八十九十曰耄羸倫為切瘦弱也劈匹亦切萎於危切篤也聆盧經切𥊸也臍前西切肚臍也匹莧切流視也婆藪梵語也此云天慧藪蘇后切倣甫兩切效也鑰音藥析先擊切
