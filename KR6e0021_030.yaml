body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述如來名號品第七此下第二修因契果生解分第二會初從此第十二經盡第十三經菩薩問明品將釋此品五門分別初來意者先明分來前既舉果令生信樂今明能生因果信解故次來也二會來者生解之中信為其首故又前舉所信之境今明能信之行故次來也三品來者前品舉因顯果成所信之境今舉果辨因彰能信之行果中三業身為其總故先來也又遠答前名號海問故二會來意者於中有二一對後辨來以一分六會今是初故二又前舉下對前辨來又遠答名號海問者自是十海為總意耳二釋名亦三初分名修因契果生解分謂修五位之圓因成十身之滿果令諸菩薩解此相故即生修因契果之解依主釋也二會名約處名普光明殿會然有三釋一以殿是寶成光普照故二佛於其中放普光故三佛於殿中説普法門慧光照世故立其名依前一義即依主釋後二有財約法則名信行之會三品名如來現相品已釋召體曰名表德為號名別號通一切諸佛通具十號名釋迦等則不同故如來即十之一品中正説隨機就德以立別名既表德之名則亦名亦號如來之名號依主釋也三佛於殿中者就此普法自有四義一境智合説真俗遐周曰普妙智照達名光二單約境説體周曰普用徹為光三唯約智説凖境可知四約融攝説若事若理皆無障礙一塵一行猶如帝網曰普圓明顧煥為光餘如十玄表德為號亦有釋云表德為字響頒人天曰號今以即字是號猶如十號皆約德故言名別號通者總相説耳品中正説下揀定通局三宗趣亦三初分宗謂以修生修顯因果為宗令諸菩薩修行契入為趣二會宗者若就總望信解行德攝位為宗通成佛果為趣信能必到如來地故近望唯信為宗成位為趣若依長科十分之宗此下三品以為一分即果用應機周遍法界以為其宗依此起信為趣故此亦名正報因果亦是所信信何法門信佛身名等於衆生則知我名如佛名也信佛法門隨宜而立知我妄念苦集亦全法門信佛意業光明遍照則知自心無不知覺故先古諸德亦將上三品舉果分收三品宗者顯佛名號周遍為宗隨機調化利益為趣或上二皆宗生信為趣修生修顯因果為宗者修生約差別因果修顯約平等因果若就總望等者亦名為遠望為成佛果故為遠具解行德故為總解即問明行即淨行德即賢首近望者唯望十住故為近亦合名別將前攝位為此趣故攝位者十信滿心頓攝諸位今此唯成十住故仁王不開十信攝在十住信為能成住為所成若依畏科下第二約別科辨宗略有三義一隨品長分科總為十假今當第四故二故此亦名正報因果者即前後鈎鎖利亦當第二毗盧遮那是因此三品為果故三亦是所信者賢首向前亦將此三屬所信因果中正報果故如下疏指亦屬四分之中第一分故而言亦者有二意一對今科屬第二分故二對隨其本會科名能信成德會今為所信故云亦也第四問答問五周因果差別平等不同何以分名合之為一答通生差別平等解故離於修生説何修顯故問前會舉果本為生信今何重舉名號等三答凡約境生信有其二義一標舉境法明有所在二攝以就心令成信行前會約初義此會約後義問前會舉果下此通繁重難先問後答答中二先約義通為意別故所以重舉又前會果廣因略故名舉果此會因廣果略故總攝為因先依後正文影略耳又前會果廣下約文以答以少從多故前會果多名舉果分此下因廣分名修因雖舉此會正酬向來約分各離故云因廣然取當會因果皆各三品因果似壽而因文亦廣若約鈎鎖者自屬正報果故不同第七會説所成果此中自辨信所依故若約鈎鎖者此當第三依起因果是所依果故不同第七説所成者所成自屬第四差別因果故問何不入定以未入位性不定故若爾十定豈散善耶然説法之儀通有四句一定後説如諸會二説後定如無量義經等三定中説如第九會無出言故四不入説如此信中及第七會諸文非一以未入位下答此上問文五一者正答猶如輕毛未能得入正定聚故二説後定者即法華經云為諸菩薩説大乘經名無量義教菩薩法佛所護念説是經已結跏趺坐入於無量義處三昧身心不動是也若出其意無量義者是出生義故彼經云無量者從一法生其一法者所謂無相法華即是收入之義故彼經云究竟至於一切智地世尊法久後要當説真實今欲𭣣入先辨出生若知三乘萬化從實相生究竟還歸一實相故欲為法華序故説無量義便入此定第九表證唯證能説一得永常不礙起用故第七為表常在定故又入為受加彼不須加故不須入説後入者説在行故將起後故第九表證下出四句所以其第一定後説諸會廣説故不釋之但解後三初解第三二第七為表下解第四第四有二會不入定第二不入前已解竟唯解第七説後入下通第二義入即修行上引無量義經乃是別意而有等言等取此諸經通意今顯通意是知動寂唯物聖無常規故下文中辨十信之用一方入正定餘方起出説自在無礙也餘會摩頂後説此會説後摩頂是知此經體勢縱橫不可定準是知動下第五結其深玄故下文中下示十信相既所説信定散自在明知能説入出難思餘會摩頂下更示異門令無局執爾時世尊在摩竭提國阿蘭若法菩提場中第五釋文若隨義約品科十分之中此下三品當果用應機普周分若約隨法就會科十分之中此一會當第二能信成德會今就四番問答科從此終第七會即當第二修因契果生解分若順諸會應直分問答今為順文一會分三第一序分第二請分第三説分若順諸會者以六會共答此中問故第一序分唯屬此會為加序分名為順文今先序分具如經初但加普光以為小異略分為三初標主時處二始成下別顯三事三與十佛下輔翼圓滿始成正覺二中分三初別顯説時於普光明殿坐蓮華藏師子之座二於普光下別顯説處處在菩提場東南可三里許熙連河曲彼河之龍為佛造此今舉總攝別前標國名以本收末上舉場稱故下不動覺樹而遍十方處在菩提下賢首云相傳説云以龍見如來初成正覺樹下露坐故為佛造若西域記説菩提樹南門外有大龍也帝釋獻方石在此池池東林中有目真鄰陀龍王池其水清黑其味甘美龍池西岸有小精舍中作佛像往昔如來初成正覺於此宴坐入定七日時此龍王警衛如來即以其身繞佛七匝化出多頭俯垂為蓋故池東岸有其室焉釋曰苦取龍造正當於此雖不言造堂龍既警衛不妨後造當向即東南又云菩提樹東有精舍高六百七十尺下基面濶二十餘步疊以青磚塗以石灰層龕皆有金像四壁鏤作奇製或連珠形或天像焉上置金銅阿摩勒迦果寶瓶東面接為重閣簷字特起三層榱柱棟梁戶扉牖金銀雕鏤以飾之珠玉廁錯以填之奧室遠宇洞戶三重外門左右各有龕室左則觀自在菩薩像右則慈氏菩薩像白銀鑄成高十餘尺精舍故地昔無憂王建小精舍後有婆羅門建大精舍即雪山見大自在天令置也釋曰此義亦當若取普光堂義却當樹西西域記云菩提樹西不遠大精舍中有鍮石佛像飾以奇珍東面而立前有青石奇紋異彩是昔如來初成正覺梵王建七寶堂帝釋建七寶座佛於其上七日思惟故異光明照菩提樹去聖遙遠寶變為石釋曰此為普光法堂定矣但從古傳云是東耳若東西二三里即是盲龍之室非是龍造去聖時遠傳記不同故略出三處異更審之妙悟皆滿二行永絶達無相法住於佛住得佛平等到無障處不可轉法所行無礙立不思議普見三世三妙悟下別顯主德亦即示成正覺之相也凖第八會初及深密經等皆説佛有二十一種功德升兜率品當廣明之今文有初十句亦略釋耳十句之中初總餘別總中妙悟皆滿者妙悟晉經名善覺論經名正覺良以梵音云蘇含於妙善及正等故譯者隨取悟即覺也雙照真俗故稱妙悟備下諸句異於西人故復稱滿雙照真俗者準下無著不釋經句具下諸別以成總句親光菩薩別釋總句今依親光別釋妙悟取無著意將別釋滿別中一二行永絶者煩惱所知生死涅槃皆名二行俱不現前名為永絶煩惱所知者準無著名於所知一向無障轉功德但離所知二乘之人於極遠時處不能知見有知不知故名二行今無不知故云永絶若親光云凡夫二乘現行二障世尊無故凡夫現行生死起諸雜染即煩惱障二乘現行涅槃棄利樂事世尊無彼二事故云永絶今具含二釋故雙牒之下諸功德皆是下文廣釋中意如或未曉但尋光率會疏及論文居然易了二達無相法者清淨真如名無相法達者了也三如來常住大悲任運利樂又常安止聖天梵住故云住於佛住聖天梵住者即智論第三云聖謂三乘聖人天謂六欲天梵即色無色復次三三昧名聖住布施持戒善心三事名天住四無量是梵住釋曰此雖二文義乃是一前舉果住後出因耳或為四住謂加佛住如來常住首楞嚴諸三昧故雖遍住四住智海已滿大悲深故特言大悲大悲即梵住所攝四所證能證及以化用皆等諸佛五具能治道解脫障故六所説教法外道不能轉故七行諸世間違順魔怨不能礙故八安立教法超言念故九於三世境若事若理了達記別無錯謬故具此九別成初總句同異成壞凖思可知與十佛剎微塵數諸菩薩俱莫不皆是一生補處悉從他方而共來集第三輔翼圓滿文分二別一標數揀定二歎其勝德前中菩薩揀非凡小補處明非下位他方而來非舊衆也言一生者釋有二義一約化相謂如彌勒此復有三一人中一生二天上一生三下降一生正取天中二約實報一生謂於四種變易生死中唯有末後一種名無有生死一位所繫此文多約化相耳四種變易者第一疏鈔已引攝論無上依經今史依佛性論第二略示名相一方便生死謂生死緣即無明住地惑能生新無漏業譬如界內無明生行以惑生智非同類故名為方便二因緣生死謂生死因即上無明所生無漏有分別業譬如無明所生行業但感同類故名因緣三有有生死即由前因緣感得變易異熟有果如三界內以有漏業感六趣身言有有者未來生有更有一生故如上流般阿那含第二生般涅槃故亦云有此有果故名有有四無有生死即改變易脫譬如生為緣有老死等過患一期報謝更無有有故名無有故今疏云唯有第四無有生死一生者此生之後便成佛故如那含人當涅槃故普善觀察諸衆生界法界世界涅槃界諸業果報心行次第一切文義世出世間有為無為過現未來二普善下歎德德雖無量略歎一普善觀察者能觀智也普有二義一普衆同有此德二普觀十境善有三義一善知相二善知無相三善知此二無礙衆生界下明其所觀皆具上三義十中初是總句所化衆生次此生何來由迷法界起於世界我當令彼住涅槃界淨諸業果故須識心行之病文義之藥令厭世間欣出世間不盡有為不住無為上辨橫觀十法今豎達三世觀涅槃知已現當證觀諸業已現當造果報已現當受心行已現當發餘可類知亦以六相融之時諸菩薩作是思惟第二時諸菩薩下請分中二先舉人標念若世尊見愍我等願隨所樂後若世尊下正顯問端然句雖五十問但四十以第二十句是説意故此四十問望第一會有同有異後二十句全同前二十句大同小異又復前後不同初十句即前第三十海前會即總説所觀深廣此則別説如來依正以前會中為總故此會別顯信所依故故前會皆致海言此中但云剎等第二十句前名菩薩十海此列住等行位前通諸會總顯圓融行布因故此約當分欲顯差別因之相故後二十句雖則全同前總此別又前即所信今辨所成欲顯所信所成體無異故文句全同若唯約義亦可分三謂初十句問佛德應機無方大用辨因所依果次十句問菩薩行位即果所成因後二十句佛果勝德顯因所成果是則以佛為緣而起於因還以此因而成於果是此分之大意也故論云多聞熏習無不從此法身流無不還證此法身即其義也若唯約義下科判經文於中初總科有三初就義為三以所問法有三類故今取文義俱便大分為二初十句直爾疑問後三十句引例請問義不異前然所依所成文應互有但是影略不欲繁辭故初會直爾興問即此中引例此中引例即彼直問又前但明一重所信故合三十句果今為分二假故間之以因今初十句先總顯請意今取文義俱便下後分二釋文二假皆結故是文便直問引例表人異道同故是義便開示佛剎佛住佛剎莊嚴佛法性佛剎清淨佛所説法佛剎體性佛威德佛剎成就佛大菩提後開示下別列所疑十句依正間問者正報應機必依剎故亦表依正無障礙故五句依者一剎類二莊嚴三清淨四體性五成就上五即前二海廣如四五二品其佛住等五句即正報大用一佛身遍住諸剎佛心常住大悲二所具功德及所證法性三隨機説法四作用威光五修行得證現成菩提然此五即前會七海一即佛海二即解脫海三即演説海四即變化海五即名號及壽量海波羅蜜海其衆生海但是所化故略不舉含諸海中此之十句下有言説及現相答至下當知一剎類者即形狀長短等言即前二海廣如四五二品者第四成就品答世界安立海第五華藏世界品答世界海故如十方一切世界諸佛世尊為成就一切菩薩故令如來種性不斷故救護一切衆生故令諸衆生永離一切煩惱故了知一切諸行故演説一切諸法故淨除一切雜染故永斷一切疑網故拔除一切希望故滅壞一切愛著處故第二如十方下引例請問文分為三初十句標彼説意明其有悲後三十句舉彼所説顯其有智末後一句結以正請彼佛既爾此亦宜然初中初句總謂令諸菩薩行願成就故餘九為別一上繼佛種二云何繼以救衆生故三云何救令離惑故四如何救知彼根行故五以何救説法藥故六成何益一除集諦染二決道諦疑三拔苦希望四證滅愛處故初句總下釋此十句總有三勢皆有總別第一行願俱起釋初總餘別別中展轉相釋文勢可知又成菩薩行具悲智也具此悲智何所為耶令佛種不斷佛種不斷有何相耶謂成三德救護衆生成就恩德永斷煩惱成於斷德了知諸行成於智德諸行有三一者心行二所行行三所了行謂一切行無常無相即所了也云何救護演説諸法云何永斷淨諸雜染永斷煩惱種現雙亡除諸雜染謂唯現惑云何成智謂永斷疑網智成何益斷諸希望惑除何益滅諸愛著一切著者著有著空著行著果不著諸法正智現前悲救衆生佛種不斷是菩薩之要也諸佛之本意也所陳諸問一一皆有斯益三佛種不斷下八句皆釋不斷之相於中四意初三正釋不斷謂成就三德是不斷相智成何益下顯三德益經但二句含於三義初明智德益後惑除何益下以滅愛著處句幾成二益若著諸法正智不生若著於空不能悲救今空有無滯故能滅惑成智起悲不斷佛種又釋一切菩薩是所成就云何成就不斷佛種即自成就救護衆生成就於他云何救護謂離二障永斷煩惱無煩惱障了知一切無所知障以何方便能斷二障謂説諸法此煩惱障其相云何謂愛與見除諸雜染絶愛煩惱永斷疑網絶見煩惱此所知障其相云何謂於境不了有所希望法執未忘一切生著今相無不了何所希望達法性空當何所著二障既寂二智現前成菩提涅槃謂不斷佛種則菩薩成就矣二障既寂通後七句即二障除能成二智除煩惱障根本智現除所知障後得智現即此二智亦為能寂菩提涅槃即是所成煩惱障斷成於涅槃所知障斷成於菩提此結利他意則不斷佛種結歸自利菩薩成矣結歸總句説諸菩薩十住十行十回向十藏十地十願十定十通十頂第二説諸菩薩下舉彼所説文分為二初十句問因後二十句問果今初文有九句昔云欠第九十忍一句又以十信自不成位是住方便攝在住中故不別問又以十信下二出其所以不開十信則不合問信下有忍品故知脫忍故仁王經教化品云伏忍聖胎三十人十信十止十堅心故信住不分也有義云有四義故信不入位一進退不定故二雜修十心無定階降故三未隨法界修廣大行故四未得法身顯佛種性故由斯不開十信則成此會及第三會俱答十住問也十行第四會答十回向第五會答十藏第四會中答以藏有二義一收攝義謂收攝諸行以用回向故答在回向之前二出生義以出生地上證智故問居回向之後十地第六會答十願初地中答十定十通第七會答各有自品十頂一種答文不顯古有多釋一云凖梵網經説十忍後有心地法門即此十頂理亦可通但彼經説處乃有十初無菩提場會但云方坐千光王座及妙光堂説十世界海其二三四與此三四五會處法全同他化十地次第亦同而化樂天説十禪定初禪説十金剛心二禪説十願三禪説十忍四禪摩醯首羅宮説我本源蓮華藏世界盧舍那佛所説心地法門不云重會普光及祇園重閣次第又別難可會通又此中問因後更有果問故彼佛心地即後如來地等非十頂也三但彼經下以文奪破其二三四與此三四五會處法全同者此是第三會在忉利四在夜摩五在兜率彼第二在忉利故彼説十世界海竟即云次於忉利説十住法次至夜摩説十行法次至兜率説十回向斯則處法全同次第不同彼二此三彼三此四彼四此五以前加菩提場故言他化十地次第亦同者亦是第六在他化天説十地故由彼不越第五化樂天故説地亦第六故彼文云次至化樂天宮説十禪定次至他化自在天宮説十地次至初禪説十金剛心次至二禪説十願次至三禪説十忍次至四禪摩醯首羅宮説我本原蓮華藏世界盧舍那佛所説心地法門故總𭣣之四例不同一菩提普光二會不分則開合不同二次第不同三有無不同此經四禪無説彼皆有説此有重會彼無重會四彼經一處説一法門此則四六兼二七兼於三以斯四義故難會通又此中問下縱成一破設汝欲將心地法門例同此者此中説果應為心地何得用頂上一師義竟有云僧祇品答以凖瓔珞等覺別有頂位以因位窮終今僧祇中説十大數數中之極故云十頂彼問雖十答有多數對上定通亦非其類故不可也有云壽量品答彼中十重佛土皆上為下頂極至賢首佛剎名為十頂又佛名第二名此十一世界為上首故但舉此初後十一即顯過百萬阿僧祇世界壽量之數此為標首首即頂故然復彼無別問似有少理但標此十界將為問端對十地等甚不相例但舉此下三遮難恐有難云令經百萬阿僧祇重何以證成十界之義故為此通今謂新舊梵本俱無忍問答中即有故知彼忍即此頂也言十頂者因位終極十定十通皆等覺位十忍居後又得頂名問中約位終極故名為頂答據法門忍受以智印定故云忍也非位終極不具十忍非有十忍不極因位二文更顯故十忍品末云通達此忍門成就無礙智超過一切衆轉於無上輪等既言超過即是頂義亦猶四善根中忍頂法門義相類故不爾忍無別問空答何為設欲成十應脫十信十信雖未成位亦隨法界修廣大行德用殊勝別一會答應有問故若將十忍已下四品共答頂問於理無失俱是等覺之終極故設欲已下六釋無十難難云若闕十頂問十句則圓若以悉答頂句則唯九故今答云脫於十信十句成矣十信雖未成下七會通上難難云我先二義不開十信一文證二理證今欲開信雙乖文理故今通之乃有數意一對前立理前明闕於四義不立為位今明不必成位四義無遺二德用殊勝下上以文證今亦文答上引但明信住不開今明何必要開而不妨有問何者十願十藏非是別位得為問端信不成位何妨有問又藏願等寄他會答尚有別問十信法門別一會答解行德能三品宏深豈合無問若將下第二會通以四品答於頂問以信住行等皆有多品總將四品共答頂問於理無違若爾古以僧祇壽量而答頂問應不乖理彼以局取又不𭣣忍今總𭣣四與昔全乖頂乃通名忍等別稱故不同也此解最妙亦能傍通一難難云引四善根忍頂不同今何將忍以酬頂問今為總釋則以等覺因位之極通稱為頂不全同四故上引云義相類故及説如來地如來境界如來神力如來所行如來力如來無畏如來三昧如來神通如來自在如來無礙第二二十句問所成果全同初會於中亦初十句明內德成滿後十句體相顯著初中如來神力前會名佛加持即神力加持故神通約外用無壅神力約內有幹能離世間品各有十事其相自別言無礙者謂如來所作無能障礙也上文名無能攝取等義皆同也如來眼如來耳如來鼻如來舌如來身如來意如來辨才如來智慧如來最勝後十中辨才是語業智慧是意業最勝是身業凖前會中唯欠佛光明之一句餘如前釋其所答文亦如前引出現不思議相海品説但前總會故引此文所引之文正答今問説者宜重引之願佛世尊亦為我説三願佛下結請請同彼説故致亦言請分竟爾時世尊知諸菩薩心之所念各隨其類為現神通第三説分於中通下六會答此所問凖問長科亦為三分此初三品答所依果問二問明已下答所修因問三從不思議品下答所成果問其平等因果因乃果中之因果乃此果之用故屬果收其平等下通其妨難難云若依問為三第三假唯合明果今有普賢行為因出現品為果自是一假平等因果何得皆將答果問耶故為此通既因是得果不捨之因即果中因亦是果攝故屬第三所成果也又古人以文從義出此因果若疏本意全屬果也至下重明初中分二先如來現相答由其念請故又如來證窮故後文殊言説答伴助主故假言顯故今初分二一佛現神通二衆海雲集今初知其心念者領念請也現神通者示相答也言隨類者有其三義一隨疑者所宜異故謂或示色令見以聲令聞冥資令曉皆是現通以法界身圓明頓現也二隨疑者流類別故三隨疑者所疑異故各隨類者疏文有二先釋三義一隨疑者即用法不同隨一類人所樂不同隨宜適化故經云彼彼諸病人良醫隨處方即應病與藥也言或示色令見是現相答以聲今聞是言説答上皆顯應冥資令曉即是冥應總合上三一時頓應二隨疑者上之三義隨一類中即容此三今明萬類謂人天鬼畜音辭差別等然唯疑人約有所表但明菩薩據其實義萬類皆通又菩薩者但語大心衆生不妨本類亦有差別謂天為菩薩人為菩薩等三隨疑者此約所疑之法則初是義無礙境二是辭無礙境此是法無礙境然其所疑即十住等其能疑人未必十信疑於十信許互疑故十信亦疑住行等故謂若疑十信即見如來足輪放光周乎法界等若疑十住則見如來足指放光百剎塵外菩薩集等如放光一事既爾餘相皆然謂若疑十信下出隨疑現通之相於中初疑十信即是此文及第十三經光明覺品言周乎法界等者等取十方各過十佛剎微塵數世界菩薩雲集故下經云悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱等若疑十住者即第三會十住品初言菩薩雲集等者此一等字等取行向地等謂十行則足上放光十向則膝輪放光十地則局開放光等十行千剎十向十千等此一等字等於一分放光中事如放光下例於餘相謂動剎雨華香雲等皆隨宜不同也故知初會現相遍於九會此會現神通通於一分結集隨義編之作次耳故下三會皆有不起覺樹之言故知初會下第二示通局此會望初則局一分彼通九會謂佛前現華通表一部所詮華嚴眉間勝音通表九會能詮教故結集編次非現前後故下三會下引文為證即不起前二而升四天明正當此處現前通四天齊現耳現神通已東方過十佛剎微塵數世界有世界名金色佛號不動智彼世界中有菩薩名文殊師利與十佛剎微塵數諸菩薩俱來詣佛所到已作禮即於東方化作蓮華藏師子之座結跏趺坐南方過十佛剎微塵數世界有世界名妙色佛號無礙智彼有菩薩名曰覺首與十佛剎微塵數諸菩薩俱來詣佛所到已作禮即於南方化作蓮華藏師子之座結跏趺坐西方過十佛剎微塵數世界有世界名蓮華色佛號滅暗智彼有菩薩名曰財首與十佛剎微塵數諸菩薩俱來詣佛所到已作禮即於西方化作蓮華藏師子之座結跏趺坐北方過十佛剎微塵數世界有世界名薝蔔華色佛號威儀智彼有菩薩名曰寶首與十佛剎微塵數諸菩薩俱來詣佛所到已作禮即於北方化作蓮華藏師子之座結跏趺坐東北方過十佛剎微塵數世界有世界名優鉢羅華色佛號明相智彼有菩薩名功德首與十佛剎微塵數諸菩薩俱來詣佛所到已作禮即於東北方化作蓮華藏師子之座結跏趺坐東南方過十佛剎微塵數世界有世界名金色佛號究竟智彼有菩薩名目首與十佛剎微塵數諸菩薩俱來詣佛所到已作禮即於東南方化作蓮華藏師子之座結跏趺坐西南方過十佛剎微塵數世界有世界名寶色佛號最勝智彼有菩薩名精進首與十佛剎微塵數諸菩薩俱來詣佛所到已作禮即於西南方化作蓮華藏師子之座結跏趺坐西北方過十佛剎微塵數世界有世界名金剛色佛號自在智彼有菩薩名法首與十佛剎微塵數諸菩薩俱來詣佛所到已作禮即於西北方化作蓮華藏師子之座結跏趺坐下方過十佛剎微塵數世界有世界名玻色佛號梵智彼有菩薩名智首與十佛剎微塵數諸菩薩俱來詣佛所到已作禮即於下方化作蓮華藏師子之座結跏趺坐上方過十佛剎微塵數世界有世界名平等色佛號觀察智彼有菩薩名賢首與十佛剎微塵數諸菩薩俱來詣佛所到已作禮即於上方化作蓮華藏師子之座結跏趺坐第二現神通下衆海雲集即現相答初十句之問光現佛剎答佛剎問剎有金色等是剎莊嚴既以金成亦答剎體彼剎菩薩亦剎莊嚴菩薩大寶以為嚴故亦剎清淨純淨佛剎唯菩薩故淨修梵行是剎成就淨土行故亦剎清淨所修淨故此已上答五句依問兼答五句正報土各有佛及見如來坐蓮華藏是答佛住現通放光是答威德名不動智等是答法性見佛轉法輪是答説法佛成正覺是答菩提文雖在下義皆此具光明覺現即現此故名不動智等者不動智等等餘九智智雖是一十智不同不同之德即是法性佛以功德為法性故文雖在下等者釋通妨難謂有難云適所引文皆光明覺品此中現相言答十問乃引下經豈成此答釋云六會現通尚在一時況光明覺義不在此故光明覺説説此所現是以此中別列十方佛剎菩薩一一各説光明覺品一時總牒明是説此所現相耳十方衆集即為十𫨻一一方內文各有八一遠近二土名三佛號四上首五眷屬六詣佛七到已致敬八化座安坐去此遠近皆十剎塵數者前會為説所信因果深廣故須遠集華藏之外十方剎海今為説於生解因果漸漸增修故但集娑婆鄰次之剎信行最劣故復云十後後漸增至法界品還集剎海初不云一直云十者表無盡故要剎塵者比餘勝故為有所表故分階級非初信等不是通方故結及證成十方齊説為有所表下通難難云華嚴即是通方之教未有一土不説此經今舉十剎則十外不𭣣今説百剎應百外不攝豈為通方釋意可知又隨迷名外悟處名來而實佛土本無遠近土皆名色者表信粗現故亦表顯然可生信故佛號同智者有信無智增無明故信中之智本覺起故主同名首者梵云室利一名四實一首二勝三吉祥四德是以譯者前後不同今通用之以信為首攝諸位故次第行中信最勝故甚難得故於生死中創發信心為吉祥故信能增長智功德等一切德故今通用者以梵語多含三藏各取今以義𭣣故皆通用而暗引下經以成四義初釋首義以信為首攝諸位故是通意明信該果海故二釋勝義云次第行中信最勝故者經云是故依行説次第信樂最勝甚難得三於生死下釋吉祥義經即通取下經之意四信能增長智功德者釋德義亦全是賢首品經文文云彼諸大士威神力法眼常全無減十善妙行等諸道無上勝寶皆令現即吉祥義也此十菩薩同表信門故皆名室利各隨一門達一切法故復有差次文當釋亦有傳云梵云室利此云吉祥室利云首亦是一理亦有傳云者即興善三藏譯余親問三藏有同此説今欲會意故前𭣣四説眷屬皆十剎塵者表一一行攝無盡德故皆詣佛者有歸向故餘如前會又下菩薩名等皆是表法菩薩表所行之行本剎表所證之理佛名表所得之智今初東方言金色者心性無染與緣成器為自體故本智如空離覺所覺湛然不動動即是妄非曰智故又縱成佛果不異凡故即本覺智住心真如今初東方下別釋十方八假之中皆釋三事一剎名二佛名三主菩薩名唯初東方案經之次下之九方從後倒釋以十首菩薩表十甚深是助化主故先舉菩薩之餘二因此故在後釋細尋可知妙德者慧達佛境處處文殊由慧揀擇契於本智故分因果處處文殊者下文當釋從由慧揀擇下通難難云佛名不動智文殊表慧二相寧分答中然智慧二字乃有多門今此正用分別名慧決斷名智以慧為因以智為果二覺首者覺心性也無性不礙隨緣隨緣不礙無性無礙智也不染而染染而不染俱難了知為妙色也不染而染等者此釋妙色語出勝鬘下當廣釋三財首者法財教化即滅暗智了衆生空如蓮不著四寶首者真俗無違可珍貴故善知業果不犯威儀性相無違唯一乘旨是為唯瞻蔔華矣五德首了達如來應現説法之功德故即是明於法相又了佛德心明白也若有此智如青蓮華最為第一六月首福田照導如目將身平等福田為究竟智是最可重故云金色佛為福田以佛為境故同上文殊依金色界七精進首正教甚深必在精進能䇿萬行為最勝智圓明可貴故復云寶八法首法門雖多必在正行於法能行方得自在得般若之堅利為金剛色九智首佛之助道雖無量門智為上首能淨萬行故云梵智智淨體淨猶若玻璃明徹無染十賢首前佛後佛一道清淨由自性善故稱曰賢能知此賢是觀察力觀察本性常平等故又釋十假皆暗取十甚深義一云慧達佛境即佛境甚深故二覺首緣起甚深心性是一故三財首教化甚深四寶首業果甚深五德首説法六目首福田七精進首正教八法首正行九智首助道十賢首一道故並可思又十佛相望不動是體餘皆是用十菩薩相望文殊為總餘皆是別以總導別故九菩薩不離妙德文殊為總者若以法門為總文殊主般若統𭣣萬行九首之德皆是般若隨緣別相同明佛德即是同相緣起教化互不相𭣣即是異相統十甚深為成佛境即是成相各住一甚深即是壞相餘如下説若約人為總別文殊為上首故是總餘九為伴是別同名為首異即賢等共成十首表信之人壞各住自以前後流例略為此釋惟虛己而求之不信此理甚深法門於我何預以前後例下三結釋勸修前如現華表義現衆表教後如十慧説住十林説行十幢説向十藏説地離世間品菩薩萬行寄表甚深斯為觀心非是臆斷不信此理一向外求如數他寶故非我分音釋龕苦含切室也鏤郎豆切雕刻也榱所追切椽也奧於到切深也邃雖遂切深也鍮他侯切銅屬鬘莫班切趺音夫跏趺屈足坐也簷蔔梵語也此云黃華蔔蒲北切創楚亮切
