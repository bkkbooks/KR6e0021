body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述淨行品第十一釋此一品五門分別初來意者夫欲階妙位必資勝行有解無行虛費多聞故前品明解此品辨行又前明入理觀行今辨隨事所行又前行此願並義次第故次來也來意有三初通對前後辨來謂欲成妙位是後十住故前品明解即是對前二又前明入理下此及第三俱是對前二即以行對行但理事不同三即以願對行則二品全別故前品具解行二義此品具行願二義次釋名者梵云具折囉此云所行波利此云皆也遍也戍輪律提云清淨也謂三業隨事緣歷名為所行巧願防非離過成德名為清淨又悲智雙運名為所行行越凡小故稱清淨以二乘無漏不能兼利非真淨故得斯意者舉足下足盡文殊心見聞覺知皆普賢行文殊心故心無濁亂是曰清淨普賢行故是佛往修諸佛菩薩同所行也所行即淨持業釋也文殊心下覆成上二然即賢首品初生起之意尋文可知三宗趣者以隨事巧願防心不散增長菩薩悲智大行為宗成就普賢實德為趣四解妨者問文中但辨一百餘願何有行耶答文中辨行略有數重謂就所歷事中始自出家終於臥覺皆是行也觸境不迷善達事理智行也以願導智不滯自利大悲行也上二不二悲智無礙行也遇違順境心不馳散止行也智不沉沒觀行也即止觀雙運行也又對於事境善了邪正當願衆生皆假觀也知身空寂心無染著空觀也見如實理中觀也或先空後中或先假後空或一或二或一念頓具斯為妙達三諦觀之行也又所造成行皆施衆生不起二乘之心安忍強軟兩境或增善品心不異緣妙達性空善巧回轉皆願利物同趣菩提二乘天魔所不能動善知藥病決斷無差即十度齊修之行也又皆願利生皆成佛德見惡必令其斷見善必令其具即四弘誓願之行也故智首總標諸德以求其因文殊令善用心頓獲衆果但言惟願豈不惑哉答文中下初列六中前三谷有三義如初事理三者一事行二理行二事理無礙行以願導智下第二對中含於三行一大悲行二觸境不迷善達事理是一行三雙達事理為事理無礙行遇違順下三對悲行總為智行故一智二悲三悲智雙運又對於事下四中有五別明空假中為三四三觀次第為一行五三觀一心為一行並文處可知三觀如前後説復有問言夫妙行者統唯無念今見善見惡願離願成疲役身心豈當為道答若斯見者離念求於無念尚未得於真無念也況念無念之無礙耶又無念但是行之一也豈成一念頓圓如上所明也行學之者願善留心爾時智首菩薩問文殊師利菩薩言第五釋文中二先智首問舉德徵因後文殊答標德顯因今初亦先標問答之人後陳所疑之問今初此二菩薩為顯圓修歷事巧願必智為導故事近旨遠唯圓行故文殊則般若觀空智首則漚和涉事涉事不迷於理故雖願而無取觀空不遺於事故雖空而不證是為權實雙遊假茲問答漚和涉事者梵語俱舍羅此云方便善巧即肇公宗本論文論云漚和般若者大慈之稱也諸法實相謂之般若能不形證漚和功也適化衆生謂之漚和不染塵纍般若力也然則般若之門觀空漚和之門涉有涉有未始迷虛故常處有而不染不猒有而觀空故觀空而不證是為一念之力權慧具矣一念之力權慧具矣好思歷然可解二陳所問中有二十云何總十一𫨻𫨻各十句成一百一十種德第一𫨻明三業離過成德二得堪傳法器三成就衆慧四具道因緣五於法善巧六修涅槃因七滿菩薩行八得十力智九十王敬護十能為饒益十一超勝尊貴意業此十一中若就相顯二四與六此三唯因八及十一此二唯果餘通因果或攝為四對因果初二十句問福因福果先因後果次二十句問慧因慧果先果後因三二十句問巧解因觀行果四有五𫨻問修行因成德果初一為因餘四為果或分為二初十云何問淨行體是問因義後十云何問行所成是問果義以善修七覺等亦是淨行之能故皆言云何得者為修何行而得之耶初十望後故説為因望歷緣巧願成淨行體即是於果未是圓果而是分果故上總云舉果徵因以善修七覺下解妨謂有問云其初意中二四與六此三明因如何今十皆得名果故為此通以約相顯望菩提涅槃此三為因是初十成故得稱果皆言下釋云何得言從初十望後下重通復難問初十既因何以前科云智首舉德徵因答意可知則智首總問因果之德文殊總舉歷緣巧願則皆成矣佛子菩薩云何得無過失身語意業云何得不害身語意業云何得不可毀身語意業云何得不可壞身語意業云何得不退轉身語意業云何得不可動身語意業云何得殊勝身語意業云何得清淨身語意業云何得無染身語意業云何得智為先導身語意業今分為二初之一𫨻總問其果後十別明今初十句得此十種三業成下十果由無過三業故超勝尊貴由不恚害故常為饒益由無餘惑不可譏毀故十王敬護由惡緣不可壞得佛十力由修行不退轉滿菩薩行由遠離諸相如如不動成涅槃因由德行殊勝故於法善巧由體清淨如虛空故成具道緣由涉境無染故德堪傳法器由智先導故成就衆慧總問其果疏文分三初依總別科釋則十一𫨻皆是所成之果兼含料揀中第三意初十為能成下十為所成從後倒牒十果案次釋文謂第一無過失三業得第十一超勝尊貴果第二不害三業得第十能為饒益果三成第九四成第八五成第七六成第六七成第五八成第四九成第二十成第三唯後二前却耳亦可如次猶涉境無染故成衆慧智為先導成就法器其中加字已當釋文如云無恚害以恚釋害以涉境釋於無染約體釋於清淨等細尋歷然又由後十能成就此十以十三業永無失等唯佛不共分分無失亦通於因又此十句初一總顯無過次八別顯無過後一總出其因若以智慧為先導身語意業常無失故又於中八前二離過後六成德又由後十下二先果後因釋以初十句為果後之十𫨻百句為因故云永無失等唯佛不共永無失等者等下九句不害業等言不共者即十八不共法謂一身業無誤失二無卒暴音三無種種想四無不定心五無忘失念六無不擇捨七欲無退八念無退九精進無退十定無減十一智慧無減十二解脫無減十三身業智為先導隨智而轉十四語業智為先導隨智而轉十五意業智為先導隨智而轉十六知過去無著無礙十七知未來無著無礙十八知現在無著無礙廣如別章今以十句通攝十八謂初二即初三一由三業無過害故次二即次三由有念定慧故不可毀壞故三皆云無五六即七八九七即定慧解脫三種無減故稱殊勝八九即後三三世無著無礙故云清淨無染十即十三十四十五智為先導隨智而轉故疏云永無失等唯佛不共今約分分故為後因又後九中不隨於瞋故不害不隨於慢故不可毀不隨惡見故不壞敗不隨於疑故不退動恆修勝行不隨於貪故清淨無染不隨於癡故智為先導所作稱真如是等業云何而得三當句對惑釋以破六根本惑成斯十句疑攝二句貪攝於二餘四各一故六攝九云何得生處具足種族具足家具足色具足相具足念具足慧具足行具足無畏具足覺悟具足後十𫨻別明中初一異熟果次四士用果次二離繫果次一增上果後二等流果今初即修道之器以菩薩起修行時要具此十方成二利之行初一異熟果者俱舍顯相頌云異熟無記法有情有記生等流似自因離繫由慧盡若因彼力生是果名士用除前有為法有為增上果釋曰初二句異熟果相但是無覆無記不通非情從善惡感名有記生次句等流果相似於同類遍行自因次句離繫果相由慧盡者慧即擇也盡即滅也謂此擇滅離繫所顯故將擇滅釋離繫果次二句士用果相若法因彼勢力所生如因下地加行心力上地有漏無漏定生及因清淨靜慮心力生得變化無記心等離繫名為不生士用為因道力證得亦得士用果名後二句增上果相有為法生餘法不障是增上果故唯有為除前已生有為之法謂果望因或俱或後必無前果後因故云除也除此前外餘諸有為為之增上果論云增上之果問士用增上二果何殊答士用果名唯對作者增上果稱通對所餘如匠所成對能成匠俱得士用增上果名對餘非匠唯增上果非匠不造故非士用瑜伽三十八云習不善故樂住不善等為等流果或似先業後果隨轉釋曰此有二義釋於等流後義果似於因即俱舍意如殺生因等得短壽果前義即於後果之上行因似因如前世殺生今亦好殺等瑜伽又云以道滅惑名離繫果四人工等事由此成辦稼穡財利等果為士用果若眼識等是眼根等增上果身分不壞是命根增上果二十二根各起自增上果當知一切名增上果餘例可知然上所引俱舍即是根品彼論以六種因成斯五果非今所要瑜伽具釋一常生中國有佛法處二種族尊貴非下賤等三生信向三寶修善之家非外道等家四形色端嚴非醜陋等五具丈天相諸根不六正念不忘亦宿念現前七慧悟高明善解世法八柔和調善離過修行九志力堅強故無怯弱十性自開覺不染世法瑜伽第六回向初當廣釋之即有八種異熟今開成十句今生處具足總明義常財位果二即種族果三亦財位四即大色果五人種性果非不男等六信言果意由念具故七名譽果八義當壽命離過修行無天逝故九大力果十亦大力智力覺悟故又無畏者依智度論菩薩有四種無畏一總持無畏於法記持不懼忘失二知根無畏知根受法不懼差失三決疑無畏隨問能答不懼不堪四答難無畏有難皆通不懼疑滯今並皆得故云具足無畏下隨難重釋又此十事若約法者生在佛家是生處具足等思之又具足者唯佛一人云云又此十事下約法生在佛家者菩提心家故等於餘句謂二種族即具佛種性謂自性住性習所成等三明家即真如為家亦四家故四家如七地四明見佛性如見色故涅槃云佛性有二一色二非色如來所見為色故五相謂有悲智等為菩薩相故餘之五句經自約法可知又具足下重釋具足之言上約橫具為具足今約竪説之云何得勝慧第一慧最上慧最勝慧無量慧無數慧不思議慧無與等慧不可量慧不可説慧第二十慧下四𫨻明士用果中一慧為揀擇二力謂修習三善巧謂智四道品助修悉以三業而得成就今初言慧者即道之體十中一勝世間故二過二乘故三揀權教故四佛果超因故上四揀劣餘六當體一無分量二無若干三超言念四無等匹五難比校六唯證相應欲言其有無相無形欲言其無聖以之靈欲言俱者慧無二體欲言雙非非無詮顯故不可説云何得因力欲力方便力緣力所緣力根力觀察力奢摩他力毗鉢舍那力思惟力第三力者即具道因緣皆言力者此十各有資道之能故一因力者即是種性謂已有習種無倒聞熏與性種合故名為因梁攝論云多聞熏習與阿賴耶識中解性和合一切聖人以此為因無性攝論云此聞熏習雖是有漏而是出世心種子性即是種性者謂種性位由於習種合於性種方名種性也性種即自性住性為正因性即是涅槃第一義空性也習即新熏修成之性決為佛因稱為種性引證可知言無性攝論者即第八論釋因緣云諸菩薩因緣即有言聞熏習是無分別智及如理作意釋論中云因即能作因緣義有言者大乘言音聞謂聽聞由此引功能差別説名熏習以此為因所生意言順理清淨名如理作意二欲力者有勝欲樂希大菩提及起行故三方便者謂造修力依六方便成悲智故一慈悲顧戀二了知諸行三欣佛妙智四不捨生死五輪回不染六熾然精進攝論廣説攝論廣説即第七論瑜伽四十五明內外各有六方便此即內六四緣力謂善友勸發五所緣力即所觀察悲智之境六根謂信等七觀察者謂於自他事理藥病善揀擇故八奢摩他此云止也九毗鉢舍那此云觀也瑜伽起信等論深密涅槃等經廣辨其相具如別章今略顯其相以為十門一心行稱理攝散名止二止不滯寂不礙觀事三由理事交徹而必俱遂使止觀無礙而雙運四理事形奪而俱盡故止觀兩亡而絶寄五絶理事無礙之境與泯止觀無礙之心二而不二故不礙心境而一味不二而二故不壞一味而心境兩殊六由即理之事收一切法故即止之觀亦見一切七由此事即是彼事故令止觀見此心即是彼心八由前中六則一多相入而非一七則一多相是而非異此二不二同一法界止觀無二之智頓見即入二門同一法界而無散動九由事則重重無盡止觀亦普眼齊照十即此普門之智為主故頓照普門法界時必攝一切為伴無盡無盡是此華嚴所求止觀瑜伽等者前第一經疏中已引起信今略引瑜伽即菩薩地品中彼論亦引深密慈氏問世尊如來説四種所緣境事一有分別影像所緣境事二無分別影像所緣境事三事邊際所緣境事四所作成辦所緣境事幾奢摩他所緣境事幾毗鉢舍那所緣境事世尊答云初一毗鉢舍那所緣境事次一奢摩他所緣境事後二是俱所緣境事釋曰初一即事二即是理故無分別智緣三四通事理故用二為能緣則是以事對觀義也故前第一經疏中出意但不順無分別智證如中義耳廣如彼説今取一義故不言是非以明十重從粗至細自淺暨深故初二止觀別行一即瑜伽奢摩他品二即毗鉢舍那品下八皆雙運品而三正是雙運對第四雙遮此為雙照若取別義雙照皆觀雙遮皆止上四以理事為能成止觀為所成五融於心境即合前三四二門以初二事理即三四所融故絶事理即第四門中境無礙即第三門中境泯止觀即第四門止觀無礙止觀即第三門止觀合上二重止觀與二重之境明非一異不壞二相故二體無異故不二雖融心境方是事理無礙之門但言相融不説何者是止是觀者此通三意一但融上二重止觀即是此門止觀二者照斯二而不二不二而二即是於觀不取諸相即名為止三者不礙心境而一味成即觀之止不壞一味而心境成即止之觀後五即事事無礙門中止觀六是一多相容不同門七是諸法相即自在門八即合前即入義當同時具足門九即因陀羅網境界門十即主伴圓明具德門欲顯後後深於前前故合即入耳餘可思凖此亦一處明示止觀兼廣演玄言耳十思惟者籌量應作不應作故云何得蘊善巧界善巧處善巧緣起善巧欲界善巧色界善巧無色界善巧過去善巧未來善巧現在善巧第四於法善巧皆約流轉以明前四流轉之體三界流轉之處三世流轉之時三科之義略如前釋廣如別章緣起六地廣明三界三世如前後釋皆言善巧者一善知彼法空無所有二善知不壞假名分別法相三加能攝無盡彌善巧也皆約流轉者由善巧義通還滅故總釋善巧乃有三義一知理二知事三加能攝無盡止是事事無礙兼於事理無礙故大品云一切法趣色色尚不可得云何當得有趣非趣一切同歸於空諸法之空不異色空故即事理無礙意今取一攝一切即事事無礙善巧開此為二便有四義瑜伽五十六七廣説三科善巧多約相説即第二義云何善修習念覺分擇法覺分精進覺分喜覺分𭸟覺分定覺分捨覺分空無相無願第五修涅槃因七覺三空十地品廣説云何得圓滿檀波羅蜜尸波羅蜜羼提波羅蜜毗黎耶波羅蜜禪那波羅蜜般若波羅蜜及以圓滿慈悲喜捨第六滿菩薩行此下二種明離繫果初六度四等修即士用滿即離繫治諸蔽故云何得處非處智力過未現在業報智力根勝劣智力種種界智力種種解智力一切至處道智力禪解脫三昧染淨智力宿住念智力無障礙天眼智力斷諸習智力第七具足十力並見上文云何常得天王龍王夜叉王乾闥婆王阿修羅王迦樓羅王緊那羅王摩睺羅伽王人王梵王之所守護恭敬供養第八十王敬護是增上果十王敬護等者即有力增上由己具德令彼護故云何得與一切衆生為依為救為歸為趣為炬為明為照為導為勝導為普導第九云何得與一切衆生為依下二𫨻明等流果由本願力為依救等由本行力為第一等今初能為饒益依等十句如回向初由本願下即瑜伽前意行以昔修故由本行力為第一等者即第二意果似昔因既為第一故是行果云何於一切衆生中為第一為大為勝為最勝為妙為極妙為上為無上為無等為無等等第十為第一下超勝尊貴十地論釋今就佛果略釋其相謂如來功德海滿更無所少故稱第一此亦總句大者體包法界故勝者自利圓滿故最勝者利他究竟故妙者煩惱障盡故極妙者所知障盡故上者望下無及故無上者望上更無故無等者望下無儔故無等等者望儔皆是無等者故所以廣舉諸德者欲顯行之勝故上來問竟爾時文殊師利菩薩告智首菩薩言善哉佛子汝今為欲多所饒益多所安隱哀愍世間利樂天人問如是義第二文殊答中文分為二第一歎問成益饒益者利益也安隱者安樂也利樂者即上二也佛地論第七有五重釋利樂之義已見光明覺品佛地論第七有五重者一修善因得樂果故二離惡攝善故三此世他世益故四世出世益故五福德智慧益故上之五重各先義後利佛子若諸菩薩善用其心第二佛子下正酬其問於中二先標因成德酬其舉德後指事顯因酬其徵因今初先標其因謂善用其心心者神明之奧心正則萬德攸歸言善用者即後歷緣巧願觸境入玄如上所辨則獲一切勝妙功德二則獲下顯所成德初總後別總謂一切勝妙功德皆因用心一百一十門德何足難就可謂一言蔽諸勝謂獨尊妙謂離相又德無不備云勝障無不盡名妙此之總句亦即酬上十種三業之總句也可謂一言蔽諸者即論語云詩三百一言以蔽諸曰思無邪包曰蔽猶當也謂歸於止於諸佛法心無所礙住去來今諸佛之道隨衆生住恆不捨離如諸法相悉能通達斷一切惡具足衆善當如普賢色像第一一切行願皆得具足於一切法無不自在而為衆生第二導師餘九別顯句雖有九義亦有十如次酬上十𫨻之德一於諸佛法心無所礙者即初第一堪傳法器德念慧覺悟皆具足故二住去來今諸佛之道即上成就衆慧三世諸佛唯以佛慧為所乘故三隨衆生住恆不捨離即上具道因緣成就種性欲樂方便常以衆生為所緣故四如諸法相悉能通達即十善巧義無惑也五斷一切惡即七覺二空揀擇棄惡無越此故六具足衆善即六度四等七當如普賢色像第一由此故得十王敬護八一切行願皆得具足即是前文成就十力得佛果位方具足故故晉經無此一句而有成就如來一切種智斯為十種智力定無惑也唯此一𫨻望前不次以內具種智外具色相此二同在果圓前後無在或譯者不回九於一切法無不自在故能與物為依為救為炬為明十而為衆生第二導師即是上文於衆超勝上求第一唯佛一人今才發心則道亞至尊故云第二然舊經中亦云而為衆生第一尊導故知第二譯者意也佛子云何用心能獲一切勝妙功德第二佛子云何不指事顯因於中三初總徵次別顯後總結成益二別顯中五門分別一總明大意文中總有一百四十一願菩薩大願深廣如海應如回向非止爾也此蓋示於體式餘皆倣此又非無表一百者十信圓融一一具十也四十一者即四十一位也明此諸位所有惑障由此能淨所有勝行由此能行故即四十一位者此約行修有障等四十二即妙覺位是所求故無障非行故二通顯文旨然此諸願句雖有四事但有三義開為六言三事者謂初句願所依事次句願所為境後二句是願境成益開為六者初事有二一者內謂菩薩自身根識等經云菩薩等故二者外謂他身或依正資具等經云在家等故次事亦一種一能發願者二所願衆生經云當願衆生故後事亦二一者自益由此諸願成前諸德故二者益他由此發願願衆生故此後二句或前句是因後句是果如云所行無逆成一切智等或二俱是因如云巧事師長習行善法等或二俱佛果如云永離煩惱究竟寂滅等或俱通因果如云以法自娛了妓非實等或三四二句共成一句如云演説種種無乖諍法等亦可後二句中初句所入法如云知家性空等後句所成益免逼迫等以不必具故合為一三別開義類然上三事中願所依事雖有多類不出善惡依正內外隨義準之二願所為境其一一願盡該法界一切有情不同權小談有藏無故又願即是行成回向故一一皆成所行清淨善業行故如云知家性空則菩薩之心必詣空矣三願所為境成利益中由願於他成種種德自獲如前所説功德然有二義一通二別通則隨一一願成上諸德斯為正意二別顯者如願於他得堅固身心無所屈則自必成十種三業離過成德之德也二願於他具足成滿一切善法則自成就堪傳法器三願於他深入經藏智慧如海則自成衆慧四願於他具諸方便得最勝法則自成就具道因緣五願於他語業滿足巧能演説則自成就十善巧德六願於他得善意欲洗除惑垢則自成七覺三空七願於他所作皆辦具諸佛法則自成滿菩薩行德八願於他捨衆聚法成一切智則自成就如來十種智力九願於他皆如普賢端正嚴好則自成就十王敬護十願於他統理大衆一切無礙則自成饒益為依救德十一願他得第一位入不動法則自成就超勝第一德以斯十一配上答中總別十一假文並可知通別交絡應成四句謂一切願成一德一切願成一切德等以因願一多相即故成德亦一多鎔融不同權小等者小乘謂唯佛一人有大覺性權即五性談其有者藏其無者在有佛性中故又云通別類異通即皆有別則有有佛性有無佛性四對辨成例謂若以初後二事相對辨例略有十例一會事同理例如菩薩在家事也性空理也二處染翻染例如若得五欲染也拔除欲箭翻染也三相似類同例如若有施令一切能捨等四世同出世例如上升樓閣願升正法樓等五以因同果例如正出家時願同佛出家等六捨偽歸真例如著瓔珞願到真實處等七以人同法例如見病人願離乖諍等八以境成行例如見涌泉願善根無盡等九以妄歸真例如見婆羅門願離惡等十以近同遠例如受和尚教願到無依處等五正釋經文長分為十初有十一願明在家時願二有十五願出家受戒時願三有七願就坐禪觀時願四有六願明將行披挂時願五有七願澡漱盥洗時願六有五十五願明乞食道行時願七有二十二願明到城乞食時願八有五願明還歸洗浴時願九有十願明習誦旋禮時願十有三願明寤寐安息時願音釋𭸟覺𭸟於宜切覺訖嶽切羼提梵語也此云忍辱羼初眼切澡漱澡子晧切洗滌也潄先奏切蕩口也寤寐寤五故切寐覺也寐明袐切睡也盥古玩切澡手也
