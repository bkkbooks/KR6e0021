body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述時覺首菩薩以頌答曰仁今問是義為曉悟羣蒙我如其性答惟仁應諦聽二答中分二初時覺首下讚問許說上半讚問謂文殊自究深旨一向為他仁心弘益也次句許說分齊稱性說故也後句勸聽言同意別也故令諦受諸法無作用亦無有體性是故彼一切各各不相知二正答答勢縱橫具答前來三重問意分為二前五答前結成之中以何因緣而不相知用此釋成答前難故首而明之後五正答前難今初分二先一法說後四喻況今初意云特由從緣種種故不相知也即此偈上半出因下半結歸本宗後四即為同喻量云眼等是有法定不相知故是宗法因云從緣無體用故同喻云如河中水河水無體用河水不相知眼等無體用眼等不相知若以緣起相由門釋者初句因緣相假互皆無力次句果法含虛故無體性至下喻中別當釋之是故虛妄緣起略有三義一由互相依各無體用故不相知二由依此無知無性方有緣起三由此妄法各無所有故令無性真理恆常顯現現文但有初後二意初因明立量懸指後四以為同喻則此偈中但有宗因二緣起相由然緣起相由具力無力及有體無體今顯不相知理但明無力無體又因中亦有無體義今取義便因緣相假但明無力謂因假緣故因無力緣假因故緣無力果上亦有無力義今取義顯但明無體謂全攬因成緣成無性故云含虛無體下四喻中皆有無體用義故指下明三結示緣起深旨然此正結緣起相由門兼結上因明立量以立量中亦說不相知為宗故即三義中初義現文但有初後二意者全取一偈即是初意唯取不相知言即是後意其第二意至後五偈答本難中方用斯義言諸法者非唯舉前十事五對亦該一切有為法也果從因生果無體性因由果立因無體性因無體性何有感果之用果無體性豈有酬因之能又互相待故無力也以他為自故無體也下半結中是故者是前體用俱無故故彼一切法各各不相知也果從因生等者上取義便但因無力說果無體今欲盡理故具舉之則上句諸法通於因果先以因緣門明因果俱無體因無體性下以上無體釋成因果無用體尚不立用安得存又互相待下以相待門明無體用先明因果無用故云無力以他為自下明因果無體既全攬他故無自體譬如河中水湍流競奔逝各各不相知諸法亦如是第二喻況略有二意一以此四喻通釋諸法不相知言二別對前文諸不相知兼通前設難今初以四大為喻然各上三句喻況下句法合然此四喻各顯一義一依水有流注二依火熖起滅三依風有動作四依地有任持法中四者一依真妄相續二依真妄起滅三妄用依真起四妄為真所持然此法喻一一各有三義一唯就能依二依所依三唯所依今初喻中唯就能依者流也然此流注有十義不相知而成流注一前流不自流由後流排故流則前流無自性故不知後二後流雖排前而不到於前流故亦不相知三後流不自流由前流引故流則後流無自性故不能知前四前流雖引後而不至後故亦不相知五能排與所引無二故不相知六能引與所排無二故不相知七能排與所排亦無二故不相知八能引與所引亦無二故不相知九能排與能引不得俱故不相知十所排與所引亦不得俱故不相知是則前後互不相至各無自性只由如此無知無性方有流注則不流而流也肇公云江河競注而不流即其義也然上云前後者通於二義一生滅前後謂前滅後生互相引排二此彼前後即前波後波小乘亦說當處生滅無容從此轉至餘方而不知無性緣起之義耳然此流注下二別示不相知謂欲顯不相知理故寄前後流異成其十門若不說前後之流將何不相知耶一河之水不出前後則千里九曲皆悉無性不相知矣然雖十義本唯二流成兩重能所前流望引為能望非為所後流望排為能望引為所以斯四義相集成十初及第三以為所故無性無知二四兩門約不相到五六二門約無二體以後流是能排即所引故前流所排即能引故七八約緣成故無二謂七中能排是後所排是前亦無二者要有所排方有能排此二相成故亦無二八約能引亦然九十約不俱故無知者然其能排是後能引是前不得俱者後為能排前須為所排不得即此名為能引義門別故名為不俱第十例此前流為所排時後流須為能排不得為所引故云不俱肇公下四引他證成即物不遷論然其相連總有四句論云既無往返之微眹有何物而可動乎然則旋嵐偃嶽而常靜江河競注而不流野馬飄鼓而不動日月歷天而不周復何怪哉今四喻中但用水風彼無火地然上云下五別釋前後二字一生滅前後者此即豎說如壯與老謂此流水剎那生滅前剎那滅後剎那生二此彼前後者猶如二人同行狹徑後人排前前人引後此即橫說分分之水皆有前後乃至毫滴亦有前毫後毫故聚衆多皆成流注則無性矣小乘亦說下六揀定不相知理先舉小乘而不知下舉大異小小乘即俱舍論業品中釋身表許別形非行動為體以諸有為法有剎那盡故論文初句論主標有宗義下三句破正量部以正量部謂以動身為身表體故論破之然正量部心心所法則有剎那此之動色無有剎那今論主明有為法皆有剎那何以知有後有盡故既後有盡知前有滅故論云若此處生即此處滅無容從此轉至餘方釋曰此生此滅不至餘方同不遷義而有法體是生是滅故非大乘大乘之法緣生無性生即不生滅即不滅故遷則不遷則其理懸隔然肇公論則含二意顯文所明多同前義故云傷夫人情之惑久矣目對真而莫覺既知往物之不來而謂今物而可往往物既不來今物何可往何則求向物於向於向未嘗無責向物於今於今未嘗有於今未嘗有以明物不來於向未嘗無亦明物不去覆而求今今亦不往是謂昔物自在昔不從今以至昔今物自在今不從昔以至今故仲尼曰回也見新交臂非故如此則物不相往來明矣既無往返之微眹有何物而可動乎即云然則旋嵐等下文又云若古不至今今亦不至古事各性住何物而可去來釋曰觀肇公意既以物各性住而為不遷則濫小乘無容從此轉至餘方下論云故談真有不遷之稱導物有流動之說則以真諦為不遷而不顯真諦之相若但用於物各性住為真諦相寧非性空無可遷也不真空義方顯性空義約俗諦為不遷耳二依所依者謂前流後流各皆依水悉無自體不能相知然不壞流相故說水流三唯所依者流既總無但唯是水前水後水無二性故無可相知是則本無有流而說流也二法中三義者一流喻能依妄法二妄依真立三妄盡唯真初中妄緣起法似互相藉各不能相到悉無自性故無相知是則有而非有也二依所依者謂此妄法各各自虛含真方立何有體用能相知相成即由此無知無成含真故有是則非有而為有也三唯所依者謂能依妄法逈無體用唯有真心然顯現既無彼此何有相知正由此義妄法有即非有以非有為有復說真性隱即非隱以非隱為隱妄法有即非有是初義隱即非隱是第二義以正為事隱之時而有所依故以非隱為隱即第三義理當現故此上三意即三種答答上三種問思之思之者以易見故若具說者第一妄法有而非有答前直問既有種種何緣不相知謂種種是妄有體即非有故不相知二答懷疑為是種種為不相知故今答云能依妄法依所依真妄常種種真常無知故三答結成難者即妄即真故種種不乖不相知也何故以水喻真心者以水有十義同真性故一水體澄清喻自性清淨心二得泥成濁喻淨心不染而染三雖濁不失淨性喻淨心染而不染四若澄泥淨現喻真心惑盡性現五遇冷成冰而有硬用喻如來藏與無明合成本識用六雖成硬用而不失軟性喻即事恆真七暖融成軟喻本識還淨八隨風波動不改靜性喻如來藏隨無明風波浪起滅而不變自不生滅性九隨地高下排引流注而不動自性喻真心隨緣流注而性常湛然十隨器方圓而不失自性喻真如性普遍諸有為法而不失自性略辨十義少分似真故多以水為喻此義見文雖似不具而大通衆經亦如大火聚猛焰同時發各各不相知諸法亦如是第二依火熖起滅喻中三義同前初唯熖者謂熖起滅有其二義一前熖謝滅引起後熖後熖無體而不能知前熖前熖已滅復無所知是故各各皆不相知二前熖若未滅亦依前引無體故無能知後熖未生故無所知是故彼亦各不相知妄法亦爾剎那生滅不能自立謂已滅未生無物可知生已則滅無體可知是故皆無所有也斯則流金爍石而不熱也第二依火等者下之三喻文勢稍略隨其三義便以法合今初唯焰喻中二義一明後不知前二明前不知後二合先總謂已滅下別然法喻俱用生滅門釋而有小異喻中用前念滅後念生釋今法合中亦用前滅後生正合前𦦨後焰兼三時門今初已滅者前念也未生者後念也故此二念一向無物生已即滅者前後二念皆即生即滅並皆緣生故言無體體無實故言兼三時門者謂一念之上即有三時已滅為已生未生為未生生已即滅是生時故淨名云若過去生過去生已滅若未來生未來生未至若現在生現在生無住經云比丘汝今即時亦生亦老亦滅故三時無體無可相知也斯則流金者即莊子意說於至人大水稽天而不溺大旱金石流火山燋而不熱然其本意非是水不能溺火不能燒意云乘時處順不以水火而為患也亦不橫為所燒溺也正同今意燒而不燒但彼約順時此約無性理懸隔矣二依所依者謂彼火熖即由於此無體無用不相知故而有起滅虛妄之相是則攬非有而為有也妄法亦爾依此無所依之真理方是妄法是亦非有為有也二依所依者亦先喻後合然與水喻釋有影略水喻以水為所依今以焰無體用而為所依若倒前流依於水者應以火為所依火是熱性身所觸故焰是色動有形顯故若依此釋應云前焰後焰皆依於火以無自性故無相知是則依水依火明二空所顯不空真理以為所依若無體用為所依者則顯依他無性即是圓成二空真理以為所依顯義無方故有影略下唯所依亦凖斯釋又若例後風喻風依物動則火依薪有薪為可然火是能然故以然因可然則然無體可然因然則可然無體則以無性可然而為所依三唯所依者推起滅之熖體用俱無無熖之理然顯現是則無妄法之有有妄法之無湛然顯現遂令緣起之相相無不盡無性之理理無不現是則無妄下二結上三義也然有無有二一定性有無二真空妙有今無妄法之有則無定性之有非斷無矣有妄法之無是真空之無便為妙有是故若舉妄取真則妄有真空如三論說若真妄對辨則妄空真有如涅槃明遂令緣起下覆成上義上句成無妄法之有下句成有妄法之無相無不盡是初門理無不現是第三門合上二句為第二門上三義中亦如次喻答前三問也下二喻準知上三義中下對問會通唯焰無性故不相知答直問也能依種種所依無二答懷疑也即事同真故不相違答設難也在義易了故云凖知若賢首意問者據其初義答者用其後二亦是一理是則初義兩家共用下當重明又如長風起遇物咸鼓扇各各不相知諸法亦如是第三依風有動作喻妄用依真起三義同前三依風有動作喻有標釋結而無對問即以水𣗳等而為所依餘大同前一唯動者離所動之物風之動相了不可得無可相知妄法亦爾離所依真體不可得故無相知斯則旋嵐偃嶽而常靜也斯則旋嵐偃嶽而常靜者即肇公言亦云隨嵐即興雲之風北方風也亦是劫壞時風二依所依者謂風不能自動要依物現動動無自體可以知物物不自動隨風無體不能知風法中能依妄法要依真立無體知真真隨妄隱無相知妄三唯所依者謂風鼓於物動唯物動風相皆盡無可相知妄法作用自本性空唯所依真然顯現是故妄法全盡而不滅真性全隱而恆露能所熏等法本自爾思之可見是故妄法下結文有兩對具上三門妄法全盡而不滅者單取妄法全盡是初門將上而不滅對下真性全隱為第二門以不滅為能依全隱為所依故下句中而恆露即第三門又如衆地界展轉因依住各各不相知諸法亦如是第四依地有任持者喻妄為真所持三義同前初地界因依有二種義一約自類二約異類前中從金剛際上至地面皆上依下下持上展轉因依而得安住然上能依皆離所無體而能知下然下能持皆亦離所無體可令知上又上上能依徹至於下無下可相知下下能持徹至於上無上可相知是故若依若持相無不盡所現妄法當知亦爾必粗依細謂苦報依於業業依無明造無明依所造展轉無體無物可相知斯則厚載萬物而不仁也肇公亦曰乾坤倒覆無謂不靜也初唯能依此中立名與前小異前云一唯流唯焰唯動今初云地界因依則喻勢小異一約自類者猶如纍墼餘並可知斯則厚載者不恃仁德也老子云天地不仁以萬物為芻狗經云譬如大地荷四重任而無疲猒也次肇公下亦不遷論末總結云然則乾坤倒覆無謂不靜洪水滔天無謂其動苟能契神於即物斯不遠而可知矣坤即是地故得引之二約異類者如下文地輪依水輪水輪依風輪風輪依虛空虛空無所依準此妄境依妄心妄心依本識本識依如來藏如來藏無所依是故若離如來藏餘諸妄法各互相依無體能相知是則妄法無不皆盡二約異類者即出現品四輪相依喻然其合文與此不同今但借其四輪用耳二依所依者地界正由各無自性而得存立向若有體則不相依不相依故不得有法是故攬此無性以成彼法法合可知三唯所依者謂攬無性成彼法者是則彼法無不皆盡而未曾不滅唯無性理而獨現前餘義同前上通答釋成前難竟餘義同前者第三總結然餘義有二一者結前三門應云一妄無不盡是初門理無不現是第三合二為第二全在第三唯所依中故云餘義二者對上三門以為餘義第二別對諸不相知及通前難者初水流轉喻前二對不相知答趣善惡難以善惡趣流轉體故第二別對等者上之四喻通喻五對不相知義今則別對言及通前難者即往善趣等五對難也初水流轉者即業不知心心不知業受不知報報不知受答趣善惡者上云心性是一云何見往善趣惡趣答云善趣惡趣即是總報由業熏心受所受報如水漂流言流轉體者體即賴耶故唯識云恆轉如瀑流釋論云如瀑流水非斷非常相續長時有所漂溺此識亦爾從無始來剎那剎那果生因滅果生故非斷因滅故非常漂溺有情令不出離亦如起信云如大海水因風波動楞伽云藏識海常住境界風所動等二地經云一切衆生為大瀑水波浪所沒二大火喻第二三對不相知答前諸根受生如火依薪有生滅故二大火喻者此亦鈎鎖第二對前已用竟今復喻之謂受不知報報不知受及心不知受受不知心答前諸根受生者答前二難由前問云心性是一何以見有諸根滿及受生同異故今答云諸根滿受生同異皆由識種受所受報亦依於心如火依薪故次以長風喻前因緣答前好醜遇物鼓扇現諸相故此以長風者唯喻一對謂因不知緣緣不知因答前好醜者謂前問云心性是一云何見有端正醜陋故今答云今所受報有妍媸者由業緣異令報好醜如風東西令物偃仰相各不同次以地界亦喻因緣答前苦樂展轉因依似輕重故又喻前境智答前諸根隨種所生根等異故答前苦樂者喻不相知則同於風答前苦樂則不同風謂上問言心性是一云何見有受苦受樂故今答云善因樂果惡業苦報苦樂多種如地輕重又喻前境智者前以風地二喻同喻因緣一不相知今一地喻喻二不相知答前諸根者以諸根有二義一約眼等諸根則火喻已答二信等今地喻以答地雖是一隨種生芽心性雖一隨根成異故信進等各各不同二來總別並答釋成中以何因緣各不相知竟第二五偈答前設難文分為三初三偈正答前難次一偈釋成前義第三一偈拂迹入玄今初先明大意次正釋文今初前問有三重今此三偈一一具答上之三問謂第一直耳問云既有種種何緣得不相知前五偈答竟既不相知何緣種種答有四因一妄分別故二諸識熏習故三由無性不相知故四真如隨緣故初偈具二三餘二各一義然此四因但是一致謂由妄分別為緣令真如不守自性隨緣成有諸識熏習展轉無窮若達妄源成淨緣起諸宗各取並不離象受一非餘斯為偏見第二五偈答前設難今初前問有三下即先明大意於中有二第一總彰偈文之意二初正明然此四因下二融會言諸宗者上四因中初一通性相二宗二即法相宗三即無相宗四即法性宗據其實義四因不方成緣起甚深之趣隨情執見則乖聖旨如盲摸象不全見象然不離象盲不識乳則一向奪之今盲摸象則是分奪取其不離並順聖教此喻即涅槃第三十二南經三十答師子吼衆生若有佛性不須修道自得菩提答意云衆生有者定當得故後舉此喻云善男子譬如有王告一大臣汝牽一象以示盲者爾時大臣受王勑已多集象盲以象示之時彼衆盲各以手觸大臣即還而白王言臣已示竟爾時大王即呼衆盲各各問言汝見象耶衆盲各言我已得見王言象為何類其觸牙者即言象形如蘆蔔根其觸耳者言象如箕其觸頭者言象如石其觸鼻者言象如杵其觸腳者言象如木臼其觸脊者言象如牀其觸腹者言象如甕其觸尾者言象如蛇善男子彼衆盲者不說象體亦非不說若是衆相悉非象者離是之外更無有象善男子王喻如來應正遍知臣喻方等大涅槃經象喻佛性盲喻一切無明衆生是諸衆生聞佛說已或作是言色是佛性等釋曰彼經喻意明一切衆生雖有佛性見不明了互執不同然非全離所執之法皆佛性故而非全見今借此喻以聖教深旨總喻於象諸宗異見如盲所觸並合聖理故云不離然非圓了故云非是說象故腸尊者云依之修行無不獲益言受一非餘斯為偏見者言象如箕不信如臼斯為大迷但信諸識不信無性真如隨緣故為偏見離世間品云受一非餘魔所攝持上第二疑云為是種種為是一性今答云常種種常一性第三難云一性隨於種種則失真諦種種隨於一性則壞俗諦今答云此二互相成立豈當相乖性非事外曾何乖乎種種種種性空曾何乖乎一性由無方有一性能成種種緣生故空種種能成一性由無方有下上辨不相乖今明相成然事理相望略有三義一相違義二不相礙義三相作義今用後二其第一義是問家所用是以緣起之法總有四義一緣生故有即妄心分別有及諸識熏習是也二緣生故空即上云諸法無作用亦無有體性是故彼一切各各不相知是也三無性故有論云以有空義故一切法得成經云從無住本立一切法即上隨緣是也四無性故空即一切空無性是也是以緣起之法下就四義中二義是空有之義謂緣生故有是有義無性故空是空義二義是空有所以謂無性故有是有所以緣生故空是空所以所以即是因緣謂何以無性得成空義釋云由從緣生所以無性是故緣生是無性空之所以也何以緣生得為有義釋云特由無定性故方始從緣而成幻有是故無性是有所以故中論四諦品云若人不知空不知空因緣及不知空義是故自生惱如不善呪術不善捉毒蛇若將四句總望空有則皆名所以故云緣生故名有緣生故名空無性故名有無性故名空良以諸法起必從緣從緣有故必無自性由無性故所以從緣緣有性無更無二法而約幻有萬類差殊故各俗諦無性一味故名真諦又所以四句唯第三句引證成者無性故有理難顯故若具證者一緣生故有者法華云但以因緣有從顛倒生故說淨名云以因緣故諸法生中論云未曾有一法不從因緣生等皆因緣故有義也二緣生故空者經云因緣所生無有生論云若法從緣生是則無自性若無自性者云何有是法三中言以有空義故一切法得成者亦四諦品由前諸品以空遣有小乘便為菩薩立過云若一切法空無生無滅者如是則無有四聖諦之法菩薩反答云若一切不空無生無滅者如是則無有四聖諦之法謂小乘以空故無四諦菩薩以不空故則無四諦若有空義四諦方成故有偈云以有空義故一切法得成若無空義者一切則不成即無性故有也經云從無住本立一切法者前已引竟今當重引即淨名第二推善不善之本故經云善不善孰為本答曰身為本又問身孰為本答曰欲貪為本又問欲貪孰為本答曰虛妄分別為本又問虛妄分別孰為本答曰顛倒想為本又問顛倒想孰為本答曰無住為本又問無住孰為本答曰無住則無本文殊師利從無住本立一切法𠮉公釋公無住即實相異名實相即性空異名故從無性有一切法餘如別說四中應引淨名云以何為空但以名字故空如是二法無决定性經云法性本空寂無取亦無見又云一切法無性是則佛真體八地云無性為性中論始末皆明無性以顯真空是以無性緣生故空則非無見斷見之空為真空也無性緣生故有則非常見有見之有是幻有也幻有即是不有有真空即是不空空不空空故名不真空不有有故名非實有非空非有是中道義是以無性緣生故空下第二會中道意明此中空有皆是中道文中有三初揀非顯是無性緣生故空者雙牒前四句中兩種空也此二種空並離斷見謂定有則著常定無則著斷今緣生故空非是定無無性故空亦非定無定無者一向無物如龜毛兔角今但從緣無性故非定無此上揀非為真空也二顯是言無性緣生故有者亦雙牒前之二有並非常見之有常見之有是定性有今從緣有非定性有況由無性有豈定有耶亦是上揀非是幻有也顯是幻有者從緣無性如幻化人非無幻化人幻化非真故云幻有亦名妙有以非有為有故名妙有然斷常見既由有無則有無見即斷常見疏何重牒此有深意斷常二見多是邪宗即五利使邊見所攝其有無見通涉正法但取空有相未有契理為有無見此有無見究竟遠離唯大菩薩故淨名云說法不有亦不無以因緣故諸法生有無二邊無復餘習下經善友歷事諸佛已證法門尚云猶於諸法中無而計為有等幻有即是不有有下第二立中道義此中有三中道一幻有上自為中道謂有與不有此二無礙故為中道故云有是不有有言不有者舉體全空無所有故重言有者亦名非不有謂不待破差別相故故大品云諸法無所有如是有故非有非不有名為中道是幻有義二言真空是不空空者即真空上以明中道謂不空與空無障礙故言不空者以空無空相故重言空者亦名非不空謂餘一切相無不盡故是故非空非不空名為中道是真空義經云空不空不可說名為真空中論云無性法亦無一切法空故重言不空空故名不真空不有有故名非實有者傍會異義意不殊前即通會肇公不真空論康公云萬法不真故空不得肇意遠公云不遷當俗俗則不生不真為真真但名說却得肇意此中真空非是前文對妙有之真空此中真空是所破病人謂真諦一向無物為真空義是故肇公以不不之云不一向是無物故云不真空謂即萬有之無性名為真諦何曾一向是空故云不真空也此不真空即前真空不有有故名非實有者對上不真空故為此揀真空實有並是二邊不真非實即為正理非空非有下三結成中道然其正意合前真空二義總名非空合前幻有二義皆名非有空有不二故為中道又以幻有為非空以真空為非有皆中道義實則上空有之上有二中道兼此為三下融合中更當廣說又開此空有各有二義一真空必盡幻有以若不盡幻有非真空故二真空必成幻有以若礙幻有非真空故又開此空有下二開義有二先正明一真空必盡幻有是相害義亦法界觀中真理奪事門以事攬理成遂令事相無不皆盡唯一真理平等顯現以離真理外無有少事可得故如水奪波波無不盡般若中云是故空中無色無受想行識等二真空必成幻有者是相作義及無礙義亦法界觀中依理成事門謂事無別體要因真理而得成立以諸緣起皆無自性由無性理事方成故如波攬水而成立故亦是依如來藏得有諸法故大品云若諸法不空則無道無果又中論云以有空義故一切法得成二幻有二義者一幻有必覆真空以空隱有現故二幻有必不礙真空以幻有必自盡令真空徹現故一幻有必覆真空者即相違義亦法界觀中事能隱理門謂真理隨緣能成事法然此事法既違於理遂令事顯理不現也以離事外無有理故如波奪水水無不隱是則色中無空相也二幻有必不礙真空是不相礙義亦相作義亦法界觀中事能顯理門謂由事攬理故則事虛而理實以事虛故全事之理然露現如由波相虛令水露現故論云若法從緣生是則無自性然上真空二義第二義中以相作攝無礙義今幻有第二義中乃以不相礙攝於相作其故何耶理實空有第二義中皆含相作及無礙義而影略者事依理成故前有相作理非事造故今無相作而上三義中言空有相作者但約事法能顯理故名作理耳然此四義亦即是前緣生故空等四義也一真空必盡幻有是無性故空義二必成幻有是無性故有義三幻有必覆真空是緣生故有義四必不礙真空是緣生故空義前四總明空有所以今四正說空有之相文殊各以初義致難覺首各以後義而答以初二義空有異故以後二義空有相成故然此二不二謂有非有無二為一幻有空非空無二為一真空又非空與有無二為一幻有空與非有無二為一真空又幻有與真空無二為一味法界即中道義離相離性無障無礙無分別法門思以準之然此二下二下三融合於中二先正明即合前四義須知四義兩處各異上真空必盡幻有是真空上空義二必成幻有是真空上不空義三幻有必覆真空是幻有上有義四必不礙真空是幻有上非有義又須知有非有空非空各有二義一有上二義者一是不壞有相義二是遮斷滅義則名有為非不有二非有上二義者一離有相義二即是空義三空上二義者一不壞性義二遮定有義故名空為非不空四非空上二義者一離空相義二即是有義已知名義今疏融合乃有五重為五種中道一云謂有非有無二為一幻有者此是有上二義自合然取有上不壞相義非有上離有相義故合為一幻有是俗諦中道空非空無二為一真空者即空上二義自合然取空上不壞性義非空上離空相義故合為一真空為真諦中道前一為即相無相之中道此一為即性無性之中道亦存泯無二義又非空與有無二為一幻有者上一對空有自合此下一對空有四義交絡而合今此第三即取真空上非空義及幻有上有義二義相順明其不二然是非空上取即是有義有上取遮斷滅義故得共成幻有為非空非不有存泯無礙之中道空與非有無二為一真空者即第四取真空上空義幻有上非有義二義相順明其不二然是空上遮定有義非有上即是空義故二相順得成真空為非有非不空存泯無礙之中道三是存俗泯真此是存真泯俗又三是空徹於有今是有徹於空皆二諦交徹又幻有與真空無二為一味法界者即第五總合前四令其不二然上各合交徹並不出於真空幻有故今合之為一味法界為二諦俱融之中道然三四雖融二諦而空有別融今此即空有無礙即是非空非有無礙舉一全𭣣若以真同俗唯一幻有融俗同真唯一真空空有無二為雙照之中道非空非有無二為雙遮之中道遮照一時存泯無礙故第二結歡云離相離性無障無礙無分別法門以幻有為相真空為性又空有皆相非空非有為性又別顯為相總融為性今互奪雙融並皆離也無分別法但約智說唯無分別智方究其源矣無障無礙通於境智謂上之五重多約境說心智契合即為五觀五境既融五觀亦融以俱融之智契無礙之境則心境無礙心中有無盡之境境上有無礙之心故要亡言方合斯理總為緣起甚深之相餘義如玄中已明復次性有二義一者有義二者空義復有二義一者不變二者隨緣以有義故說二空所顯即法性本無生也以空義故說依他無性即是圓成即各不相知以有義故說於不變以空義故說於隨緣此二不二隨緣即是不變不變故能隨緣復次性有二義下第四別釋性義於中有四一順釋二反成三結歸中道四結勸修學今初文有四節一雙標二門二以有義故說二空所顯下釋空有義三以有義故說於不變下即將初門釋變不變四此二不二下雙融不變隨緣二門就第三釋變不變中云何有義說於不變既以二空所顯真如則湛然常存體無變易云何以空義故說於隨緣由依他無性即是空義要在緣中方顯空理故知隨緣四中上來且隨一義以𭣣二宗以法相宗唯不變故無相宗中唯性空故故須第四雙融二門具足無礙方順圓融法性宗意二義既即空有亦即隨緣即是不變故空性即是有性不變故能隨緣則有性即是空性若非實有將何隨緣而成諸法如本無水將何隨風而成波浪若唯不變性何預於法若但隨緣豈稱真性故隨其流處有種種異而其本味停留雪山又若性離於法則成斷滅法離於性則本無今有又法若即性性常應常性若即法法滅應滅若唯不變下第二反成唯不變性何預法者則性如虛空法如星象虛空不為星象之性真如何得為諸法性則性與法異何相干耶苦但隨緣豈稱真性者緣有生滅則非真故隨其流處下借涅槃經以成二義隨流有異是隨緣義本味停是不變義即第七經南經第八如來性品答迦葉問顯性是常經云復次善男子譬如雪山有一味藥名曰藥味其味極甜在深叢下人無能見有人聞香即知其地當有是藥過去世中有轉輪王於彼雪山為此藥故在在處處造作木筒以接是藥是藥熟時從地流出集木筒中其味真正王既沒已其後是藥或酢或鹹或甜或苦或辛或淡如是一味隨其流處有種種異是藥真味停留在山猶如滿月凡人薄福雖以掘鑿加功苦至而不能得復有聖王出現於世以福因緣即得是藥真正之味善男子如來祕藏其味亦爾為諸煩惱叢林所覆無明衆生不能得見一味藥者譬如佛性以煩惱故出種種味所謂地獄畜生餓鬼天人男女非男非女剎利婆羅門毗舍首陀佛性雄猛難可毀壞是故無有能殺害者若有殺者則斷佛性如是佛性終不可斷若可斷者無有是處如我性者即是如來祕密之藏如是祕藏一切無能毀壞燒滅雖不可壞然不可見若得成就阿耨多羅三藐三菩提爾乃證知以是因緣無能殺者釋曰以法對喻文亦易見然彼如來祕藏佛性以合一味即是此中如來藏性不變隨緣二義分明但雪山喻經其過去王喻過去佛復有聖王即是合中若得菩提餘並可知又若性離於法下覆成上義上云性何預法即是離義即成斷滅者性離於法非即法空故性成斷言法離於性本無今有者性出自古此為本有法既離性故本無今有本無今有有何過耶則虛空中本無衆生常出衆生若爾法即於性應非本無今有何以論云從無之有曰生自有還無稱滅釋曰緣會事顯則是本無今有無始衆生不可得言本無今有況涅槃云本有今無本無今有三世有法無有是處上半約相下半約性既相與性不得相離則本無之法非全本無今有之法非全新有是故下云三世有法無有是處此偈廣義已見初品又法若即性等者然常無常非即非離此以不即難其全即性若即法者謂水若即波波滅水滅今但波滅而水不滅則法若滅時而性不滅則非全即也故大品中佛問須菩提心若生時為即性不答言即性此心滅不答云生法必滅佛言真性滅不答云不滅佛言此處可思議不答云不可思議即斯義矣故二相成非常非斷此二相奪故說非有非空為中道義故二相成下三結歸中道略有三重上非即非離為中道由此故成非斷非常非有非無亦應言非變非不變也苟得其會不惑百家異說願諸學者虛己求宗苟得其會下四結勸修學使無偏執上已明大意音釋競具映切爭也墼訖逆切磚壞瀑蒲報切疾流摸末各切捫也湍池端切急瀨也肇直紹切𠮉于芮切徒鼎切超也詺眉病切辨別物名也絡歷各切聨絡也酢倉故切酸也掘其月切穿也
