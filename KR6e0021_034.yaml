body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述爾時光明過十世界遍照東方百世界南西北方四維上下亦復如是彼諸世界中皆有百億閻浮提乃至百億色究竟天其中所有悉皆明現彼一一閻浮提中悉見如來坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其大菩薩謂文殊師利等所從來國謂金色世界等本所事佛謂不動智如來等第三重光照百界爾時一切處文殊師利菩薩各於佛所同時發聲説此頌言佛了法如幻通達無障礙心淨離衆著調伏諸群生偈中顯佛八相菩提十偈分二初偈標德充滿後九別廣調生今初謂了俗即真故如幻本虛真不礙俗故達諸法相性相無礙是真通達無二礙著則轉依心淨大悲同體故調伏衆生則三德備矣故能攝化性相無礙者疏釋通達無礙有其二義一所達之法性相無礙二能了之智無有二礙二礙即二障了相故無智障了性故無惑障故次句云無二礙著則轉依心淨者謂轉無常雜染之依唯以功德依常法身故云心淨通達是智無礙是斷調生是思云三德備或有見初生妙色如金山住是最後身永作人中月後九中即悲願自在調伏普周雖數越塵沙略論其九皆言或見者然有多義一或多機異處各感見二或同處各見三或異時別見四或同時異見五或同時異處見六或同處異時見七或異時異處見八或同時同處見九或一人於同異交互時處見多人所見十或一人於同異俱時處見一切人所見以是普眼機故然佛不分身無思普現也皆言或見者此九別中有九或見在義易了而人尚迷今寄清涼五臺求見文殊以况法界見佛差別總有十義一或多機異處各感見者如有五人名為多機各在一臺名為異處一人南臺見菩薩一人西臺見師子一人中臺見萬聖一人東臺見化佛一人北臺見聖僧是各感見也二或同處各見者五人同在中臺故云同處一見菩薩一見師子等故云各見三或異時別見者一人朝見菩薩暮見化佛等四或同時異見者上異時別見不局一人多人今此要是多人謂二人同於晨朝一見化佛一見菩薩五或同時異處見者亦約多人同於晨且一於東臺見一於北臺見所見之境或同或異或見菩薩亦是同時異處見或則一見菩薩一見化佛亦同時異處六或同處異時見同於中臺朝見暮亦見而能見亦通一人多人所見亦通一境異境但取處同時異耳七或異時異處見時則朝暮不同處則東西臺別而能見亦通一人多人謂或一人朝於中臺見菩薩暮於北臺見菩薩異人可知然多約一人其所見境亦通同異同見菩薩如上已明或一人朝於中臺見菩薩暮於北臺見師子然多分且約一境八或同時同處見亦約多人同在中臺同於中時見菩薩所見亦通同異且約同説九或一人於同異交互時處見多人所見者言同異交互時處者謂同時異處異時同處名交互時處然同時異處即是第五而要是多人異時同處即是第六通一人多人今唯一人頓見前多人所見此機亦是不思議人能於同時異處見故謂有一人於晨朝時在於中臺見中臺多人所見亦在西臺見多人所見又於中臺於朝於暮皆見多人所見也十或一人於同異俱時處見一切人所見者謂同時同處異時異處名同異俱時處既是一人時該多時處遍諸處見通諸境故是普眼機也然佛不分身下不分而遍無思普現頓應前十也一初生時身如夜月皎鏡可觀智猶滿月清涼照物故云永作或見經行時具無量功德念慧皆善巧丈夫師子步二行七步時顯其具德或見紺青目觀察於十方有時現戲笑為順衆生欲三顧時觀方現笑或見師子吼殊勝無比身示現最後生所説無非實四師子吼時説我獨尊或有見出家解脫一切縛修治諸佛行常樂觀寂滅五出家時解縛修寂或見坐道場覺知一切法到功德彼岸癡暗煩惱盡六坐道場時障盡德圓或見勝丈夫具足大悲心轉於妙法輪度無量衆生七轉法輪時因悲度物或見師子吼威光最殊特超一切世間神通力無等八顯神通時調彼難調或見心寂靜如世燈永滅種種現神通十力能如是九示入涅槃不妨神用又下二句亦總結前九皆是神通並有深意如第八會如第八會者即五十九經各有十意説者應引爾時光明過百世界遍照東方千世界南西北方四維上下亦復如是彼一一世界中皆有百億閻浮提乃至百億色究竟天其中所有悉皆明現彼一一閻浮提中悉見如來坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其大菩薩謂文殊師利等所從來國謂金色世界等本所事佛謂不動智如來等第四重光照千界爾時一切處文殊師利菩薩各於佛所同時發聲説此頌言佛於甚深法通達無與等衆生不能了次第為開示頌中顯菩提體性十頌分三初偈雙具悲智為菩提體次四三德內圓後五即體悲用今初上半智深下半悲濟我性未曾有我所亦空寂云何諸如來而得有其身次四偈中一歎菩提永絶二我德謂二我之見必因於身今觀於身若我即陰我即生滅若我異陰以何相知故但妄情曾未暫有既無有我誰是我所我我所空身從何有無身之身顯法身德今觀於身者即中論法品中意論云若我即五陰我即為生滅若我異五陰則非五陰相若無有我者何得有我所內外我我所𥁞滅無有故諸受即為滅受滅則身滅業煩惱滅故名之為解脫業煩惱非實入空戲論滅釋曰上中論意正觀於身五陰之法而如來品五蘊上求如來亦就於我及我所説則如自觀身實相觀佛亦然若了二我本自空寂則見法身湛然常住疏中初二句即論初兩句明即陰無我陰是有為生滅之法我即是陰故同生滅次兩句是論第二兩句異陰無我而論主但云則非五陰相今云以何相知者是長行釋語謂凡一切法皆以相知有離陰有我則不以五陰為相為用何相知有我耶故但妄情結成論意妄情計有我性實無故云我性未曾有既無有我下以我破所釋經我所亦空寂即論云若無有我者何得有我所我我所空下無我遣身釋經下半云何諸如來而得有其身即論內外我我所下一偈半文無身之身下結歸疏意三德內圓法身為一耳故經云佛以法為身清淨如虛空解脫明行者無數無等倫世間諸因量求過不可得二顯解脫般若德涅槃二十五云貪瞋癡心永斷滅故心善解脫於一切法知無障礙故慧善解脫涅槃略有一百八句以顯深廣二顯解脫般若者即三德之二也先釋解脫德引於涅槃略有二種即二十五經高貴德王菩薩品第八功德中一義經云云何菩薩心善解脫貪瞋癡心永斷滅故是名菩薩心善解脫若瑜伽八十五云由三種相當知心善解脫一於諸行遍了知故二於彼相應煩惱斷德作證故三煩惱斷已於一切處離愛住故經云云何菩薩慧善解脫菩薩摩訶薩於一切法知無障礙是名菩薩慧善解脫因慧解脫昔所不聞而今得聞昔所不見而今得見昔所不至而今得至釋曰心善解脫即滅定障慧善解脫即脫智障二障既除翛然無繫故名解脫涅槃下經重復問起以顯前義謂心定有貪等則不可脫定無貪等即不須脫欲明相有性無此二無礙方名解脫涅槃略有一百八句者即第五經廣釋三德解脫之德迦葉問言世尊何等名為涅槃善男子夫涅槃者名為解脫先示其體亦色非色下迦葉重請明解脫相爾時迦葉菩薩復白佛言世尊唯願哀愍重垂廣説大般涅槃解脫之義佛讚迦葉善哉善哉善男子真解脫者名曰遠離一切繫縛若真解脫離諸繫縛則無有生亦無和合譬如父母和合生子真解脫者則不如是是故解脫名曰不生迦葉譬如醍醐其性清淨如來亦爾非因父母和合而生其性清淨所以示現有父母者為欲化度諸衆生故真解脫者即是如來如來解脫無二無別譬如春月下諸種子得暖潤氣尋便出生真解脫者則不如是此是一句餘如彼經然依遠公云以義相從有九十四句隨別細分有一百九句第二十二無逼切中別有七句第二十三無動義中有四句第二十四希有義中有其二句第二十五虛寂義中亦有兩句第四十甚深義中有其二句第五十一平等義中亦有兩句第六十七無窄狹中有其三句餘各有一是故分為一百九句今言一百八者即於二十二無逼切中但有六句以遠公見七喻故分為七而第三句云云何逼切不逼切耶譬如凡夫我慢自高而捉蛇虎毒蟲是名逼切不逼切者如轉輪王所有神珠能伏毒蟲名不逼切六句皆是無逼切義唯此一句兼明逼切以顯無逼看似兩句實是一句表除百八煩惱亦同楞伽百八句問言明行者即般若德若作明行足釋即禪慧德瑜加三十八云明謂三明行謂止觀二品涅槃十六又云明者三明一菩薩明二佛明三無明明菩薩明者即是般若波羅蜜佛明者即是佛眼無明明者即畢竟空然皆般若因果理智異耳足有二義一腳足義約因二圓足義約果此文略無言明行者即般若德朗照萬法故稱明行者即如來具三德人若作明行足釋者重釋明行二字即十號之一先引瑜伽由有止觀云禪慧德彼後更有釋極善圓滿以釋足義得滿足義無腳足義故疏不引涅槃十六下此經十八先釋明復釋行前中先引經彼有四釋今當第四就行修證入釋明即證入之體後然皆下是疏釋經菩薩明者因中證智佛明者果中證智上二皆智無明明者是所證理智即觀照理即實相智度論云説智及智處俱名為般若即斯義也足有二義者即釋行字此中略無足字行字所攝然經四釋不出二義第一釋云明者名得無量善果行名腳足善果者名無上菩提腳足者名為戒慧乘戒慧足得大菩提名明行足釋曰此則據果尋因釋以明為果以行為足行即足腳足義也行足不分是今經意二者經云又復明者名咒行者名吉足者名果善男子是名世間義咒者名為解脫吉者名無上菩提果者名大涅槃釋曰此偏就果德釋然以世間况於出世此以涅槃為足是滿足義亦智斷總別耳三者經云又復明者名光行者名業足者名果善男子是名世間義光者名不放逸業者名六波羅蜜果者名無上菩提釋曰此即從因趣果釋謂明行皆因以足為果前釋三皆是果此獨菩提是果今疏所引即當第四但引釋明彼釋行足云行者於無量劫為衆生故修諸善業足者明見佛性釋曰此亦滿足釋足以足為果以行為因行足義開今經無足故取初釋行足合義不引此文無數下顯其離過非有為故無數超下位故無等豈是因明能求其過因明立量依世俗分別定有定無故曰世間今體絶有無故彼莫能過也如説佛聲非定有故不同外道立常從法性生離造作故不同菩薩所立無常三科皆爾豈將佛德判屬無常諸因量者謂諸因諸量及自他共等三種比量比量雖有三支五分因是量主故曰因量無數下顯其離過即下三句於中有四一總明二因明立量下釋世間義三如説佛聲下指事以明求過不得定有則常今非定有不同外常因緣造作即是無常今從法性故離造作不同無常何可求過四諸因量下隨難牒釋言諸因者謂生因了因言諸量者謂現量比量及聖言量所言因者所由所以順益待籍之義相也為由有此所由所以順益待籍宗果方明故説此等名為因也此即要是宗之所由亦是宗之所以等由此即顯與所立宗一向一味能建立宗故名因也又因有三相一遍是宗法性二同品定有性三異品遍無性如立聲是無常等為同品虛空等為異品於同品定有異品遍無是無常等因同喻異喻皆名喻也及自他共下因明第二疏中廣説今略示之如薩婆多立無表色自立量云我無表色定是實色許色性故如許色聲等此即自比量謂自立義令他解了二他比量者於他立中出宗因過如大乘破薩婆多云汝無表色非定實色許無對故如心心所三共比量者於他立中出比量過因為量主者此即彼中三支有闕妨問夫論立量三支圓滿果明不舉獨唱因明答有二解一云對敵申量即能立三支具足敵者起智所由並得稱因所生敵智即號為明理智合舉故説因明二云就比量中有許未許為成未許必有能成即能成是因所成是宗宗由因顯義得分明此即因果雙彰理無違妨上之二義正以後義因為量主又經中云世間諸因量者亦可世間相違求過不得也佛非世間蘊界處生死法數法不能成故號人師子三一偈歎佛超絶三科德蘊者聚義謂是有為生死果相界者種族義謂是愛著生死因相處者生門義謂諸識內外緣相然不離色心俱舍論云愚根樂三故説蘊處界三蘊等有二一者有漏是世數法佛非此成二是無漏則佛非無因滅無常色等獲常色等故如來妙色常安隱故蘊者聚義等者俱舍界品云彼論問云蘊處界等別義云何頌曰聚生門種族是蘊處界義釋曰初句釋義次句結成聚謂積聚即是蘊義諸有為色若過去若未來若現在若內若外若粗若細若劣若勝若近若遠如是一切略為一聚説名色蘊言粗細者可見有對為粗餘二為細又不可見有對望上為細望不可見無對為粗三唯是細染汙名劣不染汙名勝現在名近過未名遠餘蘊例然但粗細一門有異謂意識相應四蘊為細五識相應五蘊為粗依五根故或約九地下地為粗上地為細言生門者處義謂六根六境是心心所生長門處言種族者界義論有兩釋一族者謂種族也是生本義謂十八界為同類因各生自類等流果故是法生本二族類義十八種法種類自性各別不同也俱舍論下此之半偈論明教起不同謂愚有三一愚心所為我二愚色三雙愚心色如次配三言根有三者謂上根聞略得悟故説五蘊中根聞中説十二處下根聞廣方了説十八界言樂三者謂樂略説蘊樂中説處樂廣説界因滅無常色即涅槃三十八如下當引如來妙色常安隱故但要此句具有一偈云妙色湛然常安隱不為時節劫遷大聖曠劫行慈悲獲得金剛不壞體其性本空寂內外俱解脫離一切妄念無等法如是四歎佛超離根境德境智雙寂契彼性空根塵兩亡內外解脫亦常照內外脫於無知空尚不存妄從何起四歎佛者即是初句其性本空寂何法不寂獨歎如來故疏答云境智雙寂契彼性空故為佛德所以無心於物境則未亡攝境歸心心又未寂今佛寂照方契性空此以第二句成上第一句次言根塵兩亡內外解脫即上句釋下句由契性空故亡根塵心所知法一切皆空故亡塵也能知之心亦不可得故亡根也由內亡故根不能繫由外亡故境豈能牽真解脫也斯乃解脫惑障次云亦常照者此智障解脫上寂此照寂照無二真佛心也空上不存者舉况釋第三句空為所契尚不當心妄念空華豈當佛意又上四偈初一法身故常二無過故樂三數不能成故自在稱我四解脫故淨體性常不動無我無來去而能悟世間無邊悉調伏後五即體悲用中初偈不動普應德上半不動下半普應二我永亡稱性不動智周法界何有去來常樂觀寂滅一相無有二其心不增減現無量神力次偈動寂無二德三句入寂一句起用一相是表所謂無相無二是遮體不可分又無二者非對有説無也觀無始終故心不增減三輪之化云無量神力不作諸衆生業報因緣行而能了無礙善逝法如是次偈無染了機種種諸衆生流轉於十方如來不分別度脫無邊類次偈度心平等諸佛真金色非有遍諸有隨衆生心樂為説寂滅法後偈無生現生智契非有悲心遍生隨機引之令歸常寂爾時光明過千世界遍照東方十千世界南西北方四維上下亦復如是彼一一世界中皆有百億閻浮提乃至百億色究竟天其中所有悉皆明現彼一一閻浮提中悉見如來坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其大菩薩謂文殊師利等所從來國謂金色世界等本所事佛謂不動智如來等第五重光照十千界爾時一切處文殊師利菩薩各於佛所同時發聲説此頌言發起大悲心救護諸衆生永出人天衆如是業應作頌中明等菩提因行文有十行皆三句辨相一句勸修雖皆作業而展轉深細略分為五初一大悲下救業不求自利故云永出人天意常信樂佛其心不退轉親近諸如來如是業應作次四修智上攀業一信二樂三念四學又初一長時修常信不轉故次四修智下疏有二意前意各別一行後意通修諸行文雖局一義乃兼通如長時修謂長時信長時樂長時念長時學下三亦然若約所信念等皆佛功德志樂佛功德其心永不退住於清涼慧如是業應作次一殷重修志樂不退故清涼慧者無惑熱故一切威儀中常念佛功德晝夜無暫斷如是業應作次偈無間修不暫斷故觀無邊三世學彼佛功德常無厭倦心如是業應作後偈無餘修常遍學故觀身如實相一切皆寂滅離我無我著如是業應作三有一偈內照業觀身實相者如淨名觀佛前際不來等又如法華不顛倒等如淨名者即見阿閦佛品佛問維摩詰汝欲見如來為以何等觀如來乎維摩詰言如自觀身實相觀佛亦然我觀如來前際不來後際不去今則不住不觀色不觀色如不觀色性不觀受想行識不觀受想行識如不觀受想行識性非四大起同於虛空六入無積眼耳鼻舌身心已過不在三界三垢已離順三脫門三明與無明等不一相不異相不自相不他相非無相非取相不此岸不彼岸不中流而化衆生觀於寂滅而不未滅等彼以觀身實相用觀如來今但自觀為小異耳真實觀同又如法華者即安樂行品第二親近處經云文殊師利又菩薩摩訶薩觀一切法空如實相不顛倒不動不退不轉如虛空無所有性一切語言道斷不生不出不起無名無相實無所有無量無邊無礙無障但以因緣有從顛倒生故説常樂觀如是法相是名菩薩摩訶薩第二親近處釋曰上經皆觀實相即理實相也云皆寂滅中論法品云諸法實相者心行言語斷無生亦無滅寂滅如涅槃即上半也又云諸佛或説我或説於無我諸法實相中無我無非我即下半也中論法品下引論全釋一偈然順今經引論乃倒今先具引論文然後釋義論云諸佛或説我或説於無我諸法實相中無我無非我諸法實相者心行言語斷無生亦無滅寂滅如涅槃一切實非實亦實亦非實非實非非實是名諸佛法自知不隨他寂滅無戲論無異無分別是則名實相若法從緣生不即不異因是故名實相不斷亦不常不一亦不異不常亦不斷是名諸世尊教化甘露味釋曰此有六偈大分為四初三明實相之體次一智契實相三有一偈明實相之由四有一偈明實相之教初三中初一明實相雙非次一明其深寂後一語其體圓又三是橫廣二是竪深初一非深非廣又初一對我説實相二約性顯實相三該通性相明實相以實是性非實是相故略知大旨今之所用但用二偈初以竪深釋經上半以心絶動搖言亡四句故云心行言語斷理圓言偏理興言絶故云言語道斷以欲言其有無狀無形欲言其無聖以之靈故口欲辨而辭喪心以取相為行實相無相故絶心行之處是則心將緣而慮息以起心動念不會理故故體無生既法本不生今何有滅無生無滅即是寂滅言如涅槃者舉喻以顯然實相之體即性淨涅槃而人知涅槃寂滅不生不知實相寂滅故以涅槃為喻若了實相即是涅槃涅槃之相亦叵得也次以雙非實相釋經下半離我無我著實相無我不可著我亦無無我亦不著無我若著二無我理未免於著又離我者超凡夫離無我者超二乘故能悲濟又離我者下上來直就體明此下對人以顯不著無我則不趣證故能悲濟然我無我通有四句一唯有我二唯無我三者雙辨即生死無我涅槃有我四雙非上二互形奪故然我無我下復以四句會融釋此四句略有三意一對人以顯成前對人謂唯我即凡夫無我即二乘雙辨對小説大涅槃云無我者所謂生死我者謂大涅槃二乘之人但見無我不見於我雙非即泯絶大小二者直就大乘性相説亦有此四初句唯一真我逈然獨立次句對病顯實我法皆空雙辨句真妄雙觀不壞性相雙非句性相融即故互奪兩亡三者但約觀照第一句知諸衆生妄執有我二稱理而觀離於二我三亦雙照性相四即真妄形奪與第二釋異者此初句有我此是妄我第二初我乃無我法中有真我耳等觀衆生心不起諸分別入於真實境如是業應作四一偈等觀業大悲同體所以等觀見真息妄不起分別妄盡契如名入真實悉舉無邊界普飲一切海神通大智力如是業應作思惟諸國土色與非色相一切悉能知如是業應作十方國土塵一塵為一佛悉能知其數如是業應作五後三偈大用業初偈神足通後二法智通於中初一知土法性土為非色餘皆為色此二融即皆悉委知後一知佛又十展轉者初悲欲救生當云何救信樂近佛樂其何法樂佛功德佛以功德成其身故空樂何益當念念修學學他不如自觀自觀不及物我齊致入真滯寂當起大用用何所為當擬窮十方界入諸佛海爾時光明過十千世界遍照東方百千世界南西北方四維上下亦復如是彼一一世界中皆有百億閻浮提乃至百億色究竟天其中所有悉皆明現彼一一閻浮提中悉見如來坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其大菩薩謂文殊師利等所從來國謂金色世界等本所事佛謂不動智如來等第六重照百千界即第二答佛威德問威德約身故爾時一切處文殊師利菩薩各於佛所同時發聲説此頌言若以威德色種族而見人中調御師是為病眼顛倒見彼不能知最勝法前五法身後五智身前中分二初一揀迷謂以威德則自在熾盛色相則端嚴吉祥種族則名稱尊貴雖是薄伽而見從外來取相乖於最勝故為倒見猶眼有病故見外空華執內為外謂空為有初一揀迷以初句下五字為三節攝佛地論歎佛偈云自在熾盛與端嚴名稱吉祥及尊貴如是六種義差別應知總名薄伽梵今文具用翻此六義以顯真佛最勝之法初以自在熾盛二德釋其威德論云自在者永不繫屬諸煩惱故熾盛者猛焰智光所燒煉故此內威德由內具此智斷二德外攝羣魔制諸外道二以端嚴吉祥釋於色字色即色相論云端嚴者三十二相所莊嚴故吉祥者一切世間親近供養咸稱歎故三以名稱尊貴釋種族字論云名稱者一切殊勝功德圓滿無不知故尊貴者具一切德常起方便利益世間安樂一切無懈廢故此上二德前是功德後是大悲悲智功德為佛種族謂佛以功德為種性故佛以大悲為根本故為出生故即內種族故能悲現剎帝利種雖是薄伽下釋後半躡上而釋謂上六義號為薄伽依此而取未免顛倒見從外來即不了唯心是起信文云見從外來取色分齊取相二字向上成心外取相若就當句設取心佛亦為取相不了真佛無相相故言顛倒者顛者頂也頂合在上向下即倒如是合無為有合內為外皆名顛倒故舉空華喻通二義如來色形諸相等一切世間莫能測億那由劫共思量色相威德轉無邊後四示悟顯最勝法初偈明如來色相無邊故超情莫測無邊有二一深故隨一一相稱真無邊二廣故謂具十蓮華藏塵數之相如來非以相為體但是無相寂滅法身相威儀悉具足世間隨樂皆得見次偈釋上二義前半釋深相即無相故後半釋廣無相之相故廣復有二一無限因成二應機普現謂色無定色若金剛之合朱紫形無定形猶光影之任修短相無定相似明鏡之對妍故隨樂皆見一無限因成者此中無文舍在隨樂見中上普興雲幢主水神偈云清淨慈門剎塵共生如來一妙相一一諸相莫不然是故見者無猒足此一慈門已無量矣况於諸門出現寶光主海神云不可思議大劫海供養一切諸如來普以功德施羣生是故端嚴最無比即施門無量也普發迅流主河神云如來往昔為衆生修治法海無邊行即無限因也如是等或一切因共成一相或一切因成一切相等故云無限二應機普現者下舉三喻別喻色形諸相三法佛法微妙難可量一切言説莫能及非是和合非不合體性寂滅無諸相三一偈明所證超情以成前義前半正顯謂欲言其有體相寂滅欲言其無色相無邊故止言顯妙唯智方契故心慮叵量理圓言偏故言説莫及後半重釋謂應緣非不合住體非和合又緣起修成非不合契真相盡非和合又緣即非緣故非和合非緣即緣故非不合合相離故無諸相非合亦離體寂滅也後半重釋者前半云難可量則心行處滅言説莫及則言語道斷今重釋者何以寂滅諸相心言罔及耶釋意云寂滅是不和合義隨樂皆見是和合義今亦不可作合與不合而知而説故重釋之於中寄三身説初約法身住體遍應釋則前無相寂滅即是住體隨樂皆見即是遍應故今以二義相奪故非合不合其住體遍應猶如虛空隨其竅隙方圓大小又緣起修成下約報身修成契實説如鑄金成像像全同金亦互奪叵説又緣即非緣下約化身應緣説猶如影像有而即虛亦二相奪不可得説已釋上句從合相離故下釋下句佛身無生超戲論非是蘊聚差別法得自在力決定見所行無畏離言道四有一偈明能證超絶結歸佛身上來體性寂滅遣有身相具足遣無非合不合遣俱有無而復謂佛是非有非無還成戲論中論云戲論破慧眼是皆不見佛故次遣之謂妄惑不生故非蘊聚起心則生便成戲論中論云者即如來品此前更有一偈云如是性空中思惟不可得如來滅度後分別於有無青目釋云諸法實相性空故不應於如來滅後思惟若有若無若有無俱如來從本已來畢竟空何説滅後釋曰此偈總遣三句次偈云如來過戲論而人生戲論戲論破慧眼是皆不見佛此偈二意一者仍前破第三此破第四非有非無戲論謗句即今疏文二者總遣四句百非謂起心動念皆成戲論非局第四故次疏云妄惑不生故非蘊聚起心則生便成戲論彼青目釋云戲論名憶念取相分別此彼言佛滅不滅等是人為戲論覆慧眼故不能見如來法身決定見者不隨境相名自在力有無不能纍其神故無畏也非言行處為絶言道決定見下釋下半謂決定見者則見法身如來法身其相云何論云如來所有性即是世間性如來無有性世間亦無性真妄無性即佛法身如是見者不隨相轉若隨相轉則不自在不隨相轉即決定見見同無性能所雙寂何有有無能纍其神則不畏有無等也身心悉平等內外皆解脫永劫住正念無著無所繫後五智身中初知解脫智謂外身非業繫內心無取著為皆解脫常契等理故云正念又內脫二障外用無羇此明自在初一知解脫智此偈第四句結歎疏總不別釋四句交絡相合而釋謂初句身字合次句外字初句心字合次句內字云外身內心平等二字是身心理解脫二字通上身心內外而解脫不同外身脫業繫苦相即以解脫上取外身下取第四句中無所繫字內心脫執取等相即以解脫字上取內心下取第四句中無著二字心無取著即為能證契上平等名為正念是第三句四句圓矣又內脫二障更為異解上解脫字別配身心皆離障解脫今釋內解脫者離障解脫外解脫者作用解脫如淨名有解脫名不可思議等意淨光明者所行無染著智眼靡不周廣大利衆生一身為無量無量復為一了知諸世間現形遍一切此身無所從亦無所積聚衆生分別故見佛種種身心分別世間是心無所有如來知此法如是見佛身下四大用自在展轉相釋初一以寂照智利生意淨寂也光明照也淨故無著明故智周故能大作佛事次一云何利生謂變化智自在上半一多無礙下半隨器普現次偈明一多所從以無生智隨物而感謂一身多身但由衆生分別心起故無積無從其猶並安千器數步而千月不同一道澄江萬里而一月孤映情隔則法身成異心通而玄旨必均云云自他於佛何預後偈復拂前迹謂即前分別之器亦無所有妄見之身豈當可得此法是佛所知當依此理見佛此後二句兼通結上謂即前等者上云月之一多由器有異佛之一多由感不同今云心分別世間是心無所有則分別之器亦忘也其猶夢中見器中之月豈唯月之不實實亦器本自無能現之器即無所現之月安有約法可思此法是佛下釋下半依此見佛則如佛見音釋紺青紺古暗切青赤色也彌箭切邪視也翛思邀切翛然飛羽貌窄側格切狹隘也妍妍倪堅切好也充之切醜也羇居宜切縶也阿閦梵語也此云無動閦初六切隙豈逆切
