body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述光明覺品第九解此一品畧以五門初來意中自有其十一為答前所依果問故然古德對前二品已答二問此品正答三問謂長行放光答佛威德見成正覺答成菩提文殊說偈正答佛法性問今更一解謂長行但現相答已如前說偈中具答三問謂初五答菩提次一答威德後四答法性二為廣名號品總標多端故正廣種種觀察是意業故三者即說十信之體性故如下三會將說正位皆有偈讚此其類也四顯實徧故但所說有二一佛二法佛有二一身二名法亦有二一權二實前但佛名徧此顯身徧四諦即實之權徧此品顯即權之實徧故五現驗故上二云徧眾未目覩今光示徧相故六顯總徧故前但名諦別徧今此一會即徧法界一一皆悉同時同處同眾同說同徧故七顯圓徧故謂前顯差別一切方能徧一切今顯無差別一切即圓融徧一切故八與下經為其則故謂下經結通云徧一切者皆如此辨以如來一乘圓教於須彌山等一類世界施化分齊皆若此故九示前神通相故上云現通如何現耶一會不動徧法界故十為顯理事俱無障礙令捨執從法故此意雖通在文徧顯有上諸義故此品來也前但名諦別徧等者如名號品如來於此名悉達等在密訓等名則不同十方例然諦名亦耳此是一重別徧二者名徧而非是諦徧諦徧而不是名徧故云名諦別徧今此一會即徧法界者經云如於此處見佛世尊坐蓮華藏師子之座彼盡虛空徧法界一切世界閻浮提中亦如是座此是總徧相也對上二別亦有二總一總徧諸處二主伴時處等皆徧也言同時者無前後也言同處者此有二處一者約主同在普光明殿二者約伴同居金色世界等言同眾者亦有二眾一約主佛十剎塵數菩薩圍繞二約伴眾謂文殊等諸來菩薩亦各領十佛剎塵故言同說者一切處文殊同時發聲而說頌故法界皆同說十信故言同徧者結上諸同謂主伴時處皆悉徧也七顯圓徧者問此與第六有何異耶第六亦名諦別徧今亦云差別方能徧第六云一會即徧今此亦云無差別一切徧二相難分答細尋方別前是總別對此是圓別對二處別則大同而圓總則異前言總別者別則此界他界名各不同總則處處皆同此一今圓別者別則要有差別方能徧故若不差別不能徧也圓則不要差別而能周徧周徧之法一一圓融故云無差別一切即圓融徧一切上一切字是主伴處眾是能徧之一切下一切字但是所徧一切處耳而言圓融者一會即是彼一切會亦非此會處處到也即此即彼即一即多故云圓融又第六約所徧處以論總別東名非西名所徧別也此會即彼會所徧處總也七約能徧以論圓別要將差別之法方能普徧是身名別也今是圓融無差別之法即能徧故名為圓也前別如列宿徧九天此別如一月落百川故前云別則二處大同大同者有小異故前總如一雲之滿宇宙此圓如和香之徧一室故云總圓誠有異也第二釋名者一開二合初開者光明體也覺者用也此二各二謂光有身智二光覺有覺知覺悟又光有能照所照覺有能覺所覺初開者下文亦有二初正有三重義含四對一二光二二覺三能所能所中義分之為二一上二光能所二下二覺能所如來放身光照事法界令菩薩覺知見事無礙文殊演智光雙照事理令眾覺悟法之性相如來放身光下二別示上來四對之相謂分二光各屬文殊及佛二覺別配身智二光而二光中各有雨重能所謂如來放身光身能照也照事法界所照也令菩薩覺知即能覺也見事無礙是所覺也所覺即照所成益上即長行中事二文殊以智光即能照也雙照事理即所照也令眾覺悟即能覺也法之性相即所覺也所覺亦照所成益即偈頌中意二合者良以事理俱融唯一無礙境故得一事即徧無邊而不壞本相二合者下合上四對義有五重文有六節一合二境即前所照若事理不融餘皆不合故先明之言故得一事下即前所覺見事無礙身智無二唯一無礙光故涅槃經瑠璃光菩薩處云光明者名為智慧身智無二者二合二光引涅槃證者瑠璃光菩薩放身光明文殊乃云光明者名為智慧則知二光不別即第二十一經知悟不殊唯一平等覺悟之心知無事非理故知悟不殊下三合二覺謂前身光照文殊等覺知如來光照我剎然文殊等知是無知之知故名悟心之知知事即理二覺合也不同凡小取事理相又此二光不異覺境又此二光下四合能所二種能所一時雙合則能照所照能覺所覺皆性融故舉一全收此三圓融唯無礙之法界此三圓融者五總融上三上雖四對體唯有三謂能覺之光所照之境所成之覺三對六法舉一全收為一法界此上五重合竟雖平等絕相不壞光明之覺品中辨此故以為名雖平等下結成品名上開多約相合多約性即開即合不壞性相故云光明覺也若從開釋光明之覺光明有覺之用通依主有財若從合說光明即覺可持業也第三宗趣者以身智二光無礙覺悟為宗令物生信為趣又釋名並是品宗來意盡為意趣又釋名並是者立名從所宗故來意辯意趣故故賢首以此釋名為其品宗以此來意為其意趣第四解疑妨問此足輪光何時放耶若說名諦竟如何佛剎菩薩眾數並同名號如先已放前何不說答是前名號品放但前二品明文殊此會說法不俟光照今辨百億剎中乃至徧法界說故須光以顯示其所來菩薩即前菩薩故並全同四解疑妨文有三重初一具疑難光何時放滯二途故若說名下躡跡申難答中初指前說决其所疑二為其解釋謂前二品未要放光故前不明此中始要故此方說此中菩薩即是牒前故前十方一一別說此則併牒次有妨云光照百億百億何不照此釋云此為主故若彼為主則說彼照又疑云下光既窮法界金色更在何許當剎當剎有本會處皆去十剎主伴徧故下光既窮法界下三唯疑不難但疑金色等何所在故是不决耳疑意云此界放光而金色等去於此界各十佛剎今若主佛至東十佛剎處放光則是文殊所從之剎若更至東十剎金色乃在放光之西九方例然故云金色更在何所舉初為例九色例然後當剎下答答意云主剎向東放光餘之十剎一時向東主剎如車轂十方金色等則如輻輞車轂若移輻輞皆移故下經云盡法界虛空界一切世界皆有百億閻浮提一切如來亦如是坐悉以佛神力故十方各有一大菩薩所從來剎謂金色世界等如向東既爾徧餘九方亦然故主與伴一時俱徧既徧法界總是娑婆亦徧法界皆是金色徧法界皆是妙色十色皆徧且依此會餘會徧等已如玄中爾時世尊從兩足輪下放百億光明第五釋文大分為二初如來放光二照此下光至分齊今初足下放者表信四義一自下而上信最初故二最卑微故三為行本故智論第九云足下放光者身得住處皆由於足四顯信該果海已滿足故輪義亦然圓無故言百億光者以徧法界所照之剎皆百億故智度論下即第九論釋經從足下千輻輪相中放六百萬億光明表說六度故義有兩意此是初意第二意云復次一身中雖頭貴而足賤佛不自貴光不為利養是故於賤處放光彼約教相故作是釋今文約表故不正用即是第二最卑微故攝之照此三千大千世界第二光至分齊者此中光照大數約其現文且有二十六節前九別名後十七同辨即為十𫨻若據實義應有等法界無盡之節節節有偈中上本經必應廣說然非多度放光亦非一度放光次第照於多節唯一放光同時頓照盡空世界但為言不並彰說有前後隨機心現節節各見則如來光明節節而照金色文殊節節而至乃至法界各見亦爾在佛文殊節節皆徧如月普照百川各見若法界機頓見前來諸類所見信會既爾住行等會同徧亦然隨機心現下次通難難云既一時頓照何以有二十六節等耶釋云隨機見故在佛文殊下三揀濫云何濫耶上釋妨中文有三節一機節節見二光節節照三文殊節節至如第一百億內機則非百世界中機百世界中機則非千世界中機則應第一節中文殊如來非第二節中文殊如來故今釋云唯第一機節節互非下二節節皆徧如第一三千佛光即是第二乃至徧法界光文殊亦爾正徧第一節文殊即徧法界而節節見者但由機感故云百川各見機復有差若未入法界節節不同已入法界皆如文殊諸節頓見十𫨻之中文各有二皆長行佛以身光照現事境令眾目覩偈頌文殊智光讚述事理令眾悟入十𫨻依答文三初五答菩提即分為五初一總顯菩提超情二通顯菩提因果三顯八相菩提四顯菩提體性五顯菩提之因今初長行中二先照本界染淨二如此處下現自法會普徧之相前中三初總標分齊二百億閻浮下別顯所照三其中下類結明顯今初言三千大千者俱舍云四大洲日月蘇迷盧欲天梵世各一千名一小千界此小千千倍說名一中千此千倍大千皆同一成壞梵世謂即初禪故云同一成壞以三度積故曰三千略去小中舉其末後故云大千俱舍論者此文易了總以喻顯一小千界如一千錢一中千界如千貫錢大千世界如千箇千貫而但取於初禪為數已上不說若舉二禪已上則不同一成壞火災所壞唯初禪故故正理三十一云少光等天非小千攝積小千為中千積中千為大千亦不攝彼長阿含十八雜阿含十六正理三十一及瑜伽智論雜集顯揚亦不殊此有云然顯揚第一明三千世界三災所壞故知初禪小千二禪中千三禪大千若金光明直至非想皆云百億意在徧諸天故此經文中但至色頂約無色無處故今依二經長阿含下二例同餘文下引二經四論並同俱舍俱舍是十一瑜伽第二智論第十一雜集第六顯揚第一有云顯揚者即刊定記意上即論文故彼論釋三千意云如是三千三災所壞謂水火風故知初禪已下即刊定取意解釋謂火災壞初禪水災壞二禪風災壞三禪明知說小千但數初禪若數中千即數二禪以二禪量等中千故若數大千即數三禪三禪量等大千故是知有百億初禪有百萬二禪一千三禪唯一四禪然若語量即如向說所引文證義則不成以言三千皆許三災壞故若中千數於二禪二禪即火災不壞等思之正義如前引俱舍正理已釋若金光明者經云是諸人王手擎香爐供養經時其香徧布於一念頃徧至三千大千世界百億日月乃至百億非非想天今依二經者即金光明及此經文約有所處但至色頂約該地法徧於四空四空無處隨處得果如在欲界得無色定即於欲界而受果報故無別處攝在二界然皆通於二十八天若爾與諸經論云何會釋意云且如二禪直語其量等千初禪以小千初禪向上取之則有千二禪如是百億初禪向上取之則有百億四禪譬如夏雲普覆九洲若以洲取則有九雲若以郡取則四百餘雲若以縣取千數未多或言一雲普覆萬國或言萬國各有夏雲思之可見百億閻浮提百億弗婆提百億瞿耶尼百億鬱單越百億大海百億輪圍山二別顯所照中初現人中二現八相三現諸天初中閻浮提者新云贍部俱舍云阿耨達池岸有樹名贍部因以名洲提者此云洲也東弗婆提者此云勝身身勝餘洲故西衢耶尼此云牛貨以牛貨易故北鬱單越此云勝生以定壽千歲衣食自然故大海者即外鹹海也俱舍云者即第十一論釋無熱池意云於此池側有贍部林其形高大其果甘美依此林故名贍部洲或依此果以立洲號論更不釋有云以此洲南狹北濶樹葉頭大後小似此洲故未見有釋若立世阿毗曇云樹在此洲之南西瞿耶尼亦云瞿陀尼瞿即牛也陀尼貨也北洲新云俱盧餘文可知百億輪圍者一四天下一小鐵圍故中者有千大者唯一皆云百億者此方黃帝筭法數有三等謂上中下下等數法十十變之中等百百變之上等倍倍變之今此三千若以小數計有萬億今約中數從千已上百百變之則有百億若以小數者小數即下等十十變也謂十小千為萬百小千為億千小千為中千已有十億更千中千為一大千一千中千即為千箇十億故為萬億今約中數者謂從千已上方百百變之謂百小千方為一萬千箇小千為中千方是十萬十箇中千始為百萬方是一億既十中千為一億今有千箇中千故有百億故唐三藏譯為百億俱胝測公深密記第六云俱胝相傳釋有三種一者十萬二者百萬三者千萬由此三千以俱胝數或至百數或至千數或至百千唐三藏譯是千萬也故至百數故唐三藏下二引證既譯百億為百俱胝俱胝存其梵言億是此語故二義同也次引測公三種俱胝證百億為百俱胝或至百數者即三千有百億是也以千萬為俱胝故或至千數者以百萬為俱胝謂小數數之中千有百萬箇小千方是一億今大千有千中千故為千億或至百千者即以十萬為一俱胝故中千已有百俱胝千箇中千方為大千大千則有百千俱胝也故䟽云唐三藏譯是千萬為俱胝故三千有百俱胝俱胝即億又依俱舍譯洛叉為億此譯俱胝為億故下光照一億十億等梵本皆云俱胝總由俱胝之數不同故也又依俱舍下三會釋俱胝不同言俱舍譯洛叉為億者亦是十一論釋水輪云次上水輪深十一億二萬下八洛叉水餘凝結成金初以唐言十一億二萬由旬下句梵語云下八洛叉水則八億由旬為水三億二萬由旬為金故知洛叉為億也阿僧祗品云一百洛叉為一俱胝則俱胝義當於兆良以俱胝有三等故則俱舍洛叉云億當十萬之億下云一百洛叉為一俱胝則當千萬之億也百億菩薩受生百億菩薩出家百億如來成正覺百億如來轉法輪百億如來入涅槃二現八相中文有五相受生含三佛成道後始放光明却現初生及後涅槃者約微細門融三世故亦非能照是報所照是化以放光身在摩竭故此經報化融故大菩薩等化處見報下位之機報處見化二不並故能照所照唯是一佛顯佛自在超思議故約微細門者一中頓具一切諸法炳然齊現名微細門故說一相之中具餘七相如在母胎即具餘七今在成正覺相中具餘七也言融三世亦即十世隔法異成門受生是過去涅槃是未來故亦非能照者揀濫釋也二不並者報處見化見化不見報非謂報化並現故也百億須彌山王百億四天王眾天百億三十三天百億夜摩天百億兜率天百億化樂天百億他化自在天百億梵眾天百億光音天百億徧淨天百億廣果天百億色究竟天其中所有悉皆明現三百億須彌下現諸天中舉須彌者二天所依故如此處見佛世尊坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞其百億閻浮提中百億如來亦如是坐二現自法會中二先現本會此是一會徧一切處非是多處各別有會乃至法界亦如是徧此圓融法非思之境非是多處者亦是揀濫恐人誤解若多處有會似如十人為會十會在一室中一燈照了令人頓見十會百人今不爾也一會徧一切處者如於一室懸百面鏡中有十人共為一會則百鏡中有百會也悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其名曰文殊師利菩薩覺首菩薩財首菩薩寶首菩薩功德首菩薩目首菩薩精進首菩薩法首菩薩智首菩薩賢首菩薩是諸菩薩所從來國所謂金色世界妙色世界蓮華色世界薝蔔華色世界優鉢羅華色世界金色世界寶色世界金剛色世界玻瓈色世界平等色世界此諸菩薩各於佛所淨修梵行所謂不動智佛無礙智佛解脫智佛威儀智佛明相智佛究竟智佛最勝智佛自在智佛梵智佛觀察智佛二悉以佛神力下現新集眾言佛神力者亦即是前各隨其類現神通也文有四𫨻謂總顯列名剎號佛名皆同名號品中但增百億為異耳爾時一切處文殊師利菩薩各於佛所同時發聲說此頌言偈文分二先彰說人後顯偈辭今初言一切處文殊者略申三義一約當節如初節中百億佛前有百億文殊為一切也各各皆說當節之偈故文皆云各於佛所一切處文殊畧申三義者第一義約文即是以應就機令百川中一時見月各各皆說當節之偈者如百億內同說若有見正覺偈第二節內同說眾生無智慧偈然有四句一一切處文殊同說一偈是一切即一二但一文殊十節說偈是一即一切三各於佛所即一唯是一四諸處文殊各偈不同即是一切中一切二一文殊從一處東來即從一切處東來至一法會即至一切法會故雖東來而即一切處以是法界即體之用身故二一文殊下第二釋約義復語其實德如前溪之月即是後溪及千江百川之月全入前溪所以爾者一切處月不離本月故本月落溪則千處俱落三約表法文殊乃是不動智之妙用觸境斯了六根三業盡是文殊實相體周萬像森羅無非般若何有一處非文殊哉下九節中皆有二𫨻倣此可知三約表者文殊主般若門若約觀照般若智了萬境無非般若若白日麗天無物不照若實相般若無法非實相故無非般若猶水徧波無波非水大般若云般若波羅蜜多清淨故色清淨色清淨故一切智智清淨何以故若般若波羅蜜多清淨若色清淨若一切智智清淨無二無二分無別無斷故通於觀照及實相也若有見正覺解脫離諸漏不著一切世彼非證道眼二正顯偈辭然釋此偈有通有別通者此明菩提超情別謂顯前光中所見之事於中又二一約境謂融前所照顯理法故二約觀謂令大眾泯絕諸見於所照事不生執取然觀資理成理由觀顯故通而釋之即明菩提超情大分為二初一反顯餘九順釋今初反顯違理之失謂菩提體德超絕一切佛地論明佛非漏非無漏亦應於世非著非無著今乃見佛內離諸漏外不著世則有漏可離有世不著取捨未亡此見違理故非道眼證道眼者無分別故然觀資理成者以賢首有上二意各別科文初約境顯理中十偈為三初一法超情表次八會事歸理後一事如理融成前一會即一切會等事無障礙也二約心令泯絕諸見依此釋經十偈為六初之二頌頌於放光佛令離見次一頌會前光所照處以明離見三有三頌會前所現本法會等以明離見四有二頌別會諸菩薩大眾以明離見五有一頌會前所照眾生六末後一頌明前法會周遍所由今䟽意明不為兩般合成一釋顯理離見二義相成故總出所以云觀資理成若不見理不成觀照理由觀顯者不得觀照安能會理理無廢興弘之由人故觀成契理諸見自亡故合為一釋皆帶顯理破見之義一一具於通別二意故初偈反顯明違理起見為過失生後九順明會理則理顯而見息也若有知如來體相無所有修習得明了此人疾作佛餘偈順顯見理之益皆上三句觀相下句觀益於中九偈各是一義且分為四初六觀佛次一趣求次一觀生後一了法初中初偈正顯佛菩提性本來自空稱此而知則無上失體謂真性相謂德相並性無所有竟何所離本無有著誰為無著如是知者名為正解修習明了斯為正行下句觀益言疾作佛者約文殊門情盡理現即名作佛約普賢門信終圓收約行布說則不見此理成佛未期他皆倣此本無有著者如黐膠粘人則有著不著之者虛空不粘誰為不著空中膠者情盡理現即名作佛者此順禪宗即事理無礙門也約普賢門正是華嚴即事事無礙門也約行布說此為千里之初步也能見此世界其心不搖動於佛身亦然當成勝智者次一偈依正等觀佛菩提性依正無二故亦顯光所照處以明離見謂上半於前所見世界令離妄動知真法界不應動故次句例前八相佛身亦同平等不動而了故成勝智亦顯光明等者上約通明今約別說令離妄動即是破見知真法界不應動故即是顯理此句全是大般若𭦟殊室利分經云若菩薩不動法界知真法界不應動搖不可思議不可戲論如是能入一切相也不動而了故成勝智者此句觀益諸偈雖同皆是佛果差別之德而皆與觀相相順故躡不動而知以釋當成勝智若於佛及法其心了平等二念不現前當踐難思位次偈佛法等觀了同體故二念豈生一亦不存得難思果若見佛及身平等而安住無住無所入當成難遇者次偈生佛等觀言身即眾生以梵本中云佛及我故我即行人之身稱理普周云平等住平等則無能所故曰無住我即法性更不證入法性無性復何所入如是知者曠世難逢我即法性下釋上平等即無能所故曰無住然有二意一上二句明一性不分故無能所猶如一指不能自觸二法性無性下明性空故無能所入亦如虛空不住虛空此亦大般若𭦟殊室利分意彼經云佛告文殊汝於佛法豈不趣求文殊言世尊我今不見有法非佛法者何以趣求釋曰此即一性意也次佛問云汝於佛法已成就耶文殊答言我都不見法可名佛法何所成就釋曰即性空意也次佛又言汝豈不得無著性耶文殊答云我即無著豈無著性復得無著釋曰即今䟽云我即法性更不證入故般若文殊分云若知我性即知無法若知無法即無境界若無境界即無所依若無所依即無所住也又本會即住無所住新集則入無所入般若下引證前即闇用二意今即顯證無住是彼次後經文問若皆平等云何分別有三寶耶智論答云平等即是三寶謂平等即法寶法寶即是佛以未得法不名佛故得平等法分別有須菩提等智論答云者即八十五論亦是經文須菩提問佛若無差別云何有三寶佛答即今䟽文色受無有數想行識亦然若能如是知當作大牟尼次偈會通平等謂上來主伴依正不離五蘊五蘊性空即是平等有相差別總名為數即同無為故非數法離數超世成寂靜果世及出世見一切皆超越而能善知法當成大光耀次偈拂上出世謂真出世者超越入出不礙照知故成光耀又上第三偈佛即是法第四偈法即是眾第五偈是三寶皆無為相此偈與虛空等又上第三偈下收上四偈成一不二法門即淨名經寂根菩薩曰佛法眾為二佛即是法法即是眾是三寶皆無為相與虛空等一切法亦爾能隨此行者是為入不二法門若於一切智發生迴向心見心無所生當獲大名稱二有一偈趣求者以上雖離見而知猶恐滯寂故上半勸求次句又觀性離謂了迴向心本自不生是離相迴向也離相求佛得名稱果眾生無有生若得如是智亦復無有壞當成無上道三次一偈所見眾生亦皆稱真故無生壞知無眾生是無上道故下經云無上摩訶薩遠離眾生想故下經云無上摩訶薩遠離眾生想者即第十六經無上慧菩薩偈下半云無有能過者故號為無上今無生可壞即離眾生想一中解無量無量中解一了彼互生起當成無所畏末後一偈知法即成前法會周徧所由上半標門即十玄門中一多相容不同門也次一句釋所由即十種所由中緣起相由門也並如義分齊中謂一與多互相生起且一依多起則一是所起而無力也多是能起故有力也以多有力能攝一以一無力入於多是故此一恒在多中多依一起準上知之是則此多恒在一中也以俱有力及俱無力各不並故無彼不相在也以一有力一無力不相違故有此恒相在也緣起法界理數常爾稱斯而見何所畏哉由此緣起成前平等由前平等成此緣起文理昭然不許事事無礙恐未著深思謂一與多下上標舉二門今正將緣起相由所以釋一多相容之門此中大意凡所知所起即無有力若能知能起即是有力廣如玄文由此緣起下結破靜法彼云此偈了一多平等謂解多由一起解一由多生無一不成多無多亦無一了彼一多相由生起一多之念息一多相平等此會差別歸平等性理事無礙非事事無礙應審思其文勿謬解也釋曰今䟽即賢首意此公破師言是謬解故今結示即符昔大義中之一也此公意云是理事無礙者以例前諸偈多約會事歸理一切平等拂諸見以不合是事事無礙故今先出此偈本意言由此緣起成前平等者上文本會則住無所住新集則入無所入等皆平等義何以得此皆平等耶特由緣起互相由故且如本會與彼十方新集之會共成緣起由因本會有十方故十是所起所起無體即是本會由因十方說本會故本是所起所起無力故入十方故由緣起成前一切皆悉平等言由前平等成此緣起者謂一有定性不由於多多有定性不由於一今由一無定性假多而起多無定性由一而生故由無性平等之義方成緣起若有一可一此是自性一若有多可多此是定性多多若是定性多多不因於一一若是定性一一不因於多今由多故一此一不自一今由一故多此多不自多多不自多此多則無力此一不自一此一則無力無力隨有力一多互相收故隨一佛會即一切佛會法界一切會即是一法會故此一法會不動而常遍不分而常多前後互相成如何不信故賢首云緣起法界理數常爾應細深思自當見耳觀此䟽文似此弟子當聽之時早已不受特令深思故䟽結云不信事事無礙恐未著深思也爾時光明過此世界徧照東方十佛國土南西北方四維上下亦復如是彼一一世界中皆有百億閻浮提乃至百億色究竟天其中所有悉皆明現如此處見佛世尊坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞彼一一世界中各有百億閻浮提百億如來亦如是坐悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其大菩薩謂文殊師利等所從來國謂金色世界等本所事佛謂不動智如來等第二重光照十方各十佛土者是娑婆隣次之十剎也爾時一切處文殊師利菩薩各於佛所同時發聲說此頌言眾生無智慧愛刺所傷毒為彼求菩提諸佛法如是十偈通顯菩提因果分三初偈菩提之因次五菩提果用後四令物思齊今初上半所為謂無明造業愛能潤業故生死無窮如泥中刺不覺其傷如瘡中刺為其所毒下半能為即從癡有愛菩薩悲生非大菩提莫之能拔無此悲智非佛法故如泥中者愛欲所覆猶如溺泥不知其傷言如瘡中刺者即是肉刺故涅槃中名為息肉彼十三經云深觀此愛凡有九種一如債有餘二如羅剎婦女三如妙蓮華莖下有毒蛇四如惡食性所不便而強食之五如婬女六如摩樓迦子七如瘡中息肉八如暴風九如彗星初一即聲聞緣覺餘習二生子便食後食其夫愛食善子後食眾生令入三惡道三五欲華下有愛毒蛇令其命終四強食患下墮三惡道五與愛交通奪其善法故被驅逐墮三惡道六纏繞凡夫善法令死七如人久患瘡中生息肉其人要當勤心療治莫生捨心若生捨心息肉增長蟲疽復生以是因緣即便命終凡夫愚人五陰瘡痍亦復如是愛於其中而為息肉應當勤心治愛息肉若不治者命終即墮二惡道中唯除菩薩是名瘡中息肉八暴風能偃山夷嶽拔樹深根愛於父母所而生惡心拔菩提根九愛之彗星能斷一切善根令凡夫人孤窮饑饉今正用瘡中息肉一義耳普見於諸法二邊皆捨離道成永不退轉此無等輪次五菩提果用中初偈悲智雙滿智見諸法悲以轉授普見通於性相故離二邊謂真故無有俗故無無真故無有則雖無而有俗故無無則雖有而無雖有而無則不累於有雖無而有則不滯於無不滯於無則斷滅見息不存於有則常著冰消俱不俱等何由而有諸邊都寂故云皆離普見通於性相者此上總釋一偈此下別解上半上半云普見於諸法二邊皆捨離今應問云普見諸法如何即能離得二邊故今答云通性相故唯見相者即是有邊唯見性者即墮無邊性相無礙故離二邊中論云雖空而不斷雖有而不常即由空有相即離二邊也謂真故下引影公中論序以釋之真即是性俗即是相依二諦融故離二邊然二諦之義玄中已明欲釋此䟽畧申四義謂或說妄空真有如涅槃云空者所謂生死不空者所謂大般涅槃二者妄有真空即是今文三俱空相待無性故四俱有性相不壞故於諦常自二故今此正當第二俗有真空義而有四對初對定有無所在我約真諦上說空是無性空不同無物空也我就俗諦明有此是緣有非定性之有也二真故無有則雖無而有下一對彰有無體相是不壞有之無不礙無之有故成中道三雖有而無則不累於有下彰有無之德若是定性之有此有則唯是有不得即無若是定性之無此無則唯是無不得即有今二互相即故不偏滯四不滯於無下一對彰有無離過滯空則斷累有則常既不滯不累故無斷常又釋初對雙離有無故云無有無無此成空觀第二對不壞有無故云雖有而無雖無而有此成假觀第三對明二諦相即故不偏滯有無故不為有邊所動無邊所寂成中道觀肇公亦云涉有未始迷虛故常處有而不染此不累有也不厭有而觀空故觀空而不證此不滯於無也第四離過準前有釋初對中初句云真故無有無彼定性之有是真空義下句俗故無無無彼斷滅之無故是妙有義第二對亦有亦無義第三對非有非無義第四對離過則成具德四句也又初對雙離二過一離有二離無第二對離非有非無第三對離亦有亦無第四對總明離過故起信云真如非有相非無相非非有相非非無相非有無俱相即斯義也是以結云俱不俱等何由而有謂第四對正離斷常第三對不偏滯故離於俱句第二對不壞二故離於雙非故俱寂也又若有二可得名俱今有即無故則有外無無可與有俱今無即有故則無外無有可與無俱故亦有亦無相違不立言不俱不立者若定有有無遮彼有無有俱非句今有即無何有非無今無即有何有非有故雙非亦寂既無有無亦無一異斷常來去靡不皆如故云都寂是以經言二邊皆捨離皆捨離者一切二邊非局有無又言離者性自離故不取著故了真性故非有諸邊可捨離也不可思議劫精進修諸行為度諸眾生此是大仙力次一美徃因行導師降眾魔勇健無能勝光中演妙義慈悲故如是次一慈力降魔次一慈力者大乘力便經說波旬兵眾滿三十六由旬圍菩提樹欲作留難菩薩住慈悲智慧以手指地八萬四千八部大眾皆發大菩提心故云慈力降魔經云導師降眾魔慈悲故如是觀佛三昧海經第二說觀白毫功德中說慈悲降魔今取意引波旬召諸八部及曠野鬼神十八地獄閻羅王神其阿鼻等諸大地獄全至佛所及有無邊諸怖畏事一時逼迫菩薩菩薩爾時徐舉右臂申眉間毫下向用擬阿鼻地獄令諸罪人見白毫中流出眾水㴻如車軸火滅苦息心得清涼獄卒見鐵叉頭如白銀山龕室千萬有白師子蟠身為坐於其座上生白蓮華有妙菩薩入勝意慈心三昧獄主發心眾多罪人諸苦休息稱南無佛皆得解脫無邊惡事無由近佛魔王憔悴懊惱却臥床上有三魔女又懷惑亂菩薩亦以白毫擬之諸女皆見三十六物九孔不淨背負老母抱死小兒皆九孔流溢匍匐而去魔王奮劒向前世尊又以白毫擬之令魔眷屬身心安樂如得三禪餓鬼見白毫端皆有百千萬億諸大菩薩入勝意慈心三昧皆是慈力降魔經云光中演妙義者即眉間光謂時魔波旬既不能壞佛忽然還宮白毫隨從直至六天於其中間無數天子天女見白毫孔筒中皆空團圓可愛如梵王幢於其空間有百千萬恒河沙微塵數諸寶蓮華一一蓮華無量無邊諸妙白毫以為其臺臺上有化佛菩薩放於白毫大人相光亦復如是諸菩薩頂有妙蓮華其華金色過去七佛在於華上是諸化佛自說名字與修多羅等無差別即光中演妙義也然是慈心三昧之力是故總云慈力降魔以彼智慧心破諸煩惱障一念見一切此是佛神力次一智斷致用次一智斷者初句智次句斷此即精義入神故能一念頓現一切是致用也易繫辭云尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也注云精義物理之微者也神寂然不動感而遂通者也故能乘天下之微會通其用也今借此言以智斷𡨋契為精義入神耳擊于正法鼓覺悟十方剎咸令向菩提自在力能爾後一法鼓警機文相並顯不壞無邊境而遊諸億剎於有無所著彼自在如佛後四令物思齊者斯即佛因能如是行得諸佛道四偈顯四種行一游剎無著謂不壞其相故能普游了剎性空故於有無著諸佛如虛空究竟常清淨憶念生歡喜彼諸願具足二念佛生喜上半所念法身顯故如空永常解脫累亡如空清淨下半能念憶持明記故喜生願足一一地獄中經於無量劫為度眾生故而能忍是苦三亡苦濟物不惜於身命常護諸佛法無我心調柔能得如來道四護法輕身文並可知音釋溺刀歴切沒也疽正作蛆七余切蟲也痍音夷瘡也肇直紹切澍朱戍切與注同匍匐匍音蒲匐蒲墨切匍匐以手行也奮方問切尺蠖蠖烏郭切尺蠖屈伸蟲也求信信升人切與伸同黐抽知切彗徐醉切妖星也
