body:
  text: 唐于闐國三藏沙門實又難陀譯唐清涼山大華嚴寺沙門澄觀撰述第六有十佛世界下明衆海雲集衆雖深廣難測略啓十門一集意二集因三辨類四定數五權實六地位七前後八有無九聞不聞十釋文今初來至佛所何所為耶有十義故一為影響為主伴故二為作輔翼得圓滿故如普賢等常隨之衆三為守護如來如執金剛等諸佛住處常勤護故四為莊嚴如道場神等常為嚴淨佛宮殿故五為供養如偈讚即正行供養華幢等即財供養故六為發起此經諸請難者即其事故七為聞法獲益當機領悟即其類故八為表法諸首諸林表信行等皆同名故及座出菩薩等顯奇特故亦通表萬行俱成佛故九為順證佛菩薩等證説不虛故十為翻顯即聲聞不聞顯法不共故為斯多意所以衆海雲集非唯證信而已也一為影響者此集意中十意皆暗取下經此初意引即諸大菩薩及下證法如來皆互為主伴若影之隨形響之應聲二為作輔翼者亦是義引二為守護者經云皆於往昔無量劫中恆發大願願常親近供養諸佛又下經云一切諸佛化形所在皆隨化往一切如來所住之處常勤守護四常為嚴淨者此即主城神德下經云皆於無量不思議劫嚴淨如來所居宮殿所以標道場神此中等字等城神故然道場神合嚴道場以道場神所歎德中但云皆於過去值無量佛成就願力廣興供養釋曰由無嚴飾之文故等取城神之文耳五為下以義繁重故總相引偈讚下妙嚴品其華幢等即二十二經升兜率天宮品六為發起者即解脫月七亦總引八九十並顯可知第二集因亦有十因一曾與毗盧遮那如來同集善根故二蒙佛四攝曾攝受故三往在生死聞圓法故四曾發大心護一切故五往發大願願事佛故六隨逐如來無猒足故七樂聞正法心無倦故八善能散滅我慢心故九福智已淨身周遍故十同一法性善根大海之所生故為此多義得預斯會中有集因亦通集意及隨諸衆各有別因可以思準一曾與者即菩薩德中云此諸菩薩往昔皆與毗盧遮那如來共集善根修菩薩行二蒙佛者即第二經初總歎衆云如是皆以毗盧遮那如來往昔之時於劫海中修菩薩行以四攝事而曾攝受三即義引入法界品諸聲聞等往在生死不曾聞此故不見聞反顯菩薩昔曾聞故四即夜叉王德云皆勤守護一切衆生此亦義引如海雲言發哀愍心有怖畏者咸守護故五即身衆神德文云皆於往昔成就大願供養承事一切諸佛六即足行神德文云皆於過去無量劫中親近如來隨逐不捨即無厭足七即乾闥婆王德文云皆於大法深生信解歡喜愛重勤修不倦八即主風神德文云皆勤散滅我慢之心亦阿修羅德文云悉已精勤摧伏我慢及諸煩惱九即菩薩德文云一切如來功德大海咸入其身一切諸佛所在國土皆隨願往亦通就義説具二嚴者方能周遍至諸佛所十亦菩薩德文云皆從如來善根海生中有集因亦通集意者謂即五六七八五約往願承願而來即是集意由願得來即是集因六約隨逐心樂隨逐即是集意由樂隨逐故得來集即是集因七約樂聞大法而來即是集意由樂得來即是集因八約散我為歎散我即是集意由散我故方得在會即是集因初四後二但是其因同集善等故得在道場但為集因非為別來為同集善等故非集意及隨諸衆各有別因者即下經文隨名歎德然上所引即是其文然經隨便宜歎德不同如風神云散滅我慢之心語其大意總此十因遍通多衆故此別説隨衆別因第三辨類即上集意便成十類一影響衆二常隨衆三守護衆四嚴會衆五供養衆六發起衆七當機衆八表法衆九證法衆十顯法衆凖前可知第四定數者稱法界衆焉能數知即文而言九會都數總有一百七十五衆都序之中有四十一衆謂同生有一異生三十九師子座中一若兼取前菩提樹中所流及宮殿中無邊菩薩總四十三衆此四十三遍於九會第一會中有二衆謂新集十方衆佛眉間衆添成四十五第二會有新舊二衆第三四會各有四衆謂新舊及證法衆天衆第五會一百一十一衆謂新舊衆升天品內供養衆有一百七并天衆證法衆第六會四衆謂天衆同生異生證法衆七八兩會各唯一衆謂普賢等舊衆第九會三衆謂菩薩聲聞及天王等舊衆舊衆雖重隨會別故并皆取之然此諸衆或總為一一乘衆故或分為二以有實衆及化衆故或可為三人天神故或為四佛菩薩人非人故或五非人開天神故或六加畜生故或七天分欲色故或八菩薩有此界他界故或九他方有主伴故或十加聲聞故或一百七十五如前説故或無量無邊義類多方故一一或以佛剎塵數等為量故又如新集菩薩毛光出衆例上皆爾故一一衆皆無分齊此猶約相別若融攝一一會中皆具一百七十五衆以稱法界緣起之會互相在故上且約一界若通十方及異類剎塵帝網無盡無盡是為華嚴海會衆數第五權實者夫能對揚聖教影響其迹靡不是權當機之流多皆是實諸教所明穢土之中雜類菩薩聲聞皆通權實地前是實地上是權法身無生生五道故淨土菩薩唯實實報生故雜類聲聞是權攝論云欲令淨土不空化作雜類衆故若依此經同生異生皆通權實海印定現實德攝故隨緣隨位而示現故第二會初云莫不皆是一生補處故第前十類辨權實者影響一衆自有二類一果德衆謂能加證法諸佛互為主伴非權非實若位極菩薩影響一向是權故有經云昔為釋迦師今為佛弟子二尊不並化故我為菩薩等當機唯實餘八通權實對前十類下對前別辨云互為主伴非權非實者然權實有其二類一本高迹下如佛為菩薩二本下迹高如菩薩為佛今既是佛則非迹下實是如來又非本下則是實非權無權可對故亦非實同果海故昔為釋迦者略有二經一即放鉢經但云昔為釋迦師今為佛弟子二尊不並化故我為菩薩二菩薩處胎經第四亦同此説文云計我成佛身此剎為最小座中有疑故於胎現變化我身如微塵今在他國土三十二相明在在無不現昔為能仁師今乃為弟子佛道極廣大清淨無增減我欲現佛身二尊不並立此界現受教我剎見佛身下取意引佛剎名無礙佛名升仙尊經云我身儒首是又云剎土名究竟佛名大智慧亦結屬已云我身儒首是當機唯實者上至等覺下至地前俱有當機並皆稱實餘八通權實可以意得第六地位者有説一切皆是果位以是舍那海印現故或説一切皆因果海非可見聞世尊亦是因者識所現故或皆通因果果不捨因隨類現故因位願力助佛化故當機之流正修趣故或俱非因果緣起大衆同真性故將此對前權實則果位一向權因位通權實若對前十類影響證法通因果餘八唯因因位高下難以準定將此料揀者初對第五門料揀若對前十類即對第三門料揀第七前後者初列菩薩後列餘衆者表從本以起末下讚即後明菩薩者表尋末歸本良以本末無二故二文互舉又從本流末必先小後大故自在天為末攝末歸本必從深至淺故先明自在然皆顯法界緣起逆順自在故也又表四十二位一一皆徹因門並該果海故互舉前後令物不作優劣之解故第七前後等者謂約列衆餘經或從勝先列或從微至著或先列聲聞後列菩薩今此衆海何者為先今明列與讚德前後不同然以菩薩為本雜類為末讚中先三卷明雜類讚後第五卷方明菩薩讚故云尋末歸本又從本下通妨謂有難言就先列中既菩薩為本雜類為末先本後末即合諸天之內從自在天次明廣果次列三禪等何以先明欲界後列初禪二禪等耶是則先小後大矣故今答云菩薩為本猶如一乘雜類為末如流三乘三乘之中初於鹿苑轉於四諦漸次歸大故先列欲界後列色界如次而上故云先小後大故自在為末末即末後耳攝末歸本者又有難言讚德之中表尋末歸本後明菩薩者則合先明日月天讚末後方明自在天讚何以雜類之中先明自在讚耶故今答云攝末歸本必從深至淺謂菩薩是所歸之本雜類是所攝之末攝末必從勝先攝如海攝百川必先攝江次攝大河次攝小河次攝溝洫故攝歸一乘先攝權大次攝緣覺次攝聲聞次攝人天一毫之善無不皆攝故先明自在天讚表是所攝之中先攝勝也末明月天等表所攝之中後收劣也第八有無者亦有十類一約界無無色二約趣無地獄此二非器故若約轉生有地獄天子若約所益亦通無色三界皆益故三約洲但列閻浮餘三略無故或成難故四約乘無二乘不共教故下為顯法亦不見聞故智度論云若小乘經初唯列聲聞若大乘經初具列菩薩聲聞若一乘經初唯列菩薩故指此經為不共教或大乘經唯列小者為引攝故如金剛經或唯列大亦屬大乘主伴具者必是一乘五約部無四衆未説小教故六約主無人王王未知故七約三聚無邪定彼障隔故生盲之流但冥益故八約內外無外道非彼測故九約諸天無無想入邪定故十約善惡無惡魔不為違害天中攝故上十且隨相説圓融應有即無所不具四約乘無二乘者此𫨻有四一正明二為顯法下通妨謂有難言若無二乘第九會中何得有耶答云為顯法耳次又難云若為顯法則有二乘答云亦不見聞與無同故三智論云下引證云明無小乘是不共義四或大乘經下重通妨難正通智論兼通正義謂有問言現有唯小而是大乘如金剛經那言列小是小乘經耶答云為引攝故智論就其大略故唯列小乘是小乘經如金剛經等別是一理耳或唯列大一乘等謂主伴不具者即如楞伽等是也第九聞不聞者約權前後皆互得聞約實當會自聞縱不起前而趣於後亦各不相知若約頓機許一時頓領縱不起前下通妨謂有問言若約實衆不互聞者如來説法既不起前而趣於後如何聽衆不得互聞故今答云約佛前後圓融約根互不知覺故法慧云一切閻浮提皆言佛在中我等今見佛住於須彌頂則知各不相知也上之九門且從顯著略為此釋中本廣本或隱或顯不可執文第十釋文第一會中前總四十衆大分為二初一同生餘是異生地論論云解脫月是同生衆故又云同生衆請則知兼有地前明知不約地位餘釋云云不符論意云何名為同異生耶然有二義一謂雜類作諸異生種種形故菩薩得法性身同人作一類菩薩形故二菩薩為同者通諸位故神等為異法界差別德故餘釋云云者有釋云聲聞為同菩薩為異謂小乘斷惑同故有云出家菩薩聲聞為同餘並為異此約形相同故上二解俱非論意以經八會無聲聞故論釋地經經亦無故初成正覺無出家故或云登地為同同證真故餘皆是異是以地前名異生性故有云八地以上為同同無漏故上之二解亦違論文論主但云解脫月是同生衆本不曾言約地位故又論明大衆請云有同生衆請有地前故所以知有者由金剛藏云有行未久解未得隨識而行不隨智聞此生疑墮惡道我愍是等故不説大衆承此便請明大衆之中有行未久即地前故復有釋云雜類為同以受彼彼同類身故菩薩為異不約同彼衆生類故此亦違論解脫月為同故又有釋云菩薩雜類俱為同法界無二故俱為異法界差別故此約實義豈得為釋同異之殊明知上來並非正解故云餘釋云云不符論意疏云何名為下上出同異生體今釋同異生義然其二釋前約事相後約表法又有將此四十衆以配地位同生衆中開之為二謂十普菩薩即是圓因對前菩薩以為所信從海月光下及執金剛為十住復將一一位中十名如次配於十度海月光等十菩薩配初發心住此住本即是檀其十菩薩復配檀中具十則令十住自有百度歷於五位有五百波羅蜜以等覺位亦有十故主稼神下十衆配十行修羅下配十向三十三天下配十地前十普菩薩是等覺地此配則似生情然經勢多端配亦無失但不俟如此不次謂四十衆以配三賢十聖下師子座衆以配等覺眉間出衆以配妙覺則四十二衆配四十二位於理甚直有十佛世界微塵數菩薩摩訶薩所共圍繞其四十衆文皆有三一標數辨類二列名結數三攝德周圓今初同生衆中第一標數辨類中初標辨佛世界者下辨世界略有三類一世界二種三海今云世界則非種非海權實共許一三千界一佛化境故或名佛剎佛土皆準此也微塵者七極微量也謂抹三千界並為微塵一塵為一菩薩則數已難量矣況舉十數表無盡耶菩薩摩訶薩者辨類也即揀非餘衆具云菩提薩摩訶薩今從略耳然有三釋一菩提是所求佛果薩是所化衆生即悲智所緣之境從境立名故名菩薩二菩提是所求之果薩是能求之人能所合目故名菩薩三薩此云勇猛謂於大菩提勇猛求故摩訶云大大有四義一者願大求大菩提故二行大二利成就故三時大經三無數劫故四德大具足一乘諸功德故前二通地前後二或唯地上更有諸大亦不出此此等並是舍那佛自眷屬動止常隨故云所共圍繞其名曰普賢菩薩摩訶薩二其名下列名結數先列其名後結略顯廣今初夫聖人無名為物立稱雖得名千差而多依行德行德皆具而隨宜別標直彰大意中初總標無名故莊子云至人無己神人無功聖人無名今約利生無名強立耳雖得名下總辨立名此辨立名別因言多依行德者亦有因姓因父母等故行德皆具下通妨謂有難云既依行德而諸菩薩德行皆具何以成別故云隨宜別標隨便宜故謂有偈云弟子堅固菩提心從師以受灌頂位妙修定慧恆觀察深入業用善巧門即普賢菩薩又云導諸有情勝菩提以四攝法而攝取即金剛王菩薩無厭大悲未曾捨即金剛愛菩薩見行小善便稱美即金剛善哉菩薩無閲檀施等虛空即金剛寶菩薩亦虛空藏菩薩別名能以慧光破愚冥即金剛日菩薩亦云金剛光有所樂求恆不逆即金剛幢菩薩發言先笑令心喜即金剛笑菩薩能於妙法無染中即金剛法菩薩善用般若斷諸使即金剛利菩薩亦即文殊師利是無上法輪恆不退即金剛因菩薩亦云金剛轉法輪菩薩四辨演説無所畏即金剛語言菩薩諸佛衆生事業中即金剛業菩薩恆被堅誓慈悲甲即金剛護菩薩亦云金剛甲胄菩薩摧破魔羅勝軍衆即金剛藥叉菩薩亦云金剛牙菩薩堅持諸佛所祕門即金剛拳菩薩又如乘聲濟物即曰觀音手中兩華便名華手等皆隨德隨宜先十同名普者顯具法界總相德故後十異名者顯具法界別相德故總別相融同一法界今初十名之普是別之總普下十異顯即普能別普義方成今初十名下應有難云前云十普既顯法界總相之德何得更有普德普光等殊故為此通此是古今諸佛同行普賢之行隨於諸位差別不同縱成正覺亦普行攝故先明之此是古今下明先列所以可知然其釋名皆取下文所得法門以成會釋由得解脫各隨所得以立其名所以前云依德行立此若不了但尋下經自當分明言普賢者體性周遍曰普隨緣成德曰賢此約自體又曲濟無遺曰普鄰極亞聖曰賢此約諸位普賢又德周法界曰普至順調善曰賢此約當位普賢又果無不窮曰普不捨因門曰賢此約佛後普賢位中普賢悲智雙運佛後普賢智海已滿而運即智之悲寂而常用窮未來際又一即一切曰普一切即一曰賢此約融攝所以先列者為上首故法門主故法界體故一切菩薩無不乘故無一如來非此成故令諸聞者見自身中如來藏性行普行故上雖多義離釋今從別稱合釋無處不賢名曰普賢即體普也此一為總餘九為別普德最勝燈光照菩薩摩訶薩二德普謂稱性之德充於法界以為最勝委照無遺如燈之光普光師子幢菩薩摩訶薩三慧普遍照嚴剎決定高出故普寶焰妙光菩薩摩訶薩四行普內行圓淨智熖外燭故稱為妙普音功德海幢菩薩摩訶薩五音普具一切音演佛淨土深廣高出之行故普智光照如來境菩薩摩訶薩六智普照佛法界無盡境故普寶髻華幢菩薩摩訶薩七心普智寶嚴於心頂通行等華高出物表故普覺悅意聲菩薩摩訶薩八覺普遍覺性相聲皆悅機故無不歸者普清淨無盡福光菩薩摩訶薩九福普障無不淨稱真無盡故普光明相菩薩摩訶薩十相普無光相之光相遍益衆生故六相圓融思之海月光大明菩薩摩訶薩二海月下十異名菩薩一海月光大明者十德十山皆依大海十地十度皆依佛智海中看月淨而且深依智嚴剎深而且淨如海即大如月即明故以名之雲音海光無垢藏菩薩摩訶薩二講如雷震故曰雲音辨才泛灎猶如海光又海上有光天涯無際佛智起用一念普周淨惑無窮名無垢藏功德寶髻智生菩薩摩訶薩三修治二嚴猶如淨寶祕密高顯故有髻言功德自在王大光菩薩摩訶薩四法王出現作用自在二嚴圓滿為功德光善勇猛蓮華髻菩薩摩訶薩五勇猛化生不染化相雨法玄妙如解髻珠普智雲日幢菩薩摩訶薩六慈雲智日互相資映長劫普應高出如幢大精進金剛臍菩薩摩訶薩七堅利智慧與精進俱故得稱大智為行本若臍為壽因香焰光幢菩薩摩訶薩八戒等行發是為香焰種智高直故曰光幢大明德深美音菩薩摩訶薩九智光遍照是大明德稱真適物名深美音大福光智生菩薩摩訶薩十大智發光遍照佛境令福非福相所亦稱大如是等而為上首有十佛世界微塵數二如是等下結略顯廣此諸菩薩往昔皆與毗盧遮那如來共集善根修菩薩行皆從如來善根海生第三此諸菩薩下攝德圓滿中二初別歎勝德後總結多門初中亦二初二句就緣歎餘就行歎今初初句往因同行顯主伴有由後句從德海生明長為輔翼言毗盧遮那者毗即遍也盧遮即光明照義回就方言應云光明遍照然有二義一身光遍照盡空法界乃至塵道二智光遍照真俗重重法界身智能所合為一身圓明獨耀具德無邊故立斯號又毗者種種義盧遮障義那者盡義入義即種種障盡種種德圓故普賢觀經云釋迦牟尼名毗盧遮那遍一切處即身亦遍非唯光遍又云其佛住處名常寂光即土亦光矣又云常波羅蜜所攝成處我波羅蜜所安立處即德圓義又云淨波羅蜜滅有相處即障盡義又云樂波羅蜜不住身心相處不見有無諸法相處即證入義又云如寂解脫乃至般若波羅蜜是色常住法故明皆即應即真為本師矣此經文證本品當辨又毗者種種下第二釋毗盧名以梵語多含故有此釋下後引經具釋然彼經由普賢令行者懺悔行人問云我於何所懺悔故有此教今以疏間經當總引經云釋迦牟尼名毗盧遮那遍一切處其佛住處名常寂光常波羅蜜所攝成處我波羅蜜所安立處淨波羅蜜滅有相處樂波羅蜜不得身心相處不見有無諸法相處如寂解脫乃至般若波羅蜜是色常住法故但觀經文自分經疏言共集善根即備道資糧修菩薩行即作所應作云何共集互為主伴故主伴有三一回向主伴二同行主伴三如相主伴皆稱共集主伴有三者一回向主伴所修善根互相回向故今成佛遞為主伴二同行者同修禪戒等行三二俱稱性居然相收後句言善根海生者謂佛德無邊積妙法寶智定盈洽故稱為海從生有四一從自佛善根海生謂已圓十身故二從本師海生佛為勝緣曾已攝受授法令行得成滿故三與遮那同於餘佛海生以上云共集故四從法性佛海生以上德海諸佛共同平等一味但稱性修即是從生不揀自他故梵本云與佛同一善根海生謂佛德者釋為海義即金光明意彼經偈云佛德無邊如大海無限妙寶積其中智慧德水鎮恆盈百千勝定咸充滿即同海故從自佛者由普賢等自圓十身十身之中有如來身依於佛身起菩薩用云從彼生諸波羅蜜悉已圓滿第二諸波羅蜜下就行德以歎夫大士必崇德廣業虛心外身崇德故進齊佛果廣業故行彌法界虛心故智周萬法而不為外身故功流來際而非己故德難名矣夫大士下先彰歎意先兩句標崇德廣業者周易上繫云子曰易其至矣乎夫易聖人所以崇德而廣業也注云窮理入神其德崇也兼濟萬物其業廣也次復云智崇禮卑崇效天卑法地注云智以崇為貴禮以卑為用又云盛德大業至矣哉富有之謂大業日新之謂盛德虛心外身者即老子意彼云虛其心實其腹弱其志強其骨又云後其身而身先外其身而身存今借其言謂菩薩虛曠其心智絶能所亡身為物一向利他故下經云菩薩所修功德行不為自己及他人但以最上智慧心利益衆生故回向即斯意也略分為三一明自分因行德二勝進果行德三二行無礙德初中亦三一自利行圓二利他行滿三證理位極今初有三句一諸度行圓謂六度十度八萬四千多劫積集究盡事理故云圓滿慧眼明徹等觀三世二慧眼下十眼明徹分別名慧照矚稱眼障翳斯盡智無不矚故云明徹五眼之中慧眼觀理理無異味故云等觀十眼之中慧眼觀事事無不見故名等觀是則委見其事為明深達其性為徹欲以一眼含諸具通事理但舉其慧五眼之中一肉眼二天眼三慧眼四法眼五佛眼釋相如離世間品今唯取慧眼十眼者前五眼外更加五眼而業用多異文云所謂肉眼見一切色故天眼見一切衆生心故慧眼見一切衆生諸根境界故法眼見一切法如實相故佛眼見如來十力故智眼知見諸法故光明眼見佛光明故出生死眼見涅槃故無礙眼所見無障故一切智眼見普門法界故釋曰見諸根境界即是見事即五眼中法眼見同則明徹之言明配十眼中智徹配五眼中慧於諸三昧具足清淨三於諸下深定已滿三昧者此云等持遠離沉掉平等持心趣一境故而云諸者其餘諸緣亦一境故真如三昧為其定體隨境入別塵數多端故云諸也橫則無定不窮豎則深入無際故云具足定障永亡故云清淨竪則深入者法華云禪定智慧解脫三昧深入無際辨才如海廣大無盡第二辨才下利他行滿有三句即三輪化益一語含四辨即正教輪辨謂巧顯深理才謂巧應機宜萬法咸演則廣大無涯千難殊對則無竭盡故如海也又海遇風緣則洪浪雲涌智逢機請則口辨波騰請者既許無邊辨亦廣大無盡具佛功德尊嚴可敬二具佛下身業神通輪謂三業無失智深叵撓為具佛功德故得外儀儼若肅然可敬知衆生根如應化伏三知衆生下意業記心輪根義總明文含性欲言如應者根有生熟化不失時器有大小授法無謬化謂教化即應攝受者而攝受之伏謂調伏即應折伏者而折伏之由此具行入正法故即應攝受下即勝鬘經文由此具行入正法故者即取意結之彼云折伏攝受令正法久住多分折伏剛強攝受柔弱入法界藏智無差別第三入法界藏下證理位極亦三句一證理法謂以大智證入平等真法界藏依佛性論説有五藏一如來藏謂在纏含果法故二自性清淨藏謂在纏不染三法身藏謂果位為功德所依四出世間上上藏謂出纏超過二乘菩薩五法界藏謂通因果外持一切染淨有為故名法界內含一切恆沙性德故復名藏此義寬通故今證入依佛性論者即第二卷辨相分第四自體相品第一中有十義一自體相牒云相者有二種一者別相二者通相別相有三何者為三一者如意功德性二者無異性三者潤滑性言如意功德性者謂如來藏有其五種何等為五一如來藏自性是其藏義一切諸法不出如來自性無我為相故故説一切諸法為如來藏二者正法藏因是其藏義以一切聖人四念處等正法皆取此性作境未生得生已生得滿是故説名為正法藏三者法身藏至得是其藏義此一切聖人信樂正性信樂願聞由此信樂心故令諸聖人得於四德乃過恆沙數等一切如來功德故説此性名法身藏四者出世藏真實是藏義世有三失一者對治可滅盡故名為世此法則無對治故名出世二不淨住故名為世由虛妄心果報念念生滅不住故此法不爾故名出世三由自倒見故心在世間則恆倒見如人在三界心中決不得見苦法忍等以其虛妄故名為世此法能出世間故名真實為出世藏五者自性清淨藏以祕密是其藏義若一切法隨順此性則名為內是正非邪則為清淨若諸法違逆此理則名為外是邪非正名為染濁故言自性清淨藏故勝鬘經云世尊佛性者是如來藏是正法藏是法身藏是出世藏是自性清淨藏由説此五藏義故如意功德得顯現為顯此義故説如意寶喻譬如有人以宿業故感得如意寶珠得此珠已能隨其意有所樂事自然得成佛性亦爾由事善知識修諸福慧感得此性便隨修行者意各各自得三乘之果故如意功德是其別相釋曰然疏引五藏即賢首疏其第五藏即論第二正法藏是名則小異大旨則同取其最後順經法界義故當第五復名法界藏耳然論正法藏云因是其義今疏云通因果者謂能與因果諸位功德為因故論云一切聖人四念處等而為因故言智無差別者所證之藏平等要無分別方契此則智自無差所證之藏下釋智無差別於中分二先正釋然有三釋連成一義第一智自無差如以圓蓋稱於圓函今但論蓋圓耳謂所證平等故須無差別智方證於理若差別智即不能證即由上義能所不殊又此能證智與所證藏冥合一味無有境智之異故云無差此復有二一同無相故下經云無有少法為智所入亦無少智而入於法二同法界故則能所各互攝盡故下云無有智外如為智所入智攝智如盡故亦無如外智能證於如如全攝智故即由上義下第二意能所不殊無差如魚符相合又此下明一味無差如水和乳此復有二者前即真空一味後即妙有一味前即無相後即法性若皆一味豈令智同於境而無智耶古德釋云智相盡故不有能令智相盡故不無不爾豈令諸相皆𥁞而智獨存智相𥁞故不有則同如一味能令智相盡故不無則智有功能反照智空不取於智斯為真智故不無智不爾下反釋反成不有一味之義是故於境則不礙真而恆俗於智則不礙寂而恆照即境智非一境則不礙俗而恆真智則不廢照而恆寂即境智非異境則空有無二智則寂照雙融故云無差別也是故下結成於中先以寂照對真俗二境辨非一異後境則空有下結成無差上來所釋約真理寂寥與止寂相順俗諦流動與觀照相順起信等中且為此釋上來所釋下二申今意三初成昔解明有文據出於起信為出論意則令昔解未盡其源謂前結成之中於境不礙真而恆俗智則不礙寂而恆照雖明不礙若別對者意以心寂對於境真心照對於境俗以照對俗則心境非一以寂對真則心境非異明是唯照對俗唯寂對真次雖雙融空有二境寂照二心終不得言境則不礙俗而恆真心則不礙照而恆寂則心境非異明知本意相對別也故疏取其意示論意云真理寂寥與止寂相順俗諦流動與觀照相順言起信等者出其所據也等取瑜伽及別經論言起信中者即彼修行信心分中云云何修行止觀門所言止者謂止一切境界相隨順奢摩他觀義故所言觀者謂分別因緣生滅相隨順毗鉢舍那觀義故云何隨順以此二義漸漸修習不相捨離雙現前故若修止者住於靜處端坐正意不依氣息不依形色不依於空不依地水火風乃至不依見聞覺知一切諸想隨念皆除亦遣除想以一切法本來無想念念不生念念不滅亦不得隨心外念境界後以心除心心若馳散即當攝來住於正念是正念者當知唯心無外境界即復此心亦無自相念念不可得若從座起去來進止有所施作於一切時常念方便隨順觀察久習淳熟其心得住以心住故漸漸猛利隨順得入真如三昧釋曰上皆論文止中則知無相不生不滅觀中常念方便及分別因緣生滅明是止順於理觀順於事又論下文云復次若人唯修於止則心沈沒或起懈怠不樂衆善遠離大悲是故修觀修習觀者當觀一切世間有為之法無得久停須變壞一切心行念念生滅以是故苦等釋曰上亦多就事明觀又下論云唯除坐時專念於止若餘一切悉當觀察應作不應作止觀俱行所謂雖念諸法自性不生而復即念因緣和合善惡之業苦樂等報不失不壞雖念因緣善惡業報而亦即念性不可得釋曰此之雙行亦明念自性不生是止念因緣和合是觀故疏出論意真理寂寥與止寂相順俗諦流動與觀照相順而上云等取瑜伽七十七中亦説禪定有於三品一奢摩他品二毗鉢舍那品三雙運品大旨與起信多同故致等言未盡其源以令照真不得名照照俗之時不得即寂故未盡其源下次辨順違文雖順論不知諸論且約一相便將寂照敵對真俗故是有乖以令照真下出其有乖所以由以寂對真故單照真時無照以照對俗故單觀俗時無寂故統收經論中意或以理觀對於事止謂契理止妄是也或以事觀對於理寂謂無念知境是也或事觀對於事寂謂觀於一境心不動搖是也或理觀對於理寂忘心照極是也略舉其四廣如賢首品此由約單觀若約雙融事理如下疏文若依古釋則全無事止亦無理觀云何得三觀一心三止齊運若云約真則境智無二約俗則境智非一斯則有理而其結云境則空有無二智則寂照雙融明知還融前照事之觀契理之寂耳請細詳之今正釋者謂言用則同而異由境不能照智有照故言寂則異而同境智無異味故同故無心於彼此忘心契合故異故不失於照功智異木石故故名真智證理境則唯寂智則寂而常照今正釋者下三申正義有四初約證理以釋境智非一異義即肇公般若無知論中之意而便以疏間而釋之彼論先有難云聖智之無惑智之無俱無生滅何以異之耶答曰聖智之無者無知惑智之無者知無其無雖同所以無者異也何者夫聖心虛寂無知可無可曰無知非謂知無惑智有知故有知可無可謂知無非曰無知也無知即般若之無也知無則真諦之無也是以般若之與真諦言用則同而異言寂則異而同同故無心於彼此異故不失於照功是以辨同者同於異辨異者異於同斯則不可得而異不可得而同也何者內有獨之明外有萬法之實萬法雖實然非照不得內外相與以成其照功此則聖所不能同用也內雖照而無知外雖實而無相內外寂然相與俱無此則聖所不能異寂也是以經云諸法不異者豈曰續鳧截鶴夷嶽盈壑然後無異哉誠以不異於異故雖異而不異耳故經云甚奇世尊於無異法中而説諸法異又云般若與諸法亦不一相亦不異相信矣釋曰但觀上來所引論文則疏之中自分主客但觀疏文中間釋論則論旨趣居然可知若約照俗則以後得智照差別之境若約融真俗者境則真俗不二智則權實雙行亦為一味而不失止以雖雙行而即寂故若約融真俗者下三約雙融所以辨此者自有二意一者古德自科入法界藏云一證理法故於止義唯就理明今此別明事理無礙二者即所證理是即事之理不遮雙融但上雙融唯取權智對於真止故為非耳故今不要以止對真而智自有權實雙融對真俗雙融以與昔別況云而不失止則二智之上自有二止權智之上有隨緣止實智之上有體真止二止亦融對上二智即止觀雙融若融智境方為一味若約三觀及融境智至下當辨若約三觀下四約三觀説謂空觀假觀中道觀在心則空假中一心對境無諦有諦中道第一義諦三諦之境三觀自有三止空觀有體真止假觀有隨緣止中道觀有離二邊分別止三止三觀六法一時以契一諦三諦之境境智一味則有九法皆成一味更有異門等並如下説證佛解脫甚深廣大二證佛下明證果法言解脫者謂作用自在如不思議法品説於一念中建立三世一切佛事等總有十種廣如彼説即用而真故甚深用無涯畔故廣大上窮彼際故云證也總有十種者即第四十七經未云佛子諸佛世尊有十種無礙解脫何等為十所謂一切諸佛能於一塵現不可説不可説諸佛出興於世一切諸佛能於一塵現不可説不可説諸佛轉淨法輪一切諸佛能於一塵現不可説不可説衆生受化調伏一切諸佛能於一塵現不可説不可説諸佛國土一切諸佛能於一塵現不可説不可説菩薩受記一切諸佛能於一塵現去來今一切諸佛一切諸佛能於一塵現去來今一切世界種一切諸佛能於一塵現去來今一切神通一切諸佛能於一塵現去來今一切衆生一切諸佛能於一塵現去來今一切佛事是為十能隨方便入於一地而以一切願海所持恆與智俱盡未來際三能隨下明得位極謂普賢身遍於六位隨在一位以願海力持於一切故舊經云在於一地普攝一切諸地功德今此文順西國若順此方應云能以方便隨入一地以願海力攝持一切地也然有引梵本廣明此中句數開合不同不必應爾何者夫譯梵為唐誠乃不易苟文小左右貴於旨不乖中若理不可通則正之以梵本譯人意近則會之以舊經言異意同何必廣引然有引梵本下因釋此句便彈古人有無益之文意云如不獲已須引梵文若無異轍何要繁引因示體式言譯梵為唐誠乃不易者案道安法師云譯梵為秦有五失本三種不易即睿公摩訶般若經序所明言五失本者一梵語盡倒而使從秦一失本也二梵經尚質此方好文傳可衆心非文不合二失本也三梵經委悉至於歎詠叮嚀反覆或三或四不嫌其繁而今裁斥三失本也四梵有義説正似亂辭尋説向語文無以異或千或百刈而不存四失本也五事已全成將更傍及反謄前辭已乃復説而悉除之此五失本也又三種不易何者然般若徑三達之心覆面所演聖必因時時俗有險易而刪古雅以適今時一不易也愚智天隔聖人叵階乃欲以千載之上微言傳合百王之下末俗二不易也阿難出經去佛未久尊者大迦葉令五百六通迭察迭書今雖千年而以近意裁量彼阿羅漢乃兢兢若此此生死人而平平若此豈將不知法者勇乎斯三不易也涉茲五失本逮三不易譯梵為秦詎可不慎乎今用此意故云誡乃不易苟文小左右下示譯方軌先二句總今取意即什公意睿公摩訶般若波羅蜜經序云執筆之次三惟亡師五失三不易之誨惕馬若厲憂懼盈懷雖復履薄臨深未足喻也幸冀宗匠通鑒文雖左右而旨不違中遂謹受案譯敢當此任故會意譯經姚秦羅什為最若敵對翻譯大唐三藏稱能若理不可通下別示方軌如下萬字非字虛空無形引梵以正斯引得矣譯人意近則會之以晉經者如今經云以是發心當得佛故引晉經云以是發心即是佛故譯人意謂即佛恐濫果佛故云當得若爾上云初發心時便成正覺何異即佛況下復云即得如來一身無量身等豈唯當成為是是知即佛約圓融門當成但是行布之意今以行布釋於圓融故言意近須引晉經以成正理又如出現品菩提章云於一切義無所觀察但得寂義故引晉經解一切義則止觀具矣如是等文其類多矣許可引斥今此文中廣引梵本言異意同故成繁長言恆與智俱者明智窮來際文含二義一望前謂雖在因中一地而願力持一切地功德皆與智俱盡未來際不離一地如一地餘地亦爾是故因門盡於未來但是一一諸位菩薩不見作佛時二望後以盡未來之大智入如來之果海也雖有二義順前義勝初自分因行德竟了達諸佛希有廣大祕密之境第二了達下明勝進果行分二一得果法二起果用今初有四句一入佛密境此有二意一佛即密境以三業業具非餘測故謂非色現色摩尼不能喻其多非量現量應持不能窮其頂不分而遍一多不足異其體全法為身一毛不可窮其際此身祕密也佛言聲也非近非遠目連尋之無際身子對而不聞非自非他若天鼓之無從猶谷響而緣發無邊法海卷之在一言無內圓音展之該萬類是謂佛口密也意則無私成事等覺尚不能知密之至也皆廣大無涯超絶奇特故云希有二佛之密境謂即一乘如來如見禪定解脫深入無際帝網之境時乃説之故云希有久默斯要甚為祕密又權實隱顯唯佛方知故云祕密今洞見其源故云了達善知一切佛平等法二善知下入佛平等亦有二意一佛佛平等謂一切諸佛體性平等法身無二故智慧平等德無增減故內用平等悲願普應故二者佛所證法平等即第一義此二無二稱此而了故名善知已踐如來普光明地三已踐下明得佛位謂佛有十地如大乘同性經説一甚深難知廣明智德地乃至第十名毗盧遮那智海藏地此十同是佛地約德用成別今普光明當其第一普即廣義光明即明甚深難知此文雖略義在普中舉初攝後理實皆踐又普光明亦十地之總總不出於普法智光故如大乘尊者經云一甚深難知廣明地二清淨身分威嚴不思議明德地三善明月幢寶相海藏地四精妙金光功德神通智德地五火輪威藏明德地六虛空內清淨無垢焰光開相地七廣勝法界藏明界地八最勝普覺智藏能淨無垢遍無礙智通地九無邊億莊嚴回向照明地十毗盧遮那智海藏地釋曰此上十地同是佛地約用成別廣有其相具如彼經入於無量三昧海門四入於下證佛三昧謂海印等定皆深廣如海並通一實故得稱門於一切處皆隨現身世法所行悉同其事總持廣大集衆法海辨才善巧轉不退輪第二於一切下明起果用文有三業一現佛身業遍世同事二同佛意業總持大法三得佛語業能轉法輪不退有四一稱理不退無改説故二應機不退無虛發故三利益不退聞已必定故四制伏不退天魔外道不能動故復有四種不退謂信位證念今當第四念不退也不退有四等者此有兩種四不退義前義即十地論一向約利他大用而説後四不退如常所辨信謂十信已滿十千劫故亦是第六不退心也位即十住第七不退住不退墮聲聞辟支佛地故名位不退證謂初地已證真如已得不退念即八地已上念念入法流心心趣寂滅故得不退第二勝進果行德已竟一切如來功德大海咸入其身一切諸佛所在國土皆隨願往已曾供養一切諸佛無邊際劫歡喜無倦一切如來得菩提處常在其中親近不捨恆以所得普賢願海令一切衆生智身具足第三一切如來下二行無礙德謂引攝佛德不礙修因故文有五句一引攝佛德然有二義一則行成攝果二則諸佛同加二一切下隨佛遍生不揀淨穢也三已曾下供佛集福十方無邊三世無際此一切佛皆供養故歡慶有遇不住福相故長時無猒四一切下長為輔翼義通真應五恆以下悲願調生不以偏小利物唯以同體普願攝物令證菩提方顯智體圓足成就如是無量功德第二成就下總結多門無得而稱也菩薩之德焉言不可周宜以類取故云如是無量無德而稱等者此借論語泰伯篇言子曰泰伯其可謂至德也已矣三以天下讓民無德而稱焉意云德既至深故不能稱歎也謂泰伯即武王伯祖文王之伯弟名季歷即文王之父合當泰伯長子承嫡知弟季歷必生聖子讓而不受託採藥於吳故為至德音釋溝洫溝居候切洫勿棫切溝洫水瀆也胄直又切兜鍪也大計切更易也轍直列切車轍也迭徒結切更也睿俞芮切臍音齊肚臍也泛灩泛孚梵切浮也灩以贍切水動貌矚朱欲切視也翳一計切目疾也撓奴巧切擾亂也掉徒了切搖動也刈倪制切割也惕他歷切音剔憂也嫡了歷切止長曰嫡
