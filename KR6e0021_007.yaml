body:
  text: 唐于闐國三藏沙門實義難陀譯唐清涼山大華嚴寺沙門澄觀撰述自下大文第七稱揚讚德分亦是發起序第七稱揚讚德分一對十分之名稱揚讚詠本師功德二云亦是發起序者對三分科經謂序正流通一品是序常途分二一證信二發起今以前六分皆為證信此下四分總為發起讚揚發起佛德出衆顯於佛用發起大經不同古德但用天地楨祥為發起也爾時如來道場衆海悉已雲集文中有三第一總結威儀住第二此諸衆下總顯德行因緣第三所謂下別明得法讚佛前中有三初結衆集次明相異後顯意同今初數廣德深故名衆海起於自地集空道場多數大身重重無礙雲之象也又浮雲無心龍吟則起菩薩無住佛現爰來無邊品類周匝遍滿形色部從各各差別二無邊下相異也不唯上列故云品類無邊旋環不空故云周匝遍滿大小等形妍等色部主徒從各有區分故云差別隨所來方親近世尊一心瞻仰三隨所下意同也隨所來方參而不雜皆得見佛各對目前其猶百川各全覩月同無異念故曰一心諦矚欽承瞻而且仰不唯直覩丈六乃徹見法界身雲第二總顯德行因緣者以上列中隨宜別歎今方總顯德行齊均又與下別得法門以為總故前同生衆中共集善根亦是別故又前共集明主伴所由今曾攝受顯眷屬所以影略其文第二總顯德行因緣先總彰大意何名總顯德行因緣先釋總顯自有二義一望前為總前四十衆各隨所宜以歎勝德所歎則局如歎海神云佛功德海充滿其身等今總顯四十衆德二望後為總下四十衆得法各異今總顯具德前同生衆下躡迹成難謂有難云前顯同生云皆與毗盧遮那共集善根豈非總耶故今答云前局同生今該同異四十衆德方得名總又前明共集下重通所難非唯總別不等實亦文意有殊前之共集與佛德齊故為主伴今曾攝受唯為佛攝故為眷屬為分二義前略攝受此略共集可互影取故云影略其文此諸衆會已離一切煩惱心垢及其餘習摧重障山見佛無礙此文多勢且分為三初明離障見淨二如是下受化根深三種無量下德行圓初後是因中一是緣以因奪緣大衆自見以緣奪因佛力令見因緣和合無定親疏故因緣間説又初𫨻德行現深後二因緣宿著久攝今見即緣成因感應道交故常居佛會此文多勢下二科判也言多勢者或可分三或可分二二中立名亦可有異於中有三初科為三初後是因下料揀又初假下對前且字今為二故久攝今見下亦是料揀上三分中二即是緣初後是因者約自行為因佛攝為緣今得見佛由昔曾攝攝即親因因緣既著為感昔既曾攝故應今初離障見淨者煩惱即煩惱障也心垢即所知障也此障翳心迷所知故言一切者謂分別俱生若種若現言餘習者二障氣分粗重粗重如畢陵上慢迦葉不安今皆位極菩薩智現情亡證理達事心鏡瑩淨故云已離若諸位圓融一斷一切斷亦通初位言一切者謂分別俱生若種若現者謂二障各二一者分別謂因邪師邪教及邪思惟此見道斷入初地時便永斷𥁞二者俱生不由上二生而便有此修道斷地地斷之此又二種一者現行二者種子若所知現行地地斷之若煩惱現行亦地地斷煩惱種子直至金剛定斷二障氣分粗重粗重者二障氣分即熏習所成揀異現障故云習氣然習氣有二謂因與果於現起障能為因者亦名種子此因習氣根本智斷斷此因已現不起故不起現因但粗重者唯名習氣此果習氣後得智斷斷現粗重知現無故言粗重者違細輕故粗重有三一現起粗重貪等令心無堪任故二種子粗重煩惱種子障諸智故三粗重粗重實非煩惱似煩惱故如身子瞋習畢陵慢習等今即第三以經云餘習故又位極故前二即是一切中攝故疏釋云若種若現上言已斷即有能斷之道揀異伏道故云已斷斷道有二一根本無分別智親證二空所顯真理無境相故能斷二障種子現行二後得無分別智雖不親證無力能斷迷理隨眠而於安立非安立相明了現前無倒證故亦能永斷彼修所斷迷事隨眠上來皆是唯識論意更有釋者所知障中亦有二種一於所知境而能為障即是不染汙無知而非法執如於五明處有所未解但是無知何曾有執然唯識云由我法執二障俱生若證二空彼障隨斷者據見道分別障説以證空理而斷障故言是障而非執者據修道斷俱生障説以遍知有成種智故上來所知之障二所知即障名所知障此體即是善心心所以彼空有二相未除帶相觀心有所得故前據了俗此據證真説名智障此障對治亦有二種一者解有二者達空空有俱明名遍知故然唯識正義唯所知之障今就理通故亦用之問永斷習氣唯是如來云何此衆皆云已斷答此有二釋一約法相離𥁞唯是如來若據分離亦通菩薩經説粗重三位斷故解深密經説三粗重一者在皮初地即斷二者在膚八地方斷三者在骨唯佛地斷雖則餘位亦斷粗重而三位顯是故偏説初地捨凡入聖位故八地無漏常相續故佛地果滿頓得捨故又此即是八地菩薩故云斷也二約圓融如疏文顯言摧重障山者通以喻顯以能摧道摧二障山障體堅厚崇聳如山又別則智障菩提惑障圓寂通則俱障及一切佛法故名為重言見佛無礙者斷障果也然有二義一就能見以明無礙由斷二礙智明理顯理顯故見法性身智明故見佛智身理智冥一見無礙身無礙亦即涅槃二約所見明無礙者具十無礙已如上説如是皆以毗盧遮那如來往昔之時於劫海中修菩薩行以四攝事而曾攝受第二如是下受化根深於中初總後別初中如是者指前斷障之衆劫海者明攝時曠遠言四攝者即攝化之方謂布施愛語利行同事布施是攝緣與彼資持故愛語是攝體正示損益故利行是攝處安住善處故同事謂釋疑令彼決定故布施是攝緣等者略示四攝之相然瑜伽説各有九門至賢首品當略明之一一佛所種善根時皆已善攝種種方便教化成熟令其安立一切智道後一一下別示攝相於中向言劫海曾攝何所攝耶謂一一佛所何時攝耶種善根時將何法攝謂種種方便攝相云何謂教化成熟教化約始成熟就終攝意云何令其安立一切智道道者因也謂唯為佛果修佛因耳種無量善獲衆大福悉已入於方便願海所行之行具足清淨於出離道已能善出常見於佛分明照了第三種無量下德行圓備前攝何益令德圓故於中先辨因圓後入果海今初文有五句一種無量善已超七地殊勝善根故二悉已下已超八地大願滿故三所行下已超十地行滿障淨故四於出離下前明德圓此具出道一道無量道已超生死不住涅槃故云善出五常見下結成見佛謂德高十地是以常見非比量見故曰分明不取色相名為照了又塵毛剎海佛遍重重有德斯覩名分明照了已超七地殊勝善根者以七地有空中方便慧有中殊勝行功用行滿故云無量一道無量道者一道者一切無礙人一道出生死故離世間品説一道是菩薩道不捨獨一菩提心故二道是菩薩道謂方便智慧故三道四道乃至十道又云菩薩有無量道無量助道無量修道無量莊嚴道各列十句則萬行觸目皆菩薩道又塵毛剎海下上是通相般若之意此是華嚴一乘玄旨以勝解力入於如來功德大海二以勝解力下入果海也此一𫨻文望前是別總具德中別入果故望後是總四十衆中解脫標故今且屬前於中二初乘因入果是比智知如見鸞翔知太虛可沖矚龍躍知宏海可泛也謂以勝解力印可佛言知福慧之深遠以信解力瞻仰佛化知慈悲之廣大是入如來功德大海亦是勝解印持果德此一𫨻下總顯文意以總具德文有三節第三德行圓備中自有七句令但是二故云別也既言得於諸佛解脫之門則是四百餘門之總標也義雖兩向科且屬前初乘因入果者以勝解力即是乘因入於如來功德大海即是入果沖者和也深也虗也高也升也今正是升義兼虗高亦是勝解印持果德者前則印化比知二嚴與慈悲皆教道也今云印果則心冥果海為證道也得於諸佛解脫之門遊戲神通二得於下明分得果用言解脫門者佛果障寂大用無礙故稱解脫真解脫者即是如來通智遊入故號門也衆各證契故名為得此解脫即門佛得其總衆海得別又佛解脫但名解脫衆所得法稱之為門以能通入彼果用故此解脫之門又衆所得法離障自在名為解脫智所入處亦名為門以因解脫入果解脫亦稱為門此解脫即門言解脫門者先別釋三初解脫門三字皆屬於佛二解脫屬果門屬衆海三三字皆屬衆海於中有二一就因中自分能所二將已解脫望果為門然總別圓融因果交徹重重無礙方為真解脫門故下或歎佛果德或歎因行或約天等所得欲影顯故然總別下二圓融融上三義總別圓融融第一義因果交徹融後二義重重無礙通上三義且如總具於別別亦具總則一解脫門中有一切解脫門次遊戲神通正明入相遊戲者出入自在神通者難測無壅故約觀心者心境無礙稱為解脫由此入理故號為門若以門為門非能通矣門即如實何所通耶正入雙亡為真門矣如此入者則本覺湛然名窮果海真非𡚶外則因果圓融心境無涯則解脫無際矣正入以下後順結能所雙寂故曰雙亡門理歷然稱為正入正入則理無不契雙亡則過無不寂第三所謂下別明得法讚佛四十衆中各先長行得法即經家序列後説偈讚即當時所陳然衆集偈讚並在一時文不纍書故編之作次而各得一者顯佛德無盡故乘別入總盡衆不能及故故海慧云如來境界無有邊各隨解脫能觀見而普賢得十者顯等佛無盡故所謂妙焰海大自在天王得法界虛空界寂靜方便力解脫門文中先異生衆後同生衆前中三初諸天次八部後諸神今初分二先色天後欲天前中有五今初自在天長行十法第一法界等者即法身解脫也法界虛空界即用所遍處空即事空法界之言義兼事理謂非但遍空亦遍空內色心等事及空有稱真之理又但言空則一重遍今云法界則重重皆遍何者謂空界容一一塵處及彼事物一一塵中皆稱真故各有無邊剎海佛身大用皆悉充滿故下頌云無窮盡也言寂靜者體也然有二義一明前大用用無用相不礙常寂二由此智用即寂同真是故隨一一用遍一切處也言方便者用也亦有二義一明前寂無寂相不礙大用二內同真性不礙外應羣機故云方便寂用無礙所以稱力及空有稱真之理者此空是外空若以理空對外空外空離法是斷滅空理空即事名為真空若以外空亦心所現亦由對色滅色方顯則此斷空從緣無性即性空也故十八空明大空者謂十方空即十方虗空亦是性空矣是故疏云空有稱真之理即有之空皆性空也一明前大用等者此二義中一用同體寂二用同體遍方便二者一由忘寂故不礙用二由依寂故能起用自在名稱光天王得普觀一切法悉自在解脫門二普觀一切法悉自在者智身解脫也此有三義一以普眼於一切法無不能觀二觀一切法不壞事而全理三於一法中見一切而無礙並名自在清淨功德眼天王得知一切法不生不滅不來不去無功用行解脫門三知一切法不生等者自共相解脫也亦有二義一知不生等內證真理二無功用行外應羣機三自相解脫者以一切法各各不同色非心等故名自相今皆不生故名解脫此明無彼生相則法體不生故名自相若直遣生住滅相亦共相耳然不生等佛法之體釋有多門略申一二一別釋以不生滅約境不來去約行初不生滅略有五義初不生滅略有五重者前三別據三性不同四即含前三而義別五即融四句而無礙就別約三性中各三釋者初一通就當性説二約當性二義説三對三無性説唯圓成二義小異云何三性各二義耶遍計二者一情有二理無依他二者一緣生二無性圓成二者一性有二相無一就遍計由是𡚶執無法可生滅也又情有即是理無故不生也理無即是情有故不滅也不滅不生是一法也又求遍計相不可得故不生能顯無相性故不滅不滅即不生亦一法也一就遍計下遍計三義也一遍計無體如繩上蛇故無可生滅二約二義者情有合是生理無體是滅今此情有即是理無何有生耶正理無處方是情有故非滅也下例可知三對無性者由無遍計方顯無相故唯識云即依此三性説彼三無性是知若無遍計安知無相下亦例然二就緣起性謂法無自體攬緣而起即生無生既本不生故無可滅也又緣起無性故不生無性緣起故不滅中論云以有空義故一切法得成是故不生即不滅不滅即不生為一物也又推緣無起故不生能顯無生性故不滅二就緣起性者一通説因緣之法依他而起因緣所生無有生故故經云一切法無來是故無有生以生無有故滅亦不可得二明二義中又緣起無性故者緣生即無性也無性緣起者無性即緣生也前句即因緣故空此句即無性故有故引中論以有空義故一切法得成唯證後句三顯無性中若無因緣不知無性故論四句推之諸法不自生亦不從他生不共不無因是故知無生若不推此安知無生無生即是生無自性性也三約圓成性謂非是有為故無彼生滅相也又非𡚶心境故不生聖智所證故不滅又體非遷變故不生隨緣令法起故不滅不滅即不生為一物也三約圓成初義可知一約二義中小異耳前二謂二三皆約二義二即法相宗二義於此二義顯無性義謂非妄心境故即相無義聖智所證故即性有義而非妄心境故遠離我法所執便能顯得勝義無自性性又體非遷變下約不變隨緣法性宗中二義既不變故不生由此不變方能隨緣則不生是不滅義既以隨緣為不滅由隨緣不失自性方知不變則不滅是不生故云為一物也四通就三性混融於一法上就遍計故不生就圓成故不滅就依他故亦不生亦不滅就三無性故非不生非不滅四通就三性等者即合前三而義別理實具合三性三無性以成四句如一念心剎那瞥起即具六義謂一念之心是緣起法是依他起情計有實即遍計所執體本空寂即是圓成三性備矣既即依三性説三無性故六義具矣今於三性成其三句三無性上共成一句謂一念之上既理本無故遍計為不生本無之理即是圓成故不滅依他即無性故亦不生而不壞相故亦不滅三句備矣言就三無性非不生非不滅者上約遍計故不生今遍計即無性故無彼不生為非不生也上約圓成故不滅今圓成即是勝義無自性性故非不滅上約依他亦不生亦不滅今依他即生無自性性故何有亦不生亦不滅故上三性不出不生不滅今翻彼三性以成三無性故雙非也五然此四句合為一聚圓融無礙頓思可見五中融四句而無礙以一念心上一微塵上即有六義故總融合言合四句者非第四門中四句合前別説總説四句耳二不來不去者約行謂正智背捨𡚶執而無去向證真理而不來又依體起用而不去應機現前而不來又往應羣機而不去恆歸寂滅而不來不來即是不去無二為一味也由此大智無念應機如摩尼天鼓無思成事故云無功用行也二不來不去下有三義釋初唯約體背捨是去而云不去者智照妄空無可捨故照惑無本即智體故向證真理合是來義如如來故而云不來者真不可得故照體無自即真理故故經云如來者無所從來又依體起用等者第二雙約體周説也依體起用故是去以即體之用故不去應機現前合是來以應不離體如月之影故不來又往應羣機而不去等者第三唯約用説往應合是去應無應相故不去恆歸寂滅合是來滅不可得故不來又即體之用往而不去用即體故歸而不來前對於佛上明去機上明來此對機上明去佛上明來又前對機見佛來此對佛自歸來三義雖殊皆顯不來即不去也由此下釋無功用摩尼約身天鼓約口無思約意二通釋者不生不滅亦可約行不來不去亦可約境二通釋者既言不生滅約行不來去約境此亦是局何名為通已上是賢首意不生滅局境而不通行不來去局行而不通境今翻其不通令通則四義俱通境行故名為通謂𡚶念斯寂猶若虛空何生何滅又雖起大用見心無生用謝歸寂了本無滅又常稱真理寂照居懷於此心中有何生滅此約行釋不生滅也謂妄念下別亦約三性以成觀行初即遍計契同無相何有生滅二又雖起大用下約依他觀三又常稱真下約圓成觀約境釋不來去者猶如空華無可去來又緣會即來來無所從故無來緣謝而去去無所至故無去又諸法即如如豈來去約境釋不來下亦約三性初即遍計又緣會下約依他又諸法即如下約圓成而並從揀略各出一義例前不生亦可具五亦應前三別説四五融通如遍計上亦應云情有即是理無故不來理無即是情有故不去等但改生滅二字為來去二字餘凖前思三展轉釋又何以不生滅由無來去故何以不來去由無生滅故三展轉釋所以為此釋者有三意一則上來但當句釋今顯互相釋故如經云一切法無來是故無有生等即此亦名相因釋也又既無來去則非一非異不生不滅則無斷無常智契前理故無功用不礙生等故云行也又既無來去則非一異者次正是展轉釋欲明不生滅等四含義無盡故略舉八不即中論宗論云不生亦不滅不常亦不斷不一亦不異不來亦不去而青目釋之有展轉相釋今取此勢故為此釋云何不來不去則得為異對此非一非異耶謂若有來去則有能所能所為一今無來去故無一異云何不生不滅則得不常不斷謂若許有生生即是有定有則常若許有滅滅則是無定無則斷今無生滅何有斷常故中論問云不生不滅已總破一切法何故復説此六事耶答為成不生不滅故謂有人不信不生不滅而信不常不斷若深求不常不斷即是不生不滅故知二義相成從智契下釋無功用是則不生之生生之不生無功用故常寂行故常用寂用無二是於功用得解脫也斯為正法之要義味難盡無猒繁文是則不生之生下生與不生展轉相成上來諸不相成總顯不生之理今則性相相成以此不生不同斷滅故不礙於生若礙於生非真不生故不礙生成不生也是則緣生故無性無性故緣生二義相成真不生也可愛樂大慧天王得現見一切法真實相智慧海解脫門四現見一切法等者觀義解脫也現見之言揀比知故真實相言略有三義一以智觀事實事不虛故故下經文觀有為法如實相故二以慧觀理實所謂無相無相不相名為實相三以無礙智知無二實窮實故深盡邊故廣稱智慧海不為相縛是解脫門不動光自在天王得與衆生無邊安樂大方便定解脫門五與衆生等者慈障解脫也離諸危怖曰安適悅身心為樂見佛則獲二利故安樂也煩惱不生故得定也佛德難思故樂定無邊斯為大方便也妙莊嚴眼天王得令觀寂靜法滅諸癡暗怖解脫門六令觀等者悲障解脫也衆生癡故造業造業故受苦暗故不見未來不見未來即顛墮故大怖之極莫越愚癡令觀本寂則癡相本空尚不造善豈當為惡尚不造善等者然邪説空謂豁達無物或言無礙不妨造惡若真知空善順於理恐生動亂尚不起心惡背於理以順妄情豈當更造若云無礙不礙造惡何不無礙不礙修善而斷惡耶厭修善法恐有著心恣情造惡何不懼著明大邪見惡衆生也善思惟光明天王得善入無邊境界不起一切諸有思惟業解脫門七善入等者業障解脫也佛現十方是無邊境了無依性稱為善入尚不依佛寧造業思尚不依佛者意同前義入理觀佛恐懷觀心更造業思特達至理可愛樂大智天王得普往十方説法而不動無所依解脫門八普往十方等者即無相解脫門也雖身應十方寂然不動智宣諸法泊爾無依不取於相如如不動故普音莊嚴幢天王得入佛寂靜境界普現光明解脫門九入佛等者即名相解脫也佛智契如名入寂境寂而能應故普遍十方身智發光又令物入無相故靜無名故寂名稱光善精進天王得住自所悟處而以無邊廣大境界為所緣解脫門十中此天王名與前列中少倒前名極精進名稱光上下諸文多有此例或義存名異或廣略參差皆譯者不善會耳法門名住自等者此離二取相能益自他解脫門自悟處者即離覺所覺自覺聖智常現前也而以無邊等者謂緣無邊法界度無邊衆生得廣大菩提也此離二取相者唯識第八有四二取一相見二名色三王所四本末本即第八異熟末即六識異熟今當相見所覺是相能覺是見遠離覺所覺名自覺聖智故楞伽云一切無涅槃無有涅槃佛無有佛涅槃遠離覺所覺即斯義也上是第一經第二又云佛告大慧前聖所知轉相傳授妄想無性菩薩摩訶薩獨一靜處自覺觀察不由於他離見妄想上上勝進入如來地是名自覺聖智之相音釋妍妍倪堅切美也之切醜也鸞盧官切神鳥也壅委勇切塞也瞥匹滅切篇入聲驟也
