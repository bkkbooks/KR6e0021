body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述爾時布華如雲主林神承佛威力普觀一切主林神衆而說頌言佛昔修習菩提行福德智慧悉成滿一切諸力皆具足放大光明出世間悲門無量等衆生如來往昔普淨治是故於世能為益此擢幹神之所了若有衆生一見佛必使入於深信海普示一切如來道此妙芽神之解脫一毛所集諸功德劫海宣揚不可盡諸佛方便難思議淨葉能明此深義我念如來於往昔供養剎塵無量佛一一佛所智漸明此𦦨藏神之所了一切衆生諸行海世尊一念悉了知如是廣大無礙智妙莊嚴神能悟入恆演如來寂妙音普生無等大歡喜隨其解欲皆令悟此是雷音所行法如來示現大神通十方國土皆周遍佛昔修行悉令見此普香光所入門衆生譣詖不修德迷惑沉流生死中為彼闡明衆智道此妙光神之所見佛為業障諸衆生經於億劫時乃現其餘念念常令見此味光神所觀察復次寶峯開華主山神得入大寂定光明解脫門第十三主山神十法一寂而常照故光無不闡華林妙髻主山神得修習慈善根成熟不可思議數衆生解脫門二相光熟機皆慈善根力如涅槃廣明高幢普照主山神得觀察一切衆生心所樂嚴淨諸根解脫門三修因嚴根本為順物故矚蓮目而欣樂覩月面而歡心或見諸根一一皆周法界喜益深矣離塵寶髻主山神得無邊劫海勤精進無厭怠解脫門四如空不染故長劫無怠光照十方主山神得以無邊功德光普覺悟解脫門五癡故長眠唯福智之能覺大力光明主山神得能自成熟復令衆生捨離愚迷行解脫門威光普勝主山神得一切苦使無有餘解脫門微密光輪主山神得演教法光明顯示一切如來功德解脫門次三可知普眼現見主山神得令一切衆生乃至於夢中增長善根解脫門九若睡若寤皆令聞法進行斯為佛業如大瓔珞經說過去有佛凡欲說法令大衆眠夢中說法令增善根覺得道果涅槃亦云其人夢中見羅剎像等亦表萬法皆夢大夢之夜必有大覺之明涅槃亦云其人夢中見羅剎像即當第九如來性品迦葉菩薩白佛言世尊云何未發菩提心者得菩提因佛告迦葉若有聞是大涅槃經言我不用發菩提心誹謗正法是人即於夢中見羅剎像心中怖懼羅剎語言咄善男子汝今若不發菩提心當斷汝命是人惶怖寤已即發菩提之心是人命終若在三趣及在人天續復憶念菩提之心當知是人是大菩薩摩訶薩也金剛堅固眼主山神得出現無邊大義海解脫門十稱性法門無邊大義一音能演是出現也爾時開華匝地主山神承佛威力普觀一切主山神衆而說頌言往修勝行無有邊今獲神通亦無量法門廣闢如塵數悉使衆生深悟喜衆相嚴身遍世間毛孔光明悉清淨大慈方便示一切華林妙髻悟此門佛身普現無有邊十方世界皆充滿諸根嚴淨見者喜此法高幢能悟入歷劫勤修無懈倦不染世法如虛空種種方便化群生悟此法門名寶髻衆生盲暗入險道佛哀愍彼舒光照普使世間從睡覺威光悟此心生喜昔在諸有廣修行供養剎塵無數佛令衆生見發大願此地大力能明入見諸衆生流轉苦一切業障恆纏覆以智慧光悉滅除此普勝神之解脫一一毛孔出妙音隨衆生心讚諸佛悉遍十方無量劫此是光輪所入門佛遍十方普現前種種方便說妙法廣益衆生諸行海此現見神之所悟法門如海無邊量一音為說悉令解一切劫中演不窮入此方便金剛目復次普德淨華主地神得以慈悲心念念普觀一切衆生解脫門第十四主地神十法一念念無間平等普觀修慈護法故得金剛之體金剛即內照之實也修慈護法故得金剛之體亦涅槃意彼第三問云云何得長壽金剛不壞身故以長壽品答長壽問由不殺及施僧之食為因金剛身品答金剛不壞身問因於護法故經初明金剛身義云爾時世尊復告迦葉善男子如來身者是常住身不可壞身金剛之身非雜食身即是法身下迦葉難次如來廣答金剛身相後迦葉徵因云唯然世尊如來法身金剛不壞而未能知所因云何佛告迦葉以能護持正法因緣故得成就是金剛身迦葉我於往昔護法因緣今得成就是金剛身常住不壞善男子護持正法者不受五戒不修威儀應持刀劒弓箭𭿺矟守護持戒清淨比丘此後廣說護法之相便引往昔此拘尸城有歡喜增益如來末法之中覺德比丘能師子吼為破戒比丘刀杖所逼時有國王名為有德與破戒比丘共戰時王被鎗舉身周遍覺德讚王王聞法已即便命終生阿閦佛國為彼如來第一弟子覺德比丘却後壽終亦生彼國為第二弟子故知能護功高所護生公釋金剛身云長壽之與金剛皆共談丈六但內外之異長壽為外應之跡金剛為內照之實實照體圓故無方也然則長壽金剛並義通內外而金色示滅故以實照為常實則至妙之色亦常不變矣然長壽對凡夫之夭促金剛對凡身之危脆故無長無短方為長壽非實非虛始曰金剛而推其因由護法者護法令法久住獲法身矣今疏文中言修慈護法者護法即涅槃文修慈即今偈意堅福莊嚴主地神得普現一切衆生福德力解脫門二一毛福力頓現衆福妙華嚴樹主地神得普入諸法出生一切佛剎莊嚴解脫門三證入無生不礙嚴剎普散衆寶主地神得修習種種諸三昧令衆生除障垢解脫門四一向為他淨目觀時主地神得令一切衆生常遊戲快樂解脫門五觀機出現名為遊戲金色妙眼主地神得示現一切清淨身調伏衆生解脫門六現淨惑身方調物惑香毛發光主地神得了知一切佛功德海大威力解脫門七內具德海現威力身如地含海潤發生百百苗稼皆地香毛故寂音悅意主地神得普攝持一切衆生言音海解脫門八長行一言盡攝無餘偈頌則一言普遍無極妙華旋髻主地神得充滿佛剎離垢性解脫門九焰雲普遍令物離垢為性金剛普持主地神得一切佛法輪所攝持普出現解脫門十法能攝持心行如金剛之輪佛則不動現世若須彌出海爾時普德淨華主地神承佛威力普觀一切主地神衆而說頌言此下頌中亦有二句結法屬人可以意得如來往昔念念中大慈悲門不可說如是修行無有已故得堅牢不壞身三世衆生及菩薩所有一切衆福聚悉現如來毛孔中福嚴見已生歡喜廣大寂靜三摩地不生不滅無來去嚴淨國土示衆生此𣗳華神之解脫佛於往昔修諸行為令衆生消重障普散衆寶主地神見此解脫生歡喜如來境界無邊際念念普現於世間淨目觀時主地神見佛所行心慶悅妙音無限不思議普為衆生滅煩惱金色眼神能了悟見佛無邊勝功德一切色形皆化現十方法界悉充滿香毛發光常見佛如是普化諸衆生妙音普遍於十方無量劫中為衆說悅意地神心了達從佛得聞深敬喜佛毛孔出香焰雲隨衆生心遍世間一切見者皆成熟此是華旋所觀處堅固難壞如金剛不可傾動踰須彌佛身如是處世間普持得見生歡喜復次寶峯光曜主城神得方便利益衆生解脫門第十五主城神十法有云脫第九法十頌具足一光等方便成熟利益妙嚴宮殿主城神得知衆生根教化成熟解脫門二應病與藥令得服行清淨喜寶主城神得常歡喜令一切衆生受諸福德解脫門三護法法存則物受福德教理行果皆有護也教理行果皆有護也者有毀謗教不惜身命折伏護持為護教也得旨契理便為護理修行無即為護行此三若護正覺果圓即為護果離憂清淨主城神得救諸怖畏大悲藏解脫門四悲救無盡名藏華燈焰眼主城神得普明了大智慧解脫門五了佛大智焰幢明現主城神得普方便示現解脫門六方便現身盛福威光主城神得普觀察一切衆生令修廣大福德海解脫門七同修佛德淨光明身主城神得開悟一切愚暗衆生解脫門八迷真俗理故云愚暗佛出開示令其悟入本迷無始猶若生盲雖聞譬喻竟不識乳唯佛出世方能曉之本迷無始等者即涅槃經然涅槃總有二文一即二十八經明八喻後云善男子凡所引喻不必盡取或取少分或取多分或復全取如言如來靣如滿月是名少分善男子譬如盲人初不見乳轉問他言乳為何類彼人答言如水蜜貝水則濕相蜜則甜相貝則色相雖引三喻未得乳實二者第十四經南本十三喻諸外道不識常樂我淨以四種喻謂貝稻米末雪鶴經云如生盲人不識乳色便問他言乳色何似他人答言色如白貝盲人復問是乳色者如貝聲耶答言不也復問貝色為何似耶答言如稻米末盲人復問乳色柔軟如稻米末耶稻米末者復何所似答言如雪盲人復問言彼稻米末冷如雪耶雪復何似答言猶如白鶴是生盲人雖聞如是四種譬喻竟不能識得乳真色釋曰貝可喻常末可喻樂雪可喻淨鶴可喻我然經中前三各誤領解而鶴一種略無誤領應言如鶴動耶然其四喻皆是眼境彼但身觸何能知耶非唯外道不知四德智眼未開空欲暗證猶彼盲人觸四境也言唯佛出世方能曉之者示其出世常樂我淨開其智眼了見分明香幢莊嚴主城神得觀如來自在力普遍世間調伏衆生解脫門此神名及法舊本無依今經補出頗與偈文相合九準梵本云香幢莊嚴髻主城神得破一切煩惱臭氣出生一切智性香氣解脫門謂正使為臭物殘習為臭氣智性為香體利物為香氣香氣若高山之出雲稱智性而無盡臭氣若香風之卷霧等性空之無邊煩惱則塵習雙亡智慧則自他兼利有本亦具云香髻莊嚴主城神得開發衆生清淨妙智解脫門亦恐傳寫之脫漏耳義不異前偈云現夢中者夢是神遊亦見聞之氣分也夢中尚調况於覺悟如迦旃延為弟子現夢境界等夢是神遊漢武故事昔漢武帝欲試善圓夢者乃詐為夢云朕夢見殿上兩瓦化為鴛鴦飛空而去是何徵也圓夢者曰宮中必有暴死之者帝曰戲之耳言未畢監司奏云宮人相殺帝曰朕實不夢而有徵者何耶對曰夢是神遊陛下欲言即是夢也亦見聞之氣分者即智論五夢之中見聞多故為夢也言五夢者一熱氣多故夢火二冷氣多夢水三風氣多夢飛空四見聞多入夢五天神與並如下夢忍如迦旃延為弟子現夢者莊嚴論說迦旃延有弟子為希羅王捨王位出家於山林中修道有一鄰國王名阿槃地遊獵至山其王安寢宮人詣比丘所比丘為其說法王覺謂誘我宮人遂鞭撻比丘比丘通苦心生怨恨我不相犯非理見辱遂欲還家為王伐彼師勸不止便言且留一宿明當任去即留一宿夜中迦旃延示之以夢夢見還國國人迎之却立為王與大臣商議徵兵伐怨而戰敗失道遂被彼擒將欲刑戮忽遇本師本師告言前苦相勸何為不從此王夢中號訴師言大師救命又聲便覺悲涕白師不復還家是為迦旃延之善巧覺化不得夢化便遂寶峯光目主城神得能以大光明破一切衆生障礙山解脫門十二障五蓋重疊如山非智光明莫之能破爾時寶峯光曜主城神承佛威力普觀一切王城神衆而說頌言導師如是不思議光明遍照於十方衆生現前悉見佛教化成熟無央數諸衆生根各差別佛悉了知無有餘妙嚴宮殿主城神入此法門心慶悅如來無量劫修行護持往昔諸佛法意常承奉生歡喜妙寶城神悟此門如來昔已能除遣一切衆生諸恐怖而恆於彼起慈悲此離憂神心悟喜佛智廣大無有邊譬如虛空不可量華日城神斯悟悅能學如來之妙慧如來色相等衆生隨其樂欲皆令見焰幢明現心能悟習此方便生歡喜如來往修衆福海清淨廣大無邊際福德幢光於此門觀察了悟心欣慶衆生愚迷諸有中如世生盲卒無覩佛為利益興於世清淨光神入此門如來自在無有邊如雲普遍於世間乃至現夢令調伏此是香幢所觀見衆生癡暗如盲瞽種種障蓋所纏覆佛光照徹普令開如是寶峯之所入復次淨莊嚴幢道場神得出現供養佛廣大莊嚴具誓願力解脫門第十六道場神十一法十一偈一出現字兩用謂有佛出現即出現莊嚴具而為供養佛昔如是神以大願倣之須彌寶光道場神得現一切衆生前成就廣大菩提行解脫門二對物成行令物倣之施為行先故偈偏舉雷音幢相道場神得隨一切衆生心所樂令見佛於夢中為說法解脫門三夢覺皆化則時處俱遍雨華妙眼道場神得能雨一切難捨衆寶莊嚴具解脫門四外寶內眼重重難捨為物說行故云能雨清淨焰形道場神得能現妙莊嚴道場廣化衆生令成熟解脫門五清淨熖形神前列中無謂色相道場俱妙莊嚴並為熟物華纓垂髻道場神得隨根說法令生正念解脫門六疑境界者以唯心為正念疑法性者以無得為正念實則無正無邪方稱曰正無念不念是真念矣諸念不生正念方生耳故隨根雨法斷疑生智雨寶莊嚴道場神得能以辨才普雨無邊歡喜法解脫門七辨才雨法稱根故喜勇猛香眼道場神得廣稱讚諸佛功德解脫門八深廣讚佛故名實雙美金剛彩雲道場神得示現無邊色相𣗳莊嚴道場解脫門九𣗳王眷屬並如經初蓮華光明道場神得菩提𣗳下寂然不動而充遍十方解脫門十即前身遍十方而無來往智入諸相了法空寂也妙光照曜道場神得顯示如來種種力解脫門十一種種力者佛有無量力故因行亦然皆嚴具顯示既示道場之神故得道場事中解脫爾時淨莊嚴幢道場神承佛威力普觀一切道場神衆而說頌言我念如來往昔時於無量劫所修行諸佛出興咸供養故獲如空大功德佛昔修行無盡施無量剎土微塵等須彌光照菩提神憶念善逝心欣慶如來色相無有窮變化周流一切剎乃至夢中常示現雷幢見此生歡喜昔行捨行無量劫能捨難捨眼如海如是捨行為衆生此妙眼神能悟悅無邊色相寶焰雲現菩提場遍世間焰形清淨道場神見佛自在生歡喜衆生行海無有邊佛普彌綸雨法雨隨其根解除疑惑華纓悟此心歡喜無量法門差別義辨才大海皆能入雨寶嚴具道場神於心念念恆如是於不可說一切土盡世言辭稱讚佛故獲名譽大功德此勇眼神能憶念種種色相無邊𣗳普現菩提𣗳王下金剛彩雲悟此門恆觀道樹生歡喜十方邊際不可得佛坐道場智亦然蓮華步光淨信心入此解脫深生喜道場一切出妙音讚佛難思清淨力及以成就諸因行此妙光神能聽受復次寶印手足行神得普雨衆寶生廣大歡喜解脫門蓮華光足行神得示現佛身坐一切光色蓮華座令見者歡喜解脫門第十七足行神十法初二可知最勝華髻足行神得一一心念中建立一切如來衆會道場解脫門三內則念念安於理事外則處處建立道場攝諸善見足行神得舉足發步悉調伏無邊衆生解脫門四舉足下足海印發輝諸有威儀無非佛事妙寶星幢足行神得念念中化現種種蓮華網光明普雨衆寶出妙音聲解脫門五以華以光雨寶雨法樂吐妙音足行神得出生無邊歡喜海解脫門六衆生無邊是佛化境見佛聞法故生歡喜栴檀𣗳光足行神得以香風普覺一切道場衆會解脫門七圓音警物等栴檀之香風暫一熏修覺身心之調順餘三可知蓮華光明足行神得一切毛孔放光明演微妙法音解脫門微妙光明足行神得其身遍出種種光明網普照曜解脫門積集妙華足行神得開悟一切衆生令生善根海解脫門爾時寶印手足行神承佛威力普觀一切足行神衆而說頌言佛昔修行無量劫供養一切諸如來心恆慶悅不疲厭喜門深大猶如海念念神通不可量化現蓮華種種香佛坐其上普遊往紅色光神皆覩見諸佛如來法如是廣大衆會遍十方普現神通不可議最勝華神悉明矚十方國土一切處於中舉足若下足悉能成就諸群生此善見神心悟喜如衆生數普現身此一一身充法界悉放淨光雨衆寶如是解脫星幢入如來境界無邊際普雨法雨皆充滿衆會覩佛生歡喜此妙音聲之所見佛音聲量等虛空一切音聲悉在中調伏衆生靡不遍如是栴檀能聽受一切毛孔出化音闡揚三世諸佛名聞此音者皆歡喜蓮華光神如是見佛身變現不思議步步色相猶如海隨衆生心悉令見此妙光明之所得十方普現大神通一切衆生悉開悟衆妙華神於此法見已心生大歡喜復次淨喜境界身衆神得憶佛往昔誓願海解脫門第十八身衆神十法一淨喜境界神者初列處名華髻莊嚴或是名廣略舉其半或梵音相類譯者之誤未勘梵本光照十方身衆神得光明普照無邊世界解脫門海音調伏身衆神得大音普覺一切衆生令歡喜調伏解脫門二三可知淨華嚴髻身衆神得身如虛空周遍住解脫門四相即無相故如空遍住空非獨虛亦遍於色住非分住一塵亦周如芥子空即不可盡身與法性不可分故空非獨虛者意云非為無物處是虛空出現品云譬如虛空遍至一切色非色處故住非分住一塵亦周者如來在一塵中亦全法界之廣大身皆具在故舉芥子空證已如前引無量威儀身衆神得示一切衆生諸佛境界解脫門五威儀施化無心頓現斯即佛境難以言思最勝光嚴身衆神得令一切饑乏衆生色力滿足解脫門六佛為良田出世難遇一興微供果獲五常略言色力亦有常命安樂辨才此五皆常方云滿足受報無盡故悉離貧窮果獲五常者疏文具列即涅槃第二純陀施食處說下回向施食中當廣明之受報無盡者亦純陀事即三十一經師子吼菩薩白佛言世尊如佛先告純陀云汝今已得見於佛性得大涅槃阿耨多羅三藐三菩提是義云何世尊如佛所說施畜生者得百倍報乃至云施不退菩薩及最後身諸大菩薩如來世尊所得福報無量無邊不可稱計不可思議純陀大士若受如是無量報者是報無盡何時當得阿耨多羅三藐三菩提此下廣說施相下佛答意云如向難言純陀報無盡者謂世間報然業有多種不必定受隨人所造愚智等殊今純陀大智將此施業唯為菩提及利衆生云何令受人天之報不得菩提況所造業及受果報皆是垂跡若善若惡非現生後受是業報下廣說業有定不定愚智輕重一切聖人為壞定業得輕報故不定之業無果報等則報無盡者是約世間今疏為順悉離貧窮故引世間受報無盡耳非取彼經師子吼菩薩之難意淨光香雲身衆神得除一切衆生煩惱垢解脫門七齒光除垢表所說淨故守護攝持身衆神得轉一切衆生愚癡魔業解脫門八有染於五塵無慈於六趣者愚癡魔業也體五欲性虛己兼亡彼業斯轉而名云守護攝持者善守根門攝散持德則遠魔矣然魔事惑不出三毒及慢魔惱衆生不出三事謂上妙五欲及諸苦具為說邪法則三毒是生三毒內著即為魔業今守護覺察魔如之何即偈中解脫道也普現攝化身衆神得普於一切世主宮殿中顯示莊嚴相解脫門九此有三意一身雖周於法界多示為王攝御自在故二八相處於王宮俯接物故三法界菩提𣗳下法王宮故不動光明身衆神得普攝一切衆生皆令生清淨善根解脫門十迷於本空故有妄苦無漏本有是淨善根爾時淨喜境界身衆神承佛威力普觀一切身衆神衆而說頌言我憶須彌塵劫前有佛妙光出興世世尊於彼如來所發心供養一切佛如來身放大光明其光法界靡不充衆生遇者心調伏此照方神之所見如來聲震十方國一切言音悉圓滿普覺群生無有餘調伏聞此心歡慶佛身清淨恆寂滅普現衆色無諸相如是遍住於世間此淨華神之所入導師如是不思議隨衆生心悉令見或坐或行或時住無量威儀所悟門佛百千劫難逢遇出興利益能自在令世悉離貧窮苦最勝光嚴入斯處如來一一齒相間普放香燈光焰雲滅除一切衆生惑離垢雲神如是見衆生染惑為重障隨逐魔徑常流轉如來開示解脫道守護執持能悟入我觀如來自在力光布法界悉充滿處王宮殿化衆生此普現神之境界衆生迷妄具衆苦佛在其中常救護皆令滅惑生喜心不動光神所觀見復次妙色那羅延執金剛神得見如來示現無邊色相身解脫門第十九執金剛神長行十法一見如來身普現非別豈唯凡現之處即無邊相亦隨一一色相皆無有邊日輪速疾幢執金剛神得佛身一一毛如日輪現種種光明雲解脫門須彌華光執金剛神得化現無量身大神變解脫門清淨雲音執金剛神得無邊隨類音解脫門二三四可知妙臂天主執金剛神得現為一切世間主開悟衆生解脫門第五神初卷中名諸根美妙今但云妙臂文義俱闕又加天主以現為世主故可愛樂光明執金剛神得普開示一切佛法差別門咸盡無遺解脫門六法海深奧槃節差別巧說令現無有遺餘大𣗳雷音執金剛神得以可愛樂莊嚴具攝一切𣗳神解脫門七約神且說寶飾為嚴巧攝己衆約佛方便相好為嚴無不攝也師子王光明執金剛神得如來廣大福莊嚴聚皆具足明了解脫門八因深故大福為能嚴果勝故德相皆明足密焰吉祥目執金剛神得普觀察險惡衆生心為現威嚴身解脫門九惡謂十惡險者惡之因也能陷自他及險道故蓮華摩尼髻執金剛神得普雨一切菩薩莊嚴具摩尼髻解脫門十若以現文則摩尼髻是所雨若以義取此神名摩尼髻亦得髻是能雨一切菩薩嚴具是所雨表菩薩智光圓滿故爾時妙色那羅延執金剛神承佛威力普觀一切執金剛神衆而說頌言汝應觀法王法王法如是色相無有邊普現於世間佛身一一毛光網不思議譬如淨日輪普照十方國如來神通力法界悉周遍一切衆生前示現無盡身如來說法音十方莫不聞隨諸衆生類悉令心滿足衆見牟尼尊處世宮殿中普為諸群生闡揚於大法法海漩澓處一切差別義種種方便門演說無窮盡偈中第六云漩澓者水之漩流洄澓之處一甚深故二回轉故三難渡故法海漩澓亦然一唯佛能究故二真妄相循難窮初後故三聞空謂空則沉於漩澓聞有謂有等皆類此知故云一切差別義也真妄相循難窮初後故者若言先妄後真真則有始若謂先真後妄妄由何生若妄依真起真亦非真若妄體即真妄亦無始為破始起立無始言始既不存終從何立無終無始豈有中間故中論云大聖之所說本際不可得生死無有始亦復無有終若無有始終中當云何有是故於此中先後共亦無真妄兩亡方說真妄真妄交徹無定始終聞空謂空則沉於漩澓者大分深義所謂空也以空為空雖深而沉矣餘三句亦然不取空相則無所沉何以故空相不可得故若復見有空諸佛所不化故空即有故有等亦然無邊大方便普應十方國遇佛淨光明悉見如來身供養於諸佛億剎微塵數功德如虗空一切所瞻仰神通力平等一切剎皆現安坐妙道場普現衆生前焰雲普照世種種光圓滿法界無不及示佛所行處餘並可知上來異生衆竟音釋𭿺矟𭿺莫侯切句兵也矟色用切矛屬危脆脆此芮切物易斷也鴛鴦鴛於袁切鴦於良切漩澓漩句緣切澓房六切漩澓回流也瞽果五切目但有眹也明矚矚音燭視也
