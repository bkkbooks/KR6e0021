body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述爾時普賢菩薩即從是三昧而起第三爾時下起定分所作事竟故於中二初此界後類通十方前中亦二初起定後衆益前中亦二初起主定從此三昧起時即從一切世界海微塵數三昧海門起二起眷屬定於中亦二初總謂一起一切起由此妙定即是一切三昧海故餘定為門皆入此故彼全同此亦受海名初一總明謂一起一切起者此上正釋由此下出所以有三初總攝故二終歸此故三彼全同下通妨難謂有云若取歸此如百川歸海何以能歸亦受海名故今通云約隨機別用故曰終歸實則體同更無異味即是總中之別義耳如於海中説百川味所謂從知三世念念無差別善巧智三昧門起從知三世一切法界所有微塵三昧門起從現三世一切佛剎三昧門起從現一切衆生舍宅三昧門起從知一切衆生心海三昧門起從知一切衆生各別名字三昧門起從知十方法界處所各差別三昧門起從知一切微塵中各有無邊廣大佛身雲三昧門起從演説一切法理趣海三昧門起二所謂下別辨塵數既多略列其十一即能知智三昧謂無一念暫差故云念念無差而六廢遍知為善巧智二即所知塵境上能所一對所知塵境者此有二義一塵即微細之塵知其相虛又能容納及為物因如八地中知微塵差別智二即六塵境亦名微塵境故安國云謂色等五塵界是現量境五識親證都無塵相如來藏中頓現身器亦無塵相六七妄想謂有我法想所現相是分別變分別變相但可為境而無實用如日發焰帶微塵而共紅非實紅也如水澄清含輕雲而俱緣非實緣也如觀本質知畫像而非真若了藏性悟塵境而為妄故經云非不證真如而能了諸行皆如幻事等似有而非真故法界微塵以為三昧釋曰此義易了亦非經宗故疏含有而釋之似巧故鈔引之三現廣剎四現居處即於世界總別一對楞伽經云如來藏識頓現一切身器及諸受用器即廣剎受用即是舍宅五知心念差別六知身相名字即衆生色心一對七知廣處八知廣身即依正一對雖説微塵意彰佛廣虛空無方有物處則現唯如來藏是實物有依此建立處所各別隨菩薩行剎有淨穢隨衆生業趣類別故微塵中佛復有一義謂如來藏是真佛身其體廣大無能知者恆在六七微塵之中一一有情各有藏識故云各有無邊大身楞伽經云者上即第一經文然彼明四頓義此是第三藏識頓知喻喻於報身頓成經云譬如藏識頓分別知自心現及身安立受用境界喻也經云彼諸依正亦復如是頓衆生所處境界以修行者安處於彼色究竟天釋曰今疏不取所喻但取能喻藏識頓變之文從器即塵剎下以楞伽經配屬今經上引楞伽雙證三四二句廣剎即第三句從現三世一切佛剎三昧門起舍宅即第四句故疏以受用二字配之彼經但云受用境界受用有二一共乘所慮外諸器界即如來蘊識頓變其宅舍即是共中不共皆屬受用其器一字乃是義引欲配二句故微塵中佛即觀心釋廣如出現品九從知一切法理趣者上八約事別別門顯此約理趣總該諸法故云一切大般若經理趣分説諸法皆空無生無滅無自性性離一切相不可願求然第一義湛然常住當知即是此如來藏思益經説處處避空皆不離空深密經説理趣有六一者真義理趣謂二障淨智所行真實二證得理趣謂於真義得如實知三教導理趣謂自證已開示衆生此三為本後三解釋四離二邊理趣謂有問言云何名為真義理趣應答彼言非有非無非常非斷五不思議理趣謂有問言云何證得應答彼言謂不思議若於諸法遠離戲論爾時證得真勝義性故知言説皆非真義六隨衆生所樂理趣謂有問言云何教導應答彼言隨諸衆生意樂各異順彼所欲方便開示彼真義者即此藏身彼不思議即此三昧無著菩薩説四意趣釋一切經亦理趣也如攝論辨大般若下二引教成立引三經一論初引大般若即第十理趣分經當第五百七十八彼經敘云此經並乃核諸會之旨歸綰積篇之宗緒明是六百卷之理趣也佛在他化自在天為八十億大菩薩説今疏義引兩節經文初至不可願求自為一節經云爾時世尊復依一切無戲論法説如來之相為諸菩薩宣説般若甚深理趣輪字法門謂一切法空無自性故一切法無相離衆相故一切法無願無所願求故一切法寂靜永寂滅故一切法無常無常性故一切法無樂非可樂故一切法無我不自在故一切法無淨離淨相故一切法不可得推尋其相不可得故等釋曰此上顯性空理趣然第二義者義引彼經顯真實理而為理趣若唯用前非真趣故故彼經云爾時世尊復依一切住持藏法如來之相為諸菩薩宣説般若一切有情住持遍滿甚深理趣勝藏法門謂一切有情皆如來藏普賢菩薩自體遍故一切衆生皆金剛藏以金剛藏所灌灑故一切衆生皆正法藏一切皆依正語轉故一切衆生皆妙業藏一切事業加行依故釋曰前明有法非有後明無法不無非有非無是中道理趣故疏結云當知即是此如來藏亦空不空一種之藏又攝別從總即藏身三昧之所有也思益經下即彼經第一時有五百比丘聞説法空從座起去等網明令思益梵天為作方便云云梵天言善男子縱使令去至恆河沙劫不能得出如是法門譬如癡人畏如虛空捨空而走在所至處不離虛空此諸比丘亦復如是雖復遠去不出空相不出無相相不出無作相又如一人求索虛空東西馳走言我欲得空我欲得空是人但説虛空名字而不得空於空中行而不見空此諸比丘亦復如是欲求涅槃行涅槃中而不得涅槃所以者何涅槃者但有名字猶如虛空但有名字不可得取涅槃亦爾但有名字而不可得爾時五百比丘聞説是經不受諸法漏盡心得解脫得阿羅漢道作如是言世尊若人於諸法畢竟滅相中求涅槃者則於其人佛不出世釋曰上經有二意一不離空以有遣空求空不得以空空遣空二不離空顯空體妙有求空不得顯空離相非有非空亦非空非不空而諸比丘但得初意故成羅漢令畢竟無求今疏通用二意皆為理趣略引初喻以彰體周為真意趣深密經者即第五經如來所作事品為文殊説其第六事亦名意趣亦名理趣即今所引而但列名不別解釋今疏已略釋疏中有二先引經正釋六理趣義在文可知彼真義下後會釋經文而但釋二者由前六中前三為本後三解釋則以三攝三也今以真義攝於第四即以前攝後以不思議攝其第二即以後攝前以真義直舉藏身之體不思議正同三昧之相故十地論釋所以金剛藏入三昧者顯此法非思量境故其第三與六即是利他後普賢説法是此一趣今言出定故略不言無著菩薩者但指攝論而雜集第二莊嚴論第十三皆同説四一平等意趣謂如説我昔曾於彼時中名毗婆尸即名勝觀正等覺者無性釋云謂一切佛由資糧等互相似故説彼即我非昔毗婆尸即今釋迦楞伽經中約四義釋一字等二語等三身等四法等故説即彼而實非彼二別時意趣謂如説言若但頌多寶如來名者便於無上正等菩提已得決定又由唯發願便得往生極樂世界無性釋云謂觀懈怠不能於法精勤學者故作是言此意長養先時善根如世間説但由一錢而得於千解云以後別時而得彼千也以一錢為千錢因念佛為菩提因發願為安樂因也三別義意趣謂如説言若己逢事爾所殑伽沙佛於大乘法方能解義無性釋曰意約證相大乘不就教相大乘故作是説四補特伽羅意樂意趣謂如來先為一人讚歎布施後還毀者隨此人得成何心故若人於財物有慳吝心為除此心先為讚施若樂行施施是下善欲令渴仰餘勝行故所以毀之不達言違皆佛別意趣耳餘行例然今明普賢亦善窮究上來九句唯第三四從現得名餘七皆從所知立稱如此等類有一切世界海微塵數合為一定即知此定是一切定耳普賢菩薩從如是等三昧門起時二普賢下大衆得益初標益時分亦是得益所由其諸菩薩一一各得世界海微塵數三昧海雲世界海微塵數陀羅尼海雲世界海微塵數諸法方便海雲世界海微塵數辨才門海雲世界海微塵數修行海雲後其諸下正明得益減數説九初五得菩薩法門句各一義皆以前定含此諸義故又此五句後後成前前世界海微塵數普照法界一切如來功德藏智光明海雲世界海微塵數一切如來諸力智慧無差別方便海雲世界海微塵數一切如來一一毛孔中各現衆剎海雲世界海微塵數一一菩薩示現從兜率天宮歿下生成佛轉正法輪般涅槃等海雲後四得佛果法即如來三業一得照藏身之實智二得藏身力用之權智三身毛現剎四應垂八相義兼口轉亦以藏身含此義故普賢出定他人益者感應道交故如春萌芽陽氣久滿東風一拂衆蘂齊敷諸菩薩衆積善以深久同行願才觀勝境萬德頓圓冥顯雙資于何不可冥顯雙資者謂宿善為冥資以暗成故現業為顯資事昭著故今當俱句亦有冥而非顯但有宿善故復有顯而非冥現身精勤宿無善故其非冥非顯此非機感設欲成機乃是大悲通相所被此上四句但約於機對機説應亦有四句一冥應令所得功德不自覺知二顯應現形説法光炎現相等三俱四俱非俱非不名為應若取大聖無心即應無應亦得名應以機對應乃成九句謂一冥機顯應二顯機冥應三冥機冥應四顯機顯應上單四句二單復相對復成四句一冥機冥顯應二顯機冥顯應三冥顯機冥應四冥顯機顯應三以復對復復成一句謂冥顯二機感冥顯二應今此乃成第九句也謂宿善冥著精心顯彰是謂冥顯機也入定冥資起用顯益即冥顯應也今舉冥顯之機成前得益故云冥顯雙資于何不可如此世界中普賢菩薩從三昧起諸菩薩衆獲如是益如是一切世界海及彼世界海所有微塵一一塵中悉亦如是二如此下類通可知爾時十方一切世界海以諸佛威神力及普賢菩薩三昧力故悉皆微動第四爾時下現相作證分然得益心喜喜則地動及有諸瑞諸會聞竟得益故現相居後此會雖即未聞已先得益故先現瑞以此會辨果顯殊勝故文中有四一世界微動兼出瑞因由因果二力言微動者是前相故一一世界衆寶莊嚴二衆寶莊嚴及出妙音演説諸法三出音説法復於一切如來衆會道場海中普雨十種大摩尼王雲何等為十所謂妙金星幢摩尼王雲光明照曜摩尼王雲寶輪垂下摩尼王雲衆寶藏現菩薩像摩尼王雲稱揚佛名摩尼王雲光明熾盛普照一切佛剎道場摩尼王雲光照十方種種變化摩尼王雲稱讚一切菩薩功德摩尼王雲如日光熾盛摩尼王雲恱意樂音周聞十方摩尼王雲四佛會雨寶略舉十種以顯無盡前三事相寶後七法化傳通寶並是出世善根所生普雨如是十種大摩尼王雲已一切如來諸毛孔中咸放光明於光明中而説頌言第五普雨如是十種雲已下毛光讚德分於中二初結前生後後正顯偈詞普賢遍住於諸剎坐寶蓮華衆所觀一切神通靡不現無量三昧皆能入詞中十頌分三初一總述前定次八別顯遍相後一結讚所由普賢恆以種種身法界周流悉充滿三昧神通方便力圓音廣説皆無礙一切剎中諸佛所種種三昧現神通一一神通悉周遍十方國土無遺者如一切剎如來所彼剎塵中悉亦然別顯中二前二偈半直述前遍所現三昧神通事毗盧遮那之願力後五偈半舉因顯遍於中二初半偈緣力遍普賢身相如虛空依真而住非國土隨諸衆生心所欲示現普身等一切後五因力遍於中四初偈即體而用故遍前半體後半用身相如空法性身也依真而住法性土也隨機普應受用化也身相如空者疏大有二先略釋經文具四身土前半即一法性身土具如疏釋後半有一身土謂受用字即他受用化字即是變化順經示現故其自受用含在前半以身如虛空自受用相良以經有非國土言故但屬法性身土耳問法性身土為別不別別則不名法性性無二故不別則無能依所依答經論異説統收法身略有十種土隨身顯乃有五重一依佛地論唯以清淨法界而為法身亦以法性而為其土性雖一味隨身土相而分二別智論云在有情數中名為佛性在非情數中名為法性假説能所而實無差唯識云雖此身土體無差別而屬佛法性相異故謂法性屬佛為法性身法性屬法為法性土性隨相異故云爾也今言如虛空者唯識論云此之身土俱非色攝雖不可説形量大小然隨事相其量無邊譬如虛空遍一切處故如虛空言通喻身土一依佛地下第二雙釋二章然淨土之義次二品廣明問明賢首第五回向等復當廣説法身之義玄文已具一經往往顯甚深旨此中亦即一𫨻寄如來身顯普賢身今十中第一文中有四初依論正立二論自解妨三為論引證四會釋經文性雖一味下二解妨即正答前問也謂與身為性名法性身與土為性名法性土即三土三身之真性也未失一味智論云下三為論引證共答前問亦猶外典天地萬物同稟陰陽之元氣也佛者是覺人有靈知之覺今第一義空與之為性故名佛性非情無覺但持自體得稱為法今真性與之為性故名法性是故結云假説能所而實無差唯識下亦為證前即第十論云又自性身依法性土雖此身土體無差別而屬佛法性相異故此佛身土俱非色攝雖不可説形量大小然隨事相其量無邊譬如虛空遍一切處釋曰此文兼證後𫨻如空論文易了謂法性屬佛下是疏釋論凖彼疏云佛義是相為功德法所依止故衆德聚故二身自體故法是性義功德自性故能持自性故諸法自性故體為土義相義為身此公意云屬佛是相屬法是性直語所依名土故云體為土義以能依名所依為法性身故云相義為身今疏意小異謂佛有覺義故名屬佛土無覺義但持自性故名為法性隨相異身土約相則有二差隨所依性則無差別今以無差之性隨有差之相故云性隨相異也今言如虛空下四會釋經文然隨事相其量無邊者以變化等三身三土事既無邊與之為性豈有邊耶既如虛空則遍一切色非色處疏結云故如虛空通喻身土者按於經文但言身相如虛空按唯識云此之身土皆喻如空則顯虛空喻兼下句二或唯大智而為法身所證真如為法性土無性攝論云無垢無挂礙智為法身故若爾云何言相如虛空智體無礙同虛空故三亦智亦如而為法身梁攝論及金光明皆云唯如如及如如智獨存名法身故此則身含如智土則唯如四境智雙泯而為法身經云如來法身非心非境土亦隨爾依於此義諸契經中皆説如來身土無二此則依真之言顯無能所方曰依真成如空義五此上四句合為一無礙法身隨説皆得土亦如之六此上總別五句相融形奪泯茲五説迥然無寄以為法身土亦如也此上單就境智以辨七通攝五分及悲願等所行恆沙功德無不皆是此法身收以修生功德必證理故融攝無礙即此所證真如體大為法性土依於此義身土逈異今言身相即諸功德言如虛空即身之性下經亦云解如來身非如虛空一切功德無量妙法所圓滿故下經亦云者即第五回向經下更一句云於一切處令諸衆生積集善根悉充足故前明自利此明利他八通收報化色相功德無不皆是此法身收故攝論中三十二相等皆法身攝然有三義一相即如故歸理法身二智所現故屬智法身三當相並是功德法故名為法身其所依土則通性相淨穢無礙我此土淨而汝不見衆生見燒淨土不毀色即是如相即非相身土事理交互依持通有四句謂色身依色相土色身依法性土法身依法性土及依色相故又以單雙互望亦成五句謂色相身依法性色相土等凖以思之我此土淨而汝不見即淨名第一衆生見燒淨土不毀即法華第五並如下引色即是如相即非相即義引大品等經身土事理互交徹故結前生後然結前三文成上三義謂引淨名成第三當相即是功德身土則具妙莊嚴通自他受用二引法華成智法身土亦通性相智所現身者若大圓鏡智現自受用身平等性智現他受用身成所作智現變化身此三身融則三土亦融變化則毀自他受用皆悉不毀我此土安隱即自受用天人常充滿即他受用三義引大品色即是如成第一義相即如故如即法性土相通諸土即法性身與色相身無礙依土亦性相無礙是故結云皆事理交互言生後者生後四句文有兩重四句初四唯單相對其色相言通於報化自受用報化他受用報皆色相故二又以單對復成四句唯出其一令凖思於五上即第一二法性身依色相法性土三法性色相身依色相土四法性色相身依法性土第五有一俱句謂法性色相身依法性色相土則是性相無礙之身依性相無礙之土此上猶通諸大乘教此上猶通者結前生後生後唯屬一乘華嚴之宗結前不出法性色相之身土及四身四土之義故謂一及第四唯法性二三法性及如智五六具上諸義亦不出如智七八方具事理無礙上之八門不出事理無礙實教之宗故通諸大乘即同教一乘義也故此下二方是事事無礙法界別教一乘宗也九通攝三種世間皆為一大法身具十佛故其三身等並此中智正覺攝故土亦如之即如空身而示普身于何不具此唯華嚴九通攝者如八地中十身即三世間故謂衆生身國土身等已見玄文即如空身者會釋經文謂觀恆曇身相如空等何有十身之義故令釋云如虛空言即十身中虛空身也八地之中十身相作今云示現普身則兩重十身皆悉具矣如下云以虛空身作衆生身作國土身作業報身作聲聞身作緣覺身作菩薩身作如來身是為虛空示餘九身其如來身上既具菩提身願身化身法身智身等則有百身千身一一類身復各攝多故云示現普身等一切也又如虛空言舍法身智身即是真身即真而現何不具矣十土分權實唯有第九屬於此經若據融攝及攝同教總前九義為一總句是謂如來無礙身土普賢亦爾義隨隱顯不可果安達者尋文無生局見十土分權實者為揀淺深以分權實故前八非實若不攝權亦非真實如説海水異於百川不攝百川非海水矣隨義布列有十不同得意而談一一融攝上言土有五重者一唯法性屬前三身二者雙泯屬於第四三具性相五六七八所依四融三世間屬於第九五總前諸義即第十依上言土有五重下三別示土相謂前三如智有離合之殊故分三身其所依土唯一法性餘可思凖普賢安住諸大願獲此無量神通力一切佛身所有剎悉現其形而詣彼一切衆海無有邊分身住彼亦無量二普賢安住下一偈半大願故遍兼顯遍於正中之依也重重皆遍今不見者機不應故不見即是虛空身故亦遍不見處故重重皆遍下通其妨難難云如上所説則無一處無有普賢今何不見釋有三意一約機不見是盲者過二不見是見見虛空身謂以虛空不可見故若不見故若不見者真見虛空三亦遍不見處故者明見則不遍何者以可見不可見皆是普賢身要令可見為身則普賢身不周萬有如智不可見豈非智身耶明知由有不見之處方知遍耳此第三身何人能見慧眼方見非肉眼所見慧眼無見無不見故所現國土皆嚴淨一剎那中見多劫普賢安住一切剎所現神通勝無比震動十方靡不周令其觀者悉得見三有一偈半明所現超勝一切佛智功德力種種大法皆成滿以諸三昧方便門示己往昔菩提行四有一偈果德已滿不捨因門如是自在不思議十方國土皆示現為顯普入諸三昧佛光雲中讚功德第三一偈結讚所由者自在難思現無不普標入一定實則普遊非佛光雲安能讚述爾時一切菩薩衆皆向普賢合掌瞻仰承佛神力同聲讚言第六大衆讚請分前衆問佛佛示法主衆覩定起故讚請普賢前但舊衆此通新舊故云一切所問同前故但略舉從諸佛法而出生亦因如來願力起真如平等虛空藏汝已嚴淨此法身十頌分三初八歎主請彰其能説次一舉法請正陳所疑後一歎衆請明有堪聞之器前中二初五頌歎普賢因果深廣德明有説因後三歎能遍塵剎雨法德明有説果今初偈各一義初一讚已淨法身三句明因一句明果因有三義一因修法生義通緣了二由大願起即是緣因三依如來藏證真平等此為正因真如即是不空虛空即是空藏平等與藏通上二義一因修法生等者然準涅槃緣因對於正因了因對於生因而緣亦名了如酵暖等為酩緣因即能了彼乳中之酪令得成酪而今開異義小殊故了謂照了不通於生緣謂衆緣義通生了今從別義又對正因是真如故云通緣了如不可生故但名了偈云出生者出於二障故曰出生非生真如諸佛法言通教理行果通於二因義如上説真如即是不空者此言不空自有二義一空者所謂生死不空者是謂真如涅槃二對下空藏是不空藏妙有之中含性德故平等與藏者藏通真如是不空如來藏藏通虛空是空如來藏平等通二者一真如體性平等二虛空無相平等此二不二是真平等悟法性空是真如故經云汝已嚴淨此法身者對上真如即是法身出障名淨因華行滿是已莊嚴易故不釋一切佛剎衆會中普賢遍住於其所功德智海光明者等照十方無不見二讚遍住佛剎第三句遍因餘皆遍相因中具智莊嚴故能等照具功德嚴令無不覩普賢廣大功德海遍往十方親近佛一切塵中所有剎悉能詣彼而明現三讚近佛佛子我曹常見汝諸如來所悉親近住於三昧實境中一切國土微塵劫四讚常定實境中者不隨想轉故曹者輩也佛子能以普遍身悉詣十方諸國土衆生大海咸濟度法界微塵無不入五讚度生曲盡微塵者細處有多衆生故細處有多衆生者即離言問二五十五經十種如金剛大乘誓願心中第二心云菩薩摩訶薩人作是念於一毛端處有無量無邊衆生何況一切法界我當盡以無上涅槃而滅度之是為第二如金剛大乘誓願心今云法界微塵無不入與一毛端處大意同也入於法界一切塵其身無盡無差別譬如虛空悉周遍演説如來廣大法一切功德光明者如雲廣大力殊勝衆生海中皆往詣説佛所行無等法為度衆生於劫海普賢勝行皆修習演一切法如大雲其音廣大靡不聞二有三頌説法果中初一讚常演大法如空之言下喻廣大前喻無盡無差明有説果者此有二意一説法即果對上説因詺為説果二稱根令喜是説法果今具二意謂具功德光明廣大勝力等即説法因今能遍説即是説果是初意也二由上遍説勝法能度衆生即是後義以稱根故次一讚説無等法無等有二一能説力勝具二嚴故二所説無等説佛所行故一能説力勝者即是説因功德是福德莊嚴光明名為智慧莊嚴此以前半力殊勝言釋此無等下釋易知後一頌舉因結果顯德有由曠劫因圓故故能雲雨説法國土云何得成立諸佛云何而出現及以一切衆生海願隨其義如實説二一頌舉法請中前品所問雖有多門統其要歸莫過三種世間故今三句各顯其一又前問總該諸會此令當會答故又前問等此有二意唯問於三一以要攝廣故二明總別不同故總即廣問別故唯三此中無量大衆海悉在尊前恭敬住為轉清淨妙法輪一切諸佛皆隨喜末後一頌歎衆請亦名自述此有二義一恭敬一心內堪受法二諸佛隨喜外有勝緣故應説也説則上順佛心下隨物欲世界成就品第四初來意者前説緣既具此下正陳所説總明果相別答法界安立海問故此品來初來意者疏文有二初總明分來對前二品以為説緣生下三品為正所説總明果相下二別明品來此句對下華藏為別別明本師之所嚴淨故指此品以為總明諸佛果相是古德意下句指前答問二問不同故二品別答後品自答世界海問是疏新意然答問雖異總別無違故雙存二義二釋名者世謂三世墮去來今故界謂方分有彼此故又世謂隱覆界亦分齊謂諸有為可破壞世即隱覆無為不可壞法從真性起同無為法即隱覆有為可破壞世各不相雜是其分齊是故感娑婆者對華藏而見娑婆感華藏者對娑婆而見華藏成就者即能成之緣謂十緣等能所合目若以世界之成就即依主釋也準梵本中云世界海成就下文辨海譯人略也意云佛果依正聞修方起衆生業報本自有之故但標世界耳二釋名世界有其二釋一以破壞釋世二以隱覆釋世若唯前解令華藏剎是可破壞今為此釋令華藏剎從無為起同於真極不可破壞故感娑婆下雙出不雜隱覆之義言成就下二釋成就二字能成之緣通因及果起具因緣此一是因體性依住等是果故總具十門世界成立準梵本下四會梵文疏唯會一海字若具梵云嚕迦馱都世界三慕達羅海濕第奢演説匿縛怛囊觀察亦云照曜三牟陀十方儉摩合集娜妘名鉢里勿多品若依回文總云觀察十方世界海演説合集名品今經譯家存略太甚餘言可略海字切要故疏會取意云佛果下出無海意以剎海莊嚴是佛修起直語世界衆生業成無始有之故但云世界雖為譯家出理實則海言切要三宗趣者標列無邊勝德廣釋所知世界海為宗然其意趣乃有多種一令諸菩薩發大信解悟入為趣謂令知佛及菩薩大悲行海廣覆無盡衆生界倣而行故世界無邊悉嚴淨故衆生無邊悉化度故剎由心異當淨自心及他心故世界重重無盡無盡以大行願悉充滿故佛界生界非一非異能正了知成大智故未能了者熏成種故皆意趣也亦為顯此深意故此品來故下頌云離諸諂誑心清淨常樂慈悲性歡喜志欲廣大深信人彼聞此法生欣恱若不聞此無邊無盡無二之境滯於權小普賢行願何由可成故普賢自説為令衆生等文皆是此品之意趣也然其意下趣中有六初總標一令諸菩薩下二別顯別顯之中總有六意唯初有一字餘無次第但以故字而為揀別亦為下三結成來意故下頌下四引文證成雙成來意宗趣若不聞下五反以成立故普賢下六引普賢結經文具之爾時普賢菩薩摩訶薩以佛神力遍觀察一切世界海一切衆生海一切諸佛海一切法界海一切衆生業海一切衆生根欲海一切諸佛法輪海一切三世海一切如來願力海一切如來神變海四釋文者三品正陳法海於中分二初二品明果後一品辨因然有二意一約兼明則前二品通答前三十句果問後一品答前十句因問説因為欲成果從多而説分明舉果二將前二品望前品末三問通答依正若望下廣文正明於依傍顯於正留其正報後分廣故於中初品通辨諸佛及諸衆生所有剎海後品別明本師之所嚴淨又此品明成剎之緣後品別辨果相故此品答安立之問其中雖明形等亦是緣故又此品者前釋對二種來意中前義此釋對後義此品成剎之緣具果具因後品唯果今初分二先總標綱要即為本分後正陳本義即是説分前中亦二先承力遍觀後牒問許説今初上入三昧內契其源今云遍觀外審其相十海之義已如問釋但小不次耳但觀於十已含餘三十佛海之中具身等故大願之中含因等故但觀於十下通難難云問有四十何唯觀十故答意云十海為總已含所餘三十別問佛海之中者是佛必有六根三業為體相顯著之十必有德用圓備謂佛地等故具二十大願海中已攝因中發趣等十故四十無遺如是觀察已普告一切道場衆海諸菩薩言第二如是觀察已下牒問許説於中分四一牒問略歎二許説分齊三説所成益四讚勝誡聽今初分二先結前生後佛子諸佛世尊知一切世界海成壞清淨智不可思議知一切衆生業海智不可思議知一切法界安立海智不可思議説一切無邊佛海智不可思議入一切欲解根海智不可思議一念普知一切三世海智不可思議顯示一切如來無量願海智不可思議示現一切佛神變海智不可思議轉法輪海智不可思議建立演説海不可思議後佛子下正牒稱歎即從後向前牒上果問三十句也初十句牒上世界海等十問觀乃觀海歎乃歎智者智之與海反覆相成謂前自智觀海微細難知知唯佛智方能究盡海難思故佛智難思佛智難思故海為深廣觀乃觀海下釋妨難即心口相違難此難因前而生若爾何不説智而但説海智離海境安知其相又表唯所證知故但説海三若爾下重難即歎説不同難此難望後説分而生四智離海境下再答中二先約教相謂智之異相因所知故又表以下二約證相海是所證故十智望海與問開合小異名或小差謂一中前問及觀但云世界海今加成壞望前與智中亦有成壞之言此乃廣略之異耳言清淨智者離所知障決斷分明故初句貫下置清淨言餘皆略也然皆以多故廣故深故細故重疊難知逈超言念皆云不思議也二知衆生業海者衆生即報類差別業即善惡等殊從此別義觀中開為二句而因果雖殊同是所化衆生故此及問并與智中並合為一三即世界都稱或化衆生法謂安立施設方便軌則等也四能化諸佛數量無邊五即所化根欲差別難知而問中合在後之五海五海皆須知根欲故六即所應之時前就所觀但云三世今就佛智故云一念能知其問及與智皆云佛解脫海者以一念普知三世是佛不思議解脫故七稱性大願為現身説法遍化之因故前問是名號海及壽量海與智之中名普入法界一切世界海智皆由願力故也八應機作用神變無方九轉稱性大法輪海若據問中攝法輪海在演説中若約向觀攝演説海在法輪中今此開二演説第十謂隨方施設言音差別及法輪隨機故與智中亦開名佛音聲智十智望海下正釋經文於中有二先總明十海之名總有五節已如前品今對三文并此為四言望海者即前所觀言與問者即第六經初此唯對二下別釋中兼對與智即是前品意加一中前問下別釋鉤鎖相連令義無遺今當具出問中十海一世界海二衆生海三法界安立海四佛海五波羅蜜海六佛解脫海七佛變化海八佛演説海九佛名號海十佛壽量海與智中十海智一能入一切智性力智二入法界無邊量智三成就一切佛境智四知一切世界海成壞智五一切衆生界廣大智六住諸佛甚深解脫無差別諸三昧智七入一切菩薩諸根海智入一切衆生語言海轉法輪辭辨智九普入法界一切世界海身智十得一切佛音聲智觀中十海一一切世界海二一切衆生海三一切諸佛海四一切法界海五一切衆生業海六一切衆生根欲海七一切諸佛法輪海八一切三世海九一切如來願力海十一切如來神變海歎智中十智一一切世界海成壞智二一切衆生業海智三一切法界安立海智四一切無邊佛海智五一切欲解根海智六一念普知一切三世智七顯示一切如來無量願海智八示現一切佛神變海智九轉法輪智十建立演説海智其勸説中十法亦是十海已如上會文無海言今略不出今對會四文即分為四第一以歎智對觀海辨次第者第一智觀第一海第二智觀第二及第五海第三觀第四第四觀第三第五觀第六第六觀第八第七觀第九第八觀第十第九第十並觀第七但看前列次第可知疏中所會正是此對第二若將歎智對與智次第者所歎第一即與智第四二即是五三即是二四即是三五即是七六即是六七即是九八即是六九即是八十即彼十彼有總句故彼六中含此六八第三若將歎智對問十海多同第一對觀海辨若具説者前四如次對四海第五通遍後五六即彼六七即九十八即第七此九與十皆是彼八第四若將十觀海對問十海者此觀第一即問第一二即彼二三即彼四四即彼三五亦彼二亦遍後五六可是二七即彼八八即彼六九即彼九及與第十此第十海即彼第七也復應將觀海對問十海如前問中以對更應將與智對問十海前與智中已對若更將十海對加所為中十法已如前品所為中明故今略出四門而已餘義疏中具會細尋易了清淨佛身不可思議無邊色相海普照明不可思議相及隨好皆清淨不可思議無邊色相光明輪海具足清淨不可思議種種色相光明雲海不可思議殊勝寶焰海不可思議成就言音海不可思議示現三種自在海調伏成熟一切衆生不可思議勇猛調伏諸衆生海無空過者不可思議二清淨下九句牒上六根三業十問向十約智明不思議此下直就法體為不思議又望前問開合影略顯無盡故以總收別但廣身光等一應機之身修短難測二現金銀等色類無邊三十蓮華藏剎塵數相好過於此四圓光大小隨機無盡五隨緣放光色類非一六常光如焰具衆寶色七圓音無盡深廣難測八三輪攝化謂神足等九調令成益得果不空然其調伏曲有三種一者始終軟語應將攝者而將攝故二者始終粗語應折伏者而折伏故三者有時軟語有時粗語應成熟者而成熟故由具此三故無空過以總𭣣別者以三業之總攝六根之別言但廣身光等者等取前光明及音聲智慧二光為身音聲屬口智慧是意今文並具故致等言即開三業而為十耳安住佛地不可思議入如來境界不可思議威力護持不可思議觀察一切佛智所行不可思議諸力圓滿無能摧伏不可思議無畏功德無能過者不可思議住無差別三昧不可思議神通變化不可思議清淨自在智不可思議一切佛法無能毀壞不可思議三安住佛地下十句牒上最初德用圓備十問前問中略無變化及自在二句以攝在無能攝取句中義如前會亦以前文十海有故神變屬身自在屬智餘並可知如是等一切法我當承佛神力及一切如來威神力故具足宣説第二如是等下許説分齊謂具足説故承佛力者當會佛也若言具者何以下文唯説安立及世界海耶經來不盡故又雖説二世界海亦已通具三十句問若言具者下問也答有二意一經來未盡約顯現答遮那品末無有結束故若經具來應更答餘三十八問謂界必有生而依住故有佛現故安立異故行業感故餘可意求謂界必有生下二出所兼之相略出三海謂一衆生二佛三行業及能兼二已有五海言餘可意求者即餘五海等謂一有生必有根欲為一有佛必由願力為二必有神變普周為三必轉法益生為四必有作用解脫為五則十海具矣具海既爾具餘例然此依別答四十問説若約十海為總此但答二下別答八已如現相品明則十海之中兼餘三十為令衆生入佛智慧海故為令一切菩薩於佛功德海中得安住故為令一切世界海一切佛自在所莊嚴故為令一切劫海中如來種性恆不斷故為令於一切世界海中顯示諸法真實性故為令隨一切衆生無量解海而演説故為令隨一切衆生諸根海方便令生諸佛法故為令隨一切衆生樂欲海摧破一切障礙山故為令隨一切衆生心行海令淨修治出要道故為令一切菩薩安住普賢願海中故第三為令下説所成益十句攝為五對一證智成福對二嚴剎紹種對亦即時處對三顯義演教對四生善滅惡對五淨業普願對文並可知此亦通為一經教起之所因也此十亦對前十海十智恐繁不會此十亦對前十海丁智者初一為令即具十智故云為令衆生入佛智慧海故餘九即十海一即佛海及神變海二即世界海三即三世海四即法界海五即轉法輪海六即衆生根海七八皆衆生海九即願海十海矣對海既爾對智可知如對海故是時普賢菩薩復欲令無量道場衆海生歡喜故第四是時普賢下讚勝勸聽中文二初長行辨意後偈頌正顯今初十一句初一總標謂令聞法必生喜故令於一切法增長愛樂故令生廣大真實信解海故令淨治普門法界藏身故令安立普賢願海故令淨治入三世平等智眼故令增長普照一切世間藏大慧海故令生陀羅尼力持一切法輪故令於一切道場中盡佛境界悉開示故令開闡一切如來法門故令增長法界廣大甚深一切智性故即説頌言餘十別顯喜義亦為五對初二樂法生信對二證性立願對三了真入俗對四持法示佛對五開法增智對如文並顯智慧甚深功德海普現十方無量國隨諸衆生所應見光明遍照轉法輪十方剎海叵思議佛無量劫皆嚴淨為化衆生使成熟出興一切諸國土二正頌中十頌分二初八讚後二勸前中亦二初二明佛出現意佛境甚深難可思普示衆生令得入其心樂小著諸有不能通達佛所悟後六辨定法器於中初一揀非器若有淨信堅固心常得親近善知識一切諸佛與其力此乃能入如來智離諸諂誑心清淨常樂慈悲性歡喜志欲廣大深信人彼聞此法生欣恱安住普賢諸願地修行菩薩清淨道觀察法界如虛空此乃能知佛行處此諸菩薩獲善利見佛一切神通力修餘道者莫能知普賢行人方得悟次四示法器衆生廣大無有邊如來一切皆護念轉正法輪靡不至毗盧遮那境界力後一結歸佛力一切剎土入我身所住諸佛亦復然汝應觀我諸毛孔我今示汝佛境界普賢行願無邊際我已修行得具足普賢境界廣大身是佛所行應諦聽及後二勸文並可知然通此十偈亦是牒問以讚前長行總顯難思此下略示難思之相而三十句間列不次含義並足欲委配釋恐厭繁文然通此十下重釋偈文結云欲委配釋恐厭繁文今當配之初偈即牒智慧地及無畏功德兼含體相顯著等十句以言普現十方光明遍照等故第二偈即世界海及出現也第三偈牒佛境第四偈牒佛加持第五偈即業海及樂欲海并調伏海第六偈前半波羅蜜海亦兼佛地次句法界海末句所行第七偈即神變海第八偈前半衆生海後半演説海第九偈即佛解脫海及三自在第十偈即大願海餘皆兼含可以意得非益觀智疏略不言明欲委尋文故鈔重出爾時普賢菩薩摩訶薩告諸大衆言第二廣陳本義分中分二初結集生起諸佛子世界海有十種事過去現在未來諸佛已説現説當説二諸佛子下普賢顯説於三十句果問中廣釋世界安立海問餘並攝之文分為二初標舉章門後依章別釋今初分三一立數顯同二徵數列異三結略顯廣今初先告佛子者使時情注其耳目也世界廣深目之為海謂積剎成種積種成海海無別體世界都名然事類廣多略舉其十以表無盡三世同説彰其要勝又顯説決定無改易也何者為十所謂世界海起具因緣世界海所依住世界海形狀世界海體性世界海莊嚴世界海清淨世界海佛出興世界海劫住世界海劫轉變差別世界海無差別門二徵列中一明攬緣成立二成已依住三外狀區分四內體差別五寶等莊校六垢穢不生七佛出差殊八劫住修短九隨業改變十包容必均此十亦攝十八圓滿後品當會諸佛子略説世界海有此十事若廣説者與世界海微塵數等過去現在未來諸佛已説現説當説三諸佛子下結略顯廣言世界海塵者智猶難測言豈具陳非證法雲安受茲説然上十事於一一剎多少不定具緣一種或一或二或三或多或成四句謂一成一一成一切等清淨一種或一或多或亦無之以有純穢剎故其次七事各各唯一謂依空住者非依光等故餘準思之其無差別一切皆具以約體性平等佛力融攝故説無差所以染淨皆具也有云一切世界相望互同名無差者則違下經文經云一一世界海有世界海微塵數無差別故若依相望互同則無有差別之事有云下敘昔即刊定意若依下結過謂盡世界海皆作無差別故剎海中無差別事餘可知若將此十望剎種者具緣一種多少不定不得云一以其種中含有多類剎故清淨一事不得定言有無以其種中必含淨穢故其無差別多少亦均佛出劫住隨業轉變不得云一依形體嚴不得云多以其剎種別有體等故若以此十獨望剎海形體依住莊嚴等四許其唯一餘必兼多故經云一一世界海有種種形故今言有世界海塵數者約融攝無盡之説也有云約一一剎海中所有諸剎各各一因等故有剎海塵數者孟浪之甚何者且如剎海中剎雖多豈如剎海盡末為塵之多若欲相同即一塵一緣方得相似何得以一剎一緣充一剎多塵之數況積具緣等十有剎海之塵其一具緣自有剎海塵數是則通有剎海微塵數箇剎海微塵數矣一剎一緣一依一體安得充耶亦不得言通一切世界海説以下依住云一一世界海有世界海塵數所依住故孟浪之甚者浪謂流浪孟亦猛也莊子齊物篇云瞿鵲子問於長梧子曰吾聞諸夫子聖人不從事於務不就利不違害不喜求不緣道無謂有謂有謂無謂而遊乎塵垢之外夫子以為孟浪之言而我以為妙道之行也吾子以為奚若釋曰今不取其事但取孟浪所出耳孟浪者率略之言也明其無當向秀云瀾漫無所趣捨之謂二字要連用何者下三彰非所以尊意可知猶恐難見請以喻明如一槃中盛於十楪十楪之中各盛十彈子一槃如剎海一楪如剎種彈子如一剎若言一槃之中有一槃彈子塵數無差豈得以一槃之內彈子無差以充其數一槃彈子但有一百一彈子之塵已難知數況一百彈子盡抹為塵則數不可量便將一百之數以充一槃彈子之塵數故為孟浪也得斯喻意尋數易了亦不得言者第四逆遮昔救恐有救云一剎海中剎不充一剎海中塵今取一切剎海中剎以充一剎海中塵數豈不得耶亦如一槃彈子之多不充一槃之塵若多槃彈子豈不充一槃之塵耶故今遮云若依此義義則粗通奈何違文文中既云一一世界海中則一海中即有世界海塵數不言一切世界海共為一世界海塵數豈得將此而為救耶亦猶一槃彈子即有一槃彈子塵數不言多槃有一槃之塵也諸佛子略説以十種因緣故一切世界海已成現成當成第二依章別釋者十事不同則為十假一一皆有長行與偈長行中各三謂標釋結今初起具因緣標中略舉十種通成三世一切佛剎何者為十所謂如來神力故法應如是故一切衆生行業故一切菩薩成一切智所得故一切衆生及諸菩薩同集善根故一切菩薩嚴淨國土願力故一切菩薩成就不退行願故一切菩薩清淨勝解自在故一切如來善根所流及一切諸佛成道時自在勢力故普賢菩薩自在願力故二何者下釋然佛土之義雖有多種不出其三一法性土二受用土三變化土若開受用有自有他則成四土統為二種謂淨及穢或性及相融而為一有異餘宗然佛土下疏文有三一辨類中初説三土二開三為四三合四為二四融二為一前二則唯識第十意然初説三者依三身故報有自他故為四身四身還依四土論云又自性身依法性土雖此身土體無差別而屬佛法性相異故此佛身土俱非色攝雖不可説形量大小然隨事相其量無邊譬如虛空遍一切處釋曰此義前品已引為下文用之故重委引論云自受用身還依自受用土謂大圓鏡智相應淨識由昔所修自利無漏純淨佛土因緣成熟從初成佛盡未來際相續變為純淨佛土周圓無際衆寶莊嚴自受用身常依而住如淨土量身量亦爾諸根相好一一無邊無限善根所引生故功德智慧既非色法雖不可説形量大小而依所證及所依身亦可説言遍一切處釋曰功德隨所依身智慧隨所證如餘並可知論云他受用身亦依自土謂平等性智大慈悲力由昔所修利他無漏純淨佛土因緣成熟隨住十地菩薩所冝變為淨土或小或大或劣或勝前後改轉他受用身依之而住能依身量亦無定限若變化身依變化土謂成事智大慈悲力由昔所修利他無漏淨穢佛土因緣成熟隨未登地有情所冝化為佛土或淨或穢或大或小前後改轉佛變化身依之而住能依身量亦無定限釋曰上皆論文文並易了下疏用之須知所在統唯二種者三攝四為二也諸經論中皆有於此二種之二先攝上四為淨穢者乃有多義一前三皆淨四中有淨有穢則三類半為淨半類為穢二前三為淨以他受用斷分別障已證真如故得名淨變化皆穢設有七珍穢衆生住故亦非淨三後二皆穢仁王經云三賢十聖住果報唯佛一人居淨土而生公説有形皆穢無形為淨則唯法性為淨若爾自受用土豈稱穢耶此以𡨋同真性不可説其形量大小則同淨攝二攝前四為性相者略有二門一法性為性餘三皆相二自受用土𡨋同真性亦可名性餘二唯相四融而為一則淨穢性相三土四土無不圓融即此經意故云有異餘宗又此淨土一質不成淨穢虧盈異質不成一理齊平有質不成搜源則冥無質不成緣起萬形故形奪圓融無有障礙又此淨土下第二融攝因上第四義故略為此融然東安莊公本有三句無有質不成今加此句以成二對謂淨穢域絶不可言一理唯一味不可言異冥同性空不可言有隨緣成立不可言無然一為遣異無相遣有然其釋中一亦約理實則一義有其二種一約理一二約事一如自受用十方如來同有淨土不可言無而得稱一故疏成四句二對不同又上略舉四句一向遮過實則即異即同即有即無若互相形奪則一異兩亡有無雙寂若圓融無礙則即一即多即無即有有是無有無是有無多是即一之多一是即多之一有無即事理無礙一多兼事事無礙由此重重故華藏剎一一塵中皆見法界餘如玄中土既不等因緣亦殊今文十中初三通顯次四別明後三則融攝轉變言初三者一如來神力者謂一切淨穢等土皆是如來通慧力成為物而取擬將普應佛應統之皆稱佛土故蓮華藏海佛所嚴淨而內含淨穢然就佛言之故無國而不淨也既即穢而淨故不思議二法如是者梵云達磨多此云法爾或曰法性若是法性即以本識如來藏身為所依持恆頓變起外諸器界若云法爾者謂有問言何以諸佛衆生起於剎土答云法應如是不可致詰若會此二謂法應如是藏識變起三衆生業力者業有善惡國有淨穢故淨名以萬行為因又云衆生之類是菩薩佛土謂法性雖一隨業成異佛隨異類取土攝生涅槃微善觀經三心等其類非一上三初因二緣三因初三者下第二正釋經文釋第一句疏文有二一正釋言一切淨穢者此通三土唯除法性以言通慧力所成故此即偈文智慧神通力如是也言為物而取擬將普應者除自受用皆為物故佛應統之下解妨此有二妨一皆名佛土妨謂土有淨穢穢豈佛土故今答云穢亦佛土三界朽宅屬于一人娑婆雜惡居華藏內是我佛土然就佛言者通穢土稱淨妨此由淨名經中寶積願聞得佛國土清淨而佛答云衆生之類是則不揀淨穢穢亦淨土故生疑云穢名佛土就統以言穢名淨土復據何理故有此答就佛皆淨所以身子所見邱陵坑坎佛言我此土淨而汝不見既即穢而淨故不思議者即以上義會下偈文偈云世尊境界不思議故若是法性者約如來藏隨緣成立淨穢諸土如三昧品引楞伽説此從通相不局衆生亦不局佛若云法爾者即法爾道理如十地説業有善惡下先總釋故淨名下後引證引三經四文淨名有二皆佛國品初云以萬行為因者經云寶積當知直心是菩薩淨土菩薩成佛時不諂衆生來生其國深心是菩薩淨土菩薩成佛時具是功德衆生來生其國菩提心是菩薩淨土菩薩成佛時大乘衆生來生其國次列六度等故云萬行為因又云衆生之類是菩薩淨土等者亦是此文謂法性雖一下雙釋上二疏文有三初隨業成異釋上萬行為因此是土因佛隨異類取土攝生釋上文又云衆生之類是菩薩佛土此是土緣即佛國品寶積獻蓋佛為現變見淨土相便求其因故初問云願聞得佛國土清淨舉果唯願世尊説諸菩薩淨土之行徵因佛答云衆生之類是菩薩佛土摽也下根釋云所以者何菩薩隨所化衆生而取佛土隨所調伏衆生而取佛土釋曰上二句總明取土一向為物經云隨諸衆生應以何國入佛智慧而取佛土隨諸衆生應以何國起菩薩根而取佛土釋曰此明土異之由下徵釋云所以者何菩薩取於淨國皆為饒益諸衆生故釋曰經意云菩薩修因取土皆緣衆生若無衆生取土何用此皆他受用土及變化土緣故唯識中二土皆以利他行成明為物取故彼經舉喻欲造宮室須依空地若於虛空終不能成欲修淨土必緣衆生若無衆生無修土處涅槃微善下別引他經成其初義即二十一經高貴德王菩薩品琉璃光菩薩從不動世界而來無畏菩薩問佛此土衆生當造何業而得生彼不動世界佛以偈答廣列十善一一皆生言微善者彼有偈云若於佛法僧供養一香燈乃至獻一華則生不動因若為怖畏故利養及福德書是經一偈則生不動國造像若佛塔猶如大拇指常生歡喜心即生不動國是也觀經三心者有三種三心第一佛為韋提希現淨土竟韋提希願生求因佛言欲生彼國當修三福一者孝養父母奉事師長慈心不殺修十善業二者受持三歸具足衆戒不犯威儀三者發菩提心深信因果讀誦大乘勸進行者如是三事名為淨業佛告阿難及韋提希汝今知不此三種業過去未來現在諸佛淨業正因釋曰若具此三何淨不致然以生就佛總名為生如上引直心是菩薩淨土菩薩成佛時不諂衆生來生其國第二上品上生文中云若有衆生願生彼國發三種心即便往生何等為三一者至誠心二者深心三者回向發願心具三心者必生彼國第三云復有三種衆生當得往生何等為三一者慈心不殺具諸戒行二者讀誦大乘方等經典三者修行六念回向發願願生彼國具此功德一日乃至七日即得往生釋曰第三三心多同初三而合初一開其後一此上諸心非但得生彼國而為生因亦能成彼淨國得為修因故觀經云三世諸佛淨業正因故今引為佛國因也上三初因二緣三因者然因略有二一變化因即第一如來通慧二感淨剎因即是第三緣亦有二一約境利他衆生為緣二攝境從心皆自識變此中第二義是真心隨緣變耳次四別明者有因有緣初一自受用土因大圓鏡智之所成故二變化土因謂衆生菩薩共構一緣各隨行業來生其國凡聖同居三四二種他受用土因然初即初地以上如十大願中修淨土願是也後即八地已上功用不退行之所成故八地中有淨土分次四別明有因有緣者如鏡智所成是緣變化土因通因通緣佛以生為緣生以佛為緣謂衆生菩薩共搆一緣者上已總明即直心是菩薩淨土等若菩薩自修直心衆生諂曲何由得生故勸物同修直心故菩薩以直心之因取直心土以應直心衆生為同搆一緣來生其國萬行皆然故云隨其行業言凡聖同居者即變化土若他受用唯聖所居變化之上凡聖同居聖居有二一就機化故二於凡身中初證聖果亦當居之他受用土因者略如上引唯識一向就佛説因今通菩薩謂佛因中修此二因成他受用即是佛因二住地菩薩修此二因得他受用約菩薩因初地八地地經廣説後三融攝者通於因緣初一即八地已上攪大海為酥酪變大地為黃金以染為淨以淨為染自在攝生故十自在中有剎自在窮其因者清淨勝解勝解印持隨心變故次一謂成正覺時其身充滿十方世界微塵剎土念劫圓融一時成立由二種因一善根所流語因中也二成道勢力明果用也此一受用變化相融也即如經初即摩竭陀地堅固等後一無問成與不成常能融攝又前是妙覺此是等覺勝解印持者勝解以於境印持為性印持萬境隨心轉變一善根所流者即圓融修行自他二利無障礙行故得爾也其法性土通為諸土之體窮其因者有正有助謂法爾為其正因以一切智及總以諸因而為緣因故其後三亦融前土非有別體其法性土下第三料揀妨難問上之十句含於四土何以特明三土因耶故為此釋次復問云四土之外別説圓融應有五土故今答云故其後三但融他四即是我宗非別有體圓融之因亦如上説又説淨土總有二義一者行淨業為因感淨相果二以德業為因感自在淨果行業始自凡夫終至十地德業始起不動終至如來故第二別明是行業淨第三融攝是自在淨第一總明具斯二淨故疏為三又此十事展轉生起謂諸佛土總由佛力何以由之法如是故法爾云何而有異耶業不同故衆生由業佛復由何成一切智之所變故生佛有異何以凡聖同居同構一緣故何以復有純菩薩國菩薩願行力故既由行業何可轉變勝解自在故云何復得融攝重重佛及普賢自在力故又此十事下生起鉤鎖諸佛子是為略説十種因緣若廣説者有世界海微塵數三結略顯廣如前已釋音釋蘂如纍切花心也泯彌盡切滅也核下革切考也綰烏版切鉤繫也緒徐與切𮈔端也詺彌正切詺目也娜妘娜奴可切妘音云分齊分扶問切齊在詣切分齊限量也軟乳兗切柔也徵知陵切驗也攬魯敢切取也穢烏廢切污也詰契吉切問也構居候切合也諂誑諂丑琰切言曰諂誑古況切欺也
