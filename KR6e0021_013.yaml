body:
  text: 唐于闐國三藏沙門實叉難陀譯唐清涼山大華嚴寺沙門澄觀撰述復次普光燄藏主火神得悉除一切世間暗解脫門第六主火神長行十法有云準梵本此脫第四一以進力現世除物無明以最初故偏從火義普集光幢主火神得能息一切眾生諸惑漂流熱惱苦解脫門二惑有二義一漂二惱善巧迴轉則能息之大光徧照主火神得無動福力大悲藏解脫門三稱性之福相惑不動與大悲合自利不動俱能攝德無盡名藏眾妙宮殿主火神得觀如來神通力示現無邊際解脫門此神名及法舊本無依今經補出頗與偈文相合四有云準梵本神名勝上𧄜光普照法門名普能除煩惱塵謂劫海行滿故今能現通滅惑偈云眾妙宮神同前列名眾妙即勝上義耳然諸本多無或有本則具云眾妙宮殿主火神得大慈悲廣蔭眾生解脫門恐是傳寫脫漏耳無盡光髻主火神得光明照曜無邊虛空界解脫門五光明照耀等者日光合空等空無際智符實相稱實無邊雖曠劫修成全同本有窮靈極數妙盡難思實為惑本即是正因智照心源即是了因日光合空等者初舉喻也智符已下二合以智合日以實相合空符者分而合也實相體上本有智光無始迷之今方朗悟即我始會之非照今有故與實相分而合也實相無邊智亦無邊如空無際光亦無際雖曠劫修成全同本有者以偈文會義也偈云億劫修成不可思求其邊際莫能知義乃修成智無際耳何得分而合也故今答云雖則修成全同本有是以經云演法實相令歡喜故䟽結云窮靈極數即是修成妙盡難思即符本有亦猶始覺同本覺無復始本之異為究竟覺窮靈極數之言即肇論劉遺民所難般若無知論語具云但今談者所疑於高論之旨欲求聖心之異為謂窮靈極數妙盡𡨋符耶謂將心體自然靈怕獨感耶若窮靈極數妙盡冥符則寂照之名故是定慧之體耳若心體自然靈怕獨感則羣數之應固已幾乎息矣此公意云若窮靈極數妙盡冥符則修極於無修窮靈為照妙盡為寂亦是我之定慧何用別立無知若心體自然靈怕獨感則是體本無知固合無乎應用何以言般若無知對緣而照故結云疑者當以撫會應機覩變之知不可謂之不有論主答云意謂妙𥁞𡨋符不可定慧為名靈怕獨感不可稱羣數已息兩言雖異妙用常一迹我而乘在聖不殊也釋曰觀肇公答上句云既冥符心體何可以定慧為名若以定慧為名則未符心體答下句意云靈怕獨感與窮靈極數二義相合何得息於羣數之應故云兩言雖異在聖不殊也今䟽總不用彼難答本意借其問中一句謂窮其靈鑑極其數運妙無不𥁞則合心體難思耳如空與日今畧申十義以辯難思一謂日與空非即非離二非住非不住三而日善作破闇良緣顯空之要四雖復滅闇顯空空無損益五理實無損事以推之闇蔽永除性乃無增空界所含萬像皆現六而此虛空性雖清淨若無日光則有闇起七非以虛空空故自能除闇闇若除者必假日光八日若無空無光無照空若無日闇不自除九然此闇性無來無去日之體相亦不生不滅十但有日照空則乾坤洞曉以智慧日照心性空亦有十義準喻思之以智慧日照心性空下總以法合憑喻解法故云凖思非唯釋此一文乃遠通眾經該羅前後種種燄眼主火神得種種福莊嚴寂靜光解脫門六體寂發照名寂靜光以斯成福莊嚴身相十方宮殿如須彌山主火神得能滅一切世間諸趣熾然苦解脫門威光自在主火神得自在開悟一切世間解脫門七八可知光照十方主火神得永破一切愚癡執著見解脫門九分別法相永離不了愚癡悟法實性便無執著之見雷音電光主火神得成就一切願力大震吼解脫門十以行扶願故能現世作師子吼爾時普光燄藏主火神承佛威力普觀一切主火神眾而說頌言頌加第四餘並可知汝觀如來精進力廣大億劫不思議為利眾生現世間所有暗障皆令滅眾生愚癡起諸見煩惱如流及火然導師方便悉滅除普集光幢於此悟福德如空無有盡求其邊際不可得此佛大悲無動力光照悟入心生喜我觀如來之所行經於劫海無邊際如是示現神通力眾妙宮神所了知億劫修成不可思求其邊際莫能知演法實相令歡喜無盡光神所觀見十方所有廣大眾一切現前瞻仰佛寂靜光明照世間此妙燄神所能了牟尼出現諸世間坐於一切宮殿中普雨無邊廣大法此十方神之境界諸佛智慧最甚深於法自在現世間能悉闡明真實理威光悟此心欣慶諸見愚癡為暗蓋眾生迷惑常流轉佛為開闡妙法門此照方神能悟入願門廣大不思議力度修治已清淨如昔願心皆出現此震音神之所了復次普興雲幢主水神得平等利益一切眾生慈解脫門第七主水神長行十法一無緣大慈是曰平等海潮雲音主水神得無邊法莊嚴解脫門二無邊行法莊嚴自他妙色輪髻主水神得觀所應化方便普攝解脫門三寂然不動以觀機感而遂通以隨攝若冬則積雪凝白夏則無處不流寂然不動以觀機者此言即周易繫辭具云夫易無思也無為也寂然不動感而遂通天下之故今借此言也善巧漩澓主水神得普演諸佛甚深境界解脫門四妙音演佛深旨令悟妙法旋澓離垢香積主水神得普現清淨大光明解脫門五身智二光遍覺開化大充法界清淨無垢福橋光音主水神得清淨法界無相無性解脫門六清淨法界性相俱絕德無不見則大用不亡知足自在主水神得無盡大悲海解脫門七眾生不窮故大悲無盡滿而不溢有知足義焉流止從緣斯為自在淨喜善音主水神得於菩薩眾會道場中為大歡喜藏解脫門八處處見佛故大喜無窮喜從佛生即佛名藏若聆泉流之響無不悅也普現威光主水神得以無礙廣大福德力普出現解脫門九性相無礙之福故能普現神通若空色相暎之流威光蕩瀁吼聲徧海主水神得觀察一切眾生發起如虛空調伏方便解脫門十調生行廣如空無邊用靡暫停如空無盡爾時普興雲幢主水神承佛威力普觀一切主水神眾而說頌言清淨慈門剎塵數共生如來一妙相一一諸相莫不然是故見者無厭足偈中第一偈前半辯一相因果次句例餘後句辯益初言清淨者離過無緣故門如塵數者隨宜利樂故以慈為因得妙相果以相為因得無猒果然如來相有純有雜此就純門若以雜門則隨一相一毛皆收如來法界行盡亦相相皆爾純雜無礙因果相融圓成非分成故佛一相一毛即同法界無有分量今此神從一慈門入無盡相耳此約十身之相前半辯一相因果等者䟽文有二先消經文辯十身相後引經論辯三身相今初言純雜無礙因果相融者然如來相亦具四句一一因一相二一因一切相此皆純門三一切因一相四一切因一切相皆是雜門正純恒雜雜而常純故云無礙由因相無礙果相亦無礙故得圓成非分成耳以一切純雜無礙之行成一相故故此一相即同法界况因果交徹因中有無𥁞之果果中有難思之因若三十二相之因但說一相一因如智度瑜伽等論涅槃大集等經至相海品當引若三十二相下第二引經及論說三身相唯語化身而總指在餘智論當三十二瑜伽當四十九湼槃二十九經云善男子若菩薩摩訶薩持戒不動施心不移安住實語如須彌山以是業緣得足下平滿如奩底相若於父母所和尚師長乃至畜生以如法財供養供給以是業緣得足下千輻輪相若菩薩不殺不盜於父母師長常生歡喜以是業緣得成三相一者手指纖長二足跟修長三其身方直若菩薩修四攝法攝取眾生以是業緣得網縵指如白鵝王若菩薩父母師長若病苦時自手洗拭捉持案摩以是業緣得手足輭嫰若菩薩持戒聞法惠施無厭以是業緣得節踝𦟛滿身毛上靡若菩薩專心聽法演說正教以是業緣得鹿王腨若菩薩於諸眾生不生害心飲食知足常樂惠施瞻病施藥以是業緣其身圓滿如尼拘陀𣗳立手過膝頂有肉髻無見頂相若菩薩見怖畏者為作救護見裸露者施與衣服以是業緣得陰藏相若菩薩親近智者遠離愚人善喜問答掃餙行路以是業緣皮膚細滑身毛右旋若菩薩常以飲食衣服臥具醫藥香華燈明施人以是業緣得身金色常光照耀若菩薩行施之時所珍之物能捨不悋不觀福田及非福田以是業緣得七處滿相若菩薩布施之時心不生疑以是業緣得柔輭聲相若菩薩如法求財以用布施以是業緣骨充滿師子上身臂肘𦟛纖若菩薩遠離兩舌惡口恚心以是業緣得四十齒白淨齊密若菩薩於諸眾生修大慈悲以是業緣得二牙相若菩薩常作是願有來求者隨意給與以是業緣得師子頰若菩薩隨諸眾生所須之食悉皆與之以是業緣得味中上味若菩薩自修十善徧以化人以是業緣得廣長舌若菩薩不訟彼短不謗正法以是業緣得梵音聲若菩薩見諸怨憎生於喜心以是業緣得目𥈤紺色若菩薩不隱他德稱揚其善以是業緣得白毫相善男子若菩提修習如是三十二相業因緣時則得不退菩薩之心世尊徃昔修行時普詣一切如來所種種修治無懈倦如是方便雲音入佛於一切十方中寂然不動無來去應化眾生悉令見此是髻輪之所知如來境界無邊量一切眾生不能了妙音演說徧十方此善漩神所行處世尊光明無有盡充徧法界不思議說法教化度眾生此淨香神所觀見第五偈初言無盡以顯光常次充法界以辯光遍不思議者以顯光深非色現色非青黃而青黃故其第三句是顯光用餘八可知如來清淨等虛空無相無形徧十方而令眾會靡不見此福光神善觀察佛昔修習大悲門其心廣徧等眾生是故如雲現於世此解脫門知足了十方所有諸國土悉見如來坐於座朗然開悟大菩提如是喜音之所入如來所行無罣礙徧徃十方一切剎處處示現大神通普現威光已能悟修習無邊方便行等眾生界悉充滿神通妙用靡暫停吼聲徧海斯能入復次出現寶光主海神得以等心施一切眾生福德海眾寶莊嚴身解脫門第八主海神十法頌脫第三一為物供佛是等施福得眾寶相以莊嚴身不可壞金剛幢主海神得巧方便守護一切眾生善根解脫門二巧隨根欲說法護善使其長成不雜塵垢主海神得能竭一切眾生煩惱海解脫門三謂演深廣法體煩惱空梵本偈云一切世間眾導師法雲大雨不可測消竭無窮諸苦海此離垢塵入法門若準此文乃竭苦海恒住波浪主海神得令一切眾生離惡道解脫門四若見佛境則惑亡苦息準現經文三是煩惱四是於苦若依梵本前苦後惑既譯人脫漏致使文義參差故古德云脫第四頌結名既同故知脫第三恒住波浪者即是普用水為宮殿吉祥寶月主海神得普滅大癡暗解脫門五以智滅癡妙華龍髻主海神得滅一切諸趣苦與安樂解脫門六為行所遷一切皆苦菩提因起則生滅苦亡便得涅槃寂滅安樂普持光味主海神得淨治一切眾生諸見愚癡性解脫門七將智滅癡未免於見了癡見性癡見自亡真妄等觀是佛境也寶燄華光主海神得出生一切寶種性菩提心解脫門八一切眾生有佛種性圓明可貴具德稱寶佛眼普觀佛智普示正因令顯如出金藏大心若起如種生芽故云出生緣了二因為能悟之妙道正因令顯如出金藏即涅槃經如貧女家中寶藏之喻金剛妙髻主海神得不動心功德海解脫門九了如不取則心不搖動湛如停海萬德攸歸故須彌可傾魔豈能嬈一念降魔如本行集了如不取則心絕動搖者金剛經云不取於相如如不動須彌可傾魔豈能嬈者即高僧傳中慧嵬禪師之事雲林修定有一惡鬼而現其前有身無首令禪師懼公安然不懼而慰之言喜汝無頭痛之患次現無腹之鬼復云喜汝無五臟之憂如是隨來隨遣竟不能惑魔又化為天女云天帝令我以備掃灑公曰我心如地難可傾動無以革囊見試天女乃騰空而去讚曰大海可竭須彌可傾彼上人者執志堅貞今用一句義意全同海潮雷音主海神得普入法界三昧門解脫門十入法界定如法界遍爾時出現寶光主海神承佛威力普觀一切主海神眾而說頌言偈文可知不可思議大劫海供養一切諸如來普以功德施群生是故端嚴最無比一切世間皆出現眾生根欲靡不知普為弘宣大法海此是堅幢所欣悟一切世間眾導師法雲大雨不可測消竭無窮諸苦海此離垢塵入法門一切眾生煩惱覆流轉諸趣受眾苦為其開示如來境普水宮神入此門佛於難思劫海中修行諸行無有盡永截眾生癡惑網寶月於此能明入佛見眾生常恐怖流轉生死大海中示彼如來無上道龍髻悟解生欣悅諸佛境界不思議法界虛空平等相能淨眾生癡惑網如是持味能宣說佛眼清淨不思議一切境界悉該覽普示眾生諸妙道此是華光心所悟魔軍廣大無央數一剎那中悉摧滅心無傾動難測量金剛妙髻之方便普於十方演妙音其音法界靡不周此是如來三昧境海潮音神所行處復次普發迅流主河神得普雨無邊法雨解脫門第九主河神十法一行成雨法若霈然洪霔滅惑生德若懸河迅流無所滯礙普潔泉澗主河神得普現一切眾生前令永離煩惱解脫門二現身息惱若泉澗洗心離塵淨眼主河神得以大悲方便普滌一切眾生諸惑塵垢解脫門三真實滌垢慈智相資若碧沼澄潭空色交暎故名離塵淨眼十方徧吼主河神得恒出饒益眾生音解脫門四圓音遍益若崩浪發響普救護眾生主河神得於一切含識中恒起無惱害慈解脫門五拯救潭溺無熱淨光主河神得普示一切清凉善根解脫門六善根無惑可謂清凉若阿耨達池永無熱惱普生歡喜主河神得修行具足施令一切眾生永離慳著解脫門七施門無量令彼無慳若蘊藻菱蓮普令物喜廣德勝幢主河神得作一切歡喜福田解脫門八行福契實故見無不欣若深湖廣陂是為廣德光照普世主河神得能令一切眾生雜染者清淨瞋毒者歡喜解脫門九方便慧力雜染皆淨慈彼怨害瞋反成歡若萬頃波澄光暎天下海德光明主河神得能令一切眾生入解脫海恒受具足樂解脫門十總𭣣萬善令會涅槃若彼百川咸會大海由智海故名海德光明爾時普發迅流主河神承佛威力普觀一切主河神眾而說頌言偈亦可知如來徃昔為眾生修治法海無邊行譬如霈澤清炎暑普滅眾生煩惱熱佛昔難宣無量劫以願光明淨世間諸根熟者令悟道此普潔神心所悟大悲方便等眾生悉現其前常化誘普使淨治煩惱垢淨眼見此深歡悅佛演妙音普使聞眾生愛樂心歡喜悉使滌除無量苦此徧吼神之解脫佛昔修習菩提行為利眾生無量劫是故光明徧世間護神憶念生歡喜佛昔修行為眾生種種方便令成熟普淨福海除眾苦無熱見此心欣慶施門廣大無窮盡一切眾生咸利益能令見者無慳著此普喜神之所悟佛昔修行實方便成就無邊功德海能令見者靡不欣此勝幢神心悟悅眾生有垢咸淨治一切怨害等生慈故得光照滿虛空普世河神見歡喜佛是福田功德海能令一切離諸惡乃至成就大菩提此海光神之解脫復次柔軟勝味主稼神得與一切眾生法滋味令成就佛身解脫門第十主稼神十法一功德智慧二種法味資成佛身時華淨光主稼神得能令一切眾生受廣大喜樂解脫門二喜樂由於苦除色力勇健主稼神得以一切圓滿法門淨諸境界解脫門三眾生為所淨之境增益精氣主稼神得見佛大悲無量神通變化力解脫門四悲深故通廣普生根果主稼神得普現佛福田令下種無失壞解脫門五下種佛田必至果無壞妙嚴環髻主稼神得普發眾生淨信華解脫門六智敷物信獲果稱華潤澤淨華主稼神得大慈愍濟諸眾生令增長福德海解脫門七慈眼視物故福聚無量慈則恬和怡悅偈云勝道成就妙香主稼神得廣開示一切行法解脫門八以行成佛故始成即宣見者愛樂主稼神得能令法界一切眾生捨離懈怠憂惱等諸惡普清淨解脫門九懈於修習憂惱是生勤䇿諸根眾惡清淨離垢光明主稼神得觀察一切眾生善根隨應說法令眾會歡喜滿足解脫門十隨根為說遂求故喜爾時柔軟勝味主稼神承佛威力普觀一切主稼神眾而說頌言偈文可知如來無上功德海普現明燈照世間一切眾生咸救護悉與安樂無遺者世尊功德無有邊眾生聞者不唐捐悉使離苦常歡喜此是時華之所入善逝諸力皆圓滿功德莊嚴現世間一切眾生悉調伏此法勇力能明證佛昔修治大悲海其心念念等世間是故神通無有邊增益精氣能觀見佛徧世間常現前一切方便無空過悉淨眾生諸惑惱此普生神之解脫佛是世間大智海放淨光明無不徧廣大信解悉從生如是嚴髻能明入如來觀世起慈心為利眾生而出現示彼恬怡最勝道此淨華神之解脫善逝所修清淨行菩提樹下具宣說如是教化滿十方此妙香神能聽受佛於一切諸世間悉使離憂生大喜所有根欲皆治淨可愛樂神斯悟入如來出現於世間普觀眾生心所樂種種方便而成熟此淨光神解脫門復次吉祥主藥神得普觀一切眾生心而勤攝取解脫門第十一主藥神十法十頌一順情則易攝逆意則難調故普觀之栴檀林主藥神得以光明攝取眾生俾見者無空過解脫門離塵光明主藥神得能以淨方便滅一切眾生煩惱解脫門二三可知名稱普聞主藥神得能以大名稱增長無邊善根海解脫門四始學者以名為實賔大士以名為佛事毛孔現光主藥神得大悲幢速赴一切病境界解脫門五以慈善根力放月愛等光身心兩病纔念便滅慈善根力者慈善根即湼槃第十五經云復次善男子菩薩四無量心能為一切諸善根本下廣說慈心行施發起大願竟云善男子一切聲聞緣覺菩薩諸佛如來所有善根慈為根本善男子菩薩摩訶薩修習慈心能生如是無量善根謂不淨觀等皆從此生結云如是等法慈為根本善男子以是義故慈是真實非虛妄也若有人問誰是一切諸善根本當言慈是以是義故實非虛妄善男子能為善者名實思惟實思惟者即名為慈慈即如來慈即大乘大乘即慈慈即如來善男子慈即菩提道菩提道即是如來如來即慈次廣說慈德是一切善法下廣說慈德如提婆達多欲言如來令阿闍世王放護財醉象我即入慈定舉手示之即於指端出五師子即便怖畏舉身投地敬禮我足善男子我時手指實無師子乃是修慈善根力故令彼調伏廣說緣起皆悉結歸慈善根力放月愛等光即湼槃二十經爾時世尊在雙𣗳間見可闍世王悶絕躃地爾時世尊為阿闍世王入月愛三昧入三昧已放大光明其光清凉徃照王身王身疾愈鬱蒸除滅乃至王問耆婆何等名為月愛三昧耆婆答言有六義似一譬如月光能令一切優鉢羅華開敷鮮明月愛三昧亦復如是能令眾生善心開敷是故名為月愛三昧二如月能令行路歡喜此三昧能令修習湼槃道者歡喜三一日至十五日光色漸明此能令善根增長四十六至三十日形色漸減此能令漸滅煩惱五能除鬱蒸此能除貪瞋惱熱六如月眾星中王甘露一味人所愛樂月愛三昧亦復如是諸善中王甘露一味一切眾生之所愛樂是故復名月愛三昧破暗清淨主藥神得療治一切盲冥眾生令智眼清淨解脫門六迷理迷報二愚盲㝠起惑造業備受眾苦佛以正法金錍開其智眼令明三諦故云清淨佛以正法金錍者即涅槃第八迦葉菩薩白佛言世尊佛性者云何甚深難見難入佛言善男子如百盲人為治目故造詣良醫是時良醫即以金錍抉其眼瞙以一指示問言見不盲人答言我猶未見復以二指三指示之乃言少見善男子是大湼槃微妙經典如來未說亦復如是無量菩薩雖已具足諸波羅密乃至十住猶未能得見於佛性如來既說即便少見是菩薩既得見已咸作是言甚奇世尊我等流轉無量生死常為無我之所惑亂善男子如是菩薩位階十地尚不了了知見佛性何况聲聞緣覺之人能得見耶澤州釋云十地菩薩各修十度名為百人湼槃為金錍經初一說名一指示中間重說名二指示經未復說名三指示下合中未見佛性並如盲人延公云金錍喻教抉瞙者教能生解喻破無明即今䟽意故名正法金錍而言三指喻三僧祗乃至十地未了分明故言少見若凖澤州則湼槃為錍三說為三指者若俱約教則錍指不殊若以湼槃為所詮者又不順喻寧取延公然三僧祗為三指者亦順前示及與後示亦順十住少見之言今不取者遂令佛說一時之中不具三指又以時喻指以未全同故䟽自釋以三諦為三指指為旨趣義甚分明一時橫觀皆觀三諦竪至十住亦證三諦第一指者即示俗諦言凡是有心定當作佛皆有佛性二者示真諦為第二指云佛性者名第一義空三示中道為三指經云佛性即是無上菩提中道種子故非有如虛空非無如兔角故知三諦喻於三指普發吼聲主藥神得能演佛音說諸法差別義解脫門蔽日光幢主藥神得能作一切眾生善知識令見者咸生善根解脫門七八可知明見十方主藥神得清淨大悲藏能以方便令生信解解脫門九無愛見之大悲生物德故名藏普發威光主藥神得方便令念佛滅一切眾生病解脫門十世醫療治雖瘥還生永滅生德無先念佛因病因光皆是方便謂佛有無邊相相有無邊好好放無邊光光攝無邊眾言隨念者佛德齊均隨緣隨樂趣稱一佛三昧易成敬一心濃餘盡然矣況心凝覺路闇蹈大方爾時吉祥主藥神承佛威力普觀一切主藥神眾而說頌言頌可知如來智慧不思議悉知一切眾生心能以種種方便力滅彼群迷無量苦大雄善巧難測量凡有所作無空過必使眾生諸苦滅栴檀林神能悟此汝觀諸佛法如是徃昔勤修無量劫而於諸有無所著此離塵光所入門佛百千劫難可遇若有得見及聞名必今獲益無空過此普稱神之所了如來一一毛孔中悉放光明滅眾患世間煩惱皆令盡此現光神所入門一切眾生癡所盲惑業眾苦無量別佛悉蠲除開智照如是破暗能觀見如來一音無限量能開一切法門海眾生聽者悉了知此是大音之解脫汝觀佛智難思議普現諸趣救群生能令見者皆從化此蔽日幢深悟了如來大悲方便海為利世間而出現廣開正道示眾生此見方神能了達如來普放大光明一切十方無不照令隨念佛生功德此發威光解脫門復次布華如雲主林神得廣大無邊智海藏解脫門第十二主林神十法十頌一佛德無邊皆依智海含德流光所以名藏擢榦舒光主林神得廣大修治普清淨解脫門二等眾生悲是為廣大一一離障名普清淨生芽發耀主林神得增長種種淨信芽解脫門三一切勝因皆為佛道各各心淨則種種芽生吉祥淨葉主林神得一切清淨功德莊嚴聚解脫門四一切功德莊嚴一毛一一皆然故佛為德聚良以佛果攬因皆圓成非分成是故一因生一切果一果收一切因皆圓融無礙耳垂布燄藏主林神得普門清淨慧恒周覽法界解脫門五智通萬法是曰普門客塵不生故曰清淨悟如日照頓周法界功如拂鏡說智漸明明是本明漸為圓漸悟如等者楞伽經中有四漸四頓今唯用一彼經大慧白佛言世尊云何淨除自心現流為頓為漸答中先明四漸後說四頓漸經云佛告大慧漸淨非頓一如菴羅果漸熟非頓如來漸除眾生自心現流亦復如是漸淨非頓此喻十信二如陶家作器漸成非頓此喻十住三如大地漸生非頓此喻十行四如習藝漸就非頓此喻十向上之四漸約於修行未證理故下之四頓約已證理一明鏡頓現喻經云譬如明鏡頓現一切色像如來淨除一切眾生自心現流亦復如是頓現無相無所有清淨法界此喻初地至七地二日月頓照喻云如日月輪頓照顯示一切色像如來為離自心現流習氣過患眾生亦復如是頓為顯示不思議勝智境界此喻八地已上三藏識頓知喻云譬如藏識頓分別知自心現流及身安立受用境界彼諸依持佛亦復如是頓熟眾生所處境界以修行者安處於彼色究竟天此喻報佛四佛光頓照喻云譬如法佛所作依佛光明照耀自覺聖趣亦復如是被於法相有性無性惡見妄想照今除滅此亦喻法報前喻報成此喻頓照今䟽唯取頓中一日光頓照喻雖舉鏡喻非是明鏡頓照自取拂鏡之喻正同大通時時勤拂拭莫遣惹塵埃而復自融通又上四漸四頓多依地位古今同為此釋亦順經文今釋通於橫竪則位位之中皆有頓義然約橫論頓復有多義一頓悟漸修如見九層之臺則可頓見要須躡階而後得昇今亦如是頓了心性即心即佛無法不具而須積功遍修萬行此約解悟二者頓修漸悟即如磨鏡一時遍磨明淨有漸萬行頓修悟則漸勝此約證悟三頓修頓悟如利劍斬𮈔千莖齊斬一時齊斷亦如染千𮈔一時齊染一時成色萬行齊修一時朗悟四漸修漸悟猶如斬竹節節不同此非今用今言悟如日照即解悟證悟皆悉頓也即頓修頓悟功如拂鏡亦非漸修是頓修漸悟義言明是本明漸為圓漸者此融上二恐人謂拂鏡非頓明鏡本來淨何用拂塵埃故為會之此是六祖直顯本性破其漸修今為頓經明其漸證隨斷漸明皆本明矣故云明是本明即無念體上自有真知非別有知知心體也言漸為圓漸者即天台智者意彼有言云漸漸非圓漸圓圓非漸圓謂漸家亦有圓漸圓家亦有圓漸漸家漸者如江出岷山始於濫觴漸家圓者如大江千里圓家漸者如初入海雖則漸深一滴之水已過大江况濫觴耶圓家圓者如窮海無涯底故今云漸是圓家漸尚過漸家之圓况漸家之漸妙莊嚴光主林神得普知一切眾生行海而興布法雲解脫門六知遍趣行如應布法可意雷聲主林神得忍受一切不可意聲演清淨音解脫門七了音聲性皆同佛音故無不可意能令世間皆聞佛音方云清淨香光普徧主林神得十方普現昔所修治廣大行境界解脫門八昔行稱周法界是廣大境神通普令物見倣而行之如下喜目即其事也妙光逈曜主林神得以一切功德法饒益世間解脫門九眾生諂自不修德寧有進賢之心今福智益他則物我兼利偈云譣詖即諂也眾生諂自不修德者詩云內有進賢之志而無譣詖之心蒼頡篇曰詖謂諂也華果光味主林神得能令一切見佛出興常敬念不忘莊嚴功德藏解脫門十敬念則佛興佛興則莊嚴德藏障重者不念不見於佛豈無常哉故應見常見也音釋𦊱礙𦊱古賣切礙牛代切𦊱礙也迅迅音信疾也離慳著離力智切遠離也慳丘閑切悋也著直畧切黏著也霈霈普蓋切𩃎霈也誘以九切導也恬怡恬音甜安也怡盈之切和也療力照切治也蠲除蠲音㳙潔也譣詖譣音險詖彼義切譣詖謂隂險不正也蘂如水切漩𣸪漩旬緣切𣸪房六切漩𣸪水回流也藻子皓切水草也菱閭平切芰也奩力兼切匣也輻方六切跟古痕切足踵也縵莫半切絻亡運切輭而𭀚切柔也踝戶瓦切腿兩旁曰內外踝𦟛丑切均也直也腨市𭀚切腨膓也裸郎果切赤體也肘陟栁切臂節也頰古恊切面旁也𥈤陟涉切目旁毛也嵬吾回五𦛒二切躃毘亦切倒也金錍正作𬫹邊迷切金錍掠器抉瞙抉一决切挑也瞙水各切瞖瞙躡尼輙切登也濫觴濫盧瞰切觴尸羊切濫觴泛觴也療力照切治也瘥楚懈切病瘉也
